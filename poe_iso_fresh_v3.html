<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Isometric Prototype + POE Mobile HUD</title>
<style>
  :root{
    --uiScale: 0.5; /* ✅ 전체 UI 크기 */
  }
  html,body{height:100%;margin:0;overflow:hidden;background:#0b0b0e;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
  #app{position:fixed;inset:0;touch-action:none;}

  canvas#game{position:absolute;inset:0;display:block;background:#0f0f14;}

  /* ===== HUD (LIFE + MINIMAP) ===== */
  #hud{position:absolute;inset:0;pointer-events:none;z-index:20;}
  #lifeOrb{
    position:absolute;
    left:calc(18px*var(--uiScale));
    top: calc(18px*var(--uiScale));
    width:calc(150px*var(--uiScale));
    height:calc(150px*var(--uiScale));
    border-radius:50%;
    background:transparent;
    border:3px solid rgba(240,240,255,0.14);
    box-shadow:0 12px 30px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.75);
    overflow:hidden;
    z-index:21;

    /* iOS/Safari corner artifact fix */
    -webkit-clip-path: circle(50% at 50% 50%);
    clip-path: circle(50% at 50% 50%);
    transform: translateZ(0);
    will-change: transform;
  }
  #lifeOrb canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;}
  #lifeOrb .frame{
    position:absolute;inset:0;border-radius:50%;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), rgba(255,255,255,0.02) 40%, rgba(0,0,0,0.0) 60%),
      radial-gradient(circle at 50% 70%, rgba(0,0,0,0.35), rgba(0,0,0,0.0) 55%);
    mix-blend-mode:screen; opacity:0.9;
  }
  #lifeOrb .label{
    position:absolute;left:50%;top:22%;
    transform:translateX(-50%);
    font-size:12px;
    color:rgba(210,210,225,0.78);
    letter-spacing:0.9px;
    text-shadow:0 2px 10px rgba(0,0,0,0.85);
  }
  #lifeOrb .nums{
    position:absolute;left:50%;top:58%;
    transform:translate(-50%,-50%);
    font-weight:900;font-size:18px;
    color:rgba(240,240,250,0.92);
    text-shadow:0 2px 10px rgba(0,0,0,0.85);
    text-align:center;line-height:1.05;
  }

  #minimap{
    position:absolute;
    right:calc(18px*var(--uiScale));
    top:  calc(18px*var(--uiScale));
    width:calc(150px*var(--uiScale));
    height:calc(150px*var(--uiScale));
    border-radius:50%;
    background:transparent;
    border:3px solid rgba(240,240,255,0.14);
    box-shadow:0 12px 30px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.75);
    overflow:hidden;
    z-index:21;

    -webkit-clip-path: circle(50% at 50% 50%);
    clip-path: circle(50% at 50% 50%);
    transform: translateZ(0);
    will-change: transform;
  }
  #minimap canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;}
  #minimap .ring{
    position:absolute;inset:10px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.10);
  }

  /* ===== Touch UI (Joystick + ATK + Skills) ===== */
  #touchUI{position:absolute;inset:0;pointer-events:none;z-index:30;}
  .joyBase{
    position:absolute;
    left:calc(28px*var(--uiScale));
    bottom:calc(28px*var(--uiScale));
    width:calc(190px*var(--uiScale));
    height:calc(190px*var(--uiScale));
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.14);
    display:none;
    pointer-events:auto;
    touch-action:none;
  }
  .joyKnob{
    position:absolute;left:50%;top:50%;
    width:calc(82px*var(--uiScale));
    height:calc(82px*var(--uiScale));
    border-radius:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
  }

  .atkBtn{
    position:absolute;
    right:calc(40px*var(--uiScale));
    bottom:calc(22px*var(--uiScale));
    width:calc(124px*var(--uiScale));
    height:calc(124px*var(--uiScale));
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,210,130,0.40), rgba(255,140,40,0.30) 45%, rgba(160,45,0,0.25));
    border:2px solid rgba(255,170,80,0.35);
    box-shadow:0 10px 26px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.55);
    display:none;
    align-items:center;justify-content:center;
    color:rgba(255,245,235,0.92);
    font-weight:900;
    text-shadow:0 1px 0 rgba(0,0,0,0.35);
    pointer-events:auto;
    touch-action:none;
    z-index:35;
  }
  .skillBtn{
    position:absolute;
    width:calc(78px*var(--uiScale));
    height:calc(78px*var(--uiScale));
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(160,210,255,0.35), rgba(70,140,240,0.22) 55%, rgba(0,60,140,0.18));
    border:1px solid rgba(180,220,255,0.22);
    box-shadow:0 10px 24px rgba(0,0,0,0.52), inset 0 0 16px rgba(0,0,0,0.55);
    display:none;
    align-items:center;justify-content:center;
    color:rgba(235,245,255,0.86);
    font-weight:900;
    text-shadow:0 1px 0 rgba(0,0,0,0.35);
    pointer-events:auto;
    touch-action:none;
    z-index:34;
  }
  .atkBtn:active,.skillBtn:active{transform:scale(0.98);}

  /* ✅ 스킬 배치 (절대 겹치지 않게 넉넉한 간격) */
  #skill1{ /* positioned by JS (semicircle) */ }
  #skill2{ /* positioned by JS (semicircle) */ }
  #skill3{ /* positioned by JS (semicircle) */ }

  @media (pointer:coarse){
    .joyBase,.atkBtn,.skillBtn{display:flex;}
  }

  /* ===== Landscape gate ===== */
  #rotateGate{
    position:absolute;inset:0;
    background:radial-gradient(circle at 50% 20%, rgba(255,255,255,0.06), rgba(0,0,0,0.92) 55%);
    display:none;
    align-items:center;justify-content:center;
    z-index:9999;
    pointer-events:auto;
    touch-action:none;
  }
  #rotateCard{
    width:min(420px, 86vw);
    background:rgba(12,12,18,0.65);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:16px;
    box-shadow:0 18px 45px rgba(0,0,0,0.75), inset 0 0 18px rgba(0,0,0,0.65);
    padding:18px 16px;
    text-align:center;
    color:rgba(240,240,250,0.92);
  }
  #rotateIcon{
    width:72px;height:72px;margin:2px auto 12px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.06);
    display:flex;align-items:center;justify-content:center;
    font-size:34px;
  }
  #rotateTitle{font-weight:900;font-size:18px;margin:0 0 6px;}
  #rotateDesc{margin:0 0 14px;color:rgba(210,210,225,0.78);font-size:13px;line-height:1.35;}
  #rotateBtn{
    appearance:none;border:none;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
    color:rgba(240,240,250,0.92);
    font-weight:800;
    padding:10px 12px;
    border-radius:12px;
    width:100%;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="lifeOrb">
      <canvas id="lifeCanvas"></canvas>
      <div class="frame"></div>
      <div class="label">LIFE</div>
      <div class="nums" id="lifeNums">100<br><span style="font-size:12px;font-weight:800;opacity:.85">/ 100</span></div>
    </div>

    <div id="minimap">
      <canvas id="minimapCanvas"></canvas>
      <div class="ring"></div>
    </div>
  </div>

  <div id="touchUI">
    <div class="joyBase" id="joyBase"><div class="joyKnob" id="joyKnob"></div></div>
    <div class="atkBtn" id="atkBtn">ATK</div>
    <div class="skillBtn" id="skill1">1</div>
    <div class="skillBtn" id="skill2">2</div>
    <div class="skillBtn" id="skill3">3</div>
  </div>

  <div id="rotateGate">
    <div id="rotateCard">
      <div id="rotateIcon">📱↻</div>
      <p id="rotateTitle">가로 화면으로 플레이</p>
      <p id="rotateDesc">이 게임 UI는 가로(landscape) 전용이야.<br>휴대폰을 가로로 돌려줘.</p>
      <button id="rotateBtn">가로로 전환 시도</button>
    </div>
  </div>
</div>

<script>
/* ===== Utils ===== */
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* ===== Landscape gate ===== */
(function(){
  const gate = document.getElementById("rotateGate");
  const btn  = document.getElementById("rotateBtn");
  function isLandscape(){ return window.matchMedia && window.matchMedia("(orientation: landscape)").matches; }
  function update(){ gate.style.display = isLandscape() ? "none" : "flex"; }
  update();
  window.addEventListener("resize", update);
  window.addEventListener("orientationchange", update);
  btn.addEventListener("click", async ()=>{
    try{ if(screen.orientation && screen.orientation.lock){ await screen.orientation.lock("landscape"); } }catch(_){}
    update();
  });
})();

/* ===== Core (player only) ===== */
const Core = (()=>{
  const state = {
    map:{ w:120, h:120, tw:64, th:32 },
    player:{
      x:60, y:60, r:0.45,
      base:{ life:100, speed:6.0 },
      res:{ life:100 },
      max:{ life:100 }
    },
    input:{ mx:0, my:0 }
  };
  function init(){
    state.player.res.life = state.player.base.life;
    state.player.max.life = state.player.base.life;
  }
  function step(dt){
    const p = state.player;
    const mx = state.input.mx, my = state.input.my;
    if(mx || my){
      const L = Math.hypot(mx,my) || 1;
      const ux = mx/L, uy = my/L;
      p.x = clamp(p.x + ux * p.base.speed * dt, p.r, state.map.w - p.r);
      p.y = clamp(p.y + uy * p.base.speed * dt, p.r, state.map.h - p.r);
    }
  }
  function get(){ return state; }
  return { init, step, get };
})();

/* ===== Renderer (isometric tiles + player) ===== */
const Renderer = (()=>{
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);

  function isoWithCamera(wx, wy, camX, camY, TW, TH){
    const sx = (wx - wy) * (TW/2);
    const sy = (wx + wy) * (TH/2);
    const csx = (camX - camY) * (TW/2);
    const csy = (camX + camY) * (TH/2);
    return { x: (sx - csx) + canvas.width/2, y: (sy - csy) + canvas.height/2 };
  }

  function draw(state){
    const TW = state.map.tw, TH = state.map.th;
    const p = state.player;
    const camX = p.x, camY = p.y;

    // ✅ always paint background (no transparent artifacts)
    ctx.fillStyle = "#0f0f14";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // draw visible tiles (safe radius based on screen)
    const R = Math.ceil(Math.max(canvas.width / TW, canvas.height / TH)) + 10;
    const minX = Math.max(0, Math.floor(camX - R));
    const maxX = Math.min(state.map.w-1, Math.ceil(camX + R));
    const minY = Math.max(0, Math.floor(camY - R));
    const maxY = Math.min(state.map.h-1, Math.ceil(camY + R));

    for(let y=minY;y<=maxY;y++){
      for(let x=minX;x<=maxX;x++){
        const pos = isoWithCamera(x,y,camX,camY,TW,TH);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineTo(pos.x + TW/2, pos.y + TH/2);
        ctx.lineTo(pos.x, pos.y + TH);
        ctx.lineTo(pos.x - TW/2, pos.y + TH/2);
        ctx.closePath();
        ctx.fillStyle = ((x+y)&1) ? "#1f1f27" : "#262631";
        ctx.fill();
      }
    }

    // player
    const pos = isoWithCamera(p.x, p.y, camX, camY, TW, TH);
    ctx.fillStyle = "#ff3b3b";
    ctx.beginPath(); ctx.arc(pos.x, pos.y + TH/2, 12, 0, Math.PI*2); ctx.fill();
  }

  resize();
  return { draw };
})();

/* ===== HUD (Life orb + minimap) ===== */
const HUD = (()=>{
  const lifeCanvas = document.getElementById("lifeCanvas");
  const lifeNums   = document.getElementById("lifeNums");
  const mmCanvas   = document.getElementById("minimapCanvas");

  function setupHiDPI(canvas){
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    const css = canvas.getBoundingClientRect();
    const w = Math.max(1, Math.floor(css.width * dpr));
    const h = Math.max(1, Math.floor(css.height * dpr));
    if(canvas.width !== w || canvas.height !== h){ canvas.width=w; canvas.height=h; }
    return { w, h, dpr };
  }

  function drawLife(cur, max){
    const ctx = lifeCanvas.getContext("2d");
    const {w,h} = setupHiDPI(lifeCanvas);
    const cx=w/2, cy=h/2;
    const R=Math.min(w,h)*0.48;

    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();

    // dark interior
    ctx.fillStyle="rgba(0,0,0,0.58)";
    ctx.fillRect(0,0,w,h);

    // fill
    const pct = max>0 ? clamp(cur/max,0,1) : 0;
    const levelY = cy + R - (2*R*pct);
    ctx.fillStyle="rgba(220,40,40,0.88)";
    ctx.fillRect(cx-R-2, levelY, 2*R+4, (cy+R)-levelY+2);

    // wave
    ctx.globalAlpha=0.35;
    ctx.beginPath();
    const waveAmp=R*0.05, waveLen=R*0.45;
    const phase = (performance.now()/1000)*2.4;
    ctx.moveTo(cx-R, levelY);
    for(let x=cx-R; x<=cx+R; x+=R*0.08){
      const t=(x-(cx-R))/waveLen;
      const y=levelY + Math.sin(t*2.8 + phase)*waveAmp;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(cx+R, cy+R); ctx.lineTo(cx-R, cy+R); ctx.closePath();
    ctx.fillStyle="rgba(255,130,130,0.68)";
    ctx.fill();
    ctx.globalAlpha=1.0;

    // vignette
    const grd=ctx.createRadialGradient(cx, cy+R*0.35, R*0.2, cx, cy, R);
    grd.addColorStop(0,"rgba(255,255,255,0.06)");
    grd.addColorStop(0.55,"rgba(0,0,0,0.0)");
    grd.addColorStop(1,"rgba(0,0,0,0.60)");
    ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);

    ctx.restore();

    // rings
    ctx.strokeStyle="rgba(255,255,255,0.14)";
    ctx.lineWidth=Math.max(1,R*0.06);
    ctx.beginPath(); ctx.arc(cx,cy,R*0.985,0,Math.PI*2); ctx.stroke();

    ctx.strokeStyle="rgba(0,0,0,0.55)";
    ctx.lineWidth=Math.max(1,R*0.025);
    ctx.beginPath(); ctx.arc(cx,cy,R*0.90,0,Math.PI*2); ctx.stroke();

    lifeNums.innerHTML = `${Math.floor(cur)}<br><span style="font-size:12px;font-weight:800;opacity:.85">/ ${Math.floor(max)}</span>`;
  }

  function drawMiniMap(state){
    const ctx = mmCanvas.getContext("2d");
    const {w,h} = setupHiDPI(mmCanvas);
    const cx=w/2, cy=h/2;
    const R=Math.min(w,h)*0.48;

    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();

    ctx.fillStyle="rgba(0,0,0,0.55)";
    ctx.fillRect(0,0,w,h);

    // simple grid + player dot
    ctx.globalAlpha=0.20;
    ctx.strokeStyle="rgba(255,255,255,0.15)";
    for(let i=-3;i<=3;i++){
      ctx.beginPath(); ctx.moveTo(cx-R, cy+i*R/3); ctx.lineTo(cx+R, cy+i*R/3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+i*R/3, cy-R); ctx.lineTo(cx+i*R/3, cy+R); ctx.stroke();
    }
    ctx.globalAlpha=1.0;

    ctx.fillStyle="rgba(255,80,80,0.95)";
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill();

    const grd=ctx.createRadialGradient(cx, cy, R*0.2, cx, cy, R);
    grd.addColorStop(0,"rgba(255,255,255,0.06)");
    grd.addColorStop(0.6,"rgba(0,0,0,0.0)");
    grd.addColorStop(1,"rgba(0,0,0,0.70)");
    ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);

    ctx.restore();
  }

  function render(){
    const st = Core.get();
    drawLife(st.player.res.life, st.player.max.life);
    drawMiniMap(st);
  }

  window.addEventListener("resize", render);
  return { render };
})();

/* ===== Controls (fixed joystick + buttons) ===== */
const Controls = (()=>{
  const root = document.getElementById("app");
  const joyBase = document.getElementById("joyBase");
  const joyKnob = document.getElementById("joyKnob");
  const atkBtn  = document.getElementById("atkBtn");
  const skillBtns = [
    [document.getElementById("skill1"), 1],
    [document.getElementById("skill2"), 2],
    [document.getElementById("skill3"), 3],
  ];

  const joy = { active:false, id:null, baseX:0, baseY:0, dx:0, dy:0, max:64 };

  function layoutSkillsSemicircle(){
    // ✅ ATK 기준: 동일 반지름 + 동일 각 간격(3개) = 반원 배치
    const atk = atkBtn;
    const b1 = document.getElementById("skill1");
    const b2 = document.getElementById("skill2");
    const b3 = document.getElementById("skill3");
    if(!atk || !b1 || !b2 || !b3) return;

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const ar = atk.getBoundingClientRect();
    if(!ar.width || !ar.height) return;

    const atkCx = ar.left + ar.width/2;
    const atkCy = ar.top  + ar.height/2;
    const atkR  = ar.width/2;

    // skill radius (same for all)
    const sr = b1.getBoundingClientRect().width/2 || (78 * (parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--uiScale"))||1))/2;

    // gap in px (independent from scale glitches)
    const GAP = Math.max(10, Math.round(atkR * 0.40));

    // radius from ATK center to skill centers
    const R = atkR + sr + GAP;

    // Arc choice: upper-left -> upper -> upper-right (POE 느낌)
    // 0°=right, 90°=down, 180°=left, 270°=up
    // Keep within screen: if too close to right edge, shift arc slightly left.
    let start = 210; // up-left
    let end   = 330; // up-right
    // If atk is near right edge, avoid pushing skills offscreen
    if(vw - (atkCx + atkR) < 60){
      start = 225;
      end   = 345;
    }
    // If atk is near bottom edge, keep arc higher
    if(vh - (atkCy + atkR) < 40){
      start = 200;
      end   = 320;
    }

    const angles = [180, 240, 270]; // 1=9시, 2=11시, 3=12시 // equally spaced for 3 buttons
    const btns = [b1, b2, b3]; // match 1,2,3 order // left -> middle -> right (keeps visual order 2,1,3 like your layout)

    for(let i=0;i<3;i++){
      const rad = angles[i] * Math.PI / 180;
      const cx = atkCx + Math.cos(rad)*R;
      const cy = atkCy + Math.sin(rad)*R;

      // clamp so they never go offscreen
      const clampedCx = Math.max(sr+6, Math.min(vw - sr - 6, cx));
      const clampedCy = Math.max(sr+6, Math.min(vh - sr - 6, cy));

      const right = vw - (clampedCx + sr);
      const bottom = vh - (clampedCy + sr);

      btns[i].style.right = right.toFixed(1) + "px";
      btns[i].style.bottom = bottom.toFixed(1) + "px";
    }
  }

  function isLandscape(){ return window.matchMedia && window.matchMedia("(orientation: landscape)").matches; }
  function setKnob(px,py){
    joyKnob.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
  }
  function resetJoy(){
    joy.active=false; joy.id=null; joy.dx=0; joy.dy=0;
    setKnob(0,0);
  }
  function findTouchById(list, id){ for(const t of list){ if(t.identifier===id) return t; } return null; }
  function refreshJoyMax(){
    const s = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--uiScale")) || 1;
    joy.max = 64 * s;
  }
  refreshJoyMax();
  window.addEventListener("resize", refreshJoyMax);
  requestAnimationFrame(()=>layoutSkillsSemicircle());
  window.addEventListener("resize", ()=>layoutSkillsSemicircle());
  window.addEventListener("orientationchange", ()=>layoutSkillsSemicircle());

  root.addEventListener("touchstart", (e)=>{
    if(!isLandscape()) return;
    const rect = root.getBoundingClientRect();
    for(const t of e.changedTouches){
      const x = t.clientX - rect.left;
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if(el && el.closest && el.closest("#atkBtn, .skillBtn")) continue;
      if(x > rect.width * 0.55) continue;

      joy.active=true;
      joy.id=t.identifier;

      // fixed base center from current joyBase position
      const br = joyBase.getBoundingClientRect();
      joy.baseX = (br.left + br.width/2) - rect.left;
      joy.baseY = (br.top  + br.height/2) - rect.top;

      setKnob(0,0);
      e.preventDefault();
      return;
    }
  }, {passive:false});

  root.addEventListener("touchmove", (e)=>{
    if(!joy.active) return;
    const rect = root.getBoundingClientRect();
    const t = findTouchById(e.touches, joy.id);
    if(!t) return;

    const x = t.clientX - rect.left;
    const y = t.clientY - rect.top;
    let px = x - joy.baseX;
    let py = y - joy.baseY;
    const dist = Math.hypot(px,py);
    const max = joy.max;
    if(dist > max){ px = px/dist*max; py = py/dist*max; }
    joy.dx = px/max;
    joy.dy = py/max;
    setKnob(px,py);

    e.preventDefault();
  }, {passive:false});

  root.addEventListener("touchend", (e)=>{
    if(!joy.active) return;
    const ended = findTouchById(e.changedTouches, joy.id);
    if(ended){
      resetJoy();
      e.preventDefault();
    }
  }, {passive:false});

  root.addEventListener("touchcancel", ()=>{ if(joy.active) resetJoy(); }, {passive:false});

  atkBtn.addEventListener("touchstart", (e)=>{
    const st = Core.get();
    st.player.res.life = Math.max(0, st.player.res.life - 1);
    e.preventDefault();
  }, {passive:false});

  for(const [btn, idx] of skillBtns){
    btn.addEventListener("touchstart", (e)=>{
      const st = Core.get();
      st.player.res.life = Math.max(0, st.player.res.life - 2);
      e.preventDefault();
    }, {passive:false});
  }

  function apply(){
    const st = Core.get();
    st.input.mx = joy.dx;
    st.input.my = joy.dy;
  }
  return { apply };
})();

/* ===== Boot ===== */
Core.init();

let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last)/1000);
  last = now;

  Controls.apply();
  Core.step(dt);
  Renderer.draw(Core.get());
  HUD.render();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
