    baseDmg = 21;
    baseSpd = 0.00;

  }else if(type === "spider") {
    baseHp  = 52;
    baseDmg = 12;
    baseSpd = 0.92;

  }else if(type === "demon") {
    baseHp  = 120;
    baseDmg = 22;
    baseSpd = 0.78;

  }else{
    // melee
    baseHp  = 55;
    baseDmg = 11;
    baseSpd = 0.85;
  }

  return {
    hp:  baseHp  * s.hpMul,
    dmg: baseDmg * s.dmgMul,
    spd: baseSpd * s.spdMul,
    eliteChance: s.eliteChance,
    eliteHpMul: s.eliteHpMul,
    eliteDmgMul: s.eliteDmgMul
  };
}

function makeBossStatsByTier(t){
  const baseHp  = 900;
  const baseDmg = 26;
  const baseSpd = 0.62;

  const bossHp  = baseHp  * (1 + (t-1)*0.28);
  const bossDmg = baseDmg * (1 + (t-1)*0.18);
  const bossSpd = baseSpd * (1 + Math.min(0.18, (t-1)*0.015));

  return { bossHp, bossDmg, bossSpd };
}

function dist2(ax, ay, bx, by){
  const dx = ax - bx;
  const dy = ay - by;
  return dx*dx + dy*dy;
}

function srand(seed){
  let s = seed >>> 0;
  return function(){
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 4294967296;
  };
}

function clearSpawnArea(cx, cy, radiusTiles=3){
  const tx = Math.floor(cx / tileSize);
  const ty = Math.floor(cy / tileSize);
  for(let y=ty-radiusTiles; y<=ty+radiusTiles; y++){
    for(let x=tx-radiusTiles; x<=tx+radiusTiles; x++){
      if(x<=0||y<=0||x>=mapSize-1||y>=mapSize-1) continue;
      map[y][x] = 0;
    }
  }
}

function carveBossRoomAndCorridor(){
  const w = 7 + Math.floor(Math.random()*5);
  const h = 7 + Math.floor(Math.random()*5);
  const margin = 2;

  const corner = (Math.random()*4)|0;
  let x0, y0;

  if(corner===0){ x0 = mapSize - margin - w; y0 = margin; }
  if(corner===1){ x0 = margin; y0 = margin; }
  if(corner===2){ x0 = margin; y0 = mapSize - margin - h; }
  if(corner===3){ x0 = mapSize - margin - w; y0 = mapSize - margin - h; }

  for(let y=y0; y<y0+h; y++){
    for(let x=x0; x<x0+w; x++){
      map[y][x] = 0;
    }
  }

  const cx = Math.floor(mapSize/2), cy = Math.floor(mapSize/2);
  const roomCx = x0 + (w>>1), roomCy = y0 + (h>>1);

  let doorX = roomCx;
  let doorY = roomCy;

  if(Math.abs(roomCx - cx) > Math.abs(roomCy - cy)){
    if(roomCx > cx){ doorX = x0;       doorY = roomCy; }
    else           { doorX = x0+w-1;   doorY = roomCy; }
  }else{
    if(roomCy > cy){ doorY = y0;       doorX = roomCx; }
    else           { doorY = y0+h-1;   doorX = roomCx; }
  }

  map[doorY][doorX] = 0;

  const startX = Math.floor(player.x / tileSize);
  const startY = Math.floor(player.y / tileSize);

  let x = startX, y = startY;
  const stepX = doorX > x ? 1 : -1;
  while(x !== doorX){
    map[y][x] = 0;
    map[y-1] && (map[y-1][x] = 0);
    map[y+1] && (map[y+1][x] = 0);
    x += stepX;
  }
  const stepY = doorY > y ? 1 : -1;
  while(y !== doorY){
    map[y][x] = 0;
    map[y][x-1] !== undefined && (map[y][x-1] = 0);
    map[y][x+1] !== undefined && (map[y][x+1] = 0);
    y += stepY;
  }
  map[doorY][doorX] = 0;

  bossRoom = { x:x0, y:y0, w, h, cx:roomCx, cy:roomCy, doorX, doorY };
}

function buildEmptyMap(){
  map = [];
  for(let y=0; y<mapSize; y++){
    let row = [];
    for(let x=0; x<mapSize; x++){
      if(x===0 || y===0 || x===mapSize-1 || y===mapSize-1) row.push(1);
      else row.push(0);
    }
    map.push(row);
  }
}

function placeRandomWalls(rng, wallCount){

    }

    for(let y=y0; y<y0+h; y++){
      for(let x=x0; x<x0+w; x++){
        if(x<=0||y<=0||x>=mapSize-1||y>=mapSize-1) continue;
        map[y][x] = 1;
      }
    }

// ✅ Pillars (tile=2) on some wall corners for POE vibe
const corners = [

];
for(const [px,py] of corners){

function buildReachableMaskFromPlayer(){
  const startX = Math.floor(player.x / tileSize);
  const startY = Math.floor(player.y / tileSize);

  const vis = Array.from({length: mapSize}, ()=>Array(mapSize).fill(false));
  if(!map[startY] || map[startY][startX] !== 0) return vis;

  const q = [[startX, startY]];
  vis[startY][startX] = true;

  while(q.length){
    const [x,y] = q.pop();
    const nb = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
    for(const [nx,ny] of nb){
      if(nx<=0||ny<=0||nx>=mapSize-1||ny>=mapSize-1) continue;
      if(vis[ny][nx]) continue;
      if(map[ny][nx] !== 0) continue;
      vis[ny][nx] = true;
      q.push([nx,ny]);
    }
  }
  return vis;
}

function floodFillReachableFromPlayer(){
  const startX = Math.floor(player.x / tileSize);
  const startY = Math.floor(player.y / tileSize);
  if(!map[startY] || map[startY][startX] !== 0) return 0;

  const vis = Array.from({length: mapSize}, ()=>Array(mapSize).fill(false));
  const q = [[startX,startY]];
  vis[startY][startX] = true;
  let count = 0;

  while(q.length){
    const [x,y] = q.pop();
    count++;
    const nb = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
    for(const [nx,ny] of nb){
      if(nx<=0||ny<=0||nx>=mapSize-1||ny>=mapSize-1) continue;
      if(vis[ny][nx]) continue;
      if(map[ny][nx] !== 0) continue;
      vis[ny][nx] = true;
      q.push([nx,ny]);
    }
  }
  return count;
}

function generateRandomMapForTier(tier){
  const seed = (Date.now() ^ (tier*987654321)) >>> 0;
  const rng = srand(seed);

  for(let attempt=0; attempt<8; attempt++){
    buildEmptyMap();

    const wallCount = 22 + Math.floor(tier*2.2) + Math.floor(rng()*10);
    placeRandomWalls(rng, wallCount);

    clearSpawnArea(player.x, player.y, 3);

    const reachable = floodFillReachableFromPlayer();
    const totalFloor = (mapSize-2)*(mapSize-2);
    if(reachable / totalFloor >= 0.55){
      return seed;
    }
  }
  buildEmptyMap();
  clearSpawnArea(player.x, player.y, 4);
  return seed;
}

function spawnMapPacks(tier){
  const rng = srand(mapRun.seed ^ 0xA53C9E1B);

  const packCount = mapRun.packsToClear + 4 + Math.floor(tier*0.6);
  for(let i=0;i<packCount;i++){
    let placed = false;

    for(let tries=0; tries<120; tries++){
      const tx = 1 + Math.floor(rng()*(mapSize-2));
      const ty = 1 + Math.floor(rng()*(mapSize-2));
      if(map[ty][tx] !== 0) continue;
      if(reachableMask && !reachableMask[ty][tx]) continue;

      const px = tx*tileSize + tileSize/2;
      const py = ty*tileSize + tileSize/2;

      const dx = px - player.x, dy = py - player.y;
      if(dx*dx + dy*dy < 260*260) continue;

      let min = 6;
      let max = 10;
      if(tier >= 6){
        min = 15 + Math.floor((tier-5) * 0.4);
        max = 20 + Math.floor((tier-5) * 0.6);
      }
      if(tier >= 12){
        min = 25 + Math.floor((tier-10) * 0.5);
        max = 32 + Math.floor((tier-10) * 0.7);
      }
      max = Math.min(max, 45);

      const count = min + Math.floor(rng() * (max - min + 1));
      const packType = pickPurePackType(rng);
      createPack(px, py, count, packType);

      placed = true;
      break;
    }
    if(!placed){
      // skip
    }
  }

  for(const p of packs){
    p.cleared = false;
  }
  linkNearbyPacks();
}

function linkNearbyPacks(){
  const linkDist = 360;
  const link2 = linkDist * linkDist;

  const n = packs.length;
  const parent = Array.from({length:n}, (_,i)=>i);
  const find = (a)=>{ while(parent[a]!==a){ parent[a]=parent[parent[a]]; a=parent[a]; } return a; };
  const union = (a,b)=>{ a=find(a); b=find(b); if(a!==b) parent[b]=a; };

  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      const dx = packs[i].x - packs[j].x;
      const dy = packs[i].y - packs[j].y;
      if(dx*dx + dy*dy <= link2) union(i,j);
    }
  }

  const rootToG = new Map();
  let gid = 0;

  for(let i=0;i<n;i++){
    const r = find(i);
    if(!rootToG.has(r)) rootToG.set(r, gid++);
    packs[i].groupId = rootToG.get(r);
    packs[i].groupCleared = false;
  }
}

function activatePackGroup(groupId){

}

function spawnPortal(x, y){

function updatePortal(){
  if(!portal.active) return;

  const dx = player.x - portal.x;
  const dy = player.y - portal.y;
  const rr = (portal.r + player.radius + 8);
  if(dx*dx + dy*dy < rr*rr){
    portal.hold++;
    if(portal.hold >= portal.holdNeed){
      startNewMap(mapTier + 1);
      return;
    }
  }else{
    portal.hold = 0;
  }
}

function drawPortal(){
  if(!portal.active) return;

  const pulse = 0.6 + 0.4*Math.sin(frameCount*0.15);
  const r = portal.r + pulse*6;

  ctx.save();
  ctx.globalAlpha = 0.9;

  ctx.strokeStyle = "rgba(120,180,255,0.85)";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(portal.x, portal.y, r, 0, Math.PI*2);
  ctx.stroke();

  ctx.fillStyle = "rgba(80,140,255,0.18)";
  ctx.beginPath();
  ctx.arc(portal.x, portal.y, r-6, 0, Math.PI*2);
  ctx.fill();

  if(portal.hold > 0){
    const t = clamp(portal.hold / portal.holdNeed, 0, 1);
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(portal.x, portal.y, r+8, -Math.PI/2, -Math.PI/2 + Math.PI*2*t);
    ctx.stroke();
  }

  ctx.restore();
}

function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

function canMoveTo(x,y){
  let left = Math.floor((x - player.radius) / tileSize);
  let right = Math.floor((x + player.radius) / tileSize);
  let top = Math.floor((y - player.radius) / tileSize);
  let bottom = Math.floor((y + player.radius) / tileSize);

  return (
    map[top] && map[top][left] === 0 &&
    map[top] && map[top][right] === 0 &&
    map[bottom] && map[bottom][left] === 0 &&
    map[bottom] && map[bottom][right] === 0
  );
}
function getEnemyCollisionRadius(enemy){
  const base = Math.max(6, Number(enemy && ((enemy.bodyRadius ?? enemy.radius))) || 14);
  const type = String(enemy && enemy.type || "");
  let extra = 3;
  if(type === "orc") extra = 8;
  else if(type === "wolf") extra = 6;
  else if(type === "bat") extra = 4;
  else if(type === "boar") extra = 8;
  else if(type === "spider") extra = 6;
  else if(type === "scorpion") extra = 7;
  else if(type === "mawPlant") extra = 8;
  else if(type === "sporePlant") extra = 7;
  else if(type === "vineMaw") extra = 10;
  else if(type === "demon") extra = 9;
  else if(type === "boss") extra = 12;
  else if(type === "mage" || type === "archer" || type === "porcupine" || type === "lich") extra = 5;
  else if(type === "skeleton") extra = 4;
  else if(type === "skeletonWarrior") extra = 6;
  else if(type === "zombie" || type === "melee") extra = 5;
  return base + extra;
}
function canEnemyMoveTo(enemy, x, y){
  const cr = getEnemyCollisionRadius(enemy);
  let left = Math.floor((x - cr) / tileSize);
  let right = Math.floor((x + cr) / tileSize);
  let top = Math.floor((y - cr) / tileSize);
  let bottom = Math.floor((y + cr) / tileSize);

  return (
    map[top] && map[top][left] === 0 &&
    map[top] && map[top][right] === 0 &&
    map[bottom] && map[bottom][left] === 0 &&
    map[bottom] && map[bottom][right] === 0
  );
}
function isFloorTile(tx, ty){ return !!(map[ty] && map[ty][tx] === 0); }
function canSpawnEnemyAt(enemy, x, y){ return canEnemyMoveTo(enemy, x, y); }
function isSolidEnemyForBodyBlock(e){
  if(!e) return false;
  if(e.type === "boss" && e.dead) return false;
  if(e.hp <= 0) return false;
  if(e.pack && !e.pack.activated) return false;
  return true;
}

function canPlayerMoveToBody(x, y){
  if(!canMoveTo(x, y)) return false;

  const pad = 2;
  for(const e of enemies){
    if(!isSolidEnemyForBodyBlock(e)) continue;

    const er = Math.max(10, (typeof e.radius === "number" ? e.radius : 14));
    const dx = (e.x || 0) - x;
    const dy = (e.y || 0) - y;
    const minDist = (player.radius || 14) + er + pad;

    if(dx*dx + dy*dy < minDist * minDist){
      return false;
    }
  }
  return true;
}

function canEnemyMoveToBody(enemy, x, y){
  if(!canEnemyMoveTo(enemy, x, y)) return false;

  const pad = 2;
  const er = Math.max(10, (enemy && typeof (enemy.bodyRadius ?? enemy.radius) === "number" ? (enemy.bodyRadius ?? enemy.radius) : 14));
  const dx = x - (player.x || 0);
  const dy = y - (player.y || 0);
  const minDist = er + (player.radius || 14) + pad;

  if(dx*dx + dy*dy < minDist * minDist){
    return false;
  }
  return true;
}

function moveEnemyWithCollision(enemy, dx, dy, steps = 6){
  if(!enemy) return;
  steps = Math.max(1, steps | 0);

  const sx = dx / steps;
  const sy = dy / steps;

  for(let i = 0; i < steps; i++){
    const nx = enemy.x + sx;
    const ny = enemy.y + sy;

    if(canEnemyMoveToBody(enemy, nx, enemy.y)) enemy.x = nx;
    if(canEnemyMoveToBody(enemy, enemy.x, ny)) enemy.y = ny;
  }
}

function resolvePlayerEnemyOverlap(){
  const pad = 2;
  for(const e of enemies){
    if(e.type === "boss" && e.dead) continue;
    if(e.hp <= 0) continue;
    if(e.pack && !e.pack.activated) continue;

    let dx = e.x - player.x;
    let dy = e.y - player.y;
    let dist = Math.hypot(dx, dy);

    const minDist = player.radius + e.radius + pad;

    if(dist === 0){
      dx = (Math.random() - 0.5) * 0.01;
      dy = (Math.random() - 0.5) * 0.01;
      dist = Math.hypot(dx, dy);
    }

    if(dist < minDist){
      const nx = dx / dist;
      const ny = dy / dist;
      const push = (minDist - dist);

      const ex = e.x + nx * push;
      const ey = e.y + ny * push;

      if(canEnemyMoveTo(e, ex, ey)){
        e.x = ex; e.y = ey;
      }else{
        const px = player.x - nx * push;
        const py = player.y - ny * push;
        if(canMoveTo(px, player.y)) player.x = px;
        if(canMoveTo(player.x, py)) player.y = py;
      }
    }
  }
}

function markEnergyShieldHit(){
  if(player && Number(player.maxEs || 0) > 0){
    player.lastHitFrame = (typeof frameCount === "number") ? frameCount : 0;
    player.esCooldown = Math.max(1, Number(player.esRechargeDelay || 120));
  }
}

function damagePlayer(dmg, knockX, knockY, src){
  if(player.invul > 0 || gameOver) return;

  let incoming = dmg;
  if(USE_TAG_CONTEXTS){
    const srcTags = src ? (src.tags ? src.tags : tagsFromEnemy(src)) : [];
    const ctxIn = { scope:'player', tags: mergeTags(['incoming'], getPlayerTags(), getMapTags(), srcTags) };
    incoming = applyPlayerTakenDamageMods(incoming, ctxIn);
  }

  let finalDmg = Math.max(1, Math.floor(Number(incoming || 0)));
  let breakdown = null;
  if(typeof __applyResistToIncoming === "function"){
    const calc = __applyResistToIncoming(incoming, src);
    if(calc && Number.isFinite(calc.total)){
      finalDmg = Math.max(1, Math.floor(calc.total));
      breakdown = calc.parts || null;
    }
  }else{
    const armor = (player.armor ?? 0);
    const reduced = incoming * (50 / (50 + Math.max(0, armor)));
    finalDmg = Math.max(1, Math.floor(reduced));
  }

  markEnergyShieldHit();

  if(Number(player.es || 0) > 0){
    const absorbed = Math.min(Number(player.es || 0), finalDmg);
    player.es -= absorbed;
    finalDmg -= absorbed;
  }

  if(finalDmg > 0){
    player.hp -= finalDmg;
    emitEvent("takeDamage", breakdown ? { dmg: finalDmg, breakdown } : { dmg: finalDmg });
  }
  player.invul = 25;
  shake = Math.max(shake, 10);

  let nx = player.x + knockX;
  let ny = player.y + knockY;
  if(canPlayerMoveToBody(nx, player.y)) player.x = nx;
  if(canPlayerMoveToBody(player.x, ny)) player.y = ny;
  if(player.hp <= 0) handleGameOver();
}

function enemyTryMeleeAttack(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);
  const reach =
    e.type === "boss" ? 70 :
    e.type === "wolf" ? 44 :
    e.type === "bat" ? 38 :
    e.type === "boar" ? 48 :
    e.type === "spider" ? 40 :
    e.type === "scorpion" ? 50 :
    e.type === "skeletonWarrior" ? 44 :
    42;

  if(dist > reach){
    e.attackFrame = 0;
    return;
  }

  if(e.attackFrame === 0){
    e.swingDir = dx < 0 ? -1 : 1;
  }

  const atkMul = (e.buffs?.atkSpdMul ?? 1);
  e.attackFrame += atkMul;

  if(e.attackFrame >= 12 && !e.hitDone){
    e.hitDone = true;
    const len = dist || 1;
    const nx = dx / len;
    const ny = dy / len;
    const kb = e.type === "boss" ? 30 : (e.type === "scorpion" ? 22 : (e.type === "boar" ? 26 : (e.type === "wolf" ? 16 : (e.type === "bat" ? 10 : (e.type === "spider" ? 12 : (e.type === "skeletonWarrior" ? 20 : 18))))));
    damagePlayer(e.damage, nx*kb, ny*kb, e);
    hitSound();
  }

  if(e.attackFrame >= 25){
    e.attackFrame = 0;
    e.hitDone = false;
  }
}

function spawnArrowTrail(x, y, dx, dy){
  const len = Math.hypot(dx, dy) || 1;
  particles.push({
    x: x - dx * 0.7,
    y: y - dy * 0.7,
    vx: (-dx / len) * 0.22 + (Math.random()-0.5) * 0.10,

function pickPurePackType(rng){
  const roll = (typeof rng === "function" ? rng() : Math.random());

  return (
    roll < 0.08 ? "mage" :
    roll < 0.13 ? "archer" :
    roll < 0.18 ? "porcupine" :
    roll < 0.23 ? "mawPlant" :
    roll < 0.29 ? "zombie" :
    roll < 0.35 ? "skeleton" :
    roll < 0.41 ? "skeletonWarrior" :
    roll < 0.47 ? "lich" :
    roll < 0.52 ? "sporePlant" :
    roll < 0.57 ? "orc" :
    roll < 0.63 ? "wolf" :
    roll < 0.69 ? "bat" :
    roll < 0.75 ? "boar" :
    roll < 0.81 ? "spider" :
    roll < 0.88 ? "scorpion" :
    roll < 0.94 ? "melee" :
    roll < 0.97 ? "vineMaw" :
    "demon"
  );
}

function spawnEnemyAt(ex, ey, pack){
  let tileX = Math.floor(ex / tileSize);
  let tileY = Math.floor(ey / tileSize);

  if(!isFloorTile(tileX, tileY)) return;
  if(!isFloorTile(tileX-1, tileY) || !isFloorTile(tileX+1, tileY) || !isFloorTile(tileX, tileY-1) || !isFloorTile(tileX, tileY+1)) return;
  if(enemies.length >= 320) return;

  let rand = Math.random();
  let type = (pack && pack.packType) ? pack.packType : pickPurePackType();

  const st = makeEnemyStatsByTier(type, mapTier);

  let enemy = {
    x: ex, y: ey,
    radius: (type === "demon") ? 18 : (type === "orc" ? 16 : (type === "wolf" ? 15 : (type === "bat" ? 12 : (type === "boar" ? 16 : (type === "spider" ? 14 : (type === "scorpion" ? 15 : (type === "skeletonWarrior" ? 15 : (type === "lich" ? 15 : (type === "porcupine" ? 14 : (type === "mawPlant" ? 16 : (type === "sporePlant" ? 15 : (type === "vineMaw" ? 19 : 14)))))))))))),
    stun: 0,
    invul: 0,
    attackFrame: 0,
    swingDir: 1,
    type,
    hp: st.hp,
    speed: st.spd,
    damage: st.dmg,
    shootCooldown: 0,
    castCooldown: 120,
    pack
  };

  if(!canSpawnEnemyAt(enemy, ex, ey)) return;

  if(type !== "demon" && Math.random() < st.eliteChance * 0.85){
    enemy.isElite = true;
    enemy.eliteColor = Math.random() < 0.5 ? "yellow" : "blue";
    enemy.speed *= 1.5;
    enemy.damage *= st.eliteDmgMul;
    enemy.radius *= 1.2;
    enemy.hp *= st.eliteHpMul;
  }

    // ✅ STEP5: 적 태그 부여(엘리트 여부 포함)
  enemy.tags = mergeTags(tagsFromEnemy(enemy));

enemies.push(enemy);
  pack.enemies.push(enemy);
}

function createPack(cx, cy, count, forcedType){
  let pack = {
    x: cx, y: cy,
    enemies: [],
    activated: false,
    cleared: false,
    groupId: -1,
    groupCleared: false,
    packType: forcedType || pickPurePackType()
  };

  spawnPackLeaderAt(cx, cy, pack);

  const normalCount = Math.max(0, count - 1);
  let tries = 0;

  while(pack.enemies.length < (normalCount + 1) && tries < count * 8){
    tries++;
    let angle = Math.random()*Math.PI*2;
    let radius = Math.random()*140;
    let ex = cx + Math.cos(angle)*radius;
    let ey = cy + Math.sin(angle)*radius;
    spawnEnemyAt(ex, ey, pack);
  }

  packs.push(pack);
}

function bossDash(boss){
  const dx = player.x - boss.x;
  const dy = player.y - boss.y;
  const dist = Math.hypot(dx, dy) || 1;
  const nx = dx / dist;
  const ny = dy / dist;

  const dashDist = 220;
  const steps = 18;
  let hit = false;

  for(let i=0;i<steps;i++){
    let px = boss.x + nx * (dashDist/steps);
    let py = boss.y + ny * (dashDist/steps);

    if(canEnemyMoveTo(boss, px, py)){
      boss.x = px; boss.y = py;
    }else break;

    if(!hit){
      const d = Math.hypot(player.x - boss.x, player.y - boss.y);
      if(d < boss.radius + player.radius + 10){
        damagePlayer(boss.damage*1.2, nx*34, ny*34, boss);
        hit = true;
      }
    }
  }
  shake = Math.max(shake, 16);
}

function bossCleave(boss){
  const radius = 140;

  for(let i=0;i<70;i++){
    const a = Math.random()*Math.PI*2;
    const r = Math.random()*radius;
    particles.push({
      x: boss.x + Math.cos(a)*r,
      y: boss.y + Math.sin(a)*r,
      vx: Math.cos(a)*2 + (Math.random()-0.5)*2,
      vy: Math.sin(a)*2 + (Math.random()-0.5)*2,
      life: 35
    });
  }

  const dist = Math.hypot(player.x - boss.x, player.y - boss.y);
  if(dist < radius){
    const dx = player.x - boss.x;
    const dy = player.y - boss.y;
    const len = Math.hypot(dx, dy) || 1;
    damagePlayer(boss.damage*1.6, (dx/len)*42, (dy/len)*42, boss);
  }
  shake = Math.max(shake, 22);
}

function isEnemyOnScreen(e){
  const camX = player.x - canvas.width/2;
  const camY = player.y - canvas.height/2;

  const screenLeft   = camX - 50;
  const screenRight  = camX + canvas.width + 50;
  const screenTop    = camY - 50;
  const screenBottom = camY + canvas.height + 50;

  return (
    e.x > screenLeft &&
    e.x < screenRight &&
    e.y > screenTop &&
    e.y < screenBottom
  );
}

/* ===== GAME LOOP: UPDATE ===== */

function update(){
  frameCount++;

  if(player && player.energyShieldMode && player.gear){
    player.gear.hpRegen = 0;
    player.gear.hpOnHit = 0;
    player.gear.hpOnKill = 0;
    player.gear.lifeLeech = 0;
  }

  if(lootOverlayOpen) return;
  if(gameOver) return;

  if(slowMotion > 0){
    slowMotion--;
    updateEnemySystem();
    //resolvePlayerEnemyOverlap();
    updateEffectSystem();
    __enemyFxTickAll();
    return;
  }

  updateBuffs(player);
  updatePlayerState();
  syncPlayerVitalDisplay();
  updateUltimateSystem();
  updateEnemySystem();
  //resolvePlayerEnemyOverlap();
  updateCombatSystem();
  updateProjectileSystem();
  updateEffectSystem();
  updateEnvironmentSystem();
  __enemyFxTickAll();

  updatePortal();
}

function updatePlayerState(){
  if(player.hp <= 0){ handleGameOver(); return; }
  updateMovement();
  updateInvulnerability();
  updateLevelGlow();

  if(player.energyShieldMode){
    if(player.gear){
      player.gear.hpRegen = 0;
      player.gear.hpOnHit = 0;
      player.gear.hpOnKill = 0;
      player.gear.lifeLeech = 0;
    }
    player.hpRegen = 0;
    player.hpOnHit = 0;
    player.hpOnKill = 0;
    player.lifeLeech = 0;
  }

  const regen = Number((player && player.gear && player.gear.hpRegen) || 0) / 60;
  if(regen > 0 && player.maxHp > 0) player.hp = Math.min(player.maxHp, player.hp + regen);

  if(Number(player.maxEs || 0) > 0){
    const nowFrame = (typeof frameCount === 'number') ? frameCount : 0;
    const delay = Math.max(1, Number(player.esRechargeDelay || 120));
    const framesSinceHit = nowFrame - Number(player.lastHitFrame || 0);
    player.esCooldown = Math.max(0, delay - framesSinceHit);
    if(player.esCooldown <= 0){
      const esRegen = Math.max(0, Number(player.maxEs || 0) * Number(player.esRechargeRate || 0.20) / 60);
      if(esRegen > 0) player.es = Math.min(player.maxEs, Number(player.es || 0) + esRegen);
    }
  }
}
function handleGameOver(){
  document.body.classList.add('gameover');

  gameOver = true;

  // Hide big bottom HUD (joystick/attack/etc)
  const ui = document.getElementById("ui");
  if(ui) ui.style.display = "none";

  // Hide HUD buttons (bag / loot 포함) so they don't float on GAME OVER screen
  ["miniBagBtn","lootBtn","hudBtns","btnBag","btnEquip"].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.style.display = "none";
  });
}
function updateLevelGlow(){
  if(player.levelGlow > 0) player.levelGlow--;
}

function updateUltimateSystem(){
  if(!player.ultiActive) return;

  player.ultiTimer++;
  if(player.ultiTimer % 10 === 0) performUltimateStrike();
  if(player.ultiCount >= 5) endUltimate();
}
function endUltimate(){
  player.ultiActive = false;
  player.ultiTimer = 0;
  player.ultiCount = 0;
  explosionActive = false;
}
function performUltimateStrike(){
  const target = getRandomVisibleAliveEnemy();
  if(!target) { endUltimate(); return; }

  teleportTo(target);
  dealUltimateDamage();

  pruneDeadEnemies();
  player.ultiCount++;
}

function dealUltimateDamage(){
  const radius = getUltiAoeRadius();
  const r2 = radius * radius;
  let killedAny = false;

  for(let i=0; i<enemies.length; i++){
    const e = enemies[i];
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    if(dx*dx + dy*dy > r2) continue;

    if(e.type === "boss" && e.dead) continue;

    const wasAlive = (e.hp > 0);
    if(!wasAlive) continue;

    const weaponBase = rollWeaponDamage();
const base =
  weaponBase * 2.8 *
  (player.buffs?.dmgMul ?? 1);

// ✅ POE식 버켓: outgoing(add/inc/more) → crit → enemy_taken
const ctxUlti = buildCombatCtx("ultimate", e);
const ultiRes = computeFinalDamage(base, ctxUlti, { canCrit:true });
e.__killFxKind = window.__lastDamageFxKind || e.__killFxKind || "physical";
const dealt = ultiRes.dealt;
const crit = ultiRes.crit;

    if(e.type === "boss"){
      if(e.invul <= 0){
        e.hp -= dealt;
        e.stun = 25;
        __enemyHitFlashStart(e, 1.2);
        spawnHitBlood(e.x, e.y, crit.isCrit ? 26 : 14);
        shake = Math.max(shake, 20);
        
      }
      continue;
    }

    e.hp -= dealt;
    e.stun = 30;
    __enemyHitFlashStart(e, 1.25);

    spawnHitBlood(e.x, e.y, crit.isCrit ? 22 : 12);

    if(particles.length < 240){
      for(let k=0;k<10;k++){
        particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*9, vy: (Math.random()-0.5)*9, life: 34 });
      }
    }

    if(e.hp <= 0){
      e.__killFxKind = window.__lastDamageFxKind || e.__killFxKind || "physical";

      player.hp = Math.min(player.maxHp, player.hp + 1);
      slowMotion = 6;
      if(player.kiOrbs < player.maxOrbs) player.kiOrbs++;
      killedAny = true;
    }
  }

  if(killedAny) hitSound();
  shake = Math.max(shake, 30);
  pruneDeadEnemies();
}

function updateEnemySystem(){
  packs.forEach(pack=>{
    if(pack.activated) return;
    const dx = pack.x - player.x;
    const dy = pack.y - player.y;
    if(dx*dx + dy*dy < 520*520){
      activatePackGroup(pack.groupId);
      shake = Math.max(shake, 8);
      slowMotion = Math.max(slowMotion, 1);
    }
  });

  enemies.forEach(e=>{
    if(e.pack && !e.pack.activated) return;
    updateSingleEnemy(e);
  });
  for(const e of enemies){
    updateBuffs(e);
  }
  pruneDeadEnemies();
}

function updateLevelParticles(){
  for(let i = levelParticles.length - 1; i >= 0; i--){
    const p = levelParticles[i];
    p.ox += p.vx;
    p.oy -= p.vy;
    p.vy *= 0.97;
    p.life--;
    if(p.life <= 0) levelParticles.splice(i,1);
  }
  if(levelParticles.length > 200){
    levelParticles.splice(0, levelParticles.length - 200);
  }
}

function updateParticles(){
  for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if(p.life <= 0) particles.splice(i,1);
  }
  if(particles.length > 260){
    particles.splice(0, particles.length - 260);
  }
}


function enemyBlinkStrikeFx(x, y, count = 10){
  if(!Array.isArray(particles)) return;
  for(let i=0;i<count;i++){
    particles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + (Math.random() - 0.5) * 10,
      vx: (Math.random() - 0.5) * 1.6,
      vy: (Math.random() - 0.5) * 1.6 - Math.random() * 0.35,
      life: 10 + Math.floor(Math.random() * 8),
      alpha: 0.72,
      size: 2 + Math.random() * 2,
      kind: 'arrowSpark'
    });
  }
}

function canEnemyOccupy(enemy, x, y){
  if(typeof canEnemyMoveToBody === 'function') return canEnemyMoveToBody(enemy, x, y);
  if(typeof canEnemyMoveTo === 'function') return canEnemyMoveTo(enemy, x, y);
  return true;
}

function findEnemyBlinkStrikeSpot(enemy, targetX, targetY){
  const baseAng = Math.atan2(targetY - enemy.y, targetX - enemy.x);
  const angleOffsets = [0, 0.45, -0.45, 0.9, -0.9, 1.35, -1.35, Math.PI];
  const radii = [30, 36, 42, 48, 56];

  for(const r of radii){
    for(const off of angleOffsets){
      const ang = baseAng + off;
      const tx = targetX - Math.cos(ang) * r;
      const ty = targetY - Math.sin(ang) * r;
      if(canEnemyOccupy(enemy, tx, ty)){
        return { x: tx, y: ty };
      }
    }
  }

  return null;
}

function updateMelee(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);

  if(e.type === "orc"){
    if(dist > 0){
      const nx = dx / dist;
      const ny = dy / dist;
      const rushMul = dist > 170 ? 1.42 : (dist > 90 ? 1.22 : 0.96);
      moveEnemyWithCollision(e, nx * e.speed * rushMul, ny * e.speed * rushMul, 8);
    }
    enemyTryMeleeAttack(e);
    return;
  }

  if(e.type === "demon"){
    e.blinkStrikeCooldown = Math.max(0, (e.blinkStrikeCooldown || 0) - 1);

    if(e.blinkStrikeCooldown <= 0 && dist > 56 && dist < 320){
      const spot = findEnemyBlinkStrikeSpot(e, player.x, player.y);
      if(spot){
        enemyBlinkStrikeFx(e.x, e.y, 10);
        e.x = spot.x;
        e.y = spot.y;
        enemyBlinkStrikeFx(e.x, e.y, 12);
        e.attackFrame = Math.max(e.attackFrame || 0, 11);
        e.hitDone = false;
        e.phaseLock = Math.max(e.phaseLock || 0, 4);
        e.blinkStrikeCooldown = 90 + Math.floor(Math.random() * 25);
        enemyTryMeleeAttack(e);
        return;
      }
      e.blinkStrikeCooldown = 18;
    }

    if(dist > 0){
      const nx = dx / dist;
      const ny = dy / dist;
      const chaseMul = dist > 140 ? 1.18 : (dist > 70 ? 1.02 : 0.84);
      moveEnemyWithCollision(e, nx * e.speed * chaseMul, ny * e.speed * chaseMul, 8);
    }
    enemyTryMeleeAttack(e);
    return;
  }

  if(e.type === "wolf"){
    if(dist > 0){
      const nx = dx / dist, ny = dy / dist;
      moveEnemyWithCollision(e, nx * e.speed * 1.20, ny * e.speed * 1.20, 6);
    }
    enemyTryMeleeAttack(e);
    return;
  }

  if(e.type === "bat"){
    e.diveCooldown = Math.max(0, (e.diveCooldown || 0) - 1);

    if((e.diveTime || 0) > 0){
      e.diveTime -= 1;
      moveEnemyWithCollision(e, (e.diveDX || 0) * e.speed * 2.35, (e.diveDY || 0) * e.speed * 2.35, 6);
    }else{
      if(dist > 0){
        const nx = dx / dist, ny = dy / dist;
        const side = Math.sin((window.frameCount || 0) * 0.22 + (e.x || 0) * 0.03) * 0.55;
        const desired = dist < 74 ? -0.24 : 0.78;
        moveEnemyWithCollision(e, (nx * desired + -ny*side) * e.speed, (ny * desired + nx*side) * e.speed, 6);
      }
      if(e.diveCooldown <= 0 && dist > 80 && dist < 230){
        e.diveCooldown = 90 + Math.floor(Math.random() * 24);
        e.diveTime = 12;
        const l = dist || 1;
        e.diveDX = dx / l;
        e.diveDY = dy / l;
      }
    }

    enemyTryMeleeAttack(e);
    return;
  }

  if(e.type === "boar"){
    e.chargeCooldown = Math.max(0, (e.chargeCooldown || 0) - 1);

    if((e.chargeWindup || 0) > 0){
      e.chargeWindup -= 1;
      if(e.chargeWindup <= 0){
        const l = dist || 1;
        e.chargeDX = dx / l;
        e.chargeDY = dy / l;
        e.chargeTime = 14;
      }
    }else if((e.chargeTime || 0) > 0){
      e.chargeTime -= 1;
      moveEnemyWithCollision(e, (e.chargeDX || 0) * e.speed * 2.45, (e.chargeDY || 0) * e.speed * 2.45, 7);
    }else{
      if(dist > 0){
        const nx = dx / dist, ny = dy / dist;
        moveEnemyWithCollision(e, nx * e.speed * 0.92, ny * e.speed * 0.92, 6);
      }
      if(e.chargeCooldown <= 0 && dist > 72 && dist < 260){
        e.chargeWindup = 14;
        e.chargeCooldown = 125 + Math.floor(Math.random() * 30);
      }
    }

    enemyTryMeleeAttack(e);
    return;
  }

  if(e.type === "scorpion"){
    if(dist > 0){
      const nx = dx / dist, ny = dy / dist;
      const side = Math.sin((window.frameCount || 0) * 0.08 + (e.x || 0) * 0.01) * 0.38;
      moveEnemyWithCollision(e, (nx + -ny*side) * e.speed, (ny + nx*side) * e.speed, 6);
    }
    e.shootCooldown = Math.max(0, (e.shootCooldown || 0) - 1);
    if(e.shootCooldown <= 0 && dist < 250 && dist > 68){
      spawnPoisonSpit(e.x, e.y - 8, player.x, player.y, e.damage * 0.92);
      e.shootCooldown = 95 + Math.floor(Math.random() * 30);
    }
    enemyTryMeleeAttack(e);
    return;
  }

  if(e.type === "spider"){
    if(dist > 0){
      const nx = dx / dist, ny = dy / dist;
      const side = Math.sin((window.frameCount || 0) * 0.10 + (e.y || 0) * 0.01) * 0.30;
      moveEnemyWithCollision(e, (nx + -ny*side) * e.speed, (ny + nx*side) * e.speed, 6);
    }
    e.shootCooldown = Math.max(0, (e.shootCooldown || 0) - 1);
    if(e.shootCooldown <= 0 && dist < 260 && dist > 76){
      spawnWebShot(e.x, e.y - 6, player.x, player.y, e.damage * 0.78);
      e.shootCooldown = 110 + Math.floor(Math.random() * 30);
    }
    enemyTryMeleeAttack(e);
    return;
  }

  if(dist > 0){
    let moveX = dx / dist * e.speed;
    let moveY = dy / dist * e.speed;
    moveEnemyWithCollision(e, moveX, moveY, 6);
  }

  enemyTryMeleeAttack(e);
}

function updateArcher(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);

  const desired = (e.type === "porcupine") ? 290 : 240;
  if(dist < desired - 40){
    const len = dist || 1;
    const nx = dx / len;
    const ny = dy / len;
    moveEnemyWithCollision(e, -nx * e.speed * 1.18, -ny * e.speed * 1.18, 6);
  }else if(dist > desired + 80){
    updateMelee(e);
  }

  e.shootCooldown--;
  if(e.shootCooldown <= 0 && dist < 560){
    if(e.type === "porcupine"){
      spawnSpikeShot(e.x, e.y - 4, player.x, player.y, e.damage);
      e.shootCooldown = 90 + Math.floor(Math.random()*40);
    }else{
      spawnArrow(e.x, e.y, player.x, player.y, e.damage);
      e.shootCooldown = 80 + Math.floor(Math.random()*40);
    }
  }
}

function updateMage(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);

  if(e.type === "lich"){
    const desired = 250;
    if(dist < desired - 44){
      const len = dist || 1;
      const nx = dx / len;
      const ny = dy / len;
      moveEnemyWithCollision(e, -nx * e.speed * 1.35, -ny * e.speed * 1.35, 6);
    }else if(dist > desired + 90){
      updateMelee(e);
    }

    e.shootCooldown = Math.max(0, (e.shootCooldown || 0) - 1);
    e.castCooldown = Math.max(0, (e.castCooldown || 0) - 1);

    if(e.shootCooldown <= 0 && dist < 430){
      spawnIceShard(e.x, e.y - 12, player.x, player.y, e.damage, 0);
      if(Math.random() < 0.40){
        spawnIceShard(e.x, e.y - 12, player.x, player.y, e.damage * 0.74, -0.12);
        spawnIceShard(e.x, e.y - 12, player.x, player.y, e.damage * 0.74, 0.12);
      }
      e.shootCooldown = 98 + Math.floor(Math.random() * 28);
      e.castCooldown = 16;
    }
    return;
  }

  const desired = 220;
  if(dist < desired - 40){
    const len = dist || 1;
    const nx = dx / len;
    const ny = dy / len;
    moveEnemyWithCollision(e, -nx * e.speed * 1.28, -ny * e.speed * 1.28, 6);
  }else if(dist > desired + 90){
    updateMelee(e);
  }

  e.shootCooldown = Math.max(0, (e.shootCooldown || 0) - 1);
  e.castCooldown = Math.max(0, (e.castCooldown || 0) - 1);

  if(e.shootCooldown <= 0 && dist < 380){
    spawnFireball(e.x, e.y - 10, player.x, player.y, Math.max(6, e.damage * 0.95));
    if(Math.random() < 0.28){
      spawnFireball(e.x, e.y - 10, player.x, player.y, Math.max(4, e.damage * 0.68));
    }
    e.shootCooldown = 92 + Math.floor(Math.random() * 24);
    e.castCooldown = 12;
  }
}


function updatePlantEnemy(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);
  const len = dist || 1;
  e.swingDir = dx < 0 ? -1 : 1;
  e.shootCooldown = Math.max(0, (e.shootCooldown || 0) - 1);
  e.castCooldown = Math.max(0, (e.castCooldown || 0) - 1);

  if(e.type === "mawPlant" || e.type === "vineMaw"){
    const biteRange = e.type === "vineMaw" ? 66 : 56;
    const biteWindup = e.type === "vineMaw" ? 10 : 12;
    const biteRecover = e.type === "vineMaw" ? 24 : 26;
    if(dist < biteRange){
      if(e.attackFrame === 0) e.hitDone = false;
      e.attackFrame += 1;
      if(e.attackFrame >= biteWindup && !e.hitDone){
        e.hitDone = true;
        const kb = e.type === "vineMaw" ? 22 : 18;
        damagePlayer(e.damage, (dx/len) * kb, (dy/len) * kb, e);
        hitSound();
      }
      if(e.attackFrame >= biteRecover){
        e.attackFrame = 0;
        e.hitDone = false;
      }
    }else{
      e.attackFrame = 0;
      e.hitDone = false;
    }
  }

  if(e.type === "sporePlant"){
    if(e.shootCooldown <= 0 && dist < 360 && dist > 64){
      spawnPoisonSpit(e.x, e.y - 18, player.x, player.y, e.damage * 0.95);
      e.shootCooldown = 92 + Math.floor(Math.random() * 36);
      e.castCooldown = 16;
    }
    return;
  }

  if(e.type === "vineMaw"){
    if(e.shootCooldown <= 0 && dist < 340 && dist > 84){
      spawnPoisonSpit(e.x, e.y - 22, player.x, player.y, e.damage * 0.90);
      e.shootCooldown = 105 + Math.floor(Math.random() * 36);
      e.castCooldown = 18;
    }
    return;
  }
}

function updateBoss(e){
  if(!e.phase2Used && e.hp <= e.maxHp * 0.5) bossEnterPhase2(e);
  updateMelee(e);

  if(e.swordPulled){
    e.dashCooldown--;
    e.cleaveCooldown--;

    const dist = Math.hypot(player.x - e.x, player.y - e.y);

    if(e.dashCooldown <= 0 && dist > 160 && dist < 520){
      bossDash(e);
      e.dashCooldown = 160 + Math.floor(Math.random()*70);
    }
    if(e.cleaveCooldown <= 0 && dist < 220){
      bossCleave(e);
      e.cleaveCooldown = 200 + Math.floor(Math.random()*80);
    }
  }
}

function updateSingleEnemy(e){
  if(e.isLeader){
    const radius = 50;
    const r2 = radius * radius;

    for(const other of enemies){
      if(other === e) continue;
      const dx = other.x - e.x;
      const dy = other.y - e.y;
      if(dx*dx + dy*dy <= r2){
        applyBuff(other, "damage",   1.25, 15, "leader");
        applyBuff(other, "atkSpeed", 1.2,  15, "leader");
      }
    }
  }

  if(e.dead){
    e.deathTimer = Math.max(0, (e.deathTimer || 0) - 1);

    if(e.type === "boss"){
      if(e.deathTimer % 10 === 0){
        shake = Math.max(shake, 10);
        spawnHitBlood(
          e.x + (Math.random()-0.5)*12,
          e.y + (Math.random()-0.5)*12,
          10
        );
      }

      if(e.deathTimer === 1 && !mapRun.bossDefeated){
        mapRun.bossDefeated = true;
        spawnPortal(e.x, e.y);
      }
    }

    return;
  }

  if(e.invul > 0) e.invul--;

  if(e.bleed && e.bleed.life > 0){
    e.bleed.life--;
    e.bleed.tick = (e.bleed.tick || 0) + 1;
    if(e.bleed.tick % 10 === 0){
      const bd = Math.max(1, Number(e.bleed.damage || 0));
      e.hp = Math.max(0, (e.hp || 0) - bd);
      e.hitFlash = Math.max(e.hitFlash || 0, 3);
      if(e.hp <= 0){
        if(typeof spawnTypeDeathFxRuntime === "function") spawnTypeDeathFxRuntime(e);
        return;
      }
    }
  }

  if(e.phaseLock > 0){
    e.phaseLock--;
    return;
  }

  if(e.stun > 0){
    e.stun--;
    return;
  }

  switch(e.type){
    case "archer":
    case "skeleton":
    case "porcupine":
      updateArcher(e);
      break;

    case "mage":
    case "lich":
      updateMage(e);
      break;

    case "mawPlant":
    case "sporePlant":
    case "vineMaw":
      updatePlantEnemy(e);
      break;

    case "boss":
      updateBoss(e);
      break;

    case "zombie":
    case "melee":
    default:
      updateMelee(e);
      break;
  }
}

function spawnFireEmber(x,y){
  fireEmbers.push({
    x, y,
    vx:(Math.random()-0.5)*0.8,
    vy:(Math.random()-0.5)*0.8 - 0.9,
    life: 24 + Math.floor(Math.random()*18),
    a: 0.9
  });
  if(fireEmbers.length > 240) fireEmbers.splice(0, fireEmbers.length-240);
}
function updateFireEmbers(){
  for(let i=fireEmbers.length-1;i>=0;i--){
    const p = fireEmbers[i];
    p.life--;
    p.x += p.vx;
    p.y += p.vy;
    p.vy -= 0.02; // drift upward a bit more
    p.a *= 0.96;
    if(p.life <= 0 || p.a < 0.05) fireEmbers.splice(i,1);
  }
}

function drawIsoRingGlow(sx, sy, r, innerA, outerA){
  // draw in iso-scaled space so the gradient looks correct
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, 0.62);
  const g = ctx.createRadialGradient(0,0, r*0.20, 0,0, r*1.02);
  g.addColorStop(0.00, `rgba(0,0,0,0)`);
  g.addColorStop(0.55, `rgba(255,120,20,${innerA})`);
  g.addColorStop(0.85, `rgba(255,60,0,${outerA})`);
  g.addColorStop(1.00, `rgba(0,0,0,0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0,0,r*1.05,0,Math.PI*2);
  ctx.fill();

  // crisp rim
  ctx.strokeStyle = `rgba(255,180,80,${Math.min(0.55, innerA+0.12)})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,r*0.98,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawFireZoneIso(sx, sy, z){
  const r = (z && Number.isFinite(Number(z.radius)) && Number(z.radius) > 0)
    ? Number(z.radius)
    : ((ISO && ISO.tileW) ? (ISO.tileW * 0.50) : 32);
  const t = (frameCount||0);

  // scorch (darkened center)
  const scorch = 0.55;
  drawIsoDiscTile(sx, sy, r*0.92, `rgba(20,10,5,${0.20*scorch})`, null);
  drawIsoDiscTile(sx, sy, r*0.62, `rgba(0,0,0,${0.10*scorch})`, null);

  // animated glow ring
  const flick = 0.08*Math.sin((t + (z.x*0.01+z.y*0.01))*0.25) + 0.08*Math.random();
  drawIsoRingGlowTile(sx, sy, r, 0.22+flick, 0.18+flick);

  // little flame tongues around rim (cheap but looks like fire)
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, __isoTileScaleY());
  const tongues = 10;
  for(let k=0;k<tongues;k++){
    const ang = (k/tongues)*Math.PI*2 + (t*0.02) + ((z.x+z.y)*0.001);
    const rr = r*0.82 + (Math.sin(t*0.07 + k*1.7)*r*0.04);
    const x = Math.cos(ang)*rr;
    const y = Math.sin(ang)*rr;
    const h = 6 + 6*Math.abs(Math.sin(t*0.11 + k*2.1));
    const w = 3 + 2*Math.abs(Math.cos(t*0.09 + k));
    ctx.fillStyle = `rgba(255,140,40,${0.22+Math.random()*0.08})`;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.quadraticCurveTo(x + w, y - h, x, y - h*1.6);
    ctx.quadraticCurveTo(x - w, y - h, x, y);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawEmberIso(sx, sy, p){
  const a = Math.max(0, Math.min(1, p.a ?? 0.7));
  // tiny bright core + soft glow
  drawIsoDisc(sx, sy, 2.8, `rgba(255,220,120,${0.55*a})`, null);

function __enemyStrokeByElite(e, normal){
  if(e?.isElite && e?.eliteColor === "yellow") return "rgba(255,220,90,0.95)";
  if(e?.isElite && e?.eliteColor === "blue")   return "rgba(110,180,255,0.95)";
  if(e?.isElite && e?.eliteColor === "red")    return "rgba(255,110,110,0.98)";
  return normal;
}

function __roundRectPath(x, y, w, h, r){
  const rr = Math.max(0, Math.min(r, Math.min(w, h) * 0.5));
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
}

function drawIsoEnemySprite(sx, sy, e){
  if(!e) return;
  const __prevAlpha = ctx.globalAlpha;
  if(e.hitFlash > 0) ctx.globalAlpha = Math.min(1, __prevAlpha * (1 + 0.18 * Math.min(1, e.hitFlash / 8)));

  if(e.dead && e.type !== "boss"){
    const t = Math.max(0, Math.min(1, (e.deathTimer || 0) / Math.max(1, e.deathMax || 1)));
    ctx.save();
    ctx.globalAlpha = __prevAlpha * (0.12 + 0.88 * t);
    ctx.translate(sx, sy + (1 - t) * 10);
    ctx.rotate((e.deathTilt || 0.22) * (1 - t));
    ctx.scale(1, 0.78 + t * 0.22);

    if(e.type === "zombie")           drawIsoZombieSprite(0, 0, e);
    else if(e.type === "skeleton")    drawIsoSkeletonSprite(0, 0, e);
    else if(e.type === "skeletonWarrior") drawIsoSkeletonWarriorSprite(0, 0, e);
    else if(e.type === "archer")      drawIsoArcherSprite(0, 0, e);
    else if(e.type === "porcupine")   drawIsoPorcupineSprite(0, 0, e);
    else if(e.type === "mage")        drawIsoMageSprite(0, 0, e);

    else                              drawIsoMeleeSprite(0, 0, e);

    ctx.restore();
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "boss"){

  if(e.type === "zombie"){

function __enemyBreathe(e, speed=0.12, amount=1.5){
  return Math.sin((performance.now?.() || Date.now()) * 0.001 * speed + ((e?.x||0)+(e?.y||0))*0.01) * amount;
}

function __enemyHitNudge(e){
  const s = Math.max(0, Math.min(1, (e?.stun || 0) / 10));
  return { x: -s * 2.0, y: -s * 1.0 };
}

function __enemyFacingSign(e){
  if(!e) return 1;
  const dx = (player?.x || 0) - (e.x || 0);
  return dx >= 0 ? 1 : -1;
}

function __enemyHitFlashStart(e, power=1){
  if(!e) return;
  e.hitFlash = Math.max(e.hitFlash||0, Math.round(8 * Math.max(0.4, Math.min(1.4, power))));
}

function __enemyFxTickAll(){
  for(const e of enemies){
    if(!e) continue;
    if(e.hitFlash > 0) e.hitFlash--;
  }
  if(enemyDeathBursts.length){
    for(let i=enemyDeathBursts.length-1; i>=0; i--){
      const b = enemyDeathBursts[i];
      if(!b){ enemyDeathBursts.splice(i,1); continue; }
      b.life--;
      b.parts = b.parts || [];
      for(const pt of b.parts){
        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.vx *= 0.96;
        pt.vy *= 0.96;
        pt.vy += 0.02;
      }
      if(b.life <= 0) enemyDeathBursts.splice(i,1);
    }
  }
}

function drawEnemySharedWeapon(e, sx, sy, r, face){
  if(!e) return;
  let kind = "2h_sword";
  if(e.type === "orc") kind = "2h_mace";
  else if(e.type === "demon") kind = "2h_axe";
  else if(e.type === "mage") kind = "warstaff";
  else if(e.type === "archer") kind = "2h_sword";
  else if(e.type === "skeleton") kind = "2h_sword";
  else if(e.type === "melee") kind = "2h_sword";

  const isTwoHand =
    kind === "2h_axe" ||
    kind === "warstaff" ||
    kind === "2h_mace" ||
    kind === "2h_sword";

  const t = e.isElite
    ? { blade:"rgba(255,232,170,0.95)", metal:"rgba(202,166,85,0.95)" }
    : { blade:"rgba(235,240,245,0.95)", metal:"rgba(200,200,200,0.92)" };

  const side = face < 0 ? -1 : 1;
  const handX = r*0.54*side;
  let handY = -r*0.04;
  let weaponScale = 1.22;

  if(e.type === "orc"){
    handY = -r*0.44;
    weaponScale = 1.28;
  }else if(e.type === "demon"){
    handY = -r*0.40;
    weaponScale = 1.26;
  }else if(e.type === "mage"){
    handY = -r*0.16;
    weaponScale = 1.04;
  }

  let ang = 0;
  if(e.attackFrame > 0){
    const u = Math.max(0, Math.min(1, (e.attackFrame||0) / 8));
    ang = (-1.00) * (1-u) + (0.30) * u;
  }
  if(isTwoHand) ang *= 1.35;
  if(kind !== "2h_axe") ang = -ang;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.translate(handX, handY);
  ctx.scale(side, 1);
  ctx.rotate(ang);

  ctx.save();
  ctx.scale(weaponScale, weaponScale);

  ctx.strokeStyle = "rgba(110,70,30,0.95)";
  ctx.lineWidth = 2.8;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, r*0.54);
  ctx.stroke();

  if(kind === "staff" || kind === "warstaff"){
    ctx.strokeStyle = "rgba(120,80,35,0.95)";
    ctx.lineWidth = 2.6;
    ctx.beginPath();
    ctx.moveTo(0, -r*0.72);
    ctx.lineTo(0, r*0.56);
    ctx.stroke();

    ctx.fillStyle = t.metal;
    ctx.beginPath(); ctx.arc(0, -r*0.76, 2.8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.45)";
    ctx.lineWidth = 1.4;
    ctx.stroke();

  } else if(kind === "2h_axe"){
    ctx.fillStyle = t.blade;
    const by = -r*0.28;
    ctx.beginPath();
    ctx.moveTo(0, by);
    ctx.lineTo(r*0.56, by - r*0.25);
    ctx.lineTo(r*0.56, by + r*0.25);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.55)";
    ctx.lineWidth = 1.6;
    ctx.stroke();

  } else if(kind === "2h_mace"){
    ctx.fillStyle = t.metal;
    const hy = -r*0.32;
    const w  = r*0.68;
    const h  = r*0.22;
    ctx.beginPath();
    ctx.rect(-w/2, hy - h/2, w, h);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.55)";
    ctx.lineWidth = 1.6;
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,0.18)";

function __drawHumanoidMonsterDetail(cfg){
  const e = cfg.e || {};
  const sx = cfg.sx || 0;
  const sy = cfg.sy || 0;
  const r = cfg.r || (e.radius ?? 16);
  const face = cfg.face || 1;
  const bob = cfg.bob || 0;
  const hit = cfg.hit || {x:0,y:0};
  const outline = cfg.outline || "rgba(18,18,18,0.95)";
  const shadowAlpha = cfg.shadowAlpha ?? 0.18;

  const armorFill = cfg.armorFill || "rgba(90,90,96,0.98)";
  const shoulderFill = cfg.shoulderFill || armorFill;
  const armorTrim = cfg.armorTrim || "rgba(0,0,0,0.55)";
  const underFill = cfg.underFill || "rgba(30,26,22,0.96)";
  const skinFill = cfg.skinFill || "rgba(214,182,150,0.98)";
  const eyeFill = cfg.eyeFill || "rgba(255,72,72,0.95)";
  const hornFill = cfg.hornFill || null;
  const hornBackFill = cfg.hornBackFill || hornFill;
  const weaponGrip = cfg.weaponGrip || "rgba(90,58,30,0.98)";
  const weaponBlade = cfg.weaponBlade || "rgba(200,205,215,0.96)";
  const weaponGlow = cfg.weaponGlow || null;
  const beltFill = cfg.beltFill || "rgba(24,18,14,0.95)";
  const faceStripe = cfg.faceStripe || null;
  const helmBand = cfg.helmBand || null;
  const crestFill = cfg.crestFill || null;
  const shoulderSpikeFill = cfg.shoulderSpikeFill || null;
  const wingFill = cfg.wingFill || null;
  const wingInnerFill = cfg.wingInnerFill || null;
  const wingScale = cfg.wingScale || 1;

  function rr(x,y,w,h,rad){
    ctx.beginPath();
    if(ctx.roundRect){
      ctx.roundRect(x,y,w,h,rad);
    }else{
      const r2 = Math.min(rad, Math.abs(w)/2, Math.abs(h)/2);
      ctx.moveTo(x+r2, y);
      ctx.arcTo(x+w, y,   x+w, y+h, r2);
      ctx.arcTo(x+w, y+h, x,   y+h, r2);
      ctx.arcTo(x,   y+h, x,   y,   r2);
      ctx.arcTo(x,   y,   x+w, y,   r2);
      ctx.closePath();
    }
  }

  ctx.save();
  ctx.translate(sx + hit.x, sy + bob + hit.y - 11);
  ctx.scale(1, 0.80);

  if(shadowAlpha > 0 && typeof __drawEnemyShadow === "function"){
    __drawEnemyShadow(r * (cfg.shadowScale || 0.82), cfg.shadowY || 9, 1.0, 0.75, shadowAlpha);
  }

  const hipY = r * 0.12;
  const footY = r * 1.18;
  const torsoTop = -r * 0.58;
  const torsoH = r * (cfg.torsoHeight || 0.72);
  const torsoW = r * (cfg.torsoWidth || 0.84);
  const headR = r * (cfg.headRadius || 0.20);
  const shoulderW = torsoW * 0.28;
  const shoulderH = r * 0.18;

  // legs
  ctx.fillStyle = cfg.legFill || "rgba(28,24,22,0.98)";
  rr(-r*0.28, hipY, r*0.22, r*0.92, r*0.08); ctx.fill();
  rr( r*0.06, hipY, r*0.22, r*0.92, r*0.08); ctx.fill();

  // boots
  ctx.fillStyle = cfg.bootFill || "rgba(18,14,12,0.98)";
  rr(-r*0.31, footY - r*0.12, r*0.26, r*0.16, r*0.06); ctx.fill();
  rr( r*0.05, footY - r*0.12, r*0.26, r*0.16, r*0.06); ctx.fill();

  // under torso
  ctx.fillStyle = underFill;
  rr(-torsoW*0.46, torsoTop, torsoW*0.92, torsoH + r*0.08, r*0.12);
  ctx.fill();

  // armor torso
  ctx.fillStyle = armorFill;
  ctx.strokeStyle = outline;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-torsoW*0.52, torsoTop + r*0.04);
  ctx.lineTo( torsoW*0.52, torsoTop + r*0.04);
  ctx.lineTo( torsoW*0.44, torsoTop + torsoH);
  ctx.lineTo( torsoW*0.18, torsoTop + torsoH + r*0.18);
  ctx.lineTo(-torsoW*0.18, torsoTop + torsoH + r*0.18);
  ctx.lineTo(-torsoW*0.44, torsoTop + torsoH);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // wings behind torso
  if(wingFill){
    const wx = torsoW * 0.62 * wingScale;
    const wy = torsoTop + r*0.10;
    const wh = r * 0.96 * wingScale;
    ctx.fillStyle = wingFill;
    ctx.beginPath();
    ctx.moveTo(-torsoW*0.36, wy);
    ctx.quadraticCurveTo(-wx*0.92, wy + wh*0.12, -wx, wy + wh*0.64);
    ctx.quadraticCurveTo(-wx*0.66, wy + wh*0.38, -torsoW*0.18, wy + wh*0.22);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(torsoW*0.36, wy);
    ctx.quadraticCurveTo(wx*0.92, wy + wh*0.12, wx, wy + wh*0.64);
    ctx.quadraticCurveTo(wx*0.66, wy + wh*0.38, torsoW*0.18, wy + wh*0.22);
    ctx.closePath();
    ctx.fill();
    if(wingInnerFill){
      ctx.fillStyle = wingInnerFill;
      ctx.beginPath();
      ctx.moveTo(-torsoW*0.24, wy + r*0.04);
      ctx.quadraticCurveTo(-wx*0.56, wy + wh*0.16, -wx*0.58, wy + wh*0.48);
      ctx.quadraticCurveTo(-wx*0.38, wy + wh*0.30, -torsoW*0.10, wy + wh*0.18);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(torsoW*0.24, wy + r*0.04);
      ctx.quadraticCurveTo(wx*0.56, wy + wh*0.16, wx*0.58, wy + wh*0.48);
      ctx.quadraticCurveTo(wx*0.38, wy + wh*0.30, torsoW*0.10, wy + wh*0.18);
      ctx.closePath();
      ctx.fill();
    }
  }

  // shoulder plates
  ctx.fillStyle = shoulderFill;
  rr(-torsoW*0.70, torsoTop + r*0.02, shoulderW, shoulderH, r*0.08); ctx.fill(); ctx.stroke();
  rr( torsoW*0.42, torsoTop + r*0.02, shoulderW, shoulderH, r*0.08); ctx.fill(); ctx.stroke();
  if(shoulderSpikeFill){
    ctx.fillStyle = shoulderSpikeFill;
    ctx.beginPath();
    ctx.moveTo(-torsoW*0.60, torsoTop + r*0.00);
    ctx.lineTo(-torsoW*0.80, torsoTop - r*0.18);
    ctx.lineTo(-torsoW*0.38, torsoTop + r*0.06);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(torsoW*0.60, torsoTop + r*0.00);
    ctx.lineTo(torsoW*0.80, torsoTop - r*0.18);
    ctx.lineTo(torsoW*0.38, torsoTop + r*0.06);
    ctx.closePath();
    ctx.fill();
  }

  // belt
  ctx.fillStyle = beltFill;
  rr(-torsoW*0.42, torsoTop + torsoH - r*0.02, torsoW*0.84, r*0.10, r*0.04);
  ctx.fill();

  // chest trim
  ctx.strokeStyle = armorTrim;
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(0, torsoTop + r*0.04);
  ctx.lineTo(0, torsoTop + torsoH + r*0.12);
  ctx.moveTo(-torsoW*0.24, torsoTop + r*0.22);
  ctx.lineTo(0, torsoTop + r*0.48);
  ctx.lineTo(torsoW*0.24, torsoTop + r*0.22);
  ctx.stroke();

  // arms
  ctx.strokeStyle = cfg.armFill || "rgba(30,26,24,0.98)";
  ctx.lineWidth = Math.max(2.6, r*0.14);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-torsoW*0.46, torsoTop + r*0.18);
  ctx.lineTo(-r*0.68, torsoTop + r*0.54);
  ctx.moveTo( torsoW*0.46, torsoTop + r*0.18);
  ctx.lineTo( r*0.70, torsoTop + r*0.54);
  ctx.stroke();

  // head
  const headY = torsoTop - headR*1.25;
  ctx.fillStyle = skinFill;
  ctx.beginPath();
  ctx.arc(0, headY, headR, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();

  if(helmBand){
    ctx.strokeStyle = helmBand;
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.moveTo(-headR*0.78, headY-headR*0.08);
    ctx.lineTo(headR*0.78, headY-headR*0.08);
    ctx.stroke();
  }

  if(faceStripe){
    ctx.strokeStyle = faceStripe;
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(-headR*0.18, headY-headR*0.42);
    ctx.lineTo(headR*0.10, headY+headR*0.72);
    ctx.stroke();
  }

  ctx.fillStyle = eyeFill;
  ctx.beginPath();
  ctx.arc(-headR*0.34, headY-headR*0.05, headR*0.12, 0, Math.PI*2);
  ctx.arc( headR*0.34, headY-headR*0.05, headR*0.12, 0, Math.PI*2);
  ctx.fill();

  if(hornBackFill){
    ctx.fillStyle = hornBackFill;
    ctx.beginPath();
    ctx.moveTo(-headR*0.55, headY-headR*0.45);
    ctx.lineTo(-headR*1.20, headY-headR*1.15);
    ctx.lineTo(-headR*0.44, headY-headR*0.10);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(headR*0.55, headY-headR*0.45);
    ctx.lineTo(headR*1.20, headY-headR*1.15);
    ctx.lineTo(headR*0.44, headY-headR*0.10);
    ctx.closePath();
    ctx.fill();
  }
  if(hornFill){
    ctx.fillStyle = hornFill;
    ctx.beginPath();
    ctx.moveTo(-headR*0.24, headY-headR*0.66);
    ctx.lineTo(-headR*1.02, headY-headR*1.72);
    ctx.lineTo(-headR*0.10, headY-headR*0.30);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(headR*0.24, headY-headR*0.66);
    ctx.lineTo(headR*1.02, headY-headR*1.72);
    ctx.lineTo(headR*0.10, headY-headR*0.30);
    ctx.closePath();
    ctx.fill();
  }

  if(crestFill){
    ctx.strokeStyle = crestFill;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, headY-headR*1.55);
    ctx.lineTo(0, headY-headR*0.30);
    ctx.stroke();
  }

  // weapon
  ctx.strokeStyle = weaponGrip;
  ctx.lineWidth = Math.max(2.6, r*0.15);
  ctx.beginPath();
  ctx.moveTo(r*0.46*face, torsoTop + r*0.30);
  ctx.lineTo(r*0.70*face, torsoTop + r*0.62);
  ctx.stroke();

  ctx.strokeStyle = weaponBlade;
  ctx.lineWidth = Math.max(3.0, r*0.18);
  ctx.beginPath();
  ctx.moveTo(r*0.70*face, torsoTop + r*0.62);
  ctx.lineTo(r*(0.98 + (cfg.weaponLength || 0))*face, torsoTop + r*(0.98 + (cfg.weaponDrop || 0)));
  ctx.stroke();

  if(cfg.weaponCross){
    ctx.strokeStyle = cfg.weaponCross;
    ctx.lineWidth = Math.max(2.0, r*0.10);
    ctx.beginPath();
    ctx.moveTo(r*(0.64)*face, torsoTop + r*0.58);
    ctx.lineTo(r*(0.80)*face, torsoTop + r*0.58);
    ctx.stroke();
  }

  if(weaponGlow){
    ctx.strokeStyle = weaponGlow;
    ctx.lineWidth = Math.max(1.6, r*0.08);
    ctx.beginPath();
    ctx.moveTo(r*(0.92 + (cfg.weaponLength || 0))*face, torsoTop + r*(0.90 + (cfg.weaponDrop || 0)));
    ctx.lineTo(r*(1.08 + (cfg.weaponLength || 0))*face, torsoTop + r*(1.04 + (cfg.weaponDrop || 0)));
    ctx.stroke();
  }

  ctx.restore();
}

function updateEffectSystem(){
  updateParticles();
  updateBlood();
  updateLevelParticles();
  updateFireEmbers();

  for(let i=bloodPools.length-1;i>=0;i--){
    bloodPools[i].life--;
    if(bloodPools[i].life <= 0) bloodPools.splice(i,1);
  }
  if(bloodPools.length > 120) bloodPools.splice(0, bloodPools.length-120);

  updateLoots();
}

function updateCombatSystem(){
  if(hitStop > 0){ hitStop--; return; }

  if((player.skillSwingTimer || 0) > 0){
    const total = Math.max(1, Number(player.__skillVisualTotalFrames || player.skillSwingTimer || 8));
    const remain = Math.max(0, Number(player.skillSwingTimer || 0));
    const elapsed = Math.max(0, total - remain);
    attacking = true;
    attackFrame = Math.min(7.99, (elapsed / total) * 8);
    player.skillSwingTimer = Math.max(0, remain - 1);
    if(player.skillSwingTimer <= 0){
      attacking = false;
      attackFrame = 0;
      player.__skillVisualTotalFrames = 0;
      player.skillSwingStyle = null;
      player.skillSwingPower = 0;
    }
    return;
  }

  if(attacking){
    const atkMul = Math.max(0.25, Number(player.buffs?.atkSpdMul ?? player.gear?.atkSpdMul ?? 1));
    const prevFrame = attackFrame;
    attackFrame += atkMul;
    if(prevFrame < 3 && attackFrame >= 3) checkHit();
    if(attackFrame > 8){
      attacking = false;
      attackFrame = 0;
    }
  }
}

function updateMovement(){
  const moveSpeed = player.speed * (player.gear?.spdMul ?? 1) * (player.buffs?.spdMul ?? 1);

  let ix = 0;
  let iy = 0;

  if(keys["ArrowLeft"] || keys["a"])  ix -= 1;
  if(keys["ArrowRight"] || keys["d"]) ix += 1;
  if(keys["ArrowUp"] || keys["w"])    iy -= 1;
  if(keys["ArrowDown"] || keys["s"])  iy += 1;

  ix += joyDX;
  iy += joyDY;

  const mag = Math.hypot(ix, iy);
  if(mag < 0.08){
    return;
  }
  if(mag > 1){
    ix /= mag;
    iy /= mag;
  }

  if(Math.abs(ix) > Math.abs(iy)){
    player.dir = (ix > 0) ? "right" : "left";
  }else{
    player.dir = (iy > 0) ? "down" : "up";
  }

  const wx = (iy + ix) * 0.5;
  const wy = (iy - ix) * 0.5;

  const dx = wx * moveSpeed;
  const dy = wy * moveSpeed;

  const newX = player.x + dx;
  const newY = player.y + dy;

  if(canPlayerMoveToBody(newX, player.y)) player.x = newX;
  if(canPlayerMoveToBody(player.x, newY)) player.y = newY;
}

function updateInvulnerability(){
  if(player.invul > 0) player.invul--;
}

function updateEnvironmentSystem(){ updateShake(); updateAllFireZones(); }
function updateShake(){ if(shake > 0) shake--; }

function updateArrows(){
  for(let i = arrows.length - 1; i >= 0; i--){
    const a = arrows[i];
    a.x += a.dx;
    a.y += a.dy;
    a.angle = Math.atan2(a.dy, a.dx);
    a.life--;
    a.trailTick = (a.trailTick || 0) + 1;

    if(a.trailTick % 2 === 0){
      if(a.kind === "poisonSpit") spawnPoisonTrail(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "spikeShot") spawnSpikeTrail(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "webShot") spawnWebTrail(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "iceShard") spawnFrostTrail(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "fireball") spawnFireTrail(a.x, a.y, a.dx, a.dy);
      else spawnArrowTrail(a.x, a.y, a.dx, a.dy);
    }

    const tx = Math.floor(a.x / tileSize);
    const ty = Math.floor(a.y / tileSize);
    if(!map[ty] || map[ty][tx] === 1){
      if(a.kind === "poisonSpit") spawnPoisonBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "spikeShot") spawnSpikeBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "webShot") spawnWebBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "iceShard") spawnFrostBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "fireball") spawnFireBurst(a.x, a.y, a.dx, a.dy);
      else spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      arrows.splice(i,1);
      continue;
    }

    const px = player.x, py = player.y;
    const dxp = a.x - px;
    const dyp = a.y - py;
    const rr = (player.radius + 4);
    if(dxp*dxp + dyp*dyp < rr*rr){
      const dx = px - a.x;
      const dy = py - a.y;
      const len = Math.hypot(dx, dy) || 1;
      const kb = a.kind === "poisonSpit" ? 10 : (a.kind === "spikeShot" ? 16 : (a.kind === "webShot" ? 8 : (a.kind === "iceShard" ? 12 : (a.kind === "fireball" ? 13 : 14))));
      damagePlayer(a.damage, (dx/len)*kb, (dy/len)*kb, a);
      if(a.kind === "poisonSpit") spawnPoisonBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "spikeShot") spawnSpikeBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "webShot") spawnWebBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "iceShard") spawnFrostBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "fireball") spawnFireBurst(a.x, a.y, a.dx, a.dy);
      else spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      arrows.splice(i,1);
      continue;
    }

    if(a.life <= 0){
      if(a.kind === "poisonSpit") spawnPoisonBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "spikeShot") spawnSpikeBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "webShot") spawnWebBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "iceShard") spawnFrostBurst(a.x, a.y, a.dx, a.dy);
      else if(a.kind === "fireball") spawnFireBurst(a.x, a.y, a.dx, a.dy);
      else spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      arrows.splice(i,1);
      continue;
    }
  }
}

/* ===== 레벨업 ===== */
function levelUpSound(){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();

  o.type = "triangle";
  o.frequency.setValueAtTime(400, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.3);

  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime + 0.3);
}

function checkLevelUp(){
  if(xp >= xpToNext){
    xp -= xpToNext;
    level++;

    xpToNext = Math.floor(100 + level * level * 20);
    player.passivePoints = (player.passivePoints || 0) + 1;

    player.baseMaxHp += 12;
    updateBuffs(player);
    player.hp = player.maxHp;

    baseDamageBase *= 1.08;
    ultiDamageBase *= 1.1;
    recalcFromGear();

    player.levelGlow = 60;

    for(let i=0;i<60;i++){
      levelParticles.push({
        ox:(Math.random()-0.5)*40,
        oy:-40+(Math.random()-0.5)*10,
        vx:(Math.random()-0.5)*2,
        vy:Math.random()*3+2,
        life:60
      });
    }

    levelUpSound();
  }
}

/* ===== 공격 범위 ===== */
const BASE_MELEE_RANGE = 40;
const BASE_ULTI_AOE    = 40;

function getMeleeRange(){
  const b = player.buffs || defaultBuffStats();
  return BASE_MELEE_RANGE * (b.rangeMul ?? 1);
}
function getUltiAoeRadius(){
  const b = player.buffs || defaultBuffStats();
  return BASE_ULTI_AOE * (b.rangeMul ?? 1);
}

/* ===== 공격 ===== */
function checkHit(){
  const range = getMeleeRange();
  const hitLimit = 12;
  let hitDone = 0;

  function applyHitToEnemy(e, scale = 1, canExtra = true){
    if(!e || e.hp <= 0) return 0;

    const dx = e.x - player.x;
    const dy = e.y - player.y;
    const len = Math.hypot(dx, dy) || 1;
    const nx = dx / len;
    const ny = dy / len;

    const g = player.gear || {};
    const isBoss = (e.type === "boss");
    const isElite = !!e.isElite;
    const bossInvul = (isBoss && e.invul > 0);

    let weaponBase = rollWeaponDamage() + (g.flatDamageAdd || 0);

    let base =
      weaponBase
      * (g.dmgMul ?? 1)
      * (player.buffs?.dmgMul ?? 1)
      * scale;

    if(isBoss){
      base *= (g.bossDamageMul ?? 1);
    }
    if(isElite){
      base *= (g.eliteDamageMul ?? 1);
    }

    const ctxHit = buildCombatCtx("attack", e);

    const savedCritAdd = g.critChanceAdd || 0;
    if(isBoss && g.critChanceVsBoss){
      g.critChanceAdd = savedCritAdd + g.critChanceVsBoss;
    }

    const hitRes = computeFinalDamage(base, ctxHit, { canCrit:true });
    e.__killFxKind = window.__lastDamageFxKind || e.__killFxKind || "physical";
    const dealt = hitRes.dealt || 0;

    g.critChanceAdd = savedCritAdd;

    const prevHp = e.hp;

// ===== 타격 연출 =====
hitStop = 3;
shake = Math.max(shake, 6);
e.x += nx * 6;
e.y += ny * 6;

if(hitRes.crit && hitRes.crit.isCrit){
  shake = 12;
  hitStop = 5;
  e.x += nx * 10;
  e.y += ny * 10;
}

if(!bossInvul && e.invul <= 0){
  if((g.executeChance || 0) > 0 && e.hp > 0){
    const hpRatio = e.hp / Math.max(1, e.maxHp || e.hp);
    if(hpRatio <= 0.18 && Math.random() < (g.executeChance || 0)){
      e.hp = 0;
    }else{
      e.hp -= dealt;
    }
  }else{
    e.hp -= dealt;
  }
}

const diedNow = (prevHp > 0 && e.hp <= 0);

if(diedNow){
    e.__killFxKind = window.__lastDamageFxKind || e.__killFxKind || "physical";
}

    emitEvent("hit", { enemy: e, dealt });
    try{
      const activeId = (typeof getActiveSkillId === "function") ? getActiveSkillId() : "attack";
      const activeSkill = (window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[activeId]) || { id: activeId, tags: ["attack","melee"] };
      applyEquippedWeaponHitEffects(activeSkill, e, dealt);
    }catch(_){}

    const heal =
      dealt * (g.lifeLeech || 0)
      + (g.hpOnHit || 0);

    if(heal > 0){
      player.hp = Math.min(player.maxHp, player.hp + heal);
    }

    if((g.doubleHitChance || 0) > 0 && !bossInvul && e.hp > 0 && Math.random() < g.doubleHitChance){
      const bonus = dealt * 0.65;
      e.hp -= bonus;
      if(bonus > 0){
        const bonusHeal = bonus * (g.lifeLeech || 0) + (g.hpOnHit || 0);
        if(bonusHeal > 0) player.hp = Math.min(player.maxHp, player.hp + bonusHeal);
      }
      if(e.hp <= 0 && !diedNow){
          e.__killFxKind = window.__lastDamageFxKind || e.__killFxKind || "physical";
      }

    if((g.cleaveChance || 0) > 0 && Math.random() < g.cleaveChance){
      const cleaveRangeMul = Math.max(0.6, Number(g.rangeMul || 1));
      const cleaveRadius = 90 * cleaveRangeMul;
      const cleaveR2 = cleaveRadius * cleaveRadius;

      for(const other of enemies){
        if(!other || other.hp <= 0) continue;
        const odx = other.x - player.x;
        const ody = other.y - player.y;
        if(odx*odx + ody*ody > cleaveR2) continue;

        other.hp -= dealt * 0.45;
        other.hitFlash = Math.max(other.hitFlash || 0, 4);

        if(other.hp <= 0){
            other.__killFxKind = e.__killFxKind || window.__lastDamageFxKind || "physical";
        }
      }
    }

    if(Math.random() < 0.2 && player.kiOrbs < player.maxOrbs){
      player.kiOrbs++;
    }

    if(bossInvul){
      spawnHitBlood(e.x, e.y, 14);
    }else{
      if((g.knockbackChance || 0) > 0 && Math.random() < g.knockbackChance){
        e.stun = Math.max(e.stun || 0, 15);
        __enemyHitFlashStart(e, 1);
        moveEnemyWithCollision(e, nx * 18, ny * 18, 8);
      }else{
        e.stun = Math.max(e.stun || 0, 8);
        __enemyHitFlashStart(e, 1);
      }
    }

    if((g.bleedChance || 0) > 0 && !bossInvul && Math.random() < g.bleedChance){
      e.bleed = {
        life: 90,
        tick: 0,
        damage: Math.max(1, dealt * 0.18)
      };
    }

    if(bossInvul) thudSound();
    else hitSound();

    shake = 12;

    if(particles.length < 220){
      particles.push({
        x: e.x, y: e.y,
        vx: nx*4 + (Math.random()-0.5)*4,
        vy: ny*4 + (Math.random()-0.5)*4,
        life: 30
      });
    }

    if(e.hp <= 0){
      
        e.__killFxKind = window.__lastDamageFxKind || e.__killFxKind || "physical";

        if((g.hpOnKill || 0) > 0){
          player.hp = Math.min(player.maxHp, player.hp + g.hpOnKill);
        }else{
          player.hp = Math.min(player.maxHp, player.hp + 1);
        }

        if(bloodPools.length < 140){
          bloodPools.push({
            x: e.x, y: e.y,
            size: 10 + Math.random()*6,
            life: 600
          });
        }

        slowMotion = 6;

        if(player.kiOrbs < player.maxOrbs){
          player.kiOrbs++;
        }
      }
    }

    if(canExtra && (g.cleaveChance || 0) > 0 && !bossInvul && Math.random() < g.cleaveChance){
      let splash = 0;
      for(const other of enemies){
        if(!other || other === e || other.hp <= 0) continue;
        const ddx = other.x - e.x;
        const ddy = other.y - e.y;
        if(ddx*ddx + ddy*ddy > 54*54) continue;
        applyHitToEnemy(other, 0.45, false);
        splash++;
        if(splash >= 3) break;
      }
    }

    if(canExtra && (g.doubleHitChance || 0) > 0 && !bossInvul && Math.random() < g.doubleHitChance){
      applyHitToEnemy(e, 0.55, false);
    }

    return dealt;
  }

  for(let i=0;i<enemies.length;i++){
    const e = enemies[i];

    const dx = e.x - player.x;
    const dy = e.y - player.y;

    const r = range + e.radius;
    if(dx*dx + dy*dy > r*r) continue;

    if(player.dir === "up" && dy >= 0) continue;
    if(player.dir === "down" && dy <= 0) continue;
    if(player.dir === "right" && dx <= 0) continue;
    if(player.dir === "left" && dx >= 0) continue;

    hitDone++;
    if(hitDone > hitLimit) break;

    applyHitToEnemy(e, 1, true);
  }

  if(Array.isArray(enemies)){
    for(const __deadFxEnemy of enemies){
      if(__deadFxEnemy && Number(__deadFxEnemy.hp || 0) <= 0){
        rewardEnemyDeathOnce(__deadFxEnemy);
        if(typeof spawnTypeDeathFxRuntime === "function") spawnTypeDeathFxRuntime(__deadFxEnemy);
      }
    }
  }
  enemies = enemies.filter(e => (e.hp > 0) || (e.dead && e.deathTimer > 0));
  packs.forEach(pack=>{
    if(Array.isArray(pack.enemies)){
      for(const __deadFxEnemy of pack.enemies){
        if(__deadFxEnemy && Number(__deadFxEnemy.hp || 0) <= 0){
          rewardEnemyDeathOnce(__deadFxEnemy);
          if(typeof spawnTypeDeathFxRuntime === "function") spawnTypeDeathFxRuntime(__deadFxEnemy);
        }
      }
    }
    pack.enemies = pack.enemies.filter(e=>(e.hp>0) || (e.dead && e.deathTimer > 0));
  });
}

function updateBlood(){
  for(let i = bloodParticles.length - 1; i >= 0; i--){
    const p = bloodParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25;
    p.life--;
    if(p.life <= 0) bloodParticles.splice(i,1);
  }
  if(bloodParticles.length > 260){
    bloodParticles.splice(0, bloodParticles.length - 260);
  }
}

function drawBlood(){
  if(bloodParticles.length === 0) return;

  ctx.save();
  ctx.fillStyle = "#8b0000";
  ctx.beginPath();

  for(let i=0;i<bloodParticles.length;i++){
    const p = bloodParticles[i];
    const a = p.life / 30;
    if(a > 0.66) ctx.globalAlpha = 0.9;
    else if(a > 0.33) ctx.globalAlpha = 0.6;
    else ctx.globalAlpha = 0.35;

    ctx.fillRect(p.x - p.size*0.5, p.y - p.size*0.5, p.size, p.size);
  }
  ctx.restore();
}

/* ===== 렌더 ===== */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.shadowColor = "transparent";
  ctx.filter = "none";

  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let camX = player.x - canvas.width/2;
  let camY = player.y - canvas.height/2;

  let amp = shake ? (6 + shake * 0.45) : 0;
  let sx = shake ? (Math.random()-0.5) * amp : 0;
  let sy = shake ? (Math.random()-0.5) * amp : 0;

  ctx.save();
  ctx.translate(-camX+sx, -camY+sy);

  for(let y = 0; y < map.length; y++){
    for(let x = 0; x < map[y].length; x++){
      let tile = map[y][x];
      if(tile === 0) ctx.fillStyle = "#222";
      if(tile === 1) ctx.fillStyle = "#555";
      ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
    }
  }

  ctx.fillStyle = "#550000";
  for(let i=0;i<bloodPools.length;i++){
    const b = bloodPools[i];
    const a = b.life / 600;
    if(a <= 0.05) continue;
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  fireZones.forEach(f=>{
    ctx.save();
    for(let i=0;i<6;i++){
      let flameHeight = 10 + Math.sin(frameCount*0.2 + i)*6;
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = "orange";
      ctx.beginPath();
      ctx.moveTo(f.x - 6 + i*2, f.y);
      ctx.lineTo(f.x - 3 + i*2, f.y - flameHeight);
      ctx.lineTo(f.x + i*2, f.y);
      ctx.fill();
    }
    ctx.restore();
  });

  ctx.fillStyle = "red";
  for(let i=0;i<particles.length;i++){
    const p = particles[i];
    ctx.fillRect(p.x, p.y, 3, 3);
  }

  drawPortal();
  drawLoots();
  drawBlood();
  enemies.forEach(e=>drawEnemy(e));

  levelParticles.forEach(p=>{
    ctx.fillStyle = "gold";
    ctx.fillRect(player.x + p.ox, player.y + p.oy, 4, 4);
  });

  arrows.forEach(a=>{
    drawArrowSprite(a.x, a.y, a.angle || Math.atan2(a.dy||0, a.dx||1), 1);
  });

  ctx.restore();

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  drawPlayer(canvas.width/2, canvas.height/2);
  drawUI();
}

function drawPlayer(x,y){
  if(player.levelGlow > 0){
    ctx.shadowColor = "gold";
    ctx.shadowBlur = player.levelGlow * 0.5;
  }

  ctx.fillStyle="#880000";
  ctx.fillRect(x-10,y-12,20,22);

  ctx.fillStyle="#aa0000";
  ctx.fillRect(x-7,y-20,14,8);

  ctx.fillStyle="#ffffcc";
  ctx.fillRect(x-8,y-26,4,8);
  ctx.fillRect(x+4,y-26,4,8);

  ctx.fillStyle = "#fff";
  ctx.fillRect(x-3,y-14,2,2);
  ctx.fillRect(x+1,y-14,2,2);

  ctx.shadowBlur = 0;

  if(player.ultiActive){
    ctx.save();
    ctx.shadowColor = "#ff6600";
    ctx.shadowBlur = 25;
    ctx.fillStyle = "#ffaa00";
    ctx.fillRect(x-3,y-14,2,2);
    ctx.fillRect(x+1,y-14,2,2);
    ctx.restore();
  }

  if(hasEquippedWeapon()) drawSword(x,y);
  else drawUnarmedStrike(x,y);
}

function drawSword(x, y){
  ctx.save();
  ctx.translate(x, y);

  var offsetX = 0;
  var offsetY = 0;
  var angle = 0;
  var t = attackFrame / 8;

  if (player.dir === "right") { offsetX = 18; if (attacking) angle = 1.5 * t; }
  else if (player.dir === "left") { offsetX = -18; if (attacking) angle = -1.5 * t; }
  else if (player.dir === "up") { offsetY = -18; if (attacking) offsetY -= 25 * t; }
  else if (player.dir === "down") { offsetY = 6; angle = Math.PI; if (attacking) offsetY += 25 * t; }

  ctx.translate(offsetX, offsetY);
  ctx.rotate(angle);
  drawSwordShape(ctx);
  ctx.restore();
}

function drawUnarmedStrike(x, y){
  ctx.save();
  ctx.translate(x, y);

  let handX = 14;
  let handY = -8;
  let armX = 8;
  let armY = -6;
  let angle = 0;
  const t = Math.max(0, Math.min(1, attackFrame / 8));
  const jab = attacking ? (10 + 8 * t) : 10;

  if(player.dir === "right"){
    handX = jab; handY = -8; armX = 7; armY = -6; angle = 0.08 * t;
  }else if(player.dir === "left"){
    handX = -jab; handY = -8; armX = -7; armY = -6; angle = -0.08 * t;
  }else if(player.dir === "up"){
    handX = 0; handY = -(12 + 12 * t); armX = 0; armY = -8; angle = 0;
  }else if(player.dir === "down"){
    handX = 0; handY = 10 + 8 * t; armX = 0; armY = 4; angle = 0;
  }

  ctx.rotate(angle);
  ctx.strokeStyle = "#f1d7bf";
  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(armX, armY);
  ctx.lineTo(handX, handY);
  ctx.stroke();

  ctx.fillStyle = "#ffe2c4";
  ctx.beginPath();
  ctx.arc(handX, handY, 3.5, 0, Math.PI*2);
  ctx.fill();

  if(attacking){
    ctx.strokeStyle = "rgba(255,255,255,0.35)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    if(player.dir === "right"){
      ctx.arc(handX - 2, handY, 8, -0.7, 0.7);
    }else if(player.dir === "left"){
      ctx.arc(handX + 2, handY, 8, Math.PI - 0.7, Math.PI + 0.7);
    }else if(player.dir === "up"){
      ctx.arc(handX, handY + 2, 8, Math.PI * 1.2, Math.PI * 1.8);
    }else{
      ctx.arc(handX, handY - 2, 8, Math.PI * 0.2, Math.PI * 0.8);
    }
    ctx.stroke();
  }

  ctx.restore();
}

function drawSwordShape(c){
  c.fillStyle = "#552200";
  c.fillRect(-2, 6, 4, 8);

  c.fillStyle = "#bbbbbb";
  c.fillRect(-8, 6, 16, 3);

  c.fillStyle = "#dddddd";
  c.fillRect(-2, -20, 4, 26);

  c.beginPath();
  c.moveTo(-2, -20);
  c.lineTo(0, -32);
  c.lineTo(2, -20);
  c.fill();
}

function drawEnemy(e){
  if(e.type === "boss"){
    if(e.dead){
      const t = (e.deathTimer / e.deathMax);
      ctx.save();
      ctx.globalAlpha = Math.max(0, t);

      ctx.fillStyle = "rgba(255,60,60,0.25)";
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + (1-t)*35, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = "#777777";
      ctx.fillRect(e.x-20, e.y-25, 40, 50);

      if(Math.floor(frameCount/3)%2===0){
        ctx.fillStyle = "rgba(255,0,0,0.8)";
        ctx.fillRect(e.x-6, e.y-15, 4,4);
        ctx.fillRect(e.x+2, e.y-15, 4,4);
      }

      ctx.restore();
      return;
    }

    if(e.invul > 0){
      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + 10, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    ctx.fillStyle = "#777777";
    ctx.fillRect(e.x-20, e.y-25, 40, 50);

    ctx.fillStyle = "#999999";
    ctx.fillRect(e.x-15, e.y-35, 30, 15);

    ctx.fillStyle = "red";
    ctx.fillRect(e.x-6, e.y-15, 4,4);
    ctx.fillRect(e.x+2, e.y-15, 4,4);

    ctx.save();
    ctx.translate(e.x+28, e.y);
    ctx.rotate(0.2);
    drawSwordShape(ctx);
    ctx.restore();
    return;
  }

  if(e.isLeader){
    ctx.fillStyle = "#ffd000";
    ctx.fillRect(e.x-6, e.y-24, 12, 3);
    ctx.fillRect(e.x-4, e.y-28, 3, 4);
    ctx.fillRect(e.x+1, e.y-28, 3, 4);
  }
  if(e.isElite){
    ctx.fillStyle = (e.eliteColor === "yellow") ? "#ffcc00" : "#00aaff";
  }else if(e.type === "archer"){
    ctx.fillStyle = "#cccccc";
  }else if(e.type === "mage"){
    ctx.fillStyle = "#550088";
  }else if(e.type === "orc"){
    ctx.fillStyle = "#668800";
  }else if(e.type === "demon"){
    ctx.fillStyle = "#992222";
  }else{
    ctx.fillStyle = "#006600";
  }

  if(e.activeBuffs && e.activeBuffs.some(b => b.key === "damage|leader|mul" || b.key === "atkSpeed|leader|mul")){
    const pulse = 0.45 + 0.25*Math.sin(frameCount*0.2);
    ctx.save();
    ctx.globalAlpha = 0.25 + pulse;
    ctx.fillStyle = "rgba(255,0,0,0.35)";
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius + 12 + pulse*6, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  ctx.fillRect(e.x-10,e.y-12,20,22);

  if(e.type === "archer") ctx.fillStyle = "#dddddd";
  else if(e.type === "mage") ctx.fillStyle = "#550088";
  else if(e.type === "orc") ctx.fillStyle = "#99cc33";
  else if(e.type === "demon") ctx.fillStyle = "#ff7755";
  else ctx.fillStyle = "#00aa00";
  ctx.fillRect(e.x-7,e.y-20,14,8);

  ctx.fillStyle="red";
  ctx.fillRect(e.x-4,e.y-14,3,3);
  ctx.fillRect(e.x+1,e.y-14,3,3);
}
