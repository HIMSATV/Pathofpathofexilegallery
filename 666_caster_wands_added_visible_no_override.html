<script>
(function(){
  if(window.__TYPE_DEATH_FX_RUNTIME_PATCH__) return;
  window.__TYPE_DEATH_FX_RUNTIME_PATCH__ = true;

  window.enemyTypeDeathFx = window.enemyTypeDeathFx || [];

  function fxPresetForEnemyRuntime(e){
    const t = (e && e.type) || "normal";
    if(t === "orc"){
      return { color:"rgba(150,40,30,0.96)", glow:"rgba(120,70,35,0.28)", stain:"rgba(80,16,12,0.16)", count:16, sparks:8, size:4.2, speed:2.3, life:24, ring:false };
    }
    if(t === "demon"){
      return { color:"rgba(255,120,40,0.98)", glow:"rgba(255,40,0,0.26)", stain:"rgba(90,20,0,0.12)", count:18, sparks:10, size:4.2, speed:2.7, life:26, ring:true };
    }
    if(t === "skeleton"){
      return { color:"rgba(235,235,225,0.97)", glow:"rgba(180,180,170,0.18)", stain:"rgba(170,170,160,0.07)", count:13, sparks:6, size:3.5, speed:2.45, life:22, ring:false };
    }
    if(t === "mage"){
      return { color:"rgba(120,180,255,0.96)", glow:"rgba(80,120,255,0.24)", stain:"rgba(70,95,180,0.08)", count:15, sparks:12, size:3.9, speed:2.5, life:24, ring:true };
    }
    if(t === "archer"){
      return { color:"rgba(170,120,70,0.94)", glow:"rgba(110,80,40,0.16)", stain:"rgba(70,50,28,0.08)", count:11, sparks:5, size:3.2, speed:2.0, life:20, ring:false };
    }
    if(t === "boss"){
      return { color:"rgba(255,210,110,0.99)", glow:"rgba(255,120,40,0.28)", stain:"rgba(120,72,20,0.12)", count:26, sparks:14, size:5.8, speed:3.2, life:34, ring:true };
    }
    return { color:"rgba(140,30,30,0.93)", glow:"rgba(90,0,0,0.16)", stain:"rgba(80,10,10,0.10)", count:13, sparks:6, size:3.5, speed:2.15, life:22, ring:false };
  }

  function colorWithAlpha(base, alpha){
    const a = Math.max(0, Math.min(1, alpha));
    return base.replace(/0\.\d+\)/, a.toFixed(3) + ')').replace(/1\)/, a.toFixed(3) + ')');
  }

  window.spawnTypeDeathFxRuntime = function(e){
    if(!e || e.__typeDeathFxSpawnedRuntime) return;
    e.__typeDeathFxSpawnedRuntime = true;

    const preset = fxPresetForEnemyRuntime(e);
    const fx = {
      x: Number(e.x || 0),
      y: Number(e.y || 0),
      type: e.type || "normal",
      life: preset.life,
      maxLife: preset.life,
      color: preset.color,
      glow: preset.glow,
      stain: preset.stain,
      ring: !!preset.ring,
      parts: [],
      sparks: []
    };

    for(let i=0;i<preset.count;i++){
      const a = Math.random() * Math.PI * 2;
      const s = preset.speed * (0.45 + Math.random() * 0.8);
      fx.parts.push({
        x: 0, y: 0,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s - 0.1,
        r: preset.size * (0.55 + Math.random() * 0.75),
        trail: []
      });
    }

    for(let i=0;i<preset.sparks;i++){
      const a = Math.random() * Math.PI * 2;
      const s = (preset.speed + 0.7) * (0.55 + Math.random() * 0.95);
      fx.sparks.push({
        x: 0, y: 0,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s - 0.15,
        r: Math.max(1.1, preset.size * (0.22 + Math.random() * 0.22)),
        fade: 0.75 + Math.random() * 0.25
      });
    }

    window.enemyTypeDeathFx.push(fx);
  };

  function tickTypeDeathFxRuntime(){
    const arr = window.enemyTypeDeathFx;
    if(!Array.isArray(arr) || !arr.length) return;
    for(let i=arr.length-1;i>=0;i--){
      const fx = arr[i];
      if(!fx){ arr.splice(i,1); continue; }
      fx.life -= 1;

      for(const p of fx.parts){
        p.trail.unshift({x:p.x, y:p.y, r:p.r});
        if(p.trail.length > 3) p.trail.pop();
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.955;
        p.vy = p.vy * 0.955 + 0.03;
      }

      for(const p of fx.sparks){
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.93;
        p.vy = p.vy * 0.93 + 0.02;
      }

      if(fx.life <= 0) arr.splice(i,1);
    }
  }

  function drawTypeDeathFxRuntime(){
    const arr = window.enemyTypeDeathFx;
    if(!Array.isArray(arr) || !arr.length) return;
    if(typeof ctx === "undefined" || !ctx || typeof canvas === "undefined" || !canvas) return;
    if(typeof isoProject !== "function" || typeof player === "undefined" || !player) return;

    const ZOOM = 1.4;
    const pIso = isoProject(player.x || 0, player.y || 0);
    let camX = pIso.x - (canvas.width  / (2*ZOOM));
    let camY = pIso.y - (canvas.height / (2*ZOOM));
    if(typeof shake !== "undefined" && shake > 0){
      camX += (Math.random()-0.5) * shake;
      camY += (Math.random()-0.5) * shake;
    }

    ctx.save();
    ctx.setTransform(ZOOM,0,0,ZOOM,0,0);

    for(const fx of arr){
      if(!fx) continue;
      const a = Math.max(0, fx.life / Math.max(1, fx.maxLife));
      const iso0 = isoProject(fx.x, fx.y);
      const sx = iso0.x - camX;
      const sy = iso0.y - camY;

      if(typeof drawIsoDisc === "function"){
        drawIsoDisc(sx, sy + 7, 5 + (1-a)*10, colorWithAlpha(fx.stain, 0.9 * a), null);
      }

      if(fx.ring){
        if(typeof drawIsoDisc === "function"){
          drawIsoDisc(sx, sy - 4, 8 + (1-a)*16, colorWithAlpha(fx.glow, 0.55 * a), null);
          drawIsoDisc(sx, sy - 4, 4 + (1-a)*8, colorWithAlpha(fx.glow, 0.32 * a), null);
        }
      }

      for(const p of fx.parts){
        const isoP = isoProject(fx.x + p.x, fx.y + p.y);
        const px = isoP.x - camX;
        const py = isoP.y - camY;
        const r = Math.max(0.8, p.r * (0.55 + a * 0.55));

        if(Array.isArray(p.trail)){
          for(let ti=0; ti<p.trail.length; ti++){
            const tr = p.trail[ti];
            const isoT = isoProject(fx.x + tr.x, fx.y + tr.y);
            const tx = isoT.x - camX;
            const ty = isoT.y - camY;
            const ta = a * (0.18 - ti * 0.04);
            if(ta <= 0) continue;
            if(typeof drawIsoDisc === "function"){
              drawIsoDisc(tx, ty - 4, Math.max(0.7, tr.r * 0.55), colorWithAlpha(fx.glow, ta), null);
            }
          }
        }

        if(typeof drawIsoDisc === "function"){
          drawIsoDisc(px, py - 4, r * 1.7, colorWithAlpha(fx.glow, 0.16 * a), null);
          drawIsoDisc(px, py - 4, r, colorWithAlpha(fx.color, Math.max(0.15, a)), null);
        }

        if(fx.type === "skeleton"){
          ctx.strokeStyle = "rgba(255,255,255," + (0.18*a).toFixed(3) + ")";
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.moveTo(px - r, py - 4 - r*0.3);
          ctx.lineTo(px + r, py - 4 + r*0.3);
          ctx.stroke();
        }else if(fx.type === "archer"){
          ctx.strokeStyle = "rgba(120,90,55," + (0.16*a).toFixed(3) + ")";
          ctx.lineWidth = 1.1;
          ctx.beginPath();
          ctx.moveTo(px - r*0.7, py - 4 - r*0.7);
          ctx.lineTo(px + r*0.7, py - 4 + r*0.7);
          ctx.stroke();
        }
      }

      for(const p of fx.sparks){
        const isoP = isoProject(fx.x + p.x, fx.y + p.y);
        const px = isoP.x - camX;
        const py = isoP.y - camY;
        const sa = a * p.fade;
        if(typeof drawIsoDisc === "function"){
          drawIsoDisc(px, py - 4, p.r * 1.8, colorWithAlpha(fx.glow, 0.12 * sa), null);
          drawIsoDisc(px, py - 4, p.r, colorWithAlpha(fx.color, 0.85 * sa), null);
        }
      }
    }
    ctx.restore();
  }

  const __prevUpdateDeathFx = window.update || (typeof update === "function" ? update : null);
  function __patchedUpdateDeathFx(){
    const out = typeof __prevUpdateDeathFx === "function" ? __prevUpdateDeathFx.apply(this, arguments) : undefined;
    tickTypeDeathFxRuntime();
    return out;
  }
  window.update = __patchedUpdateDeathFx;
  try{ update = __patchedUpdateDeathFx; }catch(_){}

  const __prevDrawIsoDeathFx = window.drawIso || (typeof drawIso === "function" ? drawIso : null);
  function __patchedDrawIsoDeathFx(){
    const out = typeof __prevDrawIsoDeathFx === "function" ? __prevDrawIsoDeathFx.apply(this, arguments) : undefined;
    drawTypeDeathFxRuntime();
    return out;
  }
  window.drawIso = __patchedDrawIsoDeathFx;
  try{ drawIso = __patchedDrawIsoDeathFx; }catch(_){}

  const __prevDrawDeathFx = window.draw || (typeof draw === "function" ? draw : null);
  function __patchedDrawDeathFx(){
    const out = typeof __prevDrawDeathFx === "function" ? __prevDrawDeathFx.apply(this, arguments) : undefined;
    drawTypeDeathFxRuntime();
    return out;
  }
  window.draw = __patchedDrawDeathFx;
  try{ draw = __patchedDrawDeathFx; }catch(_){}
})();
</script>

<script>
(function(){
  if(window.__ES_BOOTS_BELTS_BASES_PATCH_V1__) return;
  window.__ES_BOOTS_BELTS_BASES_PATCH_V1__ = true;

  function hasBase(id){

      return Array.isArray(ITEM_POOL) && ITEM_POOL.some(x => x && x.id === id);
    }catch(_){
      return false;

<script>
(function(){
  if(window.__EQUIP_12_SLOT_PATCH__) return;

  const SLOT_ORDER_12 = ["weapon","offhand","helm","amulet","chest","gloves","boots","belt","ring","ring2","flask1","flask2"];
  window.__EQUIP_SLOT_ORDER_12__ = SLOT_ORDER_12.slice();

  function ensureEquipSlots(){
    if(typeof equipment !== "object" || !equipment) equipment = {};
    const defaults = {
      weapon:null, offhand:null, helm:null, amulet:null,
      chest:null, gloves:null, boots:null, ring:null,
      ring2:null, belt:null, flask1:null, flask2:null

      if(!(k in equipment)) equipment[k] = defaults[k];
    }
    return equipment;
  }
  window.__ensureEquipSlots12 = ensureEquipSlots;
  ensureEquipSlots();

  if(typeof slotLabel === "function"){
    const __origSlotLabel12 = slotLabel;
    slotLabel = function(slot){
      if(slot === "amulet") return "목걸이";
      if(slot === "ring") return "반지 1";
      if(slot === "ring2") return "반지 2";
      return __origSlotLabel12(slot);
    };
  }

  if(typeof isItemCompatibleWithEquipSlot === "function"){
    const __origCompat12 = isItemCompatibleWithEquipSlot;
    isItemCompatibleWithEquipSlot = function(it, slot){
      ensureEquipSlots();

      if(slot === "amulet") return it.slot === "amulet";
      if(slot === "ring" || slot === "ring2") return it.slot === "ring";
      return __origCompat12(it, slot);
    };
  }

  resolveAutoEquipSlotForItem = function(it){
    ensureEquipSlots();
    if(!it) return null;
    if(it.slot === "ring"){
      if(!equipment.ring) return "ring";
      if(!equipment.ring2) return "ring2";
      return "ring";
    }
    if(it.slot === "amulet"){
      return "amulet";
    }
    if(it.slot === "flask"){
      if(!equipment.flask1) return "flask1";
      if(!equipment.flask2) return "flask2";
      return "flask1";
    }
    return it.slot || null;
  };

  if(typeof drawItemIcon === "function" && !window.__AMULET_ICON_PATCH__){
    window.__AMULET_ICON_PATCH__ = true;
    const __origDrawItemIcon12 = drawItemIcon;
    drawItemIcon = function(c, it){
      if(it && it.slot === "amulet" && c){
        const ctx = c.getContext("2d");
        if(!ctx) return;
        const w = c.width || 44;
        const h = c.height || 44;
        ctx.clearRect(0, 0, w, h);

        // 기본 아이템칸 배경 + 희귀도 사각 프레임 유지
        ctx.save();
        ctx.globalAlpha = 1;
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        ctx.fillRect(0, 0, w, h);

        const rr = (typeof normalizeRarity === "function")
          ? normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"))
          : (it?.rarity || "normal");
        ctx.lineWidth = 3;
        if(rr === "unique") ctx.strokeStyle = "#ffb86b";
        else if(rr === "rare") ctx.strokeStyle = "#ffd166";
        else if(rr === "magic") ctx.strokeStyle = "#2f7bff";
        else ctx.strokeStyle = "#ffffff";
        const pad = 4;
        ctx.strokeRect(pad, pad, w - pad*2, h - pad*2);

        ctx.translate(w/2, h/2);

        ctx.strokeStyle = "#c8b37a";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-9, -10);
        ctx.quadraticCurveTo(0, -2, 9, -10);
        ctx.stroke();

        ctx.fillStyle = "#c9c9cf";
        ctx.beginPath();
        ctx.arc(0, -4, 3.2, 0, Math.PI * 2);
        ctx.fill();

        const g = ctx.createLinearGradient(0, 2, 0, 16);
        g.addColorStop(0, "#7ee0ff");
        g.addColorStop(1, "#1d6cff");
        ctx.fillStyle = g;
        ctx.strokeStyle = "#c8b37a";
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(8, 8);
        ctx.lineTo(0, 16);
        ctx.lineTo(-8, 8);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.globalAlpha = 0.35;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(-2, 5, 2.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
        return;
      }
      return __origDrawItemIcon12(c, it);
    };
  }

  // passive recalc uses the main integrated recalcFromGear() body above.

  // rebuildGearFromEquipment keeps the main integrated definition above.

  if(typeof equipFromBagToSlot === "function"){

      d.onclick = function(e){
        try{ if(typeof stopEvt === "function") stopEvt(e); }catch(_){}

          try{ if(typeof closePopup === "function") closePopup(); }catch(_){}
          if(typeof renderAllPanels === "function") renderAllPanels();
          return false;
        }

        selectedItem = { from:"equip", slot:slot };
        try{ if(typeof closePopup === "function") closePopup(); }catch(_){}
        if(typeof renderAllPanels === "function") renderAllPanels();
        return false;
      };

      equipSlotsEl.appendChild(d);
    }

    if(typeof buildExtendedSpecText === "function") specTextEl.textContent = buildExtendedSpecText();
    const itSel = (selectedItem && selectedItem.from === "equip") ? getSelectedItem() : null;
    equipInfoEl.innerHTML = itSel ? prettyItemHTML(itSel) : "";
  };

  if(typeof getSelectedItem === "function"){
    const __origGetSelectedItem12 = getSelectedItem;
    getSelectedItem = function(){

      return __origGetSelectedItem12();

  }

  if(typeof resetGame === "function"){
    const __origResetGame12 = resetGame;
    resetGame = function(){
      __origResetGame12();
      ensureEquipSlots();
    };
  }

  try{ ensureEquipSlots(); }catch(_){}
})();
</script>

        w.flask_offense = 0.98;
        w.flask_crit = 0.40;
      }else if(kind === 'suffix'){
        w.flask_speed = 1.18;
        w.flask_crit = 0.88;
        w.flask_resist = 1.06;
        w.flask_utility = 0.64;
      }
      return w;
    };
  }
})();
</script>
