function drawMiniMap(){
  const w = 60;
  const h = 60;
  const margin = 12;
  const x0 = canvas.width - w - margin;
  const y0 = margin;

  const radarRange = 700;
  const scale = w / (radarRange * 2);

  const cx = x0 + w/2;
  const cy = y0 + h/2;

  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = "#000";
  ctx.fillRect(x0, y0, w, h);

  ctx.beginPath();
  ctx.rect(x0+1, y0+1, w-2, h-2);
  ctx.clip();

  ctx.globalAlpha = 0.7;
  ctx.strokeStyle = "#888";
  ctx.lineWidth = 1;

  const minTX = Math.max(0, Math.floor((player.x - radarRange) / tileSize));
  const maxTX = Math.min(mapSize-1, Math.floor((player.x + radarRange) / tileSize));
  const minTY = Math.max(0, Math.floor((player.y - radarRange) / tileSize));
  const maxTY = Math.min(mapSize-1, Math.floor((player.y + radarRange) / tileSize));

  for(let ty=minTY; ty<=maxTY; ty++){
    for(let tx=minTX; tx<=maxTX; tx++){
      if(map[ty][tx] !== 1) continue;
      const wx = tx * tileSize;
      const wy = ty * tileSize;
      const dx = wx - player.x;
      const dy = wy - player.y;
      const mx = cx + dx * scale;
      const my = cy + dy * scale;
      const size = tileSize * scale;
      ctx.strokeRect(mx, my, size, size);
    }
  }

  const boss = enemies.find(e => e.type === "boss");
  if(boss){
    const dx = boss.x - player.x;
    const dy = boss.y - player.y;
    if(dx*dx + dy*dy <= radarRange*radarRange){
      const mx = cx + dx * scale;
      const my = cy + dy * scale;
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#fff";
      ctx.fillRect(mx-3, my-3, 6, 6);
    }
  }

  ctx.globalAlpha = 0.95;
  for(const e of enemies){
    if(e.hp <= 0) continue;
    if(e.type === "boss") continue;
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    if(dx*dx + dy*dy > radarRange*radarRange) continue;
    const mx = cx + dx * scale;
    const my = cy + dy * scale;
    if(e.type === "mage") ctx.fillStyle = "#aa55ff";
    else if(e.type === "archer") ctx.fillStyle = "#dddddd";
    else if(e.type === "orc") ctx.fillStyle = "#88cc44";
    else if(e.type === "demon") ctx.fillStyle = "#ff6644";
    else ctx.fillStyle = "#00ff66";
    ctx.fillRect(mx-1.5, my-1.5, 3, 3);
  }

  ctx.globalAlpha = 1;
  ctx.fillStyle = "#ff4444";
  ctx.fillRect(cx-2, cy-2, 4, 4);

  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 2;
  ctx.strokeRect(x0+1, y0+1, w-2, h-2);
  ctx.restore();
}

function drawOrbUI(){
  const btnRect = document.getElementById("attackBtn").getBoundingClientRect();
  const centerScreenX = btnRect.left + btnRect.width * 0.5;
  const centerScreenY = btnRect.top  + btnRect.height * 0.5;

  let cx = centerScreenX;
  let cy = centerScreenY - uiHeight;

  cx = Math.max(60, Math.min(canvas.width - 60, cx));
  cy = Math.max(60, Math.min(canvas.height - 60, cy));

  const orbR = 10;
  const ringR = 34;
  const startAngle = -Math.PI/2;

  const centerR = 24;
  const ready = (player.kiOrbs >= 1 && enemies.length > 0 && !player.ultiActive);

  orbUIState.cx = cx;
  orbUIState.cy = cy;
  orbUIState.centerR = centerR;
  orbUIState.ready = ready;

  ctx.save();

  for(let i=0;i<player.maxOrbs;i++){
    const a = startAngle + (i * (Math.PI * 2 / player.maxOrbs));
    const x = cx + Math.cos(a) * ringR;
    const y = cy + Math.sin(a) * ringR;

    ctx.beginPath();
    ctx.arc(x, y, orbR, 0, Math.PI*2);

    if(orbFlash > 0){
      ctx.fillStyle = "#00ff88";
      ctx.shadowColor = "#00ff88";
      ctx.shadowBlur = 35;
    }
    else if(i < player.kiOrbs){
      ctx.fillStyle = "#00ff55";
      ctx.shadowColor = "#00ff55";
      ctx.shadowBlur = 15;
    }
    else{
      ctx.fillStyle = "#002211";
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
    }

    ctx.fill();
  }

  ctx.shadowBlur = ready ? 25 : 10;
  ctx.shadowColor = ready ? "rgba(120,180,255,0.95)" : "rgba(120,180,255,0.4)";
  ctx.fillStyle = ready ? "rgba(40,120,255,0.95)" : "rgba(40,120,255,0.45)";
  ctx.beginPath();
  ctx.arc(cx, cy, centerR, 0, Math.PI*2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = "rgba(170,210,255,0.75)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, centerR+1, 0, Math.PI*2);
  ctx.stroke();

  ctx.globalAlpha = 0.95;
  ctx.fillStyle = "white";
  ctx.font = "bold 18px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("U", cx, cy+1);

  ctx.restore();
}

function drawHpOrb(){
  const bagBtn = document.getElementById('miniBagBtn');
  const bagRect = bagBtn ? bagBtn.getBoundingClientRect() : null;

  let x = bagRect ? (bagRect.left + bagRect.width * 0.5) : 82;
  let y = bagRect ? (bagRect.top + bagRect.height * 0.5 - 255) : 165;

  x = Math.max(48, Math.min(canvas.width - 48, x));
  y = Math.max(48, Math.min(canvas.height - 48, y));

  ctx.save();

  const radius = 25;
  hpWaveOffset += 0.07;

  const hpNow = Math.max(0, Number(player.hp || 0));
  const hpMax = Math.max(1, Number(player.maxHp || 1));
  const esNow = Math.max(0, Number(player.es || 0));
  const esMax = Math.max(0, Number(player.maxEs || 0));
  const hpPercent = Math.max(0, Math.min(1, hpNow / hpMax));
  const esPercent = esMax > 0 ? Math.max(0, Math.min(1, esNow / esMax)) : 0;
  const liquidHeight = radius * 2 * hpPercent;
  const topY = y + radius - liquidHeight;

  const metal = ctx.createRadialGradient(x, y, radius-10, x, y, radius+12);
  metal.addColorStop(0, '#2a0000');
  metal.addColorStop(0.5, '#550000');
  metal.addColorStop(1, '#110000');

  ctx.beginPath();
  ctx.arc(x, y, radius+10, 0, Math.PI*2);
  ctx.fillStyle = metal;
  ctx.fill();
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#000';
  ctx.stroke();

  if(esMax > 0){
    const shellOuter = radius + 13;
    const shellInner = radius + 6;
    const shellGlow = ctx.createRadialGradient(x, y, shellInner - 3, x, y, shellOuter + 10);
    shellGlow.addColorStop(0, 'rgba(80,180,255,0.00)');
    shellGlow.addColorStop(0.55, 'rgba(90,200,255,0.20)');
    shellGlow.addColorStop(0.82, 'rgba(90,200,255,0.42)');
    shellGlow.addColorStop(1, 'rgba(20,60,120,0.00)');
    ctx.beginPath();
    ctx.arc(x, y, shellOuter + 2, 0, Math.PI * 2);
    ctx.fillStyle = shellGlow;
    ctx.fill();

    // 에너지쉴드 외곽 보호막
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, shellOuter, 0, Math.PI * 2);
    ctx.arc(x, y, shellInner, 0, Math.PI * 2, true);
    ctx.closePath();
    const shellBand = ctx.createRadialGradient(x, y, shellInner, x, y, shellOuter);
    shellBand.addColorStop(0, 'rgba(70,150,255,0.08)');
    shellBand.addColorStop(0.45, 'rgba(90,190,255,0.28)');
    shellBand.addColorStop(0.75, 'rgba(135,235,255,0.58)');
    shellBand.addColorStop(1, 'rgba(170,250,255,0.12)');
    ctx.fillStyle = shellBand;
    ctx.fill('evenodd');

    // 현재 ES 양에 맞춰 차오르는 파란 보호막 링
    ctx.beginPath();
    ctx.arc(x, y, shellOuter - 1, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * esPercent, false);
    ctx.strokeStyle = '#96f2ff';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.shadowColor = 'rgba(120,220,255,0.8)';
    ctx.shadowBlur = 10;
    ctx.stroke();

    // 보호막 유리막 하이라이트
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(x - 9, y - 18, 15, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fill();
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(x, y, radius+6, 0, Math.PI*2);
  ctx.strokeStyle = esMax > 0 ? '#4aa6ff' : '#aa0000';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.clip();

  const innerShadow = ctx.createRadialGradient(x, y+15, 10, x, y, radius);
  innerShadow.addColorStop(0, '#330000');
  innerShadow.addColorStop(1, '#000000');
  ctx.fillStyle = innerShadow;
  ctx.fillRect(x-radius, y-radius, radius*2, radius*2);

  ctx.beginPath();
  ctx.moveTo(x-radius, y+radius);
  for(let i=0;i<=radius*2;i++){
    const wave = Math.sin(i*0.12 + hpWaveOffset) * 4;
    ctx.lineTo(x-radius+i, topY + wave);
  }
  ctx.lineTo(x+radius, y+radius);
  ctx.closePath();

  const fillGrad = ctx.createLinearGradient(0, topY, 0, y+radius);
  fillGrad.addColorStop(0, '#ff2a2a');
  fillGrad.addColorStop(1, '#8b0000');
  ctx.fillStyle = fillGrad;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x-15, y-20, 18, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fill();

  const glass = ctx.createRadialGradient(x-10, y-15, 5, x, y, radius);
  glass.addColorStop(0, 'rgba(255,255,255,0.25)');
  glass.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glass;
  ctx.fillRect(x-radius, y-radius, radius*2, radius*2);

  if(hpPercent < 0.3 && Math.floor(Date.now()/200)%2===0){
    ctx.beginPath();
    ctx.arc(x, y, radius+14, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,0,0,0.25)';
    ctx.fill();
  }

  ctx.textAlign = 'center';

  if(esMax > 0 && esNow > 0){
    const esLabel = `${Math.ceil(esNow)}`;
    ctx.font = 'bold 12px Arial';
    ctx.fillStyle = '#8ee8ff';
    ctx.strokeStyle = 'rgba(0,30,60,0.98)';
    ctx.lineWidth = 4;
    ctx.strokeText(esLabel, x, y - 7);
    ctx.fillText(esLabel, x, y - 7);
  }

  ctx.fillStyle = 'white';
  ctx.font = 'bold 18px Arial';
  ctx.strokeStyle = 'rgba(0,0,0,0.85)';
  ctx.lineWidth = 4;
  ctx.strokeText(Math.ceil(hpNow), x, y + 8);
  ctx.fillText(Math.ceil(hpNow), x, y + 8);

  ctx.restore();
}

function drawSkillOrbs(){
  if(!ctx || !player) return;

  const cs = player.chargeState || {};
  const frenzy = Math.max(0, Number(cs.frenzy ?? player.frenzyCharges ?? 0) || 0);
  const frenzyMax = Math.max(1, Number(cs.frenzyMax ?? player.frenzyChargeMax ?? 5) || 5);

  const endurance = Math.max(0, Number(cs.endurance ?? player.enduranceCharges ?? 0) || 0);
  const enduranceMax = Math.max(1, Number(cs.enduranceMax ?? player.enduranceChargeMax ?? 5) || 5);

  const frameNow = (typeof frameCount === "number" ? frameCount : 0);
  const frenzyPulse = Math.max(0, 1 - ((frameNow - (cs.frenzyLastGainFrame || player.frenzyLastGainFrame || 0)) / 18));
  const endurancePulse = Math.max(0, 1 - ((frameNow - (cs.enduranceLastGainFrame || player.enduranceLastGainFrame || 0)) / 18));
  const twinkle = (Math.sin(frameNow * 0.16) + 1) * 0.5;

  // ✅ drawHpOrb()와 완전히 같은 기준으로 생명력 구슬 중심을 잡는다.
  const bagBtn = document.getElementById("miniBagBtn");
  const bagRect = bagBtn ? bagBtn.getBoundingClientRect() : null;

  let hpCx = bagRect ? (bagRect.left + bagRect.width * 0.5) : 82;
  let hpCy = bagRect ? (bagRect.top + bagRect.height * 0.5 - 255) : 165;

  hpCx = Math.max(48, Math.min(canvas.width - 48, hpCx));
  hpCy = Math.max(48, Math.min(canvas.height - 48, hpCy));

  // HP 구슬(drawHpOrb 기준 radius=25, outer≈35)에 딱 붙는 값
  const orbR = 5.2;
  const orbGapPad = 1.2;
  const lifeOrbOuterR = 35;
  const arcRadius = lifeOrbOuterR + orbR + orbGapPad;
  const orbitCy = hpCy - 1.5;

  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);

  function drawChargeOrb(cx, cy, active, fillA, fillB, ring, pulse, isRed, orbIndex){
    const localTwinkle = active ? (0.35 + twinkle * 0.65) : 0.18;

    ctx.save();

    if(active){
      const aura = ctx.createRadialGradient(cx, cy, 0, cx, cy, orbR + 7 + pulse * 2);
      aura.addColorStop(0, fillA.replace('0.98', String(0.18 + pulse * 0.08)));
      aura.addColorStop(0.45, fillB.replace('0.95', String(0.10 + pulse * 0.06)));
      aura.addColorStop(1, "rgba(0,0,0,0)");
      ctx.beginPath();
      ctx.arc(cx, cy, orbR + 7 + pulse * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = aura;
      ctx.fill();

      if(pulse > 0){
        ctx.beginPath();
        ctx.arc(cx, cy, orbR + 2.5 + pulse * 1.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${0.08 + pulse * 0.10})`;
        ctx.fill();
      }
    }

    const g = ctx.createRadialGradient(cx - 1.6, cy - 2.4, 0.8, cx, cy, orbR + 1.4);
    if(active){
      g.addColorStop(0, fillA);
      g.addColorStop(0.48, fillB);
      g.addColorStop(0.84, isRed ? "rgba(70,8,8,0.98)" : "rgba(8,55,14,0.98)");
      g.addColorStop(1, "rgba(0,0,0,0.98)");
    }else{
      g.addColorStop(0, "rgba(110,110,110,0.14)");
      g.addColorStop(0.55, "rgba(50,50,50,0.26)");
      g.addColorStop(1, "rgba(10,10,10,0.72)");
    }

    ctx.beginPath();
    ctx.arc(cx, cy, orbR, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();

    if(active){
      const gloss = ctx.createRadialGradient(cx - 2.5, cy - 3.2, 0, cx - 2.5, cy - 3.2, orbR);
      gloss.addColorStop(0, `rgba(255,255,255,${0.24 * localTwinkle})`);
      gloss.addColorStop(0.6, `rgba(255,255,255,${0.07 * localTwinkle})`);
      gloss.addColorStop(1, "rgba(255,255,255,0)");
      ctx.beginPath();
      ctx.arc(cx - 0.8, cy - 0.8, orbR - 0.8, Math.PI * 1.08, Math.PI * 1.9);
      ctx.fillStyle = gloss;
      ctx.fill();
    }

    ctx.lineWidth = active ? 1.5 : 1.0;
    ctx.strokeStyle = active ? ring : "rgba(120,120,120,0.18)";
    ctx.stroke();

    if(active){
      ctx.beginPath();
      ctx.arc(cx - 1.5, cy - 1.5, orbR * 0.24, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.15 + 0.08 * localTwinkle})`;
      ctx.fill();

      if((frameNow + orbIndex * 5) % 24 < 8){
        ctx.beginPath();
        ctx.arc(cx + orbR * 0.10, cy - orbR * 0.45, 0.9 + pulse * 0.25, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${0.16 + 0.12 * localTwinkle})`;
        ctx.fill();
      }
    }

    ctx.restore();
  }

  function drawAdaptiveArcRow(count, max, side, fillA, fillB, ring, pulse, isRed){
    if(max <= 0) return;

    // 구슬끼리 겹치지 않게 기본 각도 자체를 넓히고,
    // 최대 충전 수가 늘면 더 빠르게 벌어진다.
    const baseSpread = 0.38;
    const extraSpread = Math.max(0, max - 4) * 0.15;
    const spread = Math.min(0.92, baseSpread + extraSpread);

    const centerAngle = (side === "left") ? Math.PI : 0;
    const startAngle = centerAngle - spread;
    const endAngle   = centerAngle + spread;
    const step = max === 1 ? 0 : (endAngle - startAngle) / (max - 1);

    for(let i=0;i<max;i++){
      const ang = startAngle + step * i;
      const cx = hpCx + Math.cos(ang) * arcRadius;
      const cy = orbitCy + Math.sin(ang) * arcRadius;
      drawChargeOrb(cx, cy, i < count, fillA, fillB, ring, pulse, isRed, i);
    }
  }

  drawAdaptiveArcRow(
    frenzy,
    frenzyMax,
    "left",
    "rgba(165,255,140,0.98)",
    "rgba(35,185,58,0.95)",
    "rgba(200,255,190,0.72)",
    frenzyPulse,
    false
  );

  drawAdaptiveArcRow(
    endurance,
    enduranceMax,
    "right",
    "rgba(255,135,135,0.98)",
    "rgba(190,25,25,0.95)",
    "rgba(255,170,170,0.72)",
    endurancePulse,
    true
  );

  ctx.restore();
}

function drawBossHpBar(){
  window.__bossBarState = window.__bossBarState || {
    visible: 0,
    chipHp: 0,
    lastBossId: null,
    intro: 0,
    lastName: "",
    deathAnim: 0,
    prevAlive: false,
    cachedMaxHp: 1,
    blinkT: 0
  };
  const st = window.__bossBarState;

  const liveBoss = enemies.find(e => e && e.type === "boss" && !e.dead && (e.hp || 0) > 0);
  const bossNear = !!liveBoss && Math.hypot((liveBoss.x || 0) - (player.x || 0), (liveBoss.y || 0) - (player.y || 0)) <= 560;
  const boss = bossNear ? liveBoss : null;
  const aliveNow = !!boss;

  if(aliveNow){
    const bossId = `${boss.type}:${boss.maxHp}:${Math.round(boss.x||0)}:${Math.round(boss.y||0)}`;
    if(st.lastBossId !== bossId){
      st.lastBossId = bossId;
      st.chipHp = Math.max(boss.hp || 0, boss.maxHp || 0);
      st.cachedMaxHp = Math.max(1, boss.maxHp || 1);
      st.intro = 1;
      st.deathAnim = 0;
      st.lastName = boss.displayName || boss.bossName || "BOSS";
    }
  }

  if(st.prevAlive && !aliveNow && st.lastBossId){
    st.deathAnim = 1;
    st.intro = 0;
    st.chipHp = 0;
  }
  st.prevAlive = aliveNow;

  const targetVisible = aliveNow ? 1 : (st.deathAnim > 0.001 ? 1 : 0);
  st.visible += (targetVisible - st.visible) * (aliveNow ? 0.22 : 0.14);
  if(st.visible < 0.01 && st.deathAnim <= 0.001 && !aliveNow) return;

  st.intro *= 0.88;
  if(st.intro < 0.001) st.intro = 0;

  if(st.deathAnim > 0){
    st.deathAnim *= 0.88;
    if(st.deathAnim < 0.001){
      st.deathAnim = 0;
      st.lastBossId = null;
      st.lastName = "";
    }
  }

  const alpha = Math.max(0, Math.min(1, st.visible));
  const hpNow = aliveNow ? Math.max(0, boss.hp || 0) : 0;
  const maxHpNow = aliveNow ? Math.max(1, boss.maxHp || 1) : Math.max(1, st.cachedMaxHp || 1);
  st.cachedMaxHp = maxHpNow;

  if(st.chipHp < hpNow) st.chipHp = hpNow;
  if(st.chipHp > hpNow){
    const diff = st.chipHp - hpNow;
    st.chipHp -= Math.max(1.0, diff * 0.08);
    if(st.chipHp < hpNow) st.chipHp = hpNow;
  }

  let percent = hpNow / maxHpNow;
  percent = Math.max(0, Math.min(1, percent));
  let chipPercent = st.chipHp / maxHpNow;
  chipPercent = Math.max(0, Math.min(1, chipPercent));

  let fillA = "#df443f";
  let fillB = "#b71c1c";
  if(percent <= 0.33){
    fillA = "#8d2541";
    fillB = "#531321";
  }else if(percent <= 0.66){
    fillA = "#ffb347";
    fillB = "#ff6f00";
  }

  st.blinkT += 0.18;
  const lowHpBlink = (percent <= 0.30 && aliveNow) ? (0.45 + 0.55 * (0.5 + 0.5 * Math.sin(st.blinkT * 2.6))) : 0;
  const deathT = 1 - Math.max(0, Math.min(1, st.deathAnim));
  const collapseScaleX = st.deathAnim > 0 ? (1 - deathT * 0.72) : 1;
  const collapseScaleY = st.deathAnim > 0 ? (1 - deathT * 0.92) : 1;
  const collapseDrop = st.deathAnim > 0 ? deathT * 10 : 0;

  const barW = 95;
  const barH = 8;
  const framePad = 4;
  const minimapW = 110;
  const minimapMargin = 12;
  const x = canvas.width - minimapW - minimapMargin - barW + 35;
  const y = 15 + collapseDrop;
  const name = (aliveNow && (boss.displayName || boss.bossName)) || st.lastName || "BOSS";

  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalAlpha = alpha;
  ctx.translate(x + barW/2, y + barH/2);
  ctx.scale(collapseScaleX, collapseScaleY);
  ctx.translate(-(x + barW/2), -(y + barH/2));

  const frameGrad = ctx.createLinearGradient(x, y - framePad, x, y + barH + framePad);
  frameGrad.addColorStop(0, "rgba(191,165,108,0.95)");
  frameGrad.addColorStop(0.45, "rgba(108,88,52,0.98)");
  frameGrad.addColorStop(0.55, "rgba(72,58,34,0.98)");
  frameGrad.addColorStop(1, "rgba(156,132,80,0.94)");
  ctx.fillStyle = frameGrad;
  ctx.fillRect(x - framePad, y - framePad, barW + framePad*2, barH + framePad*2);

  ctx.fillStyle = "rgba(18,10,8,0.92)";
  ctx.fillRect(x - 1, y - 1, barW + 2, barH + 2);

  const bgGrad = ctx.createLinearGradient(x, y, x, y + barH);
  bgGrad.addColorStop(0, "rgba(48,18,18,0.98)");
  bgGrad.addColorStop(1, "rgba(20,8,8,0.98)");
  ctx.fillStyle = bgGrad;
  ctx.fillRect(x, y, barW, barH);

  if(chipPercent > percent){
    ctx.fillStyle = "rgba(255,225,160,0.44)";
    ctx.fillRect(x, y, Math.round(barW * chipPercent), barH);
  }

  const fillGrad = ctx.createLinearGradient(x, y, x, y + barH);
  fillGrad.addColorStop(0, fillA);
  fillGrad.addColorStop(1, fillB);
  ctx.fillStyle = fillGrad;
  ctx.fillRect(x, y, Math.round(barW * percent), barH);

  if(lowHpBlink > 0.01){
    ctx.fillStyle = `rgba(255,40,40,${0.16 + lowHpBlink * 0.26})`;
    ctx.fillRect(x, y, barW, barH);
  }

  if(st.intro > 0.02){
    ctx.globalAlpha = alpha * Math.min(0.88, st.intro);
    const shineGrad = ctx.createLinearGradient(x, y, x, y + barH);
    shineGrad.addColorStop(0, "rgba(255,255,255,0.04)");
    shineGrad.addColorStop(0.5, "rgba(255,240,200,0.34)");
    shineGrad.addColorStop(1, "rgba(255,255,255,0.04)");
    ctx.fillStyle = shineGrad;
    const shineW = Math.max(12, Math.round(barW * 0.16));
    const shineX = x + Math.round((1 - st.intro) * (barW + shineW)) - shineW;
    ctx.fillRect(shineX, y, shineW, barH);
    ctx.globalAlpha = alpha;
  }

  ctx.strokeStyle = "rgba(255,248,220,0.28)";
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, barW - 1, barH - 1);

  ctx.strokeStyle = "rgba(70,48,22,0.95)";
  ctx.strokeRect(x - framePad + 0.5, y - framePad + 0.5, barW + framePad*2 - 1, barH + framePad*2 - 1);

  ctx.font = "bold 9px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.lineWidth = 2.2;
  ctx.strokeStyle = "rgba(0,0,0,0.82)";
  ctx.strokeText(name, x + barW/2, y + barH/2 + 0.5);
  ctx.fillStyle = "rgba(255,255,255,0.96)";
  ctx.fillText(name, x + barW/2, y + barH/2 + 0.5);

  ctx.restore();
}

function drawGameOver(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle="rgba(0,0,0,0.6)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.font="bold 40px Arial";
  ctx.textAlign="center";
  ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);

  ctx.font="bold 18px Arial";
  ctx.fillText("Tap to Restart", canvas.width/2, canvas.height/2 + 40);

function tryUltimate(){
  if(player.ultiActive) return;
  if(player.kiOrbs >= 1 && enemies.length > 0){
    player.kiOrbs -= 1;
    player.ultiActive = true;
    player.ultiTimer = 0;
    player.ultiCount = 0;
    performUltimateStrike();
    endUltimate();
  }
}

function handleUltimateOrbPress(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const tx = clientX - rect.left;
  const ty = clientY - rect.top;

  const dx = tx - orbUIState.cx;
  const dy = ty - orbUIState.cy;
  const r = orbUIState.centerR;

  if(dx*dx + dy*dy <= r*r){
    tryUltimate();
    return true;
  }
  return false;
}

  if(!it || !slot) return false;

function fmtIncPctFromMul(m){

function fmtPct(x, digits=1){

  const v = Math.round(p * Math.pow(10, digits)) / Math.pow(10, digits);
  // 0.0 같은 값이면 소수 없애기
  return (Math.abs(v - Math.round(v)) < 1e-9) ? String(Math.round(v)) : String(v);
}

function formatAffixReadable(mod){
  if(!mod) return "";

  // mod는 (1) roll object {kind, affix, tier, value} 또는 (2) affix object 자체일 수 있음
  const a = mod.affix || mod;
  const v = (typeof mod.value === "number") ? mod.value : a.value;

  const g = String(a.group || a.stat || a.id || "").toLowerCase();
  const name = a.name || a.id || "옵션";

  const num = (x)=> (typeof x==="number" && isFinite(x)) ? x : 0;
  const pct = (x)=>`${Math.round(num(x))}%`;
  const pct1 = (x)=>`${num(x).toFixed(1)}%`;

  // ===== 퍼센트/수치 표기 규칙 =====
  // - 피해/공속/범위/저항/치확/치피 등: %로 표기
  // - 최대체력/추가물리: 숫자
  // - 재생: /s

  // 피해(%) 
  if(g.includes("spell_damage")) return `주문 피해 +${pct(v)}`;
  if(g.includes("fire_damage")) return `화염 피해 +${pct(v)}`;
  if(g.includes("cold_damage")) return `냉기 피해 +${pct(v)}`;
  if(g.includes("light_damage")) return `번개 피해 +${pct(v)}`;
  if(g.includes("phys") && !g.includes("flat")) return `물리 피해 +${pct(v)}`;

  // flat phys
  if(g.includes("phys_flat")) return `추가 물리 피해 +${Math.round(num(v))}`;

  // 속도/범위
  if(g.includes("attackspeed")) return `공격 속도 +${pct(v)}`;
  if(g === "range" || g.includes("melee_range")) return `범위 +${pct(v)}`;

  // 치명
  if(g.includes("critchance")) return `치명타 확률 +${pct1(v)}`;
  if(g.includes("critmulti")) return `치명타 피해 +${pct(v)}`;

  // 생존
  if(g.includes("life_leech")) return `생명력 흡수 ${pct(v)}`;
  if(g.includes("life") || g.includes("maxhp")) return `최대 체력 +${Math.round(num(v))}`;
  if(g.includes("hpregen")) return `재생 +${num(v).toFixed(2)}/s`;

  // 방어/이속
  if(g.includes("armor_pct")) return `방어도 +${pct(v)}`;
  if(g.includes("movespeed")) return `이동 속도 +${pct(v)}`;

  // 저항
  if(g.includes("resist_all")) return `모든 저항 +${Math.round(num(v))}`;
  if(g.includes("resist_fire")) return `화염 저항 +${Math.round(num(v))}`;
  if(g.includes("resist_cold")) return `냉기 저항 +${Math.round(num(v))}`;
  if(g.includes("resist_light")) return `번개 저항 +${Math.round(num(v))}`;

  // fallback: name + value
  if(typeof v === "number"){
    // 값이 0~1 소수면 %로 표시해보기(구형 데이터 호환)
    if(v > 0 && v < 1) return `${name} +${pct(v*100)}`;
    return `${name} +${Math.round(num(v))}`;
  }
  return `${name}`;
}

function rarityLabel(it){
  const r = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
  if(r==="unique") return "유니크";
  if(r==="rare") return "레어";
  if(r==="magic") return "매직";
  return "노멀";
}

function getWeaponDisplayStats(it){
  if(!it || it.slot !== "weapon") return null;

  const baseMin = Number(player?.weapon?.min ?? 14);
  const baseMax = Number(player?.weapon?.max ?? 20);
  const td = it.totalData || it.data || {};

  const dmgMul = Number(td.dmgMul ?? 1);
  const flatPhys = Number(td.flatDamageAdd ?? td.flatDamage ?? 0);
  const fireFlat = Number(td.fireFlat ?? 0);
  const coldFlat = Number(td.coldFlat ?? 0);
  const lightningFlat = Number(td.lightningFlat ?? 0);

  const localPhysMin = it.noPhysicalDamage ? 0 : (baseMin * dmgMul + flatPhys);
  const localPhysMax = it.noPhysicalDamage ? 0 : (baseMax * dmgMul + flatPhys);

  let atkMul = Number(td.atkSpdMul ?? 0);
  if(!(atkMul > 0)) atkMul = Number(td.spdMul ?? it.attackSpeed ?? it.baseData?.spdMul ?? 1);
  if(!(atkMul > 0)) atkMul = 1;
  if(typeof td.atkSpdInc === "number" && Number.isFinite(td.atkSpdInc)) atkMul *= (1 + td.atkSpdInc);
  if(typeof td.atkSpdMore === "number" && Number.isFinite(td.atkSpdMore)) atkMul *= td.atkSpdMore;

  const min = Math.max(0, Math.floor(localPhysMin + fireFlat + coldFlat + lightningFlat));
  const max = Math.max(min, Math.floor(localPhysMax + fireFlat + coldFlat + lightningFlat));
  const avg = (min + max) / 2;
  const dps = avg * atkMul;

  return {
    min, max, atkMul, dps,
    flatPhys: it.noPhysicalDamage ? 0 : flatPhys,
    fireFlat, coldFlat, lightningFlat,
    dmgPct: Math.max(0, Math.round((dmgMul - 1) * 1000) / 10)
  };
}

function prettyItemHTML(it){
  if(!it) return "";

  const rCls = rarityClass(it);
  let html = `<div class="itemInfoWrap">`;

  // 1) 아이템 이름(등급 색)
  html += `<div class="itemInfoName ${rCls}">${escHtml(it.name || "")}</div>`;

  // 유니크(전설)는 예외 처리: 설명만 깔끔히
  if(it.isUnique){
    const desc = it.uniqueRef?.desc || it.desc || "";
    if(desc){
      html += `<div class="itemInfoLine itemInfoDim">${escHtml(desc)}</div>`;
    }
    html += `</div>`;
    return html;
  }

  // 2) 베이스 + ilvl + 베이스 티어
  const baseName = it.baseName || it.baseId || it.id || "";
  if(baseName){
    const bt = (typeof it.baseTier === "number") ? ` (티어 ${it.baseTier})` : "";
    html += `<div class="itemInfoLine itemInfoDim">베이스: ${escHtml(baseName)}${escHtml(bt)}</div>`;
  }
  if(typeof it.ilvl === "number"){
    html += `<div class="itemInfoLine itemInfoDim">아이템 레벨: ${it.ilvl}</div>`;
  }

  // 등급 표기
  html += `<div class="itemInfoLine itemInfoDim">등급: ${rarityLabel(it)}</div>`;

  const uniqueRarity = (rarityKey(it) === "unique");
  if(uniqueRarity && Array.isArray(it.uniqueLines) && it.uniqueLines.length){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">고유 옵션</div>`;
    for(const line of it.uniqueLines){
      if(!line) continue;
      html += `<div class="itemInfoLine">- ${escHtml(String(line))}</div>`;
    }
  }

  // 3) 암묵 옵션(Implicit) — 접두/접미와 완전 분리
  const imps = getAllItemImplicits(it);
  if(imps.length){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">암묵 옵션</div>`;
    for(const imp of imps){
      if(!imp) continue;
      // text가 있는 암묵만 출력 (헬퍼용 Min/Max 조각 등은 숨김)
      if(!imp.text) continue;
      const line = imp.text;
      html += `<div class="itemInfoLine">- ${escHtml(line)}</div>`;
    }
  }

  // 4) 베이스 옵션
  html += `<div class="itemInfoGap"></div>`;
  html += `<div class="itemInfoLine itemInfoDim">베이스 옵션</div>`;

  if(it.slot === "weapon"){
    const ws = getWeaponDisplayStats(it);
    if(ws){
      html += `<div class="itemInfoLine">- 공격력: ${ws.min} - ${ws.max}</div>`;
      html += `<div class="itemInfoLine">- 공격 속도: x${ws.atkMul.toFixed(2)}</div>`;
      html += `<div class="itemInfoLine">- DPS: ${ws.dps.toFixed(1)}</div>`;
    }
    if(typeof it.baseDamage === "number"){
      html += `<div class="itemInfoLine itemInfoDim">- 기본 무기 피해 +${Math.floor(it.baseDamage)}</div>`;
    }
  }

  if(it.baseData){
    const d = it.baseData;
    if(d.maxHpAdd) html += `<div class="itemInfoLine">- 최대 체력 +${Math.floor(d.maxHpAdd)}</div>`;
    if(d.esAdd)    html += `<div class="itemInfoLine">- 에너지 쉴드 +${Math.floor(d.esAdd)}</div>`;
    if(d.armorAdd) html += `<div class="itemInfoLine">- 방어력 +${Math.floor(d.armorAdd)}</div>`;
    if(d.hpRegen)  html += `<div class="itemInfoLine">- 재생 +${d.hpRegen.toFixed(2)}/s</div>`;
    if(d.castSpdMul && Math.abs(d.castSpdMul - 1) > 1e-9) html += `<div class="itemInfoLine">- 시전 속도 ${Math.round((d.castSpdMul - 1) * 100)}%</div>`;
    if(d.spellRangeMul && Math.abs(d.spellRangeMul - 1) > 1e-9) html += `<div class="itemInfoLine">- 주문 범위 ${Math.round((d.spellRangeMul - 1) * 100)}%</div>`;
    if(d.spellMul && Math.abs(d.spellMul - 1) > 1e-9) html += `<div class="itemInfoLine">- 주문 피해 ${Math.round((d.spellMul - 1) * 100)}%</div>`;
  }

  // 4) 접두 / 접미 옵션만 표시
  const aff = Array.isArray(it.affixes) ? it.affixes : [];
  const prefixes = aff.filter(a => a && a.affix && a.kind === "prefix");
  const suffixes = aff.filter(a => a && a.affix && a.kind === "suffix");

  if(prefixes.length){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">접두</div>`;
    for(const a of prefixes){
      const tier = a.tier ? ` <span class="itemInfoTier">T${a.tier}</span>` : "";
      const line = formatAffixReadable(a);
      html += `<div class="itemInfoLine">- ${escHtml(line)}${tier}</div>`;
    }
  }

  if(suffixes.length){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">접미</div>`;
    for(const a of suffixes){
      const tier = a.tier ? ` <span class="itemInfoTier">T${a.tier}</span>` : "";
      const line = formatAffixReadable(a);
      html += `<div class="itemInfoLine">- ${escHtml(line)}${tier}</div>`;
    }
  }

  if(rarityKey(it) === "unique" && it.flavorText){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">${escHtml(String(it.flavorText)).replace(/\n/g, '<br>')}</div>`;
  }

  html += `</div>`;
  return html;
}

function rebuildGearFromEquipment(){
  player.gear = {
    armorAdd: 0, armorMul: 1, maxHpAdd: 0, hpRegen: 0,
    critChanceAdd: 0, critChanceMul: 1, critMultiAdd: 0,
    playerDamageTakenMul: 1,
  };

  for(const slot of EQUIP_SLOTS){
    const it = equipment[slot];
    if(!it) continue;
    if(it.isUnique) continue;
    const d = it.totalData || it.data;
    if(!d) continue;
    for(const k in d){
      const v = d[k];
      if(typeof v !== "number") continue;
      if(k.endsWith("Mul")) player.gear[k] *= v;
      else player.gear[k] += v;
    }
  }
  recalcFromGear();
  player.hp = Math.min(player.hp, player.maxHp);
}

/* ===== 아이템 아이콘: 이모지 대신 캔버스에 간단 도형 ===== */
function drawItemIcon(c, it){
  const g = c.getContext("2d");
  const W = c.width, H = c.height;
  g.clearRect(0,0,W,H);

  // 바탕(어두운 칸에서도 아이콘이 "보이게" 하이라이트)
  g.save();
  g.globalAlpha = 1;
  g.fillStyle = "rgba(0,0,0,0.15)";
  g.fillRect(0,0,W,H);

  // 테두리(희귀도) — PoE식: normal(흰) / magic(파) / rare(노) / unique(주황)
  const rr = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
  g.lineWidth = 3;

  if(rr==="unique") g.strokeStyle = "#ff8a2b";
  else if(rr==="rare") g.strokeStyle = "#ffd166";
  else if(rr==="magic") g.strokeStyle = "#2f7bff";
  else g.strokeStyle = "#ffffff";

  // ✅ 동그라미 링 → 사각형 링(요청 반영)
  const pad = 4;
  if(rr === "unique"){
    g.save();
    g.shadowColor = "rgba(255,140,43,0.95)";
    g.shadowBlur = 16;
    g.strokeRect(pad, pad, W - pad*2, H - pad*2);
    g.restore();
  }
  g.strokeRect(pad, pad, W - pad*2, H - pad*2);

  // 슬롯이 없으면 빈칸
  if(!it){ g.restore(); return; }

  // 공통: 아이콘 중앙 정렬
  g.translate(W/2, H/2);
  g.globalAlpha = 0.98;

  // ===== 무기: 베이스 타입별 아이콘 =====
  if(it.slot==="weapon"){
    const baseId = it.baseId || it.id;
    const tmpl = getItemTemplateById(baseId);
    const tags = Array.isArray(tmpl?.tags) ? tmpl.tags : (Array.isArray(it?.tags) ? it.tags : []);
    const wt = tmpl?.weaponType || it?.weaponType || tmpl?.type || (() => {
      if(tags.includes("1h_sword") || (tags.includes("onehand") && tags.includes("sword"))) return "1h_sword";
      if(tags.includes("wand")) return "wand";
      if(tags.includes("1h_axe")   || (tags.includes("onehand") && tags.includes("axe")))   return "1h_axe";
      if(tags.includes("1h_mace")  || (tags.includes("onehand") && tags.includes("mace")))  return "1h_mace";
      if(tags.includes("2h_axe")   || (tags.includes("twohand") && tags.includes("axe")))   return "2h_axe";
      if(tags.includes("2h_mace")  || (tags.includes("twohand") && tags.includes("mace")))  return "2h_mace";
      if(tags.includes("warstaff")) return "warstaff";
      if(tags.includes("staff")) return "staff";
      return "2h_sword";
    })();

    g.save();
    g.scale(1.0, 1.0);
    g.lineWidth = 3;
    g.strokeStyle = "rgba(255,255,255,0.92)";
    g.fillStyle = "rgba(255,255,255,0.78)";

    if(wt==="1h_sword"){
      g.save();
      g.rotate(-0.28);
      g.beginPath();
      g.moveTo(-2, -13); g.lineTo(2, -13); g.lineTo(3, 5); g.lineTo(0, 11); g.lineTo(-3, 5);
      g.closePath(); g.fill();
      g.fillRect(-7, 3, 14, 3);
      g.fillRect(-1.5, 6, 3, 8);
      g.beginPath();
      g.arc(0, 15, 2.4, 0, Math.PI*2);
      g.fill();
      g.restore();
    }
    else if(wt==="1h_axe"){
      g.save();
      g.rotate(-0.2);
      g.fillRect(-1.5, -13, 3, 28);
      g.beginPath();
      g.moveTo(-1, -7);
      g.lineTo(-13, -12);
      g.lineTo(-12, 0);
      g.lineTo(-1, 2);
      g.closePath();
      g.fill();
      g.beginPath();
      g.moveTo(1, -6);
      g.lineTo(7, -9);
      g.lineTo(7, -2);
      g.lineTo(1, 1);
      g.closePath();
      g.fill();
      g.fillRect(-4, 8, 8, 3);
      g.restore();
    }
    else if(wt==="1h_mace"){
      g.save();
      g.rotate(-0.16);
      g.fillRect(-1.5, -12, 3, 27);
      g.fillRect(-7, -15, 14, 8);
      g.fillRect(-9, -13, 3, 2);
      g.fillRect(6, -13, 3, 2);
      g.fillRect(-1.5, -19, 3, 4);
      g.fillRect(-1.5, -7, 3, 3);
      g.beginPath();
      g.arc(0, 15, 2.2, 0, Math.PI*2);
      g.fill();
      g.restore();
    }
    else if(wt==="wand"){
      g.save();
      g.rotate(-0.28);
      g.fillRect(-1.5, -14, 3, 28);
      g.beginPath();
      g.arc(0, -17, 5.5, 0, Math.PI*2);
      g.fill();
      g.beginPath();
      g.arc(0, -17, 2.6, 0, Math.PI*2);
      g.clearRect(-1.3, -19.6, 2.6, 5.2);
      g.fillStyle = "rgba(255,255,255,0.92)";
      g.beginPath();
      g.arc(0, -17, 2.0, 0, Math.PI*2);
      g.fill();
      g.fillRect(-4, 8, 8, 3);
      g.restore();
    }
    else if(wt==="2h_sword"){
      g.beginPath();
      g.moveTo(-2, -16); g.lineTo(2, -16); g.lineTo(3, 10); g.lineTo(-3, 10);
      g.closePath(); g.fill();
      g.fillRect(-10, 6, 20, 3);
      g.fillRect(-2, 10, 4, 8);
    }
    else if(wt==="2h_axe"){
      g.fillRect(-2, -16, 4, 30);
      g.beginPath();
      g.moveTo(-2, -6);
      g.lineTo(-14, -12);
      g.lineTo(-14, 0);
      g.lineTo(-2, 2);
      g.closePath(); g.fill();
      g.beginPath();
      g.moveTo(2, -6);
      g.lineTo(8, -10);
      g.lineTo(8, 0);
      g.lineTo(2, 2);
      g.closePath(); g.fill();
      g.fillRect(-6, 8, 12, 3);
    }
    else if(wt==="2h_mace"){

      g.fillRect(-8, -18, 16, 10);
      g.fillRect(-10, -16, 4, 2);
      g.fillRect(6, -16, 4, 2);
      g.fillRect(-2, -22, 4, 4);
      g.fillRect(-2, -8, 4, 3);
    }
    else if(wt==="staff"){
      g.fillRect(-2, -16, 4, 30);
      g.beginPath();
      g.arc(0, -18, 6, 0, Math.PI*2);
      g.fill();
      g.fillRect(-4, 8, 8, 3);
    }
    else if(wt==="warstaff"){
      g.fillRect(-2, -16, 4, 30);
      g.fillRect(-8, -20, 16, 5);
      g.fillRect(-8, 12, 16, 5);
      g.fillRect(-5, -24, 10, 4);
      g.fillRect(-5, 17, 10, 4);
    }
    else{
      g.fillRect(-2, -16, 4, 30);
      g.fillRect(-10, 6, 20, 3);
    }

    g.restore();
  }

  // ===== 투구: "검투사 투구" =====
  else if(it.slot==="helm"){
    g.save();
    // 둥근 돔
    g.fillStyle = "#c7c7c7";
    g.beginPath();
    g.arc(0, -2, 13, Math.PI, 0);

    g.lineTo(13, -2);

    // 눈구멍(슬릿)
    g.fillStyle = "#1a1a1a";
    g.fillRect(-9, 1, 7, 3);
    g.fillRect(2, 1, 7, 3);

    g.fillStyle = "#eaeaea";
    g.fillRect(-1, -14, 2, 26);

    // 하이라이트
    g.globalAlpha = 0.25;
    g.fillStyle="#fff";

    g.arc(-5, -6, 10, Math.PI*1.05, Math.PI*1.55);
    g.strokeStyle="rgba(255,255,255,0.4)";

    g.stroke();

  // ===== 갑옷: "중세 기사 풀플레이트" =====

    g.globalAlpha = 1;
    g.fillStyle="#cfcfcf";
    g.fillRect(-3, -6, 6, 2);

    g.restore();
  }

  // 장갑
  else if(it.slot==="gloves"){
    g.save();
    g.fillStyle = "#d0d0d0";
    g.strokeStyle = "#868686";
    g.lineWidth = 2;
    g.beginPath();
    g.moveTo(-10,-8); g.lineTo(-2,-8); g.lineTo(-2,-2); g.lineTo(2,-2); g.lineTo(2,-8);
    g.lineTo(10,-8); g.lineTo(10,6); g.lineTo(6,10); g.lineTo(-6,10); g.lineTo(-10,6);

      g.beginPath();

      g.stroke();
      g.fillStyle = "#dfe8ff";
      g.beginPath();
      g.arc(-3, -6, 2.5, 0, Math.PI*2);
      g.fill();
      g.strokeStyle = "#8db4d9";
      g.beginPath();
      g.moveTo(-7, 5); g.quadraticCurveTo(0, -1, 7, 5);
      g.stroke();
      g.fillStyle = "#9c7a52";
      g.fillRect(-1.5, 5, 3, 10);
      g.fillRect(-6, 13, 12, 2);
    }else{
      g.fillStyle = "#bfc4cb";
      g.strokeStyle = "#6e747c";
      g.lineWidth = 2;
      g.beginPath();
      g.moveTo(0,-16); g.lineTo(11,-10); g.lineTo(12,4); g.lineTo(0,16); g.lineTo(-12,4); g.lineTo(-11,-10);
      g.closePath();
      g.fill();
      g.stroke();
      g.fillStyle = "rgba(255,255,255,0.28)";
      g.beginPath();
      g.moveTo(-4,-10); g.lineTo(2,-13); g.lineTo(6,-7); g.lineTo(-2,-4);
      g.closePath();
      g.fill();
      g.fillStyle = "#8b5e34";
      g.fillRect(-1.5,-4,3,14);
      g.fillStyle = "#8b939d";
      g.beginPath();
      g.arc(0,-1,3,0,Math.PI*2);
      g.fill();
    }
    g.restore();
  }

  // 벨트
  else if(it.slot==="belt"){
    g.save();
    g.translate(0, 2);
    g.fillStyle = "#7a5128";
    g.fillRect(-15,-6,30,12);
    g.strokeStyle = "#3b2310";
    g.lineWidth = 2;
    g.strokeRect(-15,-6,30,12);
    g.fillStyle = "#d0b06a";
    g.fillRect(-4,-4,8,8);
    g.strokeRect(-4,-4,8,8);
    g.restore();
  }
  // 플라스크
  else if(it.slot==="flask"){
    g.save();
    g.translate(0, 1);
    g.fillStyle = "#82d6ff";
    g.beginPath();
    g.moveTo(-7,-14); g.lineTo(7,-14); g.lineTo(10,-4); g.lineTo(10,8);
    g.quadraticCurveTo(10,16,0,16); g.quadraticCurveTo(-10,16,-10,8); g.lineTo(-10,-4);
    g.closePath();
    g.fill();
    g.strokeStyle = "#1b3d54";
    g.lineWidth = 2;
    g.stroke();
    g.fillStyle = "#d6c6a0";
    g.fillRect(-5,-18,10,6);
    g.restore();
  }
  // 그 외
  else{
    g.save();
    g.fillStyle="#999";
    g.fillRect(-10,-10,20,20);
    g.restore();
  }

  g.restore();
}

  if(selectedItem.from==="equip") return equipment[selectedItem.slot] || null;
  return null;
}

function getBaseWeaponStatsForPreview(){
  const num = (v, d=0) => {
    v = Number(v);
    return Number.isFinite(v) ? v : d;
  };

  const unarmed = (typeof getUnarmedWeaponProfile === 'function') ? getUnarmedWeaponProfile() : { min:2, max:4, attackSpeed:1 };
  let min = num(unarmed.min, 2);
  let max = num(unarmed.max, 4);
  let atk = Math.max(0.1, num(unarmed.attackSpeed, 1));

  try{
    const ew = (typeof equipment !== 'undefined' && equipment && equipment.weapon) ? equipment.weapon : null;
    if(ew && typeof getWeaponDisplayStats === 'function'){
      const ws = getWeaponDisplayStats(ew);
      if(ws){
        if(Number.isFinite(Number(ws.min))) min = Number(ws.min);
        if(Number.isFinite(Number(ws.max))) max = Number(ws.max);
        if(Number.isFinite(Number(ws.atkMul))) atk = Math.max(0.1, Number(ws.atkMul));
      }
    }
  }catch(_e){}

  const g = (player && player.gear) ? player.gear : null;
  const flat = num(g && (g.flatDamageAdd ?? g.flatDamage), 0);
  if(flat){
    min += flat;
    max += flat;
  }

  return { min, max, atk, avg:(min + max) * 0.5 };
}

function getActiveSkillPreviewData(){
  const num = (v, d=0) => {
    v = Number(v);
    return Number.isFinite(v) ? v : d;
  };
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const pkt = (phys=0, fire=0, cold=0, lightning=0, chaos=0) => ({ phys, fire, cold, lightning, chaos });
  const scalePkt = (p, k) => pkt((p.phys||0)*k, (p.fire||0)*k, (p.cold||0)*k, (p.lightning||0)*k, (p.chaos||0)*k);
  const sumPkt = (p) => (p.phys||0) + (p.fire||0) + (p.cold||0) + (p.lightning||0) + (p.chaos||0);

  const activeId = getActiveSkillId();
  const skill = getActiveSkillDefById(activeId) || { id:'attack', name:'기본 공격', tags:['attack'], source:'weapon', baseMul:1 };
  const supports = (typeof getApplicableSupportsForSkill === 'function') ? (getApplicableSupportsForSkill(skill) || []) : [];
  const supportIds = supports.map(s => s && s.id).filter(Boolean);
  const weapon = getBaseWeaponStatsForPreview();
  const g = (player && player.gear) ? player.gear : {};

  const tags = Array.isArray(skill.tags) ? skill.tags : [];
  const isAttack = tags.includes('attack');
  const isSpell = skill.source === 'spell' || tags.includes('spell');
  const isMelee = tags.includes('melee');
  const isProjectile = tags.includes('projectile');

  let speed = isSpell ? 1 : weapon.atk;
  let critChance = (typeof getCritChance === 'function') ? getCritChance() : 0.05;
  let critMulti = (typeof getCritMulti === 'function') ? getCritMulti() : 1.5;

  const activeGemLevel = getGemEffectiveLevel(activeId);
  const activeGemDamageMul = getActiveGemDamageMultiplier(activeGemLevel);
  const baseMul = Math.max(0.01, num(skill.baseMul, 1)) * activeGemDamageMul;

  if(skill.cooldownSec > 0) speed = 1 / Math.max(0.05, num(skill.cooldownSec, 0));
  if(skill.useTimeRatio) speed *= 1 / Math.max(0.05, num(skill.useTimeRatio, 1));
  if(skill.hitInterval) speed *= 60 / Math.max(1, num(skill.hitInterval, 60));

  function elementalTags(){
    const out = [];
    if(tags.includes('fire')) out.push('fire');
    if(tags.includes('cold')) out.push('cold');
    if(tags.includes('lightning')) out.push('lightning');
    if(tags.includes('chaos')) out.push('chaos');
    return out;
  }

  function spellPacketFor(v){
    const elems = elementalTags();
    if(elems.length === 0) return pkt(v, 0, 0, 0, 0);
    const out = pkt();
    const share = v / elems.length;
    for(const e of elems) out[e] += share;
    return out;
  }

  function attackPacketFor(baseRoll){
    const ew = (typeof equipment !== 'undefined' && equipment && equipment.weapon) ? equipment.weapon : null;
    if(!ew){
      return pkt(Math.max(0, baseRoll), 0, 0, 0, 0);
    }

    const td = ew.totalData || ew.data || {};
    const baseMin = num(player && player.weapon && player.weapon.min, 14);
    const baseMax = num(player && player.weapon && player.weapon.max, 20);
    const avgBase = (baseMin + baseMax) * 0.5;
    const dmgMul = Math.max(0, num(td.dmgMul, 1));
    const localFlatPhys = num(td.flatDamageAdd ?? td.flatDamage, 0);
    const globalFlatPhys = num(g.flatDamageAdd ?? g.flatDamage, 0);
    const fireFlat = num(td.fireFlat, 0);
    const coldFlat = num(td.coldFlat, 0);
    const lightFlat = num(td.lightningFlat, 0);

    const localPhys = ew.noPhysicalDamage ? 0 : Math.max(0, avgBase * dmgMul + localFlatPhys);
    const globalPhys = Math.max(0, globalFlatPhys);
    const avgTotalBase = Math.max(0.0001, localPhys + globalPhys + fireFlat + coldFlat + lightFlat);
    const ratio = Math.max(0, baseRoll) / avgTotalBase;

    let out = pkt(
      Math.max(0, (localPhys + globalPhys) * ratio),
      Math.max(0, fireFlat * ratio),
      Math.max(0, coldFlat * ratio),
      Math.max(0, lightFlat * ratio),
      0
    );

    let convert = num(ew.attackPhysToFire, 0);
    convert = Math.max(0, Math.min(1, convert));
    if(convert > 0 && out.phys > 0){
      const moved = out.phys * convert;
      out.phys -= moved;
      out.fire += moved;
    }

    const elems = elementalTags();
    if(out.phys > 0 && elems.length){
      const moved = out.phys;
      out.phys = 0;
      const share = moved / elems.length;
      for(const e of elems) out[e] += share;
    }

    return out;
  }

  let minPkt = isSpell ? spellPacketFor(num(skill.flatMin, 0)) : attackPacketFor(num(weapon.min, 0));
  let maxPkt = isSpell ? spellPacketFor(num(skill.flatMax, 0)) : attackPacketFor(num(weapon.max, 0));

  minPkt = scalePkt(minPkt, baseMul);
  maxPkt = scalePkt(maxPkt, baseMul);

  const addSupportFlat = (which, amount) => {
    if(!(amount > 0)) return;
    minPkt[which] = (minPkt[which] || 0) + amount;
    maxPkt[which] = (maxPkt[which] || 0) + amount;
  };

  if(supportIds.includes('meleePhysicalDamageSupport') && isMelee){
    const mul = scaleSupportMultiplierValue(1.45, getGemEffectiveLevel('meleePhysicalDamageSupport'));
    minPkt.phys *= mul; maxPkt.phys *= mul; speed *= 0.85;
  }
  if(supportIds.includes('multistrikeSupport') && isAttack && isMelee){ minPkt = scalePkt(minPkt, 0.80 * 3); maxPkt = scalePkt(maxPkt, 0.80 * 3); speed *= 1.20; }
  if(supportIds.includes('increasedCriticalStrikesSupport')) critChance += 0.12;
  if(supportIds.includes('increasedCriticalDamageSupport')) critMulti += scaleSupportAdditiveValue(0.60, getGemEffectiveLevel('increasedCriticalDamageSupport'));
  if(supportIds.includes('addedFireDamageSupport')){ const add = weapon.avg * scaleSupportAdditiveValue(0.28, getGemEffectiveLevel('addedFireDamageSupport')); addSupportFlat('fire', add); }
  if(supportIds.includes('addedColdDamageSupport')){ const add = weapon.avg * scaleSupportAdditiveValue(0.28, getGemEffectiveLevel('addedColdDamageSupport')); addSupportFlat('cold', add); }
  if(supportIds.includes('addedLightningDamageSupport')){ const add = weapon.avg * scaleSupportAdditiveValue(0.28, getGemEffectiveLevel('addedLightningDamageSupport')); addSupportFlat('lightning', add); }
  if(supportIds.includes('ruthlessSupport') && isMelee){ const mul = scaleSupportMultiplierValue(1.33, getGemEffectiveLevel('ruthlessSupport')); minPkt = scalePkt(minPkt, mul); maxPkt = scalePkt(maxPkt, mul); }
  if(supportIds.includes('fasterAttacksSupport') && isAttack) speed *= 1.22;
  if(supportIds.includes('elementalDamageWithAttacksSupport') && isAttack){ const mul = scaleSupportMultiplierValue(1.18, getGemEffectiveLevel('elementalDamageWithAttacksSupport')); minPkt.fire *= mul; minPkt.cold *= mul; minPkt.lightning *= mul; maxPkt.fire *= mul; maxPkt.cold *= mul; maxPkt.lightning *= mul; }
  if(supportIds.includes('brutalitySupport') && isAttack){ const mul = scaleSupportMultiplierValue(1.50, getGemEffectiveLevel('brutalitySupport')); minPkt.phys *= mul; maxPkt.phys *= mul; minPkt.fire = 0; minPkt.cold = 0; minPkt.lightning = 0; minPkt.chaos = 0; maxPkt.fire = 0; maxPkt.cold = 0; maxPkt.lightning = 0; maxPkt.chaos = 0; }
  if(supportIds.includes('controlledDestructionSupport') && isSpell){ const mul = scaleSupportMultiplierValue(1.40, getGemEffectiveLevel('controlledDestructionSupport')); minPkt = scalePkt(minPkt, mul); maxPkt = scalePkt(maxPkt, mul); critChance *= 0.20; }
  if(supportIds.includes('fasterCastingSupport') && isSpell) speed *= 1.22;
  if(supportIds.includes('spellEchoSupport') && isSpell){ minPkt = scalePkt(minPkt, 2.0); maxPkt = scalePkt(maxPkt, 2.0); }
  if(supportIds.includes('spellbladeSupport') && isSpell){ const add = weapon.avg * scaleSupportAdditiveValue(0.60, getGemEffectiveLevel('spellbladeSupport')); addSupportFlat('phys', add); }
  if(supportIds.includes('castOnCriticalSupport')){ minPkt = scalePkt(minPkt, 0.75); maxPkt = scalePkt(maxPkt, 0.75); }
  if(supportIds.includes('greaterMultipleProjectilesSupport') && isProjectile){ minPkt = scalePkt(minPkt, 5 * 0.65); maxPkt = scalePkt(maxPkt, 5 * 0.65); }

  const previewProjectileCount = (activeId === 'moltenStrike') ? getMoltenStrikeProjectileCount(activeGemLevel) : num(skill.projectileCount, 0);
  if(skill.repeats && !supportIds.includes('multistrikeSupport')){ const mul = num(skill.repeats, 1); minPkt = scalePkt(minPkt, mul); maxPkt = scalePkt(maxPkt, mul); }
  if(previewProjectileCount && !supportIds.includes('greaterMultipleProjectilesSupport')){ const mul = Math.max(1, previewProjectileCount); minPkt = scalePkt(minPkt, mul); maxPkt = scalePkt(maxPkt, mul); }
  if(skill.impacts){ const impactMul = Math.max(1, num(skill.impacts, 1) * 0.45); minPkt = scalePkt(minPkt, impactMul); maxPkt = scalePkt(maxPkt, impactMul); }

  let min = sumPkt(minPkt);
  let max = sumPkt(maxPkt);
  const ctx = buildCombatCtx(activeId, null);
  ctx.__supportsPreapplied = true;
  ctx.skillId = activeId;
  ctx.activeSkillId = activeId;
  try{
    if(typeof computeFinalDamage === 'function'){
      const minRes = computeFinalDamage(minPkt, ctx, { canCrit:false });
      const maxRes = computeFinalDamage(maxPkt, ctx, { canCrit:false });
      min = num(minRes && minRes.dealt, min);
      max = num(maxRes && maxRes.dealt, max);
    }
  }catch(_e){}

  if(isSpell){
    speed = Math.max(0.1, speed * num(player && player.castSpeedMul, num(g.castSpdMul, 1)));
  }else{
    speed = Math.max(0.1, speed * num(g.atkSpdMul, 1));
  }

  critChance = clamp(critChance, 0, 0.95);
  const avg = (min + max) * 0.5;
  const critFactor = 1 + critChance * (Math.max(1, critMulti) - 1);
  const dps = Math.max(0, avg * critFactor * Math.max(0.1, speed));

  const out = {
    activeId,
    name: skill.name || '기본 공격',
    gemNaturalLevel: getGemNaturalLevel(activeId),
    gemEffectiveLevel: activeGemLevel,
    gemLevelBonus: getGemLevelBonus(activeId),
    min: Math.max(0, Math.round(min)),
    max: Math.max(0, Math.round(max)),
    speed: Math.max(0.1, speed),
    critChancePct: critChance * 100,
    critMultiPct: Math.max(1, critMulti) * 100,
    dps,
    supportIds,
    skill
  };
  window.__getActiveSkillPreviewData = getActiveSkillPreviewData;
  window.getActiveSkillPreviewData = getActiveSkillPreviewData;
  return out;
}

function buildExtendedSpecText(){
  syncPlayerVitalDisplay();
  const g = player.gear || {};
  const pv = getActiveSkillPreviewData();
  const hpNow = Number(player.hp ?? 0);
  const hpMax = Number(player.maxHp ?? Math.max(1, Number(player.baseMaxHp ?? 100) + Number(g.maxHpAdd ?? 0) + Number(g.maxLife ?? 0)));
  const esNow = Number(player.es ?? 0);
  const esMax = Number(player.maxEs ?? 0);
  const armor = Number(player.armor ?? 0);
  const hpRegen = player.energyShieldMode ? 0 : Number(g.hpRegen ?? 0);
  const lifeLeechPct = Number(g.lifeLeech ?? 0) * 100;
  const hpOnHit = Number(g.hpOnHit ?? 0);
  const hpOnKill = Number(g.hpOnKill ?? 0);
  const fireRes = Number(player.fireRes ?? g.fireResAdd ?? 0);
  const coldRes = Number(player.coldRes ?? g.coldResAdd ?? 0);
  const lightRes = Number(player.lightRes ?? g.lightResAdd ?? 0);
  const chaosRes = Number(player.chaosRes ?? g.chaosResAdd ?? 0);
  const isSpell = (pv.skill && pv.skill.source === 'spell') || (Array.isArray(pv.skill && pv.skill.tags) && pv.skill.tags.includes('spell'));
  const speedLabel = isSpell ? '시전 속도' : '공격 속도';

  return `[캐릭터 정보]
현재 스킬: ${pv.name}
최종 피해: ${pv.min} ~ ${pv.max}
치명타 확률: ${pv.critChancePct.toFixed(1)}%
치명타 피해배율: ${Math.max(100, pv.critMultiPct).toFixed(0)}%
${speedLabel}: ${pv.speed.toFixed(2)}

생명력: ${hpNow.toFixed(0)} / ${hpMax.toFixed(0)}
에너지 쉴드: ${esNow.toFixed(0)} / ${esMax.toFixed(0)}
방어도: ${armor.toFixed(0)}
초당 생명력 재생: ${hpRegen.toFixed(2)}
에너지 쉴드 충전: ${(esMax * Number(player.esRechargeRate || 0.20)).toFixed(1)}/s

공격 피해: ${fmtIncPctFromMul(g.dmgMul ?? 1)}
공격 속도: ${fmtIncPctFromMul(g.atkSpdMul ?? 1)}
사거리: ${fmtIncPctFromMul(g.rangeMul ?? 1)}

시전 속도: ${fmtIncPctFromMul(g.castSpdMul ?? 1)}
주문 범위: ${fmtIncPctFromMul(g.spellRangeMul ?? 1)}

치명타 확률: ${(getCritChance() * 100).toFixed(1)}%
치명타 피해 배율: ${(getCritMulti() * 100).toFixed(0)}%

생명력 흡수: ${lifeLeechPct.toFixed(1)}%
적중 시 생명력 회복: +${Math.round(hpOnHit)}
처치 시 생명력 회복: +${Math.round(hpOnKill)}

화염 저항: ${fireRes.toFixed(0)}%
냉기 저항: ${coldRes.toFixed(0)}%
번개 저항: ${lightRes.toFixed(0)}%
카오스 저항: ${chaosRes.toFixed(0)}%

이동 속도: ${fmtIncPctFromMul(g.spdMul ?? 1)}`;
}

function renderCraftPanel(){

  if(orbDescEl) orbDescEl.textContent = "오브를 선택하면 설명이 표시됩니다.";
  const it = getSelectedItem();

  // 오브 카운트 표시
  if(orbCountsEl){
    orbCountsEl.textContent =
      `변환 ${transmuteOrbs}  변화 ${alterationOrbs}
` +
      `증강 ${augmentationOrbs}  제왕 ${regalOrbs}
` +
      `연금 ${alchemyOrbs}  카오스 ${chaosOrbs}
` +
      `세공 ${scouringOrbs}  승격 ${exaltedOrbs}
` +
      `소멸 ${annulOrbs}  신성 ${divineOrbs}  타락 ${corruptOrbs}`;
  }

  // 기본 비활성
  const btns = [btnTransmute,btnAlter,btnAug,btnRegal,btnAlchemy,btnChaos,btnScour,btnExalt,btnAnnul,btnDivine,btnCorrupt];
  for(const b of btns){ if(b) b.disabled = true; }

  if(!it){
    craftItemTextEl.innerHTML = "<div style='color:#bbb'>아이템을 먼저 선택하세요.</div>";
    return;
  }

  const r = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
  const affCnt = Array.isArray(it.affixes) ? it.affixes.length : 0;

  if(it.corrupted){
    craftItemTextEl.innerHTML = "<div style='color:#bbb'>타락된 아이템은 더 이상 제작할 수 없습니다.</div>" + prettyItemHTML(it);
    return;
  }

  if(r === "unique"){
    if(btnCorrupt) btnCorrupt.disabled = !(typeof corruptOrbs === "number" && corruptOrbs > 0);
    craftItemTextEl.innerHTML = "<div style='color:#bbb'>유니크 아이템은 타락의 오브만 사용할 수 있습니다.</div>" + prettyItemHTML(it);
    try{ drawItemIcon(craftItemIconCv, it); }catch(e){}
    return;
  }

  // 조건별 버튼 활성
  if(btnTransmute) btnTransmute.disabled = !(transmuteOrbs>0 && r==="normal");
  if(btnAlter)     btnAlter.disabled     = !(alterationOrbs>0 && r==="magic");
  if(btnAug)       btnAug.disabled       = !(augmentationOrbs>0 && r==="magic" && affCnt < 2);
  if(btnRegal)     btnRegal.disabled     = !(regalOrbs>0 && r==="magic" && affCnt>=1);
  if(btnAlchemy)   btnAlchemy.disabled   = !(alchemyOrbs>0 && r==="normal");
  if(btnChaos)     btnChaos.disabled     = !(chaosOrbs>0 && r==="rare");
  if(btnScour)     btnScour.disabled     = !(scouringOrbs>0 && r!=="normal");
  if(btnExalt)     btnExalt.disabled     = !(exaltedOrbs>0 && r==="rare" && affCnt < maxAffixesForRarity(r));
  if(btnAnnul)     btnAnnul.disabled     = !(annulOrbs>0 && affCnt > 0);
  if(btnDivine)    btnDivine.disabled    = !(divineOrbs>0 && affCnt > 0);
  if(btnCorrupt)   btnCorrupt.disabled   = !(typeof corruptOrbs === "number" && corruptOrbs > 0);

  craftItemTextEl.innerHTML = prettyItemHTML(it);

  try{ drawItemIcon(craftItemIconCv, it); }catch(e){}
}

/* ===== 장착/해제 ===== */
function equipFromBagToSlot(invIndex, slot){
  const it = inventory[invIndex];
  if(!it) return;
  if(it.isUnique) return;

  if(slot === "flask") slot = resolveAutoEquipSlotForItem(it) || slot;
  if(!isItemCompatibleWithEquipSlot(it, slot)) return;

  if(slot === "weapon"){
    const isTwoHand = itemHasTag(it, "twohand");
    if(isTwoHand && equipment.offhand){
      inventory.push(equipment.offhand);
      equipment.offhand = null;
    }
  }
  if(slot === "offhand"){
    const main = equipment && equipment.weapon;
    if(main && itemHasTag(main, "twohand")) return;
  }

  if(equipment[slot]) inventory.push(equipment[slot]);
  inventory.splice(invIndex, 1);
  equipment[slot] = it;

  selectedItem = {from:"equip", slot};
  rebuildGearFromEquipment();
  renderAllPanels();

  _callHook('afterEquip', slot, equipment[slot]);
}

function unequipSlotToBag(slot){
  const it = equipment[slot];
  if(!it) return;
  equipment[slot] = null;
  inventory.push(it);
  selectedItem = null;
  rebuildGearFromEquipment();
  renderAllPanels();

  _callHook('afterUnequip', slot);
}

/* ✅ POE 전용 제작(오브) 시스템  */
/* ============================= */

function rebuildItemInstanceFromAffixes(it, baseId, tmpl, rarity, ilvl, tags, affixes){
  const baseData = buildBaseDataFromItemId(baseId);
  const safeAff = Array.isArray(affixes) ? clampAffixLimits(affixes, rarity) : [];

  if(!Array.isArray(it.implicits)) it.implicits = Array.isArray(tmpl.implicits) ? tmpl.implicits.slice() : [];
  if(!Array.isArray(it.corruptImplicits)) it.corruptImplicits = [];
  const mods = buildItemMods(baseId, baseData, safeAff, tags, it);
  let affixData = buildAffixDataFromMods(mods);
  const rr = normalizeRarity(it?.isUnique ? "unique" : (rarity || it?.rarity || "normal"));
  if(rr === "unique" && it && it.uniqueData){
    affixData = mergeItemData(affixData, it.uniqueData);
  }
  const implicitData = (rr === "unique" && it && it.uniqueData)
    ? buildImplicitDataFromItemLike({ corruptImplicits: it.corruptImplicits }, { includeBase:false, includeCorrupt:true })
    : buildImplicitDataFromItemLike(it);
  affixData = mergeItemData(affixData, implicitData);
  const totalData = mergeItemData(baseData, affixData);

  const preNames = safeAff.filter(x=>x.kind==="prefix").map(x=>x.affix.name);
  const sufNames = safeAff.filter(x=>x.kind==="suffix").map(x=>x.affix.name);

  // 이름 규칙(PoE):
  // - normal: 베이스명
  // - magic : (접두) 베이스 (접미)  ※ 접두/접미 각각 최대 1개만 표시
  // - rare  : 레어 전용 2단어 이름(베이스명 대신)
  // - unique: (유니크는 템플릿/아이템에 이미 이름이 있으면 그걸 유지)
  let nm = tmpl.name;

  if(rarity === "magic"){
    const pre = preNames[0] || "";
    const suf = sufNames[0] || "";
    if(pre && suf) nm = pre + " " + nm + " " + suf;
    else if(pre) nm = pre + " " + nm;
    else if(suf) nm = nm + " " + suf;
  }else if(rarity === "rare"){
    nm = rollRareName();
  }else if(rarity === "unique"){
    nm = (it.uniqueName || tmpl.uniqueName || it.name || tmpl.name);
  }

  it.baseId = baseId;
  it.baseName = tmpl.name;
  it.name = nm;
  it.rarity = rarity;
  it.ilvl = ilvl;

  it.baseData = baseData;
  it.tags = tags;
  it.affixes = safeAff;
  it.mods = mods;

  it.affixData = affixData;
  it.totalData = totalData;
  it.data = totalData;

  it.shownDesc = (tmpl.descGen ? tmpl.descGen(totalData) : (it.shownDesc || ""));
}

function setCraftMsg(msg){ try{ const d=document.getElementById("orbDesc"); if(d) d.textContent=msg; }catch(e){} }

function craftOnSelected(type){
  // ✅ 타락된 아이템은 어떤 크래프팅도 불가능
  try{
    const itLock = (typeof selectedItem!=="undefined" && selectedItem) ? getSelectedItem()
                 : (typeof craftSelectedItem!=="undefined" && craftSelectedItem) ? craftSelectedItem
                 : (typeof currentCraftItem!=="undefined" && currentCraftItem) ? currentCraftItem
                 : null;
    const itCheck = itLock || (typeof getSelectedItem==="function" ? getSelectedItem() : null);
    if(itCheck && itCheck.corrupted){
      const d = document.getElementById("orbDesc");
      if(d) d.textContent = "타락된 아이템은 크래프팅할 수 없습니다.";
      return;
    }
  }catch(e){}

  const sel = selectedItem;
  if(!sel) return;

  const it = getSelectedItem();
  if(!it) return;

  const itemRarity = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
  if(it.corrupted) return;
  if(itemRarity === "unique" && type !== "corrupt") return;

  const baseId = it.baseId || it.id;
  const tmpl = getItemTemplateById(baseId);
  if(!tmpl) return;

  const ilvl = it.ilvl || getItemLevel();
  const tags = inferItemTagsFromTemplate(tmpl, baseId);

  const curR = it.rarity || "normal";
  const curAff = clampAffixLimits(Array.isArray(it.affixes) ? it.affixes.slice() : [], curR);

  function spend(refName){
    // refName: string variable name
    if(refName === "transmuteOrbs"){ if(transmuteOrbs<=0) return false; transmuteOrbs--; return true; }
    if(refName === "alterationOrbs"){ if(alterationOrbs<=0) return false; alterationOrbs--; return true; }
    if(refName === "augmentationOrbs"){ if(augmentationOrbs<=0) return false; augmentationOrbs--; return true; }
    if(refName === "regalOrbs"){ if(regalOrbs<=0) return false; regalOrbs--; return true; }
    if(refName === "alchemyOrbs"){ if(alchemyOrbs<=0) return false; alchemyOrbs--; return true; }
    if(refName === "chaosOrbs"){ if(chaosOrbs<=0) return false; chaosOrbs--; return true; }
    if(refName === "scouringOrbs"){ if(scouringOrbs<=0) return false; scouringOrbs--; return true; }
    if(refName === "exaltedOrbs"){ if(exaltedOrbs<=0) return false; exaltedOrbs--; return true; }
    if(refName === "annulOrbs"){ if(annulOrbs<=0) return false; annulOrbs--; return true; }
    if(refName === "divineOrbs"){ if(divineOrbs<=0) return false; divineOrbs--; return true; }
    if(refName === "corruptOrbs"){ if(typeof corruptOrbs!=="number"||corruptOrbs<=0) return false; corruptOrbs--; return true; }
    return false;
  }

  let nextR = curR;
  let nextAff = curAff;

  // 제작 규칙(간소화 PoE):
  if(type === "transmute"){
    if(curR !== "normal") return;
    if(!spend("transmuteOrbs")) return;
    nextR = "magic";
    nextAff = rollAffixesPOE("magic", ilvl, tags, { tmpl, baseId });
  }
  else if(type === "alter"){
    if(curR !== "magic") return;
    if(!spend("alterationOrbs")) return;
    nextR = "magic";
    nextAff = rollAffixesPOE("magic", ilvl, tags, { tmpl, baseId });
  }
  else if(type === "aug"){
    if(curR !== "magic") return;
    if(curAff.length >= 2) return;
    if(!spend("augmentationOrbs")) return;
    nextR = "magic";
    nextAff = rollAffixesPOE("magic", ilvl, tags, { tmpl, baseId, existingAffixes:curAff, keepExisting:true, total: curAff.length+1, add:true });
  }
  else if(type === "regal"){
    if(curR !== "magic") return;
    if(curAff.length < 1) return;
    if(!spend("regalOrbs")) return;
    nextR = "rare";
    nextAff = rollAffixesPOE("rare", ilvl, tags, { tmpl, baseId, existingAffixes:curAff, keepExisting:true, total: curAff.length+1, add:true });
  }
  else if(type === "alchemy"){
    if(curR !== "normal") return;
    if(!spend("alchemyOrbs")) return;
    nextR = "rare";
    nextAff = rollAffixesPOE("rare", ilvl, tags, { tmpl, baseId });
  }
  else if(type === "chaos"){
    if(!(curR === "rare" || curR === "rare")) return;
    if(!spend("chaosOrbs")) return;
    nextR = curR;
    nextAff = rollAffixesPOE(nextR, ilvl, tags, { tmpl, baseId });
  }
  else if(type === "scour"){
    if(curR === "normal") return;
    if(!spend("scouringOrbs")) return;
    nextR = "normal";
    nextAff = [];
  }
  else if(type === "exalt"){
    if(!(curR === "rare" || curR === "rare")) return;
    if(curAff.length >= maxAffixesForRarity(curR)) return;
    if(!spend("exaltedOrbs")) return;
    nextR = curR;
    nextAff = rollAffixesPOE(nextR, ilvl, tags, { tmpl, baseId, existingAffixes:curAff, keepExisting:true, total: curAff.length+1, add:true });
  }
  else if(type === "annul"){
    if(curAff.length <= 0) return;
    if(!spend("annulOrbs")) return;
    nextR = curR;
    const k = (Math.random()*curAff.length)|0;
    nextAff = curAff.slice();
    nextAff.splice(k, 1);
    // affix가 0이면 normal로 떨어뜨리지는 않음(원하면 바꿀 수 있음)
    if(nextR === "magic" && nextAff.length === 0) nextR = "normal";
  }
  else if(type === "divine"){
    if(curAff.length <= 0) return;
    if(!spend("divineOrbs")) return;
    nextR = curR;
    nextAff = rerollValuesPOE(curAff, ilvl);
  }
  else if(type === "corrupt"){
    if(!spend("corruptOrbs")) return;
    it.corrupted = true;
    if(!Array.isArray(it.implicits)) it.implicits = Array.isArray(tmpl.implicits) ? tmpl.implicits.slice() : [];
    if(!Array.isArray(it.corruptImplicits)) it.corruptImplicits = [];

    const added = (Math.random() < 0.5) ? rollCorruptImplicitForItem(it) : null;
    if(added){
      it.corruptImplicits.push(added);
      rebuildItemInstanceFromAffixes(it, baseId, tmpl, curR, ilvl, tags, curAff);
      if(sel.from === "equip"){
        equipment[sel.slot] = it;
        rebuildGearFromEquipment();
      }
      setCraftMsg(`타락 임플릿 추가: ${added.text}`);
    }else{
      if(sel.from === "equip"){
        equipment[sel.slot] = it;
        rebuildGearFromEquipment();
      }
      setCraftMsg("타락되었지만 아무 변화도 일어나지 않았습니다.");
    }
    renderAllPanels();
    return;
  }

  rebuildItemInstanceFromAffixes(it, baseId, tmpl, nextR, ilvl, tags, nextAff);

  // 장비/가방 위치에 따라 반영 + 스탯 재계산
  if(sel.from === "equip"){
    equipment[sel.slot] = it;
    rebuildGearFromEquipment();
  }

  renderAllPanels();
}
