/* =========================================================
   STEP 2) createItemInstance()에서 mods 생성 병행
   - 기존 data/affixData/totalData 로직은 그대로 유지
   - item.tags / item.mods 를 추가로 만들어 둠 (아직 계산에 미사용)
   ========================================================= */

function inferItemTagsFromTemplate(tmpl, baseId){
  const tags = [];
  if(tmpl && tmpl.slot) tags.push(tmpl.slot);
  tags.push("gear");

  // baseId 기반 가벼운 분류(나중에 아이템 DB 확장 시 교체)
  const id = String(baseId||"").toLowerCase();
  if(id.includes("ring")) tags.push("jewelry");
  if(id.includes("dmg") || id.includes("ulti")) tags.push("damage");
  if(id.includes("speed")) tags.push("speed");
  if(id.includes("armor")) tags.push("defense");
  if(id.includes("hp") || id.includes("regen")) tags.push("life");

  // slot 기반 분류
  if(tmpl && tmpl.slot === "weapon") tags.push("attack");
  if(tmpl && (tmpl.slot === "helm" || tmpl.slot === "chest" || tmpl.slot === "gloves" || tmpl.slot === "boots")) tags.push("defense");
  if(tmpl && !Array.isArray(tmpl.tags)){
    const bd = tmpl.baseData || tmpl.baseStats || {};
    if(typeof bd.armorAdd === "number" || typeof bd.armorMul === "number") tags.push("armor");
    if(typeof bd.esAdd === "number" || typeof bd.esInc === "number") tags.push("es");
  }

  // ✅ 템플릿이 tags를 제공하면 같이 합친다
  if(tmpl && Array.isArray(tmpl.tags)){
    for(const t of tmpl.tags) tags.push(t);
  }

  return mergeTags(tags);
}

const MUL_KEYS = Object.freeze(["dmgMul","rangeMul","spdMul","atkSpdMul","castSpdMul","spellRangeMul","spellMul","fireMul","coldMul","lightMul","chaosMul","critChanceMul","hpMul","armorMul"]);

function keyToModOp(statKey){
  // 현재 아이템 데이터 스키마에서 mul 계열은 "more"로 취급
  return (MUL_KEYS.includes(statKey) ? MOD_OPS.more : MOD_OPS.add);
}

function makeBaseModsFromBaseData(baseId, baseData, itemTags){
  const mods = [];
  if(!baseData) return mods;

  for(const k of Object.keys(baseData)){
    const v = baseData[k];
    if(typeof v !== 'number' || !Number.isFinite(v)) continue;
    if(k.endsWith('Mul')){
      if(Math.abs(v - 1) <= 1e-9) continue;
      mods.push({
        id: `base:${baseId}:${k}`,
        source: 'base',
        scope: 'gear',
        stat: k,
        op: MOD_OPS.more,
        value: (v - 1),
        requiresAll: itemTags,
        requiresAny: [],
        forbids: []
      });
    }else{
      if(Math.abs(v) <= 1e-9) continue;
      mods.push({
        id: `base:${baseId}:${k}`,
        source: 'base',
        scope: 'gear',
        stat: k,
        op: MOD_OPS.add,
        value: v,
        requiresAll: itemTags,
        requiresAny: [],
        forbids: []
      });
    }
  }
  return mods;
}

const CORRUPT_IMPLICIT_POOL = Object.freeze([
  { id:"corr_life", stat:"maxHpAdd", min:8, max:12, text:v=>`최대 체력 +${Math.round(v)}` },
  { id:"corr_armor_pct", stat:"armorMul", op:"more", min:0.10, max:0.16, step:0.02, text:v=>`방어도 ${Math.round(v*100)}% 증가` },
  { id:"corr_es_pct", stat:"esInc", min:0.10, max:0.16, step:0.02, text:v=>`에너지 쉴드 ${Math.round(v*100)}% 증가` },
  { id:"corr_flat_phys", stat:"flatDamageAdd", min:4, max:8, text:v=>`추가 물리 피해 +${Math.round(v)}` },
  { id:"corr_crit_chance", stat:"critChanceAdd", min:0.010, max:0.018, step:0.002, text:v=>`치명타 확률 +${(v*100).toFixed(1)}%` },
  { id:"corr_crit_multi", stat:"critMultiAdd", min:0.12, max:0.20, step:0.02, text:v=>`치명타 피해 +${Math.round(v*100)}%` },
  { id:"corr_atk_speed", stat:"atkSpdInc", min:0.04, max:0.06, step:0.01, text:v=>`공격 속도 ${Math.round(v*100)}% 증가` },
  { id:"corr_cast_speed", stat:"castSpdInc", min:0.04, max:0.06, step:0.01, text:v=>`시전 속도 ${Math.round(v*100)}% 증가` },
  { id:"corr_all_res", stat:"allResAdd", min:4, max:6, text:v=>`모든 저항 +${Math.round(v)}%` }
]);

function __rollCorruptValue(spec){
  const mn = Number(spec?.min ?? 0);
  const mx = Number(spec?.max ?? mn);
  const step = Number(spec?.step || 0);
  if(step > 0){
    const n = Math.max(0, Math.round((mx - mn) / step));
    const pick = Math.floor(Math.random() * (n + 1));
    return +(mn + pick * step).toFixed(6);
  }
  if(Number.isInteger(mn) && Number.isInteger(mx)){
    return mn + Math.floor(Math.random() * (mx - mn + 1));
  }
  return +(mn + Math.random() * (mx - mn)).toFixed(6);
}

function getAllItemImplicits(itemLike){
  const out = [];
  if(itemLike && Array.isArray(itemLike.implicits)) out.push(...itemLike.implicits.filter(Boolean));
  if(itemLike && Array.isArray(itemLike.corruptImplicits)) out.push(...itemLike.corruptImplicits.filter(Boolean));
  return out;
}

function rollCorruptImplicitForItem(item){
  const existingStats = new Set(getAllItemImplicits(item).map(x => x && x.stat).filter(Boolean));
  const candidates = CORRUPT_IMPLICIT_POOL.filter(spec => spec && !existingStats.has(spec.stat));
  if(!candidates.length) return null;
  const spec = candidates[(Math.random() * candidates.length) | 0];
  const value = __rollCorruptValue(spec);
  return {
    id: `corrupt_implicit_${spec.id}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,6)}`,
    source: "corruptImplicit",
    kind: "implicit",
    stat: spec.stat,
    op: spec.op || keyToModOp(spec.stat) || "add",
    value,
    text: typeof spec.text === "function" ? spec.text(value) : String(spec.text || "")
  };
}

function makeImplicitModsFromTemplate(tmpl, itemTags){
  const mods = [];
  const implicitList = getAllItemImplicits(tmpl);
  if(!implicitList.length) return mods;

  for(const imp of implicitList){
    if(!imp) continue;
    const stat = imp.stat;
    if(!stat) continue;

    // 기본 op는 keyToModOp에 맡김(없으면 add)
    const op = imp.op || keyToModOp(stat) || "add";

    // imp.value 없고, min/max 짝이면 각각 따로 들어올 수 있으니 패스
    if(typeof imp.value !== "number") continue;

    mods.push({
      id: `implicit:${tmpl.id}:${stat}`,
      source: "implicit",
      kind: "implicit",
      stat,
      op,
      value: imp.value,
      label: imp.text || null,
      tier: null,
      baseId: tmpl.id,
      requiresAll: itemTags,
      requiresAny: [],
      forbids: []
    });
  }
  return mods;
}

function makeAffixModFromRoll(roll, itemTags){
  // roll: { kind, affix, tier, value }
  if(!roll || !roll.affix) return null;
  const affix = roll.affix;
  const rawValue = (Number(roll.value) || 0);

  if(Array.isArray(affix.mods) && affix.mods.length){
    const out = [];
    affix.mods.forEach((spec, idx)=>{
      if(!spec || !spec.stat) return;
      const scale = (typeof spec.scale === "number") ? spec.scale : 1;
      const scaled = rawValue * scale;
      let op = spec.op || MOD_OPS.add;
      let value = scaled;

      switch(spec.kind){
        case "pctMul":
          op = MOD_OPS.more;
          value = scaled / 100;
          break;
        case "pctAdd":
          op = MOD_OPS.add;
          value = scaled / 100;
          break;
        case "flat":
        default:
          op = spec.op || MOD_OPS.add;
          value = scaled;
          break;
      }

      out.push({
        id: `affix:${roll.kind}:${affix.id}:t${roll.tier}:${idx}`,
        source: roll.kind,
        scope: "gear",
        stat: spec.stat,
        op,
        value,
        meta: { tier: roll.tier, name: affix.name, group: affix.group, affixId: affix.id },
        requiresAll: itemTags,
        requiresAny: [],
        forbids: []
      });
    });
    return out.length ? out : null;
  }

  return null;
}

function buildImplicitMods(item){
  const t = getItemTemplateById(item.baseId || item.id);
  const imps = getAllItemImplicits(t || item);
  const out = [];
  for(let i=0;i<imps.length;i++){
    const imp = imps[i];
    if(!imp) continue;
    out.push({
      id: (item.baseId || item.id) + "_implicit_" + i,
      source: "implicit",
      scope: imp.scope || "global",
      requiresAll: imp.requiresAll || [],
      requiresAny: imp.requiresAny || [],
      forbids: imp.forbids || [],
      stat: imp.stat,
      op: imp.op,
      value: imp.value,
      stacks: 1,
      enabled: true
    });
  }
  return out;
}

function buildItemMods(baseId, baseData, affixes, itemTags, tmpl=null){
  const mods = [];
  mods.push(...makeBaseModsFromBaseData(baseId, baseData, itemTags));
  mods.push(...makeImplicitModsFromTemplate(tmpl, itemTags));
  if(Array.isArray(affixes)){
    for(const a of affixes){
      const m = makeAffixModFromRoll(a, itemTags);
      if(Array.isArray(m)) mods.push(...m);
      else if(m) mods.push(m);
    }
  }
  return mods;
}
// =========================================================
// STEP 4) affix.apply → mods 기반 데이터 생성(점진 이관)
// - AFFIX_DB.apply는 당분간 유지(호환)
// - 아이템 data/affixData/totalData 생성만 mods로 대체 시작
// =========================================================
const USE_MODS_FOR_ITEMDATA = true;

function buildDataFromMods(mods, { includeBase=true } = {}){
  // mods -> makeEmptyItemData 형태로 환원 (UI/descGen용)
  const d = makeEmptyItemData();
  if(!Array.isArray(mods)) return d;

  for(const m of mods){
    if(!m || m.scope !== "gear") continue;
    if(!includeBase && m.source === "base") continue;

    const k = m.stat;
    if(!k) continue;

    if(m.op === MOD_OPS.more){
      const cur = (typeof d[k] === "number" ? d[k] : 1);
      d[k] = cur * (1 + (Number(m.value) || 0));
    }else{
      const cur = (typeof d[k] === "number" ? d[k] : 0);
      d[k] = cur + (Number(m.value) || 0);
    }
  }
  return d;
}

function buildAffixDataFromMods(mods){
  return buildDataFromMods(mods, { includeBase:false });
}

/* ============================= */
/* ✅ POE식 이름 생성 (접두/접미, 레어 이름) */
/* ============================= */
const RARE_NAME_A = ["망령","암흑","피의","폭풍","철","그림자","공허","파멸","서리","번개","잔혹","광기의","망각","귀신","지옥","죽음","칠흑","부패","독","지배"];
const RARE_NAME_B = ["약탈자","학살자","송곳니","칼날","발톱","수호자","징표","심장","파수꾼","파괴자","사냥꾼","추적자","심연","망치","창","검","방패","의지","서약","파멸"];
function randPick(arr){ return arr[(Math.random()*arr.length)|0]; }
function rollRareName(){ return randPick(RARE_NAME_A) + " " + randPick(RARE_NAME_B); }

function normalizeRarity(r){
  // ✅ Legacy → New (안전 매핑)
  if(r === "magic") return "magic";
  if(r === "rare") return "rare";
  if(r === "unique") return "unique";

  // ✅ Supported set
  if(r === "normal" || r === "magic" || r === "rare" || r === "unique") return r;

  // ✅ Fallback (unknown)
  return "normal";
}

function createItemInstance(baseId, rarityOverride=null, opts=null){
  // ✅ 안전: 존재하지 않는 baseId가 들어와도 크래시 안 나게 fallback
  let tmpl = getItemTemplateById(baseId);
  if(!tmpl){
    console.warn("Invalid baseId:", baseId);
    const pool = Array.isArray(ITEM_POOL) ? ITEM_POOL : [];
    tmpl = pool.find(x => x && x.slot === "weapon") || pool[0] || null;
    if(!tmpl) return null;
    baseId = tmpl.id;
  }

  const rarity = normalizeRarity(rarityOverride || tmpl.rarity || "normal");
  const ilvl = Math.max(((opts && opts.ilvl)!=null ? opts.ilvl : getItemLevel()), (tmpl.minIlvl ?? 1));

  // ✅ 기존 로직(베이스/접사 데이터 계산) 유지
  const baseData = buildBaseDataFromItemId(baseId);

  // ✅ tags 먼저 산출 → 태그 기반 affix 선택 가능
  const tags = inferItemTagsFromTemplate(tmpl, baseId);

  const affixes = rollAffixesPOE(rarity, ilvl, tags, { tmpl, baseId });

  // ✅ STEP2: tags/mods 병행 생성
  const mods = buildItemMods(baseId, baseData, affixes, tags, tmpl);

  // ✅ STEP4: affix.apply 대신 mods로 affixData 생성(점진 이관)
  const affixData = USE_MODS_FOR_ITEMDATA
    ? buildAffixDataFromMods(mods)
    : (function(){
        const d = makeEmptyItemData();
        for(const a of affixes){
          if(a && a.affix && typeof a.affix.apply === "function") a.affix.apply(d, a.value);
        }
        return d;
      })();

  const implicitData = buildImplicitDataFromItemLike({ implicits: tmpl.implicits, corruptImplicits: [] });
  const totalData = mergeItemData(mergeItemData(baseData, affixData), implicitData);

  const preNames = affixes.filter(x=>x.kind==="prefix").map(x=>x.affix.name);
  const sufNames = affixes.filter(x=>x.kind==="suffix").map(x=>x.affix.name);

  // ✅ POE 스타일:
  // - 일반(매직): 첫 prefix/첫 suffix만 이름에 반영
  // - 레어/에픽: 접두/접미를 이름에서 제거하고, 랜덤 레어명 부여
  let nm = tmpl.name;
  if(rarity === "magic"){
    const pre = preNames[0] || "";
    const suf = sufNames[0] || "";
    if(pre) nm = pre + " " + nm;
    if(suf) nm = nm + " " + suf;
  }else if(rarity === "rare"){
    nm = rollRareName();
  }

  return {
    id: baseId,
    baseId,
    baseName: tmpl.name,
    baseTier: (tmpl.baseTier ?? 1),
    implicits: Array.isArray(tmpl.implicits) ? tmpl.implicits.slice() : [],
    corruptImplicits: [],
    name: nm,
    rarity,
    slot: tmpl.slot,
    ilvl,
    isUnique: false,

    // ✅ 기존 필드들
    data: totalData,
    totalData,
    baseData,
    affixData,
    affixes,
    shownDesc: tmpl.descGen ? tmpl.descGen(totalData) : "",

    // ✅ 신규 필드(모드 엔진용)
    tags,
    mods
  };
}

function applyImplicitSpecsToItemData(target, implicits){
  const out = target || makeEmptyItemData();
  const list = Array.isArray(implicits) ? implicits : [];
  for(const imp of list){
    if(!imp || !imp.stat || typeof imp.value !== "number") continue;
    const k = imp.stat;
    const isMulStat = String(k).endsWith("Mul");
    const op = imp.op || null;
    if(isMulStat){
      const cur = (Number(out[k]) || 1);
      if(op === "mul"){
        out[k] = cur * imp.value;
      }else if(op === "more"){
        out[k] = cur * (imp.value > 0 && imp.value < 1 ? (1 + imp.value) : imp.value);
      }else if(op === "add" || op === "inc"){
        out[k] = (Number(out[k]) || 0) + imp.value;
      }else{
        out[k] = cur * (imp.value > 1 ? imp.value : (1 + imp.value));
      }
    }else{
      out[k] = (Number(out[k]) || 0) + imp.value;
    }
  }
  return out;
}

function buildImplicitDataFromItemLike(itemLike, { includeBase=true, includeCorrupt=true } = {}){
  const out = makeEmptyItemData();
  if(itemLike && includeBase) applyImplicitSpecsToItemData(out, itemLike.implicits);
  if(itemLike && includeCorrupt) applyImplicitSpecsToItemData(out, itemLike.corruptImplicits);
  return out;
}

function createDesignedUnique(spec){
  if(!spec || !spec.baseId) return null;
  const tmpl = (typeof getItemTemplateById === "function") ? getItemTemplateById(spec.baseId) : null;
  if(!tmpl) return null;

  const baseData = buildBaseDataFromItemId(tmpl.id);
  const explicitData = Object.assign(makeEmptyItemData(), spec.data || {});
  applyImplicitSpecsToItemData(explicitData, tmpl.implicits);
  const totalData = mergeItemData(baseData, explicitData);

  const out = {
    id: spec.id || ("unique_" + String(spec.name || tmpl.id || 'item').replace(/\s+/g, '_').toLowerCase()),
    uniqueName: spec.name || tmpl.name,
    baseId: tmpl.id,
    baseName: tmpl.name,
    baseTier: tmpl.baseTier ?? 1,
    implicits: Array.isArray(tmpl.implicits) ? tmpl.implicits.slice() : [],
    corruptImplicits: [],
    name: spec.name || tmpl.name,
    rarity: "unique",
    slot: tmpl.slot,
    ilvl: Math.max(1, spec.ilvl || tmpl.minIlvl || 1),
    isUnique: false,
    data: totalData,
    totalData,
    baseData,
    affixData: explicitData,
    uniqueData: Object.assign({}, explicitData),
    affixes: [],
    tags: Array.isArray(spec.tags) ? spec.tags.slice() : (Array.isArray(tmpl.tags) ? tmpl.tags.slice() : []),
    mods: [],
    desc: spec.desc || "",
    flavorText: spec.flavorText || spec.desc || "",
    uniqueLines: Array.isArray(spec.uniqueLines) ? spec.uniqueLines.slice() : []
  };

  if(spec.extraProps && typeof spec.extraProps === 'object'){
    for(const k in spec.extraProps) out[k] = spec.extraProps[k];
  }

  return out;
}

function __numUniqueFx(v, d){
  v = Number(v);
  return Number.isFinite(v) ? v : (d || 0);
}

function getEquippedWeaponLocalPhysicalAverage(it){
  const w = it || (typeof equipment !== "undefined" && equipment ? equipment.weapon : null);
  if(!w) return 3;
  const td = w.totalData || w.data || {};
  const baseMin = __numUniqueFx(player && player.weapon && player.weapon.min, 14);
  const baseMax = __numUniqueFx(player && player.weapon && player.weapon.max, 20);
  const dmgMul = Math.max(0, __numUniqueFx(td.dmgMul, 1));
  const flatPhys = __numUniqueFx(td.flatDamageAdd ?? td.flatDamage, 0);
  const min = w.noPhysicalDamage ? 0 : Math.max(0, baseMin * dmgMul + flatPhys);
  const max = w.noPhysicalDamage ? 0 : Math.max(0, baseMax * dmgMul + flatPhys);
  return Math.max(1, (min + max) * 0.5);
}

function refreshOrCreateHellhammerGround(x, y, weapon){
  if(typeof fireZones === "undefined" || !Array.isArray(fireZones)) return;
  const radius = Math.max(24, __numUniqueFx(weapon && weapon.hellhammerGroundRadius, 110));
  const life = Math.max(1, Math.round(__numUniqueFx(weapon && weapon.hellhammerGroundLife, 150)));
  const perSec = Math.max(0, __numUniqueFx(weapon && weapon.hellhammerGroundPhysPerSec, 0.35));
  const avgPhys = getEquippedWeaponLocalPhysicalAverage(weapon);
  const tickDamage = Math.max(1, avgPhys * perSec * 0.25);

  for(const z of fireZones){
    if(!z || !z.isHellhammer) continue;
    const dx = (z.x || 0) - x;
    const dy = (z.y || 0) - y;
    const rr = Math.max(40, Math.min(radius, z.radius || radius) * 0.55);
    if(dx*dx + dy*dy <= rr*rr){
      z.x = x;
      z.y = y;
      z.radius = radius;
      z.life = Math.max(z.life || 0, life);
      z.maxLife = Math.max(z.maxLife || 0, life);
      z.damage = Math.max(__numUniqueFx(z.damage, 0), tickDamage);
      z.tick = 0;
      z.tags = (typeof mergeTags === "function") ? mergeTags(z.tags || [], ["aoe","fire"]) : (z.tags || ["aoe","fire"]);
      return;
    }
  }

  fireZones.push({
    x, y,
    radius,
    life,
    maxLife: life,
    tick: 0,
    damage: tickDamage,
    isHellhammer: true,
    type: "hellhammer",
    tags: (typeof mergeTags === "function")
      ? mergeTags(["aoe","fire"], (window.SKILL_TAGS && SKILL_TAGS.firezone) || ["fire","aoe"])
      : ["aoe","fire"]
  });
}

function buildUniqueTriggeredSpellCtx(skillId, enemy, extraTags){
  const tags = ["combat","skill", String(skillId || "unique_trigger"), "spell"];
  if(Array.isArray(extraTags)) tags.push(...extraTags);
  const merged = (typeof mergeTags === "function")
    ? mergeTags(
        tags,
        (typeof getPlayerTags === "function" ? getPlayerTags() : []),
        (typeof getMapTags === "function" ? getMapTags() : []),
        (typeof tagsFromEnemy === "function" ? tagsFromEnemy(enemy) : [])
      )
    : tags;
  return {
    scope: "skill",
    enemy,
    tags: merged,
    skillId: String(skillId || "unique_trigger"),
    activeSkillId: String(skillId || "unique_trigger"),
    __supportsPreapplied: true
  };
}

function spawnUniqueLightningArcFx(x1, y1, x2, y2, scale){
  if(typeof particles === "undefined" || !Array.isArray(particles)) return;
  const dx = (x2 || 0) - (x1 || 0);
  const dy = (y2 || 0) - (y1 || 0);
  const dist = Math.max(1, Math.hypot(dx, dy));
  const count = Math.max(4, Math.min(16, Math.round(dist / 22)));
  const s = Math.max(0.6, Number(scale || 1));
  for(let i=0;i<=count && particles.length < 320;i++){
    const t = (count <= 0) ? 0 : (i / count);
    particles.push({
      x: (x1 || 0) + dx * t + (Math.random() - 0.5) * 5,
      y: (y1 || 0) + dy * t + (Math.random() - 0.5) * 5,
      vx: (Math.random() - 0.5) * 1.0,
      vy: (Math.random() - 0.5) * 1.0,
      life: 8 + Math.floor(Math.random() * 6),
      alpha: 0.92,
      size: 2.4 * s + Math.random() * 1.8,
      kind: "arrowSpark"
    });
  }
  if(particles.length < 320){
    particles.push({
      x: x2 || 0,
      y: y2 || 0,
      vx: 0,
      vy: 0,
      life: 10,
      alpha: 0.65,
      size: 6 * s,
      kind: "heavyShock"
    });
  }
}

function applyUniqueShockAilment(enemy, dealt, scale){
  if(!enemy) return;
  if(!enemy.ailments) enemy.ailments = { burn:0, chill:0, shock:0 };
  if(!enemy.ailmentPower) enemy.ailmentPower = { burn:0, chill:0, shock:0 };
  const dur = Math.max(18, Math.min(90, Math.round(24 + Number(dealt || 0) * 0.05)));
  const amp = Math.max(0.08, Math.min(0.26, 0.08 + Number(dealt || 0) * 0.0025 * Math.max(0.5, Number(scale || 1))));
  enemy.ailments.shock = Math.max(enemy.ailments.shock || 0, dur);
  enemy.ailmentPower.shock = Math.max(enemy.ailmentPower.shock || 0, amp);
}

function findNextChainEnemy(originEnemy, visitedSet, range){
  let best = null;
  let bestD2 = Infinity;
  if(!originEnemy) return null;
  for(const e of enemies){
    if(!e || e.hp <= 0 || visitedSet.has(e)) continue;
    const dx = (e.x || 0) - (originEnemy.x || 0);
    const dy = (e.y || 0) - (originEnemy.y || 0);
    const d2 = dx*dx + dy*dy;
    if(d2 > range * range) continue;
    if(d2 < bestD2){
      bestD2 = d2;
      best = e;
    }
  }
  return best;
}

function triggerMjolnerArc(enemy, weapon){
  if(!enemy || !weapon) return;
  const procChance = Math.max(0, Math.min(1, __numUniqueFx(weapon.mjolnerProcChance, 0)));
  if(!(procChance > 0) || Math.random() > procChance) return;

  const now = Number(typeof frameCount !== "undefined" ? frameCount : 0) || 0;
  const cdKey = "unique_mjolner_cd";
  const cdFrames = Math.max(1, Math.round(__numUniqueFx(weapon.mjolnerCooldownFrames, 15)));
  if(uniqueState[cdKey] && now < uniqueState[cdKey]) return;
  uniqueState[cdKey] = now + cdFrames;

  const td = weapon.totalData || weapon.data || {};
  const chainCount = Math.max(1, Math.round(__numUniqueFx(weapon.mjolnerChainCount, 3)));
  const chainRange = Math.max(80, __numUniqueFx(weapon.mjolnerChainRange, 170));
  const spellMul = Math.max(0.1, __numUniqueFx(weapon.mjolnerSpellMul, 0.82));
  const flatBase = Math.max(0, __numUniqueFx(td.lightningFlat, 0)) + Math.max(0, __numUniqueFx(weapon.mjolnerSpellFlat, 52));
  const baseAvg = getEquippedWeaponLocalPhysicalAverage(weapon);
  const visited = new Set();
  let fromX = player && Number.isFinite(player.x) ? player.x : (enemy.x || 0);
  let fromY = player && Number.isFinite(player.y) ? player.y : (enemy.y || 0);
  let current = (enemy.hp && enemy.hp > 0) ? enemy : findNextChainEnemy(enemy, visited, chainRange);

  for(let jump = 0; jump < chainCount && current; jump++){
    visited.add(current);
    const dmg = Math.max(8, (baseAvg * (0.55 + jump * 0.06) + flatBase) * spellMul * Math.max(0.52, 1 - jump * 0.16));
    const ctx = buildUniqueTriggeredSpellCtx("mjolner_arc", current, ["lightning","chain","projectile"]);
    const packet = makeDamagePacket(0, 0, 0, dmg, 0);
    const result = (typeof computeFinalDamage === "function") ? computeFinalDamage(packet, ctx, { canCrit:true }) : { dealt: dmg };
    current.__killFxKind = "lightning";
    if(typeof damageEnemyDirect === "function"){
      damageEnemyDirect(current, result.dealt, { isSecondary:true });
    }else{
      current.hp -= result.dealt;
    }
    applyUniqueShockAilment(current, result.dealt, 1);
    spawnUniqueLightningArcFx(fromX, fromY, current.x || 0, current.y || 0, 1.0);
    fromX = current.x || 0;
    fromY = current.y || 0;
    current = findNextChainEnemy(current, visited, chainRange);
  }
}

function triggerBonesnapCrush(enemy, weapon){
  if(!enemy || !weapon) return;
  const procChance = Math.max(0, Math.min(1, __numUniqueFx(weapon.bonesnapCrushChance, 0)));
  if(!(procChance > 0) || Math.random() > procChance) return;

  const bossLike = (typeof __isBossLike === "function") ? __isBossLike(enemy) : !!(enemy && (enemy.type === "boss" || enemy.isElite || enemy.type === "demon"));
  const lifePct = Math.max(0, __numUniqueFx(weapon.bonesnapCrushLifePct, 0.08));
  const bossPct = Math.max(0, __numUniqueFx(weapon.bonesnapCrushBossPct, 0.03));
  const capPct = Math.max(0, __numUniqueFx(weapon.bonesnapCrushCapPct, 0.20));
  const flat = Math.max(0, __numUniqueFx(weapon.bonesnapCrushFlat, 10));
  const curHp = Math.max(0, Number(enemy.hp || 0));
  const maxHp = Math.max(curHp, Number(enemy.maxHp || curHp || 1));
  const pct = bossLike ? bossPct : lifePct;
  const pctDamage = bossLike ? (curHp * pct) : Math.min(curHp * pct, maxHp * capPct);
  const damage = Math.max(1, pctDamage + flat + getEquippedWeaponLocalPhysicalAverage(weapon) * 0.10);

  enemy.__killFxKind = "physical";
  if(typeof damageEnemyDirect === "function"){
    damageEnemyDirect(enemy, damage, { isSecondary:true });
  }else{
    enemy.hp -= damage;
  }

  if(typeof spawnHeavyStrikeImpact === "function"){
    try{ spawnHeavyStrikeImpact(enemy, 0.85); }catch(_){ }
  }
}

function beginCasterWandSpellCast(skill){
  const out = { damageMul:1, rangeMul:1, empowered:false, weapon:null };
  if(!__isSpellLikeSkill(skill)) return out;
  const weapon = __getEquippedCasterUniqueWand();
  if(!weapon) return out;
  out.weapon = weapon;

  if(__numUniqueFx(weapon.mirrorQuillEnabled ? 1 : 0, 0) > 0){
    let st = uniqueState.__mirrorQuillState;
    if(!st || st.weaponId !== weapon.id){
      st = { weaponId: weapon.id, count: 0 };
    }
    st.count = Math.max(0, Number(st.count || 0)) + 1;
    const need = Math.max(2, Math.round(__numUniqueFx(weapon.mirrorQuillCountMax, 4)));
    if(st.count >= need){
      st.count = 0;
      out.damageMul = Math.max(1, __numUniqueFx(weapon.mirrorQuillDamageMul, 1.80));
      out.rangeMul = Math.max(1, __numUniqueFx(weapon.mirrorQuillRangeMul, 1.25));
      out.empowered = true;
      spawnMirrorQuillBurstFx();
      const slowFrames = Math.max(0, Math.round(__numUniqueFx(weapon.mirrorQuillSelfSlowFrames, 18)));
      const slowMul = Math.max(0.1, __numUniqueFx(weapon.mirrorQuillSelfSlowMul, 0.90));
      uniqueState.__mirrorQuillSlowUntil = Math.max(Number(frameCount || 0) + slowFrames, Number(uniqueState.__mirrorQuillSlowUntil || 0));
      uniqueState.__mirrorQuillSlowMul = slowMul;
    }else{
      spawnMirrorQuillChargeFx(st.count);
    }
    uniqueState.__mirrorQuillState = st;
  }

  return out;
}

function applyMirrorQuillTempoPenalty(g){

function triggerThunderArchiveChain(enemy, weapon, dealt){
  if(!enemy || !weapon || enemy.hp <= 0) return;
  const procChance = Math.max(0, Math.min(1, __numUniqueFx(weapon.thunderArchiveProcChance, 0)));
  if(!(procChance > 0) || Math.random() > procChance) return;
  const now = Number(typeof frameCount !== "undefined" ? frameCount : 0) || 0;
  const cdFrames = Math.max(1, Math.round(__numUniqueFx(weapon.thunderArchiveCooldownFrames, 15)));
  const cdKey = "unique_thunder_archive_cd";
  if(uniqueState[cdKey] && now < uniqueState[cdKey]) return;
  uniqueState[cdKey] = now + cdFrames;

  const chainCount = Math.max(1, Math.round(__numUniqueFx(weapon.thunderArchiveChainCount, 3)));
  const chainRange = Math.max(90, __numUniqueFx(weapon.thunderArchiveChainRange, 175));
  const spellMul = Math.max(0.1, __numUniqueFx(weapon.thunderArchiveDamageMul, 0.45));
  let current = enemy;
  let fromX = player && Number.isFinite(player.x) ? player.x : (enemy.x || 0);
  let fromY = player && Number.isFinite(player.y) ? player.y : (enemy.y || 0);
  const visited = new Set();

  for(let jump=0; jump<chainCount && current; jump++){
    visited.add(current);
    const dmg = Math.max(8, __numUniqueFx(dealt, 0) * spellMul * Math.max(0.55, 1 - jump * 0.12));
    const ctx = buildUniqueTriggeredSpellCtx("thunder_archive_arc", current, ["spell","lightning","chain"]);
    const packet = makeDamagePacket(0, 0, 0, dmg, 0);
    const result = (typeof computeFinalDamage === "function") ? computeFinalDamage(packet, ctx, { canCrit:true }) : { dealt:dmg };
    current.__killFxKind = "lightning";
    if(typeof damageEnemyDirect === "function") damageEnemyDirect(current, result.dealt, { isSecondary:true });
    else current.hp -= result.dealt;
    applyUniqueShockAilment(current, result.dealt, 1.1);
    spawnUniqueLightningArcFx(fromX, fromY, current.x || 0, current.y || 0, 1.25);
    spawnThunderArchiveProcFx(current.x || 0, current.y || 0, 1.0);
    fromX = current.x || 0;
    fromY = current.y || 0;
    current = findNextChainEnemy(current, visited, chainRange);
  }
}

  enemy.ailmentPower.chill = Math.max(enemy.ailmentPower.chill || 0, Math.max(0.12, Math.min(0.55, __numUniqueFx(weapon && weapon.frostJudgeChillSlow, 0.28))));

function triggerFrostJudgeBurst(enemy, weapon, dealt){
  if(!enemy || !weapon) return;
  const radius = Math.max(40, __numUniqueFx(weapon.frostJudgeBurstRadius, 110));
  const shardCount = Math.max(6, Math.round(__numUniqueFx(weapon.frostJudgeBurstCount, 8)));
  const spread = Math.max(40, __numUniqueFx(weapon.frostJudgeBurstSpread, 92));
  spawnFrostJudgeBurstFx(enemy.x || 0, enemy.y || 0, shardCount, spread);
  try{ shake = Math.max(typeof shake === "number" ? shake : 0, 5); }catch(_){ }

  for(const e2 of enemies){
    if(!e2 || e2.hp <= 0 || e2 === enemy) continue;
    const dx = (e2.x || 0) - (enemy.x || 0);
    const dy = (e2.y || 0) - (enemy.y || 0);
    const er = (typeof getEnemyRadius === "function") ? getEnemyRadius(e2) : (e2.radius || 14);
    if(dx*dx + dy*dy > (radius + er) * (radius + er)) continue;
    const dmg = Math.max(6, __numUniqueFx(dealt, 0) * 0.55 + __numUniqueFx(weapon.frostJudgeBurstFlat, 26));
    const ctx = buildUniqueTriggeredSpellCtx("frost_judge_burst", e2, ["spell","cold","aoe"]);
    const packet = makeDamagePacket(0, 0, dmg, 0, 0);
    const result = (typeof computeFinalDamage === "function") ? computeFinalDamage(packet, ctx, { canCrit:true }) : { dealt:dmg };
    e2.__killFxKind = "cold";
    if(typeof damageEnemyDirect === "function") damageEnemyDirect(e2, result.dealt, { isSecondary:true });
    else e2.hp -= result.dealt;
    __ensureFrostJudgeAilment(e2, weapon);
  }
}

function applyEquippedCasterSpellHitEffects(skill, enemy, dealt, wasKilled){
  if(!enemy || !__isSpellLikeSkill(skill)) return;
  const weapon = __getEquippedCasterUniqueWand();
  if(!weapon) return;
  dealt = __numUniqueFx(dealt, 0);
  const hadChill = !!(enemy.ailments && enemy.ailments.chill > 0);

  if(__numUniqueFx(weapon.frostJudgeAlwaysChill ? 1 : 0, 0) > 0){
    __ensureFrostJudgeAilment(enemy, weapon);
    if(hadChill && dealt > 0){
      const bonus = Math.max(0, __numUniqueFx(weapon.frostJudgeBonusVsChilled, 0.25));
      if(bonus > 0){
        const bonusDamage = dealt * bonus;
        const ctx = buildUniqueTriggeredSpellCtx("frost_judge_bonus", enemy, ["spell","cold"]);
        const packet = makeDamagePacket(0, 0, bonusDamage, 0, 0);
        const result = (typeof computeFinalDamage === "function") ? computeFinalDamage(packet, ctx, { canCrit:true }) : { dealt:bonusDamage };
        enemy.__killFxKind = "cold";
        const bonusKilled = (typeof damageEnemyDirect === "function") ? damageEnemyDirect(enemy, result.dealt, { isSecondary:true }) : ((enemy.hp -= result.dealt), enemy.hp <= 0);
        wasKilled = wasKilled || bonusKilled;
      }
    }
    if(wasKilled){
      triggerFrostJudgeBurst(enemy, weapon, dealt);
    }
  }

  if(__numUniqueFx(weapon.thunderArchiveProcChance, 0) > 0 && dealt > 0){
    triggerThunderArchiveChain(enemy, weapon, dealt);
  }
}

function updateAllFireZones(){
  if(typeof fireZones === "undefined" || !Array.isArray(fireZones) || !fireZones.length) return;

  for(let i = fireZones.length - 1; i >= 0; i--){
    const z = fireZones[i];
    if(!z){
      fireZones.splice(i, 1);
      continue;
    }

    z.life = (__numUniqueFx(z.life, 0) - 1);
    if(z.life <= 0){
      fireZones.splice(i, 1);
      continue;
    }

    z.tick = (__numUniqueFx(z.tick, 0) + 1);
    if(z.tick < 15) continue;
    z.tick = 0;

    const radius = Math.max(8, __numUniqueFx(z.radius, (ISO && ISO.tileW) ? (ISO.tileW * 0.50) : 32));
    const damage = Math.max(1, __numUniqueFx(z.damage, 1));
    const zoneTags = z.isBleed ? ["aoe","physical"] : ((Array.isArray(z.tags) && z.tags.length) ? z.tags.slice() : ["aoe","fire"]);

    for(const e of enemies){
      if(!e || e.hp <= 0) continue;
      const er = (typeof getEnemyRadius === "function") ? getEnemyRadius(e) : (e.radius || 14);
      const dx = (e.x || 0) - (z.x || 0);
      const dy = (e.y || 0) - (z.y || 0);
      if(dx*dx + dy*dy > (radius + er) * (radius + er)) continue;

      const ctx = (typeof buildCombatCtx === "function") ? buildCombatCtx(z.isHellhammer ? "hellhammer_ground" : "fire_zone", e) : { enemy:e, tags:zoneTags.slice() };
      ctx.tags = (typeof mergeTags === "function") ? mergeTags(ctx.tags || [], zoneTags) : zoneTags.slice();
      ctx.skillId = z.isHellhammer ? "hellhammer_ground" : (z.isBleed ? "bleed_zone" : "fire_zone");
      ctx.activeSkillId = ctx.skillId;

      const result = (typeof computeFinalDamage === "function") ? computeFinalDamage(damage, ctx) : { dealt: damage };
      e.__killFxKind = z.isBleed ? "physical" : "fire";
      if(typeof damageEnemyDirect === "function"){
        damageEnemyDirect(e, result.dealt, { isSecondary:true });
      }else{
        e.hp -= result.dealt;
      }

      if(!z.isBleed){
        if(!e.ailments) e.ailments = { burn:0, chill:0, shock:0 };
        if(!e.ailmentPower) e.ailmentPower = { burn:0, chill:0, shock:0 };
        e.ailments.burn = Math.max(e.ailments.burn || 0, 75);
        e.ailmentPower.burn = Math.max(e.ailmentPower.burn || 0, Math.max(1, damage * 0.45));
      }
    }
  }
}

    rarity:"unique",

    applyStat(){

function rollRarity(){
  const t = mapTier;

  // PoE 느낌: unique(아주 낮음) / rare / magic / normal
  const uniqueP = clamp(0.004 + (t-1)*0.00035, 0.004, 0.020);
  const rareP   = clamp(0.055 + (t-1)*0.0020, 0.055, 0.140);
  const magicP  = clamp(0.240 + (t-1)*0.0060, 0.240, 0.420);

  const r = Math.random();
  if(r < uniqueP) return "unique";
  if(r < uniqueP + rareP) return "rare";
  if(r < uniqueP + rareP + magicP) return "magic";
  return "normal";
}

function pickItemsForChoice(count){

  // ✅ mapTier는 전역 변수(mapTier)를 사용 (Game 미정의로 인한 ReferenceError 방지)
  const mapTier = Math.max(1,
    (typeof globalThis!=="undefined" && typeof globalThis.mapTier==="number")
      ? globalThis.mapTier
      : 1
  );
  if(!Array.isArray(ITEM_POOL) || ITEM_POOL.length === 0){
    console.warn("ITEM_POOL empty");
    return [];
  }

  // helpers may not exist in some builds; provide safe fallbacks
  const safePickSlot = (typeof pickSlotForMapTier === "function")
    ? pickSlotForMapTier
    : (t)=> "weapon";

  const safePickBaseTier = (typeof pickBaseTierForMap === "function")
    ? pickBaseTierForMap
    : (t)=> t;

  const safeRollIlvl = (typeof rollItemLevelFromMapTier === "function")
    ? rollItemLevelFromMapTier
    : (t)=> Math.max(1, t*5);

  const results = [];
  const usedBaseIds = new Set();

  for(let i=0;i<count;i++){

    let slot = null;
    try { slot = safePickSlot(mapTier); } catch(e){ slot = null; }
    if(!slot) slot = "weapon";

    let pool = ITEM_POOL.filter(b => b && b.slot === slot);
    if(!pool.length) pool = ITEM_POOL.filter(b => b) || [];

    if(!pool.length){
      console.warn("No base pool for slot:", slot);
      continue;
    }

    let targetTier = null;
    try { targetTier = safePickBaseTier(mapTier); } catch(e){ targetTier = null; }
    if(!targetTier) targetTier = mapTier;

    let filtered = pool.filter(b => (b.baseTier ?? 1) <= targetTier);
    if(!filtered.length) filtered = pool;

    // build weighted list safely (cap expansion)
    const weighted = [];
    const CAP = 3000;
    for(const b of filtered){
      if(!b) continue;
      const w = Math.max(1, Math.floor(b.weight ?? 100));
      for(let k=0;k<w && weighted.length < CAP;k++){
        weighted.push(b);
      }
      if(weighted.length >= CAP) break;
    }

    if(!weighted.length){
      console.warn("Weighted empty for slot:", slot, "tier:", targetTier);
      continue;
    }

    let choice = null;
    for(let t=0;t<7;t++){
      const cand = weighted[Math.floor(Math.random()*weighted.length)];
      if(cand && cand.id && !usedBaseIds.has(cand.id)){
        choice = cand;
        break;
      }
    }
    if(!choice){
      const cand = weighted[Math.floor(Math.random()*weighted.length)];
      if(cand && cand.id) choice = cand;
    }
    if(!choice || !choice.id){
      console.warn("No choice resolved");
      continue;
    }

    usedBaseIds.add(choice.id);

    const ilvl = Math.max(1, safeRollIlvl(mapTier));

    let item = null;
    try{
      // createItemInstance signature differs across builds; support both
      if(typeof createItemInstance === "function"){
        item = createItemInstance(choice.id, null, { ilvl });
      }
    }catch(e){
      console.warn("createItemInstance failed:", e);
      item = null;
    }

    if(item) results.push(item);
  }

  
  // ✅ 안전장치: 어떤 이유로든 결과가 비면 최소 1개는 강제로 생성
  if(results.length === 0){
    try{
      const fallback = (Array.isArray(ITEM_POOL) && ITEM_POOL.length) ? ITEM_POOL[Math.floor(Math.random()*ITEM_POOL.length)] : null;
      if(fallback && fallback.id && typeof createItemInstance==="function"){
        const ilvl = Math.max(1, safeRollIlvl(mapTier));
        const it = createItemInstance(fallback.id, null, { ilvl });
        if(it) results.push(it);
      }
    }catch(e){ /* ignore */ }
  }
return results;
}

function rollDroppedItemFromTemplate(it, ilvl){
  const rarityKey = normalizeRarity(it.rarity);

  // Unique는 기존 시스템 유지: acquireLegendary에서 inventory에도 들어감
  if(rarityKey === "unique"){
    return { kind:"unique", template: it, ilvl, name: it.name, rarityKey };
  }

  const baseData = buildBaseDataFromItemId(it.id);
  const tags = inferItemTagsFromTemplate(it, it.id);
  const affixes = rollAffixesPOE(it.rarity, ilvl, tags, { tmpl: it, baseId: it.id });

  // ✅ tags/mods + mods 기반 데이터 생성
  const mods = buildItemMods(it.id, baseData, affixes, tags, it);

  const affixData = USE_MODS_FOR_ITEMDATA
    ? buildAffixDataFromMods(mods)
    : (function(){
        const d = makeEmptyItemData();
        for(const a of affixes){
          if(a && a.affix && typeof a.affix.apply === "function") a.affix.apply(d, a.value);
        }
        return d;
      })();

  const totalData = mergeItemData(baseData, affixData);

  const preNames = affixes.filter(x=>x.kind==="prefix").map(x=>x.affix.name);
  const sufNames = affixes.filter(x=>x.kind==="suffix").map(x=>x.affix.name);

  let nm = it.name;
  if(preNames.length) nm = preNames.join(" ") + " " + nm;
  if(sufNames.length) nm = nm + " " + sufNames.join(" ");

  const shownDesc = it.descGen ? it.descGen(totalData) : (it.desc || "");

  const chosen = {
    id: it.id,
    baseId: it.id,
    baseName: it.name,
    name: nm,
    rarity: it.rarity,
    slot: it.slot,
    ilvl,
    isUnique: false,
    data: totalData,
    totalData,
    baseData,
    affixData,
    affixes,
    shownDesc,
    tags,
    mods
  };

  return { kind:"normal", item: chosen, ilvl, name: nm, rarityKey };
}

function rollOrbDrop(source="mob"){
  let scale = 1;
  if(source === "boss") scale = 3.5;
  else if(source === "ulti") scale = 1.35;
  else if(source === "bleed") scale = 0.90;

  for(const row of ORB_DROP_TABLE){
    if(Math.random() < row.chance * scale){
      return {
        kind:"orb",
        orbKey: row.key,
        name: row.label,
        rarityKey: row.rarityKey
      };
    }
  }
  return null;
}

function grantOrbByKey(key, amount=1){
  amount = Math.max(1, amount|0);
  switch(key){
    case "transmute":   transmuteOrbs += amount; return true;
    case "alteration":  alterationOrbs += amount; return true;
    case "augmentation":augmentationOrbs += amount; return true;
    case "regal":       regalOrbs += amount; return true;
    case "alchemy":     alchemyOrbs += amount; return true;
    case "chaos":       chaosOrbs += amount; return true;
    case "scour":       scouringOrbs += amount; return true;
    case "exalt":       exaltedOrbs += amount; return true;
    case "annul":       annulOrbs += amount; return true;
    case "divine":      divineOrbs += amount; return true;
    case "corrupt":     corruptOrbs += amount; return true;
  }
  return false;
}
function isLootDropWalkableTile(tx, ty){
  if(ty < 0 || ty >= map.length) return false;
  if(tx < 0 || tx >= map[ty].length) return false;
  return isFloorTile(tx, ty);
}

function findNearestLootDropPos(x, y){
  const baseTx = Math.floor(x / tileSize);
  const baseTy = Math.floor(y / tileSize);

  // 먼저 현재 칸
  if(isLootDropWalkableTile(baseTx, baseTy)){
    return {
      x: baseTx * tileSize + tileSize * 0.5,
      y: baseTy * tileSize + tileSize * 0.5
    };
  }

  // 반경 확장 탐색
  for(let r = 1; r <= 4; r++){
    for(let oy = -r; oy <= r; oy++){
      for(let ox = -r; ox <= r; ox++){
        // 바깥 테두리만 검사
        if(Math.abs(ox) !== r && Math.abs(oy) !== r) continue;

        const tx = baseTx + ox;
        const ty = baseTy + oy;

        if(!isLootDropWalkableTile(tx, ty)) continue;

        return {
          x: tx * tileSize + tileSize * 0.5,
          y: ty * tileSize + tileSize * 0.5
        };
      }
    }
  }

  // 못 찾으면 원래 위치
  return { x, y };
}
function spawnLoot(x, y, source="mob"){
  if(loots.length > 25) loots.splice(0, loots.length-25);

  const orbDrop = rollOrbDrop(source);
  let rolled = orbDrop;

  if(!rolled){
    const picks = pickItemsForChoice(1);
    const it = (picks && picks.length) ? picks[0] : null;
    if(!it){
      console.warn("No items rolled");
      return;
    }

    const ilvl = getItemLevel();
    rolled = rollDroppedItemFromTemplate(it, ilvl);
  }

  loots.push({
    x, y,
    r: 14,
    ttl: 60*45,
    taken: false,
    source,
    rolled,
    tPick: 28
  });
}

function getNearbyLoot(){
  for(const L of loots){
    if(L.taken) continue;
    const dx = L.x - player.x;
    const dy = L.y - player.y;
    const rr = (L.r + player.radius + 18);
    if(dx*dx + dy*dy <= rr*rr) return L;
  }
  return null;
}

function openLootChoice(L){
  // ✅ guard: mobile에서 touchstart+click 등으로 2번 열리면 overlayCount가 꼬여 UI가 계속 숨겨짐
  if(lootOverlayOpen) return;
  if(!L || L.taken) return;
  pauseGame({ dim: 0.60, blur: 2 });
  lootOverlayOpen = true;
  if(!lootOverlayPushed){ overlayPush(); lootOverlayPushed = true; }

  pendingLoot = L;

  lootOverlay.style.display = "flex";
  lootCardsEl.innerHTML = "";

  L.choices.forEach((it)=>{
    const card = document.createElement("div");
    card.className = `lootCard ${normalizeRarity(it.rarity)}`;

    const ilvl = getItemLevel();
    const pick = { it, ilvl };

    if(normalizeRarity(it.rarity) === "unique"){
      pick.kind = "unique";
      pick.shownName = it.name;
      pick.shownDesc = it.desc;
    }else{
      pick.kind = "normal";
      pick.baseData = buildBaseDataFromItemId(it.id);
      pick.tags = inferItemTagsFromTemplate(it, it.id);
      pick.affixes = rollAffixesPOE(it.rarity, ilvl, pick.tags, { tmpl: it, baseId: it.id });

      // ✅ STEP2/4: tags/mods + mods 기반 데이터 생성
      pick.mods = buildItemMods(it.id, pick.baseData, pick.affixes, pick.tags, it);

      const affixData = USE_MODS_FOR_ITEMDATA
        ? buildAffixDataFromMods(pick.mods)
        : (function(){
            const d = makeEmptyItemData();
            for(const a of pick.affixes){ if(a && a.affix && typeof a.affix.apply === "function") a.affix.apply(d, a.value); }
            return d;
          })();

      pick.affixData = affixData;
      pick.totalData = mergeItemData(pick.baseData, pick.affixData);

      const preNames = pick.affixes.filter(x=>x.kind==="prefix").map(x=>x.affix.name);
      const sufNames = pick.affixes.filter(x=>x.kind==="suffix").map(x=>x.affix.name);

      pick.baseName = it.name;
      pick.baseId = it.id;

      let nm = pick.baseName;
      if(preNames.length) nm = preNames.join(" ") + " " + nm;
      if(sufNames.length) nm = nm + " " + sufNames.join(" ");
      pick.name = nm;

      pick.shownName = pick.name;
      pick.shownDesc = it.descGen ? it.descGen(pick.totalData) : (it.desc || "");
    }

    const rKey = normalizeRarity(it.rarity);

card.innerHTML = `
  <div class="name rName r-${rKey}">${pick.shownName}</div>
  <div class="desc">${pick.shownDesc}</div>
  <button type="button">이걸 선택</button>
`;

    card.querySelector("button").addEventListener("click", ()=>{
      if(pick.kind === "unique"){
        acquireLegendary(pick.it, pick.ilvl);
      } else {
        const chosen = {
          id: pick.baseId,
          baseId: pick.baseId,
          baseName: pick.baseName,
          name: pick.name,
          rarity: pick.it.rarity,
          slot: pick.it.slot,
          ilvl: pick.ilvl,
          isUnique: false,
          data: pick.totalData,
          totalData: pick.totalData,
          baseData: pick.baseData,
          affixData: pick.affixData,
          affixes: pick.affixes,
          shownDesc: pick.shownDesc
        };
        inventory.push(chosen);
        if(panelOpen) renderAllPanels();
      }
      L.taken = true;
      closeLootChoice();
      shake = Math.max(shake, 10);
    });

    lootCardsEl.appendChild(card);
  });
}

function closeLootChoice(){
  lootOverlayOpen = false;
  pendingLoot = null;
  lootOverlay.style.display = "none";
  if(lootOverlayPushed){ overlayPop(); lootOverlayPushed = false; }
  resumeGame();
}

function updateLoots(){
  // 자동 루팅: 플레이어가 위에 서 있으면 바로 주움 (루팅 버튼 없음)
  // - iOS에서 중복 이벤트로 overlayCount 꼬이는 문제도 함께 회피
  const canPickup = (!panelOpen && !lootOverlayOpen && !gameOver);

  for(let i=loots.length-1;i>=0;i--){
    const L = loots[i];
    if(L.taken){ loots.splice(i,1); continue; }

    L.ttl--;
    if(L.ttl <= 0){ loots.splice(i,1); continue; }

    if(!canPickup) continue;

    // per-drop pickup debounce
    if(L.tPick > 0){ L.tPick--; continue; }

    const dx = L.x - player.x;
    const dy = L.y - player.y;
    const rr = (L.r + (player.radius ?? 14) + 10); // 살짝 타이트
    if(dx*dx + dy*dy <= rr*rr){
      // ✅ 줍기
      const rolled = L.rolled;
      if(rolled){
        if(rolled.kind === "unique"){
          acquireLegendary(rolled.template, rolled.ilvl);
        }else if(rolled.kind === "orb"){
          if(grantOrbByKey(rolled.orbKey, 1) && panelOpen) renderAllPanels();
        }else{
          inventory.push(rolled.item);
          if(panelOpen) renderAllPanels();
        }
      }
      L.taken = true;
      shake = Math.max(shake, 6);
      // 1프레임에 여러개 연속 줍는걸 방지
      L.tPick = 10;
    }
  }
}

function drawLoots(){

  return;
}

function lootLabelColor(rarityKey){
  // POE-ish: normal white, magic blue, rare yellow, unique orange
  if(rarityKey === "magic") return "#4aa3ff";
  if(rarityKey === "rare") return "#ffd24a";
  if(rarityKey === "unique") return "#ff9a3d";
  return "#f0f0f0";
}

function __lootScreenPos(L, camX, camY){
  const p = isoProject(L.x, L.y);
  return { sx: p.x - camX, sy: p.y - camY };
}

function __lootLabelText(L){
  const rolled = L && L.rolled;
  if(!rolled) return "Item";
  return rolled.name || rolled.label || rolled.baseName || "Item";
}

function drawIsoLootLabels(camX, camY){
  if(!loots || loots.length === 0) return;

  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.textAlign = "center";
  ctx.textBaseline = "bottom";
  ctx.lineJoin = "round";

  const active = [];
  for(const L of loots){
    if(!L || L.taken) continue;
    const rolled = L.rolled;
    const rarityKey = rolled ? (rolled.rarityKey || "normal") : "normal";
    const pos = __lootScreenPos(L, camX, camY);
    const dist2 = (L.x-player.x)*(L.x-player.x) + (L.y-player.y)*(L.y-player.y);
    active.push({ L, rolled, rarityKey, col: lootLabelColor(rarityKey), sx:pos.sx, sy:pos.sy, dist2 });
  }

  active.sort((a,b)=> a.sy - b.sy);

  const placed = [];
  for(const it of active){
    const name = __lootLabelText(it.L);
    const near = it.dist2 < (220*220);
    const orb = (it.rolled && it.rolled.kind === "orb");

    let x = it.sx;
    let y = it.sy - 18;
    ctx.font = orb ? "bold 15px Arial" : (near ? "bold 17px Arial" : "bold 16px Arial");
    const padX = 10;
    const h = near ? 26 : 24;
    const w = Math.ceil(ctx.measureText(name).width) + padX*2 + (orb ? 16 : 0);

    for(let n=0;n<14;n++){
      let hit = false;
      for(const prev of placed){
        const overlapX = Math.abs(x - prev.x) < ((w + prev.w) * 0.5);
        const overlapY = Math.abs(y - prev.y) < ((h + prev.h) * 0.5);
        if(overlapX && overlapY){ hit = true; break; }
      }
      if(!hit) break;
      y -= 18;
    }

    placed.push({ x, y, w, h });

    const left = x - w*0.5;
    const top = y - h;
    ctx.fillStyle = near ? "rgba(0,0,0,0.76)" : "rgba(0,0,0,0.62)";
    ctx.strokeStyle = near ? "rgba(255,255,255,0.10)" : "rgba(255,255,255,0.06)";
    ctx.lineWidth = 1.2;
    if(typeof ctx.roundRect === "function"){
      ctx.beginPath();
      ctx.roundRect(left, top, w, h, 7);
      ctx.fill();
      ctx.stroke();
    }else{
      ctx.fillRect(left, top, w, h);
      ctx.strokeRect(left, top, w, h);
    }

    if(orb){
      ctx.beginPath();
      ctx.fillStyle = it.col;
      ctx.arc(left + 10, top + h*0.5, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(0,0,0,0.75)";
      ctx.stroke();
    }

    ctx.font = orb ? "bold 15px Arial" : (near ? "bold 17px Arial" : "bold 16px Arial");
    ctx.lineWidth = 4;
    ctx.strokeStyle = "rgba(0,0,0,0.88)";
    const tx = orb ? (x + 7) : x;
    ctx.strokeText(name, tx, y - 4);
    ctx.fillStyle = it.col;
    ctx.fillText(name, tx, y - 4);
  }

  ctx.restore();
}

function hasPassive(id){ return !!(player && player.passives && player.passives[id]); }
function getNode(id){ return PASSIVE_NODES[id] || null; }
function getChildrenOfPassive(id){
  const out = [];
  for(const nid of Object.keys(PASSIVE_NODES)){
    const p = PASSIVE_NODES[nid].parents || [];
    if(p.includes(id)) out.push(nid);
  }
  return out;
}
function getNeighborsOfPassive(id){
  const node = getNode(id);
  if(!node) return [];
  const out = new Set();
  const parents = node.parents || [];
  for(const pid of parents){
    if(pid && pid !== 'core') out.add(pid);
  }
  for(const cid of getChildrenOfPassive(id)) out.add(cid);
  return Array.from(out);
}
function hasAllocatedPassiveNeighbor(id){
  return getNeighborsOfPassive(id).some(hasPassive);
}
function canAllocatePassive(id){
  const node = getNode(id);
  if(!node || hasPassive(id) || (player.passivePoints||0) <= 0) return false;

  const parents = node.parents || [];
  const byParents = !parents.length ? true : (node.anyParent ? parents.some(hasPassive) : parents.every(hasPassive));
  const byNeighbor = hasAllocatedPassiveNeighbor(id);

  if(node.tier === 1 && !node.cluster){
    if(rootPassive && rootPassive !== id && !byNeighbor) return false;
    return byParents || byNeighbor;
  }

  return byParents || byNeighbor;
}
function canRemovePassive(id){
  const node = getNode(id);
  if(!node || !hasPassive(id)) return false;
  const kids = getChildrenOfPassive(id);
  return kids.every(k => !hasPassive(k));
}
function getPassiveStateLabel(id){
  const node = getNode(id);
  if(!node) return '';
  if(hasPassive(id)) return canRemovePassive(id) ? '획득됨 · 제거 가능' : '획득됨 · 하위 노드가 있어 제거 불가';
  if(canAllocatePassive(id)) return '획득 가능';
  if((player.passivePoints||0) <= 0) return '포인트 부족';
  const parents = node.parents || [];
  if(parents.length) return '선행 필요: ' + parents.map(pid => PASSIVE_NODES[pid].name).join(', ');
  return '획득 불가';
}
function getPassiveBonuses(){
  const out = { maxHpInc:0, maxHpAdd:0, armorAdd:0, hpRegen:0, lifeLeech:0, hpOnKill:0, hpOnHit:0, atkSpdInc:0, castSpdInc:0, rangeInc:0, spellRangeInc:0, critChanceAdd:0, critMultiAdd:0, meleeDamageInc:0, spellDamageInc:0, elementalDamageInc:0 };
  const ps = (player && player.passives) ? player.passives : {};
  for(const id of Object.keys(ps)){

    const ef = PASSIVE_NODES[id] && PASSIVE_NODES[id].effects;

  }

}

const PASSIVE_GEAR_MULT_KEYS = Object.freeze(new Set([
  'dmgMul','dmgMore',
  'atkSpdMul','atkSpdMore',
  'spdMul','spdMore',
  'rangeMul','rangeMore',
  'castSpdMul','castSpdMore',
  'spellRangeMul','spellRangeMore'
]));

function normalizePassiveEffectValue(key, value){
  const v = Number(value || 0);
  if(!Number.isFinite(v)) return 0;

  // 예전 패시브 일부는 dmgMul:0.18 같은 "18% 증가" 표기를 써서
  // gear 경로(1.18 형태)로 옮길 때 보정이 필요함.
  if((key === 'dmgMul' || key === 'atkSpdMul' || key === 'spdMul' || key === 'rangeMul' || key === 'castSpdMul' || key === 'spellRangeMul') && v > 0 && v < 0.95){
    return 1 + v;
  }
  return v;
}

function passiveEffectsToGearDelta(effects, opt){
  const out = {};
  if(!effects || typeof effects !== 'object') return out;

  const baseMaxHp = Number((opt && opt.baseMaxHp) || (player && player.baseMaxHp) || 100);

  for(const [rawKey, rawValue] of Object.entries(effects)){
    if(rawValue == null) continue;

    if(rawKey === 'maxHpInc'){
      const flat = Math.round(baseMaxHp * Number(rawValue || 0));
      if(flat) out.maxHpAdd = (out.maxHpAdd || 0) + flat;
      continue;
    }

    const key = rawKey;
    const value = normalizePassiveEffectValue(key, rawValue);
    if(!value) continue;

    if(PASSIVE_GEAR_MULT_KEYS.has(key)){
      out[key] = (out[key] || 1) * value;
    }else{
      out[key] = (out[key] || 0) + value;
    }
  }

  return out;
}
function rebuildPassiveMods(){
  if(window.GameMods && Array.isArray(window.GameMods.list)){
    window.GameMods.list = window.GameMods.list.filter(m => m.source !== 'passive');
    const ps = (player && player.passives) ? player.passives : {};
    for(const id of Object.keys(ps)){
      if(!ps[id]) continue;
      const node = PASSIVE_NODES[id];
      if(!node || !Array.isArray(node.mods)) continue;
      node.mods.forEach((m, idx) => {
        window.GameMods.list.push(Object.assign({ id:'passive_'+id+'_'+idx, source:'passive' }, m));
      });
    }
  }
}
function allocatePassive(id){
  if(!canAllocatePassive(id)) return false;
  const prevMaxHp = Number((player && player.maxHp) || 0);
  const node = getNode(id);
  if(!player.passives) player.passives = {};
  player.passives[id] = true;
  if(node && node.tier === 1 && !node.cluster && !rootPassive){
    rootPassive = id;
  }
  player.passivePoints = Math.max(0, (player.passivePoints||0) - 1);
  selectedPassiveNodeId = id;
  passivePopupClosed = false;
  passiveLastPoppedId = id;
  rebuildPassiveMods();
  recalcFromGear();
  syncPlayerVitalDisplay();
  const gain = Math.max(0, Number(player.maxHp || 0) - prevMaxHp);
  if(gain > 0) player.hp = Math.min(player.maxHp, Number(player.hp || 0) + gain);
  renderAllPanels();
  return true;
}
function removePassive(id){
  if(!canRemovePassive(id)) return false;
  const node = getNode(id);
  delete player.passives[id];
  if(node && node.tier === 1 && !node.cluster && rootPassive === id){
    rootPassive = null;
  }
  player.passivePoints = (player.passivePoints||0) + 1;
  selectedPassiveNodeId = id;
  passivePopupClosed = false;
  rebuildPassiveMods();
  recalcFromGear();
  syncPlayerVitalDisplay();
  player.hp = Math.max(1, Math.min(player.maxHp, Number(player.hp || 0)));
  renderAllPanels();
  return true;
}
function resetPassivesFree(){
  if(!player) return;
  const spent = Object.keys(player.passives || {}).filter(id => !!player.passives[id]).length;
  player.passives = {};
  rootPassive = null;
  player.passivePoints = (player.passivePoints || 0) + spent;
  selectedPassiveNodeId = null;
  passivePopupClosed = true;
  rebuildPassiveMods();
  recalcFromGear();
  syncPlayerVitalDisplay();
  player.hp = Math.max(1, Math.min(player.maxHp, Number(player.hp || 0)));
  renderAllPanels();
  setTimeout(()=>{
    renderPassiveTree();
    fitPassiveTreeToViewport();
  },0);
}
function passiveNodeState(id){
  const node = getNode(id);
  if(node && node.tier === 1 && !node.cluster && rootPassive && rootPassive !== id && !hasPassive(id) && !hasAllocatedPassiveNeighbor(id)) return 'locked';
  return hasPassive(id) ? 'allocated' : (canAllocatePassive(id) ? 'available' : 'locked');
}

function clampPassiveZoom(v){
  return Math.max(getPassiveZoomMin(), Math.min(PASSIVE_ZOOM_MAX, v));
}
function fitPassiveTreeToViewport(){
  const viewport = document.getElementById('passiveTreeViewport');
  if(!viewport) return;
  const pad = 90;
  const minX = 90;
  const maxX = 2180;
  const minY = 90;
  const maxY = 2170;
  const contentW = (maxX - minX) + pad * 2;
  const contentH = (maxY - minY) + pad * 2;
  const fitX = viewport.clientWidth / Math.max(1, contentW);
  const fitY = viewport.clientHeight / Math.max(1, contentH);
  const fitZoom = Math.min(fitX, fitY);
  passiveZoomMinDynamic = Math.max(PASSIVE_ZOOM_MIN_BASE, fitZoom);
  passiveZoom = Math.max(getPassiveZoomMin(), Math.min(PASSIVE_ZOOM_MAX, fitZoom));
  const centerX = (minX + maxX) * 0.5;
  const centerY = (minY + maxY) * 0.5;
  const scrollLeft = Math.max(0, centerX * passiveZoom - viewport.clientWidth * 0.5);
  const scrollTop = Math.max(0, centerY * passiveZoom - viewport.clientHeight * 0.5);
  applyPassiveZoom({
    xRatio: 0.5,
    yRatio: 0.5,
    scrollLeft,
    scrollTop,
    prevZoom: passiveZoom
  });
  viewport.scrollLeft = scrollLeft;
  viewport.scrollTop = scrollTop;
}

function applyPassiveZoom(keep){
  const viewport = document.getElementById('passiveTreeViewport');
  const board = document.getElementById('passiveTreeBoard');
  const tree = document.getElementById('passiveTree');
  const glow = document.getElementById('passiveTreeGlow');
  if(!viewport || !board || !tree || !glow) return;
  passiveZoom = clampPassiveZoom(passiveZoom || 1);
  const prev = keep || { xRatio:0.5, yRatio:0.5, scrollLeft:viewport.scrollLeft, scrollTop:viewport.scrollTop };
  board.style.width = (PASSIVE_BOARD_BASE_W * passiveZoom) + 'px';
  board.style.height = (PASSIVE_BOARD_BASE_H * passiveZoom) + 'px';
  tree.style.transformOrigin = '0 0';
  tree.style.transform = 'scale(' + passiveZoom + ')';
  glow.style.transformOrigin = '0 0';
  glow.style.transform = 'scale(' + passiveZoom + ')';
  const targetX = (prev.scrollLeft + viewport.clientWidth * prev.xRatio) / (prev.prevZoom || passiveZoom);
  const targetY = (prev.scrollTop + viewport.clientHeight * prev.yRatio) / (prev.prevZoom || passiveZoom);
  viewport.scrollLeft = Math.max(0, targetX * passiveZoom - viewport.clientWidth * prev.xRatio);
  viewport.scrollTop = Math.max(0, targetY * passiveZoom - viewport.clientHeight * prev.yRatio);
}
function focusPassiveNode(id){

function setupPassiveViewportDrag(){
  const viewport = document.getElementById('passiveTreeViewport');
  if(!viewport || viewport.dataset.dragBound) return;
  viewport.dataset.dragBound = '1';
  let dragging = false, sx=0, sy=0, sl=0, st=0;
  let pinchStartDist = 0;
  let pinchPrevZoom = 1;
  let pinchCenter = null;

  function touchDist(a,b){
    const dx = a.clientX - b.clientX;
    const dy = a.clientY - b.clientY;
    return Math.hypot(dx, dy);
  }

  viewport.addEventListener('pointerdown', (e)=>{
    if(e.pointerType === 'touch') return;
    dragging = true; sx = e.clientX; sy = e.clientY; sl = viewport.scrollLeft; st = viewport.scrollTop;
    viewport.classList.add('dragging');
    viewport.setPointerCapture?.(e.pointerId);
  });
  viewport.addEventListener('pointermove', (e)=>{
    if(!dragging) return;
    viewport.scrollLeft = sl - (e.clientX - sx);
    viewport.scrollTop = st - (e.clientY - sy);
    renderPassiveTree();
  });
  const end = (e)=>{ dragging = false; viewport.classList.remove('dragging'); try{ viewport.releasePointerCapture?.(e.pointerId); }catch(_){} };
  viewport.addEventListener('pointerup', end);
  viewport.addEventListener('pointercancel', end);

  viewport.addEventListener('touchstart', (e)=>{
    if(e.touches.length === 2){
      pinchStartDist = touchDist(e.touches[0], e.touches[1]);
      pinchPrevZoom = passiveZoom;
      const rect = viewport.getBoundingClientRect();
      pinchCenter = {
        xRatio: ((e.touches[0].clientX + e.touches[1].clientX) * 0.5 - rect.left) / viewport.clientWidth,
        yRatio: ((e.touches[0].clientY + e.touches[1].clientY) * 0.5 - rect.top) / viewport.clientHeight,
        scrollLeft: viewport.scrollLeft,
        scrollTop: viewport.scrollTop,
        prevZoom: passiveZoom
      };
    }else if(e.touches.length === 1){
      sx = e.touches[0].clientX; sy = e.touches[0].clientY; sl = viewport.scrollLeft; st = viewport.scrollTop;
    }
  }, {passive:false});

  viewport.addEventListener('touchmove', (e)=>{
    if(e.touches.length === 2){
      e.preventDefault();
      const dist = touchDist(e.touches[0], e.touches[1]);
      if(pinchStartDist > 0){
        passiveZoom = clampPassiveZoom(pinchPrevZoom * (dist / pinchStartDist));
        applyPassiveZoom(pinchCenter || {xRatio:0.5, yRatio:0.5, scrollLeft:viewport.scrollLeft, scrollTop:viewport.scrollTop, prevZoom:pinchPrevZoom});
        renderPassiveTree();
      }
      return;
    }
    if(e.touches.length === 1){
      e.preventDefault();
      viewport.scrollLeft = sl - (e.touches[0].clientX - sx);
      viewport.scrollTop = st - (e.touches[0].clientY - sy);
      renderPassiveTree();
    }
  }, {passive:false});

  viewport.addEventListener('touchend', ()=>{
    if(pinchStartDist){
      pinchPrevZoom = passiveZoom;
    }
    pinchStartDist = 0;
    pinchCenter = null;
  }, {passive:true});

  // iOS Safari pinch fallback
  let gestureBaseZoom = 1;
  viewport.addEventListener('gesturestart', (e)=>{
    if(panelOpen !== 'passive') return;
    e.preventDefault();
    gestureBaseZoom = passiveZoom;
  }, {passive:false});
  viewport.addEventListener('gesturechange', (e)=>{
    if(panelOpen !== 'passive') return;
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    passiveZoom = clampPassiveZoom(gestureBaseZoom * (e.scale || 1));
    applyPassiveZoom({
      xRatio: (e.clientX - rect.left) / Math.max(1, viewport.clientWidth),
      yRatio: (e.clientY - rect.top) / Math.max(1, viewport.clientHeight),
      scrollLeft: viewport.scrollLeft,
      scrollTop: viewport.scrollTop,
      prevZoom: gestureBaseZoom
    });
    renderPassiveTree();
  }, {passive:false});
  viewport.addEventListener('gestureend', (e)=>{
    if(panelOpen !== 'passive') return;
    e.preventDefault();
    gestureBaseZoom = passiveZoom;
  }, {passive:false});

  viewport.addEventListener('wheel', (e)=>{
    if(panelOpen !== 'passive') return;
    if(!e.ctrlKey) return;
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    const keep = {
      xRatio: (e.clientX - rect.left) / viewport.clientWidth,
      yRatio: (e.clientY - rect.top) / viewport.clientHeight,
      scrollLeft: viewport.scrollLeft,
      scrollTop: viewport.scrollTop,
      prevZoom: passiveZoom
    };
    passiveZoom = clampPassiveZoom(passiveZoom * (e.deltaY < 0 ? 1.08 : 0.92));
    applyPassiveZoom(keep);
    renderPassiveTree();
  }, {passive:false});

  viewport.addEventListener('scroll', ()=>{ if(panelOpen === 'passive') renderPassiveTree(); }, {passive:true});
}

let gameOver = false;
let orbFlash = 0;
let flashEffect = 0;

let baseDamageBase = 20;
let ultiDamageBase = 40;

let baseDamage = baseDamageBase;
let ultiDamage = ultiDamageBase;

player.gear = defaultBuffStats();

/* =========================================================
   STEP 3) recalcFromGear()에서 mods 기반 계산 레이어 추가
   - item.data(기존)와 별개로 item.mods 를 이용해 gearDelta를 만들어 applyGearDelta에 주입
   - 나중에 affix.apply → mods 생성으로 완전 이관하기 위한 발판
   - 혹시 스탯이 이상하면 아래 플래그를 false로 바꾸면 즉시 원복됨
   ========================================================= */
const USE_GEAR_MODS_LAYER = true;

function gearTagsFromItem(it){
  const tags = [];
  if(it && it.slot) tags.push(it.slot);
  if(it && Array.isArray(it.tags)) tags.push(...it.tags);
  tags.push("gear");
  return mergeTags(tags);
}

function gearDeltaFromMods(modList, ctx){
  const out = {};
  if(!Array.isArray(modList) || modList.length === 0) return out;

  const mctx = {
    scope: (ctx && ctx.scope) ? ctx.scope : "gear",
    tags:  (ctx && ctx.tags)  ? ctx.tags  : []
  };

  for(const m of modList){
    if(!m) continue;

    // 태그/스코프 매칭 (엔진 공통 규칙)
    if(typeof modMatches === "function" && !modMatches(m, mctx)) continue;

    const k = m.stat;
    if(!k) continue;

    const op = m.op || MOD_OPS.add;
    const v  = (Number(m.value) || 0);

    if(op === MOD_OPS.add){
      out[k] = (out[k] || 0) + v;
    }else if(op === MOD_OPS.inc){
      // gear 쪽은 Inc 키를 쓰는 경우가 많아서, kInc 형태로 넣어둠
      const kk = (String(k).endsWith("Inc") ? k : (k + "Inc"));
      out[kk] = (out[kk] || 0) + v;
    }else if(op === MOD_OPS.more){
      const mul = 1 + v;
      out[k] = (out[k] || 1) * mul;
    }
  }
  return out;
}


function recalcFromGear(){
  const prevMaxHp = Number((player && player.maxHp) || 0);
  const prevHp = Number((player && player.hp) || 0);
  const prevMaxEs = Number((player && player.maxEs) || 0);
  const prevEs = Number((player && player.es) || 0);

  player.gear = defaultBuffStats();

  for(const slot of EQUIP_SLOTS){
    const it = equipment[slot];
    if(!it) continue;

    if(USE_GEAR_MODS_LAYER && Array.isArray(it.mods) && it.mods.length){
      const tags = gearTagsFromItem(it);
      const d2 = gearDeltaFromMods(it.mods, { scope:"gear", tags });
      if(d2) applyGearDelta(d2);
      continue;
    }

    const d = it.totalData || it.data || null;
    if(!d) continue;
    applyGearDelta(d);
  }

  try{ if(typeof rebuildPassiveMods === 'function') rebuildPassiveMods(); }catch(_){ }

  const baseMaxHp = Number(player.baseMaxHp ?? 100);
  const ps = (player && player.passives) ? player.passives : {};
  for(const id of Object.keys(ps)){
    if(!ps[id]) continue;
    const node = PASSIVE_NODES[id];
    if(!node || !node.effects) continue;
    const delta = passiveEffectsToGearDelta(node.effects, { baseMaxHp });
    applyGearDelta(delta);
  }

  const g = player.gear || (player.gear = defaultBuffStats());

  g.dmgMul        = (1 + (g.dmgInc || 0))        * (g.dmgMore || 1);
  g.atkSpdMul     = (1 + (g.atkSpdInc || 0))     * (g.atkSpdMore || 1);
  g.spdMul        = (1 + (g.spdInc || 0))        * (g.spdMore || 1);
  g.rangeMul      = (1 + (g.rangeInc || 0))      * (g.rangeMore || 1);
  g.castSpdMul    = (1 + (g.castSpdInc || 0))    * (g.castSpdMore || 1);
  g.spellRangeMul = (1 + (g.spellRangeInc || 0)) * (g.spellRangeMore || 1);
  if(typeof applyMirrorQuillTempoPenalty === "function") applyMirrorQuillTempoPenalty(g);
  g.flatDamage    = g.flatDamageAdd || 0;

  player.passiveRangeMul = Math.max(0.1, Number(g.rangeMul || 1));
  player.castSpeedMul    = Math.max(0.1, Number(g.castSpdMul || 1));
  player.spellRangeMul   = Math.max(0.1, Number(g.spellRangeMul || 1));
  player.lifeLeech = Number(g.lifeLeech || 0);
  player.hpOnKill  = Number(g.hpOnKill || 0);
  player.hpOnHit   = Number(g.hpOnHit || 0);

  const baseArmor = Number(player.baseArmor ?? 0);
  const rawMaxHp = Math.max(1, Math.round((baseMaxHp + Number(g.maxHpAdd || 0) + Number(g.maxLife || 0)) * Number(g.maxHpMul || 1)));
  const baseEs = Number(player.baseEs ?? 0);
  let rawMaxEs = Math.max(0, Math.round((baseEs + Number(g.esAdd || 0)) * (1 + Number(g.esInc || 0)) * Number(g.esMore || 1)));

  const esOn = !!(player && player.passives && player.passives.keystoneES);
  player.energyShieldMode = esOn;
  player.esRechargeDelay = Math.max(15, 120 + Number(g.esRechargeDelayAdd || 0));
  player.esRechargeRate = Math.max(0.02, 0.20 + Number(g.esRechargeRate || 0));

  if(esOn){
    rawMaxEs += rawMaxHp;
    player.maxHp = 1;
    g.hpRegen = 0;
    g.hpOnKill = 0;
    g.lifeLeech = 0;
    g.hpOnHit = 0;
    player.lifeLeech = 0;
    player.hpOnKill = 0;
    player.hpOnHit = 0;
    player.hpRegen = 0;
    if(player.gear){
      player.gear.hpRegen = 0;
      player.gear.hpOnKill = 0;
      player.gear.lifeLeech = 0;
      player.gear.hpOnHit = 0;
    }
  }else{
    player.maxHp = rawMaxHp;
  }

  player.maxEs = Math.max(0, rawMaxEs);
  player.armor = Math.max(0, Math.round((baseArmor + Number(g.armorAdd || 0)) * Number(g.armorMul || 1)));

  if(prevMaxHp > 0){
    const hpRatio = Math.max(0, Math.min(1, prevHp / prevMaxHp));
    player.hp = Math.max(0, Math.min(player.maxHp, Math.round(player.maxHp * hpRatio)));
  }else{
    player.hp = Math.min(player.maxHp, Math.max(1, Number(player.hp || player.maxHp)));
  }
  if(esOn) player.hp = Math.min(player.hp, player.maxHp);

  if(prevMaxEs > 0){
    const esRatio = Math.max(0, Math.min(1, prevEs / prevMaxEs));
    player.es = Math.max(0, Math.min(player.maxEs, Math.round(player.maxEs * esRatio)));
  }else{
    player.es = player.maxEs;
  }

  if(!player.buffs) player.buffs = defaultBuffStats();
  player.buffs.dmgMul = Number(g.dmgMul || 1);
  player.buffs.atkSpdMul = Number(g.atkSpdMul || 1);
  player.buffs.spdMul = Number(g.spdMul || 1);
  player.buffs.rangeMul = Number(g.rangeMul || 1);
  player.buffs.maxHpMul = Number(g.maxHpMul || 1);
  player.buffs.maxHpAdd = Number(g.maxHpAdd || 0) + Number(g.maxLife || 0);
  player.buffs.esAdd = Number(g.esAdd || 0);
  player.buffs.armorAdd = Number(g.armorAdd || 0);
  player.buffs.hpRegen = Number(g.hpRegen || 0);

  try{ if(typeof __rebuildPlayerResists === "function") __rebuildPlayerResists(); }catch(_){ }
  syncPlayerVitalDisplay();
}

function syncPlayerVitalDisplay(){
  if(!player) return;
  player.maxHp = Math.max(1, Number(player.maxHp || player.baseMaxHp || 1));
  player.hp = Math.max(0, Math.min(player.maxHp, Number(player.hp || 0)));
  player.maxEs = Math.max(0, Number(player.maxEs || 0));
  player.es = Math.max(0, Math.min(player.maxEs, Number(player.es || 0)));
}

function applyGearDelta(d){
  if(!d) return;
  if(!player.gear) player.gear = defaultBuffStats();

  const g = player.gear;

  if(d.maxHpAdd) g.maxHpAdd += d.maxHpAdd;
  if(d.maxHpMul) g.maxHpMul = (g.maxHpMul || 1) * d.maxHpMul;
  if(d.maxLife)  g.maxLife  += d.maxLife;
  if(d.esAdd)    g.esAdd    += d.esAdd;
  if(d.esInc)    g.esInc    += d.esInc;
  if(d.esMore)   g.esMore   *= d.esMore;
  if(d.esRechargeRate) g.esRechargeRate = (g.esRechargeRate || 0) + d.esRechargeRate;
  if(d.esRechargeDelayAdd) g.esRechargeDelayAdd = (g.esRechargeDelayAdd || 0) + d.esRechargeDelayAdd;
  if(d.armorAdd) g.armorAdd += d.armorAdd;
  if(d.armorMul) g.armorMul = (g.armorMul || 1) * d.armorMul;
  if(d.hpRegen)  g.hpRegen  += d.hpRegen;

  const flatDamage = Number(d.flatDamageAdd ?? d.flatDamage ?? 0);
  if(flatDamage) g.flatDamageAdd = (g.flatDamageAdd || 0) + flatDamage;

  if(d.fireFlat) g.fireFlat = (g.fireFlat || 0) + d.fireFlat;
  if(d.coldFlat) g.coldFlat = (g.coldFlat || 0) + d.coldFlat;
  if(d.lightningFlat) g.lightningFlat = (g.lightningFlat || 0) + d.lightningFlat;

  if(d.dmgInc) g.dmgInc += d.dmgInc;
  if(d.dmgMul) g.dmgMore *= d.dmgMul;
  if(d.dmgMore) g.dmgMore *= d.dmgMore;

  if(d.atkSpdInc) g.atkSpdInc += d.atkSpdInc;
  if(d.atkSpdMul) g.atkSpdMore *= d.atkSpdMul;
  if(d.atkSpdMore) g.atkSpdMore *= d.atkSpdMore;

  if(d.spdInc) g.spdInc += d.spdInc;
  if(d.spdMul) g.spdMore *= d.spdMul;
  if(d.spdMore) g.spdMore *= d.spdMore;

function setStickByVector(vx, vy){
  const r = pad.getBoundingClientRect();
  const max = Math.min(r.width, r.height) * 0.33;
  let d = Math.hypot(vx, vy) || 1;
  if(d > max){ vx *= max/d; vy *= max/d; }

  stick.style.left = "50%";
  stick.style.top  = "50%";
  stick.style.transform = `translate(calc(-50% + ${vx}px), calc(-50% + ${vy}px))`;

  joyDX = vx / max;
  joyDY = vy / max;

  if(Math.abs(vx) > Math.abs(vy))
    player.dir = vx > 0 ? "right" : "left";
  else
    player.dir = vy > 0 ? "down" : "up";
}

function handlePadMove(clientX, clientY){
  const r = pad.getBoundingClientRect();
  const cx = r.left + r.width/2;
  const cy = r.top + r.height/2;
  const vx = clientX - cx;
  const vy = clientY - cy;
  setStickByVector(vx, vy);
}

function rollWeaponDamage(){

    ? getCombatWeaponDisplayStats()

  return Number(w.min || 2) + Math.random() * (Number(w.max || 4) - Number(w.min || 2));

function getCritChance(){
  // 기본치 + Add → increased → more
  const g = player.gear || {};
  const base = (player.baseCritChance ?? 0.05); // 5% 기본
  const add = (g.critChanceAdd || 0);
  const inc = (g.critChanceInc || 0);
  const more = (g.critChanceMore || 1);
  return Math.max(0, (base + add) * (1 + inc) * more);
}
function getCritMulti(){
  // 기본치 + Add → increased → more
  const g = player.gear || {};
  const base = (player.baseCritMulti ?? 1.50); // x1.50 기본
  const add = (g.critMultiAdd || 0);
  const inc = (g.critMultiInc || 0);
  const more = (g.critMultiMore || 1);
  return Math.max(1, (base + add) * (1 + inc) * more);
}
function applyCrit(dmg){
  const chance = getCritChance();
  const multi = getCritMulti();
  const isCrit = (Math.random() < chance);
  return { dmg: isCrit ? dmg * multi : dmg, isCrit, chance, multi };
}

function applyBuff(target, type, value, duration, source="", mode="mul"){
  if(!target.activeBuffs) target.activeBuffs = [];
  const key = type + "|" + source + "|" + mode;
  const b = target.activeBuffs.find(x => x.key === key);

  if(b){
    b.value = value;
    b.duration = Math.max(b.duration, duration);
  }else{
    target.activeBuffs.push({ key, type, value, duration, mode });
  }
}

function mapBuffTypeToStat(type){
  if(type === "damage")   return "dmgMul";
  if(type === "speed")    return "spdMul";
  if(type === "atkSpeed") return "atkSpdMul";
  if(type === "range")        return "rangeMul";
  if(type === "meleeRange")   return "meleeRangeMul";
  if(type === "aoe")          return "aoeMul";
  if(type === "ultiAoe")      return "ultiAoeMul";
  if(type === "armor")        return "armorAdd";
  if(type === "armorMul")     return "armorMul";
  if(type === "maxHpMul")     return "maxHpMul";
  if(type === "maxHp")        return "maxHpAdd";
  if(type === "hpRegen")      return "hpRegen";
  return null;
}
function getEquippedWeaponAttackSpeed(){
  try{
    const eq = (typeof equipment !== "undefined" && equipment) ? equipment : null;
    const w = eq && eq.weapon ? eq.weapon : null;

    // 1) 장착 아이템 인스턴스에 직접 attackSpeed가 있으면 우선
    if(w && typeof w.attackSpeed === "number" && isFinite(w.attackSpeed)){
      return Math.max(0.2, w.attackSpeed);
    }

    // 2) 템플릿(베이스)에 attackSpeed가 있으면 사용
    if(w && typeof getItemTemplateById === "function"){
      const tmpl = getItemTemplateById(w.baseId || w.id);
      if(tmpl && typeof tmpl.attackSpeed === "number" && isFinite(tmpl.attackSpeed)){
        return Math.max(0.2, tmpl.attackSpeed);
      }
    }

    // 3) fallback: 비무장 기본 공격속도
    const u = (typeof getUnarmedWeaponProfile === "function") ? getUnarmedWeaponProfile() : { attackSpeed: 1.0 };
    if(typeof u.attackSpeed === "number" && isFinite(u.attackSpeed)){
      return Math.max(0.2, u.attackSpeed);
    }
  }catch(err){
    console.warn("getEquippedWeaponAttackSpeed failed", err);
  }

  return 1;
}
function updateBuffs(target){
  if(!target.activeBuffs) target.activeBuffs = [];
  target.buffs = defaultBuffStats();

 if(target === player){
  target.buffs.dmgMul   *= (player.gear.dmgMul ?? 1);
  target.buffs.rangeMul *= (player.gear.rangeMul ?? 1);
  target.buffs.spdMul    *= (player.gear.spdMul ?? 1);
  target.buffs.atkSpdMul *= (player.gear.atkSpdMul ?? 1);

  // ✅ 무기 기본 공격속도 반영
  target.buffs.atkSpdMul *= getEquippedWeaponAttackSpeed();

  target.buffs.armorAdd += (player.gear.armorAdd ?? 0);
  target.buffs.armorMul *= (player.gear.armorMul ?? 1);
  target.buffs.maxHpMul *= (player.gear.maxHpMul ?? 1);
  target.buffs.maxHpAdd += (player.gear.maxHpAdd ?? 0) + (player.gear.maxLife ?? 0);
  target.buffs.hpRegen  += (player.gear.hpRegen ?? 0);
}

  for(let i = target.activeBuffs.length - 1; i >= 0; i--){
    const b = target.activeBuffs[i];
    b.duration--;
    if(b.duration <= 0){
      target.activeBuffs.splice(i,1);
      continue;
    }
    const stat = mapBuffTypeToStat(b.type);
    if(!stat) continue;

    if(b.mode === "mul"){
      if(target.buffs[stat] !== undefined) target.buffs[stat] *= b.value;
    }else if(b.mode === "add"){
      if(target.buffs[stat] !== undefined) target.buffs[stat] += b.value;
    }
  }

  if(target === player){
    const b = target.buffs;
    const newMax = Math.max(1, Math.floor(target.baseMaxHp * (b.maxHpMul ?? 1) + (b.maxHpAdd ?? 0)));
    target.maxHp = newMax;
    if(target.hp > target.maxHp) target.hp = target.maxHp;
    target.armor = Math.max(0, (target.baseArmor + (b.armorAdd ?? 0)) * (b.armorMul ?? 1));
  }
}

function pruneDeadEnemies(){
  if(Array.isArray(enemies)){
    for(const e of enemies){
      if(e && Number(e.hp || 0) <= 0){
        rewardEnemyDeathOnce(e);
        if(typeof spawnTypeDeathFxRuntime === "function") spawnTypeDeathFxRuntime(e);
      }
    }
  }
  enemies = enemies.filter(e =>
    (e.hp > 0) ||
    (e.dead && e.deathTimer > 0)
  );
  for(const p of packs){
    if(Array.isArray(p.enemies)){
      for(const e of p.enemies){
        if(e && Number(e.hp || 0) <= 0){
          rewardEnemyDeathOnce(e);
          if(typeof spawnTypeDeathFxRuntime === "function") spawnTypeDeathFxRuntime(e);
        }
      }
    }
    p.enemies = p.enemies.filter(e => e.hp > 0 || (e.dead && e.deathTimer > 0));
  }
}

function getRandomVisibleAliveEnemy(){
  const visible = enemies.filter(e =>
    e.hp > 0 &&
    !(e.type === "boss" && e.dead) &&
    isEnemyOnScreen(e)
  );
  if(visible.length === 0) return null;
  return visible[(Math.random() * visible.length) | 0];
}

function getRandomAliveEnemy(){
  const alive = enemies.filter(e => e.hp > 0 && !(e.type === "boss" && e.dead));
  if(alive.length === 0) return null;
  return alive[(Math.random() * alive.length) | 0];
}

function getLevelPenalty(playerLv, monsterLv){
  const diff = monsterLv - playerLv;
  if(diff >= 0) return 1 + diff * 0.04;
  if(diff <= -6) return 0.1;
  return 1 + diff * 0.12;
}

function tierScale(t){
  const hpMul  = 1 + (t-1) * 0.22;
  const dmgMul = 1 + (t-1) * 0.16;
  const spdMul = 1 + Math.min(0.25, (t-1) * 0.02);
  const eliteChance = clamp(0.06 + (t-1) * 0.008, 0.06, 0.22);
  const eliteHpMul = 2.4;
  const eliteDmgMul = 1.9;
  return { hpMul, dmgMul, spdMul, eliteChance, eliteHpMul, eliteDmgMul };
}
