/* ✅ ISOMETRIC DRAW (NEW)        */
/* ============================= */
function drawIsoFloorTile(sx, sy, variant, x=0, y=0){
  const w = ISO.tileW, h = ISO.tileH;

  // base diamond
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();

  // POE-ish stone variation (deterministic-ish)
  const v = variant & 3;
  if(v === 0) ctx.fillStyle = "#1b1b1b";
  else if(v === 1) ctx.fillStyle = "#202020";
  else if(v === 2) ctx.fillStyle = "#181818";
  else ctx.fillStyle = "#242424";
  ctx.fill();

  // subtle bevel (light from top-left)
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.strokeStyle = "rgba(255,255,255,0.09)";
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(sx - w/2, sy);
  ctx.lineTo(sx, sy - h/2);
  ctx.strokeStyle = "rgba(255,255,255,0.02)";
  ctx.stroke();

  // dark edge (bottom-right)
  ctx.beginPath();
  ctx.moveTo(sx, sy + h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // faint grid line
  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.stroke();
}

function drawIsoWallBlock(sx, sy, opts={}){
  const w = ISO.tileW, h = ISO.tileH;
  const wallH = ISO.wallH || (h * 2.2);
  const topY = sy - wallH;

  // shadow cast on floor (soft)
  ctx.save();
  ctx.globalAlpha *= 0.55;
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fill();
  ctx.restore();

  // ===== TOP (brighter stone) =====
  ctx.beginPath();
  ctx.moveTo(sx, topY - h/2);
  ctx.lineTo(sx + w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx - w/2, topY);
  ctx.closePath();
  ctx.fillStyle = "#35302a";
  ctx.fill();

  // top bevel highlight
  ctx.strokeStyle = "rgba(255,255,255,0.10)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx - w/2, topY);
  ctx.lineTo(sx, topY - h/2);
  ctx.lineTo(sx + w/2, topY);
  ctx.stroke();

  // ===== LEFT FACE (mid) =====
  ctx.beginPath();
  ctx.moveTo(sx - w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "#26211c";
  ctx.fill();

  // ===== RIGHT FACE (dark) =====
  ctx.beginPath();
  ctx.moveTo(sx + w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "#1f1a16";
  ctx.fill();

  // edges / corner lines
  ctx.strokeStyle = "rgba(0,0,0,0.70)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx - w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx + w/2, topY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(sx - w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.stroke();

  // tiny rune-like accent (optional)
  if(opts.rune){
    ctx.save();
    ctx.globalAlpha *= 0.22;
    ctx.strokeStyle = "rgba(255,80,60,0.55)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx, topY + h*0.15);
    ctx.lineTo(sx, sy - h*0.05);
    ctx.stroke();
    ctx.restore();
  }
}

function drawIsoPillar(sx, sy){
  const w = ISO.tileW, h = ISO.tileH;
  const wallH = ISO.wallH || (h * 2.2);
  const topY = sy - wallH - h*0.25;

  // base shadow
  ctx.save();
  ctx.globalAlpha *= 0.55;
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fill();
  ctx.restore();

  // column body (simple: stacked faces)
  // left
  ctx.beginPath();
  ctx.moveTo(sx - w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx, sy + h*0.45);
  ctx.lineTo(sx - w*0.22, sy + h*0.22);
  ctx.closePath();
  ctx.fillStyle = "#2b2620";
  ctx.fill();

  // right
  ctx.beginPath();
  ctx.moveTo(sx + w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx, sy + h*0.45);
  ctx.lineTo(sx + w*0.22, sy + h*0.22);
  ctx.closePath();
  ctx.fillStyle = "#211c17";
  ctx.fill();

  // cap
  ctx.beginPath();
  ctx.moveTo(sx, topY - h*0.22);
  ctx.lineTo(sx + w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx - w*0.22, topY);
  ctx.closePath();
  ctx.fillStyle = "#3a342d";
  ctx.fill();

  ctx.strokeStyle = "rgba(0,0,0,0.75)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx - w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx + w*0.22, topY);
  ctx.stroke();
}

function drawIsoDisc(sx, sy, r, fill, stroke){
  ctx.save();
  ctx.translate(sx, sy);
  // 아이소메트릭 느낌(원 → 타원)
  ctx.scale(1, 0.62);
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.closePath();
  if(fill){
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if(stroke){
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.restore();
}

// ✅ exact-1-tile ellipse helpers (match isometric tile proportions)
function __isoTileScaleY(){
  // tile diamond is ISO.tileW : ISO.tileH (usually 1 : 0.5)
  // use that ratio for effects that must fit exactly 1 tile footprint
  return (ISO && ISO.tileW && ISO.tileH) ? (ISO.tileH / ISO.tileW) : 0.5;
}
function drawIsoDiscTile(sx, sy, r, fill, stroke){
  const syScale = __isoTileScaleY();
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, syScale);
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.closePath();
  if(fill){ ctx.fillStyle = fill; ctx.fill(); }
  if(stroke){ ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
  ctx.restore();
}
function drawIsoRingGlowTile(sx, sy, r, innerA, outerA){
  const syScale = __isoTileScaleY();
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, syScale);

  const g = ctx.createRadialGradient(0,0, r*0.15, 0,0, r*1.05);
  g.addColorStop(0.00, `rgba(255,200,120,0)`);
  g.addColorStop(0.35, `rgba(255,200,120,${Math.max(0, innerA*0.55)})`);
  g.addColorStop(0.55, `rgba(255,120,20,${innerA})`);
  g.addColorStop(0.85, `rgba(255,60,0,${outerA})`);
  g.addColorStop(1.00, `rgba(0,0,0,0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0,0,r*1.05,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = `rgba(255,180,80,${Math.min(0.55, innerA+0.12)})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,r*0.98,0,Math.PI*2);
  ctx.stroke();

  ctx.restore();
}
function drawIsoPlayerSprite(sx, sy, p){
  const r = (p && p.radius!=null) ? p.radius : 14;
  const dir = (p && p.dir) ? p.dir : "down";

  // Equipped visuals (safe access)
  const eq = (typeof equipment !== "undefined" && equipment) ? equipment : (window.equipment||{});
  const helmId  = (eq && eq.helm  && (eq.helm.baseId || eq.helm.id))  ? (eq.helm.baseId || eq.helm.id)  : null;
  const chestId = (eq && eq.chest && (eq.chest.baseId || eq.chest.id)) ? (eq.chest.baseId || eq.chest.id) : null;
  const helmRarity  = (eq && eq.helm  && eq.helm.rarity)  ? eq.helm.rarity  : "normal";
  const chestRarity = (eq && eq.chest && eq.chest.rarity) ? eq.chest.rarity : "normal";

  // Ground shadow (iso disc)
  if(SHOW_SHADOWS) drawIsoDisc(sx, sy + 9, r*1.25, "rgba(0,0,0,0.48)", null);
// Helper: round-rect fallback (iOS 안전)
  function rr(x,y,w,h,rad){
    if(ctx.roundRect){
      ctx.roundRect(x,y,w,h,rad);
    }else{
      const r2 = Math.min(rad, Math.abs(w)/2, Math.abs(h)/2);
      ctx.moveTo(x+r2, y);
      ctx.arcTo(x+w, y,   x+w, y+h, r2);
      ctx.arcTo(x+w, y+h, x,   y+h, r2);
      ctx.arcTo(x,   y+h, x,   y,   r2);
      ctx.arcTo(x,   y,   x+w, y,   r2);
    }
  }

  // Direction offsets for slight "face" shift
  const fx = dir==="left" ? -r*0.16 : dir==="right" ? r*0.16 : 0;
  const fy = dir==="up"   ? -r*0.12 : dir==="down"  ? r*0.10 : 0;

  // Visual presets (POE-ish, simple but readable)
  function getEsRarityPalette(rarity){
    if(rarity === "magic"){
      return {
        fill:"rgba(52,78,156,0.98)",
        trim:"rgba(130,190,255,0.92)",
        glow:"rgba(110,170,255,0.32)"
      };
    }
    if(rarity === "rare"){
      return {
        fill:"rgba(124,100,30,0.98)",
        trim:"rgba(255,226,110,0.92)",
        glow:"rgba(255,214,90,0.28)"
      };
    }
    if(rarity === "unique"){
      return {
        fill:"rgba(124,64,26,0.98)",
        trim:"rgba(255,154,60,0.96)",
        glow:"rgba(255,130,40,0.30)"
      };
    }
    return {
      fill:"rgba(90,92,102,0.98)",
      trim:"rgba(180,184,196,0.88)",
      glow:"rgba(210,210,220,0.14)"
    };
  }

  const HELM_LOOK = {
    leather_cap:  { kind:"cap",    fill:"rgba(55,42,28,0.98)", trim:"rgba(0,0,0,0.45)" },
    iron_helmet:  { kind:"dome",   fill:"rgba(95,98,105,0.98)", trim:"rgba(0,0,0,0.55)" },
    soldier_helm: { kind:"guard",  fill:"rgba(88,92,100,0.98)", trim:"rgba(0,0,0,0.60)" },
    templar_helm: { kind:"crest",  fill:"rgba(86,90,98,0.98)", trim:"rgba(202,166,85,0.70)" },
    warlord_helm: { kind:"horns",  fill:"rgba(78,82,92,0.98)", trim:"rgba(180,60,60,0.80)" },
    apprentice_hood: { kind:"witch", es:true },
    runed_circlet:   { kind:"witch", es:true },
    sorcerer_crown:  { kind:"witch", es:true }
  };

  const CHEST_LOOK = {
    tattered_armor:{ kind:"cloth",  fill:"rgba(38,30,22,0.96)", trim:"rgba(0,0,0,0.45)" },
    chainmail:     { kind:"chain",  fill:"rgba(42,44,48,0.96)", trim:"rgba(202,166,85,0.35)" },
    scalemail:     { kind:"scale",  fill:"rgba(36,40,44,0.98)", trim:"rgba(0,0,0,0.55)" },
    plate_armor:   { kind:"plate",  fill:"rgba(30,34,40,0.99)", trim:"rgba(202,166,85,0.60)" },
    astral_plate:  { kind:"astral", fill:"rgba(26,30,36,0.99)", trim:"rgba(120,200,255,0.55)" },
    silk_robe:          { kind:"robe", es:true },
    thaumaturge_robe:   { kind:"robe", es:true },
    archmage_vestment:  { kind:"robe", es:true }
  };

  const helmLook  = (helmId  && HELM_LOOK[helmId])  ? HELM_LOOK[helmId]  : null;
  const chestLook = (chestId && CHEST_LOOK[chestId])? CHEST_LOOK[chestId] : null;

  ctx.save();
  ctx.translate(sx, sy - 12);
  // compress Y for iso look
  ctx.scale(1, 0.78);

  // ===== Lower body (bigger, visible) =====
  const hipY = r*0.10;
  const footY = r*1.25;

  // legs (pants)
  ctx.fillStyle = "rgba(26,22,18,0.98)";
  // left leg
  ctx.beginPath();
  rr(-r*0.32, hipY, r*0.28, r*0.95, 7);
  ctx.fill();
  // right leg
  ctx.beginPath();
  rr(r*0.04, hipY, r*0.28, r*0.95, 7);
  ctx.fill();

  // boots
  ctx.fillStyle = "rgba(18,14,12,0.98)";
  ctx.beginPath(); rr(-r*0.36, footY - r*0.18, r*0.34, r*0.22, 7); ctx.fill();
  ctx.beginPath(); rr(r*0.02,  footY - r*0.18, r*0.34, r*0.22, 7); ctx.fill();

  // knee highlight
  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-r*0.29, hipY + r*0.40); ctx.lineTo(-r*0.07, hipY + r*0.40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( r*0.07, hipY + r*0.40); ctx.lineTo( r*0.29, hipY + r*0.40); ctx.stroke();

  // ===== Base torso silhouette (small upper) =====
  // torso base (no armor default)
  ctx.fillStyle = "rgba(34,30,26,0.96)";
  ctx.beginPath();
  rr(-r*0.44, -r*0.55, r*0.88, r*0.62, 10);
  ctx.fill();

  // belt
  ctx.strokeStyle = "rgba(0,0,0,0.55)";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-r*0.44, hipY);
  ctx.lineTo( r*0.44, hipY);
  ctx.stroke();

  // ===== Arms (simple) =====
  ctx.fillStyle = "rgba(30,26,22,0.98)";
  ctx.beginPath(); rr(-r*0.62, -r*0.42, r*0.20, r*0.52, 9); ctx.fill();
  ctx.beginPath(); rr( r*0.42, -r*0.42, r*0.20, r*0.52, 9); ctx.fill();

  // ===== Head base =====
  const headX = fx*0.65;
  const headY = -r*0.88 + fy*0.35;
  ctx.fillStyle = "rgba(214,182,150,0.98)";
  ctx.beginPath();
  ctx.arc(headX, headY, r*0.22, 0, Math.PI*2);
  ctx.fill();

  // hair / mask line (when no helm)
  if(!helmLook){
    ctx.strokeStyle = "rgba(20,12,10,0.85)";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(headX - r*0.20, headY - r*0.06);
    ctx.lineTo(headX + r*0.18, headY - r*0.06);
    ctx.stroke();
  }

  // ===== Equipment overlays =====
  // Chest armor overlay (replaces "naked" torso look)
  if(chestLook){
    if(chestLook.es && chestLook.kind==="robe"){
      const robePal = getEsRarityPalette(chestRarity);
      ctx.fillStyle = robePal.fill;
      ctx.beginPath();
      ctx.moveTo(-r*0.46, -r*0.60);
      ctx.lineTo( r*0.46, -r*0.60);
      ctx.lineTo( r*0.36,  r*0.14);
      ctx.lineTo( r*0.56,  r*1.05);
      ctx.lineTo( r*0.22,  r*1.05);
      ctx.lineTo( r*0.08,  r*0.16);
      ctx.lineTo(-r*0.08,  r*0.16);
      ctx.lineTo(-r*0.22,  r*1.05);
      ctx.lineTo(-r*0.56,  r*1.05);
      ctx.lineTo(-r*0.36,  r*0.14);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "rgba(0,0,0,0.16)";
      ctx.beginPath(); rr(-r*0.62, -r*0.56, r*0.24, r*0.24, 9); ctx.fill();
      ctx.beginPath(); rr( r*0.38, -r*0.56, r*0.24, r*0.24, 9); ctx.fill();

      ctx.strokeStyle = robePal.trim;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -r*0.56);
      ctx.lineTo(0, r*0.96);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-r*0.28, -r*0.24);
      ctx.lineTo(0, -r*0.42);
      ctx.lineTo(r*0.28, -r*0.24);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, -r*0.16, r*0.12, 0, Math.PI*2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(0,0,0,0.36)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-r*0.46, -r*0.60);
      ctx.lineTo( r*0.46, -r*0.60);
      ctx.lineTo( r*0.36,  r*0.14);
      ctx.lineTo( r*0.56,  r*1.05);
      ctx.lineTo( r*0.22,  r*1.05);
      ctx.lineTo( r*0.08,  r*0.16);
      ctx.lineTo(-r*0.08,  r*0.16);
      ctx.lineTo(-r*0.22,  r*1.05);
      ctx.lineTo(-r*0.56,  r*1.05);
      ctx.lineTo(-r*0.36,  r*0.14);
      ctx.closePath();
      ctx.stroke();

      ctx.globalAlpha *= 0.90;
      ctx.strokeStyle = robePal.glow;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, -r*0.16, r*0.22, 0, Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha /= 0.90;
    }else{
      ctx.fillStyle = chestLook.fill;
      ctx.beginPath();
      rr(-r*0.48, -r*0.58, r*0.96, r*0.70, 11);
      ctx.fill();

      // shoulder pads for heavier armor
      if(chestLook.kind==="plate" || chestLook.kind==="astral"){
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.beginPath(); rr(-r*0.66, -r*0.58, r*0.26, r*0.28, 10); ctx.fill();
        ctx.beginPath(); rr( r*0.40, -r*0.58, r*0.26, r*0.28, 10); ctx.fill();
      }

      // pattern hints
      ctx.strokeStyle = chestLook.trim;
      ctx.lineWidth = 2;
      if(chestLook.kind==="chain"){
        for(let i=-3;i<=3;i++){
          ctx.beginPath();
          ctx.arc(i*r*0.12, -r*0.32, r*0.09, 0, Math.PI*2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(i*r*0.12 + r*0.06, -r*0.18, r*0.09, 0, Math.PI*2);
          ctx.stroke();
        }
      }else if(chestLook.kind==="scale"){
        for(let y=0;y<4;y++){
          for(let x=-3;x<=3;x++){
            ctx.beginPath();
            ctx.arc(x*r*0.11 + (y%2? r*0.05:0), -r*0.45 + y*r*0.12, r*0.07, 0, Math.PI);
            ctx.stroke();
          }
        }
      }else{
        ctx.beginPath();
        ctx.moveTo(-r*0.30, -r*0.42);
        ctx.lineTo( r*0.30, -r*0.05);
        ctx.stroke();
        ctx.beginPath();
        rr(-r*0.48, -r*0.58, r*0.96, r*0.70, 11);
        ctx.stroke();
      }

      // astral glow
      if(chestLook.kind==="astral"){
        ctx.globalAlpha *= 0.85;
        ctx.strokeStyle = "rgba(120,200,255,0.55)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, -r*0.25, r*0.22, 0, Math.PI*2);
        ctx.stroke();
        ctx.globalAlpha /= 0.85;
      }
    }
  }

  // Helmet overlay
  if(helmLook){
    const hx = headX;
    const hy = headY;
    const hr = r*0.24;
    if(helmLook.es && helmLook.kind==="witch"){
      const hatPal = getEsRarityPalette(helmRarity);
      ctx.fillStyle = hatPal.fill;

      // brim
      ctx.beginPath();
      ctx.ellipse(hx, hy + hr*0.18, hr*1.45, hr*0.42, 0, 0, Math.PI*2);
      ctx.fill();

      // cone
      ctx.beginPath();
      ctx.moveTo(hx - hr*0.92, hy + hr*0.12);
      ctx.quadraticCurveTo(hx - hr*0.22, hy - hr*0.98, hx + hr*0.02, hy - hr*1.78);
      ctx.quadraticCurveTo(hx + hr*0.44, hy - hr*1.02, hx + hr*0.88, hy + hr*0.06);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = hatPal.trim;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(hx - hr*0.58, hy - hr*0.14);
      ctx.quadraticCurveTo(hx - hr*0.06, hy - hr*0.40, hx + hr*0.38, hy - hr*0.06);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(hx + hr*0.10, hy - hr*0.36, hr*0.10, 0, Math.PI*2);
      ctx.stroke();

      ctx.globalAlpha *= 0.90;
      ctx.strokeStyle = hatPal.glow;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(hx, hy + hr*0.18, hr*1.58, hr*0.50, 0, 0, Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha /= 0.90;

      ctx.strokeStyle = "rgba(0,0,0,0.42)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(hx, hy + hr*0.18, hr*1.45, hr*0.42, 0, 0, Math.PI*2);
      ctx.stroke();
    }else{
      ctx.fillStyle = helmLook.fill;
      if(helmLook.kind==="cap"){
        ctx.beginPath();
        ctx.arc(hx, hy - hr*0.10, hr*1.05, Math.PI*1.05, Math.PI*2.05);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.beginPath(); rr(hx-hr*1.05, hy-hr*0.20, hr*2.10, hr*0.90, 10); ctx.fill();
      }else{
        // base dome
        ctx.beginPath();
        ctx.arc(hx, hy - hr*0.08, hr*1.10, 0, Math.PI*2);
        ctx.fill();

        // visor / face slit
        ctx.strokeStyle = "rgba(0,0,0,0.60)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(hx-hr*0.70, hy+hr*0.05);
        ctx.lineTo(hx+hr*0.70, hy+hr*0.05);
        ctx.stroke();

        if(helmLook.kind==="guard"){
          // nose guard
          ctx.strokeStyle = "rgba(0,0,0,0.55)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(hx, hy-hr*0.55);
          ctx.lineTo(hx, hy+hr*0.55);
          ctx.stroke();
        }else if(helmLook.kind==="crest"){
          // crest
          ctx.strokeStyle = helmLook.trim;
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(hx, hy-hr*1.25);
          ctx.lineTo(hx, hy-hr*0.30);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(hx-hr*0.50, hy-hr*0.85);
          ctx.lineTo(hx+hr*0.50, hy-hr*0.85);
          ctx.stroke();
        }else if(helmLook.kind==="horns"){
          ctx.strokeStyle = helmLook.trim;
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(hx-hr*0.65, hy-hr*0.55);
          ctx.lineTo(hx-hr*1.25, hy-hr*1.05);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(hx+hr*0.65, hy-hr*0.55);
          ctx.lineTo(hx+hr*1.25, hy-hr*1.05);
          ctx.stroke();
        }
      }

      // helmet outline
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(hx, hy - hr*0.08, hr*1.10, 0, Math.PI*2);
      ctx.stroke();
    }
  }
    // ===== Weapon / Offhand (equipped) + Arms =====
  const weaponObj = (eq && eq.weapon) ? eq.weapon : null;
  const weaponId  = (weaponObj && (weaponObj.baseId || weaponObj.id)) ? (weaponObj.baseId || weaponObj.id) : null;
  const offhandObj = (eq && eq.offhand) ? eq.offhand : null;
  const offhandId  = (offhandObj && (offhandObj.baseId || offhandObj.id)) ? (offhandObj.baseId || offhandObj.id) : null;

  // weaponType fallback: some items store weaponType on template, not instance
  let weaponType = (weaponObj && weaponObj.weaponType) ? weaponObj.weaponType : null;
  if(!weaponType && weaponId && typeof getItemTemplateById === "function"){
    const tmpl = getItemTemplateById(weaponId);
    if(tmpl && tmpl.weaponType) weaponType = tmpl.weaponType;
  }

  let offhandKind = null;
  if(offhandObj){
    let otmpl = null;
    if(offhandId && typeof getItemTemplateById === "function"){
      otmpl = getItemTemplateById(offhandId);
    }
    const offTags = []
      .concat(Array.isArray(offhandObj.tags) ? offhandObj.tags : [])
      .concat(otmpl && Array.isArray(otmpl.tags) ? otmpl.tags : [])
      .map(v => String(v || "").toLowerCase());
    if(offTags.includes("focus") || (offTags.includes("spell") && !offTags.includes("shield"))){
      offhandKind = "focus";
    }else{
      offhandKind = "shield";
    }
  }

  const weaponRarity = (weaponObj && weaponObj.rarity) ? weaponObj.rarity : null;
  const offhandRarity = (offhandObj && offhandObj.rarity) ? offhandObj.rarity : null;

  function rarityTint(r){
    if(r==="magic")  return { blade:"rgba(120,200,255,0.95)", metal:"rgba(70,140,255,0.95)", glow:"rgba(110,170,255,0.24)" };
    if(r==="rare")   return { blade:"rgba(255,232,170,0.95)", metal:"rgba(202,166,85,0.95)", glow:"rgba(255,214,90,0.22)" };
    if(r==="unique") return { blade:"rgba(255,205,150,0.96)", metal:"rgba(255,140,60,0.95)", glow:"rgba(255,132,52,0.24)" };
    return { blade:"rgba(235,240,245,0.95)", metal:"rgba(200,200,200,0.92)", glow:"rgba(255,255,255,0.10)" };
  }

  function isTwoHandKind(kind){
    return kind === "2h_axe" || kind === "warstaff" || kind === "staff" || kind === "2h_mace" || kind === "2h_sword";
  }
  function isOneHandKind(kind){
    return kind === "1h_sword" || kind === "1h_axe" || kind === "1h_mace" || kind === "wand";
  }

  function drawWeaponAndArm(kind){
    const isTwoHand = isTwoHandKind(kind);
    const isOneHand = isOneHandKind(kind);
    const isWand = kind === "wand";
    const t = rarityTint(weaponRarity);

    const facing = (typeof attackDir !== "undefined" && attackDir) ? attackDir : dir;
    const side = (facing === "left") ? -1 : 1;
    let wwSideMul = 0;
    if(player && player.whirlwindActive && (player.whirlwindPose || 0) > 0){
      const poseT = (player.whirlwindPose || 0) / Math.max(1, player.whirlwindPoseMax || 1);
      wwSideMul = (player.whirlwindSide || 1) * poseT;
    }
    const handX = r*(isTwoHand ? 0.62 : 0.56)*side + wwSideMul * r*(isTwoHand ? 0.24 : 0.16);
    const handY = isTwoHand ? r*0.02 : -r*0.02;

    let ang = 0;
    if(typeof attacking !== "undefined" && attacking){
      const f = (typeof attackFrame !== "undefined") ? attackFrame : 0;
      const u = Math.max(0, Math.min(1, f/8));
      if(isTwoHand){
        ang = (-1.10) * (1-u) + (0.35) * u;
      }else if(isWand){
        ang = (-0.72) * (1-u) + (0.24) * u;
      }else{
        ang = (-0.82) * (1-u) + (0.28) * u;
      }
    }
    const moving = (typeof moveLen !== "undefined") ? (moveLen > 0.05) : (typeof vx !== "undefined" && typeof vy !== "undefined" ? (Math.abs(vx)+Math.abs(vy) > 0.02) : false);
    const fc = (typeof frameCount !== "undefined") ? frameCount : 0;
    const sway = (moving ? 1 : 0) * Math.sin(fc * 0.18) * (isTwoHand ? 0.10 : 0.06);
    if(!(typeof attacking !== "undefined" && attacking)){
      ang = sway;
    }
    if(isTwoHand){
      ang *= 1.6;
    }
    if(kind !== "2h_axe"){
      ang = -ang;
    }
    if(wwSideMul !== 0){
      ang += wwSideMul * (isTwoHand ? 0.55 : 0.28);
    }

    const flip = side;
    ctx.save();
    ctx.translate(handX, handY);
    ctx.scale(flip, 1);
    ctx.rotate(ang);

    ctx.save();
    ctx.rotate(-ang * (isTwoHand ? 1 : 0.45));
    ctx.strokeStyle = "rgba(40,40,40,0.85)";
    ctx.lineWidth = isTwoHand ? 2.6 : 2.2;
    ctx.beginPath();
    ctx.moveTo(-r*0.10, -r*0.14);
    ctx.lineTo(0, 0);
    ctx.stroke();
    ctx.restore();

    if(kind === "unarmed"){
      ctx.save();
      ctx.rotate(-ang * 0.35);
      const fistX = r*0.06;
      const fistY = -r*0.04;
      ctx.fillStyle = "rgba(210,172,145,0.96)";
      ctx.beginPath();
      ctx.arc(fistX, fistY, r*0.10, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.28)";
      ctx.lineWidth = 1.2;
      ctx.stroke();
      if(typeof attacking !== "undefined" && attacking){
        ctx.strokeStyle = "rgba(255,235,190,0.24)";
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.arc(fistX, fistY, r*0.26, -0.9, 0.55, false);
        ctx.stroke();
      }
      ctx.restore();
      ctx.restore();
      return;
    }

    if(isTwoHand){
      const targetGrip = (typeof attacking !== "undefined" && attacking) ? (r*0.30) : (r*0.22);
      __backHandLag += (targetGrip - __backHandLag) * 0.22;
      const gripY = __backHandLag;
      ctx.save();
      ctx.rotate(-ang);
      ctx.strokeStyle = "rgba(40,40,40,0.80)";
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.moveTo(r*0.06, -r*0.10);
      ctx.lineTo(0, gripY);
      ctx.stroke();
      ctx.restore();
    }

    const WEAPON_SCALE = isTwoHand ? 1.65 : (isWand ? 2.01 : 1.95);
    ctx.save();
    ctx.scale(WEAPON_SCALE, WEAPON_SCALE);

    const handleBottom = isTwoHand ? r*0.62 : r*0.34;
    ctx.strokeStyle = "rgba(110,70,30,0.95)";
    ctx.lineWidth = isTwoHand ? 3.2 : 2.6;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, handleBottom);
    ctx.stroke();

    if(kind === "staff" || kind === "warstaff"){
      ctx.strokeStyle = "rgba(120,80,35,0.95)";
      ctx.lineWidth = 3.0;
      ctx.beginPath();
      ctx.moveTo(0, -r*0.78);
      ctx.lineTo(0, r*0.62);
      ctx.stroke();

      ctx.fillStyle = t.metal;
      ctx.beginPath(); ctx.arc(0, -r*0.82, 3.2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.45)";
      ctx.lineWidth = 1.6;
      ctx.stroke();

    } else if(kind === "2h_axe" || kind === "1h_axe"){
      const by = (kind === "2h_axe") ? -r*0.30 : -r*0.16;
      const bladeW = (kind === "2h_axe") ? r*0.62 : r*0.38;
      const bladeH = (kind === "2h_axe") ? r*0.28 : r*0.18;
      ctx.fillStyle = t.blade;
      ctx.beginPath();
      ctx.moveTo(0, by);
      ctx.lineTo(bladeW, by - bladeH);
      ctx.lineTo(bladeW, by + bladeH);
      ctx.closePath();
      ctx.fill();
      ctx.save();
      ctx.globalCompositeOperation = "destination-out";
      ctx.beginPath();
      ctx.moveTo(bladeW*0.24, by);
      ctx.lineTo(bladeW*0.90, by - bladeH*0.42);
      ctx.lineTo(bladeW*0.90, by + bladeH*0.42);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineWidth = 1.6;
      ctx.stroke();

    } else if(kind === "2h_mace" || kind === "1h_mace"){
      const hy = (kind === "2h_mace") ? -r*0.34 : -r*0.18;
      const w  = (kind === "2h_mace") ? r*0.74 : r*0.42;
      const h  = (kind === "2h_mace") ? r*0.24 : r*0.18;
      ctx.fillStyle = t.metal;
      ctx.beginPath();
      ctx.rect(-w/2, hy - h/2, w, h);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineWidth = 1.6;
      ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      const studCount = (kind === "2h_mace") ? 4 : 3;
      for(let i=0;i<studCount;i++){
        ctx.beginPath();
        ctx.arc((-w*0.28 + i*(w*0.18)), hy - h*0.12, 0.95, 0, Math.PI*2);
        ctx.fill();
      }

    } else if(kind === "wand"){
      ctx.strokeStyle = "rgba(132,92,54,0.98)";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(0, -r*0.38);
      ctx.lineTo(0, r*0.28);
      ctx.stroke();

      ctx.fillStyle = t.metal;
      ctx.beginPath();
      ctx.arc(0, -r*0.42, r*0.10, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = t.glow;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.arc(0, -r*0.42, r*0.18, 0, Math.PI*2);
      ctx.stroke();

    } else {
      const bladeTop = isTwoHand ? -r*0.80 : -r*0.42;
      const tipTop   = isTwoHand ? -r*0.86 : -r*0.48;
      const tipBase  = isTwoHand ? -r*0.74 : -r*0.36;
      const guardW   = isTwoHand ? r*0.18 : r*0.14;
      ctx.strokeStyle = t.blade;
      ctx.lineWidth = isTwoHand ? 3.0 : 2.4;
      ctx.beginPath();
      ctx.moveTo(0, bladeTop);
      ctx.lineTo(0, 0);
      ctx.stroke();

      ctx.fillStyle = t.blade;
      ctx.beginPath();
      ctx.moveTo(0, tipTop);
      ctx.lineTo(-r*0.10, tipBase);
      ctx.lineTo(r*0.10, tipBase);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = t.metal;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(-guardW, -r*0.02);
      ctx.lineTo(guardW, -r*0.02);
      ctx.stroke();
    }
    ctx.restore();
    ctx.restore();
  }

  function drawOffhandAndArm(kind){
    const t = rarityTint(offhandRarity);
    const facing = (typeof attackDir !== "undefined" && attackDir) ? attackDir : dir;
    const mainSide = (facing === "left") ? -1 : 1;
    const offSide = -mainSide;
    const handX = r*0.68*offSide;
    const handY = -r*0.02;
    const ang = offSide * 0.10;

    ctx.save();
    ctx.translate(handX, handY);
    ctx.scale(offSide, 1);
    ctx.rotate(ang);

    ctx.strokeStyle = "rgba(36,36,36,0.82)";
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(-r*0.08, -r*0.14);
    ctx.lineTo(0, 0);
    ctx.stroke();

    if(kind === "shield"){
      const shW = r*0.62;
      const shH = r*0.94;
      const top = -r*0.50;
      const left = -shW/2;
      const right = shW/2;

      ctx.fillStyle = t.metal;
      ctx.beginPath();
      ctx.rect(left, top, shW, shH);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.10)";
      ctx.beginPath();
      ctx.rect(left + r*0.03, top + r*0.03, shW - r*0.06, shH*0.28);
      ctx.fill();

      ctx.strokeStyle = "rgba(0,0,0,0.60)";
      ctx.lineWidth = 2.2;
      ctx.strokeRect(left, top, shW, shH);

      ctx.strokeStyle = t.blade;
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.moveTo(0, top + r*0.08);
      ctx.lineTo(0, top + shH - r*0.08);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(left + r*0.08, top + shH*0.44);
      ctx.lineTo(right - r*0.08, top + shH*0.44);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 1.0;
      ctx.beginPath();
      ctx.moveTo(left + r*0.06, top + r*0.06);
      ctx.lineTo(right - r*0.06, top + r*0.06);
      ctx.stroke();
    }else{
      ctx.fillStyle = t.metal;
      ctx.beginPath();
      ctx.arc(0, -r*0.06, r*0.24, 0, Math.PI*2);
      ctx.fill();

      ctx.strokeStyle = t.glow;
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.arc(0, -r*0.06, r*0.40, 0, Math.PI*2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-r*0.30, -r*0.06);
      ctx.lineTo(r*0.30, -r*0.06);
      ctx.moveTo(0, -r*0.38);
      ctx.lineTo(0, r*0.24);
      ctx.stroke();
    }

    ctx.restore();
  }

  const kind = weaponType || (weaponObj ? "1h_sword" : "unarmed");
  drawWeaponAndArm(kind);
  if(offhandKind && !isTwoHandKind(kind)){
    drawOffhandAndArm(offhandKind);
  }

  ctx.restore();

  // ===== FX (glow / invul) in world space =====
  const glow = (p && p.levelGlow) ? p.levelGlow : 0;
  if(glow > 0){
    const a = Math.min(1, glow/60);
    drawIsoDisc(sx, sy - 14, r*1.25, `rgba(255,210,80,${0.14*a})`, null);
  }
  // player invulnerability remains active, but the hit ring visual is removed.
}

function drawIso(){
  if(!ISO.tileW) isoInit();

  const ZOOM = 1.4; // 🔍 카메라 확대값

  // ✅ 화면 클리어는 반드시 identity에서
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 카메라(아이소 좌표 기준) — 줌을 반영해서 플레이어가 화면 중앙에 고정
  const pIso = isoProject(player.x, player.y);
  let camX = pIso.x - (canvas.width  / (2*ZOOM));
  let camY = pIso.y - (canvas.height / (2*ZOOM));
  // shake가 있으면 간단 반영
  if(typeof shake !== "undefined" && shake > 0){
    camX += (Math.random()-0.5)*shake;
    camY += (Math.random()-0.5)*shake;
  }

  // ✅ 월드만 확대(줌). 이후 sx/sy 계산은 그대로(iso - cam)
  ctx.setTransform(ZOOM,0,0,ZOOM,0,0);

  // ✅ 바닥 먼저 깔고, 벽/오브젝트/캐릭터는 depth 정렬로 한 번에 처리
  const drawables = [];

  // 타일: (x+y) 순서로 순회하되, 바닥은 즉시, 벽은 drawable로 넣어서 "가려짐"을 만든다.
  const maxS = (mapSize-1) + (mapSize-1);
  for(let s=0; s<=maxS; s++){
    for(let x=0; x<mapSize; x++){
      const y = s - x;
      if(y < 0 || y >= mapSize) continue;

      const tile = (map[y] && map[y][x] !== undefined) ? map[y][x] : 1;
      const wx = x*tileSize + tileSize/2;
      const wy = y*tileSize + tileSize/2;

      const iso = isoProject(wx, wy);
      const sx = iso.x - camX;
      const sy = iso.y - camY;

      // 화면 밖이면 스킵(성능)
      if(sx < -ISO.tileW*2 || sx > canvas.width + ISO.tileW*2 || sy < -ISO.tileH*6 || sy > canvas.height + ISO.tileH*6) continue;

      // 바닥(벽 타일도 밑바닥은 깐다)
      const v = ((x*73856093) ^ (y*19349663)) & 3;
      drawIsoFloorTile(sx, sy, v, x, y);

      // 벽은 나중에 그려야, 캐릭터/몹이 "벽 뒤로" 들어갈 때 가려짐이 생김
      if(tile === 1){
        drawables.push({ key: iso.y + 0.002, kind:"wall", iso, obj:{rune: (((x*92837111)^(y*6892871))&7)===0} });
      }else if(tile === 2){
        drawables.push({ key: iso.y + 0.002, kind:"pillar", iso, obj:null });
      }
    }
  }

  // fireZones / blood zones 등 (있으면) — 바닥 효과라 벽보다 약간 먼저(키를 아주 작게)
  if(typeof fireZones !== "undefined" && Array.isArray(fireZones)){
    for(const z of fireZones){
      if(!z) continue;
      const iso = isoProject(z.x, z.y);
      drawables.push({ key: iso.y - 0.002, kind:"zone", iso, obj:z });
    }
  }

  // fire embers (PoE-ish sparks)
  if(typeof fireEmbers !== "undefined" && Array.isArray(fireEmbers)){
    for(const p of fireEmbers){
      if(!p) continue;
      const iso = isoProject(p.x, p.y);
      drawables.push({ key: iso.y - 0.001, kind:"ember", iso, obj:p });
    }
  }

  // arrows / projectiles
  if(typeof arrows !== "undefined" && Array.isArray(arrows)){
    for(const a of arrows){
      if(!a) continue;
      const iso = isoProject(a.x, a.y);
      drawables.push({ key: iso.y - 0.001, kind:"arrow", iso, obj:a });
    }
  }

  // particles
  if(typeof particles !== "undefined" && Array.isArray(particles)){
    for(const p of particles){
      if(!p) continue;
      const iso = isoProject(p.x, p.y);
      drawables.push({ key: iso.y - 0.0005, kind:"particle", iso, obj:p });
    }
  }

  // blood particles
  if(typeof bloodParticles !== "undefined" && Array.isArray(bloodParticles)){
    for(const p of bloodParticles){
      if(!p) continue;
      const iso = isoProject(p.x, p.y);
      drawables.push({ key: iso.y - 0.0004, kind:"blood", iso, obj:p });
    }
  }

  // enemies
  if(Array.isArray(enemies)){
    for(const e of enemies){
      if(!e) continue;
      if(e.hp <= 0 && !(e.dead && e.deathTimer > 0)) continue;
      const iso = isoProject(e.x, e.y);
      drawables.push({ key: iso.y, kind:"enemy", iso, obj:e });
    }
  }

  // player
  drawables.push({ key: pIso.y + 0.001, kind:"player", iso: pIso, obj: player });

  // depth sort
  drawables.sort((a,b)=>a.key-b.key);

  // draw
  for(const d of drawables){
    const sx = d.iso.x - camX;
    const sy = d.iso.y - camY;

if(d.kind === "wall"){
  // ✅ wall fade if it blocks the player (POE-style visibility)
  const fade = (pIso.y < d.iso.y - ISO.tileH*0.10) ? 0.35 : 1.0;
  ctx.save();
  ctx.globalAlpha *= fade;
  drawIsoWallBlock(sx, sy, d.obj || {});
  ctx.restore();
  continue;
}

if(d.kind === "pillar"){
  const fade = (pIso.y < d.iso.y - ISO.tileH*0.10) ? 0.35 : 1.0;
  ctx.save();
  ctx.globalAlpha *= fade;
  drawIsoPillar(sx, sy);
  ctx.restore();
  continue;
}

    if(d.kind === "zone"){
      const z = d.obj;
      if(z.isBleed){
        const r = (z.radius ?? 50);
        drawIsoDisc(sx, sy, r, "rgba(120,10,10,0.20)", "rgba(0,0,0,0.35)");
      }else{
        drawFireZoneIso(sx, sy, z);
      }
    }else if(d.kind === "ember"){
      drawEmberIso(sx, sy, d.obj);
    }else if(d.kind === "arrow"){
      drawIsoArrowSprite(sx, sy, d.obj);
    }else if(d.kind === "particle"){
      const p = d.obj;
      const alpha = Math.max(0, Math.min(1, (p.alpha ?? 1) * ((p.life ?? 10)/22)));
      if(p.kind === "arrowTrail"){
        ctx.save();
        ctx.translate(sx, sy);
        ctx.scale(1, 0.62);
        ctx.rotate(p.angle || 0);
        ctx.strokeStyle = `rgba(255,255,255,${0.28*alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-(p.size ?? 10), 0);
        ctx.lineTo(0, 0);
        ctx.stroke();
        ctx.restore();
      }else if(p.kind === "doubleSlashTrail"){
        const w = (p.size ?? 16);
        ctx.save();
        ctx.translate(sx, sy);
        ctx.scale(1, 0.64);
        ctx.rotate(p.angle || 0);

function __randPickWeighted(pairs){
  // pairs: [{v, w}]
  let sum = 0;
  for(const p of pairs){ sum += Math.max(0, p.w||0); }
  if(sum <= 0) return pairs[0]?.v;
  let r = Math.random() * sum;
  for(const p of pairs){
    r -= Math.max(0, p.w||0);
    if(r <= 0) return p.v;
  }
  return pairs[pairs.length-1]?.v;
}

// 1) 슬롯 분포 (PoE 느낌: 초반 무기/갑옷 위주, 후반 반지/기타도 섞임)
if(typeof pickSlotForMapTier !== "function"){
  window.pickSlotForMapTier = function(mapTier){
    const t = Math.max(1, mapTier||1);
    // weapon, chest, helm, boots, ring
    if(t <= 2){
      return __randPickWeighted([
        {v:"weapon", w:45},
        {v:"chest",  w:25},
        {v:"helm",   w:15},
        {v:"boots",  w:10},
        {v:"ring",   w:5},
      ]);
    }
    if(t <= 6){
      return __randPickWeighted([
        {v:"weapon", w:35},
        {v:"chest",  w:25},
        {v:"helm",   w:15},
        {v:"boots",  w:12},
        {v:"ring",   w:13},
      ]);
    }
    return __randPickWeighted([
      {v:"weapon", w:28},
      {v:"chest",  w:22},
      {v:"helm",   w:15},
      {v:"boots",  w:13},
      {v:"ring",   w:22},
    ]);
  };
}

// 2) 베이스 티어 분포 (mapTier가 오를수록 상위 tier 비중 증가)
if(typeof pickBaseTierForMap !== "function"){
  window.pickBaseTierForMap = function(mapTier){
    const t = Math.max(1, mapTier||1);
    // baseTier: 1~5 기준
    if(t <= 2)  return __randPickWeighted([{v:1,w:80},{v:2,w:20}]);
    if(t <= 4)  return __randPickWeighted([{v:1,w:45},{v:2,w:35},{v:3,w:20}]);
    if(t <= 6)  return __randPickWeighted([{v:1,w:20},{v:2,w:30},{v:3,w:30},{v:4,w:20}]);
    if(t <= 8)  return __randPickWeighted([{v:2,w:20},{v:3,w:35},{v:4,w:30},{v:5,w:15}]);
    return __randPickWeighted([{v:3,w:25},{v:4,w:35},{v:5,w:40}]);
  };
}

// 3) ilvl 스케일 (맵티어 상승 → ilvl 상승)
if(typeof rollItemLevelFromMapTier !== "function"){
  window.rollItemLevelFromMapTier = function(mapTier){
    const t = Math.max(1, mapTier||1);
    // 예: t=1 → 1~8, t=5 → 21~28, t=10 → 46~55
    const base = (t-1)*5 + 1;
    const jitter = Math.floor(Math.random()*8); // 0~7
    return base + jitter;
  };
}

function renderMetaCraftUI(){
  ensureMetaCraftUI();

  const it = (typeof getSelectedItem === "function") ? getSelectedItem() : null;
  const p = document.getElementById("btnLockPrefix");
  const s = document.getElementById("btnLockSuffix");
  const r = document.getElementById("btnRemoveMeta");

  if(!it || it.isUnique){
    if(p) p.disabled = true;
    if(s) s.disabled = true;
    if(r) r.disabled = true;
    return;
  }

  it.metaCraft = it.metaCraft || {lockPrefix:false,lockSuffix:false};

  if(p) p.textContent = `접두 고정 (${it.metaCraft.lockPrefix ? "ON" : "OFF"})`;
  if(s) s.textContent = `접미 고정 (${it.metaCraft.lockSuffix ? "ON" : "OFF"})`;

  if(r){
    const metaOn = it.metaCraft.lockPrefix || it.metaCraft.lockSuffix;
    const enough = (typeof exaltedOrbs === "number" && exaltedOrbs >= 3);
    r.disabled = !(metaOn && enough);
    r.style.opacity = r.disabled ? "0.55" : "1";
  }
}

/* ===== Craft Orbs: 아이템 아이콘 스타일로 렌더 (캔버스) ===== */
(function(){
  if(window.__orbIconStyleV1) return;
  window.__orbIconStyleV1 = true;

  function getCountById(id){
    try{
      switch(id){
        case "orbTransmute": return (typeof transmuteOrbs==="number") ? transmuteOrbs : 0;
        case "orbAlter":     return (typeof alterationOrbs==="number") ? alterationOrbs : 0;
        case "orbAug":       return (typeof augmentationOrbs==="number") ? augmentationOrbs : 0;
        case "orbRegal":     return (typeof regalOrbs==="number") ? regalOrbs : 0;
        case "orbAlchemy":   return (typeof alchemyOrbs==="number") ? alchemyOrbs : 0;
        case "chaosBtn":     return (typeof chaosOrbs==="number") ? chaosOrbs : 0;
        case "orbScour":     return (typeof scouringOrbs==="number") ? scouringOrbs : 0;
        case "orbExalt":     return (typeof exaltedOrbs==="number") ? exaltedOrbs : 0;
        case "orbAnnul":     return (typeof annulOrbs==="number") ? annulOrbs : 0;
        case "orbDivine":    return (typeof divineOrbs==="number") ? divineOrbs : 0;
        case "orbCorrupt":   return (typeof corruptOrbs==="number") ? corruptOrbs : 0;
        default: return 0;
      }
    }catch(e){ return 0; }
  }

  function rarityForOrb(id){
    // 색 규칙을 "희귀도 테두리"로 치환 (drawItemIcon의 테두리 색 사용)
    // normal=흰, magic=파, rare=금, unique=주황
    if(id==="orbTransmute" || id==="orbAlter" || id==="orbAug") return "magic";           // 파란 계열
    if(id==="orbRegal") return "rare";                                                   // 금(제왕: 금+파는 코어에서 표현)
    if(id==="orbAlchemy") return "rare";                                                 // 금쪽 (연금은 코어/심볼로 은+금 느낌)
    if(id==="chaosBtn" || id==="orbExalt" || id==="orbDivine") return "rare";            // 금
    if(id==="orbScour") return "normal";                                                 // 흰
    if(id==="orbAnnul") return "magic";                                                  // 코발트 느낌은 코어로
    if(id==="orbCorrupt") return "unique";                                               // 타락(붉은 주황 계열)
    return "normal";
  }

  function drawOrbIcon(canvas, id){
    const g = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    g.clearRect(0,0,W,H);

    // 배경(아이템 아이콘 스타일)
    g.fillStyle = "rgba(0,0,0,0.18)";
    g.fillRect(0,0,W,H);

    // 테두리(희귀도 색)
    const rr = rarityForOrb(id);
    g.lineWidth = 3;
    if(rr==="unique") g.strokeStyle = "#ffb86b";
    else if(rr==="rare") g.strokeStyle = "#ffd166";
    else if(rr==="magic") g.strokeStyle = "#2f7bff";
    else g.strokeStyle = "#ffffff";
    const pad = 4;
    g.strokeRect(pad, pad, W-pad*2, H-pad*2);

    // 중앙: "오니 머리" 실루엣(기존 아이템 캔버스 스타일에 맞춘 단순 실루엣)
    // (이미지 없이, 도형으로만)
    g.save();
    g.translate(W/2, H/2 - 2);

    // 코어 컬러
    let core = "#2a2a2a";
    if(id==="orbTransmute" || id==="orbAlter" || id==="orbAug") core = "#2f7bff";
    if(id==="orbRegal") core = "#c8a23a";
    if(id==="orbAlchemy") core = "#d8d8d8";
    if(id==="chaosBtn" || id==="orbExalt" || id==="orbDivine") core = "#b88a2a";
    if(id==="orbScour") core = "#f0f0f0";
    if(id==="orbAnnul") core = "#2a66ff";
    if(id==="orbCorrupt") core = "#c23a2a";

    // 은은한 코어 광
    const rg = g.createRadialGradient(0,-10,6, 0,-10, 34);
    rg.addColorStop(0, "rgba(255,255,255,0.28)");
    rg.addColorStop(0.25, core + "AA");
    rg.addColorStop(1, "rgba(0,0,0,0.0)");
    g.fillStyle = rg;
    g.beginPath();
    g.arc(0,0,32,0,Math.PI*2);
    g.fill();

    // 오니 얼굴(마스크) - 다크 메탈 + 코어 하이라이트
    g.fillStyle = "rgba(0,0,0,0.55)";
    g.strokeStyle = "rgba(255,255,255,0.20)";
    g.lineWidth = 2;

    // 얼굴
    g.beginPath();
    g.moveTo(0,-22);
    g.quadraticCurveTo(22,-18, 20,0);
    g.quadraticCurveTo(18,22, 0,24);
    g.quadraticCurveTo(-18,22, -20,0);
    g.quadraticCurveTo(-22,-18, 0,-22);
    g.closePath();
    g.fill(); g.stroke();

    // 뿔
    g.fillStyle = "rgba(0,0,0,0.65)";
    g.beginPath();
    g.moveTo(-10,-20); g.lineTo(-26,-32); g.lineTo(-16,-10); g.closePath();
    g.moveTo(10,-20);  g.lineTo(26,-32);  g.lineTo(16,-10);  g.closePath();
    g.fill();

    // 눈(코어색)
    g.fillStyle = core;
    g.shadowColor = core;
    g.shadowBlur = 8;
    g.beginPath(); g.arc(-8,-2,3,0,Math.PI*2); g.fill();
    g.beginPath(); g.arc(8,-2,3,0,Math.PI*2); g.fill();
    g.shadowBlur = 0;

    g.restore();
  }

  function ensure(){
    const grid = document.getElementById("craftOrbGrid");
    if(!grid) return;

    grid.querySelectorAll("button.orbBtn").forEach(btn=>{
      // 캔버스
      let c = btn.querySelector("canvas.orbIcon");
      if(!c){
        c = document.createElement("canvas");
        c.className = "orbIcon";
        c.width = 84; c.height = 84;
        btn.prepend(c);
      }
      // 수량
      let n = btn.querySelector(".orbMiniCount");
      if(!n){
        n = document.createElement("div");
        n.className = "orbMiniCount";
        btn.appendChild(n);
      }
      n.textContent = String(getCountById(btn.id));

      // 아이콘 그리기
      try{ drawOrbIcon(c, btn.id); }catch(e){}
    });
  }

  // 렌더 타이밍: 패널 갱신마다
  if(typeof renderAllPanels==="function"){
    const _orig = renderAllPanels;
    renderAllPanels = function(){
      _orig();
      try{ ensure(); }catch(_){}
    };
  }

  try{ ensure(); }catch(_){}
})();

(function(){

  window.__isoBindFixV1 = true;
  let tries = 0;
  function tick(){
    tries++;
    try{
      if(typeof window.drawIso === "function" && typeof window.draw === "function" && window.draw !== window.drawIso){
        window.__drawTopDown = window.draw;
        window.draw = window.drawIso;

})();

function __weaponAffixTotals(it){
  const aff = Array.isArray(it && it.affixes) ? it.affixes : [];
  const out = { dmgPct:0, flat:0, atkSpd:0, critChance:0, critMulti:0, range:0, fire:0, cold:0, lightning:0 };
  for(const roll of aff){
    if(!roll || !roll.affix) continue;
    const a = roll.affix;
    const g = String(a.group || "").toLowerCase();
    const v = Number(roll.value || 0);
    if(g.includes("fire_flat")) out.fire += v;
    else if(g.includes("cold_flat")) out.cold += v;
    else if(g.includes("lightning_flat")) out.lightning += v;
    else if(g.includes("phys_flat")) out.flat += v;
    else if(g.includes("attackspeed")) out.atkSpd += v;
    else if(g.includes("critchance")) out.critChance += v;
    else if(g.includes("critmulti")) out.critMulti += v;
    else if(g === "range" || g.includes("melee_range")) out.range += v;
    else if(g.includes("phys")) out.dmgPct += v;

    if(Array.isArray(a.mods)){
      for(const spec of a.mods){
        if(!spec || !spec.stat) continue;
        const scale = (typeof spec.scale === 'number') ? spec.scale : 1;
        const sv = v * scale;
        if(spec.stat === 'fireFlat') out.fire += sv;
        else if(spec.stat === 'coldFlat') out.cold += sv;
        else if(spec.stat === 'lightningFlat') out.lightning += sv;
        else if(spec.stat === 'flatDamageAdd') out.flat += sv;
        else if(spec.stat === 'atkSpdMul' || spec.stat === 'atkSpdInc' || spec.stat === 'atkSpdMore') out.atkSpd += sv;
        else if(spec.stat === 'critChanceAdd' || spec.stat === 'critChanceInc' || spec.stat === 'critChanceMore') out.critChance += sv;
        else if(spec.stat === 'critMultiAdd' || spec.stat === 'critMultiInc' || spec.stat === 'critMultiMore') out.critMulti += sv;
        else if(spec.stat === 'rangeMul' || spec.stat === 'rangeInc' || spec.stat === 'rangeMore') out.range += sv;
        else if(spec.stat === 'dmgMul' || spec.stat === 'dmgInc' || spec.stat === 'dmgMore') out.dmgPct += sv;
      }
    }
  }
  return out;
}

function getWeaponDisplayStats(it){
  if(!it || it.slot !== "weapon") return null;

  const baseMin = Number(player?.weapon?.min ?? 14);
  const baseMax = Number(player?.weapon?.max ?? 20);
  const td = it.totalData || it.data || {};

  const dmgMul = Number(td.dmgMul ?? 1);
  const flatPhys = Number(td.flatDamageAdd ?? td.flatDamage ?? 0);
  const fireFlat = Number(td.fireFlat ?? 0);
  const coldFlat = Number(td.coldFlat ?? 0);
  const lightningFlat = Number(td.lightningFlat ?? 0);

  const localPhysMin = it.noPhysicalDamage ? 0 : (baseMin * dmgMul + flatPhys);
  const localPhysMax = it.noPhysicalDamage ? 0 : (baseMax * dmgMul + flatPhys);

  let atkMul = Number(td.atkSpdMul ?? 0);
  if(!(atkMul > 0)) atkMul = Number(td.spdMul ?? it.attackSpeed ?? it.baseData?.spdMul ?? 1);
  if(!(atkMul > 0)) atkMul = 1;
  if(typeof td.atkSpdInc === "number" && Number.isFinite(td.atkSpdInc)) atkMul *= (1 + td.atkSpdInc);
  if(typeof td.atkSpdMore === "number" && Number.isFinite(td.atkSpdMore)) atkMul *= td.atkSpdMore;

  const min = Math.max(0, Math.floor(localPhysMin + fireFlat + coldFlat + lightningFlat));
  const max = Math.max(min, Math.floor(localPhysMax + fireFlat + coldFlat + lightningFlat));
  const avg = (min + max) / 2;
  const dps = avg * atkMul;

  return {
    min, max, atkMul, dps,
    flatPhys: it.noPhysicalDamage ? 0 : flatPhys,
    fireFlat, coldFlat, lightningFlat,
    dmgPct: Math.max(0, Math.round((dmgMul - 1) * 1000) / 10)
  };
}

function prettyItemHTML(it){

  const rCls = rarityClass(it);
  const rr = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
  let html = `<div class="itemInfoWrap">`;
  html += `<div class="itemInfoName ${rCls}">${escHtml(it.name || "")}</div>`;

  if(it.isUnique){
    const desc = it.uniqueRef?.desc || it.desc || "";
    if(desc) html += `<div class="itemInfoLine itemInfoDim" style="color:#ff9a3d">${escHtml(desc)}</div>`;
    html += `</div>`;
    return html;
  }

  const baseName = it.baseName || it.baseId || it.id || "";
  if(baseName){
    const bt = (typeof it.baseTier === "number") ? ` (티어 ${it.baseTier})` : "";
    html += `<div class="itemInfoLine itemInfoDim">베이스: ${escHtml(baseName)}${escHtml(bt)}</div>`;
  }
  if(typeof it.ilvl === "number"){
    html += `<div class="itemInfoLine itemInfoDim">아이템 레벨: ${it.ilvl}</div>`;
  }
  html += `<div class="itemInfoLine itemInfoDim">등급: ${rarityLabel(it)}</div>`;

  const imps = getAllItemImplicits(it);
  if(imps.length){
    html += `<div class="itemInfoGap"></div><div class="itemInfoLine itemInfoDim">암묵 옵션</div>`;
    for(const imp of imps){
      if(imp && imp.text) html += `<div class="itemInfoLine">- ${escHtml(imp.text)}</div>`;
    }
  }

  html += `<div class="itemInfoGap"></div><div class="itemInfoLine itemInfoDim">베이스 옵션</div>`;
  if(it.slot === "weapon"){
    const ws = getWeaponDisplayStats(it);
    if(ws){
      html += `<div class="itemInfoLine">- 최종 공격력: ${ws.min} - ${ws.max}</div>`;
      html += `<div class="itemInfoLine">- 공격 속도: x${ws.atkMul.toFixed(2)}</div>`;
      html += `<div class="itemInfoLine">- DPS: ${ws.dps.toFixed(1)}</div>`;
      if(ws.flatPhys) html += `<div class="itemInfoLine itemInfoDim">- 추가 물리 피해 +${Math.round(ws.flatPhys)}</div>`;
      if(ws.fireFlat) html += `<div class="itemInfoLine"><span style="color:${__elemColor("fire")}">- +${Math.round(ws.fireFlat)} 🔴 화염 피해</span></div>`;
      if(ws.coldFlat) html += `<div class="itemInfoLine"><span style="color:${__elemColor("cold")}">- +${Math.round(ws.coldFlat)} 🔵 냉기 피해</span></div>`;
      if(ws.lightningFlat) html += `<div class="itemInfoLine"><span style="color:${__elemColor("lightning")}">- +${Math.round(ws.lightningFlat)} 🟡 번개 피해</span></div>`;
    }
  }

  if(it.baseData){
    const d = it.baseData;
    if(d.maxHpAdd) html += `<div class="itemInfoLine">- 최대 체력 +${Math.floor(d.maxHpAdd)}</div>`;
    if(d.esAdd)    html += `<div class="itemInfoLine">- 에너지 쉴드 +${Math.floor(d.esAdd)}</div>`;
    if(d.armorAdd) html += `<div class="itemInfoLine">- 방어력 +${Math.floor(d.armorAdd)}</div>`;
    if(d.hpRegen)  html += `<div class="itemInfoLine">- 재생 +${d.hpRegen.toFixed(2)}/s</div>`;
    if(d.castSpdMul && Math.abs(d.castSpdMul - 1) > 1e-9) html += `<div class="itemInfoLine">- 시전 속도 ${Math.round((d.castSpdMul - 1) * 100)}%</div>`;
    if(d.spellRangeMul && Math.abs(d.spellRangeMul - 1) > 1e-9) html += `<div class="itemInfoLine">- 주문 범위 ${Math.round((d.spellRangeMul - 1) * 100)}%</div>`;
    if(d.spellMul && Math.abs(d.spellMul - 1) > 1e-9) html += `<div class="itemInfoLine">- 주문 피해 ${Math.round((d.spellMul - 1) * 100)}%</div>`;
  }

  const aff = Array.isArray(it.affixes) ? it.affixes : [];
  const prefixes = aff.filter(a => a && a.affix && a.kind === "prefix");
  const suffixes = aff.filter(a => a && a.affix && a.kind === "suffix");

  if(prefixes.length){
    html += `<div class="itemInfoGap"></div><div class="itemInfoLine itemInfoDim">접두</div>`;
    for(const a of prefixes){
      html += `<div class="itemInfoLine">- ${__affixLineHTML(a)}${__affixTierHTML(a)}</div>`;
    }
  }

  if(suffixes.length){
    html += `<div class="itemInfoGap"></div><div class="itemInfoLine itemInfoDim">접미</div>`;
    for(const a of suffixes){
      html += `<div class="itemInfoLine">- ${__affixLineHTML(a)}${__affixTierHTML(a)}</div>`;
    }
  }

  const uniqueLines = Array.isArray(it.uniqueLines) ? it.uniqueLines : [];
  if(uniqueLines.length){
    html += `<div class="itemInfoGap"></div><div class="itemInfoLine itemInfoDim">유니크 옵션</div>`;
    for(const line of uniqueLines){
      html += `<div class="itemInfoLine">- ${escHtml(line)}</div>`;
    }
  }

  if(it.corrupted){
    html += `<div class="itemInfoGap"></div><div class="itemInfoLine" style="color:#ff5b5b;font-weight:900;text-align:center;text-shadow:0 0 10px rgba(255,80,80,0.25);">타락</div>`;
  }

  const flavor = it.flavorText || (rr === "unique" ? (it.desc || "") : "");
  if(flavor){
    html += `<div class="itemInfoGap"></div><div class="itemInfoLine" style="color:#ff8a2b;text-align:center;font-style:italic">${escHtml(flavor)}</div>`;
  }

  html += `</div>`;
  return html;
}

/* ============================= */
/* ✅ 상태이상 시스템 통합 패치   */
/* - 화상: 지속 피해
   - 냉기: 둔화
   - 감전: 받는 피해 증가
/* ============================= */
(function(){
  if(window.__AILMENT_PATCH_APPLIED__) return;
  window.__AILMENT_PATCH_APPLIED__ = true;

  function __ensureAilments(e){
    if(!e) return e;
    if(!e.ailments) e.ailments = { burn:0, chill:0, shock:0 };
    if(!e.ailmentPower) e.ailmentPower = { burn:0, chill:0, shock:0 };
    return e;
  }

  function __isBossLike(e){
    return !!(e && (e.type === "boss" || e.isElite || e.type === "demon"));
  }

  function __bossDampen(e, v){
    return __isBossLike(e) ? (v * 0.5) : v;
  }

  function __clamp(v, lo, hi){
    return Math.max(lo, Math.min(hi, v));
  }

  function __applyAilmentsFromDamageResult(e, dmgRes){
    if(!e || !dmgRes || !dmgRes.dealtPacket) return;
    __ensureAilments(e);

    const pkt = dmgRes.dealtPacket;
    e.__killFxKind =
      (Number(pkt.fire || 0) > Number(pkt.phys || 0) && Number(pkt.fire || 0) >= Number(pkt.cold || 0) && Number(pkt.fire || 0) >= Number(pkt.lightning || 0) && Number(pkt.fire || 0) >= Number(pkt.chaos || 0)) ? "fire" :
      (Number(pkt.cold || 0) > Number(pkt.phys || 0) && Number(pkt.cold || 0) >= Number(pkt.fire || 0) && Number(pkt.cold || 0) >= Number(pkt.lightning || 0) && Number(pkt.cold || 0) >= Number(pkt.chaos || 0)) ? "cold" :
      (Number(pkt.lightning || 0) > Number(pkt.phys || 0) && Number(pkt.lightning || 0) >= Number(pkt.fire || 0) && Number(pkt.lightning || 0) >= Number(pkt.cold || 0) && Number(pkt.lightning || 0) >= Number(pkt.chaos || 0)) ? "lightning" :
      (Number(pkt.chaos || 0) > Number(pkt.phys || 0) && Number(pkt.chaos || 0) >= Number(pkt.fire || 0) && Number(pkt.chaos || 0) >= Number(pkt.cold || 0) && Number(pkt.chaos || 0) >= Number(pkt.lightning || 0)) ? "chaos" :
      "physical";
    const fire = Number(pkt.fire || 0);
    const cold = Number(pkt.cold || 0);
    const lightning = Number(pkt.lightning || 0);

    if(fire > 0 && Math.random() < 0.28){
      const dur = Math.round(__bossDampen(e, 96));
      const pwr = Math.max(0.6, __bossDampen(e, fire * 0.16));
      e.ailments.burn = Math.max(e.ailments.burn || 0, dur);
      e.ailmentPower.burn = Math.max(e.ailmentPower.burn || 0, pwr);
    }

    if(cold > 0 && Math.random() < 0.34){
      const dur = Math.round(__bossDampen(e, 84));
      const slow = __clamp(__bossDampen(e, 0.18 + cold * 0.01), 0.12, __isBossLike(e) ? 0.22 : 0.38);
      e.ailments.chill = Math.max(e.ailments.chill || 0, dur);
      e.ailmentPower.chill = Math.max(e.ailmentPower.chill || 0, slow);
    }

    if(lightning > 0 && Math.random() < 0.24){
      const dur = Math.round(__bossDampen(e, 72));
      const amp = __clamp(__bossDampen(e, 0.10 + lightning * 0.008), 0.08, __isBossLike(e) ? 0.16 : 0.28);
      e.ailments.shock = Math.max(e.ailments.shock || 0, dur);
      e.ailmentPower.shock = Math.max(e.ailmentPower.shock || 0, amp);
    }
  }

  function __tickEnemyAilments(e){
    if(!e || e.hp <= 0) return;
    __ensureAilments(e);

    if(e.ailments.burn > 0){
      e.ailments.burn--;
      if(typeof frameCount === "number" && frameCount % 15 === 0){
        const dmg = Math.max(1, e.ailmentPower.burn || 1);
        e.hp -= dmg;
        if(typeof __enemyHitFlashStart === "function") __enemyHitFlashStart(e, 0.65);

        if(typeof particles !== "undefined" && Array.isArray(particles) && particles.length < 260){
          particles.push({
            x: e.x + (Math.random()-0.5)*10,
            y: e.y - 8 + (Math.random()-0.5)*8,
            vx: (Math.random()-0.5)*0.5,
            vy: -0.35 - Math.random()*0.35,
            life: 14,
            kind: "burnSpark",
            alpha: 0.9,
            size: 2 + Math.random()*2
          });
        }

        if(e.hp <= 0){
          return;
        }
      }
    }else{
      e.ailmentPower.burn = 0;
    }

    if(e.ailments.chill > 0){
      e.ailments.chill--;
    }else{
      e.ailmentPower.chill = 0;
    }

    if(e.ailments.shock > 0){
      e.ailments.shock--;
    }else{
      e.ailmentPower.shock = 0;
    }
  }

  if(typeof computeFinalDamage === "function"){
    const __origComputeFinalDamage = computeFinalDamage;
    computeFinalDamage = function(base, ctx, opt){
      const out = __origComputeFinalDamage(base, ctx, opt);
      window.__lastAilmentDamageResult = out;
      return out;
    };
  }

  if(typeof __enemyHitFlashStart === "function"){
    const __origEnemyHitFlashStart = __enemyHitFlashStart;
    __enemyHitFlashStart = function(e, power){
      __origEnemyHitFlashStart(e, power);
      try{
        __applyAilmentsFromDamageResult(e, window.__lastAilmentDamageResult);
      }catch(_){}
    };
  }

  if(typeof applyEnemyTakenDamageModsPacket === "function"){
    const __origApplyEnemyTakenDamageModsPacket = applyEnemyTakenDamageModsPacket;
    applyEnemyTakenDamageModsPacket = function(pkt, ctx){
      let out = __origApplyEnemyTakenDamageModsPacket(pkt, ctx);
      const e = ctx && ctx.enemy;
      if(e && e.ailments && e.ailments.shock > 0){
        const amp = 1 + Math.max(0, Number((e.ailmentPower && e.ailmentPower.shock) || 0));
        if(typeof scaleDamagePacket === "function"){
          out = scaleDamagePacket(out, amp);
        }else{
          out = {
            phys:(out.phys||0)*amp,
            fire:(out.fire||0)*amp,
            cold:(out.cold||0)*amp,
            lightning:(out.lightning||0)*amp,
            chaos:(out.chaos||0)*amp
          };
        }
      }
      return out;
    };
  }

  if(typeof updateSingleEnemy === "function"){
    const __origUpdateSingleEnemy = updateSingleEnemy;
    updateSingleEnemy = function(e){
      __ensureAilments(e);
      const oldSpeed = e.speed;
      if(e.ailments.chill > 0){
        const slow = Math.max(0, Math.min(0.8, Number((e.ailmentPower && e.ailmentPower.chill) || 0)));
        e.speed = oldSpeed * (1 - slow);
      }
      try{
        return __origUpdateSingleEnemy(e);
      }finally{
        e.speed = oldSpeed;
      }
    };
  }

  if(typeof updateEnemySystem === "function"){
    const __origUpdateEnemySystem = updateEnemySystem;
    updateEnemySystem = function(){
      if(typeof enemies !== "undefined" && Array.isArray(enemies)){
        for(const e of enemies){
          __tickEnemyAilments(e);
        }
      }
      return __origUpdateEnemySystem();
    };
  }

  if(typeof drawIsoEnemySprite === "function"){
    const __origDrawIsoEnemySprite = drawIsoEnemySprite;
    drawIsoEnemySprite = function(sx, sy, e){
      __origDrawIsoEnemySprite(sx, sy, e);
      if(!e || !e.ailments) return;

      ctx.save();

      if(e.ailments.chill > 0){
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = "#4aa3ff";
        ctx.beginPath();
        ctx.arc(sx, sy - 18, 14, 0, Math.PI*2);
        ctx.fill();
      }

      if(e.ailments.shock > 0){
        ctx.globalAlpha = 0.85;
        ctx.strokeStyle = "#ffd400";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx - 8, sy - 28);
        ctx.lineTo(sx - 1, sy - 20);
        ctx.lineTo(sx - 4, sy - 20);
        ctx.lineTo(sx + 6, sy - 8);
        ctx.stroke();
      }

      if(e.ailments.burn > 0){
        ctx.globalAlpha = 0.75;
        ctx.fillStyle = "#ff6a00";
        for(let i=0;i<2;i++){
          const ox = Math.sin((frameCount || 0)*0.15 + i*1.7) * 6;
          const oy = Math.cos((frameCount || 0)*0.13 + i*1.3) * 4;
          ctx.beginPath();
          ctx.arc(sx + ox, sy - 22 + oy, 2.3 + i*0.6, 0, Math.PI*2);
          ctx.fill();
        }
      }

      ctx.restore();
    };
  }

  if(typeof prettyItemHTML === "function"){
    const __origPrettyItemHTML = prettyItemHTML;
    prettyItemHTML = function(it){
      let html = __origPrettyItemHTML(it);
      try{
        if(!it || it.isUnique) return html;
        const data = it.totalData || it.data || {};
        const hasElem = (data.fireFlat || data.coldFlat || data.lightningFlat);
        if(!hasElem || !String(html).includes("itemInfoWrap")) return html;

        let extra = "";
        if(data.fireFlat) extra += `<div class="itemInfoLine"><span style="color:#ff4040">화염 피해는 일정 확률로 화상을 부여합니다.</span></div>`;
        if(data.coldFlat) extra += `<div class="itemInfoLine"><span style="color:#4aa3ff">냉기 피해는 적을 둔화시킵니다.</span></div>`;
        if(data.lightningFlat) extra += `<div class="itemInfoLine"><span style="color:#ffd400">번개 피해는 감전을 부여해 받는 피해를 증가시킵니다.</span></div>`;
        html = html.replace('</div>', `<div class="itemInfoGap"></div>${extra}</div>`);
      }catch(_){}
      return html;
    };
  }

})();

(function(){

      }
    }catch(_){}

  __setBaseRole("citadel_armor","armor",  { armorAdd:54, maxHpAdd:22 }, [{ stat:"armorAdd", value:54, text:"+54 방어도" }]);

  __setBaseRole("iron_helm",    "armor",  { armorAdd:18, maxHpAdd:8 },  [{ stat:"armorAdd", value:18, text:"+18 방어도" }]);

  __setBaseRole("beast_mask",   "regen",  { armorAdd:14, maxHpAdd:20, hpRegen:0.7 }, [{ stat:"hpRegen", value:0.7, text:"+0.70 초당 생명력 재생" }]);

  __setBaseRole("saint_crown",  "resist", { armorAdd:16, maxHpAdd:12, allResAdd:16 }, [{ stat:"allResAdd", value:16, text:"+16 모든 저항" }]);
  __setBaseRole("doom_visor",   "armor",  { armorAdd:48, maxHpAdd:18 }, [{ stat:"armorAdd", value:48, text:"+48 방어도" }]);
  __setBaseRole("astral_circlet","resist",{ armorAdd:22, maxHpAdd:16, allResAdd:22 }, [{ stat:"allResAdd", value:22, text:"+22 모든 저항" }]);

  // 드롭/생성 때 baseStats를 data에 안전 반영
  function __applyBaseStatsIntoItem(it){
    if(!it) return it;
    const t = __findTemplate(it.baseId || it.id);
    const bs = t && t.baseStats ? t.baseStats : null;
    if(!bs) return it;

    const data = Object.assign({}, it.data || it.totalData || {});
    if(typeof bs.armorAdd === "number") data.armorAdd = (data.armorAdd || 0) + bs.armorAdd;
    if(typeof bs.maxHpAdd === "number") data.maxHpAdd = (data.maxHpAdd || 0) + bs.maxHpAdd;
    if(typeof bs.hpRegen === "number") data.hpRegen = (data.hpRegen || 0) + bs.hpRegen;
    if(typeof bs.allResAdd === "number") data.allResAdd = (data.allResAdd || 0) + bs.allResAdd;
    it.data = data;
    it.totalData = data;
    it.baseStats = Object.assign({}, bs);
    it.baseRole = t.baseRole || it.baseRole;
    return it;
  }

  if(typeof createItemInstance === "function"){
    const __origCreateItemInstance = createItemInstance;
    createItemInstance = function(baseId, rarityOverride=null, opts=null){
      const it = __origCreateItemInstance(baseId, rarityOverride, opts);
      return __applyBaseStatsIntoItem(it);
    };
  }

  if(typeof rollDroppedItemFromTemplate === "function"){
    const __origRollDroppedItemFromTemplate = rollDroppedItemFromTemplate;
    rollDroppedItemFromTemplate = function(it, ilvl){
      const out = __origRollDroppedItemFromTemplate(it, ilvl);
      try{
        if(out && out.item) __applyBaseStatsIntoItem(out.item);
      }catch(_){}
      return out;
    };
  }

  function __fmtNum(v, digits){

    return (digits != null) ? v.toFixed(digits) : String(Math.round(v));
  }

  function __baseDefenseHtml(it){
    const t = __findTemplate(it && (it.baseId || it.id));
    const bs = (it && it.baseStats) || (t && t.baseStats) || null;

    const lines = [];
    if(typeof bs.armorAdd === "number" && bs.armorAdd > 0){
      lines.push(`<div class="itemInfoLine"><span class="statLabel">기본 방어도</span> <b>${Math.round(bs.armorAdd)}</b></div>`);

    if(typeof bs.maxHpAdd === "number" && bs.maxHpAdd > 0){
      lines.push(`<div class="itemInfoLine"><span class="statLabel">기본 최대 생명력</span> <b>${Math.round(bs.maxHpAdd)}</b></div>`);

(function(){

  function __iterEquippedItems(){

          if(equipment[k]) out.push(equipment[k]);

  function __sumItemResists(it){
    const d = (it && (it.totalData || it.data)) || {};
    const imp = Array.isArray(it && it.implicits) ? it.implicits : [];
    let fire = 0, cold = 0, light = 0, chaos = 0, all = 0;
    if(typeof d.fireResAdd === "number") fire += d.fireResAdd;
    if(typeof d.coldResAdd === "number") cold += d.coldResAdd;
    if(typeof d.lightResAdd === "number") light += d.lightResAdd;
    if(typeof d.chaosResAdd === "number") chaos += d.chaosResAdd;
    if(typeof d.allResAdd === "number") all += d.allResAdd;
    for(const x of imp){
      if(!x) continue;
      const stat = x.stat;
      const val = Number(x.value || 0);
      if(stat === "fireResAdd") fire += val;
      else if(stat === "coldResAdd") cold += val;
      else if(stat === "lightResAdd") light += val;
      else if(stat === "chaosResAdd") chaos += val;
      else if(stat === "allResAdd") all += val;
    }
    return { fire, cold, light, chaos, all };
  }

  function __rebuildPlayerResists(){
    let fire = 0, cold = 0, light = 0, chaos = 0, all = 0;
    for(const it of __iterEquippedItems()){
      const r = __sumItemResists(it);
      fire += r.fire; cold += r.cold; light += r.light; chaos += r.chaos; all += r.all;
    }
    player.fireRes = Math.max(0, Math.min(75, fire + all));
    player.coldRes = Math.max(0, Math.min(75, cold + all));
    player.lightRes = Math.max(0, Math.min(75, light + all));
    player.chaosRes = Math.max(0, Math.min(75, chaos + all));

    player.gear.coldResAdd = player.coldRes;

 (function(){

  const WEAPON_STAT_KEYS = [

    "critChanceAdd","critChanceInc","critChanceMore",
    "critMultiAdd","critMultiInc","critMultiMore",
    "lifeLeech","hpOnHit","hpOnKill",
    "bleedChance","knockbackChance","cleaveChance","doubleHitChance","executeChance",
    "critChanceVsBoss",
  ];

  function __newGearState(){
    return {
      armorAdd: 0,
      maxHpAdd: 0,
      hpRegen: 0,

      dmgMul: 1,
      dmgInc: 0,
      dmgMore: 1,

      atkSpdMul: 1,
      atkSpdInc: 0,
      atkSpdMore: 1,

      spdMul: 1,
      rangeMul: 1,
      rangeInc: 0,
      rangeMore: 1,

      critChanceAdd: 0,
      critChanceInc: 0,

      critMultiAdd: 0,

      flatDamageAdd: 0,

  function __mergeStat(dst, stat, value){
    const v = Number(value || 0);
    if(!isFinite(v)) return;

    if(stat === "flatDamage") stat = "flatDamageAdd";

    switch(stat){
      case "dmgMul":
      case "atkSpdMul":
      case "spdMul":
      case "rangeMul":
      case "bossDamageMul":
      case "eliteDamageMul":
        dst[stat] = (dst[stat] ?? 1) * v;
        break;

      case "critChanceMore":
      case "critMultiMore":
      case "dmgMore":
      case "atkSpdMore":
      case "rangeMore":
        dst[stat] = (dst[stat] ?? 1) * v;
        break;

      default:
        dst[stat] = (dst[stat] ?? 0) + v;
        break;
    }
  }

  function __pullItemStats(it, dst){
    if(!it) return;
    const d = (it.totalData || it.data || {});
    const imps = getAllItemImplicits(it);

    for(const k of WEAPON_STAT_KEYS){
      if(typeof d[k] === "number") __mergeStat(dst, k, d[k]);
    }

    if(typeof d.dmgMul === "number") __mergeStat(dst, "dmgMul", d.dmgMul);
    if(typeof d.atkSpdMul === "number") __mergeStat(dst, "atkSpdMul", d.atkSpdMul);

    if(typeof d.eliteDamageMul === "number") __mergeStat(dst, "eliteDamageMul", d.eliteDamageMul);

    for(const imp of imps){
      if(!imp || !imp.stat) continue;
      const stat = imp.stat;

      if(!isFinite(val)) continue;

    try{
      if(typeof equipment === "object" && equipment){

          if(!it) continue;

    gear.atkSpdMul  = (gear.atkSpdMul ?? 1)  * (1 + (gear.atkSpdInc ?? 0))  * (gear.atkSpdMore ?? 1);
    gear.spdMul     = (gear.spdMul ?? 1)     * (1 + (gear.spdInc ?? 0))     * (gear.spdMore ?? 1);
    gear.rangeMul   = (gear.rangeMul ?? 1)   * (1 + (gear.rangeInc ?? 0))   * (gear.rangeMore ?? 1);
    gear.critChanceMore = (gear.critChanceMore ?? 1);

    const b = player.buffs || {};

  function __inferEnemyElementSplit(src){
    const tags = Array.isArray(src && src.tags) ? src.tags : [];
    const type = String(src && src.type || src && src.sourceType || "").toLowerCase();

    // explicit tags first
    if(tags.includes("fire"))      return { phys:0.55, fire:0.45, cold:0, light:0, chaos:0 };
    if(tags.includes("cold"))      return { phys:0.65, fire:0, cold:0.35, light:0, chaos:0 };

    }
    if(type === "boss"){
      return { phys:0.55, fire:0.15, cold:0, light:0.30, chaos:0 };
    }
    return { phys:1.0, fire:0, cold:0, light:0, chaos:0 };
  }

  function __applyResistToIncoming(totalDamage, src){
    const split = __inferEnemyElementSplit(src);
    const armor = Math.max(0, Number(player.armor || 0));

    const physBase = totalDamage * split.phys;
    const fireBase = totalDamage * split.fire;
    const coldBase = totalDamage * split.cold;
    const lightBase = totalDamage * split.light;
    const chaosBase = totalDamage * split.chaos;

    let physTakenMul = 1;
    let fireTakenMul = 1;
    if(typeof EQUIP_SLOTS !== 'undefined' && equipment){
      for(const slot of EQUIP_SLOTS){
        const it = equipment[slot];
        if(!it) continue;
        const pm = Number(it.physTakenMul || 1);
        const fm = Number(it.fireTakenMul || 1);
        if(pm > 0) physTakenMul *= pm;
        if(fm > 0) fireTakenMul *= fm;
      }
    }

    // improved armor formula: diminishing returns, scales with hit size
    const physReduction = armor / (armor + 80 + physBase * 6);
    const physTaken = physBase * (1 - Math.max(0, Math.min(0.85, physReduction))) * physTakenMul;

    const fireTaken  = fireBase  * (1 - (Math.max(0, Math.min(75, Number(player.fireRes  || 0))) / 100)) * fireTakenMul;
    const coldTaken  = coldBase  * (1 - (Math.max(0, Math.min(75, Number(player.coldRes  || 0))) / 100));
    const lightTaken = lightBase * (1 - (Math.max(0, Math.min(75, Number(player.lightRes || 0))) / 100));
    const chaosTaken = chaosBase * (1 - (Math.max(0, Math.min(75, Number(player.chaosRes || 0))) / 100));

    return {
      total: Math.max(1, Math.floor(physTaken + fireTaken + coldTaken + lightTaken + chaosTaken)),
      parts: {
        phys: physTaken, fire: fireTaken, cold: coldTaken, light: lightTaken, chaos: chaosTaken
      },
      reduction: physReduction
    };
  }



  // add elemental tags to enemy projectiles / zones by source type
  if(typeof spawnArrow === "function"){
    const __origSpawnArrow = spawnArrow;
    spawnArrow = function(fromX, fromY, toX, toY, damage){
      const before = Array.isArray(arrows) ? arrows.length : 0;
      const out = __origSpawnArrow(fromX, fromY, toX, toY, damage);
      try{
        if(Array.isArray(arrows) && arrows.length > before){
          const a = arrows[arrows.length - 1];
          if(a && (!a.tags || !a.tags.includes("cold"))){
            a.tags = (typeof mergeTags === "function") ? mergeTags(a.tags || [], ["cold"]) : (a.tags || ["cold"]);
            a.sourceType = "archer";
          }
        }
      }catch(_){}
      return out;
    };
  }

  if(typeof updateMage === "function"){
    const __origUpdateMage = updateMage;
    updateMage = function(e){
      const before = Array.isArray(fireZones) ? fireZones.length : 0;
      const out = __origUpdateMage(e);
      try{
        if(Array.isArray(fireZones) && fireZones.length > before){
          const f = fireZones[fireZones.length - 1];
          if(f){
            f.tags = (typeof mergeTags === "function") ? mergeTags(f.tags || [], ["fire"]) : (f.tags || ["fire"]);
            f.type = "mage";
            if(typeof f.damage !== "number" || !isFinite(f.damage)) f.damage = Math.max(4, (e && e.damage ? e.damage * 0.8 : 8));
            if(typeof f.radius !== "number" && typeof f.r === "number") f.radius = f.r;
          }
        }
      }catch(_){}
      return out;
    };
  }

  if(typeof spawnEnemyAt === "function"){
    const __origSpawnEnemyAt = spawnEnemyAt;
    spawnEnemyAt = function(ex, ey, pack){
      const before = Array.isArray(enemies) ? enemies.length : 0;
      const out = __origSpawnEnemyAt(ex, ey, pack);
      try{
        if(Array.isArray(enemies) && enemies.length > before){
          const e = enemies[enemies.length - 1];
          if(e){
            if(e.type === "archer" || e.type === "skeleton"){
              e.attackElement = "cold";
              e.tags = (typeof mergeTags === "function") ? mergeTags(e.tags || [], ["cold"]) : (e.tags || ["cold"]);
            }else if(e.type === "mage" || e.type === "demon"){
              e.attackElement = "fire";
              e.tags = (typeof mergeTags === "function") ? mergeTags(e.tags || [], ["fire"]) : (e.tags || ["fire"]);
            }else if(e.type === "boss"){
              e.attackElement = "lightning";
              e.tags = (typeof mergeTags === "function") ? mergeTags(e.tags || [], ["lightning"]) : (e.tags || ["lightning"]);
            }
          }
        }
      }catch(_){}
      return out;
    };
  }

  if(typeof spawnRandomBoss === "function"){
    const __origSpawnRandomBoss = spawnRandomBoss;
    spawnRandomBoss = function(){
      const before = Array.isArray(enemies) ? enemies.length : 0;
      const out = __origSpawnRandomBoss();
      try{
        if(Array.isArray(enemies) && enemies.length > before){
          const e = enemies[enemies.length - 1];
          if(e && e.type === "boss"){
            e.attackElement = "lightning";
            e.tags = (typeof mergeTags === "function") ? mergeTags(e.tags || [], ["lightning"]) : (e.tags || ["lightning"]);
          }
        }
      }catch(_){}
      return out;
    };
  }

  // Spec UI: append resistance values
  function __appendResistLines(){
    try{
      if(typeof specTextEl === "undefined" || !specTextEl) return;
      const base = String(specTextEl.textContent || "");
      const marker = "화염 저항:";
      if(base.includes(marker)) return;
      const lines = [
        "",
        `화염 저항: ${(player.fireRes || 0).toFixed(0)}%`,
        `냉기 저항: ${(player.coldRes || 0).toFixed(0)}%`,
        `번개 저항: ${(player.lightRes || 0).toFixed(0)}%`,
        `카오스 저항: ${(player.chaosRes || 0).toFixed(0)}%`
      ];
      specTextEl.textContent = base + lines.join("\n");
    }catch(_){}
  }

  const __oldAfter = (window.GameHooks && window.GameHooks.afterRenderPanels) || null;
  window.GameHooks = window.GameHooks || {};
  window.GameHooks.afterRenderPanels = function(){
    try{ if(typeof __oldAfter === "function") __oldAfter(); }catch(_){}
    try{ __appendResistLines(); }catch(_){}
  };

  // initialize resists once
  try{ __rebuildPlayerResists(); }catch(_){}
})();

  function drawBeams(){
    try{
      if(!window.loots || !window.ctx) return;

      for(const l of window.loots){
