<style id="orb-rune-medal-style">
/* ===== remove old text/count UI ===== */
#orbCounts{ display:none !important; }

/* ===== craft grid layout ===== */
#craftOrbGrid{
  display:grid !important;
  grid-template-columns:repeat(3, minmax(0,1fr));
  gap:8px;
  margin-top:8px;
}

/* ===== fully restyle the actual orb buttons ===== */
#craftOrbGrid .orbBtn{
  position:relative !important;
  min-height:72px !important;
  padding:6px 6px 8px !important;
  border-radius:14px !important;
  overflow:hidden !important;
  font-size:0 !important;
  color:transparent !important;
  text-shadow:none !important;
  background:
    radial-gradient(circle at 50% 8%, rgba(255,255,255,.05), rgba(255,255,255,0) 28%),
    linear-gradient(180deg, rgba(18,18,18,.98), rgba(8,8,8,.98)) !important;
  border:2px solid rgba(255,255,255,.10) !important;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.03),
    inset 0 -8px 14px rgba(0,0,0,.28) !important;
}
#craftOrbGrid .orbBtn > :not(.orbMedalSkin){ display:none !important; }
#craftOrbGrid .orbMedalSkin .orbMedal,
#craftOrbGrid .orbMedalSkin .orbRibbon{ display:block !important; }
#craftOrbGrid .orbBtn::before,
#craftOrbGrid .orbBtn::after{ content:none !important; }

/* ===== injected medal skin ===== */
#craftOrbGrid .orbMedalSkin{
  position:absolute;
  inset:0;
  display:flex !important;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  pointer-events:none;
}
#craftOrbGrid .orbMedal{
  width:28px;
  height:28px;
  border-radius:50%;
  position:relative;
  border:2px solid currentColor;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -6px 10px rgba(0,0,0,.35),
    0 0 10px rgba(0,0,0,.22);
  overflow:hidden;
}
#craftOrbGrid .orbMedal::before{
  content:"";
  position:absolute;
  inset:5px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.18);
}
#craftOrbGrid .orbMedal::after{
  content:"✦";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:900;
  color:rgba(255,255,255,.70);
  text-shadow:0 1px 1px rgba(0,0,0,.35);
}
#craftOrbGrid .orbRibbon{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  top:-2px;
  width:14px;
  height:8px;
  border-radius:0 0 8px 8px;
  background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,0));
  opacity:.8;
}
#craftOrbGrid .orbLabel{
  display:block !important;
  font-size:11px;
  line-height:1;
  font-weight:900;
  color:#e9e9e9;
  letter-spacing:-0.02em;
}
#craftOrbGrid .orbCountBadge{
  position:absolute;
  right:4px;
  top:4px;
  min-width:20px;
  height:20px;
  padding:0 5px;
  z-index:3;
  border-radius:999px;
  display:flex !important;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.68);
  border:2px solid rgba(255,215,106,.62);
  color:#ffd76a;
  font-size:12px;
  font-weight:900;
  line-height:1;
}

/* ===== color styles ===== */
#craftOrbGrid .style-blue{ color:#5d8bff !important; }
#craftOrbGrid .style-blue .orbMedal{
  background:
    radial-gradient(circle at 35% 28%, rgba(255,255,255,.22), rgba(255,255,255,0) 32%),
    linear-gradient(180deg, #4e7eff, #213e93);
}
#craftOrbGrid .style-gold{ color:#d8b66a !important; }
#craftOrbGrid .style-gold .orbMedal{
  background:
    radial-gradient(circle at 35% 28%, rgba(255,255,255,.22), rgba(255,255,255,0) 32%),
    linear-gradient(180deg, #dfc57b, #8a6f35);
}
#craftOrbGrid .style-white{ color:#ecf0f6 !important; }
#craftOrbGrid .style-white .orbMedal{
  background:
    radial-gradient(circle at 35% 28%, rgba(255,255,255,.28), rgba(255,255,255,0) 32%),
    linear-gradient(180deg, #f1f3f7, #9aa4b4);
}
#craftOrbGrid .style-deepblue{ color:#6f85ff !important; }
#craftOrbGrid .style-deepblue .orbMedal{
  background:
    radial-gradient(circle at 35% 28%, rgba(255,255,255,.20), rgba(255,255,255,0) 32%),
    linear-gradient(180deg, #6f85ff, #29378f);
}
#craftOrbGrid .style-red{ color:#e06c6c !important; }
#craftOrbGrid .style-red .orbMedal{
  background:
    radial-gradient(circle at 35% 28%, rgba(255,255,255,.18), rgba(255,255,255,0) 32%),
    linear-gradient(180deg, #d95757, #7a2727);
}
#craftOrbGrid .style-split-blue-gold{ color:#d8b66a !important; }
#craftOrbGrid .style-split-blue-gold .orbMedal{
  background:
    radial-gradient(circle at 35% 28%, rgba(255,255,255,.18), rgba(255,255,255,0) 32%),
    linear-gradient(90deg, #4676ff 0 50%, #cda654 50% 100%);
}
#craftOrbGrid .style-split-silver-gold{ color:#d8b66a !important; }
#craftOrbGrid .style-split-silver-gold .orbMedal{
  background:
    radial-gradient(circle at 35% 28%, rgba(255,255,255,.18), rgba(255,255,255,0) 32%),
    linear-gradient(90deg, #d8dde6 0 50%, #cda654 50% 100%);
}
#craftOrbGrid .orbBtn.isZero{

  filter:saturate(.55);
}
@media (max-width:700px){

/* 선택된 카드 강조 */
#craftOrbGrid .orbBtn.active{

/* 메달 입체감 */
.orb-medal{

/* ===== Passive Tree ===== */

#passivePanelBody{ position:relative; display:flex; flex-direction:column; flex:1; min-height:0; gap:6px; }
#passiveHud{ position:absolute; left:18px; top:-6px; height:56px; z-index:40; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; gap:0; padding:0; margin:0; color:#f0e0bd; font-weight:800; }
#passivePointsText{ color:#ffd27a; font-size:14px; font-weight:900; line-height:1.0; margin:0; text-align:left; letter-spacing:-0.02em; }

#passiveTreeBoard{ position:relative; width:2270px; height:2260px; min-width:2270px; min-height:2260px; margin:0 auto; }
#passiveTreeGlow{ position:absolute; inset:0; background:radial-gradient(circle at 50% 50%, rgba(255,200,120,.06), rgba(0,0,0,0) 58%); pointer-events:none; }
#passiveTree{ position:absolute; inset:0; }
.passiveCore,.passiveNode{ position:absolute; transform:translate(-50%,-50%); border-radius:50%; display:flex; align-items:center; justify-content:center; user-select:none; }
.passiveCore{ width:96px; height:96px; border:2px solid rgba(255,226,167,.70); background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.18), rgba(255,255,255,0) 35%), linear-gradient(180deg, rgba(75,56,30,.98), rgba(26,18,9,.98)); box-shadow:0 0 18px rgba(255,200,120,.26), inset 0 0 0 1px rgba(255,255,255,.06); color:#ffe6a7; font-weight:900; letter-spacing:-0.02em; z-index:3; }
.passiveLink{ position:absolute; height:8px; transform-origin:0 50%; border-radius:999px; background:linear-gradient(90deg, rgba(88,68,44,.9), rgba(48,34,20,.75)); box-shadow:inset 0 0 0 1px rgba(255,255,255,.03); opacity:.88; z-index:1; }
.passiveLink.on{ background:linear-gradient(90deg, rgba(160,126,84,.98), rgba(96,70,42,.96)); }
.passiveLink.glow{ box-shadow:0 0 10px rgba(255,214,122,.34), 0 0 18px rgba(255,214,122,.18); animation:passiveLinePulse 1.8s ease-in-out infinite; }
.passiveNode{ width:54px; height:54px; border:2px solid rgba(116,94,62,.82); background:radial-gradient(circle at 34% 28%, rgba(255,255,255,.12), rgba(255,255,255,0) 35%), linear-gradient(180deg, rgba(28,28,30,.98), rgba(8,8,8,.98)); color:#e9d4b4; box-shadow:0 0 0 1px rgba(255,255,255,.03), inset 0 -8px 12px rgba(0,0,0,.35); z-index:2; transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, opacity .18s ease; }
.passiveNode.clusterNode{ width:48px; height:48px; }
.passiveNode.keystoneNode{
  width:72px;
  height:72px;
  border:3px solid rgba(255,220,120,.92);
  background:
    radial-gradient(circle at 34% 28%, rgba(255,255,255,.22), rgba(255,255,255,0) 34%),
    radial-gradient(circle at 50% 52%, rgba(255,224,140,.18), rgba(255,186,70,.08) 42%, rgba(0,0,0,0) 60%),
    linear-gradient(180deg, rgba(126,92,28,.98), rgba(60,40,8,.99));
  color:#fff1bf;
  box-shadow:
    0 0 14px rgba(255,214,110,.42),
    0 0 28px rgba(255,214,110,.16),
    inset 0 0 0 1px rgba(255,255,255,.10),
    inset 0 -10px 14px rgba(0,0,0,.28);
}
.passiveNode.keystoneNode .passiveIcon{
  font-size:26px;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.55));
}
.passiveNode.keystoneNode::before{
  content:"✦";
  position:absolute;
  top:7px;
  right:10px;
  font-size:14px;
  color:#ffe49c;
  opacity:.95;
  text-shadow:0 1px 1px rgba(0,0,0,.5);
}
.passiveNode.keystoneNode::after{
  content:"";

  inset:8px;
  border-radius:50%;
  border:1px solid rgba(255,235,170,.30);
  pointer-events:none;
}
.passiveNode .passiveIcon{ font-size:18px; line-height:1; filter:drop-shadow(0 1px 1px rgba(0,0,0,.45)); }
.passiveNode.clusterNode .passiveIcon{ font-size:16px; }
.passiveNode .passiveTier{ position:absolute; right:3px; bottom:2px; font-size:10px; font-weight:900; color:#f7e6c6; opacity:.92; }
.passiveNode.locked{ opacity:.48; filter:saturate(.55); }
.passiveNode.available{ border-color:#d4a968; box-shadow:0 0 10px rgba(255,196,96,.26), inset 0 -8px 12px rgba(0,0,0,.35); }
.passiveNode.allocated{ border-color:#ffd67a; box-shadow:0 0 12px rgba(255,214,122,.52), 0 0 22px rgba(255,214,122,.18), inset 0 0 0 1px rgba(255,255,255,.06); }
.passiveNode.selected{ transform:translate(-50%,-50%) scale(1.12); }
.passiveNode.popped{ animation:passivePop .28s ease-out; }
.passiveNode.branch-element{ color:#9fe3ff; }
.passiveNode.branch-crit{ color:#ffd97d; }
.passiveNode.branch-melee{ color:#ffad78; }
.passiveNode.branch-spell{ color:#d2a7ff; }
.passiveNode.branch-atkspd{ color:#ffcf6d; }
.passiveNode.branch-castspd{ color:#b8c7ff; }
.passiveNode.branch-life{ color:#ff8f9b; }
.passiveNode.branch-armor{ color:#d7d7d7; }
#passivePopupDock{ position:absolute; left:14px; right:14px; bottom:10px; z-index:30; pointer-events:none; }
#passivePopup{ width:min(520px, calc(100% - 8px)); margin-left:auto; padding:12px; border-radius:14px; border:1px solid rgba(255,215,122,.20); background:linear-gradient(180deg, rgba(18,14,10,.98), rgba(6,6,6,.99)); box-shadow:0 8px 22px rgba(0,0,0,.52), 0 0 12px rgba(255,210,122,.08); color:#f3e4c4; z-index:5; pointer-events:auto; }
.passivePopupName{ font-size:16px; font-weight:900; color:#ffe2a7; margin-bottom:4px; }
.passivePopupBranch{ font-size:12px; font-weight:800; margin-bottom:8px; }
.passivePopupDesc{ font-size:13px; line-height:1.35; color:#e7d6b4; margin-bottom:8px; }

.passivePopupBtns button,

}
.passivePopupBtns .panelClose{ min-width:72px; font-size:14px; padding:10px 16px; }
@keyframes passiveLinePulse{ 0%,100%{ opacity:.8; } 50%{ opacity:1; } }
@keyframes passivePop{ 0%{ transform:translate(-50%,-50%) scale(.88); } 70%{ transform:translate(-50%,-50%) scale(1.18); } 100%{ transform:translate(-50%,-50%) scale(1.0); } }
@media (max-width:700px){ #passiveOverlay .panel.passivePanel{ width:min(99vw,1380px); height:min(97vh,1120px);} #passivePointsText{font-size:14px;} #passiveTreeBoard{ width:2270px; height:2260px; min-width:2270px; min-height:2260px; } #passivePopup{ width:calc(100% - 4px); } }

</style>

<script>
let hitStop = 0;
// back-hand lag state (for 2H weapons)
let __backHandLag = 0;

/* =========================================================
   MAINTAINABILITY / EXTENSION HOOKS
   - Safe no-op hooks so you can add features without touching core.
   - Add your own hooks anywhere by setting:
       window.GameHooks = { afterRenderPanels(){ ... } , ... }
   ========================================================= */
window.GameHooks = window.GameHooks || {};
function _callHook(name, ...args){
  try{
    const h = window.GameHooks && window.GameHooks[name];
    if(typeof h === "function") h(...args);
  }catch(err){
    console.warn("Hook error:", name, err);
  }
}

/* =========================================================
   STEP 1) PoE급 확장형 태그/Mod 엔진 (코어 로직 "미변경" 버전)
   - 기존 dmgMul/maxHpAdd 같은 누적 방식은 그대로 두고,
     앞으로 "모드"로 확장할 기반만 추가합니다.
   - 이 블록은 <script> 안, 전역(함수들 선언 가능한 곳)에 그대로 붙여넣기.

   ✅ 제공 기능
   1) 태그 매칭: hasTag, hasAllTags, mergeTags
   2) Mod 구조: { id, source, scope, requiresAll, requiresAny, forbids, stat, op, value, stacks, maxStacks, enabled }
   3) Mod 평가/적용: modsFor(), statFromMods()
   4) 디버그: debugModsForStat()

   ⚠️ 아직은 기존 데미지/스탯 계산을 건드리지 않습니다.
      (다음 단계에서 recalcFromGear()에 한 겹 추가)
   ========================================================= */

/** ---------------------------------------------------------
 *  태그 유틸 (가볍고 안전)
 * -------------------------------------------------------- */
function _normTag(t){ return String(t||"").trim().toLowerCase(); }

function mergeTags(...lists){
  const out = new Set();
  for(const l of lists){
    if(!l) continue;
    for(const t of l){
      const nt = _normTag(t);
      if(nt) out.add(nt);
    }
  }
  return Array.from(out);
}

function hasTag(tags, tag){
  if(!tags || !tags.length) return false;
  const nt = _normTag(tag);
  for(const t of tags){
    if(_normTag(t) === nt) return true;
  }
  return false;
}

function hasAllTags(tags, required){
  if(!required || required.length === 0) return true;
  if(!tags || tags.length === 0) return false;
  for(const r of required){
    if(!hasTag(tags, r)) return false;
  }
  return true;
}

function hasAnyTag(tags, any){
  if(!any || any.length === 0) return true; // any조건이 없으면 통과
  if(!tags || tags.length === 0) return false;
  for(const r of any){
    if(hasTag(tags, r)) return true;
  }
  return false;
}

function hasNoTags(tags, forbids){
  if(!forbids || forbids.length === 0) return true;
  if(!tags || tags.length === 0) return true;
  for(const f of forbids){
    if(hasTag(tags, f)) return false;
  }
  return true;
}

/** ---------------------------------------------------------
 *  Mod 엔진 (PoE 스타일의 최소 코어)
 * -------------------------------------------------------- */
/**
 * Mod.op (연산 타입)
 * - "add"  : flat 더하기 (예: +25 최대체력)
 * - "inc"  : 증가율 합산 (예: 20% 증가 -> 0.20)
 * - "more" : 배율 곱 (예: 30% more -> 0.30)
 *
 * 권장: value는 숫자  (inc/more는 0.20 형태)
 *
 * Mod.scope (적용 범위) - 지금은 "player"만 쓰고 확장 예정
 * - "player" | "skill" | "enemy" | "map" | "global"
 */
const MOD_OPS = Object.freeze({ add:"add", inc:"inc", more:"more" });

/**
 * 전역 모드 저장소 (아직은 코어에 연결하지 않음)
 * - equipment / buffs / map / etc에서 모드를 이곳으로 모을 예정
 */
window.GameMods = window.GameMods || {
  /** @type {Array<Mod>} */
  list: [],
  add(mod){ this.list.push(mod); return mod; },
  removeById(id){ this.list = this.list.filter(m => m.id !== id); },
  clear(){ this.list.length = 0; }
};

/**
 * Mod 매칭(태그/조건) 검사
 * @param {Mod} mod
 * @param {Object} ctx - 평가 컨텍스트
 * @param {Array<string>} ctx.tags - 현재 대상(플레이어/스킬 등)의 태그
 * @param {string} ctx.scope - "player" 등
 * @returns {boolean}
 */
function modMatches(mod, ctx){
  if(!mod) return false;
  if(mod.enabled === false) return false;

  // scope 검사 (없으면 global 취급)
  const scope = mod.scope || "global";
  if(scope !== "global" && ctx && ctx.scope && scope !== ctx.scope) return false;

  const tags = (ctx && ctx.tags) ? ctx.tags : [];

  // requiresAll: AND 조건
  if(!hasAllTags(tags, mod.requiresAll)) return false;

  // requiresAny: OR 조건
  if(!hasAnyTag(tags, mod.requiresAny)) return false;

  // forbids: 금지 태그
  if(!hasNoTags(tags, mod.forbids)) return false;

  return true;
}

/**
 * 컨텍스트에 적용 가능한 모드 목록 반환
 * @param {Object} ctx
 * @param {string} ctx.scope
 * @param {Array<string>} ctx.tags
 * @param {string=} statKey - 특정 스탯만 필터
 */
function modsFor(ctx, statKey){
  const all = (window.GameMods && window.GameMods.list) ? window.GameMods.list : [];
  const out = [];
  for(const m of all){
    if(statKey && m.stat !== statKey) continue;
    if(modMatches(m, ctx)) out.push(m);
  }
  return out;
}

/**
 * 스탯 계산 (add/inc/more 순서로)
 * @param {number} baseValue - 기존 로직이 계산한 값(혹은 기본값)
 * @param {Object} ctx - { scope, tags }
 * @param {string} statKey - 예: "max_hp", "damage"
 * @param {Object=} opt
 * @param {number=} opt.clampMin
 * @param {number=} opt.clampMax
 * @returns {number}
 */
function statFromMods(baseValue, ctx, statKey, opt){
  const list = modsFor(ctx, statKey);

  let add = 0;
  let inc = 0;     // 합산
  let moreMul = 1; // 곱

  for(const m of list){
    const stacks = Math.max(1, (m.stacks || 1));
    const maxStacks = (m.maxStacks || stacks);
    const s = Math.min(stacks, maxStacks);
    const v = (Number(m.value) || 0) * s;

    const op = m.op || MOD_OPS.add;
    if(op === MOD_OPS.add) add += v;
    else if(op === MOD_OPS.inc) inc += v;
    else if(op === MOD_OPS.more) moreMul *= (1 + v);
  }

  let out = (Number(baseValue)||0) + add;
  out *= (1 + inc);
  out *= moreMul;

  if(opt){
    if(typeof opt.clampMin === "number") out = Math.max(opt.clampMin, out);
    if(typeof opt.clampMax === "number") out = Math.min(opt.clampMax, out);
  }
  return out;
}

/** ---------------------------------------------------------
 *  디버그 도구
 * -------------------------------------------------------- */
function debugModsForStat(ctx, statKey){
  const list = modsFor(ctx, statKey);
  const rows = list.map(m => ({
    id: m.id,
    stat: m.stat,
    op: m.op,
    value: m.value,
    scope: m.scope || "global",
    source: m.source || "",
    requiresAll: (m.requiresAll||[]).join(","),
    requiresAny: (m.requiresAny||[]).join(","),
    forbids: (m.forbids||[]).join(","),
    stacks: m.stacks || 1
  }));
  console.table(rows);
  return rows;
}

/* =========================================================
   STEP 5) 스킬/몹/맵까지 태그 확장 (PoE식 상호작용 기반)
   - 목표: '데미지 계산'과 '피해 계산'에 공통 태그 컨텍스트를 붙여,
           앞으로 "vs boss", "projectile", "fire", "map tier" 같은 모드를
           코드 수정 없이 모드만 추가해서 구현 가능하게 함.
   - 안전장치: 아래 플래그로 on/off 가능
   ========================================================= */
const USE_TAG_CONTEXTS = true;

/** ===== 태그 원천(기본값) ===== */
const PLAYER_BASE_TAGS = Object.freeze(["player","humanoid","samurai"]);
const SKILL_TAGS = Object.freeze({
  // 기본 평타
  attack:   ["attack","melee","physical"],
  // 궁극기(광역 베기)
  ultimate: ["attack","aoe","physical","ultimate"],
  // 활(원거리)
  arrow:    ["attack","projectile","physical"],
  // 마법(장판)
  firezone: ["spell","aoe","fire"]
});

function getPlayerTags(){
  // 나중에 전직/패시브로 확장 가능
  return mergeTags(PLAYER_BASE_TAGS, player.tags || []);
}

function hasEquippedWeapon(){
  return !!(typeof equipment !== "undefined" && equipment && equipment.weapon);
}

function getUnarmedWeaponProfile(){
  return {
    name: "비무장",
    min: 2,
    max: 4,
    attackSpeed: 1.00,
    critChance: 0.05,
    critMulti: 1.50,
    weaponType: "unarmed",
    tags: ["unarmed","melee","physical"]
  };
}

function getCombatWeaponDisplayStats(){
  const it = (typeof equipment !== "undefined" && equipment && equipment.weapon) ? equipment.weapon : null;
  if(it && typeof getWeaponDisplayStats === "function"){
    const ws = getWeaponDisplayStats(it);
    if(ws && Number.isFinite(Number(ws.min)) && Number.isFinite(Number(ws.max))){
      return {
        min: Number(ws.min),
        max: Number(ws.max),
        atkMul: Math.max(0.1, Number(ws.atkMul || 1)),
        source: "equipped"
      };
    }
  }
  const u = getUnarmedWeaponProfile();
  return {
    min: u.min,
    max: u.max,
    atkMul: u.attackSpeed,
    source: "unarmed"
  };
}

function getWeaponTags(){
  const it = (typeof equipment !== "undefined" && equipment && equipment.weapon) ? equipment.weapon : null;
  if(!it){
    return mergeTags(["unarmed","melee","physical"]);
  }
  const t = [];
  if(Array.isArray(it.tags)) t.push(...it.tags);
  t.push("weapon");
  if(it.slot) t.push(it.slot);
  if(!t.includes("melee") && !t.includes("projectile")) t.push("melee");
  return mergeTags(t);
}

function getActiveSkillId(){
  const links = (player && player.skillLinks) ? player.skillLinks : null;
  return (links && links.active) ? links.active : 'attack';
}

function getActiveSkillDefById(skillId){
  const sid = skillId || 'attack';
  const def = (window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[sid]) ? window.ACTIVE_SKILLS[sid] : null;
  if(def) return def;
  const fallbackTags = (SKILL_TAGS && SKILL_TAGS[sid]) ? SKILL_TAGS[sid] : ['attack','melee','physical'];
  return {
    id: sid,
    name: sid === 'attack' ? '기본 공격' : String(sid),
    source: fallbackTags.includes('spell') ? 'spell' : 'weapon',
    tags: fallbackTags.slice(),
    baseMul: 1
  };
}

function getCombatWeaponTagsForSkill(skillDef){
  const it = (typeof equipment !== "undefined" && equipment && equipment.weapon) ? equipment.weapon : null;
  const tags = [];
  const skillTags = Array.isArray(skillDef && skillDef.tags) ? skillDef.tags : [];
  const isSpell = !!((skillDef && skillDef.source === 'spell') || skillTags.includes('spell'));
  if(it && Array.isArray(it.tags)) tags.push(...it.tags);
  if(it){
    tags.push('weapon');
    if(it.slot) tags.push(it.slot);
  }
  if(isSpell){
    return mergeTags(tags.filter(t => t !== 'melee' && t !== 'projectile' && t !== 'unarmed'));
  }
  if(!it){
    tags.push('unarmed','melee','physical');
    return mergeTags(tags);
  }
  if(!tags.includes('melee') && !tags.includes('projectile')) tags.push('melee');
  return mergeTags(tags);
}

function getMapTags(){
  // tier/seed 기반으로 모드 조건 만들 수 있게 태그화
  const t = ["map"];
  const tier = (mapRun && mapRun.tier) ? mapRun.tier : (typeof mapTier==="number" ? mapTier : 1);
  t.push("tier_"+tier);
  if(tier >= 5) t.push("high_tier");
  if(mapRun && mapRun.bossSpawned) t.push("boss_spawned");
  if(mapRun && mapRun.bossDefeated) t.push("boss_defeated");
  return mergeTags(t);
}

function tagsFromEnemy(e){
  if(!e) return [];

  const t = ["enemy"];
  if(e.type) t.push(e.type);

  if(e.type === "boss") t.push("boss");
  if(e.isElite) t.push("elite");
  if(e.eliteColor) t.push("elite_" + e.eliteColor);

  // 전투 태그
  if(e.type === "archer" || e.type === "skeleton" || e.type === "porcupine" || e.type === "sporePlant" || e.type === "vineMaw" || e.type === "spider" || e.type === "lich") t.push("projectile");
  if(e.type === "mage" || e.type === "lich") t.push("spell");
  if(e.type === "melee" || e.type === "zombie" || e.type === "orc" || e.type === "wolf" || e.type === "bat" || e.type === "boar" || e.type === "scorpion" || e.type === "mawPlant" || e.type === "vineMaw" || e.type === "spider" || e.type === "skeletonWarrior") t.push("melee");
  if(e.type === "wolf" || e.type === "bat" || e.type === "boar" || e.type === "scorpion" || e.type === "porcupine") t.push("animal");
  if(e.type === "bat") t.push("flying");
  if(e.type === "spider") t.push("arachnid", "poison");
  if(e.type === "mawPlant" || e.type === "sporePlant" || e.type === "vineMaw") t.push("plant");
  if(e.type === "demon") t.push("melee", "elite", "demon");

  return mergeTags(t, e.tags || []);
}

/**
 * 공통 전투 컨텍스트 생성
 * @param {string} skillId - "attack" | "ultimate" | "arrow" | "firezone" | ...
 * @param {Object=} enemy
 */
function buildCombatCtx(skillId, enemy){
  const sid = skillId || getActiveSkillId();
  const skillDef = getActiveSkillDefById(sid);
  const skillTags = (SKILL_TAGS && SKILL_TAGS[sid]) ? SKILL_TAGS[sid] : ['skill', sid];
  const tags = mergeTags(
    ['combat','skill', sid],
    getPlayerTags(),
    getCombatWeaponTagsForSkill(skillDef),
    getMapTags(),
    skillTags,
    Array.isArray(skillDef && skillDef.tags) ? skillDef.tags : [],
    tagsFromEnemy(enemy)
  );
  return { scope:'skill', tags, enemy };
}

/** 아웃고잉(내가 주는) 데미지 모드 */
function applyOutgoingDamageMods(baseDmg, ctx){
  if(!USE_TAG_CONTEXTS) return baseDmg;
  if(typeof statFromMods !== "function") return baseDmg;
  // statKey는 "damage"로 통일 (모드에서 requiresAll로 분기)
  return statFromMods(baseDmg, ctx, "damage");
}

/** 인커밍(적이 받는) 데미지 모드 (예: boss takes more) */
function applyEnemyTakenDamageMods(dealt, ctx){
  if(!USE_TAG_CONTEXTS) return dealt;
  if(typeof statFromMods !== "function") return dealt;
  // statKey는 "damage_taken"으로 통일
  return statFromMods(dealt, ctx, "damage_taken");
}

/** 플레이어가 받는 피해 모드 (예: projectile damage taken) */
function applyPlayerTakenDamageMods(incoming, ctx){
  let out = incoming;
  if(USE_TAG_CONTEXTS && typeof statFromMods === "function"){
    out = statFromMods(out, ctx, "player_damage_taken");
  }
  const g = (window.player && player.gear) ? player.gear : null;
  const mul = Number((g && g.playerDamageTakenMul) || 1);
  if(isFinite(mul) && mul > 0) out *= mul;

  const enduranceNow = Math.max(0, Number((player && player.chargeState && player.chargeState.endurance) ?? player?.enduranceCharges ?? 0) || 0);
  if(enduranceNow > 0 && typeof EQUIP_SLOTS !== 'undefined' && equipment){
    let extraTakenMul = 1;
    for(const slot of EQUIP_SLOTS){
      const it = equipment[slot];
      if(!it) continue;
      const per = Number(it.enduranceTakenLessPerCharge || 0);
      if(per > 0) extraTakenMul *= Math.max(0.05, 1 - enduranceNow * per);
    }
    out *= extraTakenMul;
  }
  return out;
}

/* =========================================================
   ✅ POE식 데미지 "버켓" (Bucket) 레이어
   - base(기본) → add(추가) → increased(증가) → more(추가배율)
   - crit(치명타) → enemy_taken(적이 받는 피해) → player_taken(플레이어가 받는 피해)
   - 지금은 '스칼라(단일 숫자)'로 계산하지만,
     구조를 버켓으로 잡아두면 나중에 물리/원소/카오스 같은
     DamagePacket(다중 타입)로 확장하기 쉬움.
   ========================================================= */

/**
 * 공격자가 주는 피해 계산(아웃고잉 버켓) + 크리/받는피해까지 한 번에 처리
 * @param {number} base - 무기/스킬이 만든 "기본 피해"
 * @param {Object} ctx  - buildCombatCtx() 결과
 * @param {Object=} opt
 * @param {boolean=} opt.canCrit - 기본 true (DOT/지속피해면 false)
 * @returns {{raw:number, afterOutgoing:number, crit:{dmg:number,isCrit:boolean,chance:number,multi:number}, dealt:number}}
 */

function getCombatSkillForCtx(ctx){
  const skillId = ctx && (ctx.skillId || ctx.activeSkillId || ctx.sourceSkillId || ctx.__skillId);
  if(skillId && window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[skillId]) return window.ACTIVE_SKILLS[skillId];
  const act = window.__supportActionState;
  if(act && act.skill) return act.skill;
  const activeId = player && player.skillLinks ? player.skillLinks.active : null;
  if(activeId && window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[activeId]) return window.ACTIVE_SKILLS[activeId];
  return null;
}

function getSupportListForCombatCtx(ctx){
  const act = window.__supportActionState;
  if(act && Array.isArray(act.supports) && act.supports.length) return act.supports;
  const skill = getCombatSkillForCtx(ctx);
  if(skill && typeof getApplicableSupportsForSkill === 'function'){
    try{ return getApplicableSupportsForSkill(skill) || []; }
    catch(_e){}
  }
  return [];
}

function applyCoreSupportPacketRules(packet, ctx){
  const out = makeDamagePacket(packet?.phys||0, packet?.fire||0, packet?.cold||0, packet?.lightning||0, packet?.chaos||0);
  if(!ctx || ctx.__supportsPreapplied){
    if(ctx) ctx.__coreBrutalityApplied = false;
    return out;
  }
  const tags = Array.isArray(ctx.tags) ? ctx.tags : [];
  const isAttack = tags.includes('attack');
  const isMelee = tags.includes('melee');
  const isPhysical = tags.includes('physical');
  const supports = getSupportListForCombatCtx(ctx);
  const hasBrutality = Array.isArray(supports) && supports.some(s => s && s.id === 'brutalitySupport');
  if(hasBrutality && (isAttack || isMelee || isPhysical)){
    const mul = (typeof scaleSupportMultiplierValue === 'function' && typeof getGemEffectiveLevel === 'function')
      ? scaleSupportMultiplierValue(1.50, getGemEffectiveLevel('brutalitySupport'))
      : 1.50;
    out.phys *= mul;
    out.fire = 0;
    out.cold = 0;
    out.lightning = 0;
    out.chaos = 0;
    ctx.__coreBrutalityApplied = true;
  }else if(ctx){
    ctx.__coreBrutalityApplied = false;
  }
  return out;
}

function computeFinalDamage(base, ctx, opt){
  opt = opt || {};
  const canCrit = (opt.canCrit !== false);

  // 0) Base → DamagePacket (phys/fire/cold/lightning/chaos)
  const rawPacket = applyCoreSupportPacketRules(baseToDamagePacket(base, ctx), ctx);

  // 1) OUTGOING: add/inc/more (태그 기반) 타입별 적용
  let afterOutgoingPacket = applyOutgoingDamageModsPacket(rawPacket, ctx);

  // 아이템 특수 배율: 보스/엘리트
  const gearNow = (window.player && player.gear) ? player.gear : {};
  const enemyNow = ctx && ctx.enemy ? ctx.enemy : null;
  let critBonus = 0;

  const ctxTags = (ctx && Array.isArray(ctx.tags)) ? ctx.tags : [];
  const isSpellHit = hasTag(ctxTags, 'spell');
  const isElementalSpellHit = isSpellHit && (hasTag(ctxTags, 'fire') || hasTag(ctxTags, 'cold') || hasTag(ctxTags, 'lightning'));
  const equippedWeaponNow = (typeof equipment !== "undefined" && equipment) ? equipment.weapon : null;
  const annihilatingLightMul = Math.max(0, Number((equippedWeaponNow && equippedWeaponNow.annihilatingLightElementalSkillMul) || 0) || 0);

  const gearSpellMul = Math.max(0, Number(gearNow.spellMul || 1) || 1);
  const gearFireMul = Math.max(0, Number(gearNow.fireMul || 1) || 1);
  const gearColdMul = Math.max(0, Number(gearNow.coldMul || 1) || 1);
  const gearLightMul = Math.max(0, Number(gearNow.lightMul || 1) || 1);
  const gearChaosMul = Math.max(0, Number(gearNow.chaosMul || 1) || 1);

  if(
    gearFireMul !== 1 ||
    gearColdMul !== 1 ||
    gearLightMul !== 1 ||
    gearChaosMul !== 1 ||
    (isSpellHit && gearSpellMul !== 1)
  ){
    afterOutgoingPacket = scaleDamagePacketElements(afterOutgoingPacket, {
      fireMul: gearFireMul,
      coldMul: gearColdMul,
      lightMul: gearLightMul,
      chaosMul: gearChaosMul
    });
    if(isSpellHit && gearSpellMul !== 1){
      afterOutgoingPacket = scaleDamagePacket(afterOutgoingPacket, gearSpellMul);
    }
  }

  const frenzyNow = Math.max(0, Number((player && player.chargeState && player.chargeState.frenzy) ?? player?.frenzyCharges ?? 0) || 0);
  if(frenzyNow > 0 && hasTag(ctxTags, 'attack') && typeof EQUIP_SLOTS !== 'undefined' && equipment){
    let extraAttackMul = 1;
    for(const slot of EQUIP_SLOTS){
      const it = equipment[slot];
      if(!it) continue;
      const per = Number(it.frenzyDamagePerCharge || 0);
      if(per > 0) extraAttackMul *= (1 + frenzyNow * per);
    }
    if(extraAttackMul !== 1) afterOutgoingPacket = scaleDamagePacket(afterOutgoingPacket, extraAttackMul);
  }

  if(isElementalSpellHit && annihilatingLightMul > 0){
    afterOutgoingPacket = scaleDamagePacket(afterOutgoingPacket, annihilatingLightMul);
  }

  if(enemyNow){
    if(enemyNow.type === 'boss'){
      if(Number(gearNow.bossDamageMul || 1) !== 1){
        afterOutgoingPacket = scaleDamagePacket(afterOutgoingPacket, Number(gearNow.bossDamageMul || 1));
      }
      critBonus += Number(gearNow.critChanceVsBoss || 0);
    }else if(enemyNow.isElite){
      if(Number(gearNow.eliteDamageMul || 1) !== 1){
        afterOutgoingPacket = scaleDamagePacket(afterOutgoingPacket, Number(gearNow.eliteDamageMul || 1));
      }
    }
  }

  // 2) CRIT: 모든 타입에 동일 배율 적용 (DOT는 canCrit:false)
  let crit = { dmg: sumDamagePacket(afterOutgoingPacket), isCrit:false, chance:0, multi:1 };
  let afterCritPacket = afterOutgoingPacket;

  if(canCrit){
    const chance = Math.max(0, Math.min(0.95, Number(getCritChance() || 0) + critBonus));
    const multi = getCritMulti();
    const isCrit = (Math.random() < chance);
    crit = { dmg: isCrit ? sumDamagePacket(afterOutgoingPacket) * multi : sumDamagePacket(afterOutgoingPacket), isCrit, chance, multi };
    afterCritPacket = isCrit ? scaleDamagePacket(afterOutgoingPacket, multi) : afterOutgoingPacket;
  }

  // 3) ENEMY TAKEN: 예) boss takes more (타입별)
  const afterTakenPacket = applyEnemyTakenDamageModsPacket(afterCritPacket, ctx);

  // 4) RESISTS: 적 저항(없으면 0)
  const dealtPacket = applyEnemyResistsPacket(afterTakenPacket, enemyNow);
  window.__lastDamageFxKind =
    (dealtPacket.fire > dealtPacket.phys && dealtPacket.fire >= dealtPacket.cold && dealtPacket.fire >= dealtPacket.lightning && dealtPacket.fire >= dealtPacket.chaos) ? "fire" :
    (dealtPacket.cold > dealtPacket.phys && dealtPacket.cold >= dealtPacket.fire && dealtPacket.cold >= dealtPacket.lightning && dealtPacket.cold >= dealtPacket.chaos) ? "cold" :
    (dealtPacket.lightning > dealtPacket.phys && dealtPacket.lightning >= dealtPacket.fire && dealtPacket.lightning >= dealtPacket.cold && dealtPacket.lightning >= dealtPacket.chaos) ? "lightning" :
    (dealtPacket.chaos > dealtPacket.phys && dealtPacket.chaos >= dealtPacket.fire && dealtPacket.chaos >= dealtPacket.cold && dealtPacket.chaos >= dealtPacket.lightning) ? "chaos" :
    "physical";

  return {
    raw: sumDamagePacket(rawPacket),
    rawPacket,
    afterOutgoing: sumDamagePacket(afterOutgoingPacket),
    afterOutgoingPacket,
    crit,
    dealt: sumDamagePacket(dealtPacket),
    dealtPacket
  };
}

/**
 * (옵션) DamagePacket 기반 확장용 최소 구조
 * - 아직은 실제로 쓰지 않지만, "버켓" 구조를 유지하려고 둠.
 */
function makeDamagePacket(phys=0, fire=0, cold=0, lightning=0, chaos=0){
  return { phys, fire, cold, lightning, chaos };
}
function sumDamagePacket(p){
  return (p?.phys||0)+(p?.fire||0)+(p?.cold||0)+(p?.lightning||0)+(p?.chaos||0);
}
function scaleDamagePacket(p, k){
  return makeDamagePacket((p.phys||0)*k, (p.fire||0)*k, (p.cold||0)*k, (p.lightning||0)*k, (p.chaos||0)*k);
}

function scaleDamagePacketElements(p, mults){
  mults = mults || {};
  const fireMul = Math.max(0, Number(mults.fireMul ?? 1) || 1);
  const coldMul = Math.max(0, Number(mults.coldMul ?? 1) || 1);
  const lightMul = Math.max(0, Number(mults.lightMul ?? 1) || 1);
  const chaosMul = Math.max(0, Number(mults.chaosMul ?? 1) || 1);
  return makeDamagePacket(
    p && typeof p === 'object' ? (p.phys || 0) : 0,
    (p && typeof p === 'object' ? (p.fire || 0) : 0) * fireMul,
    (p && typeof p === 'object' ? (p.cold || 0) : 0) * coldMul,
    (p && typeof p === 'object' ? (p.lightning || 0) : 0) * lightMul,
    (p && typeof p === 'object' ? (p.chaos || 0) : 0) * chaosMul
  );
}

// ✅ base(숫자) → DamagePacket(phys/fire/cold/lightning/chaos)로 분리
function baseToDamagePacket(base, ctx){
  // base가 이미 packet이면 그대로
  if(base && typeof base === "object" && ("phys" in base || "fire" in base || "cold" in base || "lightning" in base || "chaos" in base)){
    return makeDamagePacket(base.phys||0, base.fire||0, base.cold||0, base.lightning||0, base.chaos||0);
  }
  const v = (typeof base === "number") ? base : 0;

  const tags = (ctx && Array.isArray(ctx.tags)) ? ctx.tags : [];
  const has = (t)=>tags.includes(t);
  const isAttack = has('attack') && !has('spell');

  function num(n, d=0){
    const x = Number(n);
    return Number.isFinite(x) ? x : d;
  }

  if(isAttack && typeof equipment !== "undefined" && equipment && equipment.weapon){
    const ew = equipment.weapon;
    const td = ew.totalData || ew.data || {};
    const g = (player && player.gear) ? player.gear : {};
    const baseMin = num(player && player.weapon && player.weapon.min, 14);
    const baseMax = num(player && player.weapon && player.weapon.max, 20);
    const avgBase = (baseMin + baseMax) * 0.5;
    const dmgMul = Math.max(0, num(td.dmgMul, 1));

    const localFlatPhys = num(td.flatDamageAdd ?? td.flatDamage, 0);
    const globalFlatPhys = num(g.flatDamageAdd ?? g.flatDamage, 0);
    const fireFlat = num(td.fireFlat, 0);
    const coldFlat = num(td.coldFlat, 0);
    const lightFlat = num(td.lightningFlat, 0);
    const chaosFlat = num(td.chaosFlat, 0);

    // '물리 피해 없음'은 무기 자체의 물리(베이스/로컬 플랫)만 제거하고,
    // 다른 장비/버프에서 얻는 전역 물리 플랫은 남겨둡니다.
    const localPhys = ew.noPhysicalDamage ? 0 : Math.max(0, avgBase * dmgMul + localFlatPhys);
    const globalPhys = Math.max(0, globalFlatPhys);
    const totalBase = Math.max(0.0001, localPhys + globalPhys + fireFlat + coldFlat + lightFlat + chaosFlat);
    const ratio = Math.max(0, v) / totalBase;

    let out = makeDamagePacket(
      Math.max(0, (localPhys + globalPhys) * ratio),
      Math.max(0, fireFlat * ratio),
      Math.max(0, coldFlat * ratio),
      Math.max(0, lightFlat * ratio),
      Math.max(0, chaosFlat * ratio)
    );

    let convert = Math.max(0, Math.min(1, num(ew.attackPhysToFire, 0)));
    if(convert > 0 && out.phys > 0){
      const moved = out.phys * convert;
      out.phys = Math.max(0, out.phys - moved);
      out.fire += moved;
    }

    const elems = [];
    if(has('fire')) elems.push('fire');
    if(has('cold')) elems.push('cold');
    if(has('lightning')) elems.push('lightning');
    if(has('chaos')) elems.push('chaos');
    if(out.phys > 0 && elems.length){
      const moved = out.phys;
      out.phys = 0;
      const share = moved / elems.length;
      for(const e of elems) out[e] += share;
    }

    return out;
  }

  const elems = [];
  if(has("fire")) elems.push("fire");
  if(has("cold")) elems.push("cold");
  if(has("lightning")) elems.push("lightning");
  if(has("chaos")) elems.push("chaos");

  let p = makeDamagePacket(v, 0, 0, 0, 0);
  if(elems.length){
    const share = v / elems.length;
    p.phys = 0;
    for(const e of elems){
      p[e] = (p[e]||0) + share;
    }
  }
  return p;
}

function cloneCtxWithExtraTag(ctx, extraTag){
  if(!ctx) return { scope:"skill", tags:[extraTag] };
  const tags = Array.isArray(ctx.tags) ? ctx.tags.slice() : [];
  if(extraTag && !tags.includes(extraTag)) tags.push(extraTag);
  return { ...ctx, tags };
}

// ✅ OUTGOING / ENEMY_TAKEN을 DamagePacket 단위로 적용
function applyOutgoingDamageModsPacket(pkt, ctx){
  // 각 타입별로 "그 타입 태그"를 추가한 ctx로 계산하면,
  // requiresAll:["fire"] 같은 모드가 fire에만 적용됨.
  const phys = applyOutgoingDamageMods(pkt.phys||0, cloneCtxWithExtraTag(ctx, "physical"));
  const fire = applyOutgoingDamageMods(pkt.fire||0, cloneCtxWithExtraTag(ctx, "fire"));
  const cold = applyOutgoingDamageMods(pkt.cold||0, cloneCtxWithExtraTag(ctx, "cold"));
  const lightning = applyOutgoingDamageMods(pkt.lightning||0, cloneCtxWithExtraTag(ctx, "lightning"));
  const chaos = applyOutgoingDamageMods(pkt.chaos||0, cloneCtxWithExtraTag(ctx, "chaos"));
  return makeDamagePacket(phys, fire, cold, lightning, chaos);
}

function applyEnemyTakenDamageModsPacket(pkt, ctx){
  let phys = applyEnemyTakenDamageMods(pkt.phys||0, cloneCtxWithExtraTag(ctx, "physical"));
  let fire = applyEnemyTakenDamageMods(pkt.fire||0, cloneCtxWithExtraTag(ctx, "fire"));
  let cold = applyEnemyTakenDamageMods(pkt.cold||0, cloneCtxWithExtraTag(ctx, "cold"));
  let lightning = applyEnemyTakenDamageMods(pkt.lightning||0, cloneCtxWithExtraTag(ctx, "lightning"));
  let chaos = applyEnemyTakenDamageMods(pkt.chaos||0, cloneCtxWithExtraTag(ctx, "chaos"));

  const enemy = ctx && ctx.enemy;
  const weapon = (typeof equipment !== "undefined" && equipment) ? equipment.weapon : null;
  if(enemy && weapon && enemy.ailments && enemy.ailments.burn > 0){
    const bonus = Math.max(0, Number(weapon.hellhammerBurningDamageMul || 0));
    if(bonus > 0){
      const mul = 1 + bonus;
      phys *= mul;
      fire *= mul;
      cold *= mul;
      lightning *= mul;
      chaos *= mul;
    }
  }

  return makeDamagePacket(phys, fire, cold, lightning, chaos);
}

// ✅ Enemy Resist(저항) 적용 (없으면 0)
function enemyRes(enemy, key){
  if(!enemy) return 0;
  const v = enemy[key];
  return (typeof v === "number") ? v : 0;
}
function clamp01(x){ return Math.max(0, Math.min(1, x)); }

function applyEnemyResistsPacket(pkt, enemy){
  // res 값은 0~0.9 정도 권장 (0.75 = 75% 저항)
  const physRes = clamp01(enemyRes(enemy, "physRes"));
  const fireRes = clamp01(enemyRes(enemy, "fireRes"));
  const coldRes = clamp01(enemyRes(enemy, "coldRes"));
  const lightningRes = clamp01(enemyRes(enemy, "lightningRes"));
  const chaosRes = clamp01(enemyRes(enemy, "chaosRes"));

  return makeDamagePacket(
    (pkt.phys||0) * (1 - physRes),
    (pkt.fire||0) * (1 - fireRes),
    (pkt.cold||0) * (1 - coldRes),
    (pkt.lightning||0) * (1 - lightningRes),
    (pkt.chaos||0) * (1 - chaosRes)
  );
}

/* =========================================================
   Oni Samurai — Maintenance/Stability Patch (v1)
   - Prevent "white screen": show error overlay on JS errors
   - Guard render/update calls so one error doesn't kill everything
   - Adds small helpers ($, $$, assertEl) for safer DOM access
   ========================================================= */
const __ONI_BUILD = "stable-2026-02-26";

/** DOM helpers (safe, tiny) */
const $  = (sel, root=document)=> root.querySelector(sel);
const $$ = (sel, root=document)=> Array.from(root.querySelectorAll(sel));
function assertEl(el, name){
  if(!el){
    throw new Error(`Missing DOM element: ${name}`);
  }
  return el;
}

/** Error overlay so you can see what broke instead of a blank screen */
(function setupErrorOverlay(){
  const box = document.createElement("div");
  box.id = "fatalErrorOverlay";
  box.style.cssText = [
    "position:fixed","inset:0","z-index:999999",
    "background:rgba(0,0,0,0.92)","color:#fff",
    "padding:16px","font:12px/1.4 monospace",
    "white-space:pre-wrap","overflow:auto","display:none"
  ].join(";");
  document.addEventListener("DOMContentLoaded", ()=> document.body.appendChild(box));

  function show(title, err){
    const msg = (err && (err.stack || err.message)) ? (err.stack || err.message) : String(err || "");
    box.textContent = `${title}\n\n${msg}\n\n(이 화면이 뜨면, 위 메시지/스크린샷을 보내줘)`;
    box.style.display = "block";
  }

  window.addEventListener("error", (e)=>{
    show("JS Error", e.error || e.message || e);
  });

  window.addEventListener("unhandledrejection", (e)=>{
    show("Promise Rejection", e.reason || e);
  });
})();

/** Safe call wrapper (prevents one exception from killing everything) */
function safeCall(fn, label){
  try{ return fn(); }
  catch(err){
    console.error(`[SAFE:${label}]`, err);
    // Overlay handler will show it too (window error may not fire for caught errors)
    const ov = document.getElementById("fatalErrorOverlay");
    if(ov){
      ov.style.display = "block";
      ov.textContent = `SAFE ERROR: ${label}\n\n${err && (err.stack||err.message) ? (err.stack||err.message) : String(err)}`;
    }
    return undefined;
  }
}

let audioCtx = null;
let audioUnlocked = false;

function ensureAudioCtx(){
  if (audioCtx) return true;
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return true;
  }catch(e){
    console.log("AudioContext blocked:", e);
    return false;
  }
}

function unlockAudio(){
  if (audioUnlocked) return;
  if (!ensureAudioCtx()) return;

  // iOS는 resume도 사용자 제스처에서 호출돼야 안전함
  audioCtx.resume?.();

  // 무음 버퍼 한 번 재생해서 언락(브라우저별 호환)
  try{
    const buffer = audioCtx.createBuffer(1, 1, 22050);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);
  }catch(e){
    // 무시
  }

  audioUnlocked = true;
}

function startBGM(){
  let isPlaying = true;
  function getTempo(){
    if(killCount >= 100) return 150;
    if(killCount >= 50) return 130;
    return 110;
  }
  function playBeat(){
    if(!isPlaying) return;

    let tempo = getTempo();
    let beatTime = 60 / tempo;
    let now = audioCtx.currentTime;

    let kick = audioCtx.createOscillator();
    let kickGain = audioCtx.createGain();
    kick.type = "triangle";
    kick.frequency.setValueAtTime(90, now);
    kick.frequency.exponentialRampToValueAtTime(50, now + 0.12);
    kickGain.gain.setValueAtTime(0.18, now);
    kickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    kick.connect(kickGain);
    kickGain.connect(audioCtx.destination);
    kick.start(now);
    kick.stop(now + 0.15);

    let tone = audioCtx.createOscillator();
    let toneGain = audioCtx.createGain();
    tone.type = "square";
    tone.frequency.value = 220;
    toneGain.gain.setValueAtTime(0.06, now + beatTime/2);
    toneGain.gain.exponentialRampToValueAtTime(0.001, now + beatTime/2 + 0.1);
    tone.connect(toneGain);
    toneGain.connect(audioCtx.destination);
    tone.start(now + beatTime/2);
    tone.stop(now + beatTime/2 + 0.1);

    setTimeout(playBeat, beatTime * 1000);
  }
  playBeat();
  return { stop: () => isPlaying = false };
}

function isoProject(wx, wy){

function getMapTier(){
  // mapTier 소스 다양화(게임/맵/전역)
  const mt =
    (typeof Game !== "undefined" && Game && (Game.mapTier ?? Game.map_tier)) ? (Game.mapTier ?? Game.map_tier) :
    (typeof mapTier !== "undefined" ? mapTier :
    (typeof currentMapTier !== "undefined" ? currentMapTier : 1));
  return Math.max(1, Math.floor(mt || 1));
}

function randRange(a,b){ return a + Math.random()*(b-a); }
function randInt(a,b){
  return (a + Math.floor(Math.random() * (b - a + 1)));
}

/**
 * PoE 느낌: areaLevel ~= mapTier 기반.
 * - mapTier가 오를수록 ilvl 상승
 * - 약간의 랜덤 편차
 * - 플레이어 레벨도 아주 약하게 반영
 */
function rollItemLevelFromMapTier(mt){
  const t = Math.max(1, mt || 1);
  const areaLevel = 1 + t * 5;              // T1=6, T10=51
  const jitter = randInt(-1, 2);            // 약간 흔들림
  const lvl = (typeof level !== "undefined") ? (level || 1) : 1;
  const lvlBonus = Math.floor(lvl * 0.25);  // 플레이어 레벨 약반영
  return Math.max(1, areaLevel + jitter + lvlBonus);
}

// - 단순 "무기/방어구" 분리를 넘어서

// 아이템 family를 명시적으로 분리해서 무기/오프핸드 affix가 뒤섞이지 않게 한다.
function getItemAffixFamily(itemTags, opts){
  const tags = Array.isArray(itemTags) ? itemTags : [];
  const tmpl = (opts && opts.tmpl) ? opts.tmpl : null;
  const slotFromTags = (
    tags.includes('weapon') ? 'weapon' :
    tags.includes('offhand') ? 'offhand' :
    tags.includes('helm') ? 'helm' :
    tags.includes('chest') ? 'chest' :
    tags.includes('gloves') ? 'gloves' :
    tags.includes('boots') ? 'boots' :
    tags.includes('ring') ? 'ring' :
    tags.includes('belt') ? 'belt' :
    tags.includes('flask') ? 'flask' :
    null
  );
  const slot = (tmpl && tmpl.slot) ? tmpl.slot : slotFromTags;
  const wt = String((tmpl && tmpl.weaponType) || '').toLowerCase();
  const has = (t)=>tags.includes(t) || !!(tmpl && Array.isArray(tmpl.tags) && tmpl.tags.includes(t));

  if(slot === 'weapon'){
    if(wt === 'wand' || has('wand')) return 'weapon_wand';
    if(wt === 'warstaff' || has('warstaff')) return 'weapon_warstaff';
    if(wt === 'staff' || has('staff')) return 'weapon_staff';
    return 'weapon_melee';
  }
  if(slot === 'offhand'){
    if(has('focus') || (has('spell') && !has('shield')) || (has('es') && !has('shield'))) return 'offhand_focus';
    return 'offhand_shield';
  }
  if(slot === 'helm' || slot === 'chest' || slot === 'gloves' || slot === 'boots'){
    if(has('es') && !has('armor')) return 'armor_es';
    if(has('es') && has('spell') && !has('armor')) return 'armor_es';
    return 'armor_defense';
  }
  if(slot === 'ring') return 'ring';
  if(slot === 'belt') return 'belt';
  if(slot === 'flask') return 'flask';
  return 'misc';
}


const __WEAPON_OFFHAND_FAMILIES = new Set(['weapon_melee','weapon_wand','weapon_staff','weapon_warstaff','offhand_shield','offhand_focus']);
const __WEAPON_OFFHAND_POOLS = new Set(['melee_phys','element_flat','element_power','spell_power','spell_hybrid','warstaff_spell_hybrid','warstaff_elem_hybrid','melee_speed','melee_crit','spell_cast','spell_crit','crit_multi','melee_range','life_leech','melee_double','melee_cleave','staff_survival','shield_hybrid','focus_hybrid','spell_range','es_recharge','es_delay']);

function affixFamilyAllows(itemFamily, aff, opts){
  if(aff && aff.family != null){
    const fam = aff.family;
    if(Array.isArray(fam)) return fam.includes(itemFamily);
    if(fam instanceof Set) return fam.has(itemFamily);
    return String(fam) === String(itemFamily);
  }

  if(__WEAPON_OFFHAND_FAMILIES.has(itemFamily)) return false;

  const pool = inferAffixPool(aff, opts);
  const allowedByFamily = {
    weapon_melee:    new Set(['melee_phys','element_flat','melee_speed','melee_crit','crit_multi','melee_range','life_leech','melee_double','melee_cleave']),
    weapon_wand:     new Set(['spell_power','element_power','element_flat','spell_hybrid','spell_cast','spell_crit','crit_multi','spell_range','es_recharge']),
    weapon_staff:    new Set(['spell_power','element_power','spell_hybrid','spell_cast','spell_crit','crit_multi','spell_range','staff_survival']),
    weapon_warstaff: new Set(['spell_power','element_power','warstaff_spell_hybrid','melee_phys','element_flat','warstaff_elem_hybrid','spell_cast','spell_crit','crit_multi','spell_range','staff_survival','melee_crit','melee_speed']),
    offhand_shield:  new Set(['def_armor','life','resist','regen','shield_hybrid']),
    offhand_focus:   new Set(['def_es','spell_power','focus_hybrid','spell_cast','spell_crit','spell_range','es_recharge','es_delay','resist']),
    armor_defense:   new Set(['life','resist','regen','def_armor','move']),
    armor_es:        new Set(['life','resist','regen','def_es','move']),
    belt:            new Set(['life','resist','regen','def_armor','def_es','move']),
    flask:           new Set(['life','resist','regen','def_armor','def_es','move']),
    ring:            new Set(['life','resist','regen','def_armor','def_es','move']),
    misc:            new Set(['life','resist','regen','def_armor','def_es','move'])
  };
  const allow = allowedByFamily[itemFamily];
  if(!allow) return true;
  return allow.has(pool);
}

function inferAffixPool(aff, opts){
  if(!aff) return 'misc';

  const family = aff && aff.family != null ? aff.family : null;
  const famList = Array.isArray(family) ? family.map(v => String(v||'')) : [String(family||'')];
  const fam0 = famList[0] || '';
  const touchesWeaponOffhand = famList.some(f => __WEAPON_OFFHAND_FAMILIES.has(f));

  // 무기/오프핸드는 오직 affix.pool 명시값만 사용한다.
  if(touchesWeaponOffhand){
    const explicitPool = (aff.pool != null && aff.pool !== '') ? String(aff.pool) : '';
    return explicitPool || null;
  }

  if(aff.pool != null && aff.pool !== '') return aff.pool;
  if(aff._pool != null && aff._pool !== '') return aff._pool;

  const mods = Array.isArray(aff.mods) ? aff.mods : [];
  const stats = new Set(mods.map(m => String((m && m.stat) || '').toLowerCase()).filter(Boolean));
  let pool = 'misc';

  const hasAny = (...keys) => keys.some(k => stats.has(k));
  const resistStats = ['allresadd','fireresadd','coldresadd','lightresadd','chaosresadd'];

  if(hasAny('dmgmul','flatdamageadd')) pool = 'melee_phys';
  else if(hasAny('fireflat','coldflat','lightningflat')) pool = 'element_flat';
  else if(hasAny('firemul','coldmul','lightmul','chaosmul')) pool = 'element_power';
  else if(hasAny('spellmul')) pool = 'spell_power';
  else if(hasAny('armoradd','armormul')) pool = 'def_armor';
  else if(hasAny('esadd','esinc')) pool = 'def_es';
  else if(hasAny('atkspdmul')) pool = 'melee_speed';
  else if(hasAny('castspdmul')) pool = 'spell_cast';
  else if(hasAny('critmultiadd')) pool = 'crit_multi';
  else if(hasAny('spellrangemul')) pool = 'spell_range';
  else if(hasAny('rangemul')) pool = 'melee_range';
  else if(hasAny('lifeleech')) pool = 'life_leech';
  else if(hasAny('doublehitchance')) pool = 'melee_double';
  else if(hasAny('cleavechance')) pool = 'melee_cleave';
  else if(resistStats.some(k => stats.has(k))) pool = 'resist';
  else if(hasAny('maxhpadd')) pool = 'life';
  else if(hasAny('hpregen')) pool = 'regen';
  else if(hasAny('movespdmul')) pool = 'move';
  else if(hasAny('esrechargerate')) pool = 'es_recharge';
  else if(hasAny('esrechargedelayadd')) pool = 'es_delay';
  else if(hasAny('critchanceadd')){
    if(fam0 === 'weapon_wand' || fam0 === 'weapon_staff' || fam0 === 'weapon_warstaff' || fam0 === 'offhand_focus') pool = 'spell_crit';
    else pool = 'melee_crit';
  }

  aff._pool = pool;
  return pool;
}

function rollAffixesPOE(rarity, ilvl, itemTags, opts={}){
  rarity = normalizeRarity(rarity);
  opts.itemTags = itemTags;
  opts._itemFamily = getItemAffixFamily(itemTags, opts);
  if(rarity === "unique") return [];

  window.__AFFIX_ROLL_LOG = Array.isArray(window.__AFFIX_ROLL_LOG) ? window.__AFFIX_ROLL_LOG : [];

  const maxTot = maxAffixesForRarity(rarity);
  const maxPre = maxPrefixForRarity(rarity);
  const maxSuf = maxSuffixForRarity(rarity);

  let targetTot = (typeof opts.total === "number") ? Math.max(0, Math.min(maxTot, opts.total)) : maxTot;
  if(opts.total == null){
    if(rarity === "magic") targetTot = (Math.random() < 0.55 ? 1 : 2);
    else if(rarity === "rare") targetTot = (Math.random() < 0.55 ? 3 : 4);
    else if(rarity === "epic"){
      const r = Math.random();
      targetTot = (r < 0.40 ? 4 : (r < 0.75 ? 5 : 6));
    }else targetTot = 0;
  }

  const existing = Array.isArray(opts.existingAffixes) ? opts.existingAffixes : [];
  const keepExisting = !!opts.keepExisting;
  const addMode = !!opts.add;

  let picked = keepExisting ? existing.slice() : [];
  picked = clampAffixLimits(picked, rarity);
  const usedGroups = new Set(picked.map(a=>a && a.affix ? a.affix.group : "").filter(Boolean));

  function pushAffixRollLog(entry){
    window.__AFFIX_ROLL_LOG.push(entry);
    if(window.__AFFIX_ROLL_LOG.length > 200) window.__AFFIX_ROLL_LOG.splice(0, window.__AFFIX_ROLL_LOG.length - 200);
  }

  function eligiblePool(pool, poolName){
    return pool.filter(a => {
      if(!a) return false;
      if(usedGroups.has(a.group)) return false;
      if(!tagsPass(itemTags, a)) return false;
      if(Array.isArray(a.tiers) && a.tiers.length){
        const ok = a.tiers.some(t => t && (typeof t.minIlvl === "number" ? (ilvl >= t.minIlvl) : true));
        if(!ok) return false;
      }
      const fam = opts._itemFamily || getItemAffixFamily(itemTags, opts);
      if(__WEAPON_OFFHAND_FAMILIES.has(fam) && !a.family) return false;
      if(__WEAPON_OFFHAND_FAMILIES.has(fam) && (a.pool == null || a.pool === '')) return false;
      const p = inferAffixPool(a, opts);
      if(__WEAPON_OFFHAND_FAMILIES.has(fam) && !p) return false;
      if(__WEAPON_OFFHAND_POOLS.has(p) && !a.family) return false;
      if(!hardPoolAllowed(p, itemTags, opts)) return false;
      if(!affixFamilyAllows(fam, a, opts)) return false;
      if(poolName && p !== poolName) return false;
      return true;
    });
  }

  function pickOne(kind, pool){
    const fam = opts._itemFamily || getItemAffixFamily(itemTags, opts);
    const pw = poolWeightsForContext(kind, itemTags, opts);
    const eligible = eligiblePool(pool, null);
    const log = { family:fam, kind, eligibleCount:eligible.length, poolCounts:{}, desiredPool:null, desiredCount:0, weightedEligibleCount:0, selectedId:null, selectedPool:null, reason:null };
    for(const a of eligible){
      const p = inferAffixPool(a, opts);
      log.poolCounts[p] = (log.poolCounts[p] || 0) + 1;
    }
    if(!eligible.length){
      log.reason = 'no_eligible';
      pushAffixRollLog(log);
      return null;
    }

    const desiredPool = weightedPickFromMap(pw);
    log.desiredPool = desiredPool || null;
    if(desiredPool){
      const fromDesired = eligible.filter(a => inferAffixPool(a, opts) === desiredPool);
      log.desiredCount = fromDesired.length;
      if(fromDesired.length){
        const pickedAff = weightedPickAffix(fromDesired, opts);
        if(pickedAff){
          log.selectedId = pickedAff.id || null;
          log.selectedPool = inferAffixPool(pickedAff, opts);
          pushAffixRollLog(log);
          return pickedAff;
        }
      }
    }

    const weightedEligible = eligible.filter(a => (pw[inferAffixPool(a, opts)] || 0) > 0);
    log.weightedEligibleCount = weightedEligible.length;
    if(!weightedEligible.length){
      log.reason = 'no_weighted_eligible';
      pushAffixRollLog(log);
      return null;
    }

    const pickedAff = weightedPickAffix(weightedEligible, opts);
    if(!pickedAff){
      log.reason = 'weighted_pick_failed';
      pushAffixRollLog(log);
      return null;
    }
    log.selectedId = pickedAff.id || null;
    log.selectedPool = inferAffixPool(pickedAff, opts);
    pushAffixRollLog(log);
    return pickedAff;
  }

  let guard = 0;
  while(picked.length < targetTot && guard++ < 1200){
    const preCount = picked.filter(x=>x.kind==="prefix").length;
    const sufCount = picked.filter(x=>x.kind==="suffix").length;

    let kind = "prefix";
    if(preCount >= maxPre) kind = "suffix";
    else if(sufCount >= maxSuf) kind = "prefix";
    else kind = (Math.random() < 0.5 ? "prefix" : "suffix");

    const cand = (kind === "prefix") ? pickOne(kind, AFFIX_DB.prefix) : pickOne(kind, AFFIX_DB.suffix);
    if(!cand) break;
    if(usedGroups.has(cand.group)) continue;

    const rr = rollTierValue(cand, ilvl);
    if(!rr) continue;

    usedGroups.add(cand.group);
    picked.push({ kind, affix:cand, tier:rr.tier, value:rr.value });
  }

  if(addMode) picked = clampAffixLimits(picked, rarity);
  return picked;
}

function getBiasMul(map, key, group){
  const row = map && map[key];
  if(!row) return 1;
  const m = row[group];
  return (typeof m === "number" && isFinite(m)) ? m : 1;
}

function affixEffectiveWeight(affix, opts){
  const baseW = Math.max(0, (affix && affix.weight != null) ? affix.weight : 100);
  if(!affix) return 0;
  const group = affix.group || "";
  let mul = 1;

  const tmpl = opts && opts.tmpl ? opts.tmpl : null;
  const tags = opts && Array.isArray(opts.itemTags) ? opts.itemTags : null;

  // 슬롯 바이어스
  if(tmpl && tmpl.slot) mul *= getBiasMul(SLOT_MOD_BIAS, tmpl.slot, group);

  // 베이스 전용 바이어스
  if(tmpl && tmpl.modBias && typeof tmpl.modBias === "object"){
    const bm = tmpl.modBias[group];
    if(typeof bm === "number" && isFinite(bm)) mul *= bm;
  }

  // 태그 바이어스
  if(tags){
    for(const t of tags){
      mul *= getBiasMul(TAG_MOD_BIAS, t, group);
    }
  }

  // 과도한 왜곡 방지
  if(mul < 0.05) mul = 0.05;
  if(mul > 6.0) mul = 6.0;

  return baseW * mul;
}

function weightedPickAffix(list, opts){
  const arr = Array.isArray(list) ? list : [];
  if(!arr.length) return null;

  let sum = 0;
  const ws = new Array(arr.length);
  for(let i=0;i<arr.length;i++){
    const w = affixEffectiveWeight(arr[i], opts);
    ws[i] = w;
    sum += w;
  }
  if(!(sum > 0)) return arr[Math.floor(Math.random()*arr.length)] || null;

  let r = Math.random() * sum;
  for(let i=0;i<arr.length;i++){
    r -= ws[i];
    if(r <= 0) return arr[i];
  }
  return arr[arr.length-1] || null;
}

function weightedPickFromMap(obj){
  const entries = Object.entries(obj || {});
  let total = 0;
  for(const [,w] of entries) total += Math.max(0, w||0);
  if(total <= 0) return null;
  let r = Math.random() * total;
  for(const [k,w0] of entries){
    const w = Math.max(0, w0||0);
    r -= w;
    if(r <= 0) return k;
  }
  return entries[entries.length-1]?.[0] || null;
}

function pickSlotForMapTier(mapTier){
  const t = clampMapTier(mapTier);
  const row = SLOT_WEIGHT_TABLE[t] || SLOT_WEIGHT_TABLE[1];
  return weightedPickFromMap(row) || "weapon";
}

// 타입별 멀티플라이어(“멋/희소성” 느낌). 무기만 적용.
const WEAPON_TYPE_WEIGHT_MULT = {
  "1h_sword": 1.05,
  "1h_axe":   1.00,
  "1h_mace":  1.00,
  "2h_sword": 1.00,
  "2h_axe":   0.95,
  "2h_mace":  0.95,
  "staff":    0.90,
  "warstaff": 0.85
};

function inferWeaponType(base){
  const tags = base?.tags || [];
  if(tags.includes("2h_sword")) return "2h_sword";
  if(tags.includes("2h_axe")) return "2h_axe";
  if(tags.includes("2h_mace")) return "2h_mace";
  if(tags.includes("warstaff")) return "warstaff";
  if(tags.includes("staff")) return "staff";
  return null;
}

function getEligibleBasePoolBySlot(mapTier, slot){
  const t = clampMapTier(mapTier);
  return (ITEM_POOL || []).filter(b=>{
    if(!b) return false;
    if(slot && b.slot !== slot) return false;
    const bt = (b.baseTier ?? 1);
    if(bt > t) return false; // 티어 해금
    return true;
  });
}

function pickBaseForMapTier(mapTier, slot){
  const t = clampMapTier(mapTier);
  const wantTier = pickBaseTierForMap(t); // 이미 step3에서 정의됨
  // 1) 원하는 티어부터 아래로 내려오며 찾기
  for(let tier = wantTier; tier >= 1; tier--){
    const pool = getEligibleBasePoolBySlot(t, slot).filter(b => (b.baseTier ?? 1) === tier);
    if(!pool.length) continue;

    // 가중치 적용(무기는 타입 멀티플라이어 추가)
    const weights = pool.map(b=>{
      let w = (b.weight ?? 100);
      if(b.slot === "weapon"){
        const wt = inferWeaponType(b);
        const mult = wt ? (WEAPON_TYPE_WEIGHT_MULT[wt] ?? 1) : 1;
        w = w * mult;
      }
      return Math.max(1, w);
    });

    // 안전 가중치 픽
    let total = 0;
    for(const w of weights) total += w;
    let r = Math.random() * total;
    for(let i=0;i<pool.length;i++){
      r -= weights[i];
      if(r <= 0) return pool[i];
    }
    return pool[pool.length-1];
  }

  // 2) 최후 fallback: 아무거나
  const any = getEligibleBasePoolBySlot(t, slot);
  return any[0] || null;
}

// ✅ 맵 티어 ↔ 베이스 티어 해금(상한)

function getBaseTierDistribution(mt){
  const t = Math.max(1, Math.floor(mt || 1));
  if(BASE_TIER_DISTRIBUTION[t]) return BASE_TIER_DISTRIBUTION[t];
  // 10 이상은 10을 기준으로 더 고티어 편중
  return BASE_TIER_DISTRIBUTION[10];
}

function pickBaseTierForMap(mt){
  const dist = getBaseTierDistribution(mt);
  // 해금 상한 적용
  const maxTier = getMaxBaseTierForMap(mt);
  let total = 0;
  for(let i=0;i<dist.length;i++){
    const tier = i+1;
    if(tier > maxTier) continue;
    total += dist[i];
  }
  let r = Math.random() * total;
  for(let i=0;i<dist.length;i++){
    const tier = i+1;
    if(tier > maxTier) continue;
    r -= dist[i];
    if(r <= 0) return tier;
  }
  return Math.min(5, maxTier);
}

function tierCurveMultiplier(mt, baseTier){
  // dist 기반 multiplier: 0~1
  const dist = getBaseTierDistribution(mt);
  const idx = Math.max(0, Math.min(4, (baseTier||1)-1));
  return dist[idx] || 0;
}

function getMaxBaseTierForMap(t){
  // ✅ 맵 티어 ↔ 베이스 티어 연동 (대충 PoE 느낌)
  // T1~2 : tier1 / T3~4 : tier2 / T5~6 : tier3 / T7~8 : tier4 / T9+ : tier5
  if(t <= 2) return 1;
  if(t <= 4) return 2;
  if(t <= 6) return 3;
  if(t <= 8) return 4;
  return 5;
}

function getEligibleBasePool(mapTier){
  const mt = Math.max(1, (mapTier ?? getMapTier()));
  const pool = Array.isArray(ITEM_POOL) ? ITEM_POOL : [];
  const maxTier = getMaxBaseTierForMap(mt);

  return pool.filter(base=>{
    if(!base) return false;
    const baseTier = (base.baseTier ?? 1);
    if(baseTier < 1 || baseTier > 5) return false;
    if(baseTier > maxTier) return false;
    // minIlvl도 숫자 보정
    base.minIlvl = (base.minIlvl ?? 1);
    base.weight = (base.weight ?? 100);
    return true;
  });
}

function pickBaseTemplateUnique(pool, usedIds){
  // 가중치 드랍
  const picks = pool.filter(p => !usedIds.has(p.id));
  if(!picks.length) return null;
  const tmp = picks.map(p => ({
    ref:p,
    weight: Math.max(1, (p.weight ?? 50) * (1 + ((p.baseTier ?? 1)-1)*0.18))
  }));
  const chosen = weightedPick(tmp, "weight");
  return chosen ? chosen.ref : null;
}

function weightedPick(list, weightKey="weight"){
  let total = 0;
  for(const it of list) total += (it[weightKey] ?? 0);
  let r = Math.random() * total;
  for(const it of list){
    r -= (it[weightKey] ?? 0);
    if(r <= 0) return it;
  }
  return list[list.length - 1];
}

function rollTierValue(affix, ilvl){
  // PoE식: ilvl에 따라 사용 가능한 tier만 선택
  if(!affix) return null;

  const tiers = Array.isArray(affix.tiers) ? affix.tiers : null;
  if(!tiers || !tiers.length){
    // tiers가 없는 옛 affix는 단일 값으로 처리
    const v = (typeof affix.value === "number") ? affix.value : 0;
    return { tier: 1, value: v };
  }

  const avail = tiers.filter(t => t && typeof t.minIlvl === "number" ? (ilvl >= t.minIlvl) : true);
  if(!avail.length) return null;

  const picked = weightedPick(avail.map(t=>({ ...t, weight:(t.w ?? 1) })));
  if(!picked) return null;

  const isInt = Number.isInteger(picked.min) && Number.isInteger(picked.max);
  let v = picked.min + Math.random() * (picked.max - picked.min);
  if(isInt) v = Math.floor(v);
  else v = Math.round(v * 1000) / 1000;

  return { tier:picked.t ?? 1, value:v };
}
function maxAffixesForRarity(r){
  // PoE: normal=0, magic=2, rare=6, unique(유니크)=0(고정모드)
  r = normalizeRarity(r);
  if(r === "normal") return 0;
  if(r === "magic") return 2;
  if(r === "rare") return 6;
  if(r === "unique") return 0;
  return 0;
}
function maxPrefixForRarity(r){ r = normalizeRarity(r); return (r === "rare") ? 3 : (r === "magic" ? 1 : 0); }
function maxSuffixForRarity(r){ r = normalizeRarity(r); return (r === "rare") ? 3 : (r === "magic" ? 1 : 0); }

function tagsPass(itemTags, obj){
  const tags = Array.isArray(itemTags) ? itemTags : [];
  const all = (obj && obj.requiresAll) ? obj.requiresAll : [];
  const any = (obj && obj.requiresAny) ? obj.requiresAny : [];
  const forb = (obj && obj.forbids) ? obj.forbids : [];

  for(const t of forb){ if(tags.includes(t)) return false; }
  for(const t of all){ if(!tags.includes(t)) return false; }
  if(any.length){
    let ok = false;
    for(const t of any){ if(tags.includes(t)){ ok = true; break; } }
    if(!ok) return false;
  }
  return true;
}

function __findAffixDef(kind, affixId, group, name){
  const pools = [];
  if(kind === "prefix" || !kind) pools.push(["prefix", Array.isArray(AFFIX_DB && AFFIX_DB.prefix) ? AFFIX_DB.prefix : []]);
  if(kind === "suffix" || !kind) pools.push(["suffix", Array.isArray(AFFIX_DB && AFFIX_DB.suffix) ? AFFIX_DB.suffix : []]);
  const wantedId = affixId != null ? String(affixId) : "";
  const wantedGroup = group != null ? String(group) : "";
  const wantedName = name != null ? String(name) : "";
  for(const [resolvedKind, arr] of pools){
    for(const a of arr){
      if(!a) continue;
      if(wantedId && String(a.id || "") === wantedId) return { kind: resolvedKind, affix: a };
      if(wantedGroup && String(a.group || "") === wantedGroup) return { kind: resolvedKind, affix: a };
      if(wantedName && String(a.name || "") === wantedName) return { kind: resolvedKind, affix: a };
    }
  }
  return null;
}

function __normalizeAffixRollEntry(entry){
  if(!entry || typeof entry !== "object") return null;
  let kind = (entry.kind === "prefix" || entry.kind === "suffix") ? entry.kind : null;
  let affix = entry.affix || null;
  const meta = entry.meta && typeof entry.meta === "object" ? entry.meta : null;
  const rawId = entry.affixId || entry.id || (affix && affix.id) || (meta && meta.affixId) || "";
  const rawGroup = entry.group || (affix && affix.group) || (meta && meta.group) || "";
  const rawName = entry.name || (affix && affix.name) || (meta && meta.name) || "";

  if(!affix || !affix.group || !affix.id){
    const found = __findAffixDef(kind, rawId, rawGroup, rawName);
    if(found && found.affix){
      affix = found.affix;
      if(!kind) kind = found.kind;
    }
  }else if(!kind){
    const found = __findAffixDef(null, affix.id, affix.group, affix.name);
    if(found) kind = found.kind;
  }

  if(kind !== "prefix" && kind !== "suffix") return null;
  return { ...entry, kind, affix };
}

function clampAffixLimits(affixes, rarity){
  if(!Array.isArray(affixes)) return [];
  const maxPre = maxPrefixForRarity(rarity);
  const maxSuf = maxSuffixForRarity(rarity);
  const maxTot = maxAffixesForRarity(rarity);

  const normalized = affixes.map(__normalizeAffixRollEntry).filter(Boolean);
  const seen = new Set();
  const deduped = [];
  for(const a of normalized){
    const meta = a.meta && typeof a.meta === "object" ? a.meta : null;
    const key = String(
      (a.affix && a.affix.group) ||
      a.group ||
      (meta && meta.group) ||
      (a.affix && a.affix.id) ||
      a.affixId ||
      a.id ||
      `${a.kind}:${(a.affix && a.affix.name) || a.name || (meta && meta.name) || "unknown"}`
    );
    if(seen.has(key)) continue;
    seen.add(key);
    deduped.push(a);
  }

  const pre = deduped.filter(a=>a && a.kind==="prefix").slice(0, maxPre);
  const suf = deduped.filter(a=>a && a.kind==="suffix").slice(0, maxSuf);

  const out = [];
  out.push(...pre);
  out.push(...suf);
  return out.slice(0, maxTot);
}

function rerollValuesPOE(affixes, ilvl){
  if(!Array.isArray(affixes)) return [];
  affixes = clampAffixLimits(affixes, "epic");
  return affixes.map(r=>{
    if(!r || !r.affix) return r;
    const tiers = Array.isArray(r.affix.tiers) ? r.affix.tiers : [];
    const t = tiers.find(x => x && x.t === r.tier);
    if(!t) return r;
    const isInt = Number.isInteger(t.min) && Number.isInteger(t.max);
    let v = t.min + Math.random() * (t.max - t.min);
    if(isInt) v = Math.floor(v);
    else v = Math.round(v * 1000) / 1000;
    return { ...r, value:v };
  });
}

function mergeItemData(baseData, affixData){
  const out = makeEmptyItemData();
  const keys = new Set([
    ...Object.keys(out),
    ...Object.keys(baseData || {}),
    ...Object.keys(affixData || {})
  ]);
  for(const k of keys){
    const b = (baseData && baseData[k] != null) ? baseData[k] : out[k];
    const a = (affixData && affixData[k] != null) ? affixData[k] : out[k];
    if(k.endsWith('Mul')) out[k] = Number(b ?? 1) * Number(a ?? 1);
    else out[k] = Number(b ?? 0) + Number(a ?? 0);
  }
  return out;
}

function getItemTemplateById(id){
  const pool = Array.isArray(ITEM_POOL) ? ITEM_POOL : [];
  let t = pool.find(x => x.id === id);
  if(!t){
    // fallback: first weapon or first item
    t = pool.find(x => x.slot === "weapon") || pool[0] || null;
  }
  return t;
}

function buildBaseDataFromItemId(itemId){
  // ✅ PoE식: 베이스의 "기본 수치"는 템플릿에 정의된 고정값을 사용
  // - 접두/접미/암묵(implicit)은 별도 레이어에서 적용
  const base = makeEmptyItemData();
  const id = String(itemId||"");
  const tmpl = getItemTemplateById(id);

  if(!tmpl || !tmpl.baseData) return base;

  const bd = tmpl.baseData;

  // 기본 규칙:
  // - *Mul 계열(dmgMul/spdMul/rangeMul/elemDmgMul 등)은 곱
  // - 그 외 Add/Min/Max/Res 계열은 더함
  for(const k of Object.keys(bd)){
    const v = bd[k];
    if(v == null) continue;
    if(k.endsWith("Mul")){
      base[k] = (base[k] ?? 1) * v;
    } else {
      base[k] = (base[k] ?? 0) + v;
    }
  }
  return base;
}
