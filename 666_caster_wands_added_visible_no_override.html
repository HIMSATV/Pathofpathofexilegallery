/* ✅ 엘리트 원소 비주얼 + 부츠 슬롯 패치 */
/* - 엘리트에 화염/냉기/번개 속성 부여
   - 해당 속성 파티클/오라 표시
   - 장비창 부츠 슬롯 표시 및 장착/스탯 반영
/* ============================= */
(function(){
  if(window.__ELITE_ELEMENT_BOOTS_PATCH__) return;
  window.__ELITE_ELEMENT_BOOTS_PATCH__ = true;

  // ---------- 1) 부츠 슬롯 보강 ----------
  try{
    if(typeof equipment === "object" && equipment && !("boots" in equipment)){
      equipment.boots = null;
    }
  }catch(_){}

  if(typeof slotLabel === "function"){
    const __origSlotLabel = slotLabel;
    slotLabel = function(slot){
      if(slot === "boots") return "장화";
      return __origSlotLabel(slot);
    };
  }

  // 부츠 스탯을 gear에 반영
  if(typeof rebuildGearFromEquipment === "function"){
    const __origRebuildGearFromEquipment = rebuildGearFromEquipment;
    rebuildGearFromEquipment = function(){
      __origRebuildGearFromEquipment();
      try{
        const it = equipment && equipment.boots;
        if(!it || it.isUnique) return;
        const d = it.totalData || it.data;
        if(!d) return;

        if(!player.gear) player.gear = {};
        for(const k in d){
          const v = d[k];
          if(typeof v !== "number") continue;
          if(k.endsWith("Mul")){
            player.gear[k] = (player.gear[k] ?? 1) * v;
          }else{
            player.gear[k] = (player.gear[k] ?? 0) + v;
          }
        }
        if(typeof recalcFromGear === "function"){
          recalcFromGear();
          player.hp = Math.min(player.hp, player.maxHp);
        }
      }catch(err){
        console.warn("boots rebuild patch failed", err);
      }
    };
  }

  // 부츠 아이콘 추가
  if(typeof drawItemIcon === "function"){
    const __origDrawItemIcon = drawItemIcon;
    drawItemIcon = function(c, it){
      if(it && it.slot === "boots"){
        const g = c.getContext("2d");
        const W = c.width, H = c.height;
        g.clearRect(0,0,W,H);
        g.save();
        g.globalAlpha = 1;
        g.fillStyle = "rgba(0,0,0,0.15)";
        g.fillRect(0,0,W,H);

        const rr = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
        g.lineWidth = 3;
        if(rr==="unique") g.strokeStyle = "#ffb86b";
        else if(rr==="rare") g.strokeStyle = "#ffd166";
        else if(rr==="magic") g.strokeStyle = "#2f7bff";
        else g.strokeStyle = "#ffffff";
        const pad = 4;
        g.strokeRect(pad, pad, W - pad*2, H - pad*2);

        g.translate(W/2, H/2);
        g.globalAlpha = 0.98;
        g.fillStyle = "#d8d8d8";
        g.strokeStyle = "#8a8a8a";
        g.lineWidth = 2;

        // 장화 실루엣
        g.beginPath();
        g.moveTo(-10,-10);
        g.lineTo(0,-10);
        g.lineTo(0,0);
        g.lineTo(11,0);
        g.lineTo(11,8);
        g.lineTo(-8,8);
        g.lineTo(-10,4);
        g.closePath();
        g.fill();
        g.stroke();

        g.beginPath();
        g.moveTo(-8,-14);
        g.lineTo(0,-14);
        g.lineTo(0,-6);
        g.lineTo(-8,-6);
        g.closePath();
        g.fill();
        g.stroke();

        g.restore();
        return;
      }
      return __origDrawItemIcon(c, it);
    };
  }

  // 장비창에 부츠 슬롯 표시
  if(typeof renderEquipPanel === "function"){
    const __origRenderEquipPanel = renderEquipPanel;
    renderEquipPanel = function(){
      equipSlotsEl.innerHTML = "";

      const SLOT_ORDER = ["weapon","helm","chest","boots","ring"];

      for(const slot of SLOT_ORDER){
        const it = equipment[slot];

        const d = document.createElement("div");
        d.className = "eSlotSmall";
        d.dataset.slot = slot;
        if(it) d.classList.add(rarityClass(it));
        if(selectedItem && selectedItem.from==="equip" && selectedItem.slot===slot) d.classList.add("selected");

        const c = document.createElement("canvas");
        c.width = 44; c.height = 44;
        d.appendChild(c);
        drawItemIcon(c, it);

        d.addEventListener("click", ()=>{
          if(selectedItem && selectedItem.from==="bag"){
            equipFromBagToSlot(selectedItem.idx, slot);
            selectedItem = {from:"equip", slot};
            renderAllPanels();
            return;
          }

          if(!selectedItem || selectedItem.from!=="equip" || selectedItem.slot!==slot){
            selectedItem = {from:"equip", slot};
          }else{
            selectedItem = null;
          }
          renderAllPanels();
        });

        equipSlotsEl.appendChild(d);
      }

      specTextEl.textContent = buildExtendedSpecText();

      const itSel = (selectedItem && selectedItem.from==="equip") ? getSelectedItem() : null;
      equipInfoEl.innerHTML = itSel ? prettyItemHTML(itSel) : "";
    };
  }

  // ---------- 2) 엘리트 원소 속성 ----------
  function __ensureEliteElement(e){
    if(!e || !e.isElite) return;
    if(e.eliteElement) return;

    const r = Math.random();
    e.eliteElement = r < 0.34 ? "fire" : (r < 0.67 ? "cold" : "lightning");
    if(typeof mergeTags === "function"){
      e.tags = mergeTags(e.tags || [], [e.eliteElement, "elemental_elite"]);
    }else{
      e.tags = (e.tags || []);
      if(!e.tags.includes(e.eliteElement)) e.tags.push(e.eliteElement);
    }

    // 기존 eliteColor도 원소에 맞춤
    if(e.eliteElement === "fire") e.eliteColor = "red";
    else if(e.eliteElement === "cold") e.eliteColor = "blue";
    else e.eliteColor = "yellow";
  }

  if(typeof spawnEnemyAt === "function"){
    const __origSpawnEnemyAt = spawnEnemyAt;
    spawnEnemyAt = function(ex, ey, pack){
      const before = Array.isArray(enemies) ? enemies.length : 0;
      const out = __origSpawnEnemyAt(ex, ey, pack);
      try{
        if(Array.isArray(enemies) && enemies.length > before){
          const e = enemies[enemies.length - 1];
          if(e && e.isElite) __ensureEliteElement(e);
        }
      }catch(err){
        console.warn("elite element spawn patch failed", err);
      }
      return out;
    };
  }

  // ---------- 3) 엘리트 원소 비주얼 ----------
  function __drawEliteElementVfx(sx, sy, e){
    if(!e || !e.isElite) return;
    __ensureEliteElement(e);

    ctx.save();

    const t = (typeof frameCount === "number" ? frameCount : 0);

    if(e.eliteElement === "fire"){
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = "rgba(255,80,30,0.40)";
      ctx.beginPath();
      ctx.arc(sx, sy - 18, 18, 0, Math.PI*2);
      ctx.fill();

      for(let i=0;i<3;i++){
        const ox = Math.sin(t*0.12 + i*2.1) * 7;
        const oy = Math.cos(t*0.10 + i*1.7) * 5;
        ctx.globalAlpha = 0.78;
        ctx.fillStyle = i===0 ? "#ffb14a" : "#ff5a1f";
        ctx.beginPath();
        ctx.arc(sx + ox, sy - 26 + oy, 2.2 + i*0.5, 0, Math.PI*2);
        ctx.fill();
      }
    }
    else if(e.eliteElement === "cold"){
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = "rgba(90,170,255,0.38)";
      ctx.beginPath();
      ctx.arc(sx, sy - 18, 18, 0, Math.PI*2);
      ctx.fill();

      ctx.globalAlpha = 0.85;
      ctx.strokeStyle = "#8fd3ff";
      ctx.lineWidth = 1.8;
      for(let i=0;i<3;i++){
        const ox = Math.sin(t*0.10 + i*2.4) * 8;
        const oy = Math.cos(t*0.08 + i*1.9) * 4;
        ctx.beginPath();
        ctx.moveTo(sx + ox - 3, sy - 24 + oy);
        ctx.lineTo(sx + ox + 3, sy - 24 + oy);
        ctx.moveTo(sx + ox, sy - 27 + oy);
        ctx.lineTo(sx + ox, sy - 21 + oy);
        ctx.stroke();
      }
    }
    else if(e.eliteElement === "lightning"){
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = "rgba(255,220,60,0.35)";
      ctx.beginPath();
      ctx.arc(sx, sy - 18, 18, 0, Math.PI*2);
      ctx.fill();

      ctx.globalAlpha = 0.90;
      ctx.strokeStyle = "#ffd84a";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx - 7, sy - 31);
      ctx.lineTo(sx - 1, sy - 22);
      ctx.lineTo(sx - 4, sy - 22);
      ctx.lineTo(sx + 5, sy - 10);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(sx + 6, sy - 28);
      ctx.lineTo(sx + 1, sy - 20);
      ctx.lineTo(sx + 4, sy - 20);
      ctx.lineTo(sx - 3, sy - 11);
      ctx.stroke();
    }

    ctx.restore();
  }

  if(typeof drawIsoEnemySprite === "function"){
    const __origDrawIsoEnemySprite = drawIsoEnemySprite;
    drawIsoEnemySprite = function(sx, sy, e){
      __origDrawIsoEnemySprite(sx, sy, e);
      try{
        __drawEliteElementVfx(sx, sy, e);
      }catch(err){}
    };
  }

  // 적이 이미 존재하는 경우도 보강
  try{
    if(Array.isArray(enemies)){
      for(const e of enemies){
        if(e && e.isElite) __ensureEliteElement(e);
      }
    }
  }catch(_){}

})();

  function currentItem(){

    catch(_){ return null; }
  }

  function closePopup(){
    if(overlay) overlay.style.display = "none";
  }

  function openPopup(){
    const it = currentItem();
    if(!it || !overlay || !infoBox) return;
    infoBox.innerHTML = prettyItemHTML(it);
    if(selectedItem && selectedItem.from === "bag"){
      btnAction.textContent = "장착";
      btnAction.disabled = !!(it.isUnique || !it.slot);
    }else if(selectedItem && selectedItem.from === "equip"){
      btnAction.textContent = "해제";
      btnAction.disabled = false;
    }else{
      btnAction.textContent = "장착";
      btnAction.disabled = true;
    }
    overlay.style.display = "flex";
  }

  function tap(el, fn){
    if(!el) return;
    el.style.pointerEvents = "auto";
    el.style.touchAction = "manipulation";
    el.onclick = function(e){
      try{ if(typeof stopEvt === "function") stopEvt(e); }catch(_){}
      fn();
      return false;
    };
  }

  tap(btnClose, closePopup);

  tap(btnCraft, function(){
    if(!selectedItem) return;
    closePopup();
    if(typeof openPanel === "function") openPanel("craft");
    try{
      if(typeof updateCraftSelectedFromEquipOrBag === "function") updateCraftSelectedFromEquipOrBag();
      if(typeof renderAllPanels === "function") renderAllPanels();
    }catch(_){}
  });

  tap(btnAction, function(){
    if(!selectedItem) return;

    if(selectedItem.from === "bag"){
      const it = inventory[selectedItem.idx];
      if(!it || !it.slot || it.isUnique) return;
      if(typeof equipFromBagToSlot === "function") equipFromBagToSlot(selectedItem.idx, it.slot);
      selectedItem = {from:"equip", slot: it.slot};
      if(typeof openPanel === "function") openPanel("equip");
      if(typeof renderAllPanels === "function") renderAllPanels();
      openPopup();
      return;
    }

    if(selectedItem.from === "equip"){
      const slot = selectedItem.slot;
      if(typeof unequipSlotToBag === "function") unequipSlotToBag(slot);
      selectedItem = null;
      closePopup();
      if(typeof openPanel === "function") openPanel("bag");
      if(typeof renderAllPanels === "function") renderAllPanels();
    }
  });

  if(overlay){
    overlay.onclick = function(e){
      if(e.target === overlay){
        try{ if(typeof stopEvt === "function") stopEvt(e); }catch(_){}
        closePopup();
      }
    };
  }

  renderEquipPanel = function(){
    hideLegacyUI();
    if(typeof equipment === "object" && equipment){
      if(!("offhand" in equipment)) equipment.offhand = null;
      if(!("gloves" in equipment)) equipment.gloves = null;
      if(!("belt" in equipment)) equipment.belt = null;
      if(!("flask1" in equipment)) equipment.flask1 = null;
      if(!("flask2" in equipment)) equipment.flask2 = null;
    }

    const SLOT_ORDER = ["weapon","offhand","helm","amulet","chest","gloves","boots","belt","ring","ring2","flask1","flask2"];

      const d = document.createElement("div");
      d.className = "eSlotSmall";
      d.dataset.slot = slot;
      d.title = (typeof slotLabel === "function") ? slotLabel(slot) : slot;

      const c = document.createElement("canvas");
      c.width = 44; c.height = 44;
      d.appendChild(c);
      drawItemIcon(c, it);

      d.onclick = function(e){
        try{ if(typeof stopEvt === "function") stopEvt(e); }catch(_){}
        if(selectedItem && selectedItem.from === "bag"){
          if(typeof equipFromBagToSlot === "function") equipFromBagToSlot(selectedItem.idx, slot);
          selectedItem = {from:"equip", slot:slot};
          if(typeof renderAllPanels === "function") renderAllPanels();
          return false;
        }
        if(!it){
          selectedItem = {from:"equip", slot:slot};
          closePopup();
          if(typeof renderAllPanels === "function") renderAllPanels();
          return false;
        }
        if(!selectedItem || selectedItem.from!=="equip" || selectedItem.slot!==slot){
          selectedItem = {from:"equip", slot:slot};
          openPopup();
        }else{
          selectedItem = null;
          closePopup();
        }
        if(typeof renderAllPanels === "function") renderAllPanels();
        return false;
      };

      equipSlotsEl.appendChild(d);
    }

    specTextEl.textContent = buildExtendedSpecText();
    const itSel = (selectedItem && selectedItem.from==="equip") ? getSelectedItem() : null;
    equipInfoEl.innerHTML = itSel ? prettyItemHTML(itSel) : "";
  };

  renderBagPanel = function(){
    hideLegacyUI();
    bagGridEl.innerHTML = "";

    const minSlots = 24;
    const fillTo = Math.max(minSlots, Math.ceil((inventory.length)/6)*6);

    for(let i=0;i<fillTo;i++){
      const it = inventory[i] || null;

      const cell = document.createElement("div");
      cell.className = "bItem";
      if(it) cell.classList.add(rarityClass(it));
      if(it && it.isUnique) cell.classList.add("unique");
      if(!it) cell.style.opacity = "0.35";

      const c = document.createElement("canvas");
      c.width = 40; c.height = 40;
      c.className = "iconCanvas";
      c.style.display = "block";
      c.style.background = "rgba(255,255,255,0.06)";
      c.style.pointerEvents = "none";
      cell.appendChild(c);
      drawItemIcon(c, it);

      cell.onclick = function(e){
        try{ if(typeof stopEvt === "function") stopEvt(e); }catch(_){}
        if(!it){
          selectedItem = null;
          closePopup();
          return false;
        }
        selectedItem = {from:"bag", idx:i};
        openPopup();
        return false;
      };

      bagGridEl.appendChild(cell);
    }
  };

  if(typeof openPanel === "function"){
    const oldOpen = openPanel;
    openPanel = function(which){
      closePopup();
      const r = oldOpen(which);
      hideLegacyUI();
      return r;
    };
  }
  if(typeof closePanels === "function"){
    const oldClose = closePanels;
    closePanels = function(){
      closePopup();
      return oldClose();
    };
  }

  function ensureAudioReady(){
    try{
      if(!audioCtx && typeof ensureAudioCtx === "function") ensureAudioCtx();
      if(audioCtx && audioCtx.resume) audioCtx.resume();
    }catch(_){}
    return !!audioCtx;
  }
  ["swingSound","bossUnsheatheSound","thudSound","hitSound"].forEach(function(name){
    try{
      if(typeof window[name] === "function"){
        const oldFn = window[name];
        window[name] = function(){
          if(!ensureAudioReady()) return;
          return oldFn.apply(this, arguments);
        };
      }
    }catch(_){}
  });

  hideLegacyUI();
  if(typeof renderAllPanels === "function") renderAllPanels();
});

<script>
(function(){
  if(window.__RUNE_MEDAL_ORB_PATCH__) return;
  window.__RUNE_MEDAL_ORB_PATCH__ = true;

  const ORBS = [
    { id:"orbTransmute", key:"transmuteOrbs", label:"진화", style:"blue" },
    { id:"orbAlter", key:"alterationOrbs", label:"변화", style:"blue" },
    { id:"orbAug", key:"augmentationOrbs", label:"확장", style:"blue" },
    { id:"orbRegal", key:"regalOrbs", label:"제왕", style:"split-blue-gold" },
    { id:"orbAlchemy", key:"alchemyOrbs", label:"연금", style:"split-silver-gold" },
    { id:"chaosBtn", key:"chaosOrbs", label:"카오스", style:"gold" },
    { id:"orbScour", key:"scouringOrbs", label:"정제", style:"white" },
    { id:"orbExalt", key:"exaltedOrbs", label:"엑잘", style:"gold" },
    { id:"orbAnnul", key:"annulOrbs", label:"소멸", style:"deepblue" },
    { id:"orbDivine", key:"divineOrbs", label:"신성", style:"gold" },
    { id:"orbCorrupt", key:"corruptOrbs", label:"타락", style:"red" }
  ];

  function getCount(varName){
    try{
      switch(varName){
        case "transmuteOrbs":   return (typeof transmuteOrbs   === "number") ? transmuteOrbs   : 0;
        case "alterationOrbs":  return (typeof alterationOrbs  === "number") ? alterationOrbs  : 0;
        case "augmentationOrbs":return (typeof augmentationOrbs=== "number") ? augmentationOrbs: 0;
        case "regalOrbs":       return (typeof regalOrbs       === "number") ? regalOrbs       : 0;
        case "alchemyOrbs":     return (typeof alchemyOrbs     === "number") ? alchemyOrbs     : 0;
        case "chaosOrbs":       return (typeof chaosOrbs       === "number") ? chaosOrbs       : 0;
        case "scouringOrbs":    return (typeof scouringOrbs    === "number") ? scouringOrbs    : 0;
        case "exaltedOrbs":     return (typeof exaltedOrbs     === "number") ? exaltedOrbs     : 0;
        case "annulOrbs":       return (typeof annulOrbs       === "number") ? annulOrbs       : 0;
        case "divineOrbs":      return (typeof divineOrbs      === "number") ? divineOrbs      : 0;
        case "corruptOrbs":     return (typeof corruptOrbs     === "number") ? corruptOrbs     : 0;
        default: return 0;
      }
    }catch(_){
      return 0;
    }
  }

  function applySkin(){
    const counts = document.getElementById("orbCounts");
    if(counts){
      counts.innerHTML = "";
      counts.style.display = "none";
    }

    for(const o of ORBS){
      const el = document.getElementById(o.id);
      if(!el) continue;

      const count = getCount(o.key);

      const oldSkin = el.querySelector(".orbMedalSkin");
      if(oldSkin) oldSkin.remove();

      el.className = (el.className || "")
        .replace(/\bstyle-[\w-]+\b/g, "")
        .replace(/\bisZero\b/g, "")
        .trim();
      el.classList.add("style-" + o.style);
      if(count <= 0) el.classList.add("isZero");

      el.textContent = "";

      const skin = document.createElement("div");
      skin.className = "orbMedalSkin";
      skin.innerHTML = `
        <div class="orbCountBadge">${count}</div>
        <div class="orbRibbon"></div>
        <div class="orbMedal"></div>
        <div class="orbLabel">${o.label}</div>
      `;
      el.appendChild(skin);
      el.title = o.label;
      el.setAttribute("aria-label", o.label + " " + count);
    }
  }

  if(typeof renderCraftPanel === "function"){
    const oldRenderCraftPanel = renderCraftPanel;
    renderCraftPanel = function(){
      oldRenderCraftPanel();
      applySkin();
    };
  }

  if(typeof renderAllPanels === "function"){
    const oldRenderAllPanels = renderAllPanels;
    renderAllPanels = function(){
      oldRenderAllPanels();
      applySkin();
    };
  }

  const boot = ()=>{ try{ applySkin(); }catch(_){} };
  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot, { once:true });
  setTimeout(boot, 0);
  setTimeout(boot, 120);
})();

<script>
(function(){
  if(window.__SUPPORT_GEM_RUNTIME_PATCH__) return;
  window.__SUPPORT_GEM_RUNTIME_PATCH__ = true;

  function num(v, d){ v = Number(v); return Number.isFinite(v) ? v : (d||0); }
  function avgWeaponDamage(){
    if(typeof getCombatWeaponDisplayStats === "function"){
      const w = getCombatWeaponDisplayStats();
      return (num(w.min,2) + num(w.max,4)) * 0.5;
    }
    return 3;
  }
  function ensureChargeState(){
    if(!player) return;
    const st = (typeof getChargeState === 'function')
      ? getChargeState()
      : (player.chargeState || (player.chargeState = { frenzy:0, frenzyMax:5, frenzyLastGainFrame:0, endurance:0, enduranceMax:5, enduranceLastGainFrame:0, enduranceLastHitFrame:0 }));
    if(typeof st.frenzy !== 'number') st.frenzy = 0;
    if(typeof st.frenzyMax !== 'number') st.frenzyMax = 5;
    if(typeof st.endurance !== 'number') st.endurance = 0;
    if(typeof st.enduranceMax !== 'number') st.enduranceMax = 5;
    if(typeof st.frenzyLastGainFrame !== 'number') st.frenzyLastGainFrame = 0;
    if(typeof st.enduranceLastGainFrame !== 'number') st.enduranceLastGainFrame = 0;
    if(typeof st.enduranceLastHitFrame !== 'number') st.enduranceLastHitFrame = 0;

    // legacy aliases kept in sync for older UI/patch code
    player.frenzyCharges = st.frenzy;
    player.frenzyChargeMax = st.frenzyMax;
    player.frenzyLastGainFrame = st.frenzyLastGainFrame;
    player.enduranceCharges = st.endurance;
    player.enduranceChargeMax = st.enduranceMax;
    player.enduranceLastGainFrame = st.enduranceLastGainFrame;
    player.enduranceLastHitFrame = st.enduranceLastHitFrame;
    return st;
  }
  ensureChargeState();

  function getLinkedSpellId(){
    const links = player && player.skillLinks ? player.skillLinks : null;
    const supports = links && Array.isArray(links.supports) ? links.supports : [];
    for(const sid of supports){
      const sk = window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[sid];
      if(sk && sk.source === 'spell') return sid;
    }
    return null;
  }

  function getApplicableSupportsForSkill(skill){
    const links = player && player.skillLinks ? player.skillLinks : null;
    const supports = links && Array.isArray(links.supports) ? links.supports : [];
    const out = [];
    for(const sid of supports){
      const def = window.__getSupportGem && window.__getSupportGem(sid);
      if(def && (!window.__supportAppliesToSkill || window.__supportAppliesToSkill(sid, skill))) out.push(def);
    }
    return out;
  }
  window.getApplicableSupportsForSkill = getApplicableSupportsForSkill;

  function hasSupport(list, id){ return Array.isArray(list) && list.some(v => v && v.id === id); }

  function applyCommonSupportOnHit(skill, dealt){
    if(!player || !skill) return;
    dealt = num(dealt, 0);
    if(!(dealt > 0)) return;

    try{
      const enemy = window.__lastHitEnemyForCommonSupport || null;
      if(enemy) applyEquippedWeaponHitEffects(skill, enemy, dealt);
    }catch(_){}
    const supports = getApplicableSupportsForSkill(skill) || [];

    if(hasSupport(supports, 'lifeLeechSupport') || hasSupport(supports, 'maxLifeSupport') || hasSupport(supports, 'maxLifePercentSupport')){
      player.hp = Math.min(player.maxHp || player.hp || 0, (player.hp || 0) + dealt * 0.08);
    }

    const weapon = (typeof equipment !== 'undefined' && equipment) ? equipment.weapon : null;
    const frenzyChanceFromWeapon = Number(weapon && weapon.frenzyChargeOnHitChance || 0);
    const frenzyGainRoll = Math.max(0, frenzyChanceFromWeapon) + (hasSupport(supports, 'frenzyChargeOnHitSupport') ? 0.20 : 0);
    if(frenzyGainRoll > 0 && Math.random() < Math.min(1, frenzyGainRoll)){
      ensureChargeState();
      const cs = player.chargeState || getChargeState();
      cs.frenzyMax = Math.max(cs.frenzyMax || 5, 5);
      cs.frenzy = Math.min(cs.frenzyMax || 5, (cs.frenzy || 0) + 1);
      cs.frenzyLastGainFrame = (typeof frameCount === 'number') ? frameCount : 0;
      player.frenzyCharges = cs.frenzy;
      player.frenzyChargeMax = cs.frenzyMax;
      player.frenzyLastGainFrame = cs.frenzyLastGainFrame;
    }

    if(hasSupport(supports, 'enduranceChargeOnHitSupport') && Math.random() < 0.25){
      ensureChargeState();
      const cs = player.chargeState || getChargeState();
      cs.enduranceMax = Math.max(cs.enduranceMax || 5, 5);
      cs.endurance = Math.min(cs.enduranceMax || 5, (cs.endurance || 0) + 1);
      cs.enduranceLastGainFrame = (typeof frameCount === 'number') ? frameCount : 0;
      cs.enduranceLastHitFrame = cs.enduranceLastGainFrame;
      player.enduranceCharges = cs.endurance;
      player.enduranceChargeMax = cs.enduranceMax;
      player.enduranceLastGainFrame = cs.enduranceLastGainFrame;
      player.enduranceLastHitFrame = cs.enduranceLastHitFrame;
    }
  }
  window.applyCommonSupportOnHit = applyCommonSupportOnHit;

  function getModifiedSkill(skill){
    if(!skill) return skill;
    ensureChargeState();
    const mod = Object.assign({}, skill);
    const supports = getApplicableSupportsForSkill(skill);
    const gemLv = getGemEffectiveLevel(skill.id);
    const gemDmgMul = getActiveGemDamageMultiplier(gemLv);
    mod.__gemNaturalLevel = getGemNaturalLevel(skill.id);
    mod.__gemEffectiveLevel = gemLv;
    mod.__gemDamageMultiplier = gemDmgMul;
    if(Array.isArray(skill.comboStages)){
      mod.comboStages = skill.comboStages.map(stage => Object.assign({}, stage, {
        damageMul: num(stage && stage.damageMul, 1) * gemDmgMul
      }));
    }else{
      mod.baseMul = num(mod.baseMul, 1) * gemDmgMul;
    }
    if(skill.id === 'moltenStrike'){
      mod.projectileCount = getMoltenStrikeProjectileCount(gemLv);
    }
    const frenzy = Math.max(0, num(player && player.chargeState && player.chargeState.frenzy, 0));
    if(frenzy > 0){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) / (1 + frenzy * 0.05);
      if(!Array.isArray(mod.comboStages)) mod.baseMul = num(mod.baseMul, 1) * (1 + frenzy * 0.04);
      else mod.comboStages = mod.comboStages.map(stage => Object.assign({}, stage, { damageMul: num(stage && stage.damageMul, 1) * (1 + frenzy * 0.04) }));
    }
    if(hasSupport(supports, 'meleePhysicalDamageSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 1.18;
    }
    if(hasSupport(supports, 'increasedAreaMeleeSupport')){
      if(mod.radius) mod.radius = Math.round(num(mod.radius, 0) * 1.35);
      if(mod.angleDeg) mod.angleDeg = Math.round(num(mod.angleDeg, 0) * 1.15);
      if(mod.splashRadius) mod.splashRadius = Math.round(num(mod.splashRadius, 0) * 1.25);
      if(mod.explodeRadius) mod.explodeRadius = Math.round(num(mod.explodeRadius, 0) * 1.18);
    }
    if(hasSupport(supports, 'fasterAttacksSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 0.82;
    }
    if(hasSupport(supports, 'fasterCastingSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 0.82;
    }
    if(hasSupport(supports, 'greaterMultipleProjectilesSupport')){
      mod.projectileCount = num(mod.projectileCount, 1) + 4;
      if(mod.projectileSpreadDeg) mod.projectileSpreadDeg = num(mod.projectileSpreadDeg, 0) + 18;
    }
    
    const __spellRangeMul = Math.max(0.6, player.spellRangeMul || 1);
    const __meleeRangeMul = Math.max(0.6, player.passiveRangeMul || 1);
    const __tags = Array.isArray(mod.tags) ? mod.tags : [];
    const __isSpellNode = mod.source === 'spell' || __tags.includes('spell');
    const __isMeleeNode = __tags.includes('melee');
    if(__isSpellNode){
      if(mod.radius) mod.radius = Math.round(num(mod.radius, 0) * __spellRangeMul);
      if(mod.explodeRadius) mod.explodeRadius = Math.round(num(mod.explodeRadius, 0) * __spellRangeMul);
      if(mod.impactRadius) mod.impactRadius = Math.round(num(mod.impactRadius, 0) * __spellRangeMul);
      if(mod.beamLength) mod.beamLength = Math.round(num(mod.beamLength, 0) * __spellRangeMul);
      if(mod.beamWidth) mod.beamWidth = Math.round(num(mod.beamWidth, 0) * __spellRangeMul);
      if(mod.splashRadius) mod.splashRadius = Math.round(num(mod.splashRadius, 0) * __spellRangeMul);
    }
    if(__isMeleeNode){
      if(mod.radius) mod.radius = Math.round(num(mod.radius, 0) * __meleeRangeMul);
      if(mod.angleDeg) mod.angleDeg = Math.round(num(mod.angleDeg, 0) * (1 + ((player.passiveRangeMul || 1) - 1) * 0.55));
      if(mod.splashRadius) mod.splashRadius = Math.round(num(mod.splashRadius, 0) * __meleeRangeMul);
    }

    return mod;
  }
  window.getModifiedActiveSkill = getModifiedSkill;

  const oldCritChance = typeof window.getCritChance === 'function' ? window.getCritChance : null;
  if(oldCritChance){
    window.getCritChance = function(){
      let out = oldCritChance.apply(this, arguments);
      const act = window.__supportActionState;
      if(act && Array.isArray(act.supports)){
        if(hasSupport(act.supports, 'increasedCriticalStrikesSupport')) out += 0.12;
        if(hasSupport(act.supports, 'controlledDestructionSupport')) out *= 0.20;
      }
      return Math.max(0, out);
    };
  }
  const oldCritMulti = typeof window.getCritMulti === 'function' ? window.getCritMulti : null;
  if(oldCritMulti){
    window.getCritMulti = function(){
      let out = oldCritMulti.apply(this, arguments);
      const act = window.__supportActionState;
      if(act && Array.isArray(act.supports) && hasSupport(act.supports, 'increasedCriticalDamageSupport')) out += scaleSupportAdditiveValue(0.60, getGemEffectiveLevel('increasedCriticalDamageSupport'));
      return out;
    };
  }

  const oldPlayerTaken = typeof window.applyPlayerTakenDamageMods === 'function' ? window.applyPlayerTakenDamageMods : null;
  if(oldPlayerTaken){
    window.applyPlayerTakenDamageMods = function(incoming, ctx){
      let out = oldPlayerTaken.call(this, incoming, ctx);
      ensureChargeState();
      const endurance = Math.max(0, num(player && player.chargeState && player.chargeState.endurance, 0));
      if(endurance > 0) out *= Math.max(0.4, 1 - endurance * 0.04);
      return out;
    };
  }

  const oldCompute = window.computeFinalDamage;
  if(typeof oldCompute === 'function'){
    window.computeFinalDamage = function(base, ctx, opt){
      const res = oldCompute.call(this, base, ctx, opt);
      const act = window.__supportActionState;
      if(!act || !ctx) return res;
      const supports = act.supports || [];
      const enemy = ctx.enemy;
      let pkt = makeDamagePacket(
        res.afterOutgoingPacket?.phys||0,
        res.afterOutgoingPacket?.fire||0,
        res.afterOutgoingPacket?.cold||0,
        res.afterOutgoingPacket?.lightning||0,
        res.afterOutgoingPacket?.chaos||0
      );
      const skill = act.skill || null;
      const tags = Array.isArray(ctx.tags) ? ctx.tags : [];
      const isAttack = tags.includes('attack');
      const isSpell = tags.includes('spell');
      const isMelee = tags.includes('melee');
      const weaponAvg = avgWeaponDamage();

      if(hasSupport(supports, 'meleePhysicalDamageSupport') && isMelee) pkt.phys *= scaleSupportMultiplierValue(1.45, getGemEffectiveLevel('meleePhysicalDamageSupport'));
      if(hasSupport(supports, 'addedFireDamageSupport')) pkt.fire += weaponAvg * scaleSupportAdditiveValue(0.28, getGemEffectiveLevel('addedFireDamageSupport'));
      if(hasSupport(supports, 'addedColdDamageSupport')) pkt.cold += weaponAvg * scaleSupportAdditiveValue(0.28, getGemEffectiveLevel('addedColdDamageSupport'));
      if(hasSupport(supports, 'addedLightningDamageSupport')) pkt.lightning += weaponAvg * scaleSupportAdditiveValue(0.28, getGemEffectiveLevel('addedLightningDamageSupport'));
      if(hasSupport(supports, 'spellbladeSupport') && isSpell) pkt.phys += weaponAvg * scaleSupportAdditiveValue(0.60, getGemEffectiveLevel('spellbladeSupport'));
      if(hasSupport(supports, 'controlledDestructionSupport') && isSpell) pkt = scaleDamagePacket(pkt, scaleSupportMultiplierValue(1.40, getGemEffectiveLevel('controlledDestructionSupport')));
      if(hasSupport(supports, 'elementalDamageWithAttacksSupport') && isAttack){
        const elemMul = scaleSupportMultiplierValue(1.35, getGemEffectiveLevel('elementalDamageWithAttacksSupport')); pkt.fire *= elemMul; pkt.cold *= elemMul; pkt.lightning *= elemMul;
      }
      if(hasSupport(supports, 'brutalitySupport') && !(ctx && ctx.__coreBrutalityApplied)){
        pkt.phys *= scaleSupportMultiplierValue(1.50, getGemEffectiveLevel('brutalitySupport'));
        pkt.fire = 0; pkt.cold = 0; pkt.lightning = 0; pkt.chaos = 0;
      }
      if(hasSupport(supports, 'multistrikeSupport')) pkt = scaleDamagePacket(pkt, 0.80);
      if(hasSupport(supports, 'greaterMultipleProjectilesSupport') && tags.includes('projectile')) pkt = scaleDamagePacket(pkt, 0.65);
      if(hasSupport(supports, 'castOnCriticalSupport')) pkt = scaleDamagePacket(pkt, 0.75);
      if(hasSupport(supports, 'ruthlessSupport') && act.ruthlessProc) pkt = scaleDamagePacket(pkt, scaleSupportMultiplierValue(2.00, getGemEffectiveLevel('ruthlessSupport')));

      let afterCrit = pkt;
      if(res.crit && res.crit.isCrit){
        afterCrit = scaleDamagePacket(pkt, res.crit.multi || 1);
      }
      let dealtPkt = applyEnemyTakenDamageModsPacket(afterCrit, ctx);
      dealtPkt = applyEnemyResistsPacket(dealtPkt, enemy);
      res.afterOutgoingPacket = pkt;
      res.afterOutgoing = sumDamagePacket(pkt);
      res.dealtPacket = dealtPkt;
      res.dealt = sumDamagePacket(dealtPkt);
      res.crit = Object.assign({}, res.crit, { dmg: res.crit && res.crit.isCrit ? res.afterOutgoing * (res.crit.multi||1) : res.afterOutgoing });

      if(enemy && hasSupport(supports, 'cullingStrikeSupport') && enemy.hp > 0 && enemy.maxHp > 0){
        if(enemy.hp <= enemy.maxHp * 0.10) res.dealt = Math.max(res.dealt, enemy.hp + 1);
      }

      if(res.dealt > 0){
        if(hasSupport(supports, 'castOnCriticalSupport') && res.crit && res.crit.isCrit && !window.__supportTriggeringSpell){
          const linkedSpellId = getLinkedSpellId();
          const linkedSkill = linkedSpellId && window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[linkedSpellId];
          if(linkedSkill && linkedSkill.source === 'spell'){
            window.__supportTriggeringSpell = true;
            setTimeout(function(){
              try{
                const links = player && player.skillLinks ? player.skillLinks : null;
                if(!links) return;
                const prev = links.active;
                links.active = linkedSpellId;
                window.__supportExtraCast = true;
                const fn = window.__supportBaseUseActiveSkill || window.useActiveSkill;
                if(typeof fn === 'function') fn();
                links.active = prev;
              }catch(err){ console.warn('cast on crit trigger failed', err); }
              window.__supportExtraCast = false;
              window.__supportTriggeringSpell = false;
            }, 0);
          }
        }
      }
      return res;
    };
  }

  const oldUse = window.useActiveSkill;
  if(typeof oldUse === 'function'){
    window.__supportBaseUseActiveSkill = oldUse;
    const ruthlessCounter = {};
    window.useActiveSkill = function(){
      const activeId = player && player.skillLinks ? player.skillLinks.active : null;
      const origSkill = activeId && window.ACTIVE_SKILLS ? window.ACTIVE_SKILLS[activeId] : null;
      if(!origSkill) return oldUse.apply(this, arguments);
      const modSkill = getModifiedSkill(origSkill);
      const supports = getApplicableSupportsForSkill(origSkill);
      const firstCall = !window.__supportExtraAttack && !window.__supportExtraCast;
      if(firstCall){
        ruthlessCounter[origSkill.id] = (ruthlessCounter[origSkill.id] || 0) + 1;
      }
      const actionState = {
        skillId: origSkill.id,
        skill: modSkill,
        supports,
        ruthlessProc: hasSupport(supports, 'ruthlessSupport') && ((ruthlessCounter[origSkill.id] || 0) % 3 === 0)
      };
      window.__supportActionState = actionState;
      let out;
      const prev = window.ACTIVE_SKILLS[activeId];
      window.ACTIVE_SKILLS[activeId] = modSkill;
      try{
        out = oldUse.apply(this, arguments);
      } finally {
        window.ACTIVE_SKILLS[activeId] = prev;
        window.__supportActionState = null;
      }

      if(firstCall && !window.__supportTriggeringSpell && !window.__DIRECT_REPEAT_RUNTIME__){
        if(hasSupport(supports, 'multistrikeSupport') && Array.isArray(origSkill.tags) && origSkill.tags.includes('attack') && origSkill.id !== 'whirlwind'){
          [90, 180].forEach(function(delay){
            setTimeout(function(){
              try{ window.__supportExtraAttack = true; oldUse.call(window); }catch(err){ console.warn('multistrike failed', err); } finally { window.__supportExtraAttack = false; }
            }, delay);
          });
        }
        if(hasSupport(supports, 'spellEchoSupport') && origSkill.source === 'spell'){
          setTimeout(function(){
            try{ window.__supportExtraCast = true; oldUse.call(window); }catch(err){ console.warn('spell echo failed', err); } finally { window.__supportExtraCast = false; }
          }, 110);
        }
      }
      return out;
    };
  }

  if(typeof update === 'function' && !window.__SUPPORT_GEM_UPDATE_WRAP__){
    const oldUpdate = update;
    update = function(){
      ensureChargeState();
      if(typeof frameCount === 'number' && player && player.chargeState){
        const cs = player.chargeState;
        if((cs.frenzy || 0) > 0 && frameCount - (cs.frenzyLastGainFrame || 0) > 240){
          cs.frenzy = 0;
          player.frenzyCharges = 0;
        }
        if((cs.endurance || 0) > 0 && frameCount - (cs.enduranceLastGainFrame || 0) > 360){
          cs.endurance = 0;
          player.enduranceCharges = 0;
        }
      }
      return oldUpdate.apply(this, arguments);
    };
    window.__SUPPORT_GEM_UPDATE_WRAP__ = true;
  }
})();

// ===============================
// ✅ Weapon stat full-connect patch
// - elemental weapon multipliers (fire/cold/light/chaos)
// - spell multiplier passthrough for spell-tagged skills
// - runtime gear rebuild includes extended multiplier keys
// ===============================
(function(){
  if(window.__WEAPON_STAT_FULL_CONNECT_PATCH_V1__) return;
  window.__WEAPON_STAT_FULL_CONNECT_PATCH_V1__ = true;

  function __num(v, d){
    v = Number(v);
    return Number.isFinite(v) ? v : d;
  }

  function __newExtendedGearState(){
    const base = (typeof defaultBuffStats === 'function') ? defaultBuffStats() : {};
    return Object.assign(base, {
      flatDamageAdd: __num(base.flatDamageAdd, 0),
      lifeLeech: __num(base.lifeLeech, 0),
      hpOnHit: __num(base.hpOnHit, 0),
      hpOnKill: __num(base.hpOnKill, 0),
      bleedChance: __num(base.bleedChance, 0),
      knockbackChance: __num(base.knockbackChance, 0),
      cleaveChance: __num(base.cleaveChance, 0),
      doubleHitChance: __num(base.doubleHitChance, 0),
      executeChance: __num(base.executeChance, 0),
      critChanceVsBoss: __num(base.critChanceVsBoss, 0),
      bossDamageMul: __num(base.bossDamageMul, 1),
      eliteDamageMul: __num(base.eliteDamageMul, 1),
      fireResAdd: __num(base.fireResAdd, 0),
      coldResAdd: __num(base.coldResAdd, 0),
      lightResAdd: __num(base.lightResAdd, 0),
      chaosResAdd: __num(base.chaosResAdd, 0),
      allResAdd: __num(base.allResAdd, 0),
      fireMul: __num(base.fireMul, 1),
      coldMul: __num(base.coldMul, 1),
      lightMul: __num(base.lightMul, 1),
      chaosMul: __num(base.chaosMul, 1),
      spellMul: __num(base.spellMul, 1)
    });
  }

  function __mergeGearStat(dst, stat, value){
    const v = __num(value, 0);
    if(!Number.isFinite(v)) return;
    if(stat === 'flatDamage') stat = 'flatDamageAdd';

    switch(stat){
      case 'dmgMul':
      case 'atkSpdMul':
      case 'spdMul':
      case 'rangeMul':
      case 'bossDamageMul':
      case 'eliteDamageMul':
      case 'critChanceMore':
      case 'critMultiMore':
      case 'dmgMore':
      case 'atkSpdMore':
      case 'rangeMore':
      case 'fireMul':
      case 'coldMul':
      case 'lightMul':
      case 'chaosMul':
      case 'spellMul':
        dst[stat] = __num(dst[stat], 1) * (v || 1);
        break;
      default:
        dst[stat] = __num(dst[stat], 0) + v;
        break;
    }
  }

  function __collectItemInto(dst, it){
    if(!it) return;
    const d = it.totalData || it.data || {};
    const imps = getAllItemImplicits(it);
    const keys = [
      'armorAdd','maxHpAdd','hpRegen',
      'dmgMul','dmgInc','dmgMore',
      'atkSpdMul','atkSpdInc','atkSpdMore',
      'spdMul','spdInc','spdMore',
      'rangeMul','rangeInc','rangeMore',
      'flatDamage','flatDamageAdd',
      'critChanceAdd','critChanceInc','critChanceMore',
      'critMultiAdd','critMultiInc','critMultiMore',
      'maxLife','hpOnHit','hpOnKill',
      'bleedChance','knockbackChance','cleaveChance','doubleHitChance','executeChance',
      'critChanceVsBoss','bossDamageMul','eliteDamageMul',
      'fireResAdd','coldResAdd','lightResAdd','chaosResAdd','allResAdd',
      'fireMul','coldMul','lightMul','chaosMul','spellMul'
    ];

    for(const k of keys){
      if(typeof d[k] === 'number') __mergeGearStat(dst, k, d[k]);
    }
    for(const imp of imps){
      if(!imp || !imp.stat || typeof imp.value !== 'number') continue;
      __mergeGearStat(dst, imp.stat, imp.value);
    }
  }

  function __rebuildExtendedWeaponStats(){
    const gear = __newExtendedGearState();
    try{
      if(typeof equipment === 'object' && equipment){
        for(const slot of Object.keys(equipment)) __collectItemInto(gear, equipment[slot]);
      }
    }catch(err){
      console.warn('extended gear rebuild failed', err);
    }

    gear.dmgMul    = __num(gear.dmgMul, 1)    * (1 + __num(gear.dmgInc, 0))    * __num(gear.dmgMore, 1);
    gear.atkSpdMul = __num(gear.atkSpdMul, 1) * (1 + __num(gear.atkSpdInc, 0)) * __num(gear.atkSpdMore, 1);
    gear.spdMul    = __num(gear.spdMul, 1)    * (1 + __num(gear.spdInc, 0))    * __num(gear.spdMore, 1);
    gear.rangeMul  = __num(gear.rangeMul, 1)  * (1 + __num(gear.rangeInc, 0))  * __num(gear.rangeMore, 1);

    player.gear = Object.assign(__newExtendedGearState(), player.gear || {}, gear);
    player.gear.flatDamage = player.gear.flatDamageAdd || 0;
    if(!player.buffs) player.buffs = (typeof defaultBuffStats === 'function') ? defaultBuffStats() : {};
    player.buffs.dmgMul = __num(player.gear.dmgMul, 1);
    player.buffs.atkSpdMul = __num(player.gear.atkSpdMul, 1);
    player.buffs.spdMul = __num(player.gear.spdMul, 1);
    player.buffs.rangeMul = __num(player.gear.rangeMul, 1);
    player.buffs.armorMul = __num(player.gear.armorMul, 1);
  }

<script>
/* =========================================================

     heavyStrike / doubleStrike / infernalSmash

(function(){
  if(window.__SKILL_STEP1_PATCH__) return;
  window.__SKILL_STEP1_PATCH__ = true;

  /* -----------------------------
     0) player 공용 6링크 초기화
  ----------------------------- */
  try{
    player.skillLinks = player.skillLinks || {
      active: null,

    };

      player.skillLinks.supports = [null, null, null, null, null];
    }
    while(player.skillLinks.supports.length < 5) player.skillLinks.supports.push(null);
    if(player.skillLinks.supports.length > 5) player.skillLinks.supports.length = 5;
    player.infernalCombo = player.infernalCombo || 0;
    player.__skillCooldowns = player.__skillCooldowns || {};
    player.__cwcTick = player.__cwcTick || 0;
  }catch(err){
    console.warn("skill init failed", err);
  }

  /* -----------------------------
     1) 액티브 스킬 데이터 (1단계)
  ----------------------------- */
  window.ACTIVE_SKILLS = window.ACTIVE_SKILLS || {};
  Object.assign(window.ACTIVE_SKILLS, {
    heavyStrike: {
      id: "heavyStrike",
      name: "묵직한 타격",
      source: "weapon",
      shape: "cone",
      tags: ["attack","melee","strike","physical"],
      radius: 110,
      angleDeg: 180,
      baseMul: 2.00,
      useTimeRatio: 1.80,
      extra: {
        doubleDamageChanceMin: 0.50,
        doubleDamageChanceMax: 0.60
      }
    },

    doubleStrike: {
      id: "doubleStrike",
      name: "이중 타격",
      source: "weapon",
      shape: "double_cone",
      tags: ["attack","melee","strike","physical"],
      radius: 90,
      angleDeg: 180,
      baseMul: 1.15,
      useTimeRatio: 0.90,
      repeats: 2
    },

    infernalSmash: {
      id: "infernalSmash",
      name: "지옥불 맹타",
      source: "weapon",
      shape: "infernal_combo",
      tags: ["attack","melee","fire","combo"],
      useTimeRatio: 1.30,
      comboStages: [
        { radius: 90, angleDeg: 180, damageMul: 1.20, fireConvert: 0.50, addAoe:false },
        { radius: 90, angleDeg: 180, damageMul: 1.20, fireConvert: 0.50, addAoe:false },
        { radius:180, angleDeg:360, damageMul: 1.40, fireConvert: 1.00, addAoe:true  }
      ]
    }
  });

  /* -----------------------------
     2) 유틸
  ----------------------------- */
  function randRangeLocal(a,b){
    if(typeof randRange === "function") return randRange(a,b);
    return a + Math.random() * (b-a);
  }

  function rollWeaponBaseDamage(){
    const w = (typeof getCombatWeaponDisplayStats === "function")
      ? getCombatWeaponDisplayStats()
      : { min:2, max:4 };
    const g = (player && player.gear) ? player.gear : null;
    const flat = Number(g && (g.flatDamageAdd ?? g.flatDamage) || 0);
    return randRangeLocal(w.min || 2, w.max || 4) + (Number.isFinite(flat) ? flat : 0);
  }

  function rollSkillBaseDamage(skill){
    if(!skill) return 0;

    if(skill.source === "weapon"){
      return rollWeaponBaseDamage() * (skill.baseMul || 1);
    }

    if(skill.source === "spell"){
      return randRangeLocal(skill.flatMin || 0, skill.flatMax || 0) * (skill.baseMul || 1);
    }

    return 0;
  }
  function getCurrentAttackSpeed(){
    const mul = (player && player.buffs && typeof player.buffs.atkSpdMul === "number")
      ? player.buffs.atkSpdMul
      : 1;
    return Math.max(0.2, mul);
  }

  function getSkillUseTimeMs(skill, ratio){
    const atkSpd = getCurrentAttackSpeed();
    const r = (typeof ratio === "number" && isFinite(ratio)) ? ratio : 1;
    const tags = Array.isArray(skill && skill.tags) ? skill.tags : [];
    const isSpell = !!(skill && (skill.source === "spell" || tags.includes("spell")));
    const speedMul = isSpell ? Math.max(0.1, player.castSpeedMul || 1) : atkSpd;
    return Math.max(80, Math.round((380 * r) / speedMul));
  }
  function getPlayerAimAngle(){
    switch(player.dir){
      case "up": return -Math.PI * 0.5;
      case "down": return Math.PI * 0.5;
      case "right": return 0;
      case "left":
      default: return Math.PI;
    }
  }

  function normalizeAngle(a){
    while(a > Math.PI) a -= Math.PI * 2;
    while(a < -Math.PI) a += Math.PI * 2;
    return a;
  }

  function getEnemyRadius(e){
    return Math.max(
      10,
      e && typeof e.radius === "number" ? e.radius : 14
    );
  }

  function damageEnemyDirect(enemy, dealt, opt){
    if(typeof window.damageEnemyDirect === "function" && window.damageEnemyDirect !== damageEnemyDirect){
      return window.damageEnemyDirect(enemy, dealt, opt);
    }

    if(!enemy || enemy.hp <= 0) return false;

    enemy.hp -= dealt;
    enemy.hitFlash = Math.max(enemy.hitFlash || 0, 6);

    // 작은 움찔
    const dx = enemy.x - player.x;
    const dy = enemy.y - player.y;
    const len = Math.hypot(dx, dy) || 1;
    enemy.knockbackX = (enemy.knockbackX || 0) + (dx/len) * 1.6;
    enemy.knockbackY = (enemy.knockbackY || 0) + (dy/len) * 1.6;

    if(enemy.hp <= 0){
      return true;
    }
    return false;
  }

  function getStrikeContactPoint(enemy){
    const er = getEnemyRadius(enemy);
    const dx = (enemy.x || 0) - (player.x || 0);
    const dy = (enemy.y || 0) - (player.y || 0);
    const len = Math.hypot(dx, dy) || 1;
    const nx = dx / len;
    const ny = dy / len;
    return {
      x: (enemy.x || 0) - nx * Math.max(6, er * 0.72),
      y: (enemy.y || 0) - ny * Math.max(6, er * 0.72),
      nx,
      ny
    };
  }

  function spawnHeavyStrikeImpact(enemy, power){
    if(!enemy) return;
    const hit = getStrikeContactPoint(enemy);
    const amount = Math.max(12, Math.min(22, Math.round(12 + power * 4)));

    if(typeof spawnHitBlood === "function"){
      try{ spawnHitBlood(hit.x, hit.y, Math.max(10, amount - 2)); }catch(_){ }
    }

    if(Array.isArray(window.bloodParticles) && bloodParticles.length < 340){
      for(let i=0; i<amount; i++){
        const spread = (Math.random() - 0.5) * 1.8;
        const a = Math.atan2(hit.ny, hit.nx) + spread;
        const s = 2.8 + Math.random() * 4.2 + power * 0.5;
        bloodParticles.push({
          x: hit.x + (Math.random()-0.5) * 6,
          y: hit.y + (Math.random()-0.5) * 6,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s - Math.random() * 0.8,
          size: 2 + Math.random() * 3.2,
          life: 18 + Math.floor(Math.random() * 8)
        });
      }
    }

    if(Array.isArray(window.particles) && particles.length < 320){
      for(let i=0; i<8; i++){
        const a = Math.random() * Math.PI * 2;
        const s = 1.2 + Math.random() * 2.8;
        particles.push({
          x: hit.x,
          y: hit.y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: 10 + Math.floor(Math.random() * 5),
          kind: "heavyShock",
          size: 4 + Math.random() * 2,
          alpha: 0.9
        });
      }
      for(let i=0; i<10; i++){
        const ringA = (i / 10) * Math.PI * 2;
        particles.push({
          x: hit.x,
          y: hit.y,
          vx: Math.cos(ringA) * (2.2 + power * 0.25),
          vy: Math.sin(ringA) * (2.2 + power * 0.25),
          life: 8,
          kind: "heavyShock",
          size: 3.6,
          alpha: 0.7
        });
      }
    }

    if(typeof shake !== "undefined") shake = Math.max(shake, 11 + Math.round(power));
  }

  function applyHeavyStrikeKnockback(enemy, power){
    if(!enemy) return;
    const dx = (enemy.x || 0) - (player.x || 0);
    const dy = (enemy.y || 0) - (player.y || 0);
    const len = Math.hypot(dx, dy) || 1;
    const mul = 4.8 + Math.min(4.5, power * 0.9);
    enemy.knockbackX = (enemy.knockbackX || 0) + (dx / len) * mul;
    enemy.knockbackY = (enemy.knockbackY || 0) + (dy / len) * mul;
    enemy.hitReact = Math.max(enemy.hitReact || 0, 10);
    enemy.hitFlash = Math.max(enemy.hitFlash || 0, 9);
  }

  function buildSkillCtx(skill, enemy, extraTags){
    let ctx = buildCombatCtx(
      skill.id === "heavyStrike" || skill.id === "doubleStrike" || skill.id === "infernalSmash"
        ? "attack"
        : skill.id,
      enemy
    );

    ctx.tags = mergeTags(
      (ctx && ctx.tags) ? ctx.tags : [],
      skill.tags || [],
      extraTags || []
    );
    ctx.skillId = skill && skill.id ? skill.id : (ctx.skillId || null);
    ctx.activeSkillId = ctx.skillId;
    return ctx;
  }

  /* -----------------------------
     3) 공통 판정
  ----------------------------- */
  function applyConeDamage(skill, radius, angleDeg, baseDamage, extraTags){
    const aim = getPlayerAimAngle();
    const half = (angleDeg * Math.PI / 180) * 0.5;
    const isHeavyStrike = !!(skill && skill.id === "heavyStrike");

    for(const e of enemies){
      if(!e || e.hp <= 0) continue;

      const dx = e.x - player.x;
      const dy = e.y - player.y;
      const dist = Math.hypot(dx, dy);
      if(dist > radius + getEnemyRadius(e)) continue;

      const ang = Math.atan2(dy, dx);
      const diff = Math.abs(normalizeAngle(ang - aim));
      if(diff > half) continue;

      const ctx = buildSkillCtx(skill, e, extraTags);
      const result = computeFinalDamage(baseDamage, ctx);
      e.__killFxKind = window.__lastDamageFxKind || e.__killFxKind || "physical";
      window.__lastHitEnemyForCommonSupport = e;
      window.__lastHitEnemyForCommonSupport = e;
    applyCommonSupportOnHit(skill, result.dealt);
      damageEnemyDirect(e, result.dealt);

      if(isHeavyStrike && (result.dealt || 0) > 0){
        const power = Math.max(1, Math.min(6, (result.dealt || 0) / 18));
        spawnHeavyStrikeImpact(e, power);
        applyHeavyStrikeKnockback(e, power);
      }
    }
  }

  /* -----------------------------
     4) 스킬 실행기
  ----------------------------- */
  function useHeavyStrike(skill){
    player.skillSwingStyle = "heavy";
    player.skillSwingTimer = Math.max(6, Math.round(getSkillUseTimeMs(skill, 0.32) / 16));
    player.__skillVisualTotalFrames = player.skillSwingTimer;
    player.skillSwingPower = 1.35;

    let base = rollSkillBaseDamage(skill);
    const p = randRangeLocal(
      skill.extra.doubleDamageChanceMin,
      skill.extra.doubleDamageChanceMax
    );
    if(Math.random() < p) base *= 2;

    applyConeDamage(skill, skill.radius, skill.angleDeg, base);
  }

  function spawnDoubleStrikeXFx(phase){
    if(!Array.isArray(window.particles)) return;

    const step = Math.max(1, Number(phase || 1));
    const aim = getPlayerAimAngle();
    const slashAng = aim + (step === 1 ? -0.62 : 0.62);
    const centerX = player.x + Math.cos(aim) * 34;
    const centerY = player.y + Math.sin(aim) * 34;
    const len = 78;
    const count = 18;

    for(let i=0;i<count;i++){
      const t = count <= 1 ? 0 : (i / (count - 1)) * 2 - 1;
      const jitter = (Math.random() - 0.5) * 5.5;
      const px = centerX + Math.cos(slashAng) * (t * len * 0.54) + Math.cos(aim + Math.PI * 0.5) * jitter * 0.12;
      const py = centerY + Math.sin(slashAng) * (t * len * 0.54) + Math.sin(aim + Math.PI * 0.5) * jitter * 0.12;

      particles.push({
        x: px,

  function useDoubleStrike(skill){

    setTimeout(()=>{
      try{
        spawnDoubleStrikeXFx(2);
        applyConeDamage(skill, skill.radius, skill.angleDeg, base);

        console.warn("doubleStrike 2nd hit failed", err);

  function spawnInfernalSmashFx(stage, comboIndex){
    if(!stage || !Array.isArray(window.particles)) return;

    const aim = getPlayerAimAngle();
    const half = ((stage.angleDeg || 180) * Math.PI / 180) * 0.5;
    const radius = Math.max(64, Number(stage.radius || 90));
    const combo = Math.max(1, Number(comboIndex || 1));

    const frontX = player.x + Math.cos(aim) * 26;
    const frontY = player.y + Math.sin(aim) * 26;

    const arcCount = combo >= 3 ? 30 : (combo === 2 ? 22 : 18);
    for(let i=0;i<arcCount;i++){
      const t = arcCount <= 1 ? 0.5 : i / (arcCount - 1);
      const ang = aim - half + (half * 2) * t + (Math.random() - 0.5) * 0.10;

        x: px,
        y: py,
        vx: Math.cos(ang) * (1.1 + Math.random() * 1.7) + Math.cos(aim) * 0.9,
        vy: Math.sin(ang) * (1.1 + Math.random() * 1.7) + Math.sin(aim) * 0.9,

        });
      }

      if(i % 3 === 0){
        particles.push({
          x: px,
          y: py - 2,
          vx: Math.cos(ang) * (0.14 + Math.random() * 0.30),
          vy: Math.sin(ang) * (0.14 + Math.random() * 0.30) - (0.10 + Math.random() * 0.18),

          size: 6.0 + Math.random() * 4.2,
          alpha: 0.26,

        });

      const s = 1.2 + Math.random() * 2.1 + combo * 0.12;
      particles.push({

        life: 8 + Math.floor(Math.random() * 6),
        kind: "arrowSpark",
        size: 4.4 + Math.random() * 2.0,
        alpha: 0.95,
        infernalRed: true
      });

    if(combo >= 3 || stage.addAoe){
      const burstCount = 26;

        const a = (i / burstCount) * Math.PI * 2 + Math.random() * 0.20;
        const s = 1.8 + Math.random() * 2.8;
        particles.push({

            size: 8.2 + Math.random() * 4.6,
            alpha: 0.86,
            infernalRed: true
          });

        if(i < 12){
          particles.push({
            x: player.x + (Math.random() - 0.5) * 10,
            y: player.y + (Math.random() - 0.5) * 10,
            vx: Math.cos(a) * (0.18 + Math.random() * 0.34),
            vy: Math.sin(a) * (0.18 + Math.random() * 0.34) - (0.10 + Math.random() * 0.18),
            life: 18 + Math.floor(Math.random() * 10),
            kind: "infernalSmoke",
            size: 8.0 + Math.random() * 5.0,
            alpha: 0.28,
            infernalRed: true
          });
        }
      }
      for(let i=0;i<14;i++){
        const a = (i / 14) * Math.PI * 2;
        particles.push({
          x: player.x,
          y: player.y,
          vx: Math.cos(a) * 2.8,
          vy: Math.sin(a) * 2.8,
          life: 8,
          kind: "heavyShock",
          size: 4.6,
          alpha: 0.76,
          infernalRed: true
        });
      }
      if(typeof shake !== "undefined") shake = Math.max(shake, 12);
    }
  }

  function useInfernalSmash(skill){
    player.skillSwingStyle = "infernal";
    player.skillSwingTimer = Math.max(6, Math.round(getSkillUseTimeMs(skill, 0.28) / 16));

    function distancePointToSegment(px, py, x1, y1, x2, y2){
    const vx = x2 - x1;
    const vy = y2 - y1;
    const wx = px - x1;
    const wy = py - y1;

    const c1 = vx * wx + vy * wy;
    if(c1 <= 0) return Math.hypot(px - x1, py - y1);

    const c2 = vx * vx + vy * vy;
    if(c2 <= c1) return Math.hypot(px - x2, py - y2);

    const b = c1 / c2;
    const bx = x1 + b * vx;
    const by = y1 + b * vy;
    return Math.hypot(px - bx, py - by);
  }

  function isWallAtWorld(x, y){
    const tx = Math.floor(x / tileSize);
    const ty = Math.floor(y / tileSize);
    if(!map[ty]) return true;
    return map[ty][tx] === 1;
  }

  function projectileTouchesWall(prevX, prevY, nextX, nextY, radius){
    const steps = Math.max(2, Math.ceil(Math.hypot(nextX - prevX, nextY - prevY) / 6));
    for(let i = 0; i <= steps; i++){
      const t = i / steps;
      const sx = prevX + (nextX - prevX) * t;
      const sy = prevY + (nextY - prevY) * t;

      if(isWallAtWorld(sx, sy)) return { hit:true, x:sx, y:sy };

      // 반지름 보정
      if(isWallAtWorld(sx + radius, sy)) return { hit:true, x:sx + radius, y:sy };
      if(isWallAtWorld(sx - radius, sy)) return { hit:true, x:sx - radius, y:sy };
      if(isWallAtWorld(sx, sy + radius)) return { hit:true, x:sx, y:sy + radius };
      if(isWallAtWorld(sx, sy - radius)) return { hit:true, x:sx, y:sy - radius };
    }
    return { hit:false, x:nextX, y:nextY };
  }

      for(const e of enemies){
        if(!e || e.hp <= 0) continue;

        const er = (typeof getEnemyRadius === "function") ? getEnemyRadius(e) : (e.radius || 14);
        const hitDist = distancePointToSegment(e.x, e.y, prevX, prevY, nextX, nextY);

        if(hitDist <= (p.radius || 8) + er){
          hitEnemy = e;
          break;
        }
      }

      if(hitEnemy){
        if(p.kind === "fireball" || p.kind === "moltenShard"){
          // 적 위치에서 터지게
          p.x = hitEnemy.x;
          p.y = hitEnemy.y;
          explodeSkillProjectile(p);
        }else{
          const fakeSkill = { id: p.kind || "projectile", tags: p.tags || [] };
          const ctx = buildCombatCtx(fakeSkill.id, hitEnemy);
          ctx.tags = mergeTags(ctx.tags || [], fakeSkill.tags || []);
          const result = computeFinalDamage(p.damage, ctx);
          hitEnemy.__killFxKind = window.__lastDamageFxKind || hitEnemy.__killFxKind || "physical";

          if(typeof damageEnemyDirect === "function"){
            damageEnemyDirect(hitEnemy, result.dealt);
          }else if(typeof window.damageEnemyDirect === "function"){
            window.damageEnemyDirect(hitEnemy, result.dealt);
          }else{
            hitEnemy.hp -= result.dealt;
          }
        }

        skillProjectiles.splice(i,1);
        continue;
      }

      if(p.life <= 0){
        skillProjectiles.splice(i,1);
      }
    }
  }

  function getBodyCastOrigin(dir, opt){
    dir = dir || {x:0, y:0};
    opt = opt || {};
    const forward = Number.isFinite(opt.forward) ? opt.forward : 18;
    const bodyCastY = Number.isFinite(opt.bodyCastY) ? opt.bodyCastY : 40;
    const aimYOffset = Number.isFinite(opt.aimYOffset) ? opt.aimYOffset : 10;
    return {
      x: player.x + dir.x * forward,
      y: player.y + bodyCastY + dir.y * aimYOffset
    };
  }

  function drawSkillProjectiles(){
    if(!window.skillProjectiles || !skillProjectiles.length) return;

    for(const p of skillProjectiles){
      const sp = isoProject(p.x, p.y);
      const pp = isoProject(player.x, player.y);
      const camX = canvas.width * 0.5;
      const camY = canvas.height * 0.5 - (ISO.camYOffset || 0);
      const px = camX + sp.x - pp.x;
      const py = camY + sp.y - pp.y - 6;
      const bodyDrawYOffset = ((p.kind === "fireball") || (p.kind === "moltenShard")) ? 74 : 0;

      ctx.save();
      ctx.translate(px, py + bodyDrawYOffset);
      ctx.rotate(p.angle || 0);

      if(p.kind === "fireball"){
        const spin = p.spin || 0;
        const pulse = 1 + Math.sin((p.age || 0) * 0.55) * 0.08;

        ctx.globalCompositeOperation = 'lighter';

        // 꼬리 불꽃
        ctx.save();
        ctx.rotate(-0.16 + Math.sin(spin * 0.7) * 0.06);
        const tail = ctx.createLinearGradient(-22, 0, 9, 0);
        tail.addColorStop(0.00, 'rgba(255,40,0,0)');
        tail.addColorStop(0.24, 'rgba(255,90,0,0.22)');
        tail.addColorStop(0.68, 'rgba(255,150,50,0.68)');
        tail.addColorStop(1.00, 'rgba(255,240,190,0.92)');
        ctx.fillStyle = tail;
        ctx.beginPath();
        ctx.moveTo(-20, 0);
        ctx.quadraticCurveTo(-12, -7, 5, -4);
        ctx.quadraticCurveTo(11, 0, 5, 4);
        ctx.quadraticCurveTo(-12, 7, -20, 0);
        ctx.fill();
        ctx.restore();

        // 바깥 글로우
        const glow = ctx.createRadialGradient(0,0,2,0,0,16 * pulse);
        glow.addColorStop(0.00, 'rgba(255,255,210,0.95)');
        glow.addColorStop(0.26, 'rgba(255,210,90,0.88)');
        glow.addColorStop(0.58, 'rgba(255,115,20,0.62)');
        glow.addColorStop(1.00, 'rgba(255,60,0,0.00)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0,0,16 * pulse,0,Math.PI*2);
        ctx.fill();

        // 핵심 화염구
        ctx.save();
        ctx.rotate(spin * 0.5);
        ctx.fillStyle = '#ff6a00';
        ctx.beginPath();
        ctx.ellipse(0, 0, 10 * pulse, 8.2 * pulse, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#ffb13b';
        ctx.beginPath();
        ctx.ellipse(1.5, -0.5, 6.7 * pulse, 5.4 * pulse, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,240,200,0.95)';
        ctx.beginPath();
        ctx.arc(3.2, -1.8, 3.2 * pulse, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        // 불꽃 혀
        ctx.save();
        ctx.rotate(spin);
        ctx.fillStyle = 'rgba(255,180,60,0.95)';
        for(let k=0;k<3;k++){
          const ang = k * Math.PI * 2 / 3;
          ctx.save();
          ctx.rotate(ang);
          ctx.beginPath();
          ctx.moveTo(2,0);
          ctx.quadraticCurveTo(8,-2.5,11.5,0);
          ctx.quadraticCurveTo(8,2.5,2,0);
          ctx.fill();
          ctx.restore();
        }
        ctx.restore();

        ctx.globalCompositeOperation = 'source-over';
      }else if(p.kind === "moltenShard"){
        const spin = p.spin || 0;
        const pulse = 1 + Math.sin((p.age || 0) * 0.7) * 0.06;
        ctx.globalCompositeOperation = 'lighter';

        // 아주 작은 용암 글로우
        const glow = ctx.createRadialGradient(0,0,1,0,0,8 * pulse);
        glow.addColorStop(0.00, 'rgba(255,240,170,0.92)');
        glow.addColorStop(0.34, 'rgba(255,155,60,0.75)');
        glow.addColorStop(1.00, 'rgba(255,70,0,0.00)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0,0,8 * pulse,0,Math.PI*2);
        ctx.fill();

        // 작은 불덩이 꼬리
        ctx.save();
        ctx.rotate(-0.12 + Math.sin(spin * 0.5) * 0.04);
        const tail = ctx.createLinearGradient(-10, 0, 4, 0);
        tail.addColorStop(0.00, 'rgba(255,70,0,0.00)');
        tail.addColorStop(0.45, 'rgba(255,120,20,0.26)');
        tail.addColorStop(1.00, 'rgba(255,220,170,0.68)');
        ctx.fillStyle = tail;
        ctx.beginPath();
        ctx.moveTo(-9, 0);
        ctx.quadraticCurveTo(-4, -2.8, 3.5, -1.8);
        ctx.quadraticCurveTo(5, 0, 3.5, 1.8);
        ctx.quadraticCurveTo(-4, 2.8, -9, 0);
        ctx.fill();
        ctx.restore();

        // 코어
        ctx.save();
        ctx.rotate(spin * 0.45);
        ctx.fillStyle = '#ff6a00';
        ctx.beginPath();
        ctx.ellipse(0, 0, 4.8 * pulse, 3.8 * pulse, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ffbf55';
        ctx.beginPath();
        ctx.ellipse(0.8, -0.3, 2.8 * pulse, 2.2 * pulse, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,245,210,0.95)';
        ctx.beginPath();
        ctx.arc(1.6, -0.9, 1.3 * pulse, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        ctx.globalCompositeOperation = 'source-over';
      }

      ctx.restore();
    }
  }

  /* -----------------------------
     4) 번개 빔
  ----------------------------- */

  window.__spellCastSigils = window.__spellCastSigils || [];

  function spawnSpellCastSigil(skill, aim, opt){
    if(!skill) return;
    const tags = Array.isArray(skill.tags) ? skill.tags : [];
    const isSpell = skill.source === "spell" || tags.includes("spell");
    if(!isSpell) return;

    const origin = getBodyCastOrigin(aim || getAimUnit(), { forward: 10, bodyCastY: 40, aimYOffset: 10 });
    __spellCastSigils.push({
      x: origin.x,
      y: origin.y,
      life: 18,
      maxLife: 18,
      radius: (opt && opt.radius) || 34,
      color: (opt && opt.color) || (tags.includes("fire") ? "255,140,70" :
             tags.includes("cold") ? "120,220,255" :
             tags.includes("lightning") ? "150,210,255" : "255,235,170"),
      spin: Math.random() * Math.PI * 2
    });
  }

  function updateSpellCastSigils(){
    if(!window.__spellCastSigils || !__spellCastSigils.length) return;
    for(let i = __spellCastSigils.length - 1; i >= 0; i--){
      const fx = __spellCastSigils[i];
      fx.life--;
      fx.spin += 0.07;
      if(fx.life <= 0) __spellCastSigils.splice(i, 1);
    }
  }

  function drawSpellCastSigils(){
    if(!window.__spellCastSigils || !__spellCastSigils.length) return;

    const camX = canvas.width * 0.5;
    const camY = canvas.height * 0.5 - (ISO.camYOffset || 0);
    const pp = isoProject(player.x, player.y);

    for(const fx of __spellCastSigils){
      const sp = isoProject(fx.x, fx.y);
      const px = camX + sp.x - pp.x;
      const py = camY + sp.y - pp.y + 36;

      const t = fx.life / Math.max(1, fx.maxLife || 1);
      const grow = 1 - t;
      const r = fx.radius * (0.72 + grow * 0.28);

      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, t)) * 0.95;

      const glow = ctx.createRadialGradient(px, py, 0, px, py, r * 1.3);
      glow.addColorStop(0, 'rgba(' + fx.color + ',0.16)');
      glow.addColorStop(0.55, 'rgba(' + fx.color + ',0.10)');
      glow.addColorStop(1, 'rgba(' + fx.color + ',0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px, py, r * 1.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(' + fx.color + ',0.95)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for(let i=0;i<5;i++){
        const a = fx.spin - Math.PI/2 + i * (Math.PI * 2 / 5);
        const sx = px + Math.cos(a) * r;
        const sy = py + Math.sin(a) * r;
        if(i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.closePath();
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(px, py, r * 0.88, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      for(let i=0;i<5;i++){
        const a = fx.spin + Math.PI/2 + i * (Math.PI * 4 / 5);
        const sx = px + Math.cos(a) * (r * 0.92);
        const sy = py + Math.sin(a) * (r * 0.92);
        if(i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.closePath();
      ctx.stroke();

      ctx.restore();
    }
  }

function useLightningBeam(skill){
  player.skillSwingStyle = "infernal";
  player.skillSwingTimer = Math.max(5, Math.round(getSkillUseTimeMs(skill, 0.24) / 16));
  player.__skillVisualTotalFrames = player.skillSwingTimer;
  player.skillSwingPower = 1.08;

  const aim = getSpellAim(520);
  const wandCast = beginCasterWandSpellCast(skill);
  spawnSpellCastSigil(skill, aim, { radius: wandCast.empowered ? 44 : 32 });
  const base = rollSpellBaseDamage(skill) * (wandCast.damageMul || 1);
  const origin = getBodyCastOrigin(aim, { forward: 18, bodyCastY: 40, aimYOffset: 10 });
  const sx = origin.x;
  const sy = origin.y;
  for(const e of enemies){
    if(!e || e.hp <= 0) continue;

    const ex = e.x - sx;
    const ey = e.y - sy;

    const forward = ex * aim.x + ey * aim.y;
    if(forward < 0 || forward > skill.beamLength) continue;

    const side = Math.abs(ex * (-aim.y) + ey * aim.x);
    const er = (typeof getEnemyRadius === "function") ? getEnemyRadius(e) : (e.radius || 14);
    const beamWidth = (skill.beamWidth || 32) * (wandCast.rangeMul || 1);
    if(side > (beamWidth * 0.5) + er) continue;

    const ctx = buildCombatCtx(skill.id, e);
    ctx.tags = mergeTags(ctx.tags || [], skill.tags || []);
    ctx.skillId = skill.id;
    ctx.activeSkillId = skill.id;
    const result = computeFinalDamage(base, ctx);
    e.__killFxKind = window.__lastDamageFxKind || e.__killFxKind || "physical";
    window.__lastHitEnemyForCommonSupport = e;
    applyCommonSupportOnHit(skill, result.dealt);

    let wasKilled = false;
    if(typeof damageEnemyDirect === "function"){
      wasKilled = !!damageEnemyDirect(e, result.dealt);
    }else if(typeof window.damageEnemyDirect === "function"){
      wasKilled = !!window.damageEnemyDirect(e, result.dealt);
    }else{
      e.hp -= result.dealt;
      wasKilled = e.hp <= 0;
    }
    applyEquippedCasterSpellHitEffects(skill, e, result.dealt, wasKilled);
  }

  window.__lastLightningBeam = {
    x1: sx,
    y1: sy,
    x2: sx + aim.x * skill.beamLength,
    y2: sy + aim.y * skill.beamLength,
    life: 7,
    maxLife: 7,
    drawYOffset: 74,
    seed: Math.random() * 9999,
    sparkSeed: Math.random() * Math.PI * 2
  };
}

  function updateLightningBeamFx(){
    if(window.__lastLightningBeam && __lastLightningBeam.life > 0){
      __lastLightningBeam.life--;
    }
  }

  function __drawJaggedLightningPath(x1, y1, x2, y2, seed, jitter, segments){
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len;
    const ny = dx / len;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    for(let i=1;i<segments;i++){
      const t = i / segments;
      const bx = x1 + dx * t;
      const by = y1 + dy * t;
      const wave = Math.sin(seed + i * 1.83 + performance.now() * 0.045) * jitter;
      const taper = 1 - Math.abs(0.5 - t) * 0.55;
      ctx.lineTo(bx + nx * wave * taper, by + ny * wave * taper);
    }
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  function drawLightningBeamFx(){
    if(!window.__lastLightningBeam || __lastLightningBeam.life <= 0) return;

    const a = __lastLightningBeam;
    const p1 = isoProject(a.x1, a.y1);
    const p2 = isoProject(a.x2, a.y2);
    const pp = isoProject(player.x, player.y);
    const camX = canvas.width * 0.5;
    const camY = canvas.height * 0.5 - (ISO.camYOffset || 0);
    const beamDrawYOffset = a.drawYOffset || 0;
    const x1 = camX + p1.x - pp.x;
    const y1 = camY + p1.y - pp.y + beamDrawYOffset;
    const x2 = camX + p2.x - pp.x;
    const y2 = camY + p2.y - pp.y + beamDrawYOffset;
    const alpha = Math.max(0, a.life / (a.maxLife || 7));

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowBlur = 18;
    ctx.shadowColor = 'rgba(120,210,255,0.9)';

    ctx.strokeStyle = 'rgba(90,170,255,0.22)';
    ctx.lineWidth = 10;
    __drawJaggedLightningPath(x1, y1, x2, y2, a.seed, 14, 9);

    ctx.strokeStyle = 'rgba(150,220,255,0.60)';
    ctx.lineWidth = 5;
    __drawJaggedLightningPath(x1, y1, x2, y2, a.seed + 10.3, 8, 10);

    ctx.shadowBlur = 8;
    ctx.strokeStyle = '#f3fdff';
    ctx.lineWidth = 2.2;
    __drawJaggedLightningPath(x1, y1, x2, y2, a.seed + 21.7, 3.5, 11);

    // 착탄 스파크
    ctx.shadowBlur = 0;
    for(let i=0;i<8;i++){
      const ang = a.sparkSeed + i * (Math.PI * 2 / 8) + performance.now() * 0.01;
      const dist = 4 + (i % 3) * 3 + (1 - alpha) * 8;
      const sx = x2 + Math.cos(ang) * dist;
      const sy = y2 + Math.sin(ang) * dist;
      ctx.fillStyle = i % 2 ? 'rgba(170,230,255,0.95)' : 'rgba(255,255,255,0.95)';
      ctx.beginPath();
      ctx.arc(sx, sy, 1.6 + (i % 2) * 0.8, 0, Math.PI * 2);
      ctx.fill();
    }

    // 시작점 글로우
    const g = ctx.createRadialGradient(x1, y1, 0, x1, y1, 14);
    g.addColorStop(0, 'rgba(255,255,255,0.95)');
    g.addColorStop(0.35, 'rgba(160,225,255,0.75)');
    g.addColorStop(1, 'rgba(100,180,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x1, y1, 14, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
