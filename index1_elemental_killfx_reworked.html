  function avgWeaponDamage(){
    const w = (player && player.weapon) ? player.weapon : { min:14, max:20 };
    return (num(w.min,14) + num(w.max,20)) * 0.5;
  }
  function ensureChargeState(){
    if(!player) return;
    const st = (typeof getChargeState === 'function')
      ? getChargeState()
      : (player.chargeState || (player.chargeState = { frenzy:0, frenzyMax:5, frenzyLastGainFrame:0, endurance:0, enduranceMax:5, enduranceLastGainFrame:0, enduranceLastHitFrame:0 }));
    if(typeof st.frenzy !== 'number') st.frenzy = 0;
    if(typeof st.frenzyMax !== 'number') st.frenzyMax = 5;
    if(typeof st.endurance !== 'number') st.endurance = 0;
    if(typeof st.enduranceMax !== 'number') st.enduranceMax = 5;
    if(typeof st.frenzyLastGainFrame !== 'number') st.frenzyLastGainFrame = 0;
    if(typeof st.enduranceLastGainFrame !== 'number') st.enduranceLastGainFrame = 0;
    if(typeof st.enduranceLastHitFrame !== 'number') st.enduranceLastHitFrame = 0;

    // legacy aliases kept in sync for older UI/patch code
    player.frenzyCharges = st.frenzy;
    player.frenzyChargeMax = st.frenzyMax;
    player.frenzyLastGainFrame = st.frenzyLastGainFrame;
    player.enduranceCharges = st.endurance;
    player.enduranceChargeMax = st.enduranceMax;
    player.enduranceLastGainFrame = st.enduranceLastGainFrame;
    player.enduranceLastHitFrame = st.enduranceLastHitFrame;
    return st;
  }
  ensureChargeState();

  function getLinkedSpellId(){
    const links = player && player.skillLinks ? player.skillLinks : null;
    const supports = links && Array.isArray(links.supports) ? links.supports : [];
    for(const sid of supports){
      const sk = window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[sid];
      if(sk && sk.source === 'spell') return sid;
    }
    return null;
  }

  function getApplicableSupportsForSkill(skill){
    const links = player && player.skillLinks ? player.skillLinks : null;
    const supports = links && Array.isArray(links.supports) ? links.supports : [];
    const out = [];
    for(const sid of supports){
      const def = window.__getSupportGem && window.__getSupportGem(sid);
      if(def && (!window.__supportAppliesToSkill || window.__supportAppliesToSkill(sid, skill))) out.push(def);
    }
    return out;
  }
  window.getApplicableSupportsForSkill = getApplicableSupportsForSkill;

  function hasSupport(list, id){ return Array.isArray(list) && list.some(v => v && v.id === id); }


  function applyCommonSupportOnHit(skill, dealt){
    if(!player || !skill) return;
    dealt = num(dealt, 0);
    if(!(dealt > 0)) return;
    const supports = getApplicableSupportsForSkill(skill);
    if(!supports || !supports.length) return;

    if(hasSupport(supports, 'lifeLeechSupport') || hasSupport(supports, 'maxLifeSupport') || hasSupport(supports, 'maxLifePercentSupport')){
      player.hp = Math.min(player.maxHp || player.hp || 0, (player.hp || 0) + dealt * 0.08);
    }

    if(hasSupport(supports, 'frenzyChargeOnHitSupport') && Math.random() < 0.20){
      ensureChargeState();
      const cs = player.chargeState || getChargeState();
      cs.frenzyMax = Math.max(cs.frenzyMax || 5, 5);
      cs.frenzy = Math.min(cs.frenzyMax || 5, (cs.frenzy || 0) + 1);
      cs.frenzyLastGainFrame = (typeof frameCount === 'number') ? frameCount : 0;
      player.frenzyCharges = cs.frenzy;
      player.frenzyChargeMax = cs.frenzyMax;
      player.frenzyLastGainFrame = cs.frenzyLastGainFrame;
    }

    if(hasSupport(supports, 'enduranceChargeOnHitSupport') && Math.random() < 0.25){
      ensureChargeState();
      const cs = player.chargeState || getChargeState();
      cs.enduranceMax = Math.max(cs.enduranceMax || 5, 5);
      cs.endurance = Math.min(cs.enduranceMax || 5, (cs.endurance || 0) + 1);
      cs.enduranceLastGainFrame = (typeof frameCount === 'number') ? frameCount : 0;
      cs.enduranceLastHitFrame = cs.enduranceLastGainFrame;
      player.enduranceCharges = cs.endurance;
      player.enduranceChargeMax = cs.enduranceMax;
      player.enduranceLastGainFrame = cs.enduranceLastGainFrame;
      player.enduranceLastHitFrame = cs.enduranceLastHitFrame;
    }
  }
  window.applyCommonSupportOnHit = applyCommonSupportOnHit;

  function getModifiedSkill(skill){
    if(!skill) return skill;
    ensureChargeState();
    const mod = Object.assign({}, skill);
    const supports = getApplicableSupportsForSkill(skill);
    const frenzy = Math.max(0, num(player && player.chargeState && player.chargeState.frenzy, 0));
    if(frenzy > 0){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) / (1 + frenzy * 0.05);
      mod.baseMul = num(mod.baseMul, 1) * (1 + frenzy * 0.04);
    }
    if(hasSupport(supports, 'meleePhysicalDamageSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 1.18;
    }
    if(hasSupport(supports, 'increasedAreaMeleeSupport')){
      if(mod.radius) mod.radius = Math.round(num(mod.radius, 0) * 1.35);
      if(mod.angleDeg) mod.angleDeg = Math.round(num(mod.angleDeg, 0) * 1.15);
      if(mod.splashRadius) mod.splashRadius = Math.round(num(mod.splashRadius, 0) * 1.25);
      if(mod.explodeRadius) mod.explodeRadius = Math.round(num(mod.explodeRadius, 0) * 1.18);
    }
    if(hasSupport(supports, 'fasterAttacksSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 0.82;
    }
    if(hasSupport(supports, 'fasterCastingSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 0.82;
    }
    if(hasSupport(supports, 'greaterMultipleProjectilesSupport')){
      mod.projectileCount = num(mod.projectileCount, 1) + 4;
      if(mod.projectileSpreadDeg) mod.projectileSpreadDeg = num(mod.projectileSpreadDeg, 0) + 18;
    }
    
    const __spellRangeMul = Math.max(0.6, player.spellRangeMul || 1);
    const __meleeRangeMul = Math.max(0.6, player.passiveRangeMul || 1);
    const __tags = Array.isArray(mod.tags) ? mod.tags : [];
    const __isSpellNode = mod.source === 'spell' || __tags.includes('spell');
    const __isMeleeNode = __tags.includes('melee');
    if(__isSpellNode){
      if(mod.radius) mod.radius = Math.round(num(mod.radius, 0) * __spellRangeMul);
      if(mod.explodeRadius) mod.explodeRadius = Math.round(num(mod.explodeRadius, 0) * __spellRangeMul);
      if(mod.impactRadius) mod.impactRadius = Math.round(num(mod.impactRadius, 0) * __spellRangeMul);
      if(mod.beamLength) mod.beamLength = Math.round(num(mod.beamLength, 0) * __spellRangeMul);
      if(mod.beamWidth) mod.beamWidth = Math.round(num(mod.beamWidth, 0) * __spellRangeMul);
      if(mod.splashRadius) mod.splashRadius = Math.round(num(mod.splashRadius, 0) * __spellRangeMul);
    }
    if(__isMeleeNode){
      if(mod.radius) mod.radius = Math.round(num(mod.radius, 0) * __meleeRangeMul);
      if(mod.angleDeg) mod.angleDeg = Math.round(num(mod.angleDeg, 0) * (1 + ((player.passiveRangeMul || 1) - 1) * 0.55));
      if(mod.splashRadius) mod.splashRadius = Math.round(num(mod.splashRadius, 0) * __meleeRangeMul);
    }

    return mod;
  }
  window.getModifiedActiveSkill = getModifiedSkill;

  const oldCritChance = typeof window.getCritChance === 'function' ? window.getCritChance : null;
  if(oldCritChance){
    window.getCritChance = function(){
      let out = oldCritChance.apply(this, arguments);
      const act = window.__supportActionState;
      if(act && Array.isArray(act.supports)){
        if(hasSupport(act.supports, 'increasedCriticalStrikesSupport')) out += 0.12;
        if(hasSupport(act.supports, 'controlledDestructionSupport')) out *= 0.20;
      }
      return Math.max(0, out);
    };
  }
  const oldCritMulti = typeof window.getCritMulti === 'function' ? window.getCritMulti : null;
  if(oldCritMulti){
    window.getCritMulti = function(){
      let out = oldCritMulti.apply(this, arguments);
      const act = window.__supportActionState;
      if(act && Array.isArray(act.supports) && hasSupport(act.supports, 'increasedCriticalDamageSupport')) out += 0.60;
      return out;
    };
  }

  const oldPlayerTaken = typeof window.applyPlayerTakenDamageMods === 'function' ? window.applyPlayerTakenDamageMods : null;
  if(oldPlayerTaken){
    window.applyPlayerTakenDamageMods = function(incoming, ctx){
      let out = oldPlayerTaken.call(this, incoming, ctx);
      ensureChargeState();
      const endurance = Math.max(0, num(player && player.chargeState && player.chargeState.endurance, 0));
      if(endurance > 0) out *= Math.max(0.4, 1 - endurance * 0.04);
      return out;
    };
  }

  const oldCompute = window.computeFinalDamage;
  if(typeof oldCompute === 'function'){
    window.computeFinalDamage = function(base, ctx, opt){
      const res = oldCompute.call(this, base, ctx, opt);
      const act = window.__supportActionState;
      if(!act || !ctx) return res;
      const supports = act.supports || [];
      const enemy = ctx.enemy;
      let pkt = makeDamagePacket(
        res.afterOutgoingPacket?.phys||0,
        res.afterOutgoingPacket?.fire||0,
        res.afterOutgoingPacket?.cold||0,
        res.afterOutgoingPacket?.lightning||0,
        res.afterOutgoingPacket?.chaos||0
      );
      const skill = act.skill || null;
      const tags = Array.isArray(ctx.tags) ? ctx.tags : [];
      const isAttack = tags.includes('attack');
      const isSpell = tags.includes('spell');
      const isMelee = tags.includes('melee');
      const weaponAvg = avgWeaponDamage();

      if(hasSupport(supports, 'meleePhysicalDamageSupport') && isMelee) pkt.phys *= 1.45;
      if(hasSupport(supports, 'addedFireDamageSupport')) pkt.fire += weaponAvg * 0.28;
      if(hasSupport(supports, 'addedColdDamageSupport')) pkt.cold += weaponAvg * 0.28;
      if(hasSupport(supports, 'addedLightningDamageSupport')) pkt.lightning += weaponAvg * 0.28;
      if(hasSupport(supports, 'spellbladeSupport') && isSpell) pkt.phys += weaponAvg * 0.60;
      if(hasSupport(supports, 'controlledDestructionSupport') && isSpell) pkt = scaleDamagePacket(pkt, 1.40);
      if(hasSupport(supports, 'elementalDamageWithAttacksSupport') && isAttack){
        pkt.fire *= 1.35; pkt.cold *= 1.35; pkt.lightning *= 1.35;
      }
      if(hasSupport(supports, 'brutalitySupport')){
        pkt.phys *= 1.50;
        pkt.fire = 0; pkt.cold = 0; pkt.lightning = 0; pkt.chaos = 0;
      }
      if(hasSupport(supports, 'multistrikeSupport')) pkt = scaleDamagePacket(pkt, 0.80);
      if(hasSupport(supports, 'greaterMultipleProjectilesSupport') && tags.includes('projectile')) pkt = scaleDamagePacket(pkt, 0.65);
      if(hasSupport(supports, 'castOnCriticalSupport')) pkt = scaleDamagePacket(pkt, 0.75);
      if(hasSupport(supports, 'ruthlessSupport') && act.ruthlessProc) pkt = scaleDamagePacket(pkt, 2.00);

      let afterCrit = pkt;
      if(res.crit && res.crit.isCrit){
        afterCrit = scaleDamagePacket(pkt, res.crit.multi || 1);
      }
      let dealtPkt = applyEnemyTakenDamageModsPacket(afterCrit, ctx);
      dealtPkt = applyEnemyResistsPacket(dealtPkt, enemy);
      res.afterOutgoingPacket = pkt;
      res.afterOutgoing = sumDamagePacket(pkt);
      res.dealtPacket = dealtPkt;
      res.dealt = sumDamagePacket(dealtPkt);
      res.crit = Object.assign({}, res.crit, { dmg: res.crit && res.crit.isCrit ? res.afterOutgoing * (res.crit.multi||1) : res.afterOutgoing });

      if(enemy && hasSupport(supports, 'cullingStrikeSupport') && enemy.hp > 0 && enemy.maxHp > 0){
        if(enemy.hp <= enemy.maxHp * 0.10) res.dealt = Math.max(res.dealt, enemy.hp + 1);
      }

      if(res.dealt > 0){
        if(hasSupport(supports, 'castOnCriticalSupport') && res.crit && res.crit.isCrit && !window.__supportTriggeringSpell){
          const linkedSpellId = getLinkedSpellId();
          const linkedSkill = linkedSpellId && window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[linkedSpellId];
          if(linkedSkill && linkedSkill.source === 'spell'){
            window.__supportTriggeringSpell = true;
            setTimeout(function(){
              try{
                const links = player && player.skillLinks ? player.skillLinks : null;
                if(!links) return;
                const prev = links.active;
                links.active = linkedSpellId;
                window.__supportExtraCast = true;
                const fn = window.__supportBaseUseActiveSkill || window.useActiveSkill;
                if(typeof fn === 'function') fn();
                links.active = prev;
              }catch(err){ console.warn('cast on crit trigger failed', err); }
              window.__supportExtraCast = false;
              window.__supportTriggeringSpell = false;
            }, 0);
          }
        }
      }
      return res;
    };
  }

  const oldUse = window.useActiveSkill;
  if(typeof oldUse === 'function'){
    window.__supportBaseUseActiveSkill = oldUse;
    const ruthlessCounter = {};
    window.useActiveSkill = function(){
      const activeId = player && player.skillLinks ? player.skillLinks.active : null;
      const origSkill = activeId && window.ACTIVE_SKILLS ? window.ACTIVE_SKILLS[activeId] : null;
      if(!origSkill) return oldUse.apply(this, arguments);
      const modSkill = getModifiedSkill(origSkill);
      const supports = getApplicableSupportsForSkill(origSkill);
      const firstCall = !window.__supportExtraAttack && !window.__supportExtraCast;
      if(firstCall){
        ruthlessCounter[origSkill.id] = (ruthlessCounter[origSkill.id] || 0) + 1;
      }
      const actionState = {
        skillId: origSkill.id,
        skill: modSkill,
        supports,
        ruthlessProc: hasSupport(supports, 'ruthlessSupport') && ((ruthlessCounter[origSkill.id] || 0) % 3 === 0)
      };
      window.__supportActionState = actionState;
      let out;
      const prev = window.ACTIVE_SKILLS[activeId];
      window.ACTIVE_SKILLS[activeId] = modSkill;
      try{
        out = oldUse.apply(this, arguments);
      } finally {
        window.ACTIVE_SKILLS[activeId] = prev;
        window.__supportActionState = null;
      }

      if(firstCall && !window.__supportTriggeringSpell){
        if(hasSupport(supports, 'multistrikeSupport') && Array.isArray(origSkill.tags) && origSkill.tags.includes('attack') && origSkill.id !== 'whirlwind'){
          [90, 180].forEach(function(delay){
            setTimeout(function(){
              try{ window.__supportExtraAttack = true; oldUse.call(window); }catch(err){ console.warn('multistrike failed', err); } finally { window.__supportExtraAttack = false; }
            }, delay);
          });
        }
        if(hasSupport(supports, 'spellEchoSupport') && origSkill.source === 'spell'){
          setTimeout(function(){
            try{ window.__supportExtraCast = true; oldUse.call(window); }catch(err){ console.warn('spell echo failed', err); } finally { window.__supportExtraCast = false; }
          }, 110);
        }
      }
      return out;
    };
  }

  if(typeof update === 'function' && !window.__SUPPORT_GEM_UPDATE_WRAP__){
    const oldUpdate = update;
    update = function(){
      ensureChargeState();
      if(typeof frameCount === 'number' && player && player.chargeState){
        const cs = player.chargeState;
        if((cs.frenzy || 0) > 0 && frameCount - (cs.frenzyLastGainFrame || 0) > 240){
          cs.frenzy = 0;
          player.frenzyCharges = 0;
        }
        if((cs.endurance || 0) > 0 && frameCount - (cs.enduranceLastGainFrame || 0) > 360){
          cs.endurance = 0;
          player.enduranceCharges = 0;
        }
      }
      return oldUpdate.apply(this, arguments);
    };
    window.__SUPPORT_GEM_UPDATE_WRAP__ = true;
  }
})();

<script>
(function(){
  if(window.__SUPPORT_GEM_PREVIEW_FIX_V2__) return;
  window.__SUPPORT_GEM_PREVIEW_FIX_V2__ = true;

  function num(v,d){ v = Number(v); return Number.isFinite(v) ? v : (d||0); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function getEquippedWeapon(){
    if(typeof equipment !== 'undefined' && equipment && equipment.weapon) return equipment.weapon;
    return null;
  }

  function getBaseWeaponStats(){
    let min = num(player && player.weapon && player.weapon.min, 14);
    let max = num(player && player.weapon && player.weapon.max, 20);
    let atk = Math.max(0.1, num(player && player.weapon && player.weapon.attackSpeed, 1));
    try{
      const ew = getEquippedWeapon();
      if(ew && typeof getWeaponDisplayStats === 'function'){
        const ws = getWeaponDisplayStats(ew);
        if(ws){
          if(Number.isFinite(Number(ws.min))) min = Number(ws.min);
          if(Number.isFinite(Number(ws.max))) max = Number(ws.max);
          if(Number.isFinite(Number(ws.atkMul))) atk = Math.max(0.1, Number(ws.atkMul));
        }
      }
    }catch(_e){}
    return { min, max, atk, avg:(min+max)*0.5, dps:((min+max)*0.5)*atk };
  }

  function getActiveSkillPreviewData(){
    const links = (player && player.skillLinks) ? player.skillLinks : { active:'attack', supports:[] };
    const activeId = links.active || 'attack';
    const skill = (window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[activeId]) || { id:'attack', name:'기본 공격', source:'weapon', tags:['attack','melee','physical'], baseMul:1 };
    const supports = (typeof getApplicableSupportsForSkill === 'function') ? getApplicableSupportsForSkill(skill) : [];
    const supportIds = supports.map(s=>s.id);
    const weapon = getBaseWeaponStats();
    let min = weapon.min, max = weapon.max;
    let speed = weapon.atk;
    let critChance = (typeof getCritChance === 'function') ? getCritChance() : 0.05;
    let critMulti = (typeof getCritMulti === 'function') ? getCritMulti() : 1.5;

    const tags = Array.isArray(skill.tags) ? skill.tags : [];
    const isAttack = tags.includes('attack');
    const isSpell = skill.source === 'spell' || tags.includes('spell');
    const isMelee = tags.includes('melee');
    const isProjectile = tags.includes('projectile');

    const baseMul = Math.max(0.01, num(skill.baseMul, 1));
    min *= baseMul; max *= baseMul;

    if(skill.cooldownSec > 0){
      speed = 1 / Math.max(0.05, num(skill.cooldownSec, 0));
    }
    if(skill.useTimeRatio){
      speed *= 1 / Math.max(0.05, num(skill.useTimeRatio, 1));
    }
    if(skill.hitInterval){
      speed *= 60 / Math.max(1, num(skill.hitInterval, 60));
    }

    if(supportIds.includes('meleePhysicalDamageSupport') && isMelee){ min *= 1.45; max *= 1.45; speed *= 0.85; }
    if(supportIds.includes('multistrikeSupport') && isAttack && isMelee){ min *= 0.80*3; max *= 0.80*3; speed *= 1.20; }
    if(supportIds.includes('increasedCriticalStrikesSupport')) critChance += 0.12;
    if(supportIds.includes('increasedCriticalDamageSupport')) critMulti += 0.60;
    if(supportIds.includes('addedFireDamageSupport')){ min += weapon.avg*0.28; max += weapon.avg*0.28; }
    if(supportIds.includes('addedColdDamageSupport')){ min += weapon.avg*0.28; max += weapon.avg*0.28; }
    if(supportIds.includes('addedLightningDamageSupport')){ min += weapon.avg*0.28; max += weapon.avg*0.28; }
    if(supportIds.includes('ruthlessSupport') && isMelee){ min *= 1.33; max *= 1.33; }
    if(supportIds.includes('fasterAttacksSupport') && isAttack) speed *= 1.22;
    if(supportIds.includes('elementalDamageWithAttacksSupport') && isAttack){ min *= 1.18; max *= 1.18; }
    if(supportIds.includes('brutalitySupport')){ min *= 1.50; max *= 1.50; }
    if(supportIds.includes('controlledDestructionSupport') && isSpell){ min *= 1.40; max *= 1.40; critChance *= 0.20; }
    if(supportIds.includes('fasterCastingSupport') && isSpell) speed *= 1.22;
    if(supportIds.includes('spellEchoSupport') && isSpell){ min *= 2.0; max *= 2.0; }
    if(supportIds.includes('spellbladeSupport') && isSpell){ min += weapon.avg*0.60; max += weapon.avg*0.60; }
    if(supportIds.includes('castOnCriticalSupport')){ min *= 0.75; max *= 0.75; }
    if(supportIds.includes('greaterMultipleProjectilesSupport') && isProjectile){ min *= 5*0.65; max *= 5*0.65; }

    if(skill.repeats && !supportIds.includes('multistrikeSupport')){ min *= num(skill.repeats,1); max *= num(skill.repeats,1); }
    if(skill.projectileCount && !supportIds.includes('greaterMultipleProjectilesSupport')){ min *= num(skill.projectileCount,1); max *= num(skill.projectileCount,1); }
    if(skill.impacts){ min *= Math.max(1, num(skill.impacts,1)*0.45); max *= Math.max(1, num(skill.impacts,1)*0.45); }

    critChance = clamp(critChance, 0, 0.95);

    const avg = (min + max) * 0.5;
    const critFactor =
      1 + critChance * (Math.max(1, critMulti) - 1);

    let doubleFactor = 1;
    if(skill && skill.extra){
      const ddMin = num(skill.extra.doubleDamageChanceMin, 0);
      const ddMax = num(skill.extra.doubleDamageChanceMax, 0);
      const ddAvg = Math.max(0, (ddMin + ddMax) * 0.5);
      doubleFactor += ddAvg;
    }

    const dps = Math.max(
      0,
      avg * critFactor * doubleFactor * Math.max(0.1, speed)
    );

    return {
      activeId,
      name: skill.name || '기본 공격',
      min: Math.max(1, Math.round(min)),
      max: Math.max(1, Math.round(max)),
      speed: Math.max(0.1, speed),
      critChancePct: critChance * 100,
      critMultiPct: Math.max(1, critMulti) * 100,
      dps: Math.max(0, dps),
      supportIds,
      skill
    };
  }

  window.__getActiveSkillPreviewData = getActiveSkillPreviewData;
  window.getSkillGemBoardDpsText = function(){
    const pv = getActiveSkillPreviewData();
    return 'DPS ' + Math.round(pv.dps).toLocaleString();
  };

  function prependCombatBlockFixed(){
    try{
      if(typeof specTextEl === 'undefined' || !specTextEl) return;
      const base = String(specTextEl.textContent || '').trim();
      const old1='[전투 정보]';
      const old2='[기존 캐릭터 정보]';
      let rest = base;
      if(rest.startsWith(old1)){
        const idx = rest.indexOf(old2);
        if(idx >= 0) rest = rest.slice(idx + old2.length).trim();
      }
      const pv = getActiveSkillPreviewData();
      const top = [
        '[전투 정보]',
        `현재 스킬: ${pv.name}`,
        `최종 피해: ${pv.min} ~ ${pv.max}`,
        `치명타 확률: ${pv.critChancePct.toFixed(1)}%`,
        `치명타 피해배율: ${pv.critMultiPct.toFixed(0)}%`,
        `공격 속도: ${pv.speed.toFixed(2)}`
      ].join('\n');
      specTextEl.textContent = `${top}\n\n[기존 캐릭터 정보]\n${rest}`;
    }catch(err){ console.warn('spec combat block fix failed', err); }
  }
  window.__prependCombatBlockFixed = prependCombatBlockFixed;

  if(typeof renderEquipPanel === 'function'){
    const old = renderEquipPanel;
    window.renderEquipPanel = function(){
      const out = old.apply(this, arguments);
      prependCombatBlockFixed();
      return out;
    };
  }
  const oldAfter = (window.GameHooks && window.GameHooks.afterRenderPanels) || null;
  window.GameHooks = window.GameHooks || {};
  window.GameHooks.afterRenderPanels = function(){
    try{ if(typeof oldAfter === 'function') oldAfter(); }catch(_){ }
    prependCombatBlockFixed();
  };

  if(typeof renderSkillGemUI === 'function'){
    const oldRender = renderSkillGemUI;
    window.renderSkillGemUI = function(){
      const out = oldRender.apply(this, arguments);
      try{
        const el = document.getElementById('skillGemBoardDps');
        if(el) el.textContent = window.getSkillGemBoardDpsText();
      }catch(_){ }
      return out;
    };
  }

  if(typeof setActiveSkill === 'function'){
    const oldSet = setActiveSkill;
    window.setActiveSkill = function(id){
      const out = oldSet.apply(this, arguments);
      try{ prependCombatBlockFixed(); }catch(_){ }
      return out;
    };
  }
  if(typeof toggleSupportSocket === 'function'){
    const oldToggle = toggleSupportSocket;
    window.toggleSupportSocket = function(id){
      const out = oldToggle.apply(this, arguments);
      try{ prependCombatBlockFixed(); }catch(_){ }
      return out;
    };
  }
})();

/* HUD 정렬 */
(function(){
  function pos(){
    const bag = document.getElementById("btnBag");
    const passive = document.getElementById("btnPassive");
    const skills = document.getElementById("btnSkills");
    if(!bag || !passive || !skills) return;
    const r = bag.getBoundingClientRect();
    skills.style.position="fixed";
    skills.style.left=r.left+"px";
    skills.style.top=(r.top-70)+"px";
    passive.style.position="fixed";
    passive.style.left=r.left+"px";
    passive.style.top=(r.top-140)+"px";
  }
  requestAnimationFrame(function loop(){pos();requestAnimationFrame(loop);});
})();

</script>


<script>
(function(){
  if(typeof window.drawIsoEnemySprite !== 'function' || typeof ctx === 'undefined') return;
  const prevDraw = window.drawIsoEnemySprite;
  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  const num = (v,d=0)=>Number.isFinite(+v)?+v:d;
  const lerp = (a,b,t)=>a+(b-a)*t;

  function ensureCorpseState(e){
    if(!e || e.type === 'boss') return;
    e.dead = true;
    e.hp = 0;

    e.deathMax = Math.max(num(e.deathMax,0), e.deathHold + e.deathFade);

      e.__deathStartedTimer = e.deathTimer;
    }
    if(!(num(e.lastHitDirX,0) || num(e.lastHitDirY,0))){
      const px = (window.player && player.x) || ((e.x||0)-1);
      const py = (window.player && player.y) || (e.y||0);
      const dx = (e.x||0) - px, dy = (e.y||0) - py;
      const len = Math.hypot(dx,dy) || 1;
      e.lastHitDirX = dx/len;
      e.lastHitDirY = dy/len;
    }
  }

  window.drawIsoEnemySprite = function(sx, sy, e){
    if(!e || e.type === 'boss') return prevDraw ? prevDraw.apply(this, arguments) : undefined;
    if(!(e.dead || num(e.hp,0) <= 0 || e.__corpseFinalized)){
      return prevDraw ? prevDraw.apply(this, arguments) : undefined;
    }

    ensureCorpseState(e);

    // Keep skeleton handling from prior renderer since size was fixed there.
    if(e.type === 'skeleton'){
      return prevDraw ? prevDraw.apply(this, arguments) : undefined;
    }

    const elapsed = Math.max(0, (e.__deathStartedTimer || e.deathMax) - num(e.deathTimer, e.deathMax));
    const alpha = clamp(1 - Math.max(0, elapsed - e.deathHold) / Math.max(1, e.deathFade), 0, 1);

    // Force a clear dead pose even under multi-hit skills where earlier code sometimes left
    // the live standing sprite visible. We bias the pose toward the final fallen state.
    const dirX = (num(e.lastHitDirX,1) >= 0) ? 1 : -1;
    const dirY = num(e.lastHitDirY,0);
    const isHeavy = (e.type === 'orc' || e.type === 'demon');
    const settle = Math.max(0.92, Math.min(1, elapsed / (isHeavy ? 20 : 16)));
    const slide = (isHeavy ? 14 : 11) * settle;
    const sink = (isHeavy ? 11 : 9) * settle;
    const rot = (isHeavy ? 1.95 : 1.82) * dirX;
    const squashY = lerp(1, isHeavy ? 0.60 : 0.58, settle);

    ctx.save();
    ctx.translate(sx, sy);
    ctx.globalAlpha *= alpha;

    

    if(prevDraw){
      const savedDead = e.dead;
      const savedHp = e.hp;
      const savedCorpse = e.__corpseFinalized;
      const savedTimer = e.deathTimer;
      const savedStart = e.__deathStartedTimer;
      const savedElapsed = e.__deathElapsed;
      const savedHit = e.hitReact;
      const savedFlash = e.hitFlash;
      e.dead = false;
      e.hp = 1;
      e.__corpseFinalized = false;
      e.deathTimer = 0;
      e.__deathStartedTimer = 0;
      e.__deathElapsed = 0;
      e.hitReact = 0;
      e.hitFlash = 0;
      try{
        ctx.save();
        ctx.translate(dirX*slide, dirY*slide*0.25 + sink);
        ctx.rotate(rot);
        ctx.scale(1, squashY);
        prevDraw.call(this, 0, 0, e);
        ctx.restore();
      } finally {
        e.dead = savedDead;
        e.hp = savedHp;
        e.__corpseFinalized = savedCorpse;
        e.deathTimer = savedTimer;
        e.__deathStartedTimer = savedStart;
        e.__deathElapsed = savedElapsed;
        e.hitReact = savedHit;
        e.hitFlash = savedFlash;
      }
    }

    ctx.restore();
    return;
  };
})();

      }else if(typeof window.spawnFireZone === 'function'){
        window.spawnFireZone(tx, ty, Math.max(1, Math.floor(N(e.damage,1) * 0.90)));
      }
      if(Array.isArray(window.particles)){
        for(let i=0;i<10;i++){
          window.particles.push({
            x:N(e.x,0), y:N(e.y,0)-8, vx:(Math.random()-0.5)*1.2, vy:-Math.random()*0.9,
            life:12 + Math.floor(Math.random()*8), alpha:0.65, size:2.2 + Math.random()*1.8, kind:'arrowSpark'
          });
        }
      }
      e.attackFrame = 18;
      e.castCooldown = 90 + Math.floor(Math.random()*25);
    }
  };

  const prevDrawOrc = window.drawIsoOrcWarriorSprite;
  window.drawIsoOrcWarriorSprite = function(sx, sy, e){
    if(!e) return typeof prevDrawOrc === 'function' ? prevDrawOrc.apply(this, arguments) : undefined;
    const bob = Math.sin(((window.frameCount||0) * 0.08) + N(e.aiPulse,0)) * 0.6;
    const face = ((e.vx||0) < -0.05 || (e.lastHitDirX||0) < -0.2) ? -1 : 1;
    const wind = N(e.chargeWindup,0) > 0 ? 1 - N(e.chargeWindup,0)/12 : 0;
    const dash = N(e.chargeFrames,0) > 0 ? 1 - N(e.chargeFrames,0)/18 : 0;

    if(typeof window.ctx !== 'undefined'){
      const ctx = window.ctx;
      ctx.save();
      ctx.translate(sx + face * (wind*7 + dash*9), sy + bob);
      ctx.scale(2.0, 2.0);
      ctx.translate(-sx, -sy);
      if(typeof prevDrawOrc === 'function') prevDrawOrc.call(this, sx, sy, e);
      if(wind > 0){
        ctx.fillStyle = 'rgba(210,170,90,' + (0.16 + wind*0.22) + ')';
      }
      ctx.restore();
      return;
    }
    return typeof prevDrawOrc === 'function' ? prevDrawOrc.apply(this, arguments) : undefined;
  };

  const prevDrawDemon = window.drawIsoDemonSprite;
  window.drawIsoDemonSprite = function(sx, sy, e){
    if(!e) return typeof prevDrawDemon === 'function' ? prevDrawDemon.apply(this, arguments) : undefined;
    const bob = Math.sin(((window.frameCount||0) * 0.11) + N(e.aiPulse,0)) * 0.8;
    const face = ((e.vx||0) < -0.05 || (e.lastHitDirX||0) < -0.2) ? -1 : 1;

    if(typeof window.ctx !== 'undefined'){
      const ctx = window.ctx;
      if(N(e.shadowDashFrames,0) > 0 && typeof prevDrawDemon === 'function'){
        for(let i=2;i>=1;i--){
          const a = 0.10 + i*0.06;
          ctx.save();
          ctx.globalAlpha *= a;
          ctx.translate((face<0?-1:1) * -i*16, i*3);
          ctx.translate(sx, sy+bob);
          ctx.scale(2.2, 2.2);
          ctx.translate(-sx, -sy);
          prevDrawDemon.call(this, sx, sy, e);
          ctx.restore();
        }
      }
      ctx.save();
      ctx.translate(sx, sy+bob);
      ctx.scale(2.2, 2.2);
      ctx.translate(-sx, -sy);
      if(typeof prevDrawDemon === 'function') prevDrawDemon.call(this, sx, sy, e);
      if(typeof window.drawIsoDisc === 'function'){
      }
      ctx.restore();
      return;
    }
    return typeof prevDrawDemon === 'function' ? prevDrawDemon.apply(this, arguments) : undefined;
  };

  const prevDrawCorpse = window.drawDeadNonSkeleton;
  if(typeof prevDrawCorpse === 'function'){
    window.drawDeadNonSkeleton = function(sx, sy, e){
      if(e && (e.type === 'orc' || e.type === 'demon') && typeof window.ctx !== 'undefined'){
        const scale = e.type === 'orc' ? 1.65 : 1.80;
        const ctx = window.ctx;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.scale(scale, scale);
        ctx.translate(-sx, -sy);
        prevDrawCorpse.call(this, sx, sy, e);
        ctx.restore();
        return;
      }
      return prevDrawCorpse.apply(this, arguments);
    };
  }
})();

<script>
(function(){
  if(window.__CORPSE_SYSTEM_CLEAN_FINAL__) return;
  window.__CORPSE_SYSTEM_CLEAN_FINAL__ = true;

  function num(v, d){ v = Number(v); return Number.isFinite(v) ? v : d; }
  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
  function isNormalEnemy(e){ return !!e && e.type !== 'boss'; }
  function isHeavyCorpseType(e){ return !!e && (e.type === 'orc' || e.type === 'demon'); }

  const CORPSE_CFG = Object.freeze({
    normal: { hold: 720, fade: 240, anim: 22, slide: 10, sink: 6, tilt: 1.45 },
    heavy:  { hold: 1200, fade: 360, anim: 28, slide: 13, sink: 8, tilt: 1.58 }
  });

  function corpseCfg(e){ return isHeavyCorpseType(e) ? CORPSE_CFG.heavy : CORPSE_CFG.normal; }

  function ensureCorpseState(e){
    if(!isNormalEnemy(e)) return false;

    const cfg = corpseCfg(e);
    const wasDead = !!e.dead;
    e.dead = true;
    e.hp = 0;
    e.stun = 0;
    e.invul = Math.max(num(e.invul, 0), 9999);
    e.hitReact = 0;
    e.hitFlash = Math.max(num(e.hitFlash, 0), 4);

    if(!(e.lastHitDirX || e.lastHitDirY)){
      const px = (window.player && num(player.x, 0)) || (num(e.x, 0) - 1);
      const py = (window.player && num(player.y, 0)) || num(e.y, 0);
      const dx = num(e.x, 0) - px;
      const dy = num(e.y, 0) - py;
      const len = Math.hypot(dx, dy) || 1;
      e.lastHitDirX = dx / len;
      e.lastHitDirY = dy / len;
    }

    const side = (num(e.lastHitDirX, 1) >= 0) ? 1 : -1;
    e.deathAnimMax = Math.max(num(e.deathAnimMax, 0), cfg.anim);
    e.deathHold = Math.max(num(e.deathHold, 0), cfg.hold);
    e.deathFade = Math.max(num(e.deathFade, 0), cfg.fade);
    e.deathMax = Math.max(num(e.deathMax, 0), e.deathHold + e.deathFade);
    e.deathTilt = Number.isFinite(e.deathTilt) ? e.deathTilt : side * cfg.tilt;
    e.deathFallDX = Number.isFinite(e.deathFallDX) ? e.deathFallDX : num(e.lastHitDirX, side) * cfg.slide;
    e.deathFallDY = Number.isFinite(e.deathFallDY) ? e.deathFallDY : num(e.lastHitDirY, 0) * (cfg.slide * 0.55);

    if(!wasDead || !Number.isFinite(e.__deathStartedTimer)){
      e.deathTimer = Math.max(1, num(e.deathTimer, e.deathMax));
      e.__deathStartedTimer = Math.max(1, num(e.__deathStartedTimer, e.deathTimer));
      e.__deathElapsed = 0;
    }else{
      e.deathTimer = clamp(num(e.deathTimer, e.deathMax), 1, Math.max(1, e.deathMax));
      e.__deathStartedTimer = Math.max(num(e.__deathStartedTimer, e.deathTimer), e.deathTimer);
      e.__deathElapsed = Math.max(0, e.__deathStartedTimer - e.deathTimer);
    }
    return true;
  }

  function finalizeCorpseDeath(e, sourceTag){
    if(!isNormalEnemy(e)) return true;
    if(e.__corpseFinalized) {
      ensureCorpseState(e);
      return true;
    }

    ensureCorpseState(e);
    e.__corpseFinalized = true;
    e.__deathFinalized = true;
    e.__corpseSource = sourceTag || 'normal';

    try{ if(typeof emitEvent === 'function') emitEvent('kill', { enemy:e, x:e.x, y:e.y, type:e.type, source: sourceTag || 'normal' }); }catch(_){ }
    try{ if(typeof spawnEnemyDeathBurst === 'function') spawnEnemyDeathBurst(e.x, e.y, e.type, getEnemyKillFxKind(e, 'physical')); }catch(_){ }
    try{
      if(typeof findNearestLootDropPos === 'function' && typeof spawnLoot === 'function'){
        const p = findNearestLootDropPos(e.x, e.y);
        spawnLoot(p.x, p.y, sourceTag || 'normal');
      }else if(typeof spawnLoot === 'function'){
        spawnLoot(e.x, e.y, sourceTag || 'normal');
      }
    }catch(_){ }
    try{ if(typeof giveXP === 'function') giveXP(e); }catch(_){ }
    try{ if(window.killCount != null) window.killCount++; }catch(_){ }
    try{
      if(window.player){
        const hpOnKill = (window.getGlobalStats && getGlobalStats().hpOnKill) || 0;
        if(hpOnKill > 0) player.hp = Math.min(player.maxHp, player.hp + hpOnKill);
      }
    }catch(_){ }
    return true;
  }

  window.ensureDeathState = ensureCorpseState;
  window.finalizeNormalEnemyDeath = finalizeCorpseDeath;

  function applyPlayerLifeLeech(dealt){
    if(!window.player) return;
    const gear = player.gear || {};
    const passiveLeech = Number(player.lifeLeech || 0);
    const gearLeech = Number(gear.lifeLeech || 0);
    const totalLeech = Math.max(0, passiveLeech + gearLeech);
    if(!(totalLeech > 0)) return;
    dealt = Math.max(0, Number(dealt || 0));
    if(!(dealt > 0)) return;
    const heal = dealt * totalLeech;
    if(!(heal > 0)) return;
    player.hp = Math.min(player.maxHp || player.hp || 0, (player.hp || 0) + heal);
  }

  function applyPlayerHpOnHit(){
    if(!window.player) return;
    const gear = player.gear || {};
    const heal = Math.max(0, Number(gear.hpOnHit || 0));
    if(!(heal > 0)) return;
    player.hp = Math.min(player.maxHp || player.hp || 0, (player.hp || 0) + heal);
  }

  function applyPlayerHpOnKill(){
    if(!window.player) return;
    const gear = player.gear || {};
    const heal = Math.max(0, Number(gear.hpOnKill || 0));
    if(!(heal > 0)) return;
    player.hp = Math.min(player.maxHp || player.hp || 0, (player.hp || 0) + heal);
  }

  function applyEnemyBleedProc(enemy, dealt){
    if(!enemy || enemy.type === 'boss') return;
    const gear = player.gear || {};
    const chance = Math.max(0, Number(gear.bleedChance || 0));
    if(!(chance > 0) || Math.random() >= chance) return;
    enemy.bleed = {
      life: Math.max(75, Number(enemy.bleed && enemy.bleed.life || 0)),
      tick: 0,
      damage: Math.max(Number(enemy.bleed && enemy.bleed.damage || 0), Math.max(1, dealt * 0.18))
    };
  }

  function applyExtraKnockbackProc(enemy){
    if(!enemy || !window.player) return;
    const gear = player.gear || {};
    const chance = Math.max(0, Number(gear.knockbackChance || 0));
    if(!(chance > 0) || Math.random() >= chance) return;
    const dx = Number(enemy.x || 0) - Number(player.x || 0);
    const dy = Number(enemy.y || 0) - Number(player.y || 0);
    const len = Math.hypot(dx, dy) || 1;
    enemy.knockbackX = Number(enemy.knockbackX || 0) + (dx/len) * 3.6;
    enemy.knockbackY = Number(enemy.knockbackY || 0) + (dy/len) * 3.6;
    enemy.stun = Math.max(Number(enemy.stun || 0), 10);
  }

  function applyMeleeSplashProc(enemy, dealt){
    if(!window.player || !Array.isArray(window.enemies)) return;
    const gear = player.gear || {};
    const chance = Math.max(0, Number(gear.cleaveChance || 0));
    if(!(chance > 0) || Math.random() >= chance) return;

    const splash = dealt * 0.45;
    if(!(splash > 0)) return;

    const rangeMul = Math.max(0.6, Number(gear.rangeMul || 1));
    const radius = 90 * rangeMul;
    const r2 = radius * radius;

    for(const other of enemies){
      if(!other || other.hp <= 0 || other.dead) continue;
      const dx = Number(other.x || 0) - Number(player.x || 0);
      const dy = Number(other.y || 0) - Number(player.y || 0);
      if(dx*dx + dy*dy > r2) continue;

      if(typeof damageEnemyDirect === 'function'){
        damageEnemyDirect(other, splash, { isSecondary:true });
      }else{
        other.hp = Math.max(0, Number(other.hp || 0) - splash);
        other.hitFlash = Math.max(Number(other.hitFlash || 0), 4);

        if(other.hp <= 0 && typeof finalizeCorpseDeath === 'function'){
          finalizeCorpseDeath(other, 'skill');
        }
      }
    }
  }

  window.startEnemyDeath = function(e){
    if(!isNormalEnemy(e)) return false;
    return finalizeCorpseDeath(e, e.__corpseSource || 'skill');
  };

  window.damageEnemyDirect = function(enemy, dealt, opt){
    opt = opt || {};
    if(!enemy) return false;
    dealt = Math.max(0, num(dealt, 0));
    if(!(dealt > 0)) return false;

    const gear = (window.player && player.gear) ? player.gear : {};
    const isSecondary = !!opt.isSecondary;

    if(enemy.type === 'boss'){
      const ratio = num(enemy.hp, 0) / Math.max(1, num(enemy.maxHp, enemy.hp));
      if(!isSecondary && ratio <= 0.18 && Math.random() < Math.max(0, Number(gear.executeChance || 0))){
        dealt = Math.max(dealt, num(enemy.hp, 0));
      }
      enemy.hp = num(enemy.hp, 0) - dealt;
      applyPlayerLifeLeech(dealt);
      applyPlayerHpOnHit();
      enemy.hitFlash = Math.max(num(enemy.hitFlash, 0), 6);
      if(enemy.hp <= 0){
        try{ if(typeof startBossDeath === 'function') startBossDeath(enemy); }catch(_){ }
        applyPlayerHpOnKill();
        return true;
      }
      return false;
    }

    if(enemy.dead || enemy.__corpseFinalized || num(enemy.hp, 0) <= 0){
      ensureCorpseState(enemy);
      return false;
    }

    try{ if(typeof rememberHitFromPlayer === 'function') rememberHitFromPlayer(enemy); }catch(_){ }

    const ratio = num(enemy.hp, 0) / Math.max(1, num(enemy.maxHp, enemy.hp));
    if(!isSecondary && ratio <= 0.18 && Math.random() < Math.max(0, Number(gear.executeChance || 0))){
      dealt = Math.max(dealt, num(enemy.hp, 0));
    }

    enemy.hp = num(enemy.hp, 0) - dealt;
    applyPlayerLifeLeech(dealt);
    applyPlayerHpOnHit();
    applyEnemyBleedProc(enemy, dealt);
    enemy.hitFlash = Math.max(num(enemy.hitFlash, 0), 6);

    if(window.player){
      const dx = num(enemy.x, 0) - num(player.x, 0);
      const dy = num(enemy.y, 0) - num(player.y, 0);
      const len = Math.hypot(dx, dy) || 1;
      enemy.knockbackX = num(enemy.knockbackX, 0) + (dx/len) * 1.8;
      enemy.knockbackY = num(enemy.knockbackY, 0) + (dy/len) * 1.8;
    }
    applyExtraKnockbackProc(enemy);

    if(!isSecondary && Math.random() < Math.max(0, Number(gear.doubleHitChance || 0))){
      const bonus = dealt * 0.65;
      if(bonus > 0 && enemy.hp > 0){
        enemy.hp = Math.max(0, num(enemy.hp, 0) - bonus);
        applyPlayerLifeLeech(bonus);
        applyPlayerHpOnHit();
      }
    }

    if(!isSecondary){
      applyMeleeSplashProc(enemy, dealt);
    }

    if(enemy.hp <= 0){
      applyPlayerHpOnKill();
      return finalizeCorpseDeath(enemy, 'skill');
    }
    return false;
  };

  window.pruneDeadEnemies = function(){
    if(!Array.isArray(window.enemies)) return;
    for(let i = enemies.length - 1; i >= 0; i--){
      const e = enemies[i];
      if(!e) { enemies.splice(i,1); continue; }
      if(e.type === 'boss'){
        if(e.dead && num(e.deathTimer, 1) <= 0) enemies.splice(i,1);
        continue;
      }
      if(e.dead || e.__corpseFinalized || num(e.hp, 0) <= 0){
        ensureCorpseState(e);
        if(num(e.deathTimer, 1) <= 0) enemies.splice(i,1);
      }
    }
  };

  const __prevUpdateSingleEnemyClean = window.updateSingleEnemy;
  if(typeof __prevUpdateSingleEnemyClean === 'function'){
    window.updateSingleEnemy = function(e){
      if(isNormalEnemy(e) && (e.dead || e.__corpseFinalized || num(e.hp, 0) <= 0)){
        ensureCorpseState(e);
        e.deathTimer = Math.max(0, num(e.deathTimer, 0) - 1);
        e.__deathElapsed = Math.max(0, num(e.__deathStartedTimer, e.deathMax) - e.deathTimer);
        return;
      }
      return __prevUpdateSingleEnemyClean.apply(this, arguments);
    };
  }

  const __prevApplyCircleClean = window.applyCircleSkillDamage;
  if(typeof __prevApplyCircleClean === 'function'){
    window.applyCircleSkillDamage = function(cx, cy, radius, damage, skill, extraTags){
      if(!Array.isArray(window.enemies)) return __prevApplyCircleClean.apply(this, arguments);
      const r2 = radius * radius;
      let hits = 0;
      for(const e of enemies){
        if(!e || e.type === 'boss') continue;
        if(e.dead || e.__corpseFinalized || num(e.hp, 0) <= 0) continue;
        const dx = num(e.x, 0) - cx;
        const dy = num(e.y, 0) - cy;
        if((dx*dx + dy*dy) > r2) continue;
        if(typeof rollSkillHitAgainstEnemy === 'function'){
          const result = rollSkillHitAgainstEnemy(e, damage, skill, extraTags);
          if(result && result.hit && result.dealt > 0){
            window.damageEnemyDirect(e, result.dealt);
            hits++;
          }
        }else{
          window.damageEnemyDirect(e, damage);
          hits++;
        }
      }
      return hits;
    };
  }

  console.log('[corpse-clean] final authoritative corpse system enabled');
})();

// ===============================
// ✅ MINIMAP NAME FIX (drawMinimap ↔ drawMiniMap)
// - 기존 코드가 drawMinimap()을 호출하는데 실제 구현은 drawMiniMap()인 경우가 있어

// ===============================
// ✅ Weapon stat full-connect patch
// - elemental weapon multipliers (fire/cold/light/chaos)
// - spell multiplier passthrough for spell-tagged skills
// - runtime gear rebuild includes extended multiplier keys
// ===============================
(function(){
  if(window.__WEAPON_STAT_FULL_CONNECT_PATCH_V1__) return;
  window.__WEAPON_STAT_FULL_CONNECT_PATCH_V1__ = true;

  function __num(v, d){
    v = Number(v);
    return Number.isFinite(v) ? v : d;
  }

  function __newExtendedGearState(){
    const base = (typeof defaultBuffStats === 'function') ? defaultBuffStats() : {};
    return Object.assign(base, {
      flatDamageAdd: __num(base.flatDamageAdd, 0),
      lifeLeech: __num(base.lifeLeech, 0),
      hpOnHit: __num(base.hpOnHit, 0),
      hpOnKill: __num(base.hpOnKill, 0),
      bleedChance: __num(base.bleedChance, 0),
      knockbackChance: __num(base.knockbackChance, 0),
      cleaveChance: __num(base.cleaveChance, 0),
      doubleHitChance: __num(base.doubleHitChance, 0),
      executeChance: __num(base.executeChance, 0),
      critChanceVsBoss: __num(base.critChanceVsBoss, 0),
      bossDamageMul: __num(base.bossDamageMul, 1),
      eliteDamageMul: __num(base.eliteDamageMul, 1),
      fireResAdd: __num(base.fireResAdd, 0),
      coldResAdd: __num(base.coldResAdd, 0),
      lightResAdd: __num(base.lightResAdd, 0),
      chaosResAdd: __num(base.chaosResAdd, 0),
      allResAdd: __num(base.allResAdd, 0),
      fireMul: __num(base.fireMul, 1),
      coldMul: __num(base.coldMul, 1),
      lightMul: __num(base.lightMul, 1),
      chaosMul: __num(base.chaosMul, 1),
      spellMul: __num(base.spellMul, 1)
    });
  }

  function __mergeGearStat(dst, stat, value){
    const v = __num(value, 0);
    if(!Number.isFinite(v)) return;
    if(stat === 'flatDamage') stat = 'flatDamageAdd';

    switch(stat){
      case 'dmgMul':
      case 'atkSpdMul':
      case 'spdMul':
      case 'rangeMul':
      case 'bossDamageMul':
      case 'eliteDamageMul':

    if(id.startsWith('wpk_')) continue;

        const out = [];
        const baseRoll = Number(roll.value || 0);
        affix.mods.forEach((spec, idx)=>{
          if(!spec || !spec.stat) return;
          const scale = (typeof spec.scale === 'number') ? spec.scale : 1;
          const scaled = baseRoll * scale;
          let value = scaled;
          let op = spec.op || MOD_OPS.add;
          switch(spec.kind){
            case 'pctMul': value = scaled / 100; op = MOD_OPS.more; break;

            case 'flat': value = scaled; op = MOD_OPS.add; break;

          out.push({
            id: `affix:${roll.kind}:${affix.id}:t${roll.tier}:${idx}`,
            source: roll.kind,
            scope: 'gear',
            stat: spec.stat,
            op,
            value,

    };

  }

    __affixLineHTML = function(mod){
      const a = mod && (mod.affix || mod);

    };

  }

(function(){

  window.ACTIVE_SKILLS = window.ACTIVE_SKILLS || {};
  Object.assign(window.ACTIVE_SKILLS, {

    const dx = (enemy.x || 0) - (player.x || 0);
    const dy = (enemy.y || 0) - (player.y || 0);
    const len = Math.hypot(dx, dy) || 1;
    const nx = dx / len;
    const ny = dy / len;
    return {
      x: (enemy.x || 0) - nx * Math.max(6, er * 0.72),
      y: (enemy.y || 0) - ny * Math.max(6, er * 0.72),
      nx,

    };
  }

    const len = Math.hypot(dx, dy) || 1;
    const mul = 4.8 + Math.min(4.5, power * 0.9);
    enemy.knockbackX = (enemy.knockbackX || 0) + (dx / len) * mul;
    enemy.knockbackY = (enemy.knockbackY || 0) + (dy / len) * mul;

  function applyConeDamage(skill, radius, angleDeg, baseDamage, extraTags){
    const aim = getPlayerAimAngle();
    const half = (angleDeg * Math.PI / 180) * 0.5;
    const isHeavyStrike = !!(skill && skill.id === "heavyStrike");

    for(const e of enemies){
      if(!e || e.hp <= 0) continue;

      const dx = e.x - player.x;
      const dy = e.y - player.y;
      const dist = Math.hypot(dx, dy);
      if(dist > radius + getEnemyRadius(e)) continue;

      const ang = Math.atan2(dy, dx);
      const diff = Math.abs(normalizeAngle(ang - aim));
      if(diff > half) continue;

      const ctx = buildSkillCtx(skill, e, extraTags);
      const result = computeFinalDamage(baseDamage, ctx);
      rememberEnemyKillFxKind(e, result.dealtPacket || result.afterCritPacket || result.afterOutgoingPacket || result.rawPacket, "physical");
      applyCommonSupportOnHit(skill, result.dealt);
      damageEnemyDirect(e, result.dealt);

      if(isHeavyStrike && (result.dealt || 0) > 0){
        const power = Math.max(1, Math.min(6, (result.dealt || 0) / 18));
        spawnHeavyStrikeImpact(e, power);
        applyHeavyStrikeKnockback(e, power);

    const steps = Math.ceil(Math.hypot(x2-x1,y2-y1) / 16);
    for(let i=1;i<steps;i++){
      const t = i / steps;
      const x = x1 + (x2-x1) * t;
      const y = y1 + (y2-y1) * t;
      const tx = Math.floor(x / tileSize);
      const ty = Math.floor(y / tileSize);
      if(!map[ty] || map[ty][tx] === 1) return true;
    }
    return false;

      particles.push({ x, y, vx:0, vy:0, life:10, kind:'arrowSpark', alpha:0.9, size:10*scale });
    }
  }

  /* -----------------------------
     3) 투사체 업데이트/그리기
  ----------------------------- */
    function distancePointToSegment(px, py, x1, y1, x2, y2){
    const vx = x2 - x1;
    const vy = y2 - y1;
    const wx = px - x1;
    const wy = py - y1;

    const c1 = vx * wx + vy * wy;
    if(c1 <= 0) return Math.hypot(px - x1, py - y1);

    const c2 = vx * vx + vy * vy;
    if(c2 <= c1) return Math.hypot(px - x2, py - y2);

    const b = c1 / c2;
    const bx = x1 + b * vx;
    const by = y1 + b * vy;
    return Math.hypot(px - bx, py - by);
  }

  function isWallAtWorld(x, y){
    const tx = Math.floor(x / tileSize);
    const ty = Math.floor(y / tileSize);
    if(!map[ty]) return true;
    return map[ty][tx] === 1;
  }

  function projectileTouchesWall(prevX, prevY, nextX, nextY, radius){
    const steps = Math.max(2, Math.ceil(Math.hypot(nextX - prevX, nextY - prevY) / 6));
    for(let i = 0; i <= steps; i++){
      const t = i / steps;
      const sx = prevX + (nextX - prevX) * t;
      const sy = prevY + (nextY - prevY) * t;

      if(isWallAtWorld(sx, sy)) return { hit:true, x:sx, y:sy };

      // 반지름 보정
      if(isWallAtWorld(sx + radius, sy)) return { hit:true, x:sx + radius, y:sy };
      if(isWallAtWorld(sx - radius, sy)) return { hit:true, x:sx - radius, y:sy };
      if(isWallAtWorld(sx, sy + radius)) return { hit:true, x:sx, y:sy + radius };
      if(isWallAtWorld(sx, sy - radius)) return { hit:true, x:sx, y:sy - radius };
    }
    return { hit:false, x:nextX, y:nextY };
  }

  function updateSkillProjectiles(){
    if(!window.skillProjectiles || !skillProjectiles.length) return;

    for(let i = skillProjectiles.length - 1; i >= 0; i--){
      const p = skillProjectiles[i];

      const prevX = p.x;
      const prevY = p.y;
      const nextX = p.x + p.dx * (p.speed || 1);
      const nextY = p.y + p.dy * (p.speed || 1);

      p.life--;
      p.age = (p.age || 0) + 1;

      if(p.kind === "fireball"){
        p.spin = (p.spin || 0) + 0.24;
        p.trailTick = (p.trailTick || 0) + 1;
        if(typeof window.fireEmbers !== "undefined" && Array.isArray(fireEmbers)){
          fireEmbers.push({
            x: p.x - p.dx * 8 + (Math.random()-0.5) * 4,
            y: p.y - p.dy * 8 + (Math.random()-0.5) * 4,
            vx:(Math.random()-0.5) * 0.55 - p.dx * 0.35,
            vy:(Math.random()-0.5) * 0.55 - p.dy * 0.35 - 0.25,
            life: 8 + Math.floor(Math.random() * 6),
            a: 0.58 + Math.random() * 0.22
          });
          if(fireEmbers.length > 320) fireEmbers.splice(0, fireEmbers.length - 320);
        }
        if(p.trailTick % 2 === 0 && typeof window.particles !== "undefined" && Array.isArray(particles)){
          particles.push({
            x: p.x - p.dx * 4,
            y: p.y - p.dy * 4,
            vx:(Math.random()-0.5) * 0.4,
            vy:(Math.random()-0.5) * 0.4 - 0.08,
            life: 8 + Math.floor(Math.random()*4),
            kind:'arrowSpark',
            alpha:0.32,
            size: 4.8 + Math.random() * 2.4
          });
        }
      }

      // 1) 벽 충돌: 경로 전체 검사
      const wallHit = projectileTouchesWall(prevX, prevY, nextX, nextY, p.radius || 8);
      if(wallHit.hit){
        p.x = wallHit.x;
        p.y = wallHit.y;

        if(p.kind === "fireball" || p.kind === "moltenShard"){
          explodeSkillProjectile(p);
        }

        skillProjectiles.splice(i,1);
        continue;
      }

      // 우선 이동 반영
      p.x = nextX;
      p.y = nextY;

      // 2) 적 충돌: 점이 아니라 "이동 경로 선분"으로 검사
      let hitEnemy = null;

      for(const e of enemies){
        if(!e || e.hp <= 0) continue;

        const er = (typeof getEnemyRadius === "function") ? getEnemyRadius(e) : (e.radius || 14);
        const hitDist = distancePointToSegment(e.x, e.y, prevX, prevY, nextX, nextY);

        if(hitDist <= (p.radius || 8) + er){
          hitEnemy = e;
          break;
        }
      }

      if(hitEnemy){
        if(p.kind === "fireball" || p.kind === "moltenShard"){
          // 적 위치에서 터지게
          p.x = hitEnemy.x;
          p.y = hitEnemy.y;
          explodeSkillProjectile(p);
        }else{
          const fakeSkill = { id: p.kind || "projectile", tags: p.tags || [] };
          const ctx = buildCombatCtx(fakeSkill.id, hitEnemy);
          ctx.tags = mergeTags(ctx.tags || [], fakeSkill.tags || []);
          const result = computeFinalDamage(p.damage, ctx);
          rememberEnemyKillFxKind(hitEnemy, result.dealtPacket || result.afterCritPacket || result.afterOutgoingPacket || result.rawPacket, "physical");

          if(typeof damageEnemyDirect === "function"){
            damageEnemyDirect(hitEnemy, result.dealt);
          }else if(typeof window.damageEnemyDirect === "function"){
            window.damageEnemyDirect(hitEnemy, result.dealt);
          }else{
            hitEnemy.hp -= result.dealt;
          }
        }

        skillProjectiles.splice(i,1);
        continue;
      }

      if(p.life <= 0){
        skillProjectiles.splice(i,1);
      }
    }
  }

  function getBodyCastOrigin(dir, opt){
    dir = dir || {x:0, y:0};
    opt = opt || {};
    const forward = Number.isFinite(opt.forward) ? opt.forward : 18;
    const bodyCastY = Number.isFinite(opt.bodyCastY) ? opt.bodyCastY : 40;
    const aimYOffset = Number.isFinite(opt.aimYOffset) ? opt.aimYOffset : 10;
    return {
      x: player.x + dir.x * forward,
      y: player.y + bodyCastY + dir.y * aimYOffset
    };
  }

  function drawSkillProjectiles(){
    if(!window.skillProjectiles || !skillProjectiles.length) return;

    for(const p of skillProjectiles){
      const sp = isoProject(p.x, p.y);
      const pp = isoProject(player.x, player.y);
      const camX = canvas.width * 0.5;
      const camY = canvas.height * 0.5 - (ISO.camYOffset || 0);
      const px = camX + sp.x - pp.x;
      const py = camY + sp.y - pp.y - 6;
      const bodyDrawYOffset = ((p.kind === "fireball") || (p.kind === "moltenShard")) ? 74 : 0;

      ctx.save();
      ctx.translate(px, py + bodyDrawYOffset);
      ctx.rotate(p.angle || 0);

      if(p.kind === "fireball"){
        const spin = p.spin || 0;
        const pulse = 1 + Math.sin((p.age || 0) * 0.55) * 0.08;

        ctx.globalCompositeOperation = 'lighter';

        // 꼬리 불꽃
        ctx.save();
        ctx.rotate(-0.16 + Math.sin(spin * 0.7) * 0.06);
        const tail = ctx.createLinearGradient(-22, 0, 9, 0);
        tail.addColorStop(0.00, 'rgba(255,40,0,0)');
        tail.addColorStop(0.24, 'rgba(255,90,0,0.22)');
        tail.addColorStop(0.68, 'rgba(255,150,50,0.68)');
        tail.addColorStop(1.00, 'rgba(255,240,190,0.92)');
        ctx.fillStyle = tail;
        ctx.beginPath();
        ctx.moveTo(-20, 0);
        ctx.quadraticCurveTo(-12, -7, 5, -4);
        ctx.quadraticCurveTo(11, 0, 5, 4);
        ctx.quadraticCurveTo(-12, 7, -20, 0);
        ctx.fill();
        ctx.restore();

        // 바깥 글로우
        const glow = ctx.createRadialGradient(0,0,2,0,0,16 * pulse);
        glow.addColorStop(0.00, 'rgba(255,255,210,0.95)');
        glow.addColorStop(0.26, 'rgba(255,210,90,0.88)');
        glow.addColorStop(0.58, 'rgba(255,115,20,0.62)');
        glow.addColorStop(1.00, 'rgba(255,60,0,0.00)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0,0,16 * pulse,0,Math.PI*2);
        ctx.fill();

        // 핵심 화염구
        ctx.save();
        ctx.rotate(spin * 0.5);
        ctx.fillStyle = '#ff6a00';
        ctx.beginPath();
        ctx.ellipse(0, 0, 10 * pulse, 8.2 * pulse, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#ffb13b';
        ctx.beginPath();
        ctx.ellipse(1.5, -0.5, 6.7 * pulse, 5.4 * pulse, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,240,200,0.95)';
        ctx.beginPath();
        ctx.arc(3.2, -1.8, 3.2 * pulse, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        // 불꽃 혀
        ctx.save();
        ctx.rotate(spin);
        ctx.fillStyle = 'rgba(255,180,60,0.95)';
        for(let k=0;k<3;k++){
          const ang = k * Math.PI * 2 / 3;
          ctx.save();
          ctx.rotate(ang);
          ctx.beginPath();
          ctx.moveTo(2,0);
          ctx.quadraticCurveTo(8,-2.5,11.5,0);
          ctx.quadraticCurveTo(8,2.5,2,0);
          ctx.fill();
          ctx.restore();
        }
        ctx.restore();

        ctx.globalCompositeOperation = 'source-over';
      }else if(p.kind === "moltenShard"){
        const spin = p.spin || 0;
        const pulse = 1 + Math.sin((p.age || 0) * 0.7) * 0.06;
        ctx.globalCompositeOperation = 'lighter';

        // 아주 작은 용암 글로우
        const glow = ctx.createRadialGradient(0,0,1,0,0,8 * pulse);
        glow.addColorStop(0.00, 'rgba(255,240,170,0.92)');
        glow.addColorStop(0.34, 'rgba(255,155,60,0.75)');
        glow.addColorStop(1.00, 'rgba(255,70,0,0.00)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0,0,8 * pulse,0,Math.PI*2);
        ctx.fill();

        // 작은 불덩이 꼬리
        ctx.save();
        ctx.rotate(-0.12 + Math.sin(spin * 0.5) * 0.04);
        const tail = ctx.createLinearGradient(-10, 0, 4, 0);
        tail.addColorStop(0.00, 'rgba(255,70,0,0.00)');
        tail.addColorStop(0.45, 'rgba(255,120,20,0.26)');
        tail.addColorStop(1.00, 'rgba(255,220,170,0.68)');
        ctx.fillStyle = tail;
        ctx.beginPath();
        ctx.moveTo(-9, 0);
        ctx.quadraticCurveTo(-4, -2.8, 3.5, -1.8);
        ctx.quadraticCurveTo(5, 0, 3.5, 1.8);
        ctx.quadraticCurveTo(-4, 2.8, -9, 0);
        ctx.fill();
        ctx.restore();

        // 코어
        ctx.save();
        ctx.rotate(spin * 0.45);
        ctx.fillStyle = '#ff6a00';
        ctx.beginPath();
        ctx.ellipse(0, 0, 4.8 * pulse, 3.8 * pulse, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ffbf55';
        ctx.beginPath();
        ctx.ellipse(0.8, -0.3, 2.8 * pulse, 2.2 * pulse, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,245,210,0.95)';
        ctx.beginPath();
        ctx.arc(1.6, -0.9, 1.3 * pulse, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        ctx.globalCompositeOperation = 'source-over';
      }

      ctx.restore();
    }
  }

  /* -----------------------------
     4) 번개 빔
  ----------------------------- */

  window.__spellCastSigils = window.__spellCastSigils || [];

  function spawnSpellCastSigil(skill, aim, opt){
    if(!skill) return;
    const tags = Array.isArray(skill.tags) ? skill.tags : [];
    const isSpell = skill.source === "spell" || tags.includes("spell");
    if(!isSpell) return;

    const origin = getBodyCastOrigin(aim || getAimUnit(), { forward: 10, bodyCastY: 40, aimYOffset: 10 });
    __spellCastSigils.push({
      x: origin.x,
      y: origin.y,
      life: 18,
      maxLife: 18,
      radius: (opt && opt.radius) || 34,
      color: (opt && opt.color) || (tags.includes("fire") ? "255,140,70" :
             tags.includes("cold") ? "120,220,255" :
             tags.includes("lightning") ? "150,210,255" : "255,235,170"),
      spin: Math.random() * Math.PI * 2
    });
  }

  function updateSpellCastSigils(){
    if(!window.__spellCastSigils || !__spellCastSigils.length) return;
    for(let i = __spellCastSigils.length - 1; i >= 0; i--){
      const fx = __spellCastSigils[i];
      fx.life--;
      fx.spin += 0.07;
      if(fx.life <= 0) __spellCastSigils.splice(i, 1);
    }
  }

  function drawSpellCastSigils(){
    if(!window.__spellCastSigils || !__spellCastSigils.length) return;

    const camX = canvas.width * 0.5;
    const camY = canvas.height * 0.5 - (ISO.camYOffset || 0);
    const pp = isoProject(player.x, player.y);

    for(const fx of __spellCastSigils){
      const sp = isoProject(fx.x, fx.y);
      const px = camX + sp.x - pp.x;
      const py = camY + sp.y - pp.y + 36;

      const t = fx.life / Math.max(1, fx.maxLife || 1);
      const grow = 1 - t;
      const r = fx.radius * (0.72 + grow * 0.28);

      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, t)) * 0.95;

      const glow = ctx.createRadialGradient(px, py, 0, px, py, r * 1.3);
      glow.addColorStop(0, 'rgba(' + fx.color + ',0.16)');
      glow.addColorStop(0.55, 'rgba(' + fx.color + ',0.10)');
      glow.addColorStop(1, 'rgba(' + fx.color + ',0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(px, py, r * 1.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(' + fx.color + ',0.95)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for(let i=0;i<5;i++){
        const a = fx.spin - Math.PI/2 + i * (Math.PI * 2 / 5);
        const sx = px + Math.cos(a) * r;
        const sy = py + Math.sin(a) * r;
        if(i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.closePath();
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(px, py, r * 0.88, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      for(let i=0;i<5;i++){
        const a = fx.spin + Math.PI/2 + i * (Math.PI * 4 / 5);
        const sx = px + Math.cos(a) * (r * 0.92);
        const sy = py + Math.sin(a) * (r * 0.92);
        if(i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.closePath();
      ctx.stroke();

      ctx.restore();
    }
  }

function useLightningBeam(skill){
  player.skillSwingStyle = "infernal";
  player.skillSwingTimer = Math.max(5, Math.round(getSkillUseTimeMs(skill, 0.24) / 16));
  player.__skillVisualTotalFrames = player.skillSwingTimer;
  player.skillSwingPower = 1.08;

  const aim = getSpellAim(520);
  spawnSpellCastSigil(skill, aim, { radius: 32 });
  const base = rollSpellBaseDamage(skill);
  const origin = getBodyCastOrigin(aim, { forward: 18, bodyCastY: 40, aimYOffset: 10 });
  const sx = origin.x;
  const sy = origin.y;
  for(const e of enemies){
    if(!e || e.hp <= 0) continue;

    const ex = e.x - sx;
    const ey = e.y - sy;

    const forward = ex * aim.x + ey * aim.y;
    if(forward < 0 || forward > skill.beamLength) continue;

    const side = Math.abs(ex * (-aim.y) + ey * aim.x);
    const er = (typeof getEnemyRadius === "function") ? getEnemyRadius(e) : (e.radius || 14);
    if(side > (skill.beamWidth * 0.5) + er) continue;

    const ctx = buildCombatCtx(skill.id, e);
    ctx.tags = mergeTags(ctx.tags || [], skill.tags || []);
    const result = computeFinalDamage(base, ctx);
    rememberEnemyKillFxKind(e, result.dealtPacket || result.afterCritPacket || result.afterOutgoingPacket || result.rawPacket, "physical");
    applyCommonSupportOnHit(skill, result.dealt);

    if(typeof damageEnemyDirect === "function"){
      damageEnemyDirect(e, result.dealt);
    }else if(typeof window.damageEnemyDirect === "function"){
      window.damageEnemyDirect(e, result.dealt);
    }else{
      e.hp -= result.dealt;
    }
  }

  window.__lastLightningBeam = {
    x1: sx,
    y1: sy,
    x2: sx + aim.x * skill.beamLength,
    y2: sy + aim.y * skill.beamLength,
    life: 7,
    maxLife: 7,
    drawYOffset: 74,
    seed: Math.random() * 9999,
    sparkSeed: Math.random() * Math.PI * 2
  };
}

  function updateLightningBeamFx(){
    if(window.__lastLightningBeam && __lastLightningBeam.life > 0){
      __lastLightningBeam.life--;
    }
  }

  function __drawJaggedLightningPath(x1, y1, x2, y2, seed, jitter, segments){
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len;
    const ny = dx / len;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    for(let i=1;i<segments;i++){
      const t = i / segments;
      const bx = x1 + dx * t;
      const by = y1 + dy * t;
      const wave = Math.sin(seed + i * 1.83 + performance.now() * 0.045) * jitter;
      const taper = 1 - Math.abs(0.5 - t) * 0.55;
      ctx.lineTo(bx + nx * wave * taper, by + ny * wave * taper);
    }
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  function drawLightningBeamFx(){
    if(!window.__lastLightningBeam || __lastLightningBeam.life <= 0) return;

    const a = __lastLightningBeam;
    const p1 = isoProject(a.x1, a.y1);
    const p2 = isoProject(a.x2, a.y2);
    const pp = isoProject(player.x, player.y);
    const camX = canvas.width * 0.5;
    const camY = canvas.height * 0.5 - (ISO.camYOffset || 0);
    const beamDrawYOffset = a.drawYOffset || 0;
    const x1 = camX + p1.x - pp.x;
    const y1 = camY + p1.y - pp.y + beamDrawYOffset;
    const x2 = camX + p2.x - pp.x;
    const y2 = camY + p2.y - pp.y + beamDrawYOffset;
    const alpha = Math.max(0, a.life / (a.maxLife || 7));

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowBlur = 18;
    ctx.shadowColor = 'rgba(120,210,255,0.9)';

    ctx.strokeStyle = 'rgba(90,170,255,0.22)';
    ctx.lineWidth = 10;
    __drawJaggedLightningPath(x1, y1, x2, y2, a.seed, 14, 9);

    ctx.strokeStyle = 'rgba(150,220,255,0.60)';
    ctx.lineWidth = 5;
    __drawJaggedLightningPath(x1, y1, x2, y2, a.seed + 10.3, 8, 10);

    ctx.shadowBlur = 8;
    ctx.strokeStyle = '#f3fdff';
    ctx.lineWidth = 2.2;
    __drawJaggedLightningPath(x1, y1, x2, y2, a.seed + 21.7, 3.5, 11);

    // 착탄 스파크
    ctx.shadowBlur = 0;
    for(let i=0;i<8;i++){
      const ang = a.sparkSeed + i * (Math.PI * 2 / 8) + performance.now() * 0.01;
      const dist = 4 + (i % 3) * 3 + (1 - alpha) * 8;
      const sx = x2 + Math.cos(ang) * dist;
      const sy = y2 + Math.sin(ang) * dist;
      ctx.fillStyle = i % 2 ? 'rgba(170,230,255,0.95)' : 'rgba(255,255,255,0.95)';
      ctx.beginPath();
      ctx.arc(sx, sy, 1.6 + (i % 2) * 0.8, 0, Math.PI * 2);
      ctx.fill();
    }

    // 시작점 글로우
    const g = ctx.createRadialGradient(x1, y1, 0, x1, y1, 14);
    g.addColorStop(0, 'rgba(255,255,255,0.95)');
    g.addColorStop(0.35, 'rgba(160,225,255,0.75)');
    g.addColorStop(1, 'rgba(100,180,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x1, y1, 14, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  /* -----------------------------
     5) 스킬 실행기
  ----------------------------- */
  function useFireball(skill){

  player.skillSwingStyle = "double";
  player.skillSwingTimer = Math.max(5, Math.round(getSkillUseTimeMs(skill, 0.22) / 16));
  player.__skillVisualTotalFrames = player.skillSwingTimer;
  player.skillSwingPower = 0.90;

  const aim = getSpellAim(520);
  spawnSpellCastSigil(skill, aim, { radius: 28 });
  const base = rollSpellBaseDamage(skill);
  const supportList = (typeof getApplicableSupportsForSkill === "function") ? (getApplicableSupportsForSkill(skill) || []) : [];
  const hasGmp = supportList.some(s => s && s.id === "greaterMultipleProjectilesSupport");
  const count = Math.max(1, Number(skill.projectileCount || 1) + (hasGmp ? 4 : 0));
  const spread = Number(skill.projectileSpreadDeg || 0) + (hasGmp ? 18 : 0);
  const start = -spread * 0.5;
  const step = (count <= 1) ? 0 : (spread / (count - 1));

  const castOrigin = getBodyCastOrigin(aim, { forward: 18, bodyCastY: 40, aimYOffset: 10 });
  spawnFireballExplosionFx(castOrigin.x + aim.x * 6, castOrigin.y + aim.y * 6, 0.48);

  for(let i=0;i<count;i++){
    const deg = start + step * i;
    const a = Math.atan2(aim.y, aim.x) + (deg * Math.PI / 180);
    const dx = Math.cos(a);
    const dy = Math.sin(a);

    const origin = getBodyCastOrigin({ x: dx, y: dy }, { forward: 18, bodyCastY: 40, aimYOffset: 10 });
    spawnSkillProjectile({
      kind: "fireball",
      x: origin.x,
      y: origin.y,
      dx,
      dy,
      speed: skill.projectileSpeed,
      life: 90,
      damage: hasGmp ? (base * 0.65) : base,
      radius: 8,
      explodeRadius: skill.explodeRadius,
      tags: skill.tags || []
    });
  }

}

  function useMoltenStrike(skill){
    player.skillSwingStyle = "infernal";
    player.skillSwingTimer = Math.max(6, Math.round(getSkillUseTimeMs(skill, 0.26) / 16));
    player.__skillVisualTotalFrames = player.skillSwingTimer;
    player.skillSwingPower = 1.05;

    // 본타
    const base = rollSkillBaseDamage(skill);
    if(typeof applyConeDamage === "function"){
      applyConeDamage(skill, skill.radius, skill.angleDeg, base);
    }

    const supportList = (typeof getApplicableSupportsForSkill === "function") ? (getApplicableSupportsForSkill(skill) || []) : [];
    const hasGmp = supportList.some(s => s && s.id === "greaterMultipleProjectilesSupport");

    // 투사체
    const aim = getAimUnit();
    const spread = Number(skill.projectileSpreadDeg || 70) + (hasGmp ? 18 : 0);
    const count = Math.max(1, Number(skill.projectileCount || 5) + (hasGmp ? 4 : 0));
    const start = -spread * 0.5;
    const step = (count <= 1) ? 0 : (spread / (count - 1));

    for(let i=0;i<count;i++){
      const deg = start + step * i;
      const a = aim.angle + (deg * Math.PI / 180);
      const dx = Math.cos(a);
      const dy = Math.sin(a);

      const origin = getBodyCastOrigin({ x: dx, y: dy }, { forward: 18, bodyCastY: 40, aimYOffset: 10 });
      spawnSkillProjectile({
        kind: "moltenShard",
        x: origin.x,
        y: origin.y,
        dx, dy,
        speed: 7.2,
        life: 55,
        damage: rollWeaponBaseDamage() * (skill.projectileDamageMul || 0.46) * (hasGmp ? 0.65 : 1),
        radius: 7,
        explodeRadius: skill.projectileExplodeRadius || 32,
        tags: ["projectile","fire","aoe"]
      });
    }
  }

  function useBlinkStrike(skill){
    const target = randomEnemyForBlink(skill.blinkRange || 260);
    if(!target) return false;

    const cooldownFrames = Math.round((skill.cooldownSec || 2) * 60);
    const bypassCost = Math.max(0, skill.frenzyBypassCost || 1);
    const onCooldown = getSkillCooldownFrames(skill.id) > 0;
    const canBypass = onCooldown && getFrenzyCharges() >= bypassCost;

    if(onCooldown && !canBypass) return false;
    if(canBypass && !spendFrenzyCharges(bypassCost)) return false;

    player.skillSwingStyle = "infernal";
    player.skillSwingTimer = Math.max(5, Math.round(getSkillUseTimeMs(skill, skill.useTimeRatio || 1) / 16));
    player.__skillVisualTotalFrames = player.skillSwingTimer;
    player.skillSwingPower = 1.12;

    const fromX = player.x;
    const fromY = player.y + 26;
    const dx = target.x - player.x;
    const dy = target.y - player.y;
    const len = Math.hypot(dx, dy) || 1;
    const ox = (dx / len) * 18;
    const oy = (dy / len) * 18;

    player.x = target.x - ox;
    player.y = target.y - oy;
    player.invul = Math.max(player.invul || 0, skill.invulFrames || 3);
    pushBlinkFx(fromX, fromY, player.x, player.y + 26, skill.splashRadius || 92);

    const base = rollAttackSkillBaseDamage(skill);

    const ctx = buildCombatCtx(skill.id, target);
    ctx.tags = mergeTags(ctx.tags || [], skill.tags || []);
    const result = computeFinalDamage(base, ctx);
    rememberEnemyKillFxKind(target, result.dealtPacket || result.afterCritPacket || result.afterOutgoingPacket || result.rawPacket, "physical");
    if(typeof damageEnemyDirect === "function"){
      damageEnemyDirect(target, result.dealt);
    }else if(typeof window.damageEnemyDirect === "function"){
      window.damageEnemyDirect(target, result.dealt);
    }else{
      target.hp -= result.dealt;
    }

    const splashDamage = base * (skill.splashMul || 0.62);
    applyCircleSkillDamage(
      player.x,
      player.y,
      skill.splashRadius || 92,
      splashDamage,
      skill,
      ["aoe","teleport","splash"]
    );

    if(Math.random() < (skill.frenzyGainChance || 0.20)){
      addFrenzyCharges(1);
    }
    getChargeState().frenzyMax = Math.max(getChargeState().frenzyMax || 0, skill.frenzyMax || 5);

    if(!canBypass) startSkillCooldown(skill.id, cooldownFrames);
    return true;
  }

  function __skillLinkEntryId(v){
    if(v == null) return null;
    if(typeof v === "string") return v;
    if(typeof v === "object") return v.id || null;
    return null;
  }

  function getCwcLinkedSpellSkill(){
    const links = (player && player.skillLinks) ? player.skillLinks : null;
    if(!links || links.active !== "whirlwind") return null;

    const supports = Array.isArray(links.supports) ? links.supports : [];
    let hasCwc = false;
    for(const s of supports){
      const sid = __skillLinkEntryId(s);
      if(sid === "castWhileChanneling" || sid === "cwc"){
        hasCwc = true;
        break;
      }
    }
    if(!hasCwc) return null;

    for(const s of supports){
      const sid = __skillLinkEntryId(s);
      if(!sid) continue;
      const sk = ACTIVE_SKILLS && ACTIVE_SKILLS[sid];
      if(sk && sk.source === "spell"){
        return sk;
      }
    }
    return null;
  }

  function getCwcFirestormCenter(skill){
    const aim = getSpellAim(220);
    const enemySearch = 220;
    const enemyScatter = 70;
    const candidates = (window.enemies || []).filter(e =>
      e && e.hp > 0 && !(e.type === "boss" && e.dead) && Math.hypot((e.x || 0) - player.x, (e.y || 0) - player.y) <= enemySearch
    );

    if(candidates.length > 0){
      const near = candidates.sort((a,b)=> Math.hypot((a.x||0)-player.x,(a.y||0)-player.y) - Math.hypot((b.x||0)-player.x,(b.y||0)-player.y)).slice(0, Math.min(6, candidates.length));
      const target = near[(Math.random() * near.length) | 0];
      const jitterA = Math.random() * Math.PI * 2;
      const jitterR = Math.random() * enemyScatter;
      return {
        x: target.x + Math.cos(jitterA) * jitterR,
        y: target.y + Math.sin(jitterA) * jitterR
      };
    }

    const frontBase = 100;
    const frontSpread = 70;
    const ang = Math.atan2(aim.y || 0, aim.x || 1) + (Math.random() - 0.5) * 0.9;
    const dist = frontBase + Math.random() * frontSpread;
    return {
      x: player.x + Math.cos(ang) * dist,
      y: player.y + Math.sin(ang) * dist
    };
  }

  function triggerLinkedCwcSpell(){
    const linkedSpell = getCwcLinkedSpellSkill();
    if(!linkedSpell) return false;

    player.__cwcTick = Math.max(0, (player.__cwcTick || 0) - 1);
    if(player.__cwcTick > 0) return false;

    if(linkedSpell.id === "firestorm"){
      const center = getCwcFirestormCenter(linkedSpell);
      useFirestormAt(linkedSpell, center.x, center.y);
    }else if(linkedSpell.id === "fireball"){
      useFireball(linkedSpell);
    }else if(linkedSpell.id === "lightningBeam"){
      useLightningBeam(linkedSpell);
    }else if(linkedSpell.id === "iceNova"){
      useIceNova(linkedSpell);
    }else{
      return false;
    }

    player.__cwcTick = 10;
    return true;
  }

  function updateWhirlwindState(skill){
    if(!skill || skill.id !== "whirlwind"){
      player.whirlwindActive = false;
      player.whirlwindHitTick = 0;
      player.whirlwindPose = 0;
      player.whirlwindPoseMax = 0;
      player.whirlwindPrevX = player.x;
      player.whirlwindPrevY = player.y;

    if(!window.__skillAttackHeld){

      player.whirlwindPoseMax = 0;
      player.whirlwindPrevX = player.x;
      player.whirlwindPrevY = player.y;

    player.whirlwindActive = true;

    player.skillSwingTimer = 4;

    player.skillSwingPower = 0.72;

    const moveDist = Math.hypot((player.x - (player.whirlwindPrevX || player.x)), (player.y - (player.whirlwindPrevY || player.y)));
    player.whirlwindPrevX = player.x;
    player.whirlwindPrevY = player.y;
    const spinBoost = Math.min(1.45, moveDist / Math.max(0.001, player.speed || 1));
    player.whirlwindSpinPhase = (player.whirlwindSpinPhase || 0) + 0.18 + spinBoost * 0.24;

    if(player.whirlwindPose > 0) player.whirlwindPose--;

    if(player.whirlwindHitTick <= 0){
