function __drawHumanoidMonsterDetail(cfg){
  const e = cfg.e || {};
  const sx = cfg.sx || 0;
  const sy = cfg.sy || 0;
  const r = cfg.r || (e.radius ?? 16);
  const face = cfg.face || 1;
  const bob = cfg.bob || 0;
  const hit = cfg.hit || {x:0,y:0};
  const outline = cfg.outline || "rgba(18,18,18,0.95)";
  const shadowAlpha = cfg.shadowAlpha ?? 0.18;

  const armorFill = cfg.armorFill || "rgba(90,90,96,0.98)";
  const shoulderFill = cfg.shoulderFill || armorFill;
  const armorTrim = cfg.armorTrim || "rgba(0,0,0,0.55)";
  const underFill = cfg.underFill || "rgba(30,26,22,0.96)";
  const skinFill = cfg.skinFill || "rgba(214,182,150,0.98)";
  const eyeFill = cfg.eyeFill || "rgba(255,72,72,0.95)";
  const hornFill = cfg.hornFill || null;
  const hornBackFill = cfg.hornBackFill || hornFill;
  const weaponGrip = cfg.weaponGrip || "rgba(90,58,30,0.98)";
  const weaponBlade = cfg.weaponBlade || "rgba(200,205,215,0.96)";
  const weaponGlow = cfg.weaponGlow || null;
  const beltFill = cfg.beltFill || "rgba(24,18,14,0.95)";
  const faceStripe = cfg.faceStripe || null;
  const helmBand = cfg.helmBand || null;
  const crestFill = cfg.crestFill || null;
  const shoulderSpikeFill = cfg.shoulderSpikeFill || null;
  const wingFill = cfg.wingFill || null;
  const wingInnerFill = cfg.wingInnerFill || null;
  const wingScale = cfg.wingScale || 1;

  function rr(x,y,w,h,rad){
    ctx.beginPath();
    if(ctx.roundRect){
      ctx.roundRect(x,y,w,h,rad);
    }else{
      const r2 = Math.min(rad, Math.abs(w)/2, Math.abs(h)/2);
      ctx.moveTo(x+r2, y);
      ctx.arcTo(x+w, y,   x+w, y+h, r2);
      ctx.arcTo(x+w, y+h, x,   y+h, r2);
      ctx.arcTo(x,   y+h, x,   y,   r2);
      ctx.arcTo(x,   y,   x+w, y,   r2);
      ctx.closePath();
    }
  }

  ctx.save();
  ctx.translate(sx + hit.x, sy + bob + hit.y - 11);
  ctx.scale(1, 0.80);

  if(shadowAlpha > 0 && typeof __drawEnemyShadow === "function"){
    __drawEnemyShadow(r * (cfg.shadowScale || 0.82), cfg.shadowY || 9, 1.0, 0.75, shadowAlpha);
  }

  const hipY = r * 0.12;
  const footY = r * 1.18;
  const torsoTop = -r * 0.58;
  const torsoH = r * (cfg.torsoHeight || 0.72);
  const torsoW = r * (cfg.torsoWidth || 0.84);
  const headR = r * (cfg.headRadius || 0.20);
  const shoulderW = torsoW * 0.28;
  const shoulderH = r * 0.18;

  // legs
  ctx.fillStyle = cfg.legFill || "rgba(28,24,22,0.98)";
  rr(-r*0.28, hipY, r*0.22, r*0.92, r*0.08); ctx.fill();
  rr( r*0.06, hipY, r*0.22, r*0.92, r*0.08); ctx.fill();

  // boots
  ctx.fillStyle = cfg.bootFill || "rgba(18,14,12,0.98)";
  rr(-r*0.31, footY - r*0.12, r*0.26, r*0.16, r*0.06); ctx.fill();
  rr( r*0.05, footY - r*0.12, r*0.26, r*0.16, r*0.06); ctx.fill();

  // under torso
  ctx.fillStyle = underFill;
  rr(-torsoW*0.46, torsoTop, torsoW*0.92, torsoH + r*0.08, r*0.12);
  ctx.fill();

  // armor torso
  ctx.fillStyle = armorFill;
  ctx.strokeStyle = outline;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-torsoW*0.52, torsoTop + r*0.04);
  ctx.lineTo( torsoW*0.52, torsoTop + r*0.04);
  ctx.lineTo( torsoW*0.44, torsoTop + torsoH);
  ctx.lineTo( torsoW*0.18, torsoTop + torsoH + r*0.18);
  ctx.lineTo(-torsoW*0.18, torsoTop + torsoH + r*0.18);
  ctx.lineTo(-torsoW*0.44, torsoTop + torsoH);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // wings behind torso
  if(wingFill){
    const wx = torsoW * 0.62 * wingScale;
    const wy = torsoTop + r*0.10;
    const wh = r * 0.96 * wingScale;
    ctx.fillStyle = wingFill;
    ctx.beginPath();
    ctx.moveTo(-torsoW*0.36, wy);
    ctx.quadraticCurveTo(-wx*0.92, wy + wh*0.12, -wx, wy + wh*0.64);
    ctx.quadraticCurveTo(-wx*0.66, wy + wh*0.38, -torsoW*0.18, wy + wh*0.22);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(torsoW*0.36, wy);
    ctx.quadraticCurveTo(wx*0.92, wy + wh*0.12, wx, wy + wh*0.64);
    ctx.quadraticCurveTo(wx*0.66, wy + wh*0.38, torsoW*0.18, wy + wh*0.22);
    ctx.closePath();
    ctx.fill();
    if(wingInnerFill){
      ctx.fillStyle = wingInnerFill;
      ctx.beginPath();
      ctx.moveTo(-torsoW*0.24, wy + r*0.04);
      ctx.quadraticCurveTo(-wx*0.56, wy + wh*0.16, -wx*0.58, wy + wh*0.48);
      ctx.quadraticCurveTo(-wx*0.38, wy + wh*0.30, -torsoW*0.10, wy + wh*0.18);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(torsoW*0.24, wy + r*0.04);
      ctx.quadraticCurveTo(wx*0.56, wy + wh*0.16, wx*0.58, wy + wh*0.48);
      ctx.quadraticCurveTo(wx*0.38, wy + wh*0.30, torsoW*0.10, wy + wh*0.18);
      ctx.closePath();
      ctx.fill();
    }
  }

  // shoulder plates
  ctx.fillStyle = shoulderFill;
  rr(-torsoW*0.70, torsoTop + r*0.02, shoulderW, shoulderH, r*0.08); ctx.fill(); ctx.stroke();
  rr( torsoW*0.42, torsoTop + r*0.02, shoulderW, shoulderH, r*0.08); ctx.fill(); ctx.stroke();
  if(shoulderSpikeFill){
    ctx.fillStyle = shoulderSpikeFill;
    ctx.beginPath();
    ctx.moveTo(-torsoW*0.60, torsoTop + r*0.00);
    ctx.lineTo(-torsoW*0.80, torsoTop - r*0.18);
    ctx.lineTo(-torsoW*0.38, torsoTop + r*0.06);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(torsoW*0.60, torsoTop + r*0.00);
    ctx.lineTo(torsoW*0.80, torsoTop - r*0.18);
    ctx.lineTo(torsoW*0.38, torsoTop + r*0.06);
    ctx.closePath();
    ctx.fill();
  }

  // belt
  ctx.fillStyle = beltFill;
  rr(-torsoW*0.42, torsoTop + torsoH - r*0.02, torsoW*0.84, r*0.10, r*0.04);
  ctx.fill();

  // chest trim
  ctx.strokeStyle = armorTrim;
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(0, torsoTop + r*0.04);
  ctx.lineTo(0, torsoTop + torsoH + r*0.12);
  ctx.moveTo(-torsoW*0.24, torsoTop + r*0.22);
  ctx.lineTo(0, torsoTop + r*0.48);
  ctx.lineTo(torsoW*0.24, torsoTop + r*0.22);
  ctx.stroke();

  // arms
  ctx.strokeStyle = cfg.armFill || "rgba(30,26,24,0.98)";
  ctx.lineWidth = Math.max(2.6, r*0.14);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-torsoW*0.46, torsoTop + r*0.18);
  ctx.lineTo(-r*0.68, torsoTop + r*0.54);
  ctx.moveTo( torsoW*0.46, torsoTop + r*0.18);
  ctx.lineTo( r*0.70, torsoTop + r*0.54);
  ctx.stroke();

  // head
  const headY = torsoTop - headR*1.25;
  ctx.fillStyle = skinFill;
  ctx.beginPath();
  ctx.arc(0, headY, headR, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();

  if(helmBand){
    ctx.strokeStyle = helmBand;
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.moveTo(-headR*0.78, headY-headR*0.08);
    ctx.lineTo(headR*0.78, headY-headR*0.08);
    ctx.stroke();
  }

  if(faceStripe){
    ctx.strokeStyle = faceStripe;
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(-headR*0.18, headY-headR*0.42);
    ctx.lineTo(headR*0.10, headY+headR*0.72);
    ctx.stroke();
  }

  ctx.fillStyle = eyeFill;
  ctx.beginPath();
  ctx.arc(-headR*0.34, headY-headR*0.05, headR*0.12, 0, Math.PI*2);
  ctx.arc( headR*0.34, headY-headR*0.05, headR*0.12, 0, Math.PI*2);
  ctx.fill();

  if(hornBackFill){
    ctx.fillStyle = hornBackFill;
    ctx.beginPath();
    ctx.moveTo(-headR*0.55, headY-headR*0.45);
    ctx.lineTo(-headR*1.20, headY-headR*1.15);
    ctx.lineTo(-headR*0.44, headY-headR*0.10);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(headR*0.55, headY-headR*0.45);
    ctx.lineTo(headR*1.20, headY-headR*1.15);
    ctx.lineTo(headR*0.44, headY-headR*0.10);
    ctx.closePath();
    ctx.fill();
  }
  if(hornFill){
    ctx.fillStyle = hornFill;
    ctx.beginPath();
    ctx.moveTo(-headR*0.24, headY-headR*0.66);
    ctx.lineTo(-headR*1.02, headY-headR*1.72);
    ctx.lineTo(-headR*0.10, headY-headR*0.30);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(headR*0.24, headY-headR*0.66);
    ctx.lineTo(headR*1.02, headY-headR*1.72);
    ctx.lineTo(headR*0.10, headY-headR*0.30);
    ctx.closePath();
    ctx.fill();
  }

  if(crestFill){
    ctx.strokeStyle = crestFill;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, headY-headR*1.55);
    ctx.lineTo(0, headY-headR*0.30);
    ctx.stroke();
  }

  // weapon
  ctx.strokeStyle = weaponGrip;
  ctx.lineWidth = Math.max(2.6, r*0.15);
  ctx.beginPath();
  ctx.moveTo(r*0.46*face, torsoTop + r*0.30);
  ctx.lineTo(r*0.70*face, torsoTop + r*0.62);
  ctx.stroke();

  ctx.strokeStyle = weaponBlade;
  ctx.lineWidth = Math.max(3.0, r*0.18);
  ctx.beginPath();
  ctx.moveTo(r*0.70*face, torsoTop + r*0.62);
  ctx.lineTo(r*(0.98 + (cfg.weaponLength || 0))*face, torsoTop + r*(0.98 + (cfg.weaponDrop || 0)));
  ctx.stroke();

  if(cfg.weaponCross){
    ctx.strokeStyle = cfg.weaponCross;
    ctx.lineWidth = Math.max(2.0, r*0.10);
    ctx.beginPath();
    ctx.moveTo(r*(0.64)*face, torsoTop + r*0.58);
    ctx.lineTo(r*(0.80)*face, torsoTop + r*0.58);
    ctx.stroke();
  }

  if(weaponGlow){
    ctx.strokeStyle = weaponGlow;
    ctx.lineWidth = Math.max(1.6, r*0.08);
    ctx.beginPath();
    ctx.moveTo(r*(0.92 + (cfg.weaponLength || 0))*face, torsoTop + r*(0.90 + (cfg.weaponDrop || 0)));
    ctx.lineTo(r*(1.08 + (cfg.weaponLength || 0))*face, torsoTop + r*(1.04 + (cfg.weaponDrop || 0)));
    ctx.stroke();
  }

  ctx.restore();
}

function updateCombatSystem(){
  if(hitStop > 0){ hitStop--; return; }

  if((player.skillSwingTimer || 0) > 0){
    const total = Math.max(1, Number(player.__skillVisualTotalFrames || player.skillSwingTimer || 8));
    const remain = Math.max(0, Number(player.skillSwingTimer || 0));
    const elapsed = Math.max(0, total - remain);
    attacking = true;
    attackFrame = Math.min(7.99, (elapsed / total) * 8);
    player.skillSwingTimer = Math.max(0, remain - 1);
    if(player.skillSwingTimer <= 0){
      attacking = false;
      attackFrame = 0;
      player.__skillVisualTotalFrames = 0;
      player.skillSwingStyle = null;
      player.skillSwingPower = 0;
    }
    return;
  }

  if(attacking){
    const atkMul = Math.max(0.25, Number(player.buffs?.atkSpdMul ?? player.gear?.atkSpdMul ?? 1));
    const prevFrame = attackFrame;
    attackFrame += atkMul;
    if(prevFrame < 3 && attackFrame >= 3) checkHit();
    if(attackFrame > 8){
      attacking = false;
      attackFrame = 0;
    }
  }
}

function updateMovement(){
  // ✅ Isometric input mapping:
  // Input (screen space): right/left/up/down from keys & joystick
  // World movement (grid space) is rotated 45° so controls feel like ARPG isometric
  const moveSpeed = player.speed * (player.buffs?.spdMul ?? 1);

  // screen-space input (ix, iy) in [-1,1]
  let ix = 0;
  let iy = 0;

  if(keys["ArrowLeft"] || keys["a"])  ix -= 1;
  if(keys["ArrowRight"] || keys["d"]) ix += 1;
  if(keys["ArrowUp"] || keys["w"])    iy -= 1;
  if(keys["ArrowDown"] || keys["s"])  iy += 1;

  ix += joyDX;
  iy += joyDY;

  // deadzone + normalize (prevents faster diagonal)
  const mag = Math.hypot(ix, iy);
  if(mag < 0.08){
    return; // no movement input
  }
  if(mag > 1){
    ix /= mag;
    iy /= mag;
  }

  // Update facing direction based on screen-space input
  if(Math.abs(ix) > Math.abs(iy)){
    player.dir = (ix > 0) ? "right" : "left";
  }else{
    player.dir = (iy > 0) ? "down" : "up";
  }

  // Convert screen-space vector -> world/grid-space vector
  // Using inverse of iso projection: screenX ~ (x - y), screenY ~ (x + y)
  const wx = (iy + ix) * 0.5;
  const wy = (iy - ix) * 0.5;

  const dx = wx * moveSpeed;
  const dy = wy * moveSpeed;

  const newX = player.x + dx;
  const newY = player.y + dy;

  if(canMoveTo(newX, player.y)) player.x = newX;
  if(canMoveTo(player.x, newY)) player.y = newY;
}

function updateArrows(){
  for(let i = arrows.length - 1; i >= 0; i--){
    const a = arrows[i];
    a.x += a.dx;
    a.y += a.dy;
    a.angle = Math.atan2(a.dy, a.dx);
    a.life--;
    a.trailTick = (a.trailTick || 0) + 1;
    if(a.trailTick % 2 === 0) spawnArrowTrail(a.x, a.y, a.dx, a.dy);

    const tx = Math.floor(a.x / tileSize);
    const ty = Math.floor(a.y / tileSize);
    if(!map[ty] || map[ty][tx] === 1){
      spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      arrows.splice(i,1);
      continue;
    }

    const px = player.x, py = player.y;
    const dxp = a.x - px;
    const dyp = a.y - py;
    const rr = (player.radius + 4);
    if(dxp*dxp + dyp*dyp < rr*rr){
      const dx = px - a.x;
      const dy = py - a.y;
      const len = Math.hypot(dx, dy) || 1;
      damagePlayer(a.damage, (dx/len)*14, (dy/len)*14, a);
      spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      arrows.splice(i,1);
      continue;
    }

    if(a.life <= 0){
      spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      arrows.splice(i,1);
      continue;
    }
  }
}

/* ===== 레벨업 ===== */
function levelUpSound(){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();

  o.type = "triangle";
  o.frequency.setValueAtTime(400, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.3);

  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime + 0.3);
}

function checkLevelUp(){
  if(xp >= xpToNext){
    xp -= xpToNext;
    level++;

    xpToNext = Math.floor(100 + level * level * 20);
    player.passivePoints = (player.passivePoints || 0) + 1;

    player.baseMaxHp += 12;
    updateBuffs(player);
    player.hp = player.maxHp;

    baseDamageBase *= 1.08;
    ultiDamageBase *= 1.1;
    recalcFromGear();

    player.levelGlow = 60;

    for(let i=0;i<60;i++){
      levelParticles.push({
        ox:(Math.random()-0.5)*40,
        oy:-40+(Math.random()-0.5)*10,
        vx:(Math.random()-0.5)*2,
        vy:Math.random()*3+2,
        life:60
      });
    }

    levelUpSound();
  }
}

  const b = player.buffs || defaultBuffStats();

}

  const b = player.buffs || defaultBuffStats();
  return BASE_ULTI_AOE * (b.rangeMul ?? 1);
}

      if(bonus > 0){
        const bonusHeal = bonus * (g.lifeLeech || 0) + (g.hpOnHit || 0);
        if(bonusHeal > 0) player.hp = Math.min(player.maxHp, player.hp + bonusHeal);
      }
      if(e.hp <= 0 && !diedNow){
        if(e.type === "boss") startBossDeath(e);
        else{
          startEnemyDeath(e);
          emitEvent("kill", { enemy:e, x:e.x, y:e.y, type:e.type });
          spawnEnemyDeathBurst(e.x, e.y, e.type);
          spawnLoot(e.x, e.y, "hit");
          giveXP(e);
          if((g.hpOnKill || 0) > 0){ player.hp = Math.min(player.maxHp, player.hp + (g.hpOnKill || 0)); }
        }
      }
    }

    if((g.cleaveChance || 0) > 0 && Math.random() < g.cleaveChance){
      const cleaveRangeMul = Math.max(0.6, Number(g.rangeMul || 1));
      const cleaveRadius = 90 * cleaveRangeMul;
      const cleaveR2 = cleaveRadius * cleaveRadius;

      for(const other of enemies){
        if(!other || other.hp <= 0) continue;
        const odx = other.x - player.x;
        const ody = other.y - player.y;
        if(odx*odx + ody*ody > cleaveR2) continue;

        other.__killFxKind = e.__killFxKind || "physical";
        other.hp -= dealt * 0.45;
        other.hitFlash = Math.max(other.hitFlash || 0, 4);

        if(other.hp <= 0){
          if(other.type === "boss") startBossDeath(other);
          else{
            startEnemyDeath(other);
            emitEvent("kill", { enemy:other, x:other.x, y:other.y, type:other.type });
            spawnEnemyDeathBurst(other.x, other.y, other.type);
            spawnLoot(other.x, other.y, "hit");
            giveXP(other);
            if((g.hpOnKill || 0) > 0){ player.hp = Math.min(player.maxHp, player.hp + (g.hpOnKill || 0)); }
          }
        }
      }
    }

    if(Math.random() < 0.2 && player.kiOrbs < player.maxOrbs){
      player.kiOrbs++;
    }

    if(bossInvul){
      spawnHitBlood(e.x, e.y, 14);
    }else{
      if((g.knockbackChance || 0) > 0 && Math.random() < g.knockbackChance){
        e.stun = Math.max(e.stun || 0, 15);
        __enemyHitFlashStart(e, 1);
        moveEnemyWithCollision(e, nx * 18, ny * 18, 8);
      }else{
        e.stun = Math.max(e.stun || 0, 8);
        __enemyHitFlashStart(e, 1);
      }
    }

    if((g.bleedChance || 0) > 0 && !bossInvul && Math.random() < g.bleedChance){
      e.bleed = {
        life: 90,
        tick: 0,
        damage: Math.max(1, dealt * 0.18)
      };
    }

    if(bossInvul) thudSound();
    else hitSound();

    shake = 12;

    if(particles.length < 220){
      particles.push({
        x: e.x, y: e.y,
        vx: nx*4 + (Math.random()-0.5)*4,
        vy: ny*4 + (Math.random()-0.5)*4,
        life: 30
      });
    }

    if(e.hp <= 0){
      if(e.type === "boss"){
        startBossDeath(e);
      }else{
        startEnemyDeath(e);
        emitEvent("kill", { enemy: e, x: e.x, y: e.y, type: e.type });
        spawnEnemyDeathBurst(e.x, e.y, e.type);

        const dropPos = findNearestLootDropPos(e.x, e.y);
        spawnLoot(dropPos.x, dropPos.y, "normal");

        giveXP(e);
        killCount++;

        if((g.hpOnKill || 0) > 0){
          player.hp = Math.min(player.maxHp, player.hp + g.hpOnKill);
        }else{
          player.hp = Math.min(player.maxHp, player.hp + 1);
        }

        if(bloodPools.length < 140){
          bloodPools.push({
            x: e.x, y: e.y,
            size: 10 + Math.random()*6,
            life: 600
          });
        }

        slowMotion = 6;

        if(player.kiOrbs < player.maxOrbs){
          player.kiOrbs++;
        }
      }
    }

    if(canExtra && (g.cleaveChance || 0) > 0 && !bossInvul && Math.random() < g.cleaveChance){
      let splash = 0;
      for(const other of enemies){
        if(!other || other === e || other.hp <= 0) continue;
        const ddx = other.x - e.x;
        const ddy = other.y - e.y;
        if(ddx*ddx + ddy*ddy > 54*54) continue;
        applyHitToEnemy(other, 0.45, false);
        splash++;
        if(splash >= 3) break;
      }
    }

    if(canExtra && (g.doubleHitChance || 0) > 0 && !bossInvul && Math.random() < g.doubleHitChance){
      applyHitToEnemy(e, 0.55, false);
    }

    return dealt;
  }

  for(let i=0;i<enemies.length;i++){
    const e = enemies[i];

    const dx = e.x - player.x;
    const dy = e.y - player.y;

    const r = range + e.radius;
    if(dx*dx + dy*dy > r*r) continue;

    if(player.dir === "up" && dy >= 0) continue;
    if(player.dir === "down" && dy <= 0) continue;
    if(player.dir === "right" && dx <= 0) continue;
    if(player.dir === "left" && dx >= 0) continue;

    hitDone++;
    if(hitDone > hitLimit) break;

    applyHitToEnemy(e, 1, true);
  }

  enemies = enemies.filter(e => (e.hp > 0) || (e.dead && e.deathTimer > 0));
  packs.forEach(pack=>{
    pack.enemies = pack.enemies.filter(e=>(e.hp>0) || (e.dead && e.deathTimer > 0));
  });
}

function updateBlood(){
  for(let i = bloodParticles.length - 1; i >= 0; i--){
    const p = bloodParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25;
    p.life--;
    if(p.life <= 0) bloodParticles.splice(i,1);
  }
  if(bloodParticles.length > 260){
    bloodParticles.splice(0, bloodParticles.length - 260);
  }
}

function drawBlood(){
  if(bloodParticles.length === 0) return;

  ctx.save();
  ctx.fillStyle = "#8b0000";
  ctx.beginPath();

  for(let i=0;i<bloodParticles.length;i++){
    const p = bloodParticles[i];
    const a = p.life / 30;
    if(a > 0.66) ctx.globalAlpha = 0.9;
    else if(a > 0.33) ctx.globalAlpha = 0.6;
    else ctx.globalAlpha = 0.35;

    ctx.fillRect(p.x - p.size*0.5, p.y - p.size*0.5, p.size, p.size);
  }
  ctx.restore();
}

/* ===== 렌더 ===== */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.shadowColor = "transparent";
  ctx.filter = "none";

  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let camX = player.x - canvas.width/2;
  let camY = player.y - canvas.height/2;

  let amp = shake ? (6 + shake * 0.45) : 0;
  let sx = shake ? (Math.random()-0.5) * amp : 0;
  let sy = shake ? (Math.random()-0.5) * amp : 0;

  ctx.save();
  ctx.translate(-camX+sx, -camY+sy);

  for(let y = 0; y < map.length; y++){
    for(let x = 0; x < map[y].length; x++){
      let tile = map[y][x];
      if(tile === 0) ctx.fillStyle = "#222";
      if(tile === 1) ctx.fillStyle = "#555";
      ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
    }
  }

  ctx.fillStyle = "#550000";
  for(let i=0;i<bloodPools.length;i++){
    const b = bloodPools[i];
    const a = b.life / 600;
    if(a <= 0.05) continue;
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  fireZones.forEach(f=>{
    ctx.save();
    for(let i=0;i<6;i++){
      let flameHeight = 10 + Math.sin(frameCount*0.2 + i)*6;
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = "orange";
      ctx.beginPath();
      ctx.moveTo(f.x - 6 + i*2, f.y);
      ctx.lineTo(f.x - 3 + i*2, f.y - flameHeight);
      ctx.lineTo(f.x + i*2, f.y);
      ctx.fill();
    }
    ctx.restore();
  });

  ctx.fillStyle = "red";
  for(let i=0;i<particles.length;i++){
    const p = particles[i];
    ctx.fillRect(p.x, p.y, 3, 3);
  }

  drawPortal();
  drawLoots();
  drawBlood();
  enemies.forEach(e=>drawEnemy(e));

  levelParticles.forEach(p=>{
    ctx.fillStyle = "gold";
    ctx.fillRect(player.x + p.ox, player.y + p.oy, 4, 4);
  });

  arrows.forEach(a=>{
    drawArrowSprite(a.x, a.y, a.angle || Math.atan2(a.dy||0, a.dx||1), 1);
  });

  ctx.restore();

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  drawPlayer(canvas.width/2, canvas.height/2);
  drawUI();
}

function drawPlayer(x,y){
  if(player.levelGlow > 0){
    ctx.shadowColor = "gold";
    ctx.shadowBlur = player.levelGlow * 0.5;
  }

  ctx.fillStyle="#880000";
  ctx.fillRect(x-10,y-12,20,22);

  ctx.fillStyle="#aa0000";
  ctx.fillRect(x-7,y-20,14,8);

  ctx.fillStyle="#ffffcc";
  ctx.fillRect(x-8,y-26,4,8);
  ctx.fillRect(x+4,y-26,4,8);

  ctx.fillStyle = "#fff";
  ctx.fillRect(x-3,y-14,2,2);
  ctx.fillRect(x+1,y-14,2,2);

  ctx.shadowBlur = 0;

  if(player.ultiActive){
    ctx.save();
    ctx.shadowColor = "#ff6600";
    ctx.shadowBlur = 25;
    ctx.fillStyle = "#ffaa00";
    ctx.fillRect(x-3,y-14,2,2);
    ctx.fillRect(x+1,y-14,2,2);
    ctx.restore();
  }

  drawSword(x,y);
}

function drawSword(x, y){
  ctx.save();
  ctx.translate(x, y);

  var offsetX = 0;
  var offsetY = 0;
  var angle = 0;
  var t = attackFrame / 8;

  if (player.dir === "right") { offsetX = 18; if (attacking) angle = 1.5 * t; }
  else if (player.dir === "left") { offsetX = -18; if (attacking) angle = -1.5 * t; }
  else if (player.dir === "up") { offsetY = -18; if (attacking) offsetY -= 25 * t; }
  else if (player.dir === "down") { offsetY = 6; angle = Math.PI; if (attacking) offsetY += 25 * t; }

  ctx.translate(offsetX, offsetY);
  ctx.rotate(angle);
  drawSwordShape(ctx);
  ctx.restore();
}

function drawSwordShape(c){
  c.fillStyle = "#552200";
  c.fillRect(-2, 6, 4, 8);

  c.fillStyle = "#bbbbbb";
  c.fillRect(-8, 6, 16, 3);

  c.fillStyle = "#dddddd";
  c.fillRect(-2, -20, 4, 26);

  c.beginPath();
  c.moveTo(-2, -20);
  c.lineTo(0, -32);
  c.lineTo(2, -20);
  c.fill();
}

function drawEnemy(e){
  if(e.type === "boss"){
    if(e.dead){
      const t = (e.deathTimer / e.deathMax);
      ctx.save();
      ctx.globalAlpha = Math.max(0, t);

      ctx.fillStyle = "rgba(255,60,60,0.25)";
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + (1-t)*35, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = "#777777";
      ctx.fillRect(e.x-20, e.y-25, 40, 50);

      if(Math.floor(frameCount/3)%2===0){
        ctx.fillStyle = "rgba(255,0,0,0.8)";
        ctx.fillRect(e.x-6, e.y-15, 4,4);
        ctx.fillRect(e.x+2, e.y-15, 4,4);
      }

      ctx.restore();
      return;
    }

    if(e.invul > 0){
      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + 10, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    ctx.fillStyle = "#777777";
    ctx.fillRect(e.x-20, e.y-25, 40, 50);

    ctx.fillStyle = "#999999";
    ctx.fillRect(e.x-15, e.y-35, 30, 15);

    ctx.fillStyle = "red";
    ctx.fillRect(e.x-6, e.y-15, 4,4);
    ctx.fillRect(e.x+2, e.y-15, 4,4);

    ctx.save();
    ctx.translate(e.x+28, e.y);
    ctx.rotate(0.2);
    drawSwordShape(ctx);
    ctx.restore();
    return;
  }

  if(e.isLeader){
    ctx.fillStyle = "#ffd000";
    ctx.fillRect(e.x-6, e.y-24, 12, 3);
    ctx.fillRect(e.x-4, e.y-28, 3, 4);
    ctx.fillRect(e.x+1, e.y-28, 3, 4);
  }
  if(e.isElite){
    ctx.fillStyle = (e.eliteColor === "yellow") ? "#ffcc00" : "#00aaff";
  }else if(e.type === "archer"){
    ctx.fillStyle = "#cccccc";
  }else if(e.type === "mage"){
    ctx.fillStyle = "#550088";
  }else if(e.type === "orc"){
    ctx.fillStyle = "#668800";
  }else if(e.type === "demon"){
    ctx.fillStyle = "#992222";
  }else{
    ctx.fillStyle = "#006600";
  }

  if(e.activeBuffs && e.activeBuffs.some(b => b.key === "damage|leader|mul" || b.key === "atkSpeed|leader|mul")){
    const pulse = 0.45 + 0.25*Math.sin(frameCount*0.2);
    ctx.save();
    ctx.globalAlpha = 0.25 + pulse;
    ctx.fillStyle = "rgba(255,0,0,0.35)";
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius + 12 + pulse*6, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  ctx.fillRect(e.x-10,e.y-12,20,22);

  if(e.type === "archer") ctx.fillStyle = "#dddddd";
  else if(e.type === "mage") ctx.fillStyle = "#550088";
  else if(e.type === "orc") ctx.fillStyle = "#99cc33";
  else if(e.type === "demon") ctx.fillStyle = "#ff7755";
  else ctx.fillStyle = "#00aa00";
  ctx.fillRect(e.x-7,e.y-20,14,8);

  ctx.fillStyle="red";
  ctx.fillRect(e.x-4,e.y-14,3,3);
  ctx.fillRect(e.x+1,e.y-14,3,3);
}

function drawXPBar(){
  const barW = canvas.width * 0.6;
  const barH = 10;
  const x = canvas.width/2 - barW/2;
  const y = canvas.height - 20;
  const percent = xp / xpToNext;

  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(x, y, barW, barH);
  ctx.fillStyle = "#33ccff";
  ctx.fillRect(x, y, barW * percent, barH);
  ctx.strokeStyle = "rgba(255,255,255,0.3)";
  ctx.strokeRect(x, y, barW, barH);
  ctx.restore();
}

function drawMiniMap(){
  const w = 60;
  const h = 60;
  const margin = 12;
  const x0 = canvas.width - w - margin;
  const y0 = margin;

  const radarRange = 700;
  const scale = w / (radarRange * 2);

  const cx = x0 + w/2;
  const cy = y0 + h/2;

  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = "#000";
  ctx.fillRect(x0, y0, w, h);

  ctx.beginPath();
  ctx.rect(x0+1, y0+1, w-2, h-2);
  ctx.clip();

  ctx.globalAlpha = 0.7;
  ctx.strokeStyle = "#888";
  ctx.lineWidth = 1;

  const minTX = Math.max(0, Math.floor((player.x - radarRange) / tileSize));
  const maxTX = Math.min(mapSize-1, Math.floor((player.x + radarRange) / tileSize));
  const minTY = Math.max(0, Math.floor((player.y - radarRange) / tileSize));
  const maxTY = Math.min(mapSize-1, Math.floor((player.y + radarRange) / tileSize));

  for(let ty=minTY; ty<=maxTY; ty++){
    for(let tx=minTX; tx<=maxTX; tx++){
      if(map[ty][tx] !== 1) continue;
      const wx = tx * tileSize;
      const wy = ty * tileSize;
      const dx = wx - player.x;
      const dy = wy - player.y;
      const mx = cx + dx * scale;
      const my = cy + dy * scale;
      const size = tileSize * scale;
      ctx.strokeRect(mx, my, size, size);
    }
  }

  const boss = enemies.find(e => e.type === "boss");
  if(boss){
    const dx = boss.x - player.x;
    const dy = boss.y - player.y;
    if(dx*dx + dy*dy <= radarRange*radarRange){
      const mx = cx + dx * scale;
      const my = cy + dy * scale;
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#fff";
      ctx.fillRect(mx-3, my-3, 6, 6);
    }
  }

  ctx.globalAlpha = 0.95;
  for(const e of enemies){
    if(e.hp <= 0) continue;
    if(e.type === "boss") continue;
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    if(dx*dx + dy*dy > radarRange*radarRange) continue;
    const mx = cx + dx * scale;
    const my = cy + dy * scale;
    if(e.type === "mage") ctx.fillStyle = "#aa55ff";
    else if(e.type === "archer") ctx.fillStyle = "#dddddd";
    else if(e.type === "orc") ctx.fillStyle = "#88cc44";
    else if(e.type === "demon") ctx.fillStyle = "#ff6644";
    else ctx.fillStyle = "#00ff66";
    ctx.fillRect(mx-1.5, my-1.5, 3, 3);
  }

  ctx.globalAlpha = 1;
  ctx.fillStyle = "#ff4444";
  ctx.fillRect(cx-2, cy-2, 4, 4);

  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 2;
  ctx.strokeRect(x0+1, y0+1, w-2, h-2);
  ctx.restore();
}

function drawTextUI(){
  ctx.save();
  ctx.textAlign = "left";
  ctx.font = "bold 18px Arial";
  ctx.fillStyle = "white";
  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;

  const safeTop = (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--safeTop'))||0);
  const y1 = safeTop + 26;
  const y2 = safeTop + 58;

  ctx.strokeText("Level: " + level, 20, y1);
  ctx.fillText("Level: " + level, 20, y1);

  ctx.strokeText("TIER: " + mapTier, 20, y2);
  ctx.fillText("TIER: " + mapTier, 20, y2);

  if(portal.active){
    ctx.strokeText("PORTAL OPEN!", 20, safeTop + 90);
    ctx.fillText("PORTAL OPEN!", 20, safeTop + 90);
  }

  ctx.restore();
}

function drawOrbUI(){
  const btnRect = document.getElementById("attackBtn").getBoundingClientRect();
  const centerScreenX = btnRect.left + btnRect.width * 0.5;
  const centerScreenY = btnRect.top  + btnRect.height * 0.5;

  let cx = centerScreenX;
  let cy = centerScreenY - uiHeight;

  cx = Math.max(60, Math.min(canvas.width - 60, cx));
  cy = Math.max(60, Math.min(canvas.height - 60, cy));

  const orbR = 10;
  const ringR = 34;
  const startAngle = -Math.PI/2;

  const centerR = 24;
  const ready = (player.kiOrbs >= 1 && enemies.length > 0 && !player.ultiActive);

  orbUIState.cx = cx;
  orbUIState.cy = cy;
  orbUIState.centerR = centerR;
  orbUIState.ready = ready;

  ctx.save();

  for(let i=0;i<player.maxOrbs;i++){
    const a = startAngle + (i * (Math.PI * 2 / player.maxOrbs));
    const x = cx + Math.cos(a) * ringR;
    const y = cy + Math.sin(a) * ringR;

    ctx.beginPath();
    ctx.arc(x, y, orbR, 0, Math.PI*2);

    if(orbFlash > 0){
      ctx.fillStyle = "#00ff88";
      ctx.shadowColor = "#00ff88";
      ctx.shadowBlur = 35;
    }
    else if(i < player.kiOrbs){
      ctx.fillStyle = "#00ff55";
      ctx.shadowColor = "#00ff55";
      ctx.shadowBlur = 15;
    }
    else{
      ctx.fillStyle = "#002211";
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
    }

    ctx.fill();
  }

  ctx.shadowBlur = ready ? 25 : 10;
  ctx.shadowColor = ready ? "rgba(120,180,255,0.95)" : "rgba(120,180,255,0.4)";
  ctx.fillStyle = ready ? "rgba(40,120,255,0.95)" : "rgba(40,120,255,0.45)";
  ctx.beginPath();
  ctx.arc(cx, cy, centerR, 0, Math.PI*2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = "rgba(170,210,255,0.75)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, centerR+1, 0, Math.PI*2);
  ctx.stroke();

  ctx.globalAlpha = 0.95;
  ctx.fillStyle = "white";
  ctx.font = "bold 18px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("U", cx, cy+1);

  ctx.restore();
}

function drawHpOrb(){
  const bagBtn = document.getElementById("miniBagBtn");
  const bagRect = bagBtn ? bagBtn.getBoundingClientRect() : null;

  // 가방 버튼 라인에 맞춰 좌측 상단 오브 배치
  let x = bagRect ? (bagRect.left + bagRect.width * 0.5) : 82;
  let y = bagRect ? (bagRect.top + bagRect.height * 0.5 - 255) : 165;

  x = Math.max(48, Math.min(canvas.width - 48, x));
  y = Math.max(48, Math.min(canvas.height - 48, y));

  ctx.save();

  const esMode = !!player.energyShieldMode;
  const radius = 25;
  hpWaveOffset += 0.07;

  const hpPercent = Math.max(0, Math.min(1, player.hp / Math.max(1, player.maxHp)));
  const liquidHeight = radius * 2 * hpPercent;
  const topY = y + radius - liquidHeight;

  const metal = ctx.createRadialGradient(x, y, radius-10, x, y, radius+12);
  if(esMode){
    metal.addColorStop(0, "#081426");
    metal.addColorStop(0.5, "#123459");
    metal.addColorStop(1, "#030913");
  }else{
    metal.addColorStop(0, "#2a0000");
    metal.addColorStop(0.5, "#550000");
    metal.addColorStop(1, "#110000");
  }

  ctx.beginPath();
  ctx.arc(x, y, radius+10, 0, Math.PI*2);
  ctx.fillStyle = metal;
  ctx.fill();

  ctx.lineWidth = 4;
  ctx.strokeStyle = "#000";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, radius+6, 0, Math.PI*2);
  ctx.strokeStyle = esMode ? "#7fd8ff" : "#aa0000";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.clip();

  const innerShadow = ctx.createRadialGradient(x, y+15, 10, x, y, radius);
  if(esMode){
    innerShadow.addColorStop(0, "#0a2040");
    innerShadow.addColorStop(1, "#000000");
  }else{
    innerShadow.addColorStop(0, "#330000");
    innerShadow.addColorStop(1, "#000000");
  }
  ctx.fillStyle = innerShadow;
  ctx.fillRect(x-radius, y-radius, radius*2, radius*2);

  ctx.beginPath();
  ctx.moveTo(x-radius, y+radius);
  for(let i=0;i<=radius*2;i++){
    const wave = Math.sin(i*0.12 + hpWaveOffset) * (esMode ? 3 : 4);
    ctx.lineTo(x-radius+i, topY + wave);
  }
  ctx.lineTo(x+radius, y+radius);
  ctx.closePath();

  const fillGrad = ctx.createLinearGradient(0, topY, 0, y+radius);
  if(esMode){
    fillGrad.addColorStop(0, "#8fe7ff");
    fillGrad.addColorStop(0.55, "#3aa8ff");
    fillGrad.addColorStop(1, "#164e8d");
  }else{
    fillGrad.addColorStop(0, "#ff2a2a");
    fillGrad.addColorStop(1, "#8b0000");
  }
  ctx.fillStyle = fillGrad;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x-15, y-20, 18, 0, Math.PI*2);
  ctx.fillStyle = esMode ? "rgba(190,235,255,0.22)" : "rgba(255,255,255,0.25)";
  ctx.fill();

  const glass = ctx.createRadialGradient(x-10, y-15, 5, x, y, radius);
  glass.addColorStop(0, "rgba(255,255,255,0.25)");
  glass.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = glass;
  ctx.fillRect(x-radius, y-radius, radius*2, radius*2);

  if(hpPercent < 0.3){
    if(Math.floor(Date.now()/200)%2===0){
      ctx.beginPath();
      ctx.arc(x, y, radius+14, 0, Math.PI*2);
      ctx.fillStyle = esMode ? "rgba(80,190,255,0.22)" : "rgba(255,0,0,0.25)";
      ctx.fill();
    }
  }

  if(esMode){
    ctx.strokeStyle = "rgba(180,235,255,0.65)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y-14);
    ctx.lineTo(x+10, y-2);
    ctx.lineTo(x+3, y-2);
    ctx.lineTo(x+12, y+13);
    ctx.lineTo(x-3, y+1);
    ctx.lineTo(x+4, y+1);
    ctx.stroke();
  }

  ctx.fillStyle = "white";
  ctx.font = "bold 18px Arial";
  ctx.textAlign = "center";
  // 현재 생명력만 표시
  ctx.fillText(Math.ceil(player.hp), x, y+6);

  if(esMode){
    ctx.font = "bold 12px Arial";
    ctx.fillStyle = "#c9f4ff";
    ctx.fillText("ES", x, y-34);
  }

  ctx.restore();
}



function drawSkillOrbs(){
  if(!ctx || !player) return;

  const cs = player.chargeState || {};
  const frenzy = Math.max(0, Number(cs.frenzy ?? player.frenzyCharges ?? 0) || 0);
  const frenzyMax = Math.max(1, Number(cs.frenzyMax ?? player.frenzyChargeMax ?? 5) || 5);

  const endurance = Math.max(0, Number(cs.endurance ?? player.enduranceCharges ?? 0) || 0);
  const enduranceMax = Math.max(1, Number(cs.enduranceMax ?? player.enduranceChargeMax ?? 5) || 5);

  const frameNow = (typeof frameCount === "number" ? frameCount : 0);
  const frenzyPulse = Math.max(0, 1 - ((frameNow - (cs.frenzyLastGainFrame || player.frenzyLastGainFrame || 0)) / 18));
  const endurancePulse = Math.max(0, 1 - ((frameNow - (cs.enduranceLastGainFrame || player.enduranceLastGainFrame || 0)) / 18));
  const twinkle = (Math.sin(frameNow * 0.16) + 1) * 0.5;

  // ✅ drawHpOrb()와 완전히 같은 기준으로 생명력 구슬 중심을 잡는다.
  const bagBtn = document.getElementById("miniBagBtn");
  const bagRect = bagBtn ? bagBtn.getBoundingClientRect() : null;

  let hpCx = bagRect ? (bagRect.left + bagRect.width * 0.5) : 82;
  let hpCy = bagRect ? (bagRect.top + bagRect.height * 0.5 - 255) : 165;

  hpCx = Math.max(48, Math.min(canvas.width - 48, hpCx));
  hpCy = Math.max(48, Math.min(canvas.height - 48, hpCy));

  // HP 구슬(drawHpOrb 기준 radius=25, outer≈35)에 딱 붙는 값
  const orbR = 5.2;
  const orbGapPad = 1.2;
  const lifeOrbOuterR = 35;
  const arcRadius = lifeOrbOuterR + orbR + orbGapPad;
  const orbitCy = hpCy - 1.5;

  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);

  function drawChargeOrb(cx, cy, active, fillA, fillB, ring, pulse, isRed, orbIndex){
    const localTwinkle = active ? (0.35 + twinkle * 0.65) : 0.18;

    ctx.save();

    if(active){
      const aura = ctx.createRadialGradient(cx, cy, 0, cx, cy, orbR + 7 + pulse * 2);
      aura.addColorStop(0, fillA.replace('0.98', String(0.18 + pulse * 0.08)));
      aura.addColorStop(0.45, fillB.replace('0.95', String(0.10 + pulse * 0.06)));
      aura.addColorStop(1, "rgba(0,0,0,0)");
      ctx.beginPath();
      ctx.arc(cx, cy, orbR + 7 + pulse * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = aura;
      ctx.fill();

      if(pulse > 0){
        ctx.beginPath();
        ctx.arc(cx, cy, orbR + 2.5 + pulse * 1.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${0.08 + pulse * 0.10})`;
        ctx.fill();
      }
    }

    const g = ctx.createRadialGradient(cx - 1.6, cy - 2.4, 0.8, cx, cy, orbR + 1.4);
    if(active){
      g.addColorStop(0, fillA);
      g.addColorStop(0.48, fillB);
      g.addColorStop(0.84, isRed ? "rgba(70,8,8,0.98)" : "rgba(8,55,14,0.98)");
      g.addColorStop(1, "rgba(0,0,0,0.98)");
    }else{
      g.addColorStop(0, "rgba(110,110,110,0.14)");
      g.addColorStop(0.55, "rgba(50,50,50,0.26)");
      g.addColorStop(1, "rgba(10,10,10,0.72)");
    }

    ctx.beginPath();
    ctx.arc(cx, cy, orbR, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();

    if(active){
      const gloss = ctx.createRadialGradient(cx - 2.5, cy - 3.2, 0, cx - 2.5, cy - 3.2, orbR);
      gloss.addColorStop(0, `rgba(255,255,255,${0.24 * localTwinkle})`);
      gloss.addColorStop(0.6, `rgba(255,255,255,${0.07 * localTwinkle})`);
      gloss.addColorStop(1, "rgba(255,255,255,0)");
      ctx.beginPath();
      ctx.arc(cx - 0.8, cy - 0.8, orbR - 0.8, Math.PI * 1.08, Math.PI * 1.9);
      ctx.fillStyle = gloss;
      ctx.fill();
    }

    ctx.lineWidth = active ? 1.5 : 1.0;
    ctx.strokeStyle = active ? ring : "rgba(120,120,120,0.18)";
    ctx.stroke();

    if(active){
      ctx.beginPath();
      ctx.arc(cx - 1.5, cy - 1.5, orbR * 0.24, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.15 + 0.08 * localTwinkle})`;
      ctx.fill();

      if((frameNow + orbIndex * 5) % 24 < 8){
        ctx.beginPath();
        ctx.arc(cx + orbR * 0.10, cy - orbR * 0.45, 0.9 + pulse * 0.25, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${0.16 + 0.12 * localTwinkle})`;
        ctx.fill();
      }
    }

    ctx.restore();
  }

  function drawAdaptiveArcRow(count, max, side, fillA, fillB, ring, pulse, isRed){
    if(max <= 0) return;

    // 구슬끼리 겹치지 않게 기본 각도 자체를 넓히고,
    // 최대 충전 수가 늘면 더 빠르게 벌어진다.
    const baseSpread = 0.38;
    const extraSpread = Math.max(0, max - 4) * 0.15;
    const spread = Math.min(0.92, baseSpread + extraSpread);

    const centerAngle = (side === "left") ? Math.PI : 0;
    const startAngle = centerAngle - spread;
    const endAngle   = centerAngle + spread;
    const step = max === 1 ? 0 : (endAngle - startAngle) / (max - 1);

    for(let i=0;i<max;i++){
      const ang = startAngle + step * i;
      const cx = hpCx + Math.cos(ang) * arcRadius;
      const cy = orbitCy + Math.sin(ang) * arcRadius;
      drawChargeOrb(cx, cy, i < count, fillA, fillB, ring, pulse, isRed, i);
    }
  }

  drawAdaptiveArcRow(
    frenzy,
    frenzyMax,
    "left",
    "rgba(165,255,140,0.98)",
    "rgba(35,185,58,0.95)",
    "rgba(200,255,190,0.72)",
    frenzyPulse,
    false
  );

  drawAdaptiveArcRow(
    endurance,
    enduranceMax,
    "right",
    "rgba(255,135,135,0.98)",
    "rgba(190,25,25,0.95)",
    "rgba(255,170,170,0.72)",
    endurancePulse,
    true
  );

  ctx.restore();
}

function drawBossHpBar(){
  window.__bossBarState = window.__bossBarState || {
    visible: 0,
    chipHp: 0,
    lastBossId: null,
    intro: 0,
    lastName: "",
    deathAnim: 0,
    prevAlive: false,
    cachedMaxHp: 1,
    blinkT: 0
  };
  const st = window.__bossBarState;

  const liveBoss = enemies.find(e => e && e.type === "boss" && !e.dead && (e.hp || 0) > 0);
  const bossNear = !!liveBoss && Math.hypot((liveBoss.x || 0) - (player.x || 0), (liveBoss.y || 0) - (player.y || 0)) <= 560;
  const boss = bossNear ? liveBoss : null;
  const aliveNow = !!boss;

  if(aliveNow){
    const bossId = `${boss.type}:${boss.maxHp}:${Math.round(boss.x||0)}:${Math.round(boss.y||0)}`;
    if(st.lastBossId !== bossId){
      st.lastBossId = bossId;
      st.chipHp = Math.max(boss.hp || 0, boss.maxHp || 0);
      st.cachedMaxHp = Math.max(1, boss.maxHp || 1);
      st.intro = 1;
      st.deathAnim = 0;
      st.lastName = boss.displayName || boss.bossName || "BOSS";
    }
  }

  if(st.prevAlive && !aliveNow && st.lastBossId){
    st.deathAnim = 1;
    st.intro = 0;
    st.chipHp = 0;
  }
  st.prevAlive = aliveNow;

  const targetVisible = aliveNow ? 1 : (st.deathAnim > 0.001 ? 1 : 0);
  st.visible += (targetVisible - st.visible) * (aliveNow ? 0.22 : 0.14);
  if(st.visible < 0.01 && st.deathAnim <= 0.001 && !aliveNow) return;

  st.intro *= 0.88;
  if(st.intro < 0.001) st.intro = 0;

  if(st.deathAnim > 0){
    st.deathAnim *= 0.88;
    if(st.deathAnim < 0.001){
      st.deathAnim = 0;
      st.lastBossId = null;
      st.lastName = "";
    }
  }

  const alpha = Math.max(0, Math.min(1, st.visible));
  const hpNow = aliveNow ? Math.max(0, boss.hp || 0) : 0;
  const maxHpNow = aliveNow ? Math.max(1, boss.maxHp || 1) : Math.max(1, st.cachedMaxHp || 1);
  st.cachedMaxHp = maxHpNow;

  if(st.chipHp < hpNow) st.chipHp = hpNow;
  if(st.chipHp > hpNow){
    const diff = st.chipHp - hpNow;
    st.chipHp -= Math.max(1.0, diff * 0.08);
    if(st.chipHp < hpNow) st.chipHp = hpNow;
  }

  let percent = hpNow / maxHpNow;
  percent = Math.max(0, Math.min(1, percent));
  let chipPercent = st.chipHp / maxHpNow;
  chipPercent = Math.max(0, Math.min(1, chipPercent));

  let fillA = "#df443f";
  let fillB = "#b71c1c";
  if(percent <= 0.33){
    fillA = "#8d2541";
    fillB = "#531321";
  }else if(percent <= 0.66){
    fillA = "#ffb347";
    fillB = "#ff6f00";
  }

  st.blinkT += 0.18;
  const lowHpBlink = (percent <= 0.30 && aliveNow) ? (0.45 + 0.55 * (0.5 + 0.5 * Math.sin(st.blinkT * 2.6))) : 0;
  const deathT = 1 - Math.max(0, Math.min(1, st.deathAnim));
  const collapseScaleX = st.deathAnim > 0 ? (1 - deathT * 0.72) : 1;
  const collapseScaleY = st.deathAnim > 0 ? (1 - deathT * 0.92) : 1;
  const collapseDrop = st.deathAnim > 0 ? deathT * 10 : 0;

  const barW = 95;
  const barH = 8;
  const framePad = 4;
  const minimapW = 110;
  const minimapMargin = 12;
  const x = canvas.width - minimapW - minimapMargin - barW + 35;
  const y = 15 + collapseDrop;
  const name = (aliveNow && (boss.displayName || boss.bossName)) || st.lastName || "BOSS";

  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalAlpha = alpha;
  ctx.translate(x + barW/2, y + barH/2);
  ctx.scale(collapseScaleX, collapseScaleY);
  ctx.translate(-(x + barW/2), -(y + barH/2));

  const frameGrad = ctx.createLinearGradient(x, y - framePad, x, y + barH + framePad);
  frameGrad.addColorStop(0, "rgba(191,165,108,0.95)");
  frameGrad.addColorStop(0.45, "rgba(108,88,52,0.98)");
  frameGrad.addColorStop(0.55, "rgba(72,58,34,0.98)");
  frameGrad.addColorStop(1, "rgba(156,132,80,0.94)");
  ctx.fillStyle = frameGrad;
  ctx.fillRect(x - framePad, y - framePad, barW + framePad*2, barH + framePad*2);

  ctx.fillStyle = "rgba(18,10,8,0.92)";
  ctx.fillRect(x - 1, y - 1, barW + 2, barH + 2);

  const bgGrad = ctx.createLinearGradient(x, y, x, y + barH);
  bgGrad.addColorStop(0, "rgba(48,18,18,0.98)");
  bgGrad.addColorStop(1, "rgba(20,8,8,0.98)");
  ctx.fillStyle = bgGrad;
  ctx.fillRect(x, y, barW, barH);

  if(chipPercent > percent){
    ctx.fillStyle = "rgba(255,225,160,0.44)";
    ctx.fillRect(x, y, Math.round(barW * chipPercent), barH);
  }

  const fillGrad = ctx.createLinearGradient(x, y, x, y + barH);
  fillGrad.addColorStop(0, fillA);
  fillGrad.addColorStop(1, fillB);
  ctx.fillStyle = fillGrad;
  ctx.fillRect(x, y, Math.round(barW * percent), barH);

  if(lowHpBlink > 0.01){
    ctx.fillStyle = `rgba(255,40,40,${0.16 + lowHpBlink * 0.26})`;
    ctx.fillRect(x, y, barW, barH);
  }

  if(st.intro > 0.02){
    ctx.globalAlpha = alpha * Math.min(0.88, st.intro);
    const shineGrad = ctx.createLinearGradient(x, y, x, y + barH);
    shineGrad.addColorStop(0, "rgba(255,255,255,0.04)");
    shineGrad.addColorStop(0.5, "rgba(255,240,200,0.34)");
    shineGrad.addColorStop(1, "rgba(255,255,255,0.04)");
    ctx.fillStyle = shineGrad;
    const shineW = Math.max(12, Math.round(barW * 0.16));
    const shineX = x + Math.round((1 - st.intro) * (barW + shineW)) - shineW;
    ctx.fillRect(shineX, y, shineW, barH);
    ctx.globalAlpha = alpha;
  }

  ctx.strokeStyle = "rgba(255,248,220,0.28)";
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, barW - 1, barH - 1);

  ctx.strokeStyle = "rgba(70,48,22,0.95)";
  ctx.strokeRect(x - framePad + 0.5, y - framePad + 0.5, barW + framePad*2 - 1, barH + framePad*2 - 1);

  ctx.font = "bold 9px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.lineWidth = 2.2;
  ctx.strokeStyle = "rgba(0,0,0,0.82)";
  ctx.strokeText(name, x + barW/2, y + barH/2 + 0.5);
  ctx.fillStyle = "rgba(255,255,255,0.96)";
  ctx.fillText(name, x + barW/2, y + barH/2 + 0.5);

  ctx.restore();
}


function drawGameOver(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle="rgba(0,0,0,0.6)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.font="bold 40px Arial";
  ctx.textAlign="center";
  ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);

  ctx.font="bold 18px Arial";
  ctx.fillText("Tap to Restart", canvas.width/2, canvas.height/2 + 40);
}

function tryUltimate(){
  if(player.ultiActive) return;
  if(player.kiOrbs >= 1 && enemies.length > 0){
    player.kiOrbs -= 1;
    player.ultiActive = true;
    player.ultiTimer = 0;
    player.ultiCount = 0;
    performUltimateStrike();
    endUltimate();
  }
}

function handleUltimateOrbPress(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const tx = clientX - rect.left;
  const ty = clientY - rect.top;

  const dx = tx - orbUIState.cx;
  const dy = ty - orbUIState.cy;
  const r = orbUIState.centerR;

  if(dx*dx + dy*dy <= r*r){
    tryUltimate();
    return true;
  }
  return false;
}

}
function escHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}
/* ===== 표시용 퍼센트 유틸 ===== */
function fmtPct1(n){
  // 1자리까지 반올림, 끝 .0 제거
  const v = Math.round(n*10)/10;
  return String(v).replace(/\.0$/, "");
}
function fmtIncPctFromMul(m){
  const pct = (Number(m)||0) * 100 - 100; // mul(1.10) -> 10
  const abs = Math.abs(pct);
  const s = fmtPct1(abs);
  if(abs < 0.05) return "0% 증가";
  return (pct >= 0) ? `${s}% 증가` : `${s}% 감소`;
}
function fmtCritBonusFromMul(m){
  const pct = (Number(m)||0) * 100 - 100;
  const s = fmtPct1(pct);
  // 치피는 POE 느낌으로 +50% 표기
  return (pct >= 0) ? `+${s}%` : `${s}%`;
}


function rarityKey(it){
  if(!it) return "normal";
  const r = normalizeRarity(it.rarity);
  if(it.isUnique || r === "unique") return "unique";
  return r;
}
function rarityClass(it){
  return "r-" + rarityKey(it);
}
function fmtPct(x, digits=1){
  // x가 0.123이면 12.3%
  const p = x * 100;
  const v = Math.round(p * Math.pow(10, digits)) / Math.pow(10, digits);
  // 0.0 같은 값이면 소수 없애기
  return (Math.abs(v - Math.round(v)) < 1e-9) ? String(Math.round(v)) : String(v);
}

function fmtNum(x, digits=2){
  const v = Math.round(x * Math.pow(10, digits)) / Math.pow(10, digits);
  return (Math.abs(v - Math.round(v)) < 1e-9) ? String(Math.round(v)) : String(v);
}


function formatAffixReadable(mod){
  if(!mod) return "";

  // mod는 (1) roll object {kind, affix, tier, value} 또는 (2) affix object 자체일 수 있음
  const a = mod.affix || mod;
  const v = (typeof mod.value === "number") ? mod.value : a.value;

  const g = String(a.group || a.stat || a.id || "").toLowerCase();
  const name = a.name || a.id || "옵션";

  const num = (x)=> (typeof x==="number" && isFinite(x)) ? x : 0;
  const pct = (x)=>`${Math.round(num(x))}%`;
  const pct1 = (x)=>`${num(x).toFixed(1)}%`;

  // ===== 퍼센트/수치 표기 규칙 =====
  // - 피해/공속/범위/저항/치확/치피 등: %로 표기
  // - 최대체력/추가물리: 숫자
  // - 재생: /s

  // 피해(%) 
  if(g.includes("spell_damage")) return `주문 피해 +${pct(v)}`;
  if(g.includes("fire_damage")) return `화염 피해 +${pct(v)}`;
  if(g.includes("cold_damage")) return `냉기 피해 +${pct(v)}`;
  if(g.includes("light_damage")) return `번개 피해 +${pct(v)}`;
  if(g.includes("phys") && !g.includes("flat")) return `물리 피해 +${pct(v)}`;

  // flat phys
  if(g.includes("phys_flat")) return `추가 물리 피해 +${Math.round(num(v))}`;

  // 속도/범위
  if(g.includes("attackspeed")) return `공격 속도 +${pct(v)}`;
  if(g === "range" || g.includes("melee_range")) return `범위 +${pct(v)}`;

  // 치명
  if(g.includes("critchance")) return `치명타 확률 +${pct1(v)}`;
  if(g.includes("critmulti")) return `치명타 피해 +${pct(v)}`;

  // 생존
  if(g.includes("life_leech")) return `생명력 흡수 ${pct(v)}`;
  if(g.includes("life") || g.includes("maxhp")) return `최대 체력 +${Math.round(num(v))}`;
  if(g.includes("hpregen")) return `재생 +${num(v).toFixed(2)}/s`;

  // 방어/이속
  if(g.includes("armor_pct")) return `방어도 +${pct(v)}`;
  if(g.includes("movespeed")) return `이동 속도 +${pct(v)}`;

  // 저항
  if(g.includes("resist_all")) return `모든 저항 +${Math.round(num(v))}`;
  if(g.includes("resist_fire")) return `화염 저항 +${Math.round(num(v))}`;
  if(g.includes("resist_cold")) return `냉기 저항 +${Math.round(num(v))}`;
  if(g.includes("resist_light")) return `번개 저항 +${Math.round(num(v))}`;

  // fallback: name + value
  if(typeof v === "number"){
    // 값이 0~1 소수면 %로 표시해보기(구형 데이터 호환)
    if(v > 0 && v < 1) return `${name} +${pct(v*100)}`;
    return `${name} +${Math.round(num(v))}`;
  }
  return `${name}`;
}


function rarityLabel(it){
  const r = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
  if(r==="unique") return "유니크";
  if(r==="rare") return "레어";
  if(r==="magic") return "매직";
  return "노멀";
}

function getWeaponDisplayStats(it){
  if(!it || it.slot !== "weapon") return null;

  const baseMin = Number(player?.weapon?.min ?? 14);
  const baseMax = Number(player?.weapon?.max ?? 20);
  const td = it.totalData || it.data || {};

  const dmgMul = Number(td.dmgMul ?? 1);
  const flat = Number(td.flatDamage ?? 0);

  // 일부 베이스가 spdMul을 "공격 속도 감각"으로 쓰고 있어서 fallback으로 허용
  let atkMul = Number(td.atkSpdMul ?? 0);
  if(!(atkMul > 0)) atkMul = Number(td.spdMul ?? 1);
  if(!(atkMul > 0)) atkMul = 1;

  const min = Math.max(1, Math.floor(baseMin * dmgMul + flat));
  const max = Math.max(min, Math.floor(baseMax * dmgMul + flat));
  const avg = (min + max) / 2;
  const dps = avg * atkMul;

  return { min, max, atkMul, dps };
}

function prettyItemHTML(it){
  if(!it) return "";

  const rCls = rarityClass(it);
  let html = `<div class="itemInfoWrap">`;

  // 1) 아이템 이름(등급 색)
  html += `<div class="itemInfoName ${rCls}">${escHtml(it.name || "")}</div>`;

  // 유니크(전설)는 예외 처리: 설명만 깔끔히
  if(it.isUnique){
    const desc = it.uniqueRef?.desc || it.desc || "";
    if(desc){
      html += `<div class="itemInfoLine itemInfoDim">${escHtml(desc)}</div>`;
    }
    html += `</div>`;
    return html;
  }

  // 2) 베이스 + ilvl + 베이스 티어
  const baseName = it.baseName || it.baseId || it.id || "";
  if(baseName){
    const bt = (typeof it.baseTier === "number") ? ` (티어 ${it.baseTier})` : "";
    html += `<div class="itemInfoLine itemInfoDim">베이스: ${escHtml(baseName)}${escHtml(bt)}</div>`;
  }
  if(typeof it.ilvl === "number"){
    html += `<div class="itemInfoLine itemInfoDim">아이템 레벨: ${it.ilvl}</div>`;
  }

  // 등급 표기
  html += `<div class="itemInfoLine itemInfoDim">등급: ${rarityLabel(it)}</div>`;

  // 3) 암묵 옵션(Implicit) — 접두/접미와 완전 분리
  const imps = Array.isArray(it.implicits) ? it.implicits : [];
  if(imps.length){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">암묵 옵션</div>`;
    for(const imp of imps){
      if(!imp) continue;
      // text가 있는 암묵만 출력 (헬퍼용 Min/Max 조각 등은 숨김)
      if(!imp.text) continue;
      const line = imp.text;
      html += `<div class="itemInfoLine">- ${escHtml(line)}</div>`;
    }
  }

  // 4) 베이스 옵션
  html += `<div class="itemInfoGap"></div>`;
  html += `<div class="itemInfoLine itemInfoDim">베이스 옵션</div>`;

  if(it.slot === "weapon"){
    const ws = getWeaponDisplayStats(it);
    if(ws){
      html += `<div class="itemInfoLine">- 공격력: ${ws.min} - ${ws.max}</div>`;
      html += `<div class="itemInfoLine">- 공격 속도: x${ws.atkMul.toFixed(2)}</div>`;
      html += `<div class="itemInfoLine">- DPS: ${ws.dps.toFixed(1)}</div>`;
    }
    if(typeof it.baseDamage === "number"){
      html += `<div class="itemInfoLine itemInfoDim">- 기본 무기 피해 +${Math.floor(it.baseDamage)}</div>`;
    }
  }

  if(it.baseData){
    const d = it.baseData;
    if(d.maxHpAdd) html += `<div class="itemInfoLine">- 최대 체력 +${Math.floor(d.maxHpAdd)}</div>`;
    if(d.armorAdd) html += `<div class="itemInfoLine">- 방어력 +${Math.floor(d.armorAdd)}</div>`;
    if(d.hpRegen)  html += `<div class="itemInfoLine">- 재생 +${d.hpRegen.toFixed(2)}/s</div>`;
  }

  // 4) 접두 / 접미 옵션만 표시
  const aff = Array.isArray(it.affixes) ? it.affixes : [];
  const prefixes = aff.filter(a => a && a.affix && a.kind === "prefix");
  const suffixes = aff.filter(a => a && a.affix && a.kind === "suffix");

  if(prefixes.length){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">접두</div>`;
    for(const a of prefixes){
      const tier = a.tier ? ` <span class="itemInfoTier">T${a.tier}</span>` : "";
      const line = formatAffixReadable(a);
      html += `<div class="itemInfoLine">- ${escHtml(line)}${tier}</div>`;
    }
  }

  if(suffixes.length){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">접미</div>`;
    for(const a of suffixes){
      const tier = a.tier ? ` <span class="itemInfoTier">T${a.tier}</span>` : "";
      const line = formatAffixReadable(a);
      html += `<div class="itemInfoLine">- ${escHtml(line)}${tier}</div>`;
    }
  }

  html += `</div>`;
  return html;
}

function rebuildGearFromEquipment(){
  player.gear = {
    armorAdd: 0, maxHpAdd: 0, hpRegen: 0,
    critChanceAdd: 0, critChanceMul: 1, critMultiAdd: 0,
  };

  for(const slot of EQUIP_SLOTS){
    const it = equipment[slot];
    if(!it) continue;
    if(it.isUnique) continue;
    const d = it.totalData || it.data;
    if(!d) continue;
    for(const k in d){
      const v = d[k];
      if(typeof v !== "number") continue;
      if(k.endsWith("Mul")) player.gear[k] *= v;
      else player.gear[k] += v;
    }
  }
  recalcFromGear();
  player.hp = Math.min(player.hp, player.maxHp);
}

/* ===== 아이템 아이콘: 이모지 대신 캔버스에 간단 도형 ===== */
function drawItemIcon(c, it){
  const g = c.getContext("2d");
  const W = c.width, H = c.height;
  g.clearRect(0,0,W,H);

  // 바탕(어두운 칸에서도 아이콘이 "보이게" 하이라이트)
  g.save();
  g.globalAlpha = 1;
  g.fillStyle = "rgba(0,0,0,0.15)";
  g.fillRect(0,0,W,H);

  // 테두리(희귀도) — PoE식: normal(흰) / magic(파) / rare(노) / unique(주황)
  const rr = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
  g.lineWidth = 3;

  if(rr==="unique") g.strokeStyle = "#ffb86b";
  else if(rr==="rare") g.strokeStyle = "#ffd166";
  else if(rr==="magic") g.strokeStyle = "#2f7bff";
  else g.strokeStyle = "#ffffff";

  // ✅ 동그라미 링 → 사각형 링(요청 반영)
  const pad = 4;
  g.strokeRect(pad, pad, W - pad*2, H - pad*2);

  // 슬롯이 없으면 빈칸
  if(!it){ g.restore(); return; }

  // 공통: 아이콘 중앙 정렬
  g.translate(W/2, H/2);
  g.globalAlpha = 0.98;

  // ===== 무기: 베이스 타입별 아이콘 =====
  if(it.slot==="weapon"){
    const baseId = it.baseId || it.id;
    const tmpl = getItemTemplateById(baseId);
    const wt = tmpl?.weaponType || tmpl?.type || (() => {
      const tags = tmpl?.tags || [];
      if(tags.includes("2h_axe") || tags.includes("axe")) return "2h_axe";
      if(tags.includes("2h_mace") || tags.includes("mace")) return "2h_mace";
      if(tags.includes("warstaff")) return "warstaff";
      if(tags.includes("staff")) return "staff";
      return "2h_sword";
    })();

    // 공통 스케일
    g.save();
    g.scale(1.0, 1.0);
    g.lineWidth = 4;
    g.strokeStyle = "rgba(255,255,255,0.85)";
    g.fillStyle = "rgba(255,255,255,0.75)";

    // 2H Sword: 기존 느낌(길쭉한 검)
    if(wt==="2h_sword"){
      g.beginPath();
      g.moveTo(-2, -16); g.lineTo(2, -16); g.lineTo(3, 10); g.lineTo(-3, 10);
      g.closePath(); g.fill();
      g.fillRect(-10, 6, 20, 3);   // 가드
      g.fillRect(-2, 10, 4, 8);    // 손잡이
    }
    // 2H Axe: 큰 도끼날
    else if(wt==="2h_axe"){
      g.fillRect(-2, -16, 4, 30);  // 자루
      g.beginPath();               // 도끼날
      g.moveTo(-2, -6);
      g.lineTo(-14, -12);
      g.lineTo(-14, 0);
      g.lineTo(-2, 2);
      g.closePath(); g.fill();
      g.beginPath();
      g.moveTo(2, -6);
      g.lineTo(8, -10);
      g.lineTo(8, 0);
      g.lineTo(2, 2);
      g.closePath(); g.fill();
      g.fillRect(-6, 8, 12, 3);    // 가드 느낌
    }
    // 2H Mace: 큰 철퇴머리
    else if(wt==="2h_mace"){
      g.fillRect(-2, -16, 4, 30);  // 자루
      g.fillRect(-8, -18, 16, 10); // 머리
      // 스파이크
      g.fillRect(-10, -16, 4, 2);
      g.fillRect(6, -16, 4, 2);
      g.fillRect(-2, -22, 4, 4);
      g.fillRect(-2, -8, 4, 3);
    }
    // Staff: 마법 지팡이(끝 구슬)
    else if(wt==="staff"){
      g.fillRect(-2, -16, 4, 30);
      g.beginPath();
      g.arc(0, -18, 6, 0, Math.PI*2);
      g.fill();
      g.fillRect(-4, 8, 8, 3);
    }
    // Warstaff: 전쟁지팡이(양끝 금속)
    else if(wt==="warstaff"){
      g.fillRect(-2, -16, 4, 30);
      g.fillRect(-8, -20, 16, 5);
      g.fillRect(-8, 12, 16, 5);
      g.fillRect(-5, -24, 10, 4);
      g.fillRect(-5, 17, 10, 4);
    }
    else{
      // fallback
      g.fillRect(-2, -16, 4, 30);
      g.fillRect(-10, 6, 20, 3);
    }

    g.restore();
  }


  // ===== 투구: "검투사 투구" =====
  else if(it.slot==="helm"){
    g.save();
    // 둥근 돔
    g.fillStyle = "#c7c7c7";
    g.beginPath();
    g.arc(0, -2, 13, Math.PI, 0);
    g.closePath();
    g.fill();

    // 볼가드/턱부분
    g.fillStyle = "#9b9b9b";
    g.beginPath();
    g.moveTo(-13, -2);
    g.lineTo(-13, 8);
    g.quadraticCurveTo(-6, 14, 0, 14);
    g.quadraticCurveTo(6, 14, 13, 8);
    g.lineTo(13, -2);
    g.closePath();
    g.fill();

    // 눈구멍(슬릿)
    g.fillStyle = "#1a1a1a";
    g.fillRect(-9, 1, 7, 3);
    g.fillRect(2, 1, 7, 3);

    // 중앙 능선(검투사 느낌)
    g.fillStyle = "#eaeaea";
    g.fillRect(-1, -14, 2, 26);

    // 하이라이트
    g.globalAlpha = 0.25;
    g.fillStyle="#fff";
    g.beginPath();
    g.arc(-5, -6, 10, Math.PI*1.05, Math.PI*1.55);
    g.strokeStyle="rgba(255,255,255,0.4)";
    g.lineWidth=2;
    g.stroke();

    g.restore();
  }

  // ===== 갑옷: "중세 기사 풀플레이트" =====
  else if(it.slot==="chest"){
    g.save();
    // 흉갑 본체
    g.fillStyle="#bdbdbd";
    g.beginPath();
    g.moveTo(-12, -12);
    g.lineTo(-8, 14);
    g.quadraticCurveTo(0, 18, 8, 14);
    g.lineTo(12, -12);
    g.closePath();
    g.fill();

    // 어깨 플레이트
    g.fillStyle="#9e9e9e";
    g.beginPath();
    g.moveTo(-14, -10);
    g.lineTo(-8, -14);
    g.lineTo(-4, -2);
    g.lineTo(-12, 0);
    g.closePath();
    g.fill();

    g.beginPath();
    g.moveTo(14, -10);
    g.lineTo(8, -14);
    g.lineTo(4, -2);
    g.lineTo(12, 0);
    g.closePath();
    g.fill();

    // 복부 판금 라인
    g.strokeStyle="rgba(0,0,0,0.35)";
    g.lineWidth=2;
    g.beginPath();
    g.moveTo(-8, 0); g.lineTo(8, 0);
    g.moveTo(-7, 5); g.lineTo(7, 5);
    g.moveTo(-6, 10); g.lineTo(6, 10);
    g.stroke();

    // 중앙 하이라이트
    g.globalAlpha = 0.28;
    g.fillStyle="#fff";
    g.fillRect(-2, -10, 2, 22);

    g.restore();
  }

  // ===== 반지: "파란 보석 박힌 반지" =====
  else if(it.slot==="ring"){
    g.save();
    // 링 바디
    g.strokeStyle="#e5e5e5";
    g.lineWidth=4;
    g.beginPath();
    g.arc(0, 2, 10, 0, Math.PI*2);
    g.stroke();

    // 보석(파란색)
    g.fillStyle="#3aa0ff";
    g.beginPath();
    g.arc(0, -8, 4, 0, Math.PI*2);
    g.fill();

    // 보석 하이라이트
    g.globalAlpha = 0.35;
    g.fillStyle="#ffffff";
    g.beginPath();
    g.arc(-1, -9, 2, 0, Math.PI*2);
    g.fill();

    // 보석 받침(세팅)
    g.globalAlpha = 1;
    g.fillStyle="#cfcfcf";
    g.fillRect(-3, -6, 6, 2);

    g.restore();
  }

  // 그 외
  else{
    g.save();
    g.fillStyle="#999";
    g.fillRect(-10,-10,20,20);
    g.restore();
  }

  g.restore();
}

function getSelectedItem(){
  if(!selectedItem) return null;
  if(selectedItem.from==="bag") return inventory[selectedItem.idx] || null;
  if(selectedItem.from==="equip") return equipment[selectedItem.slot] || null;
  return null;
}

function renderEquipPanel(){
  syncPlayerVitalDisplay();
  equipSlotsEl.innerHTML = "";

  // ✅ 스펙창 장착 슬롯 순서 고정: 무기, 투구, 갑옷, 반지
  const SLOT_ORDER = ["weapon","helm","chest","ring"];

  for(const slot of SLOT_ORDER){
    const it = equipment[slot];

    const d = document.createElement("div");
    d.className = "eSlotSmall";
    if(it) d.classList.add(rarityClass(it));
    if(selectedItem && selectedItem.from==="equip" && selectedItem.slot===slot) d.classList.add("selected");

    const c = document.createElement("canvas");
    c.width = 44; c.height = 44;
    d.appendChild(c);
    drawItemIcon(c, it);

    d.addEventListener("click", ()=>{
      // 1) 가방에서 선택한 아이템이 있으면 -> 해당 슬롯에 장착
      if(selectedItem && selectedItem.from==="bag"){
        equipFromBagToSlot(selectedItem.idx, slot);
        selectedItem = {from:"equip", slot};
        renderAllPanels();
        return;
      }

      // 2) 스펙창에서 슬롯 선택/해제(토글)
      if(!selectedItem || selectedItem.from!=="equip" || selectedItem.slot!==slot){
        selectedItem = {from:"equip", slot};
      }else{
        // ✅ 다시 누르면: 선택만 해제 (더블탭/연타로 아이템 빠지는 기능 제거)
        selectedItem = null;
      }
      renderAllPanels();
    });

    equipSlotsEl.appendChild(d);
  }

function equipFromBagToSlot(invIndex, slot){
  const it = inventory[invIndex];
  if(!it) return;
  if(it.isUnique) return;
  if(it.slot !== slot) return;

  if(equipment[slot]) inventory.push(equipment[slot]);
  inventory.splice(invIndex, 1);
  equipment[slot] = it;

  selectedItem = {from:"equip", slot};
  rebuildGearFromEquipment();
  renderAllPanels();

  _callHook('afterEquip', slot, equipment[slot]);
}

function unequipSlotToBag(slot){
  const it = equipment[slot];
  if(!it) return;
  equipment[slot] = null;
  inventory.push(it);
  selectedItem = null;
  rebuildGearFromEquipment();
  renderAllPanels();

  _callHook('afterUnequip', slot);
}

/* ✅ POE 전용 제작(오브) 시스템  */
/* ============================= */

function rebuildItemInstanceFromAffixes(it, baseId, tmpl, rarity, ilvl, tags, affixes){
  const baseData = buildBaseDataFromItemId(baseId);
  const safeAff = Array.isArray(affixes) ? clampAffixLimits(affixes, rarity) : [];

  const mods = buildItemMods(baseId, baseData, safeAff, tags);
  const affixData = buildAffixDataFromMods(mods);
  const totalData = mergeItemData(baseData, affixData);

  const preNames = safeAff.filter(x=>x.kind==="prefix").map(x=>x.affix.name);
  const sufNames = safeAff.filter(x=>x.kind==="suffix").map(x=>x.affix.name);

  // 이름 규칙(PoE):
  // - normal: 베이스명
  // - magic : (접두) 베이스 (접미)  ※ 접두/접미 각각 최대 1개만 표시
  // - rare  : 레어 전용 2단어 이름(베이스명 대신)
  // - unique: (유니크는 템플릿/아이템에 이미 이름이 있으면 그걸 유지)
  let nm = tmpl.name;

  if(rarity === "magic"){
    const pre = preNames[0] || "";
    const suf = sufNames[0] || "";
    if(pre && suf) nm = pre + " " + nm + " " + suf;
    else if(pre) nm = pre + " " + nm;
    else if(suf) nm = nm + " " + suf;
  }else if(rarity === "rare"){
    nm = rollRareName();
  }else if(rarity === "unique"){
    nm = (it.uniqueName || tmpl.uniqueName || it.name || tmpl.name);
  }

  it.baseId = baseId;
  it.baseName = tmpl.name;
  it.name = nm;
  it.rarity = rarity;
  it.ilvl = ilvl;

  it.baseData = baseData;
  it.tags = tags;
  it.affixes = safeAff;
  it.mods = mods;

  it.affixData = affixData;
  it.totalData = totalData;
  it.data = totalData;

  it.shownDesc = (tmpl.descGen ? tmpl.descGen(totalData) : (it.shownDesc || ""));
}

function setCraftMsg(msg){ try{ const d=document.getElementById("orbDesc"); if(d) d.textContent=msg; }catch(e){} }

function craftOnSelected(type){
  // ✅ 타락된 아이템은 어떤 크래프팅도 불가능
  try{
    const itLock = (typeof selectedItem!=="undefined" && selectedItem) ? getSelectedItem()
                 : (typeof craftSelectedItem!=="undefined" && craftSelectedItem) ? craftSelectedItem
                 : (typeof currentCraftItem!=="undefined" && currentCraftItem) ? currentCraftItem
                 : null;
    const itCheck = itLock || (typeof getSelectedItem==="function" ? getSelectedItem() : null);
    if(itCheck && itCheck.corrupted){
      const d = document.getElementById("orbDesc");
      if(d) d.textContent = "타락된 아이템은 크래프팅할 수 없습니다.";
      return;
    }
  }catch(e){}

  const sel = selectedItem;
  if(!sel) return;

  const it = getSelectedItem();
  if(!it) return;
  if(it.isUnique) return;

  const baseId = it.baseId || it.id;
  const tmpl = getItemTemplateById(baseId);
  if(!tmpl) return;

  const ilvl = it.ilvl || getItemLevel();
  const tags = inferItemTagsFromTemplate(tmpl, baseId);

  const curR = it.rarity || "normal";
  const curAff = Array.isArray(it.affixes) ? it.affixes.slice() : [];

  function spend(refName){
    // refName: string variable name
    if(refName === "transmuteOrbs"){ if(transmuteOrbs<=0) return false; transmuteOrbs--; return true; }
    if(refName === "alterationOrbs"){ if(alterationOrbs<=0) return false; alterationOrbs--; return true; }
    if(refName === "augmentationOrbs"){ if(augmentationOrbs<=0) return false; augmentationOrbs--; return true; }
    if(refName === "regalOrbs"){ if(regalOrbs<=0) return false; regalOrbs--; return true; }
    if(refName === "alchemyOrbs"){ if(alchemyOrbs<=0) return false; alchemyOrbs--; return true; }
    if(refName === "chaosOrbs"){ if(chaosOrbs<=0) return false; chaosOrbs--; return true; }
    if(refName === "scouringOrbs"){ if(scouringOrbs<=0) return false; scouringOrbs--; return true; }
    if(refName === "exaltedOrbs"){ if(exaltedOrbs<=0) return false; exaltedOrbs--; return true; }
    if(refName === "annulOrbs"){ if(annulOrbs<=0) return false; annulOrbs--; return true; }
    if(refName === "divineOrbs"){ if(divineOrbs<=0) return false; divineOrbs--; return true; }
    if(refName === "corruptOrbs"){ if(typeof corruptOrbs!=="number"||corruptOrbs<=0) return false; corruptOrbs--; return true; }
    return false;
  }

  let nextR = curR;
  let nextAff = curAff;

  // 제작 규칙(간소화 PoE):
  if(type === "transmute"){
    if(curR !== "normal") return;
    if(!spend("transmuteOrbs")) return;
    nextR = "magic";
    nextAff = rollAffixesPOE("magic", ilvl, tags);
  }
  else if(type === "alter"){
    if(curR !== "magic") return;
    if(!spend("alterationOrbs")) return;
    nextR = "magic";
    nextAff = rollAffixesPOE("magic", ilvl, tags);
  }
  else if(type === "aug"){
    if(curR !== "magic") return;
    if(curAff.length >= 2) return;
    if(!spend("augmentationOrbs")) return;
    nextR = "magic";
    nextAff = rollAffixesPOE("magic", ilvl, tags, { existingAffixes:curAff, keepExisting:true, total: curAff.length+1, add:true });
  }
  else if(type === "regal"){
    if(curR !== "magic") return;
    if(curAff.length < 1) return;
    if(!spend("regalOrbs")) return;
    nextR = "rare";
    nextAff = rollAffixesPOE("rare", ilvl, tags, { existingAffixes:curAff, keepExisting:true, total: curAff.length+1, add:true });
  }
  else if(type === "alchemy"){
    if(curR !== "normal") return;
    if(!spend("alchemyOrbs")) return;
    nextR = "rare";
    nextAff = rollAffixesPOE("rare", ilvl, tags);
  }
  else if(type === "chaos"){
    if(!(curR === "rare" || curR === "rare")) return;
    if(!spend("chaosOrbs")) return;
    nextR = curR;
    nextAff = rollAffixesPOE(nextR, ilvl, tags);
  }
  else if(type === "scour"){
    if(curR === "normal") return;
    if(!spend("scouringOrbs")) return;
    nextR = "normal";
    nextAff = [];
  }
  else if(type === "exalt"){
    if(!(curR === "rare" || curR === "rare")) return;
    if(curAff.length >= maxAffixesForRarity(curR)) return;
    if(!spend("exaltedOrbs")) return;
    nextR = curR;
    nextAff = rollAffixesPOE(nextR, ilvl, tags, { existingAffixes:curAff, keepExisting:true, total: curAff.length+1, add:true });
  }
  else if(type === "annul"){
    if(curAff.length <= 0) return;
    if(!spend("annulOrbs")) return;
    nextR = curR;
    const k = (Math.random()*curAff.length)|0;
    nextAff = curAff.slice();
    nextAff.splice(k, 1);
    // affix가 0이면 normal로 떨어뜨리지는 않음(원하면 바꿀 수 있음)
    if(nextR === "magic" && nextAff.length === 0) nextR = "normal";
  }
  else if(type === "divine"){
    if(curAff.length <= 0) return;
    if(!spend("divineOrbs")) return;
    nextR = curR;
    nextAff = rerollValuesPOE(curAff, ilvl);
  }
  else if(type === "corrupt"){
    // 타락: 아이템에 '타락' 상태만 부여 (이후 크래프팅 불가)
    if(!spend("corruptOrbs")) return;
    it.corrupted = true;
    const d = document.getElementById("orbDesc");
    if(d) d.textContent = "타락되었습니다.";
    // 즉시 UI 갱신
    renderAllPanels();
    return;
  }


  rebuildItemInstanceFromAffixes(it, baseId, tmpl, nextR, ilvl, tags, nextAff);

  // 장비/가방 위치에 따라 반영 + 스탯 재계산
  if(sel.from === "equip"){
    equipment[sel.slot] = it;
    rebuildGearFromEquipment();
  }

  renderAllPanels();
}

/* ✅ ISOMETRIC DRAW (NEW)        */
/* ============================= */
function drawIsoFloorTile(sx, sy, variant, x=0, y=0){
  const w = ISO.tileW, h = ISO.tileH;

  // base diamond
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();

  // POE-ish stone variation (deterministic-ish)
  const v = variant & 3;
  if(v === 0) ctx.fillStyle = "#1b1b1b";
  else if(v === 1) ctx.fillStyle = "#202020";
  else if(v === 2) ctx.fillStyle = "#181818";
  else ctx.fillStyle = "#242424";
  ctx.fill();

function drawIsoWallBlock(sx, sy, opts={}){
  const w = ISO.tileW, h = ISO.tileH;
  const wallH = ISO.wallH || (h * 2.2);
  const topY = sy - wallH;

  // shadow cast on floor (soft)
  ctx.save();
  ctx.globalAlpha *= 0.55;
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fill();
  ctx.restore();

  // ===== TOP (brighter stone) =====
  ctx.beginPath();
  ctx.moveTo(sx, topY - h/2);
  ctx.lineTo(sx + w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx - w/2, topY);
  ctx.closePath();
  ctx.fillStyle = "#35302a";
  ctx.fill();

  // top bevel highlight
  ctx.strokeStyle = "rgba(255,255,255,0.10)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx - w/2, topY);
  ctx.lineTo(sx, topY - h/2);
  ctx.lineTo(sx + w/2, topY);
  ctx.stroke();

  // ===== LEFT FACE (mid) =====
  ctx.beginPath();
  ctx.moveTo(sx - w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "#26211c";
  ctx.fill();

  // ===== RIGHT FACE (dark) =====
  ctx.beginPath();
  ctx.moveTo(sx + w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "#1f1a16";
  ctx.fill();

  // edges / corner lines
  ctx.strokeStyle = "rgba(0,0,0,0.70)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx - w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx + w/2, topY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(sx - w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.stroke();

  // tiny rune-like accent (optional)
  if(opts.rune){
    ctx.save();
    ctx.globalAlpha *= 0.22;
    ctx.strokeStyle = "rgba(255,80,60,0.55)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx, topY + h*0.15);
    ctx.lineTo(sx, sy - h*0.05);
    ctx.stroke();
    ctx.restore();
  }
}


function drawIsoPillar(sx, sy){
  const w = ISO.tileW, h = ISO.tileH;
  const wallH = ISO.wallH || (h * 2.2);
  const topY = sy - wallH - h*0.25;

  // base shadow
  ctx.save();
  ctx.globalAlpha *= 0.55;
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fill();
  ctx.restore();

  // column body (simple: stacked faces)
  // left
  ctx.beginPath();
  ctx.moveTo(sx - w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx, sy + h*0.45);
  ctx.lineTo(sx - w*0.22, sy + h*0.22);
  ctx.closePath();
  ctx.fillStyle = "#2b2620";
  ctx.fill();

  // right
  ctx.beginPath();
  ctx.moveTo(sx + w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx, sy + h*0.45);
  ctx.lineTo(sx + w*0.22, sy + h*0.22);
  ctx.closePath();
  ctx.fillStyle = "#211c17";
  ctx.fill();

  // cap
  ctx.beginPath();
  ctx.moveTo(sx, topY - h*0.22);
  ctx.lineTo(sx + w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx - w*0.22, topY);
  ctx.closePath();
  ctx.fillStyle = "#3a342d";
  ctx.fill();

  ctx.strokeStyle = "rgba(0,0,0,0.75)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx - w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx + w*0.22, topY);
  ctx.stroke();
}



function drawIsoDisc(sx, sy, r, fill, stroke){
  ctx.save();
  ctx.translate(sx, sy);
  // 아이소메트릭 느낌(원 → 타원)
  ctx.scale(1, 0.62);
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.closePath();
  if(fill){
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if(stroke){
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.restore();
}




// ✅ exact-1-tile ellipse helpers (match isometric tile proportions)
function __isoTileScaleY(){
  // tile diamond is ISO.tileW : ISO.tileH (usually 1 : 0.5)
  // use that ratio for effects that must fit exactly 1 tile footprint
  return (ISO && ISO.tileW && ISO.tileH) ? (ISO.tileH / ISO.tileW) : 0.5;
}
function drawIsoDiscTile(sx, sy, r, fill, stroke){
  const syScale = __isoTileScaleY();
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, syScale);
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.closePath();
  if(fill){ ctx.fillStyle = fill; ctx.fill(); }
  if(stroke){ ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
  ctx.restore();
}
function drawIsoRingGlowTile(sx, sy, r, innerA, outerA){
  const syScale = __isoTileScaleY();
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, syScale);

  const g = ctx.createRadialGradient(0,0, r*0.15, 0,0, r*1.05);
  g.addColorStop(0.00, `rgba(255,200,120,0)`);
  g.addColorStop(0.35, `rgba(255,200,120,${Math.max(0, innerA*0.55)})`);
  g.addColorStop(0.55, `rgba(255,120,20,${innerA})`);
  g.addColorStop(0.85, `rgba(255,60,0,${outerA})`);
  g.addColorStop(1.00, `rgba(0,0,0,0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0,0,r*1.05,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = `rgba(255,180,80,${Math.min(0.55, innerA+0.12)})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,r*0.98,0,Math.PI*2);
  ctx.stroke();

  ctx.restore();
}
