    // second arm for two-hand weapons: back hand grips the shaft (with a bit of lag while attacking)
    if(isTwoHand){
      const targetGrip = (typeof attacking !== "undefined" && attacking) ? (r*0.30) : (r*0.22);
      __backHandLag += (targetGrip - __backHandLag) * 0.22;
      const gripY = __backHandLag;

      ctx.save();
      ctx.rotate(-ang); // keep the arm mostly aligned to body
      ctx.strokeStyle = "rgba(40,40,40,0.80)";
      ctx.lineWidth = 2.4;

      ctx.beginPath();
      ctx.moveTo(r*0.06, -r*0.10); // shoulder-ish (inside torso)
      ctx.lineTo(0, gripY);        // grip on shaft
      ctx.stroke();
      ctx.restore();
    }

    // handle (below hand)
    // 🔍 weapon size (slightly bigger)
    const WEAPON_SCALE = 1.65;
    ctx.save();
    ctx.scale(WEAPON_SCALE, WEAPON_SCALE);

    ctx.strokeStyle = "rgba(110,70,30,0.95)";
    ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, r*0.62);
    ctx.stroke();

    // weapon head (above hand)
    if(kind === "staff" || kind === "warstaff"){
      // long staff + orb
      ctx.strokeStyle = "rgba(120,80,35,0.95)";
      ctx.lineWidth = 3.0;
      ctx.beginPath();
      ctx.moveTo(0, -r*0.78);
      ctx.lineTo(0, r*0.62);
      ctx.stroke();

      ctx.fillStyle = t.metal;
      ctx.beginPath(); ctx.arc(0, -r*0.82, 3.2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.45)";
      ctx.lineWidth = 1.6;
      ctx.stroke();

    } else if(kind === "2h_axe"){
      // axe: big side triangle + notch (recognizable)
      ctx.fillStyle = t.blade;
      const by = -r*0.30;
      ctx.beginPath();
      ctx.moveTo(0, by);
      ctx.lineTo(r*0.62, by - r*0.28);
      ctx.lineTo(r*0.62, by + r*0.28);
      ctx.closePath();
      ctx.fill();

      // notch
      ctx.save();
      ctx.globalCompositeOperation = "destination-out";
      ctx.beginPath();
      ctx.moveTo(r*0.16, by);
      ctx.lineTo(r*0.55, by - r*0.12);
      ctx.lineTo(r*0.55, by + r*0.12);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineWidth = 1.8;
      ctx.stroke();

    } else if(kind === "2h_mace"){
      // mace: long rectangle head laid across (recognizable)
      ctx.fillStyle = t.metal;
      const hy = -r*0.34;
      const w  = r*0.74;
      const h  = r*0.24;
      ctx.beginPath();
      ctx.rect(-w/2, hy - h/2, w, h);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineWidth = 1.8;
      ctx.stroke();

      // studs
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      for(let i=0;i<4;i++){
        ctx.beginPath();
        ctx.arc((-w*0.28 + i*(w*0.18)), hy - h*0.15, 1.0, 0, Math.PI*2);
        ctx.fill();
      }

    } else {
      // sword default
      ctx.strokeStyle = t.blade;
      ctx.lineWidth = 3.0;
      ctx.beginPath();
      ctx.moveTo(0, -r*0.80);
      ctx.lineTo(0, 0);
      ctx.stroke();

      // tip
      ctx.fillStyle = t.blade;
      ctx.beginPath();
      ctx.moveTo(0, -r*0.86);
      ctx.lineTo(-r*0.10, -r*0.74);
      ctx.lineTo(r*0.10, -r*0.74);
      ctx.closePath();
      ctx.fill();

      // small guard
      ctx.strokeStyle = t.metal;
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.moveTo(-r*0.18, -r*0.02);
      ctx.lineTo(r*0.18, -r*0.02);
      ctx.stroke();
    }
    ctx.restore(); // end WEAPON_SCALE

    ctx.restore();
  }

  // map weaponType -> kind string for renderer
  const kind = weaponType || "2h_sword";
  
  drawWeaponAndArm(kind);


  ctx.restore();

  // ===== FX (glow / invul) in world space =====
  const glow = (p && p.levelGlow) ? p.levelGlow : 0;
  if(glow > 0){
    const a = Math.min(1, glow/60);
    drawIsoDisc(sx, sy - 14, r*1.25, `rgba(255,210,80,${0.14*a})`, null);
  }
  // player invulnerability remains active, but the hit ring visual is removed.
}


function drawIso(){
  if(!ISO.tileW) isoInit();

  const ZOOM = 1.4; // 🔍 카메라 확대값

  // ✅ 화면 클리어는 반드시 identity에서
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 카메라(아이소 좌표 기준) — 줌을 반영해서 플레이어가 화면 중앙에 고정
  const pIso = isoProject(player.x, player.y);
  let camX = pIso.x - (canvas.width  / (2*ZOOM));
  let camY = pIso.y - (canvas.height / (2*ZOOM));
  // shake가 있으면 간단 반영
  if(typeof shake !== "undefined" && shake > 0){
    camX += (Math.random()-0.5)*shake;
    camY += (Math.random()-0.5)*shake;
  }

  // ✅ 월드만 확대(줌). 이후 sx/sy 계산은 그대로(iso - cam)
  ctx.setTransform(ZOOM,0,0,ZOOM,0,0);

  // ✅ 바닥 먼저 깔고, 벽/오브젝트/캐릭터는 depth 정렬로 한 번에 처리
  const drawables = [];

  // 타일: (x+y) 순서로 순회하되, 바닥은 즉시, 벽은 drawable로 넣어서 "가려짐"을 만든다.
  const maxS = (mapSize-1) + (mapSize-1);
  for(let s=0; s<=maxS; s++){
    for(let x=0; x<mapSize; x++){
      const y = s - x;
      if(y < 0 || y >= mapSize) continue;

      const tile = (map[y] && map[y][x] !== undefined) ? map[y][x] : 1;
      const wx = x*tileSize + tileSize/2;
      const wy = y*tileSize + tileSize/2;

      const iso = isoProject(wx, wy);
      const sx = iso.x - camX;
      const sy = iso.y - camY;

      // 화면 밖이면 스킵(성능)
      if(sx < -ISO.tileW*2 || sx > canvas.width + ISO.tileW*2 || sy < -ISO.tileH*6 || sy > canvas.height + ISO.tileH*6) continue;

      // 바닥(벽 타일도 밑바닥은 깐다)
      const v = ((x*73856093) ^ (y*19349663)) & 3;
      drawIsoFloorTile(sx, sy, v, x, y);

      // 벽은 나중에 그려야, 캐릭터/몹이 "벽 뒤로" 들어갈 때 가려짐이 생김
      if(tile === 1){
        drawables.push({ key: iso.y + 0.002, kind:"wall", iso, obj:{rune: (((x*92837111)^(y*6892871))&7)===0} });
      }else if(tile === 2){
        drawables.push({ key: iso.y + 0.002, kind:"pillar", iso, obj:null });
      }
    }
  }

  // fireZones / blood zones 등 (있으면) — 바닥 효과라 벽보다 약간 먼저(키를 아주 작게)
  if(typeof fireZones !== "undefined" && Array.isArray(fireZones)){
    for(const z of fireZones){
      if(!z) continue;
      const iso = isoProject(z.x, z.y);
      drawables.push({ key: iso.y - 0.002, kind:"zone", iso, obj:z });
    }
  }

  // fire embers (PoE-ish sparks)
  if(typeof fireEmbers !== "undefined" && Array.isArray(fireEmbers)){
    for(const p of fireEmbers){
      if(!p) continue;
      const iso = isoProject(p.x, p.y);
      drawables.push({ key: iso.y - 0.001, kind:"ember", iso, obj:p });
    }
  }

  // arrows / projectiles
  if(typeof arrows !== "undefined" && Array.isArray(arrows)){
    for(const a of arrows){
      if(!a) continue;
      const iso = isoProject(a.x, a.y);
      drawables.push({ key: iso.y - 0.001, kind:"arrow", iso, obj:a });
    }
  }

  // particles
  if(typeof particles !== "undefined" && Array.isArray(particles)){
    for(const p of particles){
      if(!p) continue;
      const iso = isoProject(p.x, p.y);
      drawables.push({ key: iso.y - 0.0005, kind:"particle", iso, obj:p });
    }
  }

  // blood particles
  if(typeof bloodParticles !== "undefined" && Array.isArray(bloodParticles)){
    for(const p of bloodParticles){
      if(!p) continue;
      const iso = isoProject(p.x, p.y);
      drawables.push({ key: iso.y - 0.0004, kind:"blood", iso, obj:p });
    }
  }

  // enemies
  if(Array.isArray(enemies)){
    for(const e of enemies){
      if(!e) continue;
      if(e.hp <= 0 && !(e.dead && e.deathTimer > 0)) continue;
      const iso = isoProject(e.x, e.y);
      drawables.push({ key: iso.y, kind:"enemy", iso, obj:e });
    }
  }

  // player
  drawables.push({ key: pIso.y + 0.001, kind:"player", iso: pIso, obj: player });

  // depth sort
  drawables.sort((a,b)=>a.key-b.key);

  // draw
  for(const d of drawables){
    const sx = d.iso.x - camX;
    const sy = d.iso.y - camY;

if(d.kind === "wall"){
  // ✅ wall fade if it blocks the player (POE-style visibility)
  const fade = (pIso.y < d.iso.y - ISO.tileH*0.10) ? 0.35 : 1.0;
  ctx.save();
  ctx.globalAlpha *= fade;
  drawIsoWallBlock(sx, sy, d.obj || {});
  ctx.restore();
  continue;
}

if(d.kind === "pillar"){
  const fade = (pIso.y < d.iso.y - ISO.tileH*0.10) ? 0.35 : 1.0;
  ctx.save();
  ctx.globalAlpha *= fade;
  drawIsoPillar(sx, sy);
  ctx.restore();
  continue;
}

    if(d.kind === "zone"){
      const z = d.obj;
      if(z.isBleed){
        const r = (z.radius ?? 50);
        drawIsoDisc(sx, sy, r, "rgba(120,10,10,0.20)", "rgba(0,0,0,0.35)");
      }else{
        drawFireZoneIso(sx, sy, z);
      }
    }else if(d.kind === "ember"){
      drawEmberIso(sx, sy, d.obj);
    }else if(d.kind === "arrow"){
      drawIsoArrowSprite(sx, sy, d.obj);
    }else if(d.kind === "particle"){
      const p = d.obj;
      const alpha = Math.max(0, Math.min(1, (p.alpha ?? 1) * ((p.life ?? 10)/22)));
      if(p.kind === "arrowTrail"){
        ctx.save();
        ctx.translate(sx, sy);
        ctx.scale(1, 0.62);
        ctx.rotate(p.angle || 0);
        ctx.strokeStyle = `rgba(255,255,255,${0.28*alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-(p.size ?? 10), 0);
        ctx.lineTo(0, 0);
        ctx.stroke();
        ctx.restore();
      }else if(p.kind === "arrowSpark"){
        drawIsoDisc(sx, sy, p.size ?? 3, `rgba(255,220,150,${0.90*alpha})`, null);
      }else if(p.kind === "heavyShock"){
        const r = Math.max(3, p.size ?? 5);
        drawIsoDisc(sx, sy, r, `rgba(255,245,220,${0.42*alpha})`, null);
      }else{
        const r = 4;
        drawIsoDisc(sx, sy, r, `rgba(255,255,255,${0.35*alpha})`, null);
      }
    }else if(d.kind === "blood"){
      const p = d.obj;
      const alpha = Math.max(0, Math.min(1, ((p.life ?? 18)/26)));
      const r = Math.max(1.6, p.size ?? 2.4);
      drawIsoDisc(sx, sy, r, `rgba(150,0,0,${0.85*alpha})`, null);
    }else if(d.kind === "enemy"){
      const e = d.obj;
      drawIsoEnemySprite(sx, sy, e);
    }else if(d.kind === "player"){
      drawIsoPlayerSprite(sx, sy, player);
    }
  }

  if(enemyDeathBursts.length){
    for(const b of enemyDeathBursts){
      const pr = isoProject((b.x||0) - camX, (b.y||0) - camY);
      drawIsoEnemyDeathBurst(pr.x + canvas.width/2, pr.y + canvas.height/2 - ISO.camYOffset, b);
    }
  }

// ✅ POE-ish vignette + ambient darkness
ctx.save();
ctx.setTransform(1,0,0,1,0,0);
const grd = ctx.createRadialGradient(canvas.width*0.5, canvas.height*0.40, Math.min(canvas.width,canvas.height)*0.10,
                                     canvas.width*0.5, canvas.height*0.40, Math.max(canvas.width,canvas.height)*0.75);
grd.addColorStop(0, "rgba(0,0,0,0.00)");
grd.addColorStop(1, "rgba(0,0,0,0.45)");
ctx.fillStyle = grd;
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.restore();

  // Ground loot
  try{ if(typeof drawIsoLootLabels === "function") drawIsoLootLabels(camX, camY); }catch(e){}


  // ✅ UI는 월드 줌/이동 영향 받지 않게 리셋
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalAlpha = 1;
  // UI/HUD
  try{ if(typeof drawMinimap === "function") drawMinimap(); }catch(e){}
  try{ if(typeof drawHpOrb === "function") drawHpOrb(); }catch(e){}
  try{ if(typeof drawBossHpBar === "function") drawBossHpBar(); }catch(e){}
  try{ if(typeof drawSkillOrbs === "function") drawSkillOrbs(); }catch(e){}
}

  }
}

function __randPickWeighted(pairs){
  // pairs: [{v, w}]
  let sum = 0;
  for(const p of pairs){ sum += Math.max(0, p.w||0); }
  if(sum <= 0) return pairs[0]?.v;
  let r = Math.random() * sum;
  for(const p of pairs){
    r -= Math.max(0, p.w||0);
    if(r <= 0) return p.v;
  }
  return pairs[pairs.length-1]?.v;
}

// 1) 슬롯 분포 (PoE 느낌: 초반 무기/갑옷 위주, 후반 반지/기타도 섞임)

        {v:"weapon", w:45},
        {v:"chest",  w:25},
        {v:"helm",   w:15},
        {v:"boots",  w:10},
        {v:"ring",   w:5},

    if(t <= 6){
      return __randPickWeighted([
        {v:"weapon", w:35},
        {v:"chest",  w:25},
        {v:"helm",   w:15},
        {v:"boots",  w:12},
        {v:"ring",   w:13},
      ]);
    }
    return __randPickWeighted([
      {v:"weapon", w:28},
      {v:"chest",  w:22},
      {v:"helm",   w:15},
      {v:"boots",  w:13},
      {v:"ring",   w:22},

// 2) 베이스 티어 분포 (mapTier가 오를수록 상위 tier 비중 증가)
if(typeof pickBaseTierForMap !== "function"){
  window.pickBaseTierForMap = function(mapTier){
    const t = Math.max(1, mapTier||1);
    // baseTier: 1~5 기준
    if(t <= 2)  return __randPickWeighted([{v:1,w:80},{v:2,w:20}]);
    if(t <= 4)  return __randPickWeighted([{v:1,w:45},{v:2,w:35},{v:3,w:20}]);
    if(t <= 6)  return __randPickWeighted([{v:1,w:20},{v:2,w:30},{v:3,w:30},{v:4,w:20}]);
    if(t <= 8)  return __randPickWeighted([{v:2,w:20},{v:3,w:35},{v:4,w:30},{v:5,w:15}]);
    return __randPickWeighted([{v:3,w:25},{v:4,w:35},{v:5,w:40}]);
  };
}

// 3) ilvl 스케일 (맵티어 상승 → ilvl 상승)
if(typeof rollItemLevelFromMapTier !== "function"){
  window.rollItemLevelFromMapTier = function(mapTier){
    const t = Math.max(1, mapTier||1);
    // 예: t=1 → 1~8, t=5 → 21~28, t=10 → 46~55
    const base = (t-1)*5 + 1;
    const jitter = Math.floor(Math.random()*8); // 0~7
    return base + jitter;
  };
}

  }

    if(!it || it.isUnique) return;
    it.metaCraft = it.metaCraft || {lockPrefix:false,lockSuffix:false};

    if(!it || it.isUnique) return;
    it.metaCraft = it.metaCraft || {lockPrefix:false,lockSuffix:false};
    it.metaCraft.lockSuffix = !it.metaCraft.lockSuffix;
    if(typeof renderAllPanels === "function") renderAllPanels();
  };

  document.getElementById("btnRemoveMeta").onclick = ()=>{
    const it = (typeof getSelectedItem === "function") ? getSelectedItem() : null;
    if(!it || it.isUnique) return;
    it.metaCraft = it.metaCraft || {lockPrefix:false,lockSuffix:false};
    if(!it.metaCraft.lockPrefix && !it.metaCraft.lockSuffix) return;

    if(typeof exaltedOrbs !== "number" || exaltedOrbs < 3) return;
    exaltedOrbs -= 3;

    it.metaCraft.lockPrefix = false;
    it.metaCraft.lockSuffix = false;

    if(typeof renderAllPanels === "function") renderAllPanels();
  };

function renderMetaCraftUI(){
  ensureMetaCraftUI();

  const it = (typeof getSelectedItem === "function") ? getSelectedItem() : null;
  const p = document.getElementById("btnLockPrefix");
  const s = document.getElementById("btnLockSuffix");
  const r = document.getElementById("btnRemoveMeta");

  if(!it || it.isUnique){
    if(p) p.disabled = true;
    if(s) s.disabled = true;
    if(r) r.disabled = true;
    return;
  }

  it.metaCraft = it.metaCraft || {lockPrefix:false,lockSuffix:false};

  if(p) p.textContent = `접두 고정 (${it.metaCraft.lockPrefix ? "ON" : "OFF"})`;
  if(s) s.textContent = `접미 고정 (${it.metaCraft.lockSuffix ? "ON" : "OFF"})`;

  if(r){
    const metaOn = it.metaCraft.lockPrefix || it.metaCraft.lockSuffix;
    const enough = (typeof exaltedOrbs === "number" && exaltedOrbs >= 3);
    r.disabled = !(metaOn && enough);
    r.style.opacity = r.disabled ? "0.55" : "1";
  }
}

      const insert = `
        <div class="itemInfoGap"></div>
        <div class="itemInfoLine itemInfoDim">메타</div>
        ${it.metaCraft.lockPrefix ? '<div class="itemInfoLine itemInfoMeta">- 접두 고정</div>' : ''}
        ${it.metaCraft.lockSuffix ? '<div class="itemInfoLine itemInfoMeta">- 접미 고정</div>' : ''}
      `;
      // 가장 마지막 </div> 앞에 넣기 (원본이 itemInfoWrap을 div로 닫는 구조라고 가정)
      const idx = html.lastIndexOf("</div>");
      if(idx !== -1){
        html = html.slice(0, idx) + insert + html.slice(idx);

        html += insert;
      }

    try{ e.preventDefault(); e.stopPropagation(); }catch(_){}
  }

  function typeFromId(id){
    switch(id){
      case "orbTransmute": return "transmute";
      case "orbAlter": return "alter";
      case "orbAug": return "aug";

      case "orbAlchemy": return "alchemy";

      case "orbCorrupt": return "corrupt";

    if(!grid) return;
    grid.querySelectorAll("button.orbBtn").forEach(b=>b.classList.remove("active"));
    if(btn) btn.classList.add("active");

  function selectOrb(btn){

/* ===== Craft Orbs: 아이템 아이콘 스타일로 렌더 (캔버스) ===== */
(function(){
  if(window.__orbIconStyleV1) return;
  window.__orbIconStyleV1 = true;

  function getCountById(id){
    try{
      switch(id){
        case "orbTransmute": return (typeof transmuteOrbs==="number") ? transmuteOrbs : 0;
        case "orbAlter":     return (typeof alterationOrbs==="number") ? alterationOrbs : 0;
        case "orbAug":       return (typeof augmentationOrbs==="number") ? augmentationOrbs : 0;
        case "orbRegal":     return (typeof regalOrbs==="number") ? regalOrbs : 0;
        case "orbAlchemy":   return (typeof alchemyOrbs==="number") ? alchemyOrbs : 0;
        case "chaosBtn":     return (typeof chaosOrbs==="number") ? chaosOrbs : 0;
        case "orbScour":     return (typeof scouringOrbs==="number") ? scouringOrbs : 0;
        case "orbExalt":     return (typeof exaltedOrbs==="number") ? exaltedOrbs : 0;
        case "orbAnnul":     return (typeof annulOrbs==="number") ? annulOrbs : 0;
        case "orbDivine":    return (typeof divineOrbs==="number") ? divineOrbs : 0;
        case "orbCorrupt":   return (typeof corruptOrbs==="number") ? corruptOrbs : 0;
        default: return 0;
      }
    }catch(e){ return 0; }
  }

  function rarityForOrb(id){
    // 색 규칙을 "희귀도 테두리"로 치환 (drawItemIcon의 테두리 색 사용)
    // normal=흰, magic=파, rare=금, unique=주황
    if(id==="orbTransmute" || id==="orbAlter" || id==="orbAug") return "magic";           // 파란 계열
    if(id==="orbRegal") return "rare";                                                   // 금(제왕: 금+파는 코어에서 표현)
    if(id==="orbAlchemy") return "rare";                                                 // 금쪽 (연금은 코어/심볼로 은+금 느낌)
    if(id==="chaosBtn" || id==="orbExalt" || id==="orbDivine") return "rare";            // 금
    if(id==="orbScour") return "normal";                                                 // 흰
    if(id==="orbAnnul") return "magic";                                                  // 코발트 느낌은 코어로
    if(id==="orbCorrupt") return "unique";                                               // 타락(붉은 주황 계열)
    return "normal";
  }

  function drawOrbIcon(canvas, id){
    const g = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    g.clearRect(0,0,W,H);

    // 배경(아이템 아이콘 스타일)
    g.fillStyle = "rgba(0,0,0,0.18)";
    g.fillRect(0,0,W,H);

    // 테두리(희귀도 색)
    const rr = rarityForOrb(id);
    g.lineWidth = 3;
    if(rr==="unique") g.strokeStyle = "#ffb86b";
    else if(rr==="rare") g.strokeStyle = "#ffd166";
    else if(rr==="magic") g.strokeStyle = "#2f7bff";
    else g.strokeStyle = "#ffffff";
    const pad = 4;
    g.strokeRect(pad, pad, W-pad*2, H-pad*2);

    // 중앙: "오니 머리" 실루엣(기존 아이템 캔버스 스타일에 맞춘 단순 실루엣)
    // (이미지 없이, 도형으로만)
    g.save();
    g.translate(W/2, H/2 - 2);

    // 코어 컬러
    let core = "#2a2a2a";
    if(id==="orbTransmute" || id==="orbAlter" || id==="orbAug") core = "#2f7bff";
    if(id==="orbRegal") core = "#c8a23a";
    if(id==="orbAlchemy") core = "#d8d8d8";
    if(id==="chaosBtn" || id==="orbExalt" || id==="orbDivine") core = "#b88a2a";
    if(id==="orbScour") core = "#f0f0f0";
    if(id==="orbAnnul") core = "#2a66ff";
    if(id==="orbCorrupt") core = "#c23a2a";

    // 은은한 코어 광
    const rg = g.createRadialGradient(0,-10,6, 0,-10, 34);
    rg.addColorStop(0, "rgba(255,255,255,0.28)");
    rg.addColorStop(0.25, core + "AA");
    rg.addColorStop(1, "rgba(0,0,0,0.0)");
    g.fillStyle = rg;
    g.beginPath();
    g.arc(0,0,32,0,Math.PI*2);
    g.fill();

    // 오니 얼굴(마스크) - 다크 메탈 + 코어 하이라이트
    g.fillStyle = "rgba(0,0,0,0.55)";
    g.strokeStyle = "rgba(255,255,255,0.20)";
    g.lineWidth = 2;

    // 얼굴
    g.beginPath();
    g.moveTo(0,-22);
    g.quadraticCurveTo(22,-18, 20,0);
    g.quadraticCurveTo(18,22, 0,24);
    g.quadraticCurveTo(-18,22, -20,0);
    g.quadraticCurveTo(-22,-18, 0,-22);
    g.closePath();
    g.fill(); g.stroke();

    // 뿔
    g.fillStyle = "rgba(0,0,0,0.65)";
    g.beginPath();
    g.moveTo(-10,-20); g.lineTo(-26,-32); g.lineTo(-16,-10); g.closePath();
    g.moveTo(10,-20);  g.lineTo(26,-32);  g.lineTo(16,-10);  g.closePath();
    g.fill();

    // 눈(코어색)
    g.fillStyle = core;
    g.shadowColor = core;
    g.shadowBlur = 8;
    g.beginPath(); g.arc(-8,-2,3,0,Math.PI*2); g.fill();
    g.beginPath(); g.arc(8,-2,3,0,Math.PI*2); g.fill();
    g.shadowBlur = 0;

    g.restore();
  }

/* ===== Orb touchstart binding (iOS) ===== */
(function(){
  if(window.__orbTouchStart) return;
  window.__orbTouchStart = true;

  function stop(e){
    try{ if(typeof stopEvt==="function") stopEvt(e); }catch(_){}
    try{ e.preventDefault(); e.stopPropagation(); }catch(_){}
  }

  function typeFromId(id){
    switch(id){
      case "orbTransmute": return "transmute";
      case "orbAlter": return "alter";
      case "orbAug": return "aug";
      case "orbRegal": return "regal";
      case "orbAlchemy": return "alchemy";
      case "chaosBtn": return "chaos";
      case "orbScour": return "scour";
      case "orbExalt": return "exalt";
      case "orbAnnul": return "annul";
      case "orbDivine": return "divine";
      case "orbCorrupt": return "corrupt";
      default: return null;
    }

  function setActive(btn){
    const grid = document.getElementById("craftOrbGrid");
    if(!grid) return;
    grid.querySelectorAll("button.orbBtn").forEach(b=>b.classList.remove("active"));
    if(btn) btn.classList.add("active");
  }

  function selectOrb(btn){
    const t = typeFromId(btn.id);
    if(!t) return;
    window.craftSelectedOrb = t;

    if(!grid) return;
    grid.querySelectorAll("button.orbBtn").forEach(btn=>{
      if(btn.__touchBound) return;
      btn.__touchBound = true;
      btn.addEventListener("touchstart", (e)=>{ stop(e); selectOrb(btn); }, {capture:true, passive:false});
    });
  }

  if(typeof renderAllPanels==="function"){
    const _orig = renderAllPanels;
    renderAllPanels = function(){
      _orig();
      try{ bind(); }catch(_){}

(function(){

  window.__lootIsolationV1 = true;

  // 1) openLootChoice를 "버튼에서만" 열리도록 게이트
  if(typeof window.openLootChoice === "function" && !window.__openLootChoiceWrapped){

  window.lootNearbyItems = function(){

/* ===== ISO draw binding fix (ensures drawIso replaces draw even if draw is defined later) ===== */
(function(){
  if(window.__isoBindFixV1) return;
  window.__isoBindFixV1 = true;
  let tries = 0;
  function tick(){
    tries++;
    try{
      if(typeof window.drawIso === "function" && typeof window.draw === "function" && window.draw !== window.drawIso){
        window.__drawTopDown = window.draw;
        window.draw = window.drawIso;
      }
      // stop once bound or after ~2 seconds
      if(window.draw === window.drawIso || tries > 120) return;
    }catch(_){}
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

function __affixTierHTML(a){
  return a && a.tier ? ` <span class="itemInfoTier">T${a.tier}</span>` : "";
}
function __elemColor(type){
  if(type==="fire") return "#ff5252";
  if(type==="cold") return "#58a6ff";
  if(type==="lightning") return "#ffd84d";
  return "";
}
function __affixLineHTML(mod){
  if(!mod) return "";
  const a = mod.affix || mod;
  const v = (typeof mod.value === "number") ? mod.value : a.value;
  const g = String(a.group || a.stat || a.id || "").toLowerCase();
  const num = (x)=> (typeof x==="number" && isFinite(x)) ? x : 0;
  const pct = (x)=>`${Math.round(num(x))}%`;
  const pct1 = (x)=>`${num(x).toFixed(1)}%`;

  const mk = (txt, color="") => color ? `<span style="color:${color}">${txt}</span>` : escHtml(txt);

  if(g.includes("fire_flat")) return mk(`+${Math.round(num(v))} 🔴 화염 피해`, __elemColor("fire"));
  if(g.includes("cold_flat")) return mk(`+${Math.round(num(v))} 🔵 냉기 피해`, __elemColor("cold"));
  if(g.includes("lightning_flat")) return mk(`+${Math.round(num(v))} 🟡 번개 피해`, __elemColor("lightning"));

  if(g.includes("spell_damage")) return escHtml(`주문 피해 +${pct(v)}`);
  if(g.includes("fire_damage")) return mk(`화염 피해 +${pct(v)}`, __elemColor("fire"));
  if(g.includes("cold_damage")) return mk(`냉기 피해 +${pct(v)}`, __elemColor("cold"));
  if(g.includes("light_damage")) return mk(`번개 피해 +${pct(v)}`, __elemColor("lightning"));
  if(g.includes("phys") && !g.includes("flat")) return escHtml(`물리 피해 +${pct(v)}`);
  if(g.includes("phys_flat")) return escHtml(`추가 물리 피해 +${Math.round(num(v))}`);
  if(g.includes("attackspeed")) return escHtml(`공격 속도 +${pct(v)}`);
  if(g === "range" || g.includes("melee_range")) return escHtml(`범위 +${pct(v)}`);
  if(g.includes("critchance")) return escHtml(`치명타 확률 +${pct1(v)}`);
  if(g.includes("critmulti")) return escHtml(`치명타 피해 +${pct(v)}`);
  if(g.includes("life_leech")) return escHtml(`생명력 흡수 ${pct(v)}`);
  if(g.includes("life") || g.includes("maxhp")) return escHtml(`최대 체력 +${Math.round(num(v))}`);
  if(g.includes("hpregen")) return escHtml(`재생 +${num(v).toFixed(2)}/s`);
  if(g.includes("armor_pct")) return escHtml(`방어도 +${pct(v)}`);
  if(g.includes("movespeed")) return escHtml(`이동 속도 +${pct(v)}`);
  if(g.includes("resist_all")) return escHtml(`모든 저항 +${Math.round(num(v))}`);
  if(g.includes("resist_fire")) return mk(`화염 저항 +${Math.round(num(v))}`, __elemColor("fire"));
  if(g.includes("resist_cold")) return mk(`냉기 저항 +${Math.round(num(v))}`, __elemColor("cold"));
  if(g.includes("resist_light")) return mk(`번개 저항 +${Math.round(num(v))}`, __elemColor("lightning"));
  if(typeof v === "number") return escHtml(`${a.name || "옵션"} +${Math.round(v)}`);
  return escHtml(a.name || "옵션");
}

function __weaponAffixTotals(it){
  const aff = Array.isArray(it && it.affixes) ? it.affixes : [];
  const out = { dmgPct:0, flat:0, atkSpd:0, critChance:0, critMulti:0, range:0, fire:0, cold:0, lightning:0 };
  for(const roll of aff){
    if(!roll || !roll.affix) continue;
    const g = String(roll.affix.group || "").toLowerCase();
    const v = Number(roll.value || 0);
    if(g.includes("fire_flat")) out.fire += v;
    else if(g.includes("cold_flat")) out.cold += v;
    else if(g.includes("lightning_flat")) out.lightning += v;
    else if(g.includes("phys_flat")) out.flat += v;
    else if(g.includes("attackspeed")) out.atkSpd += v;
    else if(g.includes("critchance")) out.critChance += v;
    else if(g.includes("critmulti")) out.critMulti += v;
    else if(g === "range" || g.includes("melee_range")) out.range += v;
    else if(g.includes("phys")) out.dmgPct += v;
  }
  return out;
}

function getWeaponDisplayStats(it){
  if(!it || it.slot !== "weapon") return null;
  const baseMin = Number(player?.weapon?.min ?? 14);
  const baseMax = Number(player?.weapon?.max ?? 20);
  const baseData = it.baseData || {};
  const aff = __weaponAffixTotals(it);

  const baseDmgMul = Number(baseData.dmgMul ?? 1);
  const baseAtkMul = Number(baseData.spdMul ?? 1);

  let min = Math.max(1, Math.floor(baseMin * baseDmgMul));
  let max = Math.max(min, Math.floor(baseMax * baseDmgMul));

  if(aff.dmgPct){
    min = Math.max(1, Math.floor(min * (1 + aff.dmgPct/100)));
    max = Math.max(min, Math.floor(max * (1 + aff.dmgPct/100)));
  }

  const elemFlat = aff.fire + aff.cold + aff.lightning;
  min = Math.max(1, Math.floor(min + aff.flat + elemFlat));
  max = Math.max(min, Math.floor(max + aff.flat + elemFlat));

  const atkMul = Math.max(0.1, baseAtkMul * (1 + aff.atkSpd/100));
  const avg = (min + max) / 2;
  const dps = avg * atkMul;

  return {
    min, max, atkMul, dps,
    flatPhys: aff.flat,
    fireFlat: aff.fire,
    coldFlat: aff.cold,
    lightningFlat: aff.lightning,
    dmgPct: aff.dmgPct,
    critChance: aff.critChance,
    critMulti: aff.critMulti,
    rangePct: aff.range
  };
}

function prettyItemHTML(it){
  if(!it) return "";
  const rCls = rarityClass(it);
  let html = `<div class="itemInfoWrap">`;
  html += `<div class="itemInfoName ${rCls}">${escHtml(it.name || "")}</div>`;

  if(it.isUnique){
    const desc = it.uniqueRef?.desc || it.desc || "";
    if(desc) html += `<div class="itemInfoLine itemInfoDim">${escHtml(desc)}</div>`;
    html += `</div>`;
    return html;
  }

  const baseName = it.baseName || it.baseId || it.id || "";
  if(baseName){
    const bt = (typeof it.baseTier === "number") ? ` (티어 ${it.baseTier})` : "";
    html += `<div class="itemInfoLine itemInfoDim">베이스: ${escHtml(baseName)}${escHtml(bt)}</div>`;
  }
  if(typeof it.ilvl === "number"){
    html += `<div class="itemInfoLine itemInfoDim">아이템 레벨: ${it.ilvl}</div>`;
  }
  html += `<div class="itemInfoLine itemInfoDim">등급: ${rarityLabel(it)}</div>`;

  const imps = Array.isArray(it.implicits) ? it.implicits : [];
  if(imps.length){
    html += `<div class="itemInfoGap"></div><div class="itemInfoLine itemInfoDim">암묵 옵션</div>`;
    for(const imp of imps){
      if(imp && imp.text) html += `<div class="itemInfoLine">- ${escHtml(imp.text)}</div>`;
    }
  }

  html += `<div class="itemInfoGap"></div><div class="itemInfoLine itemInfoDim">베이스 옵션</div>`;
  if(it.slot === "weapon"){
    const ws = getWeaponDisplayStats(it);
    if(ws){
      html += `<div class="itemInfoLine">- 최종 공격력: ${ws.min} - ${ws.max}</div>`;
      html += `<div class="itemInfoLine">- 공격 속도: x${ws.atkMul.toFixed(2)}</div>`;
      html += `<div class="itemInfoLine">- DPS: ${ws.dps.toFixed(1)}</div>`;
      if(ws.flatPhys) html += `<div class="itemInfoLine itemInfoDim">- 추가 물리 피해 +${Math.round(ws.flatPhys)}</div>`;
      if(ws.fireFlat) html += `<div class="itemInfoLine"><span style="color:${__elemColor("fire")}">- +${Math.round(ws.fireFlat)} 🔴 화염 피해</span></div>`;
      if(ws.coldFlat) html += `<div class="itemInfoLine"><span style="color:${__elemColor("cold")}">- +${Math.round(ws.coldFlat)} 🔵 냉기 피해</span></div>`;
      if(ws.lightningFlat) html += `<div class="itemInfoLine"><span style="color:${__elemColor("lightning")}">- +${Math.round(ws.lightningFlat)} 🟡 번개 피해</span></div>`;
    }
  }

  if(it.baseData){
    const d = it.baseData;
    if(d.maxHpAdd) html += `<div class="itemInfoLine">- 최대 체력 +${Math.floor(d.maxHpAdd)}</div>`;
    if(d.armorAdd) html += `<div class="itemInfoLine">- 방어력 +${Math.floor(d.armorAdd)}</div>`;
    if(d.hpRegen)  html += `<div class="itemInfoLine">- 재생 +${d.hpRegen.toFixed(2)}/s</div>`;
  }

  const aff = Array.isArray(it.affixes) ? it.affixes : [];
  const prefixes = aff.filter(a => a && a.affix && a.kind === "prefix");
  const suffixes = aff.filter(a => a && a.affix && a.kind === "suffix");

  if(prefixes.length){
    html += `<div class="itemInfoGap"></div><div class="itemInfoLine itemInfoDim">접두</div>`;
    for(const a of prefixes){
      html += `<div class="itemInfoLine">- ${__affixLineHTML(a)}${__affixTierHTML(a)}</div>`;
    }
  }

  if(suffixes.length){
    html += `<div class="itemInfoGap"></div><div class="itemInfoLine itemInfoDim">접미</div>`;
    for(const a of suffixes){
      html += `<div class="itemInfoLine">- ${__affixLineHTML(a)}${__affixTierHTML(a)}</div>`;
    }
  }

  html += `</div>`;
  return html;
}

/* ✅ 상태이상 시스템 통합 패치   */
/* - 화상: 지속 피해
   - 냉기: 둔화
   - 감전: 받는 피해 증가
/* ============================= */
(function(){
  if(window.__AILMENT_PATCH_APPLIED__) return;
  window.__AILMENT_PATCH_APPLIED__ = true;

  function __ensureAilments(e){
    if(!e) return e;
    if(!e.ailments) e.ailments = { burn:0, chill:0, shock:0 };
    if(!e.ailmentPower) e.ailmentPower = { burn:0, chill:0, shock:0 };
    return e;
  }

  function __isBossLike(e){
    return !!(e && (e.type === "boss" || e.isElite || e.type === "demon"));
  }

  function __bossDampen(e, v){
    return __isBossLike(e) ? (v * 0.5) : v;
  }

  function __clamp(v, lo, hi){
    return Math.max(lo, Math.min(hi, v));
  }

  function __applyAilmentsFromDamageResult(e, dmgRes){
    if(!e || !dmgRes || !dmgRes.dealtPacket) return;
    __ensureAilments(e);

    const pkt = dmgRes.dealtPacket;
    rememberEnemyKillFxKind(e, pkt, "physical");
    const fire = Number(pkt.fire || 0);
    const cold = Number(pkt.cold || 0);
    const lightning = Number(pkt.lightning || 0);

    if(fire > 0 && Math.random() < 0.28){
      const dur = Math.round(__bossDampen(e, 96));
      const pwr = Math.max(0.6, __bossDampen(e, fire * 0.16));
      e.ailments.burn = Math.max(e.ailments.burn || 0, dur);
      e.ailmentPower.burn = Math.max(e.ailmentPower.burn || 0, pwr);
    }

    if(cold > 0 && Math.random() < 0.34){
      const dur = Math.round(__bossDampen(e, 84));
      const slow = __clamp(__bossDampen(e, 0.18 + cold * 0.01), 0.12, __isBossLike(e) ? 0.22 : 0.38);
      e.ailments.chill = Math.max(e.ailments.chill || 0, dur);
      e.ailmentPower.chill = Math.max(e.ailmentPower.chill || 0, slow);
    }

    if(lightning > 0 && Math.random() < 0.24){
      const dur = Math.round(__bossDampen(e, 72));
      const amp = __clamp(__bossDampen(e, 0.10 + lightning * 0.008), 0.08, __isBossLike(e) ? 0.16 : 0.28);
      e.ailments.shock = Math.max(e.ailments.shock || 0, dur);
      e.ailmentPower.shock = Math.max(e.ailmentPower.shock || 0, amp);
    }
  }

  function __doAilmentDeathRewards(e, source){
    if(!e || e._ailmentDeathHandled) return;
    e._ailmentDeathHandled = true;

    if(e.type === "boss"){
      if(typeof startBossDeath === "function") startBossDeath(e);
      return;
    }

    try{
      if(typeof emitEvent === "function"){
        emitEvent("kill", { enemy:e, x:e.x, y:e.y, type:e.type, source: source || "ailment" });
      }
    }catch(_){}

    const ailmentFxKind = source === "burn" ? "fire" : source === "chill" ? "cold" : source === "shock" ? "lightning" : getEnemyKillFxKind(e, "physical");
    try{ if(typeof spawnEnemyDeathBurst === "function") spawnEnemyDeathBurst(e.x, e.y, e.type, ailmentFxKind); }catch(_){}
    try{ if(typeof spawnLoot === "function") spawnLoot(e.x, e.y, source || "ailment"); }catch(_){}
    try{ if(typeof giveXP === "function") giveXP(e); }catch(_){}

    if(typeof killCount === "number") killCount++;
    if(typeof slowMotion === "number") slowMotion = Math.max(slowMotion, 4);

    if(typeof player !== "undefined" && player){
      player.hp = Math.min(player.maxHp || player.hp || 0, (player.hp || 0) + 1);
      if(typeof player.kiOrbs === "number" && typeof player.maxOrbs === "number" && player.kiOrbs < player.maxOrbs){
        player.kiOrbs++;
      }
    }

    if(typeof bloodPools !== "undefined" && Array.isArray(bloodPools) && bloodPools.length < 140){
      bloodPools.push({
        x: e.x, y: e.y,
        size: 10 + Math.random()*6,
        life: 520
      });
    }
  }

  function __tickEnemyAilments(e){
    if(!e || e.hp <= 0) return;
    __ensureAilments(e);

    if(e.ailments.burn > 0){
      e.ailments.burn--;
      if(typeof frameCount === "number" && frameCount % 15 === 0){
        const dmg = Math.max(1, e.ailmentPower.burn || 1);
        e.hp -= dmg;
        if(typeof __enemyHitFlashStart === "function") __enemyHitFlashStart(e, 0.65);

        if(typeof particles !== "undefined" && Array.isArray(particles) && particles.length < 260){
          particles.push({
            x: e.x + (Math.random()-0.5)*10,
            y: e.y - 8 + (Math.random()-0.5)*8,
            vx: (Math.random()-0.5)*0.5,
            vy: -0.35 - Math.random()*0.35,
            life: 14,
            kind: "burnSpark",
            alpha: 0.9,
            size: 2 + Math.random()*2
          });
        }

        if(e.hp <= 0){
          __doAilmentDeathRewards(e, "burn");
          return;
        }
      }
    }else{
      e.ailmentPower.burn = 0;
    }

    if(e.ailments.chill > 0){
      e.ailments.chill--;
    }else{
      e.ailmentPower.chill = 0;
    }

    if(e.ailments.shock > 0){
      e.ailments.shock--;
    }else{
      e.ailmentPower.shock = 0;
    }
  }

  if(typeof computeFinalDamage === "function"){
    const __origComputeFinalDamage = computeFinalDamage;
    computeFinalDamage = function(base, ctx, opt){
      const out = __origComputeFinalDamage(base, ctx, opt);
      window.__lastAilmentDamageResult = out;
      return out;
    };
  }

  if(typeof __enemyHitFlashStart === "function"){
    const __origEnemyHitFlashStart = __enemyHitFlashStart;
    __enemyHitFlashStart = function(e, power){
      __origEnemyHitFlashStart(e, power);
      try{
        __applyAilmentsFromDamageResult(e, window.__lastAilmentDamageResult);
      }catch(_){}
    };
  }

  if(typeof applyEnemyTakenDamageModsPacket === "function"){
    const __origApplyEnemyTakenDamageModsPacket = applyEnemyTakenDamageModsPacket;
    applyEnemyTakenDamageModsPacket = function(pkt, ctx){
      let out = __origApplyEnemyTakenDamageModsPacket(pkt, ctx);
      const e = ctx && ctx.enemy;
      if(e && e.ailments && e.ailments.shock > 0){
        const amp = 1 + Math.max(0, Number((e.ailmentPower && e.ailmentPower.shock) || 0));
        if(typeof scaleDamagePacket === "function"){
          out = scaleDamagePacket(out, amp);
        }else{
          out = {
            phys:(out.phys||0)*amp,
            fire:(out.fire||0)*amp,
            cold:(out.cold||0)*amp,
            lightning:(out.lightning||0)*amp,
            chaos:(out.chaos||0)*amp
          };
        }
      }
      return out;
    };
  }

  if(typeof updateSingleEnemy === "function"){
    const __origUpdateSingleEnemy = updateSingleEnemy;
    updateSingleEnemy = function(e){
      __ensureAilments(e);
      const oldSpeed = e.speed;
      if(e.ailments.chill > 0){
        const slow = Math.max(0, Math.min(0.8, Number((e.ailmentPower && e.ailmentPower.chill) || 0)));
        e.speed = oldSpeed * (1 - slow);
      }
      try{
        return __origUpdateSingleEnemy(e);
      }finally{
        e.speed = oldSpeed;
      }
    };
  }

  if(typeof updateEnemySystem === "function"){
    const __origUpdateEnemySystem = updateEnemySystem;
    updateEnemySystem = function(){
      if(typeof enemies !== "undefined" && Array.isArray(enemies)){
        for(const e of enemies){
          __tickEnemyAilments(e);
        }
      }
      return __origUpdateEnemySystem();
    };
  }

  if(typeof drawIsoEnemySprite === "function"){
    const __origDrawIsoEnemySprite = drawIsoEnemySprite;
    drawIsoEnemySprite = function(sx, sy, e){
      __origDrawIsoEnemySprite(sx, sy, e);
      if(!e || !e.ailments) return;

      ctx.save();

      if(e.ailments.chill > 0){
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = "#4aa3ff";
        ctx.beginPath();
        ctx.arc(sx, sy - 18, 14, 0, Math.PI*2);
        ctx.fill();
      }

      if(e.ailments.shock > 0){
        ctx.globalAlpha = 0.85;
        ctx.strokeStyle = "#ffd400";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx - 8, sy - 28);
        ctx.lineTo(sx - 1, sy - 20);
        ctx.lineTo(sx - 4, sy - 20);
        ctx.lineTo(sx + 6, sy - 8);
        ctx.stroke();
      }

      if(e.ailments.burn > 0){
        ctx.globalAlpha = 0.75;
        ctx.fillStyle = "#ff6a00";
        for(let i=0;i<2;i++){
          const ox = Math.sin((frameCount || 0)*0.15 + i*1.7) * 6;
          const oy = Math.cos((frameCount || 0)*0.13 + i*1.3) * 4;
          ctx.beginPath();
          ctx.arc(sx + ox, sy - 22 + oy, 2.3 + i*0.6, 0, Math.PI*2);
          ctx.fill();
        }
      }

      ctx.restore();
    };
  }

  if(typeof prettyItemHTML === "function"){
    const __origPrettyItemHTML = prettyItemHTML;
    prettyItemHTML = function(it){
      let html = __origPrettyItemHTML(it);
      try{
        if(!it || it.isUnique) return html;
        const data = it.totalData || it.data || {};
        const hasElem = (data.fireFlat || data.coldFlat || data.lightningFlat);
        if(!hasElem || !String(html).includes("itemInfoWrap")) return html;

        let extra = "";
        if(data.fireFlat) extra += `<div class="itemInfoLine"><span style="color:#ff4040">화염 피해는 일정 확률로 화상을 부여합니다.</span></div>`;
        if(data.coldFlat) extra += `<div class="itemInfoLine"><span style="color:#4aa3ff">냉기 피해는 적을 둔화시킵니다.</span></div>`;
        if(data.lightningFlat) extra += `<div class="itemInfoLine"><span style="color:#ffd400">번개 피해는 감전을 부여해 받는 피해를 증가시킵니다.</span></div>`;
        html = html.replace('</div>', `<div class="itemInfoGap"></div>${extra}</div>`);
      }catch(_){}
      return html;
    };
  }

})();

  function __applyBaseStatsIntoItem(it){

(function(){
  if(window.__COMBAT_BALANCE_PATCH__) return;
  window.__COMBAT_BALANCE_PATCH__ = true;

  function __iterEquippedItems(){
    const out = [];
    try{
      if(typeof equipment === "object" && equipment){
        for(const k of Object.keys(equipment)){
          if(equipment[k]) out.push(equipment[k]);
        }
      }
    }catch(_){}
    return out;
  }

  function __sumItemResists(it){
    const d = (it && (it.totalData || it.data)) || {};
    const imp = Array.isArray(it && it.implicits) ? it.implicits : [];
    let fire = 0, cold = 0, light = 0, chaos = 0, all = 0;
    if(typeof d.fireResAdd === "number") fire += d.fireResAdd;
    if(typeof d.coldResAdd === "number") cold += d.coldResAdd;
    if(typeof d.lightResAdd === "number") light += d.lightResAdd;
    if(typeof d.chaosResAdd === "number") chaos += d.chaosResAdd;
    if(typeof d.allResAdd === "number") all += d.allResAdd;
    for(const x of imp){
      if(!x) continue;
      const stat = x.stat;
      const val = Number(x.value || 0);
      if(stat === "fireResAdd") fire += val;
      else if(stat === "coldResAdd") cold += val;
      else if(stat === "lightResAdd") light += val;
      else if(stat === "chaosResAdd") chaos += val;
      else if(stat === "allResAdd") all += val;
    }
    return { fire, cold, light, chaos, all };
  }

  function __rebuildPlayerResists(){
    let fire = 0, cold = 0, light = 0, chaos = 0, all = 0;
    for(const it of __iterEquippedItems()){
      const r = __sumItemResists(it);
      fire += r.fire; cold += r.cold; light += r.light; chaos += r.chaos; all += r.all;
    }
    player.fireRes = Math.max(0, Math.min(75, fire + all));
    player.coldRes = Math.max(0, Math.min(75, cold + all));
    player.lightRes = Math.max(0, Math.min(75, light + all));
    player.chaosRes = Math.max(0, Math.min(75, chaos + all));
    if(!player.gear) player.gear = {};
    player.gear.fireResAdd = player.fireRes;
    player.gear.coldResAdd = player.coldRes;
    player.gear.lightResAdd = player.lightRes;
    player.gear.chaosResAdd = player.chaosRes;
    player.gear.allResAdd = all;
  }

 (function(){
  if(window.__WEAPON_STAT_RUNTIME_PATCH_V1__) return;
  window.__WEAPON_STAT_RUNTIME_PATCH_V1__ = true;

  const WEAPON_STAT_KEYS = [
    "armorAdd","maxHpAdd","hpRegen",
    "flatDamage","flatDamageAdd",
    "critChanceAdd","critChanceInc","critChanceMore",
    "critMultiAdd","critMultiInc","critMultiMore",
    "lifeLeech","hpOnHit","hpOnKill",
    "bleedChance","knockbackChance","cleaveChance","doubleHitChance","executeChance",
    "critChanceVsBoss",
  ];

  function __newGearState(){
    return {
      armorAdd: 0,
      maxHpAdd: 0,
      hpRegen: 0,

      dmgMul: 1,
      dmgInc: 0,
      dmgMore: 1,

      atkSpdMul: 1,
      atkSpdInc: 0,
      atkSpdMore: 1,

      spdMul: 1,
      rangeMul: 1,
      rangeInc: 0,
      rangeMore: 1,

      critChanceAdd: 0,
      critChanceInc: 0,
      critChanceMore: 1,

      critMultiAdd: 0,
      critMultiInc: 0,
      critMultiMore: 1,

      flatDamageAdd: 0,
      maxLifePercent: 0,
      hpOnHit: 0,
      hpOnKill: 0,

      bleedChance: 0,
      knockbackChance: 0,
      cleaveChance: 0,
      doubleHitChance: 0,
      executeChance: 0,

      critChanceVsBoss: 0,
      bossDamageMul: 1,
      eliteDamageMul: 1,

      fireResAdd: 0,
      coldResAdd: 0,
      lightResAdd: 0,
      chaosResAdd: 0,
      allResAdd: 0
    };
  }

  function __mergeStat(dst, stat, value){
    const v = Number(value || 0);
    if(!isFinite(v)) return;

    if(stat === "flatDamage") stat = "flatDamageAdd";

    switch(stat){
      case "dmgMul":
      case "atkSpdMul":
      case "spdMul":
      case "rangeMul":
      case "bossDamageMul":
      case "eliteDamageMul":
        dst[stat] = (dst[stat] ?? 1) * v;
        break;

      case "critChanceMore":
      case "critMultiMore":
      case "dmgMore":
      case "atkSpdMore":
      case "rangeMore":
        dst[stat] = (dst[stat] ?? 1) * v;
        break;

      default:
        dst[stat] = (dst[stat] ?? 0) + v;
        break;
    }
  }

  function __pullItemStats(it, dst){
    if(!it) return;
    const d = (it.totalData || it.data || {});
    const imps = Array.isArray(it.implicits) ? it.implicits : [];

    for(const k of WEAPON_STAT_KEYS){
      if(typeof d[k] === "number") __mergeStat(dst, k, d[k]);
    }

    if(typeof d.dmgMul === "number") __mergeStat(dst, "dmgMul", d.dmgMul);
    if(typeof d.atkSpdMul === "number") __mergeStat(dst, "atkSpdMul", d.atkSpdMul);
    if(typeof d.rangeMul === "number") __mergeStat(dst, "rangeMul", d.rangeMul);
    if(typeof d.spdMul === "number") __mergeStat(dst, "spdMul", d.spdMul);

    if(typeof d.bossDamageMul === "number") __mergeStat(dst, "bossDamageMul", d.bossDamageMul);
    if(typeof d.eliteDamageMul === "number") __mergeStat(dst, "eliteDamageMul", d.eliteDamageMul);

    for(const imp of imps){
      if(!imp || !imp.stat) continue;
      const stat = imp.stat;
      const val = Number(imp.value || 0);
      if(!isFinite(val)) continue;
      __mergeStat(dst, stat, val);
    }
  }

  function __rebuildExtendedGearStats(){
    const gear = __newGearState();

    try{
      if(typeof equipment === "object" && equipment){
        for(const key of Object.keys(equipment)){
          const it = equipment[key];
          if(!it) continue;
          __pullItemStats(it, gear);
        }
      }
    }catch(_){}

    // increased + more → 최종 mul 산출
    gear.dmgMul     = (gear.dmgMul ?? 1)     * (1 + (gear.dmgInc ?? 0))     * (gear.dmgMore ?? 1);
    gear.atkSpdMul  = (gear.atkSpdMul ?? 1)  * (1 + (gear.atkSpdInc ?? 0))  * (gear.atkSpdMore ?? 1);
    gear.spdMul     = (gear.spdMul ?? 1)     * (1 + (gear.spdInc ?? 0))     * (gear.spdMore ?? 1);
    gear.rangeMul   = (gear.rangeMul ?? 1)   * (1 + (gear.rangeInc ?? 0))   * (gear.rangeMore ?? 1);
    gear.critChanceMore = (gear.critChanceMore ?? 1);
    gear.critMultiMore = (gear.critMultiMore ?? 1);
    gear.flatDamage = gear.flatDamageAdd || 0;

    player.gear = Object.assign(__newGearState(), player.gear || {}, gear);

    // recalcFromGear 본체가 buffs를 다시 만들더라도 안전하게 보정
    const b = player.buffs || {};
    b.dmgMul = (player.gear.dmgMul ?? 1);
    b.atkSpdMul = (player.gear.atkSpdMul ?? 1);
    b.rangeMul = (player.gear.rangeMul ?? 1);
    player.buffs = b;
  }

  if(typeof recalcFromGear === "function" && !window.__recalcWeaponStatsWrapped){
    const __orig = recalcFromGear;
    recalcFromGear = function(){
      const out = __orig();
      try{ __rebuildExtendedGearStats(); }catch(_){}
      try{ if(typeof __rebuildPlayerResists === "function") __rebuildPlayerResists(); }catch(_){}
      return out;
    };
    window.__recalcWeaponStatsWrapped = true;

    rebuild: __rebuildExtendedGearStats
  };

  function __inferEnemyElementSplit(src){
    const tags = Array.isArray(src && src.tags) ? src.tags : [];
    const type = String(src && src.type || src && src.sourceType || "").toLowerCase();

    // explicit tags first
    if(tags.includes("fire"))      return { phys:0.55, fire:0.45, cold:0, light:0, chaos:0 };
    if(tags.includes("cold"))      return { phys:0.65, fire:0, cold:0.35, light:0, chaos:0 };
    if(tags.includes("lightning")) return { phys:0.70, fire:0, cold:0, light:0.30, chaos:0 };

    // type-based defaults
    if(type === "mage" || (src && src.radius && src.life && src.tick !== undefined)) {
      return { phys:0.40, fire:0.60, cold:0, light:0, chaos:0 };
    }
    if(type === "archer" || type === "skeleton" || (tags.includes("projectile") && tags.includes("arrow"))) {
      return { phys:0.65, fire:0, cold:0.35, light:0, chaos:0 };
    }
    if(type === "demon"){
      return { phys:0.55, fire:0.45, cold:0, light:0, chaos:0 };
    }
    if(type === "boss"){
      return { phys:0.55, fire:0.15, cold:0, light:0.30, chaos:0 };
    }
    return { phys:1.0, fire:0, cold:0, light:0, chaos:0 };
  }

  function __applyResistToIncoming(totalDamage, src){
    const split = __inferEnemyElementSplit(src);
    const armor = Math.max(0, Number(player.armor || 0));

    const physBase = totalDamage * split.phys;
    const fireBase = totalDamage * split.fire;
    const coldBase = totalDamage * split.cold;
    const lightBase = totalDamage * split.light;
    const chaosBase = totalDamage * split.chaos;

    // improved armor formula: diminishing returns, scales with hit size
    const physReduction = armor / (armor + 80 + physBase * 6);
    const physTaken = physBase * (1 - Math.max(0, Math.min(0.85, physReduction)));

    const fireTaken  = fireBase  * (1 - (Math.max(0, Math.min(75, Number(player.fireRes  || 0))) / 100));
    const coldTaken  = coldBase  * (1 - (Math.max(0, Math.min(75, Number(player.coldRes  || 0))) / 100));
    const lightTaken = lightBase * (1 - (Math.max(0, Math.min(75, Number(player.lightRes || 0))) / 100));
    const chaosTaken = chaosBase * (1 - (Math.max(0, Math.min(75, Number(player.chaosRes || 0))) / 100));

    return {
      total: Math.max(1, Math.floor(physTaken + fireTaken + coldTaken + lightTaken + chaosTaken)),
      parts: {
        phys: physTaken, fire: fireTaken, cold: coldTaken, light: lightTaken, chaos: chaosTaken
      },
      reduction: physReduction
    };
  }

  if(typeof damagePlayer === "function"){
    const __origDamagePlayer = damagePlayer;
    damagePlayer = function(dmg, knockX, knockY, src){
      if(player.invul > 0 || gameOver) return;

      let incoming = dmg;
      if(typeof USE_TAG_CONTEXTS !== "undefined" && USE_TAG_CONTEXTS){
        const srcTags = src ? (src.tags ? src.tags : (typeof tagsFromEnemy === "function" ? tagsFromEnemy(src) : [])) : [];
        const ctxIn = { scope:'player', tags: (typeof mergeTags === "function" ? mergeTags(['incoming'], (typeof getPlayerTags === "function" ? getPlayerTags() : []), (typeof getMapTags === "function" ? getMapTags() : []), srcTags) : srcTags) };
        if(typeof applyPlayerTakenDamageMods === "function"){
          incoming = applyPlayerTakenDamageMods(incoming, ctxIn);
        }
      }

      const calc = __applyResistToIncoming(incoming, src);
      const finalDmg = calc.total;

      markEnergyShieldHit();
      player.hp -= finalDmg;
      if(typeof emitEvent === "function") emitEvent("takeDamage", { dmg: finalDmg, breakdown: calc.parts });
      player.invul = 25;
      if(typeof shake === "number") shake = Math.max(shake, 10);

      const nx = player.x + knockX;
      const ny = player.y + knockY;
      if(typeof canMoveTo === "function"){
        if(canMoveTo(nx, player.y)) player.x = nx;
        if(canMoveTo(player.x, ny)) player.y = ny;
      }

      if(player.hp <= 0 && typeof handleGameOver === "function") handleGameOver();

  }

  if(typeof spawnArrow === "function"){
    const __origSpawnArrow = spawnArrow;
    spawnArrow = function(fromX, fromY, toX, toY, damage){

          if(a && (!a.tags || !a.tags.includes("cold"))){
            a.tags = (typeof mergeTags === "function") ? mergeTags(a.tags || [], ["cold"]) : (a.tags || ["cold"]);
            a.sourceType = "archer";
          }
        }
      }catch(_){}
      return out;
    };
  }

  if(typeof updateMage === "function"){
    const __origUpdateMage = updateMage;
    updateMage = function(e){
      const before = Array.isArray(fireZones) ? fireZones.length : 0;
      const out = __origUpdateMage(e);
      try{
        if(Array.isArray(fireZones) && fireZones.length > before){

            f.type = "mage";
            if(typeof f.damage !== "number" || !isFinite(f.damage)) f.damage = Math.max(4, (e && e.damage ? e.damage * 0.8 : 8));
            if(typeof f.radius !== "number" && typeof f.r === "number") f.radius = f.r;
          }
        }
      }catch(_){}
      return out;
    };
  }

  if(typeof spawnEnemyAt === "function"){
    const __origSpawnEnemyAt = spawnEnemyAt;
    spawnEnemyAt = function(ex, ey, pack){

            }else if(e.type === "mage" || e.type === "demon"){
              e.attackElement = "fire";
              e.tags = (typeof mergeTags === "function") ? mergeTags(e.tags || [], ["fire"]) : (e.tags || ["fire"]);
            }else if(e.type === "boss"){
              e.attackElement = "lightning";
              e.tags = (typeof mergeTags === "function") ? mergeTags(e.tags || [], ["lightning"]) : (e.tags || ["lightning"]);
            }
          }
        }
      }catch(_){}
      return out;
    };
  }

  if(typeof spawnRandomBoss === "function"){
    const __origSpawnRandomBoss = spawnRandomBoss;

(function(){

  if(typeof window.drawLootBeamsPatched !== "undefined") return;
  window.drawLootBeamsPatched = true;

  function drawBeams(){
    try{
      if(!window.loots || !window.ctx) return;

      const ctx = window.ctx;

      for(const l of window.loots){
        if(!l) continue;

        const x = l.x || 0;
        const y = l.y || 0;

        const g = ctx.createLinearGradient(x, y-120, x, y);

        ctx.fillStyle = g;
        ctx.fillRect(x-4, y-120, 8, 120);

  if(typeof oldRender === "function"){
    window.render = function(){
      oldRender();
      drawBeams();
    }
  }

})();

      }
      return out;
    };
  }

  // ---------- 3) 엘리트 원소 비주얼 ----------
  function __drawEliteElementVfx(sx, sy, e){
    if(!e || !e.isElite) return;
    __ensureEliteElement(e);

    ctx.save();

    const t = (typeof frameCount === "number" ? frameCount : 0);

    if(e.eliteElement === "fire"){
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = "rgba(255,80,30,0.40)";
      ctx.beginPath();
      ctx.arc(sx, sy - 18, 18, 0, Math.PI*2);
      ctx.fill();

      for(let i=0;i<3;i++){
        const ox = Math.sin(t*0.12 + i*2.1) * 7;
        const oy = Math.cos(t*0.10 + i*1.7) * 5;
        ctx.globalAlpha = 0.78;
        ctx.fillStyle = i===0 ? "#ffb14a" : "#ff5a1f";
        ctx.beginPath();
        ctx.arc(sx + ox, sy - 26 + oy, 2.2 + i*0.5, 0, Math.PI*2);
        ctx.fill();
      }
    }
    else if(e.eliteElement === "cold"){
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = "rgba(90,170,255,0.38)";
      ctx.beginPath();
      ctx.arc(sx, sy - 18, 18, 0, Math.PI*2);
      ctx.fill();

      ctx.globalAlpha = 0.85;
      ctx.strokeStyle = "#8fd3ff";
      ctx.lineWidth = 1.8;
      for(let i=0;i<3;i++){
        const ox = Math.sin(t*0.10 + i*2.4) * 8;
        const oy = Math.cos(t*0.08 + i*1.9) * 4;
        ctx.beginPath();
        ctx.moveTo(sx + ox - 3, sy - 24 + oy);
        ctx.lineTo(sx + ox + 3, sy - 24 + oy);
        ctx.moveTo(sx + ox, sy - 27 + oy);
        ctx.lineTo(sx + ox, sy - 21 + oy);
        ctx.stroke();
      }
    }
    else if(e.eliteElement === "lightning"){
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = "rgba(255,220,60,0.35)";
      ctx.beginPath();
      ctx.arc(sx, sy - 18, 18, 0, Math.PI*2);
      ctx.fill();

      ctx.globalAlpha = 0.90;
      ctx.strokeStyle = "#ffd84a";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx - 7, sy - 31);
      ctx.lineTo(sx - 1, sy - 22);
      ctx.lineTo(sx - 4, sy - 22);
      ctx.lineTo(sx + 5, sy - 10);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(sx + 6, sy - 28);
      ctx.lineTo(sx + 1, sy - 20);
      ctx.lineTo(sx + 4, sy - 20);
      ctx.lineTo(sx - 3, sy - 11);
      ctx.stroke();
    }

    ctx.restore();
  }

  if(typeof drawIsoEnemySprite === "function"){
    const __origDrawIsoEnemySprite = drawIsoEnemySprite;
    drawIsoEnemySprite = function(sx, sy, e){
      __origDrawIsoEnemySprite(sx, sy, e);
      try{
        __drawEliteElementVfx(sx, sy, e);
      }catch(err){}
    };
  }

  // 적이 이미 존재하는 경우도 보강
  try{
    if(Array.isArray(enemies)){
      for(const e of enemies){
        if(e && e.isElite) __ensureEliteElement(e);
      }
    }
  }catch(_){}

})();

(function(){
  if(window.__BAG_POPUP_STABLE_PATCH__) return;
  window.__BAG_POPUP_STABLE_PATCH__ = true;

  const popupOverlay = document.getElementById("bagItemPopupOverlay");
  const popupInfoEl  = document.getElementById("bagItemPopupInfo");
  const btnPopupCraft = document.getElementById("btnBagItemPopupCraft");
  const btnPopupEquip = document.getElementById("btnBagItemPopupEquip");
  const btnPopupClose = document.getElementById("btnBagItemPopupClose");

  function closeBagItemPopup(){
    if(!popupOverlay) return;
    popupOverlay.style.display = "none";
  }

  function openBagItemPopupByIndex(idx){
    if(!popupOverlay || !popupInfoEl) return;
    const it = inventory[idx];
    if(!it) return;
    selectedItem = { from:"bag", idx };
    popupInfoEl.innerHTML = prettyItemHTML(it);
    popupOverlay.style.display = "flex";
  }

  function syncPopupButtons(){
    if(!btnPopupEquip) return;
    const it = getSelectedItem();
    const canEquip = !!(it && selectedItem && selectedItem.from==="bag" && !it.isUnique && it.slot);
    btnPopupEquip.disabled = !canEquip;
    if(btnPopupCraft) btnPopupCraft.disabled = !(it && selectedItem && selectedItem.from==="bag");
  }

  // 바깥 클릭 닫기
  if(popupOverlay){
    popupOverlay.addEventListener("pointerup", (e)=>{
      if(e.target === popupOverlay){
        stopEvt(e);
        closeBagItemPopup();
      }
    }, {passive:false});
  }
  if(btnPopupClose){
    btnPopupClose.addEventListener("pointerup", (e)=>{
      stopEvt(e);
      closeBagItemPopup();
    }, {passive:false});
  }

  if(btnPopupEquip){
    btnPopupEquip.addEventListener("pointerup", (e)=>{
      stopEvt(e);
      const it = getSelectedItem();
      if(!it || !selectedItem || selectedItem.from!=="bag" || !it.slot || it.isUnique) return;
      equipFromBagToSlot(selectedItem.idx, it.slot);
      closeBagItemPopup();
      openPanel("equip");
      renderAllPanels();
    }, {passive:false});
  }

  if(btnPopupCraft){
    btnPopupCraft.addEventListener("pointerup", (e)=>{
      stopEvt(e);
      const it = getSelectedItem();
      if(!it || !selectedItem || selectedItem.from!=="bag") return;
      closeBagItemPopup();
      openPanel("craft");
      renderAllPanels();
    }, {passive:false});
  }

  // panel 전환/닫기 시 팝업 닫기
  if(typeof openPanel === "function"){
    const __origOpenPanel = openPanel;
    openPanel = function(which){
      closeBagItemPopup();
      return __origOpenPanel(which);
    };
  }
  if(typeof closePanels === "function"){
    const __origClosePanels = closePanels;
    closePanels = function(){
      closeBagItemPopup();
      return __origClosePanels();
    };
  }

  // 가방 렌더 재정의
  if(typeof renderBagPanel === "function"){
    renderBagPanel = function(){
      bagGridEl.innerHTML = "";

      // 오른쪽/아래 고정 설명창 제거
      if(bagInfoEl){
        bagInfoEl.innerHTML = "";
        bagInfoEl.style.display = "none";
        bagInfoEl.style.minHeight = "0";
        bagInfoEl.style.overflowY = "hidden";
      }

      const bagBody = document.getElementById("bagBody");
      if(bagBody){
        bagBody.style.display = "block";
      }

      const minSlots = 24;
      const fillTo = Math.max(minSlots, Math.ceil((inventory.length)/6)*6);

      for(let i=0;i<fillTo;i++){
        const it = inventory[i] || null;

        const cell = document.createElement("div");
        cell.className = "bItem";
        if(it) cell.classList.add(rarityClass(it));
        if(it && it.isUnique) cell.classList.add("unique");
        if(selectedItem && selectedItem.from==="bag" && selectedItem.idx===i) cell.classList.add("selected");
        if(!it) cell.style.opacity = "0.35";

        const c = document.createElement("canvas");
        c.width = 40; c.height = 40;
        c.className = "iconCanvas";
        c.style.display = "block";
        c.style.background = "rgba(255,255,255,0.06)";
        cell.appendChild(c);
        drawItemIcon(c, it);

        cell.addEventListener("pointerup", (e)=>{
          stopEvt(e);
          if(!it){
            selectedItem = null;
            closeBagItemPopup();
            renderAllPanels();
            return;
          }
          openBagItemPopupByIndex(i);
          syncPopupButtons();
          renderAllPanels();
        }, {passive:false});

        bagGridEl.appendChild(cell);
      }
    };
  }

  // renderAllPanels 이후 팝업 버튼 상태만 동기화
  const __prevAfter = window.GameHooks && window.GameHooks.afterRenderPanels;
  window.GameHooks = window.GameHooks || {};
  window.GameHooks.afterRenderPanels = function(){
    try{
      if(typeof __prevAfter === "function") __prevAfter();
    }catch(err){
      console.warn("afterRenderPanels hook error", err);
    }
    try{
      syncPopupButtons();
    }catch(_){}
  };

})();

    if(typeof renderAllPanels === "function") renderAllPanels();

})();

      if(typeof bagInfoEl !== "undefined" && bagInfoEl){
        bagInfoEl.innerHTML = "";
        bagInfoEl.style.display = "none";
        bagInfoEl.style.height = "0";
        bagInfoEl.style.minHeight = "0";
        bagInfoEl.style.padding = "0";

        equipInfoEl.style.display = "none";
        equipInfoEl.style.height = "0";
        equipInfoEl.style.minHeight = "0";
        equipInfoEl.style.padding = "0";
        equipInfoEl.style.border = "0";
        equipInfoEl.style.overflow = "hidden";
      }
    }catch(_){}
    try{
      const a = document.getElementById("btnBagEquip");
      const b = document.getElementById("btnEquipUnequip");
      if(a) a.style.display = "none";
      if(b) b.style.display = "none";
      const c = document.getElementById("btnBagToEquip");
      const d = document.getElementById("btnEquipToBag");
      if(c) c.textContent = "정보";
      if(d) d.textContent = "가방";
    }catch(_){}
  }

  function currentItem(){
    try{ return (typeof getSelectedItem === "function") ? getSelectedItem() : null; }
    catch(_){ return null; }
  }

  function closePopup(){
    if(overlay) overlay.style.display = "none";
  }

  function openPopup(){
    const it = currentItem();
    if(!it || !overlay || !infoBox) return;
    infoBox.innerHTML = prettyItemHTML(it);
    if(selectedItem && selectedItem.from === "bag"){
      btnAction.textContent = "장착";
      btnAction.disabled = !!(it.isUnique || !it.slot);
    }else if(selectedItem && selectedItem.from === "equip"){
      btnAction.textContent = "해제";
      btnAction.disabled = false;
    }else{
      btnAction.textContent = "장착";
      btnAction.disabled = true;
    }
    overlay.style.display = "flex";
  }

  function tap(el, fn){
    if(!el) return;
    el.style.pointerEvents = "auto";
    el.style.touchAction = "manipulation";
    el.onclick = function(e){
      try{ if(typeof stopEvt === "function") stopEvt(e); }catch(_){}
      fn();
      return false;
    };
  }

  tap(btnClose, closePopup);

  tap(btnCraft, function(){
    if(!selectedItem) return;
    closePopup();
    if(typeof openPanel === "function") openPanel("craft");
    try{
      if(typeof updateCraftSelectedFromEquipOrBag === "function") updateCraftSelectedFromEquipOrBag();
      if(typeof renderAllPanels === "function") renderAllPanels();
    }catch(_){}
  });

  tap(btnAction, function(){
    if(!selectedItem) return;

    if(selectedItem.from === "bag"){
      const it = inventory[selectedItem.idx];
      if(!it || !it.slot || it.isUnique) return;
      if(typeof equipFromBagToSlot === "function") equipFromBagToSlot(selectedItem.idx, it.slot);
      selectedItem = {from:"equip", slot: it.slot};
      if(typeof openPanel === "function") openPanel("equip");
      if(typeof renderAllPanels === "function") renderAllPanels();
      openPopup();
      return;
    }

    if(selectedItem.from === "equip"){
      const slot = selectedItem.slot;
      if(typeof unequipSlotToBag === "function") unequipSlotToBag(slot);
      selectedItem = null;
      closePopup();
      if(typeof openPanel === "function") openPanel("bag");
      if(typeof renderAllPanels === "function") renderAllPanels();
    }
  });

  if(overlay){
    overlay.onclick = function(e){
      if(e.target === overlay){
        try{ if(typeof stopEvt === "function") stopEvt(e); }catch(_){}
        closePopup();
      }
    };

    const g = player.gear || {};
    specTextEl.textContent =

치명타 확률: ${(getCritChance()*100).toFixed(1)}%
치명타 피해 배율: +${((getCritMulti()-1)*100).toFixed(0)}%

이동 속도: ${fmtIncPctFromMul(g.spdMul ?? 1)}`;
  };

  renderBagPanel = function(){

    bagGridEl.innerHTML = "";

    const fillTo = Math.max(minSlots, Math.ceil((inventory.length)/6)*6);

    for(let i=0;i<fillTo;i++){

      cell.className = "bItem";

      if(it && it.isUnique) cell.classList.add("unique");
      if(!it) cell.style.opacity = "0.35";

      const c = document.createElement("canvas");
      c.width = 40; c.height = 40;
      c.className = "iconCanvas";
      c.style.display = "block";
      c.style.background = "rgba(255,255,255,0.06)";
      c.style.pointerEvents = "none";
      cell.appendChild(c);
      drawItemIcon(c, it);

      cell.onclick = function(e){
        try{ if(typeof stopEvt === "function") stopEvt(e); }catch(_){}
        if(!it){
          selectedItem = null;
          closePopup();
          return false;
        }
        selectedItem = {from:"bag", idx:i};
        openPopup();
        return false;
      };

      bagGridEl.appendChild(cell);
    }

  if(typeof openPanel === "function"){
    const oldOpen = openPanel;

      hideLegacyUI();
      return r;
    };
  }

    const oldClose = closePanels;
    closePanels = function(){
      closePopup();
      return oldClose();
    };
  }

  function ensureAudioReady(){
    try{
      if(!audioCtx && typeof ensureAudioCtx === "function") ensureAudioCtx();
      if(audioCtx && audioCtx.resume) audioCtx.resume();
    }catch(_){}
    return !!audioCtx;
  }
  ["swingSound","bossUnsheatheSound","thudSound","hitSound"].forEach(function(name){
    try{
      if(typeof window[name] === "function"){
        const oldFn = window[name];
        window[name] = function(){
          if(!ensureAudioReady()) return;
          return oldFn.apply(this, arguments);
        };
      }
    }catch(_){}
  });

  hideLegacyUI();
  if(typeof renderAllPanels === "function") renderAllPanels();
});

<!-- ===== Weapon affix cleanup + DPS display fix ===== -->
<script>
(function(){
  if(window.__WEAPON_AFFIX_CLEANUP_DPSFIX_V1__) return;
  window.__WEAPON_AFFIX_CLEANUP_DPSFIX_V1__ = true;

  function arr(v){ return Array.isArray(v) ? v : []; }
  function num(v, d=0){ v = Number(v); return Number.isFinite(v) ? v : d; }

  // 1) Remove unwanted weapon affixes from current pools
  try{
    if(typeof AFFIX_DB === 'object' && AFFIX_DB){
      const banStatsPrefix = new Set(['armorAdd','hpRegen']);
      const banStatsSuffix = new Set(['fireResAdd','coldResAdd','lightResAdd','chaosResAdd']);
      const hasBannedStat = (a, bannedSet) => {
        if(!a) return false;
        if(bannedSet.has(String(a.stat || ''))) return true;
        if(Array.isArray(a.mods)){
          for(const m of a.mods){
            if(m && bannedSet.has(String(m.stat || ''))) return true;
          }
        }
        return false;
      };
      AFFIX_DB.prefix = arr(AFFIX_DB.prefix).filter(a => !hasBannedStat(a, banStatsPrefix));
      AFFIX_DB.suffix = arr(AFFIX_DB.suffix).filter(a => !hasBannedStat(a, banStatsSuffix));
    }
  }catch(err){ console.warn('weapon affix cleanup failed', err); }

  // 2) Robust DPS display for item info / crafting info
  function sumModsByStat(it){
    const out = Object.create(null);
    const add = (stat, value) => {
      if(!stat) return;
      out[stat] = (out[stat] || 0) + num(value, 0);
    };

    const aff = arr(it && it.affixes);
    for(const roll of aff){
      if(!roll || !roll.affix) continue;
      const rv = num(roll.value, 0);
      const affix = roll.affix;
      if(Array.isArray(affix.mods) && affix.mods.length){
        for(const spec of affix.mods){
          if(!spec) continue;
          const scale = (typeof spec.scale === 'number') ? spec.scale : 1;
          add(spec.stat, rv * scale);
        }
      }else if(affix.stat){
        add(affix.stat, rv);
      }
    }

    const td = (it && (it.totalData || it.data)) || {};
    const known = [
      'dmgMul','dmgInc','dmgMore','flatDamage','flatDamageAdd',
      'atkSpdMul','atkSpdInc','atkSpdMore',
      'critChanceAdd','critChanceInc','critChanceMore',
      'critMultiAdd','critMultiInc','critMultiMore',
      'rangeMul','rangeInc','rangeMore',
      'fireFlat','coldFlat','lightningFlat','chaosFlat',
      'fireMul','coldMul','lightMul','chaosMul','spellMul'
    ];
    for(const k of known){
      if(typeof td[k] === 'number') add(k, td[k]);
    }
    return out;
  }

  window.__weaponAffixTotals = function(it){
    const s = sumModsByStat(it);
    return {
      dmgPct: num(s.dmgInc,0),
      flat: num(s.flatDamageAdd,0) + num(s.flatDamage,0),
      atkSpd: num(s.atkSpdInc,0),
      critChance: num(s.critChanceAdd,0) + num(s.critChanceInc,0),
      critMulti: num(s.critMultiAdd,0) + num(s.critMultiInc,0),
      range: num(s.rangeInc,0),
      fire: num(s.fireFlat,0),
      cold: num(s.coldFlat,0),
      lightning: num(s.lightningFlat,0),
      _raw: s
    };
  };

  window.getWeaponDisplayStats = function(it){
    if(!it || it.slot !== 'weapon') return null;
    const s = sumModsByStat(it);
    const baseMin = num(it?.baseMin, num(player?.weapon?.min, 14));
    const baseMax = num(it?.baseMax, num(player?.weapon?.max, 20));
    const baseData = (it && it.baseData) || {};

    let min = Math.max(1, baseMin);
    let max = Math.max(min, baseMax);

    // base weapon multipliers
    min *= num(baseData.dmgMul, 1);
    max *= num(baseData.dmgMul, 1);

    // item damage multipliers/increases
    min *= num(s.dmgMul, 1);
    max *= num(s.dmgMul, 1);
    min *= (1 + num(s.dmgInc, 0) / 100);
    max *= (1 + num(s.dmgInc, 0) / 100);
    min *= num(s.dmgMore, 1);
    max *= num(s.dmgMore, 1);

    // flat physical + visible elemental flats
    const flatPhys = num(s.flatDamageAdd,0) + num(s.flatDamage,0);
    const fireFlat = num(s.fireFlat,0);
    const coldFlat = num(s.coldFlat,0);
    const lightningFlat = num(s.lightningFlat,0);
    const elemFlat = fireFlat + coldFlat + lightningFlat;
    min += flatPhys + elemFlat;
    max += flatPhys + elemFlat;

    min = Math.max(1, Math.floor(min));
    max = Math.max(min, Math.floor(max));

    // attack speed shown as attacks per second style multiplier
    let atkMul = num(baseData.spdMul, 1);
    atkMul *= num(s.atkSpdMul, 1);
    atkMul *= (1 + num(s.atkSpdInc, 0) / 100);
    atkMul *= num(s.atkSpdMore, 1);
    atkMul = Math.max(0.1, atkMul);

    const avg = (min + max) / 2;
    const dps = avg * atkMul;

    return {
      min, max, atkMul, dps,
      flatPhys,
      fireFlat,
      coldFlat,
      lightningFlat,
      dmgPct: num(s.dmgInc,0),
      critChance: num(s.critChanceAdd,0) + num(s.critChanceInc,0),
      critMulti: num(s.critMultiAdd,0) + num(s.critMultiInc,0),
      rangePct: num(s.rangeInc,0),
      dmgMul: num(s.dmgMul,1),
      dmgMore: num(s.dmgMore,1),
      atkSpdInc: num(s.atkSpdInc,0),
      atkSpdMulStat: num(s.atkSpdMul,1),
      atkSpdMore: num(s.atkSpdMore,1)
    };
  };
})();

<script>
/* =========================================================
   Active Skill Spec / Item Tooltip Separation Patch
   - Item tooltip shows weapon-only preview
   - Spec panel top shows current active skill preview
   ========================================================= */
(function(){
  if(window.__ACTIVE_SKILL_ITEM_SEPARATION_PATCH__) return;
  window.__ACTIVE_SKILL_ITEM_SEPARATION_PATCH__ = true;

  function __num(v, d){
    v = Number(v);
    return Number.isFinite(v) ? v : d;
  }

  function __weaponBaseRange(){
    return {
      min: __num(player && player.weapon && player.weapon.min, 14),
      max: __num(player && player.weapon && player.weapon.max, 20)
    };
  }

  function __combinedStats(it){
    const td = Object.assign({}, (it && (it.totalData || it.data)) || {});
    const affs = Array.isArray(it && it.affixes) ? it.affixes : [];
    for(const a of affs){
      if(!a || !Array.isArray(a.mods)) continue;
      for(const m of a.mods){
        if(!m || !m.stat) continue;
        const k = String(m.stat);
        const v = __num(m.value, 0);
        if(k.endsWith('Mul') || k.endsWith('More')) td[k] = __num(td[k], 1) * (v || 1);
        else td[k] = __num(td[k], 0) + v;
      }
    }
    return td;
  }

  function __computeWeaponOnlyPreview(it){
    const base = __weaponBaseRange();
    const td = __combinedStats(it);

    const dmgMul = Math.max(0.01,
      __num(td.dmgMul, 1) *
      (1 + __num(td.dmgInc, 0) / 100) *
      __num(td.dmgMore, 1)
    );

    const flatPhys = __num(td.flatDamageAdd, 0) + __num(td.flatDamage, 0);
    const fireFlat = __num(td.fireFlat,0);
    const coldFlat = __num(td.coldFlat,0);
    const lightningFlat = __num(td.lightningFlat,0);
    const chaosFlat = __num(td.chaosFlat,0);
    const flatElem = fireFlat + coldFlat + lightningFlat + chaosFlat;
    const flatTotal = flatPhys + flatElem;

    let atkMul = __num(td.spdMul, 1) * __num(td.atkSpdMul, 1);
    atkMul = Math.max(0.25, atkMul * (1 + __num(td.atkSpdInc,0) / 100) * __num(td.atkSpdMore,1));

    const min = Math.max(1, Math.floor(base.min * dmgMul + flatTotal));
    const max = Math.max(min, Math.floor(base.max * dmgMul + flatTotal));
    const avg = (min + max) / 2;
    const dps = avg * atkMul;

    return { min, max, atkMul, dps, flatPhys, fireFlat, coldFlat, lightningFlat };
  }

  window.registerActiveSkillPreview = function(def){
    window.__activeSkillPreviewRegistry = window.__activeSkillPreviewRegistry || {};
    if(def && def.id) window.__activeSkillPreviewRegistry[def.id] = Object.assign({}, def);
  };

  window.setCurrentActiveSkill = function(defOrId){
    const reg = window.__activeSkillPreviewRegistry || {};
    if(typeof defOrId === 'string'){
      window.__currentActiveSkillPreview = reg[defOrId] ? Object.assign({}, reg[defOrId]) : null;
      return;
    }
    if(defOrId && defOrId.id && reg[defOrId.id]){
      window.__currentActiveSkillPreview = Object.assign({}, reg[defOrId.id], defOrId);
      return;
    }
    window.__currentActiveSkillPreview = defOrId ? Object.assign({}, defOrId) : null;
  };

  registerActiveSkillPreview({
    id: 'attack',
    name: '기본 공격',
    skillId: 'attack',
    damageScalar: 1,
    flatBonus: 0,
    speedScalar: 1,
    critChanceBonus: 0,
    critMultiBonus: 0
  });
  if(!window.__currentActiveSkillPreview) setCurrentActiveSkill('attack');

  function __computeCurrentSkillPreview(){
    const sk = window.__currentActiveSkillPreview || { id:'attack', name:'기본 공격', damageScalar:1, flatBonus:0, speedScalar:1, critChanceBonus:0, critMultiBonus:0 };
    const equipped = (typeof equipment === 'object' && equipment && equipment.weapon) ? equipment.weapon : null;
    const w = __computeWeaponOnlyPreview(equipped);

    const gear = player && player.gear ? player.gear : {};
    const scalar = Math.max(0.01, __num(sk.damageScalar, 1));
    const flatBonus = __num(sk.flatBonus, 0);
    const globalDmg = Math.max(0.01,
      __num(gear.dmgMul, 1) *
      (1 + __num(gear.dmgInc, 0)) *
      __num(gear.dmgMore, 1)
    );

    const min = Math.max(1, Math.floor((w.min + flatBonus) * scalar * globalDmg));
    const max = Math.max(min, Math.floor((w.max + flatBonus) * scalar * globalDmg));

    const critChance = Math.max(0, ((__num((typeof getCritChance === 'function') ? getCritChance() : 0.05, 0.05) + __num(sk.critChanceBonus, 0)) * 100));
    const critMulti = Math.max(1, __num((typeof getCritMulti === 'function') ? getCritMulti() : 1.5, 1.5) + __num(sk.critMultiBonus, 0));
    const atkSpeed = Math.max(0.25, __num(gear.atkSpdMul, 1) * Math.max(0.01, __num(sk.speedScalar, 1)));

    return {
      name: sk.name || '기본 공격',
      min, max,
      critChance,
      critMultiPct: (critMulti - 1) * 100,
      speed: atkSpeed
    };
  }

  if(typeof getWeaponDisplayStats === 'function'){
    window.getWeaponDisplayStats = function(it){
      if(!it || it.slot !== 'weapon') return null;
      return __computeWeaponOnlyPreview(it);
    };
  }

  if(typeof prettyItemHTML === 'function'){
    const __origPretty = prettyItemHTML;

      let html = __origPretty(it);

        if(!it || it.slot !== 'weapon' || !html) return html;
        html = String(html)
          .replace('최종 공격력:', '무기 공격력:')
          .replace(/>공격력:/g, '>무기 공격력:');
      }catch(_){ }
      return html;
    };
  }

  function __prependCombatBlock(){
    try{
      if(typeof specTextEl === 'undefined' || !specTextEl) return;
      const base = String(specTextEl.textContent || '').trim();
      const old1 = '[전투 정보]';
      const old2 = '[기존 캐릭터 정보]';

      if(rest.startsWith(old1)){

        if(idx >= 0) rest = rest.slice(idx + old2.length).trim();
      }
      const pv = __computeCurrentSkillPreview();
      const top = [
        '[전투 정보]',
        `현재 스킬: ${pv.name}`,
        `최종 피해: ${pv.min} ~ ${pv.max}`,

        `치명타 피해배율: ${pv.critMultiPct.toFixed(0)}%`,
        `공격 속도: ${pv.speed.toFixed(2)}`
      ].join('\n');
      specTextEl.textContent = `${top}\n\n[기존 캐릭터 정보]\n${rest}`;
    }catch(err){
      console.warn('spec combat block patch failed', err);
    }
  }

  if(typeof renderEquipPanel === 'function'){
    const __origRenderEquipPanel = renderEquipPanel;
    window.renderEquipPanel = function(){
      const out = __origRenderEquipPanel.apply(this, arguments);
      __prependCombatBlock();
      return out;

  }

  const __oldAfter = (window.GameHooks && window.GameHooks.afterRenderPanels) || null;
  window.GameHooks = window.GameHooks || {};

<script>
(function(){
