        skill.radius || 78,
        base,
        skill,
        ["aoe","spin","channel"]
      );
      triggerLinkedCwcSpell();
      player.whirlwindSide = (player.whirlwindSide === -1) ? 1 : -1;
      player.whirlwindPoseMax = 6;
      player.whirlwindPose = player.whirlwindPoseMax;
      pushWhirlwindFx();
      player.whirlwindHitTick = Math.max(4, skill.hitInterval || 10);
    }
  }

  function drawBlinkFx(){
    if(!window.__blinkFx || !__blinkFx.length) return;
    const pp = isoProject(player.x, player.y);
    const camX = canvas.width * 0.5;
    const camY = canvas.height * 0.5 - (ISO.camYOffset || 0);

    for(let i = __blinkFx.length - 1; i >= 0; i--){
      const fx = __blinkFx[i];
      const p1 = isoProject(fx.x1, fx.y1);
      const p2 = isoProject(fx.x2, fx.y2);
      const sx = camX + p1.x - pp.x;
      const sy = camY + p1.y - pp.y + 40;
      const ex = camX + p2.x - pp.x;
      const ey = camY + p2.y - pp.y + 40;
      const lifeT = Math.max(0, fx.life / Math.max(1, fx.maxLife));
      const burstT = Math.max(0, (fx.burstLife || 0) / Math.max(1, fx.burstMaxLife || 1));
      const dx = ex - sx;
      const dy = ey - sy;
      const len = Math.hypot(dx, dy) || 1;
      const nx = dx / len;
      const ny = dy / len;
      const px = -ny;
      const py = nx;
      const slashLen = Math.min(44, 12 + len * 0.14);
      const seed = fx.seed || 0;

      ctx.save();

      // departure flash
      const startGlow = 10 + (1 - lifeT) * 28;
      ctx.globalAlpha = 0.34 * lifeT;
      let g = ctx.createRadialGradient(sx, sy, 0, sx, sy, startGlow);
      g.addColorStop(0, 'rgba(255,255,255,0.95)');
      g.addColorStop(0.45, 'rgba(180,220,255,0.75)');
      g.addColorStop(1, 'rgba(100,180,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(sx, sy, startGlow, 0, Math.PI * 2);
      ctx.fill();

      // dash trail glow
      ctx.globalAlpha = 0.18 + 0.22 * lifeT;
      g = ctx.createLinearGradient(sx, sy, ex, ey);
      g.addColorStop(0, 'rgba(130,200,255,0.0)');
      g.addColorStop(0.22, 'rgba(130,200,255,0.75)');
      g.addColorStop(0.78, 'rgba(220,245,255,0.95)');
      g.addColorStop(1, 'rgba(255,255,255,0.0)');
      ctx.strokeStyle = g;
      ctx.lineWidth = 14;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(ex, ey);
      ctx.stroke();

      // bright core trail
      ctx.globalAlpha = 0.70 * lifeT;
      ctx.strokeStyle = 'rgba(245,250,255,0.95)';
      ctx.lineWidth = 3.2;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(ex, ey);
      ctx.stroke();

      // afterimage slashes near arrival
      for(let j=0;j<2;j++){
        const t = 0.42 + j * 0.18;
        const ax = sx + dx * t - nx * (8 + j * 7);
        const ay = sy + dy * t - ny * (8 + j * 7);
        const alpha = (0.24 - j * 0.07) * lifeT;
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.strokeStyle = j === 0 ? 'rgba(255,255,255,0.98)' : 'rgba(135,210,255,0.88)';
        ctx.lineWidth = j === 0 ? 3.8 : 2.4;
        ctx.beginPath();
        ctx.moveTo(ax - px * slashLen * 0.52, ay - py * slashLen * 0.52);
        ctx.lineTo(ax + px * slashLen * 0.52, ay + py * slashLen * 0.52);
        ctx.stroke();
      }

      if(burstT > 0){
        const burstR = (fx.burstRadius || 92) * (0.24 + (1 - burstT) * 0.46);

        // arrival flash
        ctx.globalAlpha = 0.34 * burstT;
        let bg = ctx.createRadialGradient(ex, ey, 0, ex, ey, burstR * 0.72);
        bg.addColorStop(0, 'rgba(255,255,255,0.95)');
        bg.addColorStop(0.35, 'rgba(255,235,170,0.88)');
        bg.addColorStop(0.7, 'rgba(120,255,170,0.45)');
        bg.addColorStop(1, 'rgba(120,255,170,0.0)');
        ctx.fillStyle = bg;
        ctx.beginPath();
        ctx.arc(ex, ey, burstR * 0.72, 0, Math.PI * 2);
        ctx.fill();

        // shock ring
        ctx.globalAlpha = 0.9 * burstT;
        ctx.strokeStyle = 'rgba(255,230,170,0.95)';
        ctx.lineWidth = 2.6;
        ctx.beginPath();
        ctx.arc(ex, ey, burstR * 0.68, 0, Math.PI * 2);
        ctx.stroke();

        // cross slashes
        for(const a of [fx.slashA || 0, (fx.slashB || 0) + Math.PI * 0.5]){
          const cs = Math.cos(a), sn = Math.sin(a);
          const L = burstR * (0.55 + 0.18 * burstT);
          ctx.globalAlpha = 0.85 * burstT;
          ctx.strokeStyle = 'rgba(255,245,220,0.95)';
          ctx.lineWidth = 2.4;
          ctx.beginPath();
          ctx.moveTo(ex - cs * L, ey - sn * L);
          ctx.lineTo(ex + cs * L, ey + sn * L);
          ctx.stroke();
        }

        // sparks
        const sparks = Array.isArray(fx.spark) ? fx.spark : [];
        for(const s of sparks){
          const rr = (s.r || 12) * (1 - burstT * 0.55);
          const sx2 = ex + Math.cos(s.a || 0) * rr;
          const sy2 = ey + Math.sin(s.a || 0) * rr;
          const L = (s.len || 10) * burstT;
          ctx.globalAlpha = 0.9 * burstT;
          ctx.strokeStyle = 'rgba(255,235,160,0.95)';
          ctx.lineWidth = s.size || 1.5;
          ctx.beginPath();
          ctx.moveTo(sx2 - Math.cos(s.a || 0) * L * 0.45, sy2 - Math.sin(s.a || 0) * L * 0.45);
          ctx.lineTo(sx2 + Math.cos(s.a || 0) * L, sy2 + Math.sin(s.a || 0) * L);
          ctx.stroke();
        }
      }
      ctx.restore();

      fx.life--;
      if(fx.burstLife > 0) fx.burstLife--;
      if(fx.life <= 0 && (fx.burstLife || 0) <= 0) __blinkFx.splice(i, 1);
    }
  }

  function drawWhirlwindFx(){
    const camX = canvas.width * 0.5;
    const camY = canvas.height * 0.5 - (ISO.camYOffset || 0);
    const floorX = camX;
const floorY = camY + 70;
    const spinPhase = player.whirlwindSpinPhase || 0;

    if(player.whirlwindActive){
      ctx.save();
      ctx.translate(floorX, floorY);

      // 바닥 먼지
      for(let i = 0; i < 8; i++){
        const a = spinPhase * 0.9 + i * (Math.PI * 0.25);
        const rx = 24 + (i % 3) * 10;
        const ry = 7 + (i % 2) * 3;
        const dx = Math.cos(a) * rx;
        const dy = Math.sin(a) * ry;
        const puff = 5 + (i % 3) * 1.4;

        ctx.globalAlpha = 0.07 + (i % 2) * 0.03;
        ctx.fillStyle = "rgba(160,140,110,0.95)";
        ctx.beginPath();
        ctx.ellipse(dx, dy + 2, puff * 1.7, puff * 0.66, 0.12 * Math.sin(a), 0, Math.PI * 2);
        ctx.fill();
      }

      // 바닥 회오리 링 (눕혀진 타원만 사용)
      ctx.globalAlpha = 0.20;
      ctx.strokeStyle = "rgba(210,235,255,0.95)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(0, 0, 44, 14, 0, spinPhase, spinPhase + Math.PI * 1.45);
      ctx.stroke();

      ctx.globalAlpha = 0.34;
      ctx.strokeStyle = "rgba(255,255,255,0.95)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, 31, 9, 0, -spinPhase * 1.1, -spinPhase * 1.1 + Math.PI * 1.35);
      ctx.stroke();

      // 칼날 잔상 2개 (바닥면 따라 회전)
      for(let i = 0; i < 2; i++){
        const ang = spinPhase + i * Math.PI;
        const bx = Math.cos(ang) * 28;
        const by = Math.sin(ang) * 10;
        const tilt = Math.sin(ang) * 0.18;

        ctx.globalAlpha = 0.16;
        ctx.fillStyle = "rgba(170,220,255,0.95)";
        ctx.beginPath();
        ctx.ellipse(bx, by, 19, 5.2, tilt, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(bx, by);
        ctx.rotate(tilt);
        ctx.globalAlpha = 0.34;
        ctx.fillStyle = "rgba(235,245,255,0.98)";
        ctx.beginPath();
        ctx.moveTo(-12, 0);
        ctx.lineTo(10, -3.2);
        ctx.lineTo(24, 0);
        ctx.lineTo(10, 3.2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      ctx.restore();
    }

    if(!window.__whirlwindFx || !__whirlwindFx.length) return;

    for(let i = __whirlwindFx.length - 1; i >= 0; i--){
      const fx = __whirlwindFx[i];
      const lifeT = Math.max(0, fx.life / Math.max(1, fx.maxLife || 1));
      const baseSpin = (fx.spin || 0) + (1 - lifeT) * 2.2;

      ctx.save();
      ctx.translate(floorX, floorY);

      ctx.globalAlpha = 0.16 * lifeT;
      ctx.fillStyle = "rgba(170,140,110,0.92)";
      ctx.beginPath();
      ctx.ellipse(0, 2, 42 - (1 - lifeT) * 8, 12 - (1 - lifeT) * 2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 0.28 * lifeT;
      ctx.strokeStyle = "rgba(120,220,255,0.95)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.ellipse(0, 0, 52 - (1 - lifeT) * 10, 16 - (1 - lifeT) * 3, 0, baseSpin, baseSpin + Math.PI * 1.35);
      ctx.stroke();

      ctx.globalAlpha = 0.55 * lifeT;
      ctx.strokeStyle = "rgba(255,255,255,0.95)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(0, 0, 34 - (1 - lifeT) * 7, 10 - (1 - lifeT) * 2, 0, -baseSpin * 1.05, -baseSpin * 1.05 + Math.PI * 1.2);
      ctx.stroke();

      const side = fx.side || 1;
      for(let k = 0; k < 2; k++){
        const dir = (k === 0 ? side : -side);
        const ang = baseSpin + (k === 0 ? 0 : Math.PI);
        const x = Math.cos(ang) * (22 + k * 4) * dir;
        const y = Math.sin(ang) * (8 + k * 2);
        const tilt = Math.sin(ang) * 0.2;
        ctx.globalAlpha = (k === 0 ? 0.40 : 0.22) * lifeT;
        ctx.fillStyle = k === 0 ? "rgba(235,248,255,0.98)" : "rgba(170,220,255,0.95)";
        ctx.beginPath();
        ctx.ellipse(x, y, k === 0 ? 22 : 17, k === 0 ? 5.8 : 4.3, tilt, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();

      fx.life--;
      if(fx.life <= 0) __whirlwindFx.splice(i, 1);
    }
  }

  }

  function drawIceNovaFx(){
    const fx = window.__iceNovaFx;
    if(!fx || fx.life <= 0) return;

    const sp = isoProject(fx.x, fx.y);
    const pp = isoProject(player.x, player.y);
    const camX = canvas.width * 0.5;
    const camY = canvas.height * 0.5 - (ISO.camYOffset || 0);
    const px = camX + sp.x - pp.x;
    const py = camY + sp.y - pp.y - 6 + (fx.drawYOffset || 0);

    const grow = 1 - (fx.life / Math.max(1, fx.maxLife));
    const fade = fx.life / Math.max(1, fx.maxLife);
    const r = fx.radius + (fx.maxRadius - fx.radius) * grow;

    ctx.save();

    // 중심 냉기 플래시
    const coreGlow = ctx.createRadialGradient(px, py, 0, px, py, Math.max(18, r * 0.42));
    coreGlow.addColorStop(0, "rgba(235,250,255," + (0.95 * fade) + ")");
    coreGlow.addColorStop(0.45, "rgba(155,235,255," + (0.60 * fade) + ")");
    coreGlow.addColorStop(1, "rgba(100,170,255,0)");
    ctx.fillStyle = coreGlow;
    ctx.beginPath();
    ctx.arc(px, py, Math.max(18, r * 0.42), 0, Math.PI * 2);
    ctx.fill();

    // 바깥 냉기 링
    ctx.globalAlpha = 0.95 * fade;
    ctx.strokeStyle = "rgba(170,245,255,0.98)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.stroke();

    // 안쪽 서리 링
    ctx.globalAlpha = 0.55 * fade;
    ctx.strokeStyle = "rgba(120,210,255,0.95)";
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.arc(px, py, r * 0.72, 0, Math.PI * 2);
    ctx.stroke();

    // 얼음 파편
    const shardCount = 12;
    for(let i = 0; i < shardCount; i++){
      const a = (Math.PI * 2 * i / shardCount) + grow * 0.28;
      const dist = r * (0.38 + 0.48 * grow);
      const sx = px + Math.cos(a) * dist;
      const sy = py + Math.sin(a) * dist;
      const tip = 10 + grow * 20;
      const width = 3.5 + grow * 4.5;
      const nx = Math.cos(a);
      const ny = Math.sin(a);
      const tx = -ny;
      const ty = nx;

      ctx.globalAlpha = Math.max(0, 0.9 * fade - grow * 0.12);
      ctx.fillStyle = "rgba(205,245,255,0.95)";
      ctx.beginPath();
      ctx.moveTo(sx + nx * tip, sy + ny * tip);
      ctx.lineTo(sx - nx * tip * 0.20 + tx * width, sy - ny * tip * 0.20 + ty * width);
      ctx.lineTo(sx - nx * tip * 0.35, sy - ny * tip * 0.35);
      ctx.lineTo(sx - nx * tip * 0.20 - tx * width, sy - ny * tip * 0.20 - ty * width);
      ctx.closePath();
      ctx.fill();
    }

    // 서리 안개
    for(let i = 0; i < 7; i++){
      const a = grow * 1.6 + i * 0.9;
      const dist = r * (0.18 + i * 0.065);
      const fogX = px + Math.cos(a) * dist;
      const fogY = py + Math.sin(a) * dist * 0.72;
      const fogR = 10 + i * 2 + grow * 7;

      ctx.globalAlpha = Math.max(0, (0.12 - i * 0.012) * fade);
      ctx.fillStyle = "rgba(220,245,255,0.75)";
      ctx.beginPath();
      ctx.arc(fogX, fogY, fogR, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    fx.life--;
    if(fx.life <= 0) window.__iceNovaFx = null;
  }

  function drawFirestormFx(){
    if(!window.firestormEffects || !firestormEffects.length) return;

    const pp = isoProject(player.x, player.y);
    const camX = canvas.width * 0.5;
    const camY = canvas.height * 0.5 - (ISO.camYOffset || 0);

    for(const fx of firestormEffects){
      if(!fx.hit){
        const remaining = Math.max(0, fx.delay);
        const progress = 1 - Math.min(1, remaining / Math.max(1, fx.totalDelay));
        const mx = fx.startX + (fx.x - fx.startX) * progress;
        const my = fx.startY + (fx.y - fx.startY) * progress;

        const sp = isoProject(mx, my);
        const tp = isoProject(fx.x, fx.y);
        const sx = camX + sp.x - pp.x;
        const sy = camY + sp.y - pp.y - 18;
        const tx = camX + tp.x - pp.x;
        const ty = camY + tp.y - pp.y - 6;

        ctx.save();
        ctx.globalAlpha = 0.96;

        const dx = tx - sx;
        const dy = ty - sy;
        const ang = Math.atan2(dy, dx);
        const meteorSpin = (fx.spin || 0) + progress * 8.0 * (fx.spinSpeed || 0.18);

        // 짧은 불꽃 꼬리
        ctx.strokeStyle = "rgba(255,155,70,0.34)";
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(tx - Math.cos(ang) * 9, ty - Math.sin(ang) * 9);
        ctx.lineTo(tx - Math.cos(ang) * 2, ty - Math.sin(ang) * 2);
        ctx.stroke();

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(ang);

        // 큰 글로우
        const glow = ctx.createRadialGradient(0,0,1,0,0,18);
        glow.addColorStop(0.00, 'rgba(255,245,175,1)');
        glow.addColorStop(0.28, 'rgba(255,190,75,0.98)');
        glow.addColorStop(0.62, 'rgba(255,105,25,0.78)');
        glow.addColorStop(1.00, 'rgba(255,70,0,0.00)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0,0,18,0,Math.PI*2);
        ctx.fill();

        // 짧은 화염 꼬리
        const tail = ctx.createLinearGradient(-10, 0, 7, 0);
        tail.addColorStop(0.00, 'rgba(255,60,0,0.00)');
        tail.addColorStop(0.35, 'rgba(255,100,15,0.20)');
        tail.addColorStop(0.72, 'rgba(255,135,35,0.42)');
        tail.addColorStop(1.00, 'rgba(255,230,185,0.82)');
        ctx.fillStyle = tail;
        ctx.beginPath();
        ctx.moveTo(-9, 0);
        ctx.quadraticCurveTo(-5, -3.2, 5.8, -2.3);
        ctx.quadraticCurveTo(8.5, 0, 5.8, 2.3);
        ctx.quadraticCurveTo(-5, 3.2, -9, 0);
        ctx.fill();

        // 불꽃 파편 날개
        for(const off of [-0.70,-0.18,0.28]){
          ctx.strokeStyle = 'rgba(255,170,70,0.62)';
          ctx.lineWidth = 1.7;
          ctx.beginPath();
          ctx.moveTo(-3 + off*4, off*3.2);
          ctx.lineTo(-9 + off*4.5, off*5.8);
          ctx.stroke();
        }

        // 랜덤 회전 불덩이
        ctx.save();
        ctx.rotate(meteorSpin);
        ctx.fillStyle = '#ff7a12';
        ctx.beginPath();
        ctx.ellipse(0, 0, 8.8, 7.4, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ffb14a';
        ctx.beginPath();
        ctx.ellipse(1.1, -0.5, 5.4, 4.3, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,244,210,0.98)';
        ctx.beginPath();
        ctx.arc(2.3, -1.1, 2.4, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        ctx.restore();
        ctx.restore();
      }else{
        const tp = isoProject(fx.x, fx.y);
        const tx = camX + tp.x - pp.x;
        const ty = camY + tp.y - pp.y - 6;
        const explodeT = Math.max(0, fx.life) / Math.max(1, fx.explodeLife);
        const burstR = fx.explosionRadius * (1.15 - explodeT * 0.35);
        const coreR = burstR * 0.52;

        ctx.save();
        if(fx.life > 0){
          ctx.globalAlpha = Math.max(0, explodeT);
          const blast = ctx.createRadialGradient(tx, ty, 0, tx, ty, burstR);
          blast.addColorStop(0.00, "rgba(255,245,180,0.98)");
          blast.addColorStop(0.28, "rgba(255,180,70,0.92)");
          blast.addColorStop(0.65, "rgba(255,95,20,0.42)");
          blast.addColorStop(1.00, "rgba(255,60,0,0.00)");
          ctx.fillStyle = blast;
          ctx.beginPath();
          ctx.arc(tx, ty, burstR, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "rgba(255,230,145,0.80)";
          ctx.beginPath();
          ctx.arc(tx, ty, coreR, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(255,250,210,0.78)";
          ctx.lineWidth = 2.2;
          ctx.beginPath();
          ctx.arc(tx, ty, burstR * 0.74, 0, Math.PI * 2);
          ctx.stroke();

          for(let s=0; s<7; s++){
            const ang = (Math.PI*2*s/7) + explodeT*1.5;
            const len = burstR * (0.34 + 0.18*Math.sin(s + explodeT*7));
            ctx.strokeStyle = 'rgba(255,180,80,0.76)';
            ctx.lineWidth = 2.0;
            ctx.beginPath();
            ctx.moveTo(tx + Math.cos(ang)*len*0.25, ty + Math.sin(ang)*len*0.20);
            ctx.lineTo(tx + Math.cos(ang)*len, ty + Math.sin(ang)*len*0.78);
            ctx.stroke();
          }

          // 착탄 불꽃 파편
          for(let s=0; s<8; s++){
            const ang = (Math.PI*2*s/8) + fx.impactSeed * 0.01;
            const len = burstR * (0.62 + 0.22 * Math.sin(s * 2.3 + explodeT * 5));
            ctx.strokeStyle = 'rgba(255,210,110,0.82)';
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.moveTo(tx + Math.cos(ang) * len * 0.22, ty + Math.sin(ang) * len * 0.14);
            ctx.lineTo(tx + Math.cos(ang) * len, ty + Math.sin(ang) * len * 0.72);
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,160,55,0.88)';
            ctx.beginPath();
            ctx.arc(tx + Math.cos(ang) * len, ty + Math.sin(ang) * len * 0.72, 1.7 + explodeT * 1.4, 0, Math.PI * 2);
            ctx.fill();
          }
        }else{
          const emberT = 1 - (Math.abs(fx.life) / Math.max(1, fx.emberLife));
          const emberR = fx.explosionRadius * (0.55 + emberT * 0.25);
          ctx.globalAlpha = Math.max(0, emberT) * 0.32;
          ctx.fillStyle = "rgba(255,90,20,0.24)";
          ctx.beginPath();
          ctx.arc(tx, ty, emberR, 0, Math.PI * 2);
          ctx.fill();

          // 작은 연기
          for(let k=0;k<3;k++){
            const ang = fx.impactSeed * 0.01 + k * 2.1 + fx.life * -0.08;
            const smokeX = tx + Math.cos(ang) * emberR * (0.12 + 0.06 * k);
            const smokeY = ty - 4 - k * 4 + Math.sin(ang * 0.7) * 3;
            ctx.globalAlpha = Math.max(0, emberT) * (0.22 - k * 0.03);
            ctx.fillStyle = 'rgba(80,80,80,0.75)';
            ctx.beginPath();
            ctx.arc(smokeX, smokeY, 6 + emberT * 6 + k * 2.2, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.globalAlpha = Math.max(0, emberT) * 0.85;
          for(let k=0;k<4;k++){
            const ang = (Math.PI * 2 * k / 4) + (fx.life * 0.15);
            const ex = tx + Math.cos(ang) * emberR * 0.35;
            const ey = ty + Math.sin(ang) * emberR * 0.22;
            ctx.fillStyle = "rgba(255,180,70,0.7)";
            ctx.beginPath();
            ctx.arc(ex, ey, 4 + emberT * 3, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();
      }
    }
  }

  function useFirestormAt(skill, cx, cy){
    player.skillSwingStyle = "infernal";
    player.skillSwingTimer = Math.max(6, Math.round(getSkillUseTimeMs(skill, 0.26) / 16));
    player.__skillVisualTotalFrames = player.skillSwingTimer;
    player.skillSwingPower = 1.00;

    const aimForSigil = getSpellAim(520);
    spawnSpellCastSigil(skill, aimForSigil, { radius: 38 });
    const base = rollSpellBaseDamage(skill);
    const impacts = skill.impacts || 7;
    const radius = skill.radius || 120;
    const delayStep = skill.delayStep || 5;

    for(let i = 0; i < impacts; i++){
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * radius;
      const ix = cx + Math.cos(a) * r;
      const iy = cy + Math.sin(a) * r;
      spawnFirestormImpact(skill, base, ix, iy, 2 + i * delayStep);
    }
  }

  function useFirestorm(skill){
    const aim = getSpellAim(520);
    const cx = player.x + aim.x * 120;
    const cy = player.y + aim.y * 120;
    useFirestormAt(skill, cx, cy);
  }

  /* -----------------------------
     6) 기존 useActiveSkill 확장
  ----------------------------- */
  const __oldUseActiveSkillStep2 = window.useActiveSkill;
  window.useActiveSkill = function(){
    const activeId = player && player.skillLinks ? player.skillLinks.active : null;
    const skill = activeId ? ACTIVE_SKILLS[activeId] : null;
    if(!skill) return false;

    if(skill.id === "blinkStrike"){
      return !!useBlinkStrike(skill);
    }
    if(skill.id === "whirlwind"){
      return !!useWhirlwind(skill);
    }
    if(skill.id === "fireball"){
      useFireball(skill);
      return true;
    }
    if(skill.id === "lightningBeam"){
      useLightningBeam(skill);
      return true;
    }
    if(skill.id === "moltenStrike"){
      useMoltenStrike(skill);
      return true;
    }
        if(skill.id === "iceNova"){
      useIceNova(skill);
      return true;
    }
    if(skill.id === "firestorm"){
      useFirestorm(skill);
      return true;
    }

    if(typeof __oldUseActiveSkillStep2 === "function"){
      return __oldUseActiveSkillStep2();
    }
    return false;
  };

  /* -----------------------------
     7) update / draw 후킹
  ----------------------------- */
  if(typeof update === "function" && !window.__STEP2_UPDATE_WRAP__){
    const __oldUpdateStep2 = update;
    update = function(){
      const out = __oldUpdateStep2.apply(this, arguments);
      try{
        updateSkillCooldownsStep2();
        updateSkillProjectiles();
        updateLightningBeamFx();
        updateFirestormFx();
        updateSpellCastSigils();

        const activeId = player && player.skillLinks ? player.skillLinks.active : null;
        const activeSkill = activeId ? ACTIVE_SKILLS[activeId] : null;
        updateWhirlwindState(activeSkill);
      }catch(err){
        console.warn("step2 update failed", err);
      }
      return out;
    };
    window.__STEP2_UPDATE_WRAP__ = true;
  }

  if(typeof drawIso === "function" && !window.__STEP2_DRAW_WRAP__){
    const __oldDrawIsoStep2 = drawIso;
    drawIso = function(){
      const out = __oldDrawIsoStep2.apply(this, arguments);
      try{
        drawSkillProjectiles();
        drawLightningBeamFx();
        drawIceNovaFx();
        drawFirestormFx();
        drawSpellCastSigils();
        drawBlinkFx();
        drawWhirlwindFx();
      }catch(err){
        console.warn("step2 draw failed", err);
      }
      return out;
    };
    if(typeof draw === "function") draw = drawIso;
    window.__STEP2_DRAW_WRAP__ = true;
  }

  (function bindAttackHoldStep2(){
    const btn = document.getElementById("attackBtn");
    if(!btn || window.__STEP2_ATTACK_HOLD_BIND__) return;
    window.__STEP2_ATTACK_HOLD_BIND__ = true;

    const down = ()=>{ window.__skillAttackHeld = true; };
    const up = ()=>{
      window.__skillAttackHeld = false;
      player.whirlwindActive = false;
      player.whirlwindHitTick = 0;
      player.whirlwindPose = 0;
      player.whirlwindPoseMax = 0;
    };

    btn.addEventListener("pointerdown", down, false);
    btn.addEventListener("touchstart", down, { passive:true });
    btn.addEventListener("mousedown", down, false);

    window.addEventListener("pointerup", up, false);
    window.addEventListener("touchend", up, { passive:true });
    window.addEventListener("mouseup", up, false);
    window.addEventListener("touchcancel", up, { passive:true });
  })();

})();

  function ensureSkillLinks(){
    player.skillLinks = player.skillLinks || { active:'whirlwind', supports:[null,null,null,null,null] };

    return player.skillLinks;

  function isLinkedSpellId(id){

  function supportAppliesToSkill(id, skill){
    if(!id || !skill) return false;
    if(id === 'castWhileChanneling' || id === 'cwc') return skill.id === 'whirlwind';
    const tags = Array.isArray(skill.tags) ? skill.tags : [];
    const has = t => tags.includes(t);
    const isSpell = skill.source === 'spell' || has('spell');
    const isAttack = has('attack');
    const isMelee = has('melee');
    const isProjectile = has('projectile');
    switch(id){
      case 'meleePhysicalDamageSupport': return isMelee;
      case 'increasedAreaMeleeSupport': return isMelee;
      case 'multistrikeSupport': return isMelee && isAttack;
      case 'increasedCriticalStrikesSupport': return true;
      case 'increasedCriticalDamageSupport': return true;
      case 'frenzyChargeOnHitSupport': return true;
      case 'addedFireDamageSupport': return true;
      case 'addedColdDamageSupport': return true;
      case 'addedLightningDamageSupport': return true;
      case 'ruthlessSupport': return isMelee && (has('strike') || isAttack);
      case 'cullingStrikeSupport': return true;
      case 'fasterAttacksSupport': return isAttack;
      case 'elementalDamageWithAttacksSupport': return isAttack;
      case 'enduranceChargeOnHitSupport': return true;
      case 'lifeLeechSupport': return true;
      case 'brutalitySupport': return isAttack || isMelee || has('physical');
      case 'controlledDestructionSupport': return isSpell;
      case 'fasterCastingSupport': return isSpell;
      case 'spellEchoSupport': return isSpell;
      case 'spellbladeSupport': return isSpell;
      case 'castOnCriticalSupport': return true;
      case 'greaterMultipleProjectilesSupport': return isProjectile;
      default: return false;
    }
  }

  window.__supportGemDefs = SUPPORT_GEMS;

  function getGemMeta(id){
    if(id === 'castWhileChanneling' || id === 'cwc') return { icon:'✶', cls:'gem-support', name:'시전 중 시전', sub:'보조 젬', support:true };
    const support = getSupportGem(id);
    if(support) return { icon:support.icon || '✦', cls:support.cls || 'gem-support', name:support.name, sub:support.sub || '보조 젬', support:true, supportDef:support };
    const sk = window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[id];
    if(!sk) return { icon:'·', cls:'gem-physical', name:'빈 슬롯', sub:'' };
    const tags = Array.isArray(sk.tags) ? sk.tags : [];
    let cls = 'gem-physical';
    let icon = '⚔';
    if(tags.includes('fire')){ cls = 'gem-fire'; icon = '🔥'; }
    else if(tags.includes('cold')){ cls = 'gem-cold'; icon = '❄'; }
    else if(tags.includes('lightning')){ cls = 'gem-lightning'; icon = '⚡'; }
    else if(tags.includes('movement') || tags.includes('teleport')){ cls = 'gem-movement'; icon = '➤'; }
    else if(sk.source === 'spell'){ cls = 'gem-support'; icon = '✦'; }
    else if(tags.includes('melee') || tags.includes('physical')){ cls = 'gem-physical'; icon = '⚔'; }
    return { icon, cls, name: sk.name || id, sub: sk.source === 'spell' ? '주문 젬' : '공격 젬', skill:sk, support: sk.source === 'spell' };
  }

  function getSkillGemBoardDpsText(){
    const links = ensureSkillLinks();
    const activeId = links.active;
    const skill = (window.ACTIVE_SKILLS && activeId) ? window.ACTIVE_SKILLS[activeId] : null;

    const num = (v, d=0) => {
      v = Number(v);
      return Number.isFinite(v) ? v : d;
    };

    let weaponDps = 0;
    try{
      let equippedWeapon = null;
      if(typeof equipment !== 'undefined' && equipment && equipment.weapon) equippedWeapon = equipment.weapon;
      if(typeof window.getWeaponDisplayStats === 'function' && equippedWeapon){
        const ws = window.getWeaponDisplayStats(equippedWeapon);
        weaponDps = num(ws && ws.dps, 0);
      }
    }catch(_e){}

    if(!(weaponDps > 0)){
      const wmin = num(player && player.weapon && player.weapon.min, 14);
      const wmax = num(player && player.weapon && player.weapon.max, 20);
      const was  = Math.max(0.1, num(player && player.weapon && player.weapon.attackSpeed, 1));
      weaponDps = ((wmin + wmax) * 0.5) * was;
    }

    if(!skill) return 'DPS ' + Math.round(weaponDps).toLocaleString();

    const baseMul = Math.max(0.01, num(skill.baseMul, 1));
    let dps = weaponDps * baseMul;

    if(num(skill.cooldownSec, 0) > 0){
      const avgHit = ((num(player?.weapon?.min,14) + num(player?.weapon?.max,20)) * 0.5) * baseMul;
      dps = avgHit / Math.max(0.05, num(skill.cooldownSec, 0));
    }

    if(num(skill.repeats, 0) > 0) dps *= Math.max(1, num(skill.repeats, 0));
    if(num(skill.projectileCount, 0) > 0) dps *= Math.max(1, num(skill.projectileCount, 0));
    if(num(skill.impacts, 0) > 0) dps *= Math.max(1, num(skill.impacts, 0) * 0.45);
    if((skill.id === 'whirlwind' || (Array.isArray(skill.tags) && skill.tags.includes('channeling'))) && num(skill.hitInterval, 0) > 0){
      dps *= Math.max(1, 10 / Math.max(1, num(skill.hitInterval, 0)));
    }

    dps = Math.max(0, dps);
    return 'DPS ' + Math.round(dps).toLocaleString();
  }

  function normalizeSkillGemInspect(links){
    links = links || ensureSkillLinks();

    if(skillGemInspect && skillGemInspect.kind === 'support'){
      const id = skillGemInspect.id;
      if(id && supports.includes(id)) return skillGemInspect;
    }
    if(skillGemInspect && skillGemInspect.kind === 'active' && skillGemInspect.id === activeId) return skillGemInspect;
    return { kind:'active', id:activeId, socketIndex:-1 };
  }

  function getGemStatLines(skill){
    if(!skill) return [];
    const lines = [];
    if(skill.source === 'weapon') lines.push('종류: 공격 젬');
    else if(skill.source === 'spell') lines.push('종류: 주문 젬');
    if(skill.cooldownSec) lines.push('쿨다운: ' + skill.cooldownSec.toFixed(1) + '초');
    if(skill.repeats) lines.push('연속 타격: ' + skill.repeats + '회');
    if(skill.projectileCount) lines.push('투사체: ' + skill.projectileCount + '개');
    if(skill.impacts) lines.push('낙하 횟수: ' + skill.impacts + '회');
    if(skill.radius) lines.push('범위: ' + Math.round(skill.radius));
    if(skill.beamLength) lines.push('빔 길이: ' + Math.round(skill.beamLength));
    if(skill.hitInterval) lines.push('타격 간격: ' + skill.hitInterval + 'f');
    if(skill.baseMul) lines.push('데미지 배율: ' + Math.round(Number(skill.baseMul) * 100) + '%');
    return lines.slice(0,6);
  }

  function getSupportOptions(){
    const out = [];

    for(const sk of all){

    if(!window.ACTIVE_SKILLS || !window.ACTIVE_SKILLS[id]) return;
    links.active = id;
    if(id !== 'whirlwind'){
      links.supports = links.supports.filter(v => v !== 'castWhileChanneling' && v !== 'cwc');
      while(links.supports.length < 5) links.supports.push(null);
      if(player){
        player.whirlwindActive = false;
        player.whirlwindHitTick = 0;
        player.whirlwindPose = 0;
        player.whirlwindPoseMax = 0;
      }
    }
    syncAttackSkillUI(true);
    setSkillGemInspect('active', ensureSkillLinks().active, -1);
    renderSkillGemUI();

  function toggleSupportSocket(id){
    const links = ensureSkillLinks();
    const idx = links.supports.findIndex(v => v === id);
    if(idx >= 0){
      links.supports[idx] = null;
      renderSkillGemUI();
      syncAttackSkillUI(true);
      return;
    }
    let insertIndex = links.supports.findIndex(v => v == null);
    if(insertIndex < 0) insertIndex = links.supports.length - 1;

    if(id === 'castWhileChanneling' || id === 'cwc'){
      links.supports = links.supports.map(v => (v === 'castWhileChanneling' || v === 'cwc') ? null : v);
      if(links.active !== 'whirlwind') links.active = 'whirlwind';
    }else if(isLinkedSpellId(id)){
      links.supports = links.supports.map(v => {
        const osk = window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[v];
        return (osk && osk.source === 'spell') ? null : v;
      });
    }

    links.supports[insertIndex] = id;
    renderSkillGemUI();
    syncAttackSkillUI(true);
  }

    const activeGrid = overlay.querySelector('#activeGemGrid');
    const activeList = Object.values(window.ACTIVE_SKILLS || {});
    activeGrid.innerHTML = activeList.map(sk=>{
      const meta = getGemMeta(sk.id);
      const selected = sk.id === activeId ? ' selected' : '';
      const inspected = inspect.kind === 'active' && inspect.id === sk.id ? ' inspected' : '';
      const sub = (sk.source === 'spell' ? '주문' : '공격') + ' / ' + ((sk.tags||[]).slice(0,2).join(', ') || '젬');

    }).join('');

    const supportGrid = overlay.querySelector('#supportGemGrid');
    const supportList = getSupportOptions();
    supportGrid.innerHTML = supportList.map(opt=>{
      const selected = links.supports.includes(opt.id) ? ' selected' : '';
      const inspected = inspect.kind === 'support' && inspect.id === opt.id ? ' inspected' : '';
      const meta = getGemMeta(opt.id);
      const sub = opt.type === 'support' ? ((getSupportGem(opt.id) && supportAppliesToSkill(opt.id, window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[activeId])) ? '장착 가능 보조' : '보조 젬') : '연결 주문 젬';
      return `<button class="gemChoiceBtn ${meta.cls}${selected}${inspected}" data-kind="support" data-id="${opt.id}" type="button">
        <span class="dot">${meta.icon}</span>
        <span class="main">${meta.name}</span>
        <span class="sub">${sub}</span>
      </button>`;
    }).join('');

    overlay.querySelectorAll('.gemChoiceBtn[data-kind="active"]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        setSkillGemInspect('active', btn.dataset.id, -1);
        setActiveSkill(btn.dataset.id);
      });
      btn.addEventListener('contextmenu', (e)=>{
        e.preventDefault();
        setSkillGemInspect('active', btn.dataset.id, -1);
        renderSkillGemUI();
      });
    });
    overlay.querySelectorAll('.gemChoiceBtn[data-kind="support"]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        setSkillGemInspect('support', btn.dataset.id, -1);
        toggleSupportSocket(btn.dataset.id);
      });
      btn.addEventListener('contextmenu', (e)=>{
        e.preventDefault();
        setSkillGemInspect('support', btn.dataset.id, -1);

  }
  window.renderSkillGemUI = renderSkillGemUI;

  const attackBtnEl = document.getElementById('attackBtn');
  const attackIconCanvas = document.getElementById('attackIcon');
  const attackIconCtx = attackIconCanvas && attackIconCanvas.getContext ? attackIconCanvas.getContext('2d') : null;
  let attackNameBadge = document.getElementById('attackSkillName');
  if(!attackNameBadge && attackBtnEl){
    attackNameBadge = document.createElement('div');
    attackNameBadge.id = 'attackSkillName';
    attackBtnEl.appendChild(attackNameBadge);
  }
  let attackCooldownBadge = document.getElementById('attackCooldownBadge');
  if(!attackCooldownBadge && attackBtnEl){
    attackCooldownBadge = document.createElement('div');
    attackCooldownBadge.id = 'attackCooldownBadge';
    attackBtnEl.appendChild(attackCooldownBadge);
  }
  let attackHoldHint = document.getElementById('attackHoldHint');
  if(!attackHoldHint && attackBtnEl){
    attackHoldHint = document.createElement('div');
    attackHoldHint.id = 'attackHoldHint';
    attackBtnEl.appendChild(attackHoldHint);
  }

  function drawSkillIcon(skill){
    if(!attackIconCtx || !attackIconCanvas) return;
    const ctx = attackIconCtx;
    const w = attackIconCanvas.width;
    const h = attackIconCanvas.height;
    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.translate(w/2, h/2);

    const tags = skill && Array.isArray(skill.tags) ? skill.tags : [];
    ctx.beginPath();
    ctx.arc(0,0,22,0,Math.PI*2);
    let fill = '#4a4a4a';
    if(tags.includes('fire')) fill = '#b94f1c';
    else if(tags.includes('cold')) fill = '#3f7fcb';
    else if(tags.includes('lightning')) fill = '#ab8b1a';
    else if(tags.includes('movement') || tags.includes('teleport')) fill = '#2f8163';
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(255,255,255,.55)';
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,255,255,.95)';
    ctx.fillStyle = 'rgba(255,255,255,.95)';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    const id = skill && skill.id;
    if(id === 'whirlwind'){
      ctx.beginPath();
      ctx.arc(0, 0, 10, Math.PI*0.15, Math.PI*1.7);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, 4, Math.PI*0.35, Math.PI*1.85);
      ctx.stroke();
    }else if(id === 'blinkStrike'){
      ctx.beginPath();
      ctx.moveTo(-14, 8); ctx.lineTo(2,-10); ctx.lineTo(-2,1); ctx.lineTo(14,-8);
      ctx.stroke();
    }else if(id === 'moltenStrike'){
      ctx.beginPath();
      ctx.arc(0, 0, 6, 0, Math.PI*2);
      ctx.fill();
      for(const a of [-0.9,-0.35,0.35,0.9]){
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*8, Math.sin(a)*8);
        ctx.lineTo(Math.cos(a)*16, Math.sin(a)*16);
        ctx.stroke();
      }
    }else if(id === 'fireball'){
      ctx.beginPath();
      ctx.arc(-4, 0, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(3, -3); ctx.lineTo(14, -8); ctx.moveTo(3, 3); ctx.lineTo(14, 8);
      ctx.stroke();
    }else if(id === 'lightningBeam'){
      ctx.beginPath();
      ctx.moveTo(-10, -10); ctx.lineTo(-1, -1); ctx.lineTo(-5, -1); ctx.lineTo(9, 12); ctx.lineTo(2, 2); ctx.lineTo(7, 2);
      ctx.stroke();
    }else if(id === 'iceNova'){
      for(let i=0;i<6;i++){
        const a = (Math.PI*2/6)*i;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*2, Math.sin(a)*2);
        ctx.lineTo(Math.cos(a)*16, Math.sin(a)*16);
        ctx.stroke();
      }
    }else if(id === 'firestorm'){
      for(const x of [-10,0,10]){
        ctx.beginPath();
        ctx.moveTo(x-3,-10); ctx.lineTo(x+3,-2); ctx.lineTo(x-2,8);
        ctx.stroke();
      }
    }else if(id === 'doubleStrike'){
      ctx.beginPath(); ctx.moveTo(-12,8); ctx.lineTo(-1,-8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(1,8); ctx.lineTo(12,-8); ctx.stroke();
    }else if(id === 'infernalSmash'){
      ctx.beginPath();
      ctx.moveTo(-12,10); ctx.lineTo(0,-12); ctx.lineTo(12,10);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-4); ctx.lineTo(0,14); ctx.stroke();
    }else{
      ctx.save();
      ctx.translate(0, 3);
      ctx.scale(1.05, 1.05);
      if(typeof drawSwordShape === 'function') drawSwordShape(ctx);
      else { ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(0,10); ctx.stroke(); }
      ctx.restore();
    }
    ctx.restore();
  }

  let __lastAttackKey = '';
  function syncAttackSkillUI(force){
    const links = ensureSkillLinks();
    const activeId = links.active;
    const skill = window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[activeId];
    const meta = getGemMeta(activeId);
    const cdFrames = (typeof getSkillCooldownFrames === 'function' && skill) ? (getSkillCooldownFrames(skill.id) || 0) : 0;
    const cdSecs = cdFrames > 0 ? (cdFrames / 60) : 0;
    const holdText = skill && skill.id === 'whirlwind' ? 'HOLD' : '';
    const key = [activeId, Math.ceil(cdSecs*10)/10, holdText].join('|');
    if(!force && key === __lastAttackKey) return;
    __lastAttackKey = key;

    drawSkillIcon(skill);
    if(attackNameBadge) attackNameBadge.textContent = meta.name;
    if(attackHoldHint){
      attackHoldHint.style.display = holdText ? 'block' : 'none';
      attackHoldHint.textContent = holdText;
    }
    if(attackCooldownBadge){
      if(cdFrames > 0){
        attackCooldownBadge.style.display = 'flex';
        attackCooldownBadge.textContent = cdSecs >= 1 ? cdSecs.toFixed(1) : cdSecs.toFixed(1);
      }else{
        attackCooldownBadge.style.display = 'none';
        attackCooldownBadge.textContent = '';
      }
    }
    if(attackBtnEl){
      attackBtnEl.classList.remove('skill-fire','skill-cold','skill-lightning','skill-physical','skill-movement');
      if(meta.cls === 'gem-fire') attackBtnEl.classList.add('skill-fire');
      else if(meta.cls === 'gem-cold') attackBtnEl.classList.add('skill-cold');
      else if(meta.cls === 'gem-lightning') attackBtnEl.classList.add('skill-lightning');
      else if(meta.cls === 'gem-movement') attackBtnEl.classList.add('skill-movement');
      else attackBtnEl.classList.add('skill-physical');
    }
  }
  window.syncAttackSkillUI = syncAttackSkillUI;

  setInterval(function(){
    try{ syncAttackSkillUI(false); }catch(err){ console.warn('skill hud sync failed', err); }
  }, 100);

  syncAttackSkillUI(true);
  renderSkillGemUI();
})();

/* HUD 정렬 */

<script>
(function(){
  if(window.__SUPPORT_GEM_RUNTIME_PATCH__) return;
  window.__SUPPORT_GEM_RUNTIME_PATCH__ = true;

  function num(v, d){ v = Number(v); return Number.isFinite(v) ? v : (d||0); }
  function avgWeaponDamage(){
    const w = (player && player.weapon) ? player.weapon : { min:14, max:20 };
    return (num(w.min,14) + num(w.max,20)) * 0.5;
  }
  function ensureChargeState(){
    if(!player) return;
    const st = (typeof getChargeState === 'function')
      ? getChargeState()
      : (player.chargeState || (player.chargeState = { frenzy:0, frenzyMax:5, frenzyLastGainFrame:0, endurance:0, enduranceMax:5, enduranceLastGainFrame:0, enduranceLastHitFrame:0 }));
    if(typeof st.frenzy !== 'number') st.frenzy = 0;
    if(typeof st.frenzyMax !== 'number') st.frenzyMax = 5;
    if(typeof st.endurance !== 'number') st.endurance = 0;
    if(typeof st.enduranceMax !== 'number') st.enduranceMax = 5;
    if(typeof st.frenzyLastGainFrame !== 'number') st.frenzyLastGainFrame = 0;
    if(typeof st.enduranceLastGainFrame !== 'number') st.enduranceLastGainFrame = 0;
    if(typeof st.enduranceLastHitFrame !== 'number') st.enduranceLastHitFrame = 0;

    // legacy aliases kept in sync for older UI/patch code
    player.frenzyCharges = st.frenzy;
    player.frenzyChargeMax = st.frenzyMax;
    player.frenzyLastGainFrame = st.frenzyLastGainFrame;
    player.enduranceCharges = st.endurance;
    player.enduranceChargeMax = st.enduranceMax;
    player.enduranceLastGainFrame = st.enduranceLastGainFrame;
    player.enduranceLastHitFrame = st.enduranceLastHitFrame;
    return st;
  }
  ensureChargeState();

  function getLinkedSpellId(){
    const links = player && player.skillLinks ? player.skillLinks : null;
    const supports = links && Array.isArray(links.supports) ? links.supports : [];
    for(const sid of supports){
      const sk = window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[sid];
      if(sk && sk.source === 'spell') return sid;
    }
    return null;
  }

  function getApplicableSupportsForSkill(skill){
    const links = player && player.skillLinks ? player.skillLinks : null;
    const supports = links && Array.isArray(links.supports) ? links.supports : [];
    const out = [];
    for(const sid of supports){
      const def = window.__getSupportGem && window.__getSupportGem(sid);
      if(def && (!window.__supportAppliesToSkill || window.__supportAppliesToSkill(sid, skill))) out.push(def);
    }
    return out;
  }
  window.getApplicableSupportsForSkill = getApplicableSupportsForSkill;

  function hasSupport(list, id){ return Array.isArray(list) && list.some(v => v && v.id === id); }


  function applyCommonSupportOnHit(skill, dealt){
    if(!player || !skill) return;
    dealt = num(dealt, 0);
    if(!(dealt > 0)) return;
    const supports = getApplicableSupportsForSkill(skill);
    if(!supports || !supports.length) return;

    if(hasSupport(supports, 'lifeLeechSupport') || hasSupport(supports, 'maxLifeSupport') || hasSupport(supports, 'maxLifePercentSupport')){
      player.hp = Math.min(player.maxHp || player.hp || 0, (player.hp || 0) + dealt * 0.08);
    }

    if(hasSupport(supports, 'frenzyChargeOnHitSupport') && Math.random() < 0.20){
      ensureChargeState();
      const cs = player.chargeState || getChargeState();
      cs.frenzyMax = Math.max(cs.frenzyMax || 5, 5);
      cs.frenzy = Math.min(cs.frenzyMax || 5, (cs.frenzy || 0) + 1);
      cs.frenzyLastGainFrame = (typeof frameCount === 'number') ? frameCount : 0;
      player.frenzyCharges = cs.frenzy;
      player.frenzyChargeMax = cs.frenzyMax;
      player.frenzyLastGainFrame = cs.frenzyLastGainFrame;
    }

    if(hasSupport(supports, 'enduranceChargeOnHitSupport') && Math.random() < 0.25){
      ensureChargeState();
      const cs = player.chargeState || getChargeState();
      cs.enduranceMax = Math.max(cs.enduranceMax || 5, 5);
      cs.endurance = Math.min(cs.enduranceMax || 5, (cs.endurance || 0) + 1);
      cs.enduranceLastGainFrame = (typeof frameCount === 'number') ? frameCount : 0;
      cs.enduranceLastHitFrame = cs.enduranceLastGainFrame;
      player.enduranceCharges = cs.endurance;
      player.enduranceChargeMax = cs.enduranceMax;
      player.enduranceLastGainFrame = cs.enduranceLastGainFrame;
      player.enduranceLastHitFrame = cs.enduranceLastHitFrame;
    }
  }
  window.applyCommonSupportOnHit = applyCommonSupportOnHit;

  function getModifiedSkill(skill){
    if(!skill) return skill;
    ensureChargeState();
    const mod = Object.assign({}, skill);
    const supports = getApplicableSupportsForSkill(skill);
    const frenzy = Math.max(0, num(player && player.chargeState && player.chargeState.frenzy, 0));
    if(frenzy > 0){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) / (1 + frenzy * 0.05);
      mod.baseMul = num(mod.baseMul, 1) * (1 + frenzy * 0.04);
    }
    if(hasSupport(supports, 'meleePhysicalDamageSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 1.18;
    }
    if(hasSupport(supports, 'increasedAreaMeleeSupport')){
      if(mod.radius) mod.radius = Math.round(num(mod.radius, 0) * 1.35);
      if(mod.angleDeg) mod.angleDeg = Math.round(num(mod.angleDeg, 0) * 1.15);
      if(mod.splashRadius) mod.splashRadius = Math.round(num(mod.splashRadius, 0) * 1.25);
      if(mod.explodeRadius) mod.explodeRadius = Math.round(num(mod.explodeRadius, 0) * 1.18);
    }
    if(hasSupport(supports, 'fasterAttacksSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 0.82;
    }
    if(hasSupport(supports, 'fasterCastingSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 0.82;
    }
    if(hasSupport(supports, 'greaterMultipleProjectilesSupport')){
      mod.projectileCount = num(mod.projectileCount, 1) + 4;
      if(mod.projectileSpreadDeg) mod.projectileSpreadDeg = num(mod.projectileSpreadDeg, 0) + 18;
    }
    
    const __spellRangeMul = Math.max(0.6, player.spellRangeMul || 1);
    const __meleeRangeMul = Math.max(0.6, player.passiveRangeMul || 1);
    const __tags = Array.isArray(mod.tags) ? mod.tags : [];
    const __isSpellNode = mod.source === 'spell' || __tags.includes('spell');
    const __isMeleeNode = __tags.includes('melee');
    if(__isSpellNode){
      if(mod.radius) mod.radius = Math.round(num(mod.radius, 0) * __spellRangeMul);
      if(mod.explodeRadius) mod.explodeRadius = Math.round(num(mod.explodeRadius, 0) * __spellRangeMul);
      if(mod.impactRadius) mod.impactRadius = Math.round(num(mod.impactRadius, 0) * __spellRangeMul);
      if(mod.beamLength) mod.beamLength = Math.round(num(mod.beamLength, 0) * __spellRangeMul);
      if(mod.beamWidth) mod.beamWidth = Math.round(num(mod.beamWidth, 0) * __spellRangeMul);
      if(mod.splashRadius) mod.splashRadius = Math.round(num(mod.splashRadius, 0) * __spellRangeMul);
    }
    if(__isMeleeNode){
      if(mod.radius) mod.radius = Math.round(num(mod.radius, 0) * __meleeRangeMul);
      if(mod.angleDeg) mod.angleDeg = Math.round(num(mod.angleDeg, 0) * (1 + ((player.passiveRangeMul || 1) - 1) * 0.55));
      if(mod.splashRadius) mod.splashRadius = Math.round(num(mod.splashRadius, 0) * __meleeRangeMul);
    }

    return mod;
  }
  window.getModifiedActiveSkill = getModifiedSkill;

  const oldCritChance = typeof window.getCritChance === 'function' ? window.getCritChance : null;
  if(oldCritChance){
    window.getCritChance = function(){
      let out = oldCritChance.apply(this, arguments);
      const act = window.__supportActionState;
      if(act && Array.isArray(act.supports)){
        if(hasSupport(act.supports, 'increasedCriticalStrikesSupport')) out += 0.12;
        if(hasSupport(act.supports, 'controlledDestructionSupport')) out *= 0.20;
      }
      return Math.max(0, out);
    };
  }
  const oldCritMulti = typeof window.getCritMulti === 'function' ? window.getCritMulti : null;
  if(oldCritMulti){
    window.getCritMulti = function(){
      let out = oldCritMulti.apply(this, arguments);
      const act = window.__supportActionState;
      if(act && Array.isArray(act.supports) && hasSupport(act.supports, 'increasedCriticalDamageSupport')) out += 0.60;
      return out;
    };
  }

  const oldPlayerTaken = typeof window.applyPlayerTakenDamageMods === 'function' ? window.applyPlayerTakenDamageMods : null;
  if(oldPlayerTaken){
    window.applyPlayerTakenDamageMods = function(incoming, ctx){
      let out = oldPlayerTaken.call(this, incoming, ctx);
      ensureChargeState();
      const endurance = Math.max(0, num(player && player.chargeState && player.chargeState.endurance, 0));
      if(endurance > 0) out *= Math.max(0.4, 1 - endurance * 0.03);
      return out;
    };
  }

  const oldCompute = window.computeFinalDamage;
  if(typeof oldCompute === 'function'){
    window.computeFinalDamage = function(base, ctx, opt){
      const res = oldCompute.call(this, base, ctx, opt);
      const act = window.__supportActionState;
      if(!act || !ctx) return res;
      const supports = act.supports || [];
      const enemy = ctx.enemy;
      let pkt = makeDamagePacket(
        res.afterOutgoingPacket?.phys||0,
        res.afterOutgoingPacket?.fire||0,
        res.afterOutgoingPacket?.cold||0,
        res.afterOutgoingPacket?.lightning||0,
        res.afterOutgoingPacket?.chaos||0
      );
      const skill = act.skill || null;
      const tags = Array.isArray(ctx.tags) ? ctx.tags : [];
      const isAttack = tags.includes('attack');
      const isSpell = tags.includes('spell');
      const isMelee = tags.includes('melee');
      const weaponAvg = avgWeaponDamage();

      if(hasSupport(supports, 'meleePhysicalDamageSupport') && isMelee) pkt.phys *= 1.45;
      if(hasSupport(supports, 'addedFireDamageSupport')) pkt.fire += weaponAvg * 0.28;
      if(hasSupport(supports, 'addedColdDamageSupport')) pkt.cold += weaponAvg * 0.28;
      if(hasSupport(supports, 'addedLightningDamageSupport')) pkt.lightning += weaponAvg * 0.28;
      if(hasSupport(supports, 'spellbladeSupport') && isSpell) pkt.phys += weaponAvg * 0.60;
      if(hasSupport(supports, 'controlledDestructionSupport') && isSpell) pkt = scaleDamagePacket(pkt, 1.40);
      if(hasSupport(supports, 'elementalDamageWithAttacksSupport') && isAttack){
        pkt.fire *= 1.35; pkt.cold *= 1.35; pkt.lightning *= 1.35;
      }
      if(hasSupport(supports, 'brutalitySupport')){
        pkt.phys *= 1.50;
        pkt.fire = 0; pkt.cold = 0; pkt.lightning = 0; pkt.chaos = 0;
      }
      if(hasSupport(supports, 'multistrikeSupport')) pkt = scaleDamagePacket(pkt, 0.80);
      if(hasSupport(supports, 'greaterMultipleProjectilesSupport') && tags.includes('projectile')) pkt = scaleDamagePacket(pkt, 0.65);
      if(hasSupport(supports, 'castOnCriticalSupport')) pkt = scaleDamagePacket(pkt, 0.75);
      if(hasSupport(supports, 'ruthlessSupport') && act.ruthlessProc) pkt = scaleDamagePacket(pkt, 2.00);

      let afterCrit = pkt;
      if(res.crit && res.crit.isCrit){
        afterCrit = scaleDamagePacket(pkt, res.crit.multi || 1);
      }
      let dealtPkt = applyEnemyTakenDamageModsPacket(afterCrit, ctx);
      dealtPkt = applyEnemyResistsPacket(dealtPkt, enemy);
      res.afterOutgoingPacket = pkt;
      res.afterOutgoing = sumDamagePacket(pkt);
      res.dealtPacket = dealtPkt;
      res.dealt = sumDamagePacket(dealtPkt);
      res.crit = Object.assign({}, res.crit, { dmg: res.crit && res.crit.isCrit ? res.afterOutgoing * (res.crit.multi||1) : res.afterOutgoing });

      if(enemy && hasSupport(supports, 'cullingStrikeSupport') && enemy.hp > 0 && enemy.maxHp > 0){
        if(enemy.hp <= enemy.maxHp * 0.10) res.dealt = Math.max(res.dealt, enemy.hp + 1);
      }

      if(res.dealt > 0){
        if(hasSupport(supports, 'castOnCriticalSupport') && res.crit && res.crit.isCrit && !window.__supportTriggeringSpell){
          const linkedSpellId = getLinkedSpellId();
          const linkedSkill = linkedSpellId && window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[linkedSpellId];
          if(linkedSkill && linkedSkill.source === 'spell'){
            window.__supportTriggeringSpell = true;
            setTimeout(function(){
              try{
                const links = player && player.skillLinks ? player.skillLinks : null;
                if(!links) return;
                const prev = links.active;
                links.active = linkedSpellId;
                window.__supportExtraCast = true;
                const fn = window.__supportBaseUseActiveSkill || window.useActiveSkill;
                if(typeof fn === 'function') fn();
                links.active = prev;
              }catch(err){ console.warn('cast on crit trigger failed', err); }
              window.__supportExtraCast = false;
              window.__supportTriggeringSpell = false;
            }, 0);
          }
        }
      }
      return res;
    };
  }

  const oldUse = window.useActiveSkill;
  if(typeof oldUse === 'function'){
    window.__supportBaseUseActiveSkill = oldUse;

      const origSkill = activeId && window.ACTIVE_SKILLS ? window.ACTIVE_SKILLS[activeId] : null;
      if(!origSkill) return oldUse.apply(this, arguments);
      const modSkill = getModifiedSkill(origSkill);
      const supports = getApplicableSupportsForSkill(origSkill);
      const firstCall = !window.__supportExtraAttack && !window.__supportExtraCast;
      if(firstCall){
        ruthlessCounter[origSkill.id] = (ruthlessCounter[origSkill.id] || 0) + 1;
      }
      const actionState = {
        skillId: origSkill.id,
        skill: modSkill,
        supports,
        ruthlessProc: hasSupport(supports, 'ruthlessSupport') && ((ruthlessCounter[origSkill.id] || 0) % 3 === 0)
      };
      window.__supportActionState = actionState;
      let out;
      const prev = window.ACTIVE_SKILLS[activeId];
      window.ACTIVE_SKILLS[activeId] = modSkill;
      try{
        out = oldUse.apply(this, arguments);
      } finally {
        window.ACTIVE_SKILLS[activeId] = prev;
        window.__supportActionState = null;
      }

      if(firstCall && !window.__supportTriggeringSpell){
        if(hasSupport(supports, 'multistrikeSupport') && Array.isArray(origSkill.tags) && origSkill.tags.includes('attack') && origSkill.id !== 'whirlwind'){
          [90, 180].forEach(function(delay){

              try{ window.__supportExtraAttack = true; oldUse.call(window); }catch(err){ console.warn('multistrike failed', err); } finally { window.__supportExtraAttack = false; }
            }, delay);
          });
        }
        if(hasSupport(supports, 'spellEchoSupport') && origSkill.source === 'spell'){
          setTimeout(function(){
            try{ window.__supportExtraCast = true; oldUse.call(window); }catch(err){ console.warn('spell echo failed', err); } finally { window.__supportExtraCast = false; }
          }, 110);
        }
      }
      return out;
    };
  }

  if(typeof update === 'function' && !window.__SUPPORT_GEM_UPDATE_WRAP__){
    const oldUpdate = update;
    update = function(){

      if(typeof frameCount === 'number' && player && player.chargeState){

        }
      }
      return oldUpdate.apply(this, arguments);
    };
    window.__SUPPORT_GEM_UPDATE_WRAP__ = true;
  }
})();

<script>
(function(){
  if(window.__SUPPORT_GEM_PREVIEW_FIX_V2__) return;
  window.__SUPPORT_GEM_PREVIEW_FIX_V2__ = true;

  function num(v,d){ v = Number(v); return Number.isFinite(v) ? v : (d||0); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function getEquippedWeapon(){
    if(typeof equipment !== 'undefined' && equipment && equipment.weapon) return equipment.weapon;
    return null;
  }

  function getBaseWeaponStats(){
    let min = num(player && player.weapon && player.weapon.min, 14);
    let max = num(player && player.weapon && player.weapon.max, 20);
    let atk = Math.max(0.1, num(player && player.weapon && player.weapon.attackSpeed, 1));
    try{
      const ew = getEquippedWeapon();
      if(ew && typeof getWeaponDisplayStats === 'function'){
        const ws = getWeaponDisplayStats(ew);
        if(ws){
          if(Number.isFinite(Number(ws.min))) min = Number(ws.min);
          if(Number.isFinite(Number(ws.max))) max = Number(ws.max);
          if(Number.isFinite(Number(ws.atkMul))) atk = Math.max(0.1, Number(ws.atkMul));
        }
      }
    }catch(_e){}
    return { min, max, atk, avg:(min+max)*0.5, dps:((min+max)*0.5)*atk };
  }

  function getActiveSkillPreviewData(){
    const links = (player && player.skillLinks) ? player.skillLinks : { active:'attack', supports:[] };
    const activeId = links.active || 'attack';
    const skill = (window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[activeId]) || { id:'attack', name:'기본 공격', source:'weapon', tags:['attack','melee','physical'], baseMul:1 };
    const supports = (typeof getApplicableSupportsForSkill === 'function') ? getApplicableSupportsForSkill(skill) : [];
    const supportIds = supports.map(s=>s.id);
    const weapon = getBaseWeaponStats();
    let min = weapon.min, max = weapon.max;
    let speed = weapon.atk;
    let critChance = (typeof getCritChance === 'function') ? getCritChance() : 0.05;
    let critMulti = (typeof getCritMulti === 'function') ? getCritMulti() : 1.5;

    const tags = Array.isArray(skill.tags) ? skill.tags : [];
    const isAttack = tags.includes('attack');
    const isSpell = skill.source === 'spell' || tags.includes('spell');
    const isMelee = tags.includes('melee');
    const isProjectile = tags.includes('projectile');

    const baseMul = Math.max(0.01, num(skill.baseMul, 1));
    min *= baseMul; max *= baseMul;

    if(skill.cooldownSec > 0){
      speed = 1 / Math.max(0.05, num(skill.cooldownSec, 0));
    }
    if(skill.useTimeRatio){
      speed *= 1 / Math.max(0.05, num(skill.useTimeRatio, 1));
    }
    if(skill.hitInterval){
      speed *= 60 / Math.max(1, num(skill.hitInterval, 60));
    }

    if(supportIds.includes('meleePhysicalDamageSupport') && isMelee){ min *= 1.45; max *= 1.45; speed *= 0.85; }
    if(supportIds.includes('multistrikeSupport') && isAttack && isMelee){ min *= 0.80*3; max *= 0.80*3; speed *= 1.20; }
    if(supportIds.includes('increasedCriticalStrikesSupport')) critChance += 0.12;
    if(supportIds.includes('increasedCriticalDamageSupport')) critMulti += 0.60;
    if(supportIds.includes('addedFireDamageSupport')){ min += weapon.avg*0.28; max += weapon.avg*0.28; }
    if(supportIds.includes('addedColdDamageSupport')){ min += weapon.avg*0.28; max += weapon.avg*0.28; }
    if(supportIds.includes('addedLightningDamageSupport')){ min += weapon.avg*0.28; max += weapon.avg*0.28; }
    if(supportIds.includes('ruthlessSupport') && isMelee){ min *= 1.33; max *= 1.33; }
    if(supportIds.includes('fasterAttacksSupport') && isAttack) speed *= 1.22;
    if(supportIds.includes('elementalDamageWithAttacksSupport') && isAttack){ min *= 1.18; max *= 1.18; }
    if(supportIds.includes('brutalitySupport')){ min *= 1.50; max *= 1.50; }
    if(supportIds.includes('controlledDestructionSupport') && isSpell){ min *= 1.40; max *= 1.40; critChance *= 0.20; }
    if(supportIds.includes('fasterCastingSupport') && isSpell) speed *= 1.22;
    if(supportIds.includes('spellEchoSupport') && isSpell){ min *= 2.0; max *= 2.0; }
    if(supportIds.includes('spellbladeSupport') && isSpell){ min += weapon.avg*0.60; max += weapon.avg*0.60; }
    if(supportIds.includes('castOnCriticalSupport')){ min *= 0.75; max *= 0.75; }
    if(supportIds.includes('greaterMultipleProjectilesSupport') && isProjectile){ min *= 5*0.65; max *= 5*0.65; }

    if(skill.repeats && !supportIds.includes('multistrikeSupport')){ min *= num(skill.repeats,1); max *= num(skill.repeats,1); }
    if(skill.projectileCount && !supportIds.includes('greaterMultipleProjectilesSupport')){ min *= num(skill.projectileCount,1); max *= num(skill.projectileCount,1); }
    if(skill.impacts){ min *= Math.max(1, num(skill.impacts,1)*0.45); max *= Math.max(1, num(skill.impacts,1)*0.45); }

    critChance = clamp(critChance, 0, 0.95);

    const avg = (min + max) * 0.5;
    const critFactor =
      1 + critChance * (Math.max(1, critMulti) - 1);

    let doubleFactor = 1;
    if(skill && skill.extra){
      const ddMin = num(skill.extra.doubleDamageChanceMin, 0);
      const ddMax = num(skill.extra.doubleDamageChanceMax, 0);
      const ddAvg = Math.max(0, (ddMin + ddMax) * 0.5);
      doubleFactor += ddAvg;
    }

    const dps = Math.max(
      0,
      avg * critFactor * doubleFactor * Math.max(0.1, speed)
    );

    return {
      activeId,
      name: skill.name || '기본 공격',
      min: Math.max(1, Math.round(min)),
      max: Math.max(1, Math.round(max)),
      speed: Math.max(0.1, speed),
      critChancePct: critChance * 100,
      critMultiPct: Math.max(1, critMulti) * 100,
      dps: Math.max(0, dps),
      supportIds,
      skill
    };
  }

  window.__getActiveSkillPreviewData = getActiveSkillPreviewData;
  window.getSkillGemBoardDpsText = function(){
    const pv = getActiveSkillPreviewData();
    return 'DPS ' + Math.round(pv.dps).toLocaleString();
  };

  function prependCombatBlockFixed(){
    try{
      if(typeof specTextEl === 'undefined' || !specTextEl) return;
      const base = String(specTextEl.textContent || '').trim();
      const old1='[전투 정보]';
      const old2='[기존 캐릭터 정보]';
      let rest = base;
      if(rest.startsWith(old1)){
        const idx = rest.indexOf(old2);
        if(idx >= 0) rest = rest.slice(idx + old2.length).trim();
      }
      const pv = getActiveSkillPreviewData();
      const top = [
        '[전투 정보]',
        `현재 스킬: ${pv.name}`,
        `최종 피해: ${pv.min} ~ ${pv.max}`,
        `치명타 확률: ${pv.critChancePct.toFixed(1)}%`,
        `치명타 피해배율: ${pv.critMultiPct.toFixed(0)}%`,
        `공격 속도: ${pv.speed.toFixed(2)}`
      ].join('\n');
      specTextEl.textContent = `${top}\n\n[기존 캐릭터 정보]\n${rest}`;
    }catch(err){ console.warn('spec combat block fix failed', err); }
  }
  window.__prependCombatBlockFixed = prependCombatBlockFixed;

  if(typeof renderEquipPanel === 'function'){
    const old = renderEquipPanel;
    window.renderEquipPanel = function(){
      const out = old.apply(this, arguments);
      prependCombatBlockFixed();
      return out;
    };
  }
  const oldAfter = (window.GameHooks && window.GameHooks.afterRenderPanels) || null;
  window.GameHooks = window.GameHooks || {};
  window.GameHooks.afterRenderPanels = function(){
    try{ if(typeof oldAfter === 'function') oldAfter(); }catch(_){ }
    prependCombatBlockFixed();
  };

  if(typeof renderSkillGemUI === 'function'){
    const oldRender = renderSkillGemUI;
    window.renderSkillGemUI = function(){
      const out = oldRender.apply(this, arguments);
      try{
        const el = document.getElementById('skillGemBoardDps');
        if(el) el.textContent = window.getSkillGemBoardDpsText();
      }catch(_){ }
      return out;
    };
  }

  if(typeof setActiveSkill === 'function'){

      try{ prependCombatBlockFixed(); }catch(_){ }
      return out;
    };
  }
  if(typeof toggleSupportSocket === 'function'){
    const oldToggle = toggleSupportSocket;
    window.toggleSupportSocket = function(id){
      const out = oldToggle.apply(this, arguments);
      try{ prependCombatBlockFixed(); }catch(_){ }
      return out;
    };
  }
})();

<script>
(function(){
  const CORPSE_HOLD = 900;
  const CORPSE_FADE = 240;
  const BOSS_HOLD = 1200;
  const BOSS_FADE = 300;

  function num(v, d=0){
    v = Number(v);
    return Number.isFinite(v) ? v : d;
  }
  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
  function easeOutCubic(t){ t = clamp(t, 0, 1); return 1 - Math.pow(1 - t, 3); }

  function emitKillRewards(e, sourceTag){
    if(!e || e.__corpseRewardsGiven) return;
    e.__corpseRewardsGiven = true;
    try{ if(typeof emitEvent === 'function') emitEvent('kill', { enemy:e, x:e.x, y:e.y, type:e.type, source:sourceTag || 'skill' }); }catch(_){ }
    try{ if(typeof spawnEnemyDeathBurst === 'function') spawnEnemyDeathBurst(e.x, e.y, e.type); }catch(_){ }
    try{
      if(typeof findNearestLootDropPos === 'function' && typeof spawnLoot === 'function'){
        const p = findNearestLootDropPos(e.x, e.y);
        spawnLoot(p.x, p.y, sourceTag || 'normal');
      }else if(typeof spawnLoot === 'function'){
        spawnLoot(e.x, e.y, sourceTag || 'normal');
      }
    }catch(_){ }
    try{ if(typeof giveXP === 'function') giveXP(e); }catch(_){ }
    try{ if(window.killCount != null) window.killCount++; }catch(_){ }
    try{
      if(window.player){
        const hpOnKill = (window.getGlobalStats && getGlobalStats().hpOnKill) || 0;
        if(hpOnKill > 0) player.hp = Math.min(player.maxHp, player.hp + hpOnKill);
      }
    }catch(_){ }
  }

  function ensureCorpseState(e){
    if(!e) return e;
    const isBoss = e.type === 'boss';
    const hold = isBoss ? BOSS_HOLD : CORPSE_HOLD;
    const fade = isBoss ? BOSS_FADE : CORPSE_FADE;

    e.dead = true;
    e.hp = 0;
    e.stun = 0;
    e.phaseLock = 0;
    e.invul = Math.max(num(e.invul, 0), 9999);
    e.hitReact = 0;
    e.hitDone = false;
    e.attackFrame = 0;
    e.shootCooldown = Math.max(0, num(e.shootCooldown, 0));
    e.castCooldown = Math.max(0, num(e.castCooldown, 0));

    if(!(num(e.lastHitDirX, 0) || num(e.lastHitDirY, 0))){
      const px = (window.player && player.x) || ((e.x || 0) - 1);
      const py = (window.player && player.y) || (e.y || 0);
      const dx = (e.x || 0) - px;
      const dy = (e.y || 0) - py;
      const len = Math.hypot(dx, dy) || 1;
      e.lastHitDirX = dx / len;
      e.lastHitDirY = dy / len;
    }

    if(!e.__corpseInit){
      e.__corpseInit = true;
      e.__deathElapsed = 0;
      e.deathHold = hold;
      e.deathFade = fade;
      e.deathMax = hold + fade;
      e.deathTimer = e.deathMax;

      const side = (e.lastHitDirX || 1) >= 0 ? 1 : -1;
      let tilt = 1.40;
      let fallDX = (e.lastHitDirX || side) * 10;
      let fallDY = (e.lastHitDirY || 0) * 7;
      if(e.type === 'orc'){
        tilt = 1.70; fallDX = (e.lastHitDirX || side) * 13; fallDY = (e.lastHitDirY || 0) * 9;
      }else if(e.type === 'demon'){
        tilt = 1.52; fallDX = (e.lastHitDirX || side) * 11; fallDY = (e.lastHitDirY || 0) * 7;
      }else if(e.type === 'boss'){
        tilt = 1.18; fallDX = (e.lastHitDirX || side) * 16; fallDY = (e.lastHitDirY || 0) * 10;
      }else if(e.type === 'mage'){
        tilt = 1.58;
      }else if(e.type === 'archer'){
        tilt = 1.48;
      }else if(e.type === 'skeleton'){
        tilt = 1.34;
      }
      e.deathTilt = side * tilt;
      e.deathFallDX = fallDX;
      e.deathFallDY = fallDY;
    }else{
      e.deathHold = Math.max(num(e.deathHold, hold), hold);
      e.deathFade = Math.max(num(e.deathFade, fade), fade);
      e.deathMax = Math.max(num(e.deathMax, hold + fade), e.deathHold + e.deathFade);
      e.deathTimer = clamp(num(e.deathTimer, e.deathMax), 0, e.deathMax);
    }
    return e;
  }

  function finalizeNormalEnemyDeath(e, sourceTag){
    if(!e || e.type === 'boss') return false;
    ensureCorpseState(e);
    emitKillRewards(e, sourceTag || 'skill');
    return true;
  }

  function startBossDeathClean(boss){
    if(!boss) return false;
    if(boss.__bossCorpseStarted) return true;
    boss.__bossCorpseStarted = true;
    ensureCorpseState(boss);
    try{ if(typeof spawnEnemyDeathBurst === 'function') spawnEnemyDeathBurst(boss.x, boss.y, boss.type || 'boss', getEnemyKillFxKind(boss, 'physical')); }catch(_){ }
    return true;
  }

  function damageEnemyDirectClean(enemy, dealt){
    if(!enemy || enemy.dead || num(enemy.hp, 0) <= 0) return false;
    dealt = num(dealt, 0);
    if(!(dealt > 0)) return false;

    const g = (window.player && player.gear) ? player.gear : {};
    if((g.executeChance || 0) > 0 && enemy.hp > 0){
      const hpRatio = enemy.hp / Math.max(1, enemy.maxHp || enemy.hp);
      if(hpRatio <= 0.18 && Math.random() < (g.executeChance || 0)){
        dealt = Math.max(dealt, enemy.hp);
      }
    }

    if(typeof window.rememberHitFromPlayer === 'function'){
      try{ rememberHitFromPlayer(enemy); }catch(_){ }
    }

    enemy.__killFxKind = window.__lastDamageFxKind || enemy.__killFxKind || 'physical';
    enemy.hp -= dealt;
    enemy.hitFlash = Math.max(enemy.hitFlash || 0, 6);

    if(window.player){
      const dx = (enemy.x || 0) - (player.x || 0);
      const dy = (enemy.y || 0) - (player.y || 0);
      const len = Math.hypot(dx, dy) || 1;
      enemy.knockbackX = (enemy.knockbackX || 0) + (dx / len) * 1.8;
      enemy.knockbackY = (enemy.knockbackY || 0) + (dy / len) * 1.8;
    }

    const heal = dealt * num(g.maxLife, 0) + num(g.hpOnHit, 0);
    if(heal > 0 && window.player){
      player.hp = Math.min(player.maxHp || player.hp || 0, (player.hp || 0) + heal);
    }

    if(enemy.hp <= 0){
      if(enemy.type === 'boss') startBossDeathClean(enemy);
      else finalizeNormalEnemyDeath(enemy, 'skill');
      try{ shake = Math.max(shake || 0, enemy.type === 'boss' ? 8 : 3); }catch(_){ }
      return true;
    }
    return false;
  }

  function updateSingleEnemyClean(e){
    if(!e) return;

    if(e.isLeader){
      const radius = 50;
      const r2 = radius * radius;
      for(const other of enemies){
        if(other === e) continue;
        const dx = other.x - e.x;
        const dy = other.y - e.y;
        if(dx*dx + dy*dy <= r2){
          applyBuff(other, 'damage', 1.25, 15, 'leader');
          applyBuff(other, 'atkSpeed', 1.2, 15, 'leader');
        }
      }
    }

    if(e.dead || num(e.hp, 0) <= 0){
      if(e.type === 'boss') startBossDeathClean(e);
      else ensureCorpseState(e);

      e.__deathElapsed = num(e.__deathElapsed, 0) + 1;
      e.deathTimer = Math.max(0, num(e.deathTimer, e.deathMax) - 1);

      if(e.type === 'boss'){
        if(e.deathTimer % 10 === 0){
          try{
            shake = Math.max(shake || 0, 10);
            if(typeof spawnHitBlood === 'function'){
              spawnHitBlood(
                e.x + (Math.random() - 0.5) * 12,
                e.y + (Math.random() - 0.5) * 12,
                10
              );
            }
          }catch(_){ }
        }
        if(e.deathTimer === 1 && window.mapRun && !mapRun.bossDefeated){
          mapRun.bossDefeated = true;
          try{ if(typeof spawnPortal === 'function') spawnPortal(e.x, e.y); }catch(_){ }
        }
      }
      return;
    }

    if(e.invul > 0) e.invul--;

    if(e.phaseLock > 0){
      e.phaseLock--;
      return;
    }

    if(e.stun > 0){
      e.stun--;
      return;
    }

    switch(e.type){
      case 'archer':
      case 'skeleton':
        updateArcher(e);
        break;
      case 'mage':
        updateMage(e);
        break;
      case 'boss':
        updateBoss(e);
        break;
      case 'orc':
      case 'demon':
      case 'zombie':
      case 'melee':
      default:
        updateMelee(e);
        break;
    }
  }

  function pruneDeadEnemiesClean(){
    if(!Array.isArray(window.enemies)) return;
    for(let i = enemies.length - 1; i >= 0; i--){
      const e = enemies[i];
      if(!e){
        enemies.splice(i, 1);
        continue;
      }
      if(e.dead || num(e.hp, 0) <= 0){
        if(e.type === 'boss') startBossDeathClean(e);
        else ensureCorpseState(e);
        if(num(e.deathTimer, e.deathMax) <= 0) enemies.splice(i, 1);
      }
    }
  }

  function liveDrawAt(sx, sy, e){
    if(!e) return;
    if(e.type === 'boss' && typeof drawIsoBossSprite === 'function') return drawIsoBossSprite(sx, sy, e);
    if(e.type === 'zombie' && typeof drawIsoZombieSprite === 'function') return drawIsoZombieSprite(sx, sy, e);
    if(e.type === 'skeleton' && typeof drawIsoSkeletonSprite === 'function') return drawIsoSkeletonSprite(sx, sy, e);
    if(e.type === 'archer' && typeof drawIsoArcherSprite === 'function') return drawIsoArcherSprite(sx, sy, e);
    if(e.type === 'mage' && typeof drawIsoMageSprite === 'function') return drawIsoMageSprite(sx, sy, e);
    if(e.type === 'orc' && typeof drawIsoOrcWarriorSprite === 'function') return drawIsoOrcWarriorSprite(sx, sy, e);
    if(e.type === 'demon' && typeof drawIsoDemonSprite === 'function') return drawIsoDemonSprite(sx, sy, e);
    if(typeof drawIsoMeleeSprite === 'function') return drawIsoMeleeSprite(sx, sy, e);
  }

  function drawCorpseShadow(sx, sy, e, alpha){
    const scale = e.type === 'boss' ? 1.7 : e.type === 'orc' ? 1.2 : e.type === 'demon' ? 1.1 : 1;
    ctx.fillStyle = `rgba(35,0,0,${0.16 * alpha})`;
    ctx.beginPath();
    ctx.ellipse(sx + 3 * scale, sy + 12 * scale, 18 * scale, 8 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawIsoEnemySpriteClean(sx, sy, e){
    if(!e) return;
    const prevAlpha = ctx.globalAlpha;
    if(e.hitFlash > 0) ctx.globalAlpha = Math.min(1, prevAlpha * (1 + 0.18 * Math.min(1, e.hitFlash / 8)));

    if(e.dead || num(e.hp, 0) <= 0){
      if(e.type === 'boss') startBossDeathClean(e);
      else ensureCorpseState(e);

      const total = Math.max(1, num(e.deathMax, 1));
      const elapsed = total - clamp(num(e.deathTimer, total), 0, total);
      const animMax = Math.min(28, Math.max(16, e.type === 'boss' ? 26 : e.type === 'orc' ? 24 : e.type === 'demon' ? 22 : 18));
      const animT = easeOutCubic(elapsed / animMax);
      const fadeFrames = Math.max(1, num(e.deathFade, 1));
      const alpha = (num(e.deathTimer, 0) > fadeFrames) ? 1 : Math.max(0, num(e.deathTimer, 0) / fadeFrames);
      const slideX = num(e.deathFallDX, 0) * animT;
      const slideY = num(e.deathFallDY, 0) * animT;
      const sinkY = (e.type === 'boss' ? 10 : e.type === 'orc' ? 8 : 7) * animT;

      drawCorpseShadow(sx + slideX, sy + slideY + sinkY, e, alpha);
      ctx.save();
      ctx.globalAlpha = prevAlpha * alpha;
      ctx.translate(sx + slideX, sy + slideY + sinkY);
      ctx.rotate(num(e.deathTilt, 1.4) * animT);
      ctx.scale(e.type === 'boss' ? 1.04 : 1, Math.max(0.58, 1 - 0.22 * animT));

      const savedDead = e.dead;
      const savedHp = e.hp;
      const savedHitFlash = e.hitFlash;
      e.dead = false;
      e.hp = 1;
      e.hitFlash = 0;
      liveDrawAt(0, 0, e);
      e.dead = savedDead;
      e.hp = savedHp;
      e.hitFlash = savedHitFlash;

      ctx.restore();
      ctx.globalAlpha = prevAlpha;
      return;
    }

    liveDrawAt(sx, sy, e);
    ctx.globalAlpha = prevAlpha;
  }

  window.ensureDeathState = ensureCorpseState;
  window.finalizeNormalEnemyDeath = finalizeNormalEnemyDeath;
  window.startEnemyDeath = function(e){
    if(!e || e.type === 'boss') return false;
    return finalizeNormalEnemyDeath(e, 'skill');
  };
  window.startBossDeath = startBossDeathClean;
  window.damageEnemyDirect = damageEnemyDirectClean;
  if(typeof damageEnemyDirect === 'function') damageEnemyDirect = damageEnemyDirectClean;
  window.pruneDeadEnemies = pruneDeadEnemiesClean;
  if(typeof pruneDeadEnemies === 'function') pruneDeadEnemies = pruneDeadEnemiesClean;
  window.updateSingleEnemy = updateSingleEnemyClean;
  if(typeof updateSingleEnemy === 'function') updateSingleEnemy = updateSingleEnemyClean;
  window.drawIsoEnemySprite = drawIsoEnemySpriteClean;
  if(typeof drawIsoEnemySprite === 'function') drawIsoEnemySprite = drawIsoEnemySpriteClean;
})();

/* HUD 정렬 */
(function(){
  function pos(){
    const bag = document.getElementById("btnBag");
    const passive = document.getElementById("btnPassive");
    const skills = document.getElementById("btnSkills");
    if(!bag || !passive || !skills) return;
    const r = bag.getBoundingClientRect();
    skills.style.position="fixed";
    skills.style.left=r.left+"px";
    skills.style.top=(r.top-70)+"px";
    passive.style.position="fixed";
    passive.style.left=r.left+"px";
    passive.style.top=(r.top-140)+"px";
  }
  requestAnimationFrame(function loop(){pos();requestAnimationFrame(loop);});
})();

</script>
