<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>POE-like Isometric Base (Mobile)</title>
<style>
  :root{
    --uiScale: 0.55;

    --orbSize: calc(150px * var(--uiScale));
    --mmSize:  calc(150px * var(--uiScale));

    --joySize: calc(190px * var(--uiScale));
    --knobSize: calc(82px * var(--uiScale));
    --atkSize: calc(124px * var(--uiScale));

    --pad: calc(18px * var(--uiScale));
    --pad2: calc(28px * var(--uiScale));
  }

  html,body{height:100%;margin:0;overflow:hidden;background:#0b0b0e;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
  #app{position:fixed;inset:0;touch-action:none;}
  canvas#game{position:absolute;inset:0;display:block;background:#0f0f14;}

  /* ===== HUD ===== */
  #hud{position:absolute;inset:0;pointer-events:none;z-index:20;}

  /* LIFE orb */
  #lifeOrb{
    position:absolute;left:var(--pad);top:var(--pad);
    width:var(--orbSize);height:var(--orbSize);border-radius:50%;
    background:transparent;
    border:3px solid rgba(240,240,255,0.14);
    box-shadow:0 12px 30px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.75);
    overflow:hidden;
    z-index:21;

    /* iOS/Safari artifact fix */
    -webkit-clip-path: circle(50% at 50% 50%);
    clip-path: circle(50% at 50% 50%);
    transform: translateZ(0);
    will-change: transform;
  }
  #lifeOrb canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;}
  #lifeOrb .frame{
    position:absolute;inset:0;border-radius:50%;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), rgba(255,255,255,0.02) 40%, rgba(0,0,0,0.0) 60%),
      radial-gradient(circle at 50% 70%, rgba(0,0,0,0.35), rgba(0,0,0,0.0) 55%);
    mix-blend-mode:screen; opacity:0.9;
  }
  #lifeOrb .label{
    position:absolute;left:50%;top:22%;
    transform:translateX(-50%);
    font-size:12px;color:rgba(210,210,225,0.78);
    letter-spacing:0.9px;text-shadow:0 2px 10px rgba(0,0,0,0.85);
  }
  #lifeOrb .nums{
    position:absolute;left:50%;top:58%;
    transform:translate(-50%,-50%);
    font-weight:900;font-size:18px;color:rgba(240,240,250,0.92);
    text-shadow:0 2px 10px rgba(0,0,0,0.85);
    text-align:center;line-height:1.05;
  }

  /* Minimap */
  #minimap{
    position:absolute;right:var(--pad);top:var(--pad);
    width:var(--mmSize);height:var(--mmSize);border-radius:50%;
    background:transparent;
    border:3px solid rgba(240,240,255,0.14);
    box-shadow:0 12px 30px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.75);
    overflow:hidden;
    z-index:21;

    -webkit-clip-path: circle(50% at 50% 50%);
    clip-path: circle(50% at 50% 50%);
    transform: translateZ(0);
    will-change: transform;
  }
  #minimap canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;}
  #minimap .ring{
    position:absolute;inset:10px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.10);
  }

  /* ===== Touch controls ===== */
  #touchUI{position:absolute;inset:0;pointer-events:none;z-index:30;}

  /* Fixed joystick (left-bottom) */
  #joyBase{
    position:absolute;left:var(--pad2);bottom:var(--pad2);
    width:var(--joySize);height:var(--joySize);border-radius:50%;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.14);
    display:none;
    pointer-events:auto;touch-action:none;
  }
  #joyKnob{
    position:absolute;left:50%;top:50%;
    width:var(--knobSize);height:var(--knobSize);border-radius:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
  }

  /* Attack/skill 1 button (right-bottom) */
  #atkBtn{
    position:absolute;right:calc(40px * var(--uiScale));bottom:calc(22px * var(--uiScale));
    width:var(--atkSize);height:var(--atkSize);border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,210,130,0.40), rgba(255,140,40,0.30) 45%, rgba(160,45,0,0.25));
    border:2px solid rgba(255,170,80,0.35);
    box-shadow:0 10px 26px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.55);
    display:none;
    align-items:center;justify-content:center;
    color:rgba(255,245,235,0.92);
    font-weight:900;
    text-shadow:0 1px 0 rgba(0,0,0,0.35);
    pointer-events:auto;touch-action:none;
  }
  #atkBtn:active{transform:scale(0.98);}

  /* One menu toggle button (top center) */
  #menuBtn{
    position:absolute;left:50%;top:calc(18px * var(--uiScale));
    transform:translateX(-50%);
    height:calc(46px * var(--uiScale));
    padding:0 calc(14px * var(--uiScale));
    border-radius:999px;
    background:rgba(20,20,28,0.45);
    border:1px solid rgba(255,255,255,0.16);
    box-shadow:0 10px 26px rgba(0,0,0,0.55), inset 0 0 16px rgba(0,0,0,0.55);
    color:rgba(240,240,250,0.92);
    font-weight:900;
    letter-spacing:0.6px;
    display:none;
    align-items:center;justify-content:center;
    pointer-events:auto;touch-action:none;
    z-index:40;
  }
  #menuBtn:active{transform:translateX(-50%) scale(0.98);}

  /* Overlay (full-screen) */
  #overlay{
    position:absolute;inset:0;
    display:none;
    z-index:1000;
    pointer-events:auto;
    background:rgba(0,0,0,0.78);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
  }
  #overlayCard{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:min(920px, 92vw);
    height:min(520px, 84vh);
    border-radius:18px;
    background:rgba(15,15,22,0.72);
    border:1px solid rgba(255,255,255,0.14);
    box-shadow:0 18px 45px rgba(0,0,0,0.75), inset 0 0 18px rgba(0,0,0,0.65);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  #overlayTop{
    flex:0 0 auto;
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px;
    border-bottom:1px solid rgba(255,255,255,0.10);
    color:rgba(240,240,250,0.92);
    font-weight:900;
  }
  #overlayClose{
    appearance:none;border:none;
    background:rgba(255,255,255,0.10);
    border:1px solid rgba(255,255,255,0.16);
    color:rgba(240,240,250,0.92);
    font-weight:900;
    padding:10px 12px;
    border-radius:12px;
  }
  #overlayClose:active{transform:scale(0.98);}
  #overlayBody{
    flex:1 1 auto;
    display:flex;
    gap:12px;
    padding:12px;
  }
  #overlayNav{
    width:200px;
    border:1px solid rgba(255,255,255,0.10);
    border-radius:14px;
    background:rgba(0,0,0,0.25);
    padding:10px;
  }
  .navItem{
    padding:10px 10px;
    border-radius:12px;
    color:rgba(220,220,235,0.90);
    font-weight:800;
    border:1px solid transparent;
  }
  .navItem.active{
    background:rgba(255,255,255,0.08);
    border-color:rgba(255,255,255,0.12);
  }
  #overlayMain{
    flex:1 1 auto;
    border:1px solid rgba(255,255,255,0.10);
    border-radius:14px;
    background:rgba(0,0,0,0.20);
    padding:14px;
    color:rgba(220,220,235,0.86);
    overflow:auto;
  }

  /* Landscape gate */
  #rotateGate{
    position:absolute;inset:0;
    background:radial-gradient(circle at 50% 20%, rgba(255,255,255,0.06), rgba(0,0,0,0.92) 55%);
    display:none;
    align-items:center;justify-content:center;
    z-index:9999;
    pointer-events:auto;
    touch-action:none;
  }
  #rotateCard{
    width:min(420px, 86vw);
    background:rgba(12,12,18,0.65);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:16px;
    box-shadow:0 18px 45px rgba(0,0,0,0.75), inset 0 0 18px rgba(0,0,0,0.65);
    padding:18px 16px;
    text-align:center;
    color:rgba(240,240,250,0.92);
  }
  #rotateIcon{
    width:72px;height:72px;margin:2px auto 12px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.06);
    display:flex;align-items:center;justify-content:center;
    font-size:34px;
  }
  #rotateTitle{font-weight:900;font-size:18px;margin:0 0 6px;}
  #rotateDesc{margin:0 0 14px;color:rgba(210,210,225,0.78);font-size:13px;line-height:1.35;}
  #rotateBtn{
    appearance:none;border:none;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
    color:rgba(240,240,250,0.92);
    font-weight:800;
    padding:10px 12px;
    border-radius:12px;
    width:100%;
  }

  @media (pointer:coarse){
    #joyBase,#atkBtn,#menuBtn{display:flex;}
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="lifeOrb">
      <canvas id="lifeCanvas"></canvas>
      <div class="frame"></div>
      <div class="label">LIFE</div>
      <div class="nums" id="lifeNums">100<br><span style="font-size:12px;font-weight:800;opacity:.85">/ 100</span></div>
    </div>

    <div id="minimap">
      <canvas id="minimapCanvas"></canvas>
      <div class="ring"></div>
    </div>
  </div>

  <!-- Touch UI -->
  <div id="touchUI">
    <div id="joyBase"><div id="joyKnob"></div></div>
    <div id="atkBtn">ATK</div>
    <div id="menuBtn">MENU</div>
  </div>

  <!-- Overlay -->
  <div id="overlay" aria-hidden="true">
    <div id="overlayCard">
      <div id="overlayTop">
        <div id="overlayTitle">MENU</div>
        <button id="overlayClose">닫기</button>
      </div>
      <div id="overlayBody">
        <div id="overlayNav">
          <div class="navItem active">가방</div>
          <div class="navItem">장착</div>
          <div class="navItem">스펙</div>
          <div class="navItem">제작</div>
          <div class="navItem">기타</div>
        </div>
        <div id="overlayMain">
          여기는 나중에 스킬/가방/장착/캐릭터 스펙/제작 등 모든 정보를 넣는 전체 창.
        </div>
      </div>
    </div>
  </div>

  <!-- Landscape gate -->
  <div id="rotateGate">
    <div id="rotateCard">
      <div id="rotateIcon">📱↻</div>
      <p id="rotateTitle">가로 화면으로 플레이</p>
      <p id="rotateDesc">이 게임 UI는 가로(landscape) 전용이야.<br>휴대폰을 가로로 돌려줘.</p>
      <button id="rotateBtn">가로로 전환 시도</button>
    </div>
  </div>
</div>

<script>
/* ===== Utils (pure) ===== */
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* ===== Landscape gate ===== */
(function(){
  const gate = document.getElementById("rotateGate");
  const btn  = document.getElementById("rotateBtn");
  function isLandscape(){ return window.matchMedia && window.matchMedia("(orientation: landscape)").matches; }
  function update(){ gate.style.display = isLandscape() ? "none" : "flex"; }
  update();
  window.addEventListener("resize", update);
  window.addEventListener("orientationchange", update);
  btn.addEventListener("click", async ()=>{
    try{ if(screen.orientation && screen.orientation.lock){ await screen.orientation.lock("landscape"); } }catch(_){}
    update();
  });
})();

/* =========================
   Core (NO DOM)
========================= */
const Core = (() => {
  const state = {
    map:{ w:120, h:120, tw:64, th:32 },
    player:{
      x:60, y:60, r:0.45,
      base:{ life:100, speed:6.0 },
      res:{ life:100 },
      max:{ life:100 },
    },
    input:{ mx:0, my:0 },
    events: []
  };

  function init(){
    state.player.res.life = state.player.base.life;
    state.player.max.life = state.player.base.life;
  }

  function pushEvent(type, payload={}){
    state.events.push({type, payload});
  }

  function step(dt){
    const p = state.player;

    // handle events (demo)
    while(state.events.length){
      const ev = state.events.shift();
      if(ev.type === "attack"){
        // demo: life changes so orb animates
        p.res.life = Math.max(0, p.res.life - 1);
      }
    }

    const mx = state.input.mx, my = state.input.my;
    if(mx || my){
      const L = Math.hypot(mx,my) || 1;
      const ux = mx/L, uy = my/L;
      p.x = clamp(p.x + ux * p.base.speed * dt, p.r, state.map.w - p.r);
      p.y = clamp(p.y + uy * p.base.speed * dt, p.r, state.map.h - p.r);
    }
  }

  function get(){ return state; }
  return { init, step, get, pushEvent };
})();

/* =========================
   Renderer (Canvas only)
========================= */
const Renderer = (() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);

  function isoWithCamera(wx, wy, camX, camY, TW, TH){
    const sx = (wx - wy) * (TW/2);
    const sy = (wx + wy) * (TH/2);
    const csx = (camX - camY) * (TW/2);
    const csy = (camX + camY) * (TH/2);
    return { x: (sx - csx) + canvas.width/2, y: (sy - csy) + canvas.height/2 };
  }

  function draw(state){
    const TW = state.map.tw, TH = state.map.th;
    const p = state.player;
    const camX = p.x, camY = p.y;

    // background fill (prevents transparent artifacts)
    ctx.fillStyle = "#0f0f14";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // safe visible radius based on screen
    const R = Math.ceil(Math.max(canvas.width / TW, canvas.height / TH)) + 10;
    const minX = Math.max(0, Math.floor(camX - R));
    const maxX = Math.min(state.map.w-1, Math.ceil(camX + R));
    const minY = Math.max(0, Math.floor(camY - R));
    const maxY = Math.min(state.map.h-1, Math.ceil(camY + R));

    for(let y=minY;y<=maxY;y++){
      for(let x=minX;x<=maxX;x++){
        const pos = isoWithCamera(x,y,camX,camY,TW,TH);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineTo(pos.x + TW/2, pos.y + TH/2);
        ctx.lineTo(pos.x, pos.y + TH);
        ctx.lineTo(pos.x - TW/2, pos.y + TH/2);
        ctx.closePath();
        ctx.fillStyle = ((x+y)&1) ? "#1f1f27" : "#262631";
        ctx.fill();
      }
    }

    // player (screen centered by camera)
    const pos = isoWithCamera(p.x, p.y, camX, camY, TW, TH);
    ctx.fillStyle = "#ff3b3b";
    ctx.beginPath();
    ctx.arc(pos.x, pos.y + TH/2, 12, 0, Math.PI*2);
    ctx.fill();
  }

  resize();
  return { draw };
})();

/* =========================
   HUD (DOM only)
========================= */
const HUD = (() => {
  const lifeCanvas = document.getElementById("lifeCanvas");
  const lifeNums   = document.getElementById("lifeNums");
  const mmCanvas   = document.getElementById("minimapCanvas");

  function setupHiDPI(canvas){
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    const css = canvas.getBoundingClientRect();
    const w = Math.max(1, Math.floor(css.width * dpr));
    const h = Math.max(1, Math.floor(css.height * dpr));
    if(canvas.width !== w || canvas.height !== h){ canvas.width=w; canvas.height=h; }
    return { w, h };
  }

  function drawLife(cur, max){
    const ctx = lifeCanvas.getContext("2d");
    const {w,h} = setupHiDPI(lifeCanvas);
    const cx=w/2, cy=h/2;
    const R=Math.min(w,h)*0.48;

    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();

    ctx.fillStyle="rgba(0,0,0,0.58)";
    ctx.fillRect(0,0,w,h);

    const pct = max>0 ? clamp(cur/max,0,1) : 0;
    const levelY = cy + R - (2*R*pct);
    ctx.fillStyle="rgba(220,40,40,0.88)";
    ctx.fillRect(cx-R-2, levelY, 2*R+4, (cy+R)-levelY+2);

    // wave
    ctx.globalAlpha=0.35;
    ctx.beginPath();
    const waveAmp=R*0.05, waveLen=R*0.45;
    const phase = (performance.now()/1000)*2.4;
    ctx.moveTo(cx-R, levelY);
    for(let x=cx-R; x<=cx+R; x+=R*0.08){
      const t=(x-(cx-R))/waveLen;
      const y=levelY + Math.sin(t*2.8 + phase)*waveAmp;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(cx+R, cy+R); ctx.lineTo(cx-R, cy+R); ctx.closePath();
    ctx.fillStyle="rgba(255,130,130,0.68)";
    ctx.fill();
    ctx.globalAlpha=1.0;

    // vignette
    const grd=ctx.createRadialGradient(cx, cy+R*0.35, R*0.2, cx, cy, R);
    grd.addColorStop(0,"rgba(255,255,255,0.06)");
    grd.addColorStop(0.55,"rgba(0,0,0,0.0)");
    grd.addColorStop(1,"rgba(0,0,0,0.60)");
    ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);

    ctx.restore();

    // rings
    ctx.strokeStyle="rgba(255,255,255,0.14)";
    ctx.lineWidth=Math.max(1,R*0.06);
    ctx.beginPath(); ctx.arc(cx,cy,R*0.985,0,Math.PI*2); ctx.stroke();

    ctx.strokeStyle="rgba(0,0,0,0.55)";
    ctx.lineWidth=Math.max(1,R*0.025);
    ctx.beginPath(); ctx.arc(cx,cy,R*0.90,0,Math.PI*2); ctx.stroke();

    lifeNums.innerHTML = `${Math.floor(cur)}<br><span style="font-size:12px;font-weight:800;opacity:.85">/ ${Math.floor(max)}</span>`;
  }

  function drawMiniMap(state){
    const ctx = mmCanvas.getContext("2d");
    const {w,h} = setupHiDPI(mmCanvas);
    const cx=w/2, cy=h/2;
    const R=Math.min(w,h)*0.48;

    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();

    ctx.fillStyle="rgba(0,0,0,0.55)";
    ctx.fillRect(0,0,w,h);

    // grid
    ctx.globalAlpha=0.20;
    ctx.strokeStyle="rgba(255,255,255,0.15)";
    for(let i=-3;i<=3;i++){
      ctx.beginPath(); ctx.moveTo(cx-R, cy+i*R/3); ctx.lineTo(cx+R, cy+i*R/3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+i*R/3, cy-R); ctx.lineTo(cx+i*R/3, cy+R); ctx.stroke();
    }
    ctx.globalAlpha=1.0;

    // player dot centered (later: map transform)
    ctx.fillStyle="rgba(255,80,80,0.95)";
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill();

    const grd=ctx.createRadialGradient(cx, cy, R*0.2, cx, cy, R);
    grd.addColorStop(0,"rgba(255,255,255,0.06)");
    grd.addColorStop(0.6,"rgba(0,0,0,0.0)");
    grd.addColorStop(1,"rgba(0,0,0,0.70)");
    ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);

    ctx.restore();
  }

  function render(){
    const st = Core.get();
    drawLife(st.player.res.life, st.player.max.life);
    drawMiniMap(st);
  }

  window.addEventListener("resize", render);
  return { render };
})();

/* =========================
   Controls (DOM -> Core)
========================= */
const Controls = (() => {
  const root = document.getElementById("app");
  const joyBase = document.getElementById("joyBase");
  const joyKnob = document.getElementById("joyKnob");
  const atkBtn  = document.getElementById("atkBtn");
  const menuBtn = document.getElementById("menuBtn");

  const overlay = document.getElementById("overlay");
  const overlayClose = document.getElementById("overlayClose");

  const joy = { active:false, id:null, baseX:0, baseY:0, dx:0, dy:0, max:64 };

  function isLandscape(){ return window.matchMedia && window.matchMedia("(orientation: landscape)").matches; }
  function findTouchById(list, id){ for(const t of list){ if(t.identifier===id) return t; } return null; }
  function setKnob(px,py){ joyKnob.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`; }
  function resetJoy(){ joy.active=false; joy.id=null; joy.dx=0; joy.dy=0; setKnob(0,0); }
  function refreshJoyMax(){
    const s = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--uiScale")) || 1;
    joy.max = 64 * s;
  }
  refreshJoyMax();
  window.addEventListener("resize", refreshJoyMax);

  // Fixed joystick base center
  function computeBaseCenter(){
    const rect = root.getBoundingClientRect();
    const br = joyBase.getBoundingClientRect();
    joy.baseX = (br.left + br.width/2) - rect.left;
    joy.baseY = (br.top  + br.height/2) - rect.top;
  }
  window.addEventListener("resize", computeBaseCenter);
  window.addEventListener("orientationchange", computeBaseCenter);
  requestAnimationFrame(computeBaseCenter);

  // Joystick touch
  root.addEventListener("touchstart", (e)=>{
    if(!isLandscape()) return;
    const rect = root.getBoundingClientRect();
    for(const t of e.changedTouches){
      const x = t.clientX - rect.left;
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if(el && el.closest && el.closest("#atkBtn, #menuBtn, #overlay")) continue;
      if(x > rect.width * 0.55) continue; // left half only

      joy.active=true;
      joy.id=t.identifier;
      computeBaseCenter();
      setKnob(0,0);
      e.preventDefault();
      return;
    }
  }, {passive:false});

  root.addEventListener("touchmove", (e)=>{
    if(!joy.active) return;
    const rect = root.getBoundingClientRect();
    const t = findTouchById(e.touches, joy.id);
    if(!t) return;

    const x = t.clientX - rect.left;
    const y = t.clientY - rect.top;

    let px = x - joy.baseX;
    let py = y - joy.baseY;
    const dist = Math.hypot(px,py);
    const max = joy.max;
    if(dist > max){ px = px/dist*max; py = py/dist*max; }

    joy.dx = px/max;
    joy.dy = py/max;
    setKnob(px,py);
    e.preventDefault();
  }, {passive:false});

  root.addEventListener("touchend", (e)=>{
    if(!joy.active) return;
    const ended = findTouchById(e.changedTouches, joy.id);
    if(ended){ resetJoy(); e.preventDefault(); }
  }, {passive:false});
  root.addEventListener("touchcancel", ()=>{ if(joy.active) resetJoy(); }, {passive:false});

  // Attack
  atkBtn.addEventListener("touchstart", (e)=>{
    Core.pushEvent("attack");
    e.preventDefault();
  }, {passive:false});

  // Overlay toggle
  function openOverlay(){
    overlay.style.display = "block";
    overlay.setAttribute("aria-hidden", "false");
  }
  function closeOverlay(){
    overlay.style.display = "none";
    overlay.setAttribute("aria-hidden", "true");
  }
  menuBtn.addEventListener("touchstart", (e)=>{ openOverlay(); e.preventDefault(); }, {passive:false});
  overlayClose.addEventListener("click", ()=>closeOverlay());
  overlay.addEventListener("click", (e)=>{ if(e.target === overlay) closeOverlay(); });

  function apply(){
    const st = Core.get();
    st.input.mx = joy.dx;
    st.input.my = joy.dy;
  }

  return { apply };
})();

/* ===== Boot ===== */
Core.init();

let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last)/1000);
  last = now;

  Controls.apply();
  Core.step(dt);
  Renderer.draw(Core.get());
  HUD.render();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
