function hasPassive(id){ return !!(player && player.passives && player.passives[id]); }
function getNode(id){ return PASSIVE_NODES[id] || null; }
function getChildrenOfPassive(id){
  const out = [];
  for(const nid of Object.keys(PASSIVE_NODES)){
    const p = PASSIVE_NODES[nid].parents || [];
    if(p.includes(id)) out.push(nid);
  }
  return out;
}
function canAllocatePassive(id){
  const node = getNode(id);
  if(!node || hasPassive(id) || (player.passivePoints||0) <= 0) return false;

  if(node.tier === 1 && !node.cluster){
    if(rootPassive && rootPassive !== id) return false;
  }

  const parents = node.parents || [];
  if(!parents.length) return true;
  return node.anyParent ? parents.some(hasPassive) : parents.every(hasPassive);
}
function canRemovePassive(id){
  const node = getNode(id);
  if(!node || !hasPassive(id)) return false;
  const kids = getChildrenOfPassive(id);
  return kids.every(k => !hasPassive(k));
}
function getPassiveStateLabel(id){
  const node = getNode(id);
  if(!node) return '';
  if(hasPassive(id)) return canRemovePassive(id) ? '획득됨 · 제거 가능' : '획득됨 · 하위 노드가 있어 제거 불가';
  if(canAllocatePassive(id)) return '획득 가능';
  if((player.passivePoints||0) <= 0) return '포인트 부족';
  const parents = node.parents || [];
  if(parents.length) return '선행 필요: ' + parents.map(pid => PASSIVE_NODES[pid].name).join(', ');
  return '획득 불가';
}
function getPassiveBonuses(){
  const out = { maxHpInc:0, maxHpAdd:0, armorAdd:0, hpRegen:0, lifeLeech:0, hpOnKill:0, hpOnHit:0, atkSpdInc:0, castSpdInc:0, rangeInc:0, spellRangeInc:0, critChanceAdd:0, critMultiAdd:0, meleeDamageInc:0, spellDamageInc:0, elementalDamageInc:0 };
  const ps = (player && player.passives) ? player.passives : {};
  for(const id of Object.keys(ps)){
    if(!ps[id]) continue;
    const ef = PASSIVE_NODES[id] && PASSIVE_NODES[id].effects;
    if(!ef) continue;
    for(const k of Object.keys(ef)) out[k] = (out[k]||0) + ef[k];
  }
  return out;
}
function rebuildPassiveMods(){
  if(window.GameMods && Array.isArray(window.GameMods.list)){
    window.GameMods.list = window.GameMods.list.filter(m => m.source !== 'passive');
    const ps = (player && player.passives) ? player.passives : {};
    for(const id of Object.keys(ps)){
      if(!ps[id]) continue;
      const node = PASSIVE_NODES[id];
      if(!node || !Array.isArray(node.mods)) continue;
      node.mods.forEach((m, idx) => {
        window.GameMods.list.push(Object.assign({ id:'passive_'+id+'_'+idx, source:'passive' }, m));
      });
    }
  }
}
function allocatePassive(id){
  if(!canAllocatePassive(id)) return false;
  const prevMaxHp = Number((player && player.maxHp) || 0);
  const node = getNode(id);
  if(!player.passives) player.passives = {};
  player.passives[id] = true;
  if(node && node.tier === 1 && !node.cluster && !rootPassive){
    rootPassive = id;
  }
  player.passivePoints = Math.max(0, (player.passivePoints||0) - 1);
  selectedPassiveNodeId = id;
  passivePopupClosed = false;
  passiveLastPoppedId = id;
  rebuildPassiveMods();
  recalcFromGear();
  syncPlayerVitalDisplay();
  const gain = Math.max(0, Number(player.maxHp || 0) - prevMaxHp);
  if(gain > 0) player.hp = Math.min(player.maxHp, Number(player.hp || 0) + gain);
  renderAllPanels();
  return true;
}
function removePassive(id){
  if(!canRemovePassive(id)) return false;
  const node = getNode(id);
  delete player.passives[id];
  if(node && node.tier === 1 && !node.cluster && rootPassive === id){
    rootPassive = null;
  }
  player.passivePoints = (player.passivePoints||0) + 1;
  selectedPassiveNodeId = id;
  passivePopupClosed = false;
  rebuildPassiveMods();
  recalcFromGear();
  syncPlayerVitalDisplay();
  player.hp = Math.max(1, Math.min(player.maxHp, Number(player.hp || 0)));
  renderAllPanels();
  return true;
}
function resetPassivesFree(){
  if(!player) return;
  const spent = Object.keys(player.passives || {}).filter(id => !!player.passives[id]).length;
  player.passives = {};
  rootPassive = null;
  player.passivePoints = (player.passivePoints || 0) + spent;
  selectedPassiveNodeId = null;
  passivePopupClosed = true;
  rebuildPassiveMods();
  recalcFromGear();
  syncPlayerVitalDisplay();
  player.hp = Math.max(1, Math.min(player.maxHp, Number(player.hp || 0)));
  renderAllPanels();
  setTimeout(()=>{
    renderPassiveTree();
    fitPassiveTreeToViewport();
  },0);
}
function passiveNodeState(id){
  const node = getNode(id);
  if(node && node.tier === 1 && !node.cluster && rootPassive && rootPassive !== id && !hasPassive(id)) return 'locked';
  return hasPassive(id) ? 'allocated' : (canAllocatePassive(id) ? 'available' : 'locked');
}

function clampPassiveZoom(v){
  return Math.max(getPassiveZoomMin(), Math.min(PASSIVE_ZOOM_MAX, v));
}
function fitPassiveTreeToViewport(){
  const viewport = document.getElementById('passiveTreeViewport');
  if(!viewport) return;
  const pad = 90;
  const minX = 90;
  const maxX = 2180;
  const minY = 90;
  const maxY = 2170;
  const contentW = (maxX - minX) + pad * 2;
  const contentH = (maxY - minY) + pad * 2;
  const fitX = viewport.clientWidth / Math.max(1, contentW);
  const fitY = viewport.clientHeight / Math.max(1, contentH);
  const fitZoom = Math.min(fitX, fitY);
  passiveZoomMinDynamic = Math.max(PASSIVE_ZOOM_MIN_BASE, fitZoom);
  passiveZoom = Math.max(getPassiveZoomMin(), Math.min(PASSIVE_ZOOM_MAX, fitZoom));
  const centerX = (minX + maxX) * 0.5;
  const centerY = (minY + maxY) * 0.5;
  const scrollLeft = Math.max(0, centerX * passiveZoom - viewport.clientWidth * 0.5);
  const scrollTop = Math.max(0, centerY * passiveZoom - viewport.clientHeight * 0.5);
  applyPassiveZoom({
    xRatio: 0.5,
    yRatio: 0.5,
    scrollLeft,
    scrollTop,
    prevZoom: passiveZoom
  });
  viewport.scrollLeft = scrollLeft;
  viewport.scrollTop = scrollTop;
}

function applyPassiveZoom(keep){
  const viewport = document.getElementById('passiveTreeViewport');
  const board = document.getElementById('passiveTreeBoard');
  const tree = document.getElementById('passiveTree');
  const glow = document.getElementById('passiveTreeGlow');
  if(!viewport || !board || !tree || !glow) return;
  passiveZoom = clampPassiveZoom(passiveZoom || 1);
  const prev = keep || { xRatio:0.5, yRatio:0.5, scrollLeft:viewport.scrollLeft, scrollTop:viewport.scrollTop };
  board.style.width = (PASSIVE_BOARD_BASE_W * passiveZoom) + 'px';
  board.style.height = (PASSIVE_BOARD_BASE_H * passiveZoom) + 'px';
  tree.style.transformOrigin = '0 0';
  tree.style.transform = 'scale(' + passiveZoom + ')';
  glow.style.transformOrigin = '0 0';
  glow.style.transform = 'scale(' + passiveZoom + ')';
  const targetX = (prev.scrollLeft + viewport.clientWidth * prev.xRatio) / (prev.prevZoom || passiveZoom);
  const targetY = (prev.scrollTop + viewport.clientHeight * prev.yRatio) / (prev.prevZoom || passiveZoom);
  viewport.scrollLeft = Math.max(0, targetX * passiveZoom - viewport.clientWidth * prev.xRatio);
  viewport.scrollTop = Math.max(0, targetY * passiveZoom - viewport.clientHeight * prev.yRatio);
}
function focusPassiveNode(id){

function setupPassiveViewportDrag(){
  const viewport = document.getElementById('passiveTreeViewport');
  if(!viewport || viewport.dataset.dragBound) return;
  viewport.dataset.dragBound = '1';
  let dragging = false, sx=0, sy=0, sl=0, st=0;
  let pinchStartDist = 0;
  let pinchPrevZoom = 1;
  let pinchCenter = null;

  function touchDist(a,b){
    const dx = a.clientX - b.clientX;
    const dy = a.clientY - b.clientY;
    return Math.hypot(dx, dy);
  }

  viewport.addEventListener('pointerdown', (e)=>{
    if(e.pointerType === 'touch') return;
    dragging = true; sx = e.clientX; sy = e.clientY; sl = viewport.scrollLeft; st = viewport.scrollTop;
    viewport.classList.add('dragging');
    viewport.setPointerCapture?.(e.pointerId);
  });
  viewport.addEventListener('pointermove', (e)=>{
    if(!dragging) return;
    viewport.scrollLeft = sl - (e.clientX - sx);
    viewport.scrollTop = st - (e.clientY - sy);
    renderPassiveTree();
  });
  const end = (e)=>{ dragging = false; viewport.classList.remove('dragging'); try{ viewport.releasePointerCapture?.(e.pointerId); }catch(_){} };
  viewport.addEventListener('pointerup', end);
  viewport.addEventListener('pointercancel', end);

  viewport.addEventListener('touchstart', (e)=>{
    if(e.touches.length === 2){
      pinchStartDist = touchDist(e.touches[0], e.touches[1]);
      pinchPrevZoom = passiveZoom;
      const rect = viewport.getBoundingClientRect();
      pinchCenter = {
        xRatio: ((e.touches[0].clientX + e.touches[1].clientX) * 0.5 - rect.left) / viewport.clientWidth,
        yRatio: ((e.touches[0].clientY + e.touches[1].clientY) * 0.5 - rect.top) / viewport.clientHeight,
        scrollLeft: viewport.scrollLeft,
        scrollTop: viewport.scrollTop,
        prevZoom: passiveZoom
      };
    }else if(e.touches.length === 1){
      sx = e.touches[0].clientX; sy = e.touches[0].clientY; sl = viewport.scrollLeft; st = viewport.scrollTop;
    }
  }, {passive:false});

  viewport.addEventListener('touchmove', (e)=>{
    if(e.touches.length === 2){
      e.preventDefault();
      const dist = touchDist(e.touches[0], e.touches[1]);
      if(pinchStartDist > 0){
        passiveZoom = clampPassiveZoom(pinchPrevZoom * (dist / pinchStartDist));
        applyPassiveZoom(pinchCenter || {xRatio:0.5, yRatio:0.5, scrollLeft:viewport.scrollLeft, scrollTop:viewport.scrollTop, prevZoom:pinchPrevZoom});
        renderPassiveTree();
      }
      return;
    }
    if(e.touches.length === 1){
      e.preventDefault();
      viewport.scrollLeft = sl - (e.touches[0].clientX - sx);
      viewport.scrollTop = st - (e.touches[0].clientY - sy);
      renderPassiveTree();
    }
  }, {passive:false});

  viewport.addEventListener('touchend', ()=>{
    if(pinchStartDist){
      pinchPrevZoom = passiveZoom;
    }
    pinchStartDist = 0;
    pinchCenter = null;
  }, {passive:true});

  // iOS Safari pinch fallback
  let gestureBaseZoom = 1;
  viewport.addEventListener('gesturestart', (e)=>{
    if(panelOpen !== 'passive') return;
    e.preventDefault();
    gestureBaseZoom = passiveZoom;
  }, {passive:false});
  viewport.addEventListener('gesturechange', (e)=>{
    if(panelOpen !== 'passive') return;
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    passiveZoom = clampPassiveZoom(gestureBaseZoom * (e.scale || 1));
    applyPassiveZoom({
      xRatio: (e.clientX - rect.left) / Math.max(1, viewport.clientWidth),
      yRatio: (e.clientY - rect.top) / Math.max(1, viewport.clientHeight),
      scrollLeft: viewport.scrollLeft,
      scrollTop: viewport.scrollTop,
      prevZoom: gestureBaseZoom
    });
    renderPassiveTree();
  }, {passive:false});
  viewport.addEventListener('gestureend', (e)=>{
    if(panelOpen !== 'passive') return;
    e.preventDefault();
    gestureBaseZoom = passiveZoom;
  }, {passive:false});

  viewport.addEventListener('wheel', (e)=>{
    if(panelOpen !== 'passive') return;
    if(!e.ctrlKey) return;
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    const keep = {
      xRatio: (e.clientX - rect.left) / viewport.clientWidth,
      yRatio: (e.clientY - rect.top) / viewport.clientHeight,
      scrollLeft: viewport.scrollLeft,
      scrollTop: viewport.scrollTop,
      prevZoom: passiveZoom
    };
    passiveZoom = clampPassiveZoom(passiveZoom * (e.deltaY < 0 ? 1.08 : 0.92));
    applyPassiveZoom(keep);
    renderPassiveTree();
  }, {passive:false});

  viewport.addEventListener('scroll', ()=>{ if(panelOpen === 'passive') renderPassiveTree(); }, {passive:true});
}

/* =========================================================
   STEP 3) recalcFromGear()에서 mods 기반 계산 레이어 추가
   - item.data(기존)와 별개로 item.mods 를 이용해 gearDelta를 만들어 applyGearDelta에 주입
   - 나중에 affix.apply → mods 생성으로 완전 이관하기 위한 발판
   - 혹시 스탯이 이상하면 아래 플래그를 false로 바꾸면 즉시 원복됨
   ========================================================= */
const USE_GEAR_MODS_LAYER = true;

function gearTagsFromItem(it){
  const tags = [];
  if(it && it.slot) tags.push(it.slot);
  if(it && Array.isArray(it.tags)) tags.push(...it.tags);
  tags.push("gear");
  return mergeTags(tags);
}

function gearDeltaFromMods(modList, ctx){
  const out = {};
  if(!Array.isArray(modList) || modList.length === 0) return out;

  const mctx = {
    scope: (ctx && ctx.scope) ? ctx.scope : "gear",
    tags:  (ctx && ctx.tags)  ? ctx.tags  : []
  };

  for(const m of modList){
    if(!m) continue;

    // 태그/스코프 매칭 (엔진 공통 규칙)
    if(typeof modMatches === "function" && !modMatches(m, mctx)) continue;

    const k = m.stat;
    if(!k) continue;

    const op = m.op || MOD_OPS.add;
    const v  = (Number(m.value) || 0);

    if(op === MOD_OPS.add){
      out[k] = (out[k] || 0) + v;
    }else if(op === MOD_OPS.inc){
      // gear 쪽은 Inc 키를 쓰는 경우가 많아서, kInc 형태로 넣어둠
      const kk = (String(k).endsWith("Inc") ? k : (k + "Inc"));
      out[kk] = (out[kk] || 0) + v;
    }else if(op === MOD_OPS.more){
      const mul = 1 + v;
      out[k] = (out[k] || 1) * mul;
    }
  }
  return out;
}

function recalcFromGear(){
  // ✅ 전체를 다시 계산(안정화): 장비/버프 누적 → 최종 스탯 반영
  const prevMaxHp = Number((player && player.maxHp) || 0);
  const prevHp = Number((player && player.hp) || 0);

  player.gear = defaultBuffStats();

  // 1) 장비 누적
  for(const slot of EQUIP_SLOTS){
    const it = equipment[slot];
    if(!it) continue;

    // ✅ STEP3: mods 기반 레이어 (기존 data 로직은 유지한 채로 선택 사용)
    if(USE_GEAR_MODS_LAYER && Array.isArray(it.mods) && it.mods.length){
      const tags = gearTagsFromItem(it);
      const d2 = gearDeltaFromMods(it.mods, { scope:"gear", tags });
      if(d2) applyGearDelta(d2);
      continue;
    }

    // totalData 우선, 없으면 data 사용
    const d = it.totalData || it.data || null;
    if(!d) continue;

    applyGearDelta(d);
  }

  // 1.5) 패시브 누적
  const g = player.gear;
  const pb = getPassiveBonuses();
  const baseMaxHpForPassive = (player.baseMaxHp ?? 100);
  player.passiveRangeMul = 1 + (pb.rangeInc || 0);
  player.castSpeedMul = 1 + (pb.castSpdInc || 0);
  player.spellRangeMul = 1 + (pb.spellRangeInc || 0);
  player.meleePassiveDamageInc = pb.meleeDamageInc || 0;
  player.spellPassiveDamageInc = pb.spellDamageInc || 0;
  player.elementalPassiveDamageInc = pb.elementalDamageInc || 0;
  player.lifeLeech = (pb.lifeLeech || 0);

  const passiveMaxHpFlat = Math.round(baseMaxHpForPassive * (pb.maxHpInc || 0)) + (pb.maxHpAdd || 0);
  player.__passiveMaxHpFlat = passiveMaxHpFlat;

  g.maxHpAdd += passiveMaxHpFlat;
  g.armorAdd += (pb.armorAdd || 0);
  g.hpRegen += (pb.hpRegen || 0);
  g.hpOnKill += (pb.hpOnKill || 0);
  g.hpOnHit += (pb.hpOnHit || 0);
  g.lifeLeech += (pb.lifeLeech || 0);
  g.atkSpdInc += (pb.atkSpdInc || 0);
  g.rangeInc += (pb.rangeInc || 0);
  g.critChanceAdd += (pb.critChanceAdd || 0);
  g.critMultiAdd += (pb.critMultiAdd || 0);

  // 2) 최종 출력값 계산 (POE식)

  g.dmgMul    = (1 + (g.dmgInc || 0))    * (g.dmgMore    || 1);
  g.atkSpdMul = (1 + (g.atkSpdInc || 0)) * (g.atkSpdMore || 1);
  g.spdMul    = (1 + (g.spdInc || 0))    * (g.spdMore    || 1);
  g.rangeMul  = (1 + (g.rangeInc || 0))  * (g.rangeMore  || 1);

  // 3) 플레이어 기본 능력치에 반영
  const baseMaxHp = (player.baseMaxHp ?? 100);
  const baseArmor = (player.baseArmor ?? 0);

  player.maxHp = Math.max(1, Math.round(baseMaxHp + (g.maxHpAdd || 0)));
  player.armor = baseArmor + (g.armorAdd || 0);

  const hpDelta = player.maxHp - prevMaxHp;
  if(Number.isFinite(hpDelta) && hpDelta !== 0){
    // 최대 생명력이 변하면 현재 생명력도 같이 따라가게 해서 체감되도록
    player.hp = Math.max(1, prevHp + hpDelta);
  }

  const esOn = !!(player && player.passives && player.passives.keystoneES);
  player.energyShieldMode = esOn;
  player.esRechargeDelay = 120;
  player.esRechargeRate = 0.20;

  if(esOn){
    g.hpRegen = 0;
    g.hpOnKill = 0;
    g.lifeLeech = 0;
    g.hpOnHit = 0;
    player.lifeLeech = 0;
    player.hpOnKill = 0;
    player.hpOnHit = 0;
    player.hpRegen = 0;
    if(player.gear){
      player.gear.hpRegen = 0;
      player.gear.hpOnKill = 0;
      player.gear.lifeLeech = 0;
      player.gear.hpOnHit = 0;
    }
  }

  // 현재 HP가 max를 넘지 않게
  if(player.hp > player.maxHp) player.hp = player.maxHp;
  syncPlayerVitalDisplay();
}

function syncPlayerVitalDisplay(){
  if(!player) return;

  const gear = player.gear || {};
  let passiveFlat = 0;

  try{
    if(typeof getPassiveBonuses === "function"){
      const pb = getPassiveBonuses() || {};
      const baseForPassive = Number(player.baseMaxHp || 100);
      passiveFlat = Math.round(baseForPassive * Number(pb.maxHpInc || 0)) + Number(pb.maxHpAdd || 0);
    }
  }catch(_){}

  player.__passiveMaxHpFlat = passiveFlat;

  const targetMaxHp = Math.max(1, Math.round(
    Number(player.baseMaxHp || 100) +
    Number(gear.maxLife || 0) +
    Number(gear.maxHpAdd || 0) +
    passiveFlat
  ));

  if(targetMaxHp !== Number(player.maxHp || 0)){
    player.maxHp = targetMaxHp;
    player.hp = Math.max(1, Math.min(player.maxHp, Number(player.hp || 0)));
  }
}

function applyGearDelta(d){
  // ✅ 장비/버프 스탯 누적 (POE식)
  if(!d) return;
  if(!player.gear) player.gear = defaultBuffStats();

  const g = player.gear;

  // 1) 기존(Add) 고정값
  if(d.maxHpAdd) g.maxHpAdd += d.maxHpAdd;
  if(d.armorAdd) g.armorAdd += d.armorAdd;
  if(d.hpRegen)  g.hpRegen  += d.hpRegen;

  // 고정 피해는 flatDamage / flatDamageAdd 둘 다 허용
  const flatDamage = Number(d.flatDamageAdd ?? d.flatDamage ?? 0);
  if(flatDamage) g.flatDamageAdd = (g.flatDamageAdd || 0) + flatDamage;

  // 2) increased(Inc) / more(Mul) — 없으면 무시
  // 피해
  if(d.dmgInc) g.dmgInc += d.dmgInc;
  if(d.dmgMul) g.dmgMore *= d.dmgMul;
  if(d.dmgMore) g.dmgMore *= d.dmgMore;

  // 공격속도
  if(d.atkSpdInc) g.atkSpdInc += d.atkSpdInc;
  if(d.atkSpdMul) g.atkSpdMore *= d.atkSpdMul;
  if(d.atkSpdMore) g.atkSpdMore *= d.atkSpdMore;

  // 이동속도
  if(d.spdInc) g.spdInc += d.spdInc;
  if(d.spdMul) g.spdMore *= d.spdMul;
  if(d.spdMore) g.spdMore *= d.spdMore;

  // 사거리
  if(d.rangeInc) g.rangeInc += d.rangeInc;
  if(d.rangeMul) g.rangeMore *= d.rangeMul;
  if(d.rangeMore) g.rangeMore *= d.rangeMore;

  // 치명타 확률/배수
  if(d.critChanceAdd) g.critChanceAdd += d.critChanceAdd;
  if(d.critChanceInc) g.critChanceInc += d.critChanceInc;
  if(d.critChanceMul) g.critChanceMore *= d.critChanceMul;
  if(d.critChanceMore) g.critChanceMore *= d.critChanceMore;

  if(d.critMultiAdd) g.critMultiAdd += d.critMultiAdd;
  if(d.critMultiInc) g.critMultiInc += d.critMultiInc;
  if(d.critMultiMore) g.critMultiMore *= d.critMultiMore;

  // 특수 전투 옵션
  if(d.lifeLeech) g.lifeLeech = (g.lifeLeech || 0) + d.lifeLeech;
  if(d.hpOnHit) g.hpOnHit = (g.hpOnHit || 0) + d.hpOnHit;
  if(d.hpOnKill) g.hpOnKill = (g.hpOnKill || 0) + d.hpOnKill;

  if(d.bleedChance) g.bleedChance = (g.bleedChance || 0) + d.bleedChance;
  if(d.knockbackChance) g.knockbackChance = (g.knockbackChance || 0) + d.knockbackChance;
  if(d.cleaveChance) g.cleaveChance = (g.cleaveChance || 0) + d.cleaveChance;
  if(d.doubleHitChance) g.doubleHitChance = (g.doubleHitChance || 0) + d.doubleHitChance;
  if(d.executeChance) g.executeChance = (g.executeChance || 0) + d.executeChance;

  if(d.critChanceVsBoss) g.critChanceVsBoss = (g.critChanceVsBoss || 0) + d.critChanceVsBoss;
  if(d.bossDamageMul) g.bossDamageMul = (g.bossDamageMul || 1) * d.bossDamageMul;
  if(d.eliteDamageMul) g.eliteDamageMul = (g.eliteDamageMul || 1) * d.eliteDamageMul;

  // 저항
  if(d.fireResAdd) g.fireResAdd = (g.fireResAdd || 0) + d.fireResAdd;
  if(d.coldResAdd) g.coldResAdd = (g.coldResAdd || 0) + d.coldResAdd;
  if(d.lightResAdd) g.lightResAdd = (g.lightResAdd || 0) + d.lightResAdd;
  if(d.chaosResAdd) g.chaosResAdd = (g.chaosResAdd || 0) + d.chaosResAdd;
  if(d.allResAdd) g.allResAdd = (g.allResAdd || 0) + d.allResAdd;
}

function setStickByVector(vx, vy){
  const r = pad.getBoundingClientRect();
  const max = Math.min(r.width, r.height) * 0.33;
  let d = Math.hypot(vx, vy) || 1;
  if(d > max){ vx *= max/d; vy *= max/d; }

  stick.style.left = "50%";
  stick.style.top  = "50%";
  stick.style.transform = `translate(calc(-50% + ${vx}px), calc(-50% + ${vy}px))`;

  joyDX = vx / max;
  joyDY = vy / max;

  if(Math.abs(vx) > Math.abs(vy))
    player.dir = vx > 0 ? "right" : "left";
  else
    player.dir = vy > 0 ? "down" : "up";
}

function handlePadMove(clientX, clientY){
  const r = pad.getBoundingClientRect();
  const cx = r.left + r.width/2;
  const cy = r.top + r.height/2;
  const vx = clientX - cx;
  const vy = clientY - cy;
  setStickByVector(vx, vy);
}

function rollWeaponDamage(){
  const w = player.weapon;
  return w.min + Math.random() * (w.max - w.min);
}

function getCritChance(){
  // 기본치 + Add → increased → more
  const g = player.gear || {};
  const base = (player.baseCritChance ?? 0.05); // 5% 기본
  const add = (g.critChanceAdd || 0);
  const inc = (g.critChanceInc || 0);
  const more = (g.critChanceMore || 1);
  return Math.max(0, (base + add) * (1 + inc) * more);
}
function getCritMulti(){
  // 기본치 + Add → increased → more
  const g = player.gear || {};
  const base = (player.baseCritMulti ?? 1.50); // x1.50 기본
  const add = (g.critMultiAdd || 0);
  const inc = (g.critMultiInc || 0);
  const more = (g.critMultiMore || 1);
  return Math.max(1, (base + add) * (1 + inc) * more);
}
function applyCrit(dmg){
  const chance = getCritChance();
  const multi = getCritMulti();
  const isCrit = (Math.random() < chance);
  return { dmg: isCrit ? dmg * multi : dmg, isCrit, chance, multi };
}

function defaultBuffStats(){
  // ✅ POE식(기본 + 증가(increased) + 추가배율(more))를 내부에서 지원
  // - Add : 고정 수치(+)   예) maxHpAdd, armorAdd, hpRegen
  // - Inc : 증가(%)        예) dmgInc = 0.15  (15% increased)
  // - Mul : 추가 배율(x)   예) dmgMul = 1.20  (20% more)
  return {
    maxHpAdd: 0,
    armorAdd: 0,
    hpRegen: 0,

    // 피해/속도/이동/사거리 (POE식)
    dmgInc: 0,     dmgMore: 1,
    atkSpdInc: 0,  atkSpdMore: 1,
    spdInc: 0,     spdMore: 1,
    rangeInc: 0,   rangeMore: 1,

    // 치명타 (POE식)
    critChanceAdd: 0,
    critChanceInc: 0,
    critChanceMore: 1,

    critMultiAdd: 0,
    critMultiInc: 0,
    critMultiMore: 1,

    // 🔻 최종 출력(아래 recalcFromGear에서 채움)
    dmgMul: 1,
    atkSpdMul: 1,
    spdMul: 1,
    rangeMul: 1,
  };
}

function applyBuff(target, type, value, duration, source="", mode="mul"){
  if(!target.activeBuffs) target.activeBuffs = [];
  const key = type + "|" + source + "|" + mode;
  const b = target.activeBuffs.find(x => x.key === key);

  if(b){
    b.value = value;
    b.duration = Math.max(b.duration, duration);
  }else{
    target.activeBuffs.push({ key, type, value, duration, mode });
  }
}

function mapBuffTypeToStat(type){
  if(type === "damage")   return "dmgMul";
  if(type === "speed")    return "spdMul";
  if(type === "atkSpeed") return "atkSpdMul";
  if(type === "range")        return "rangeMul";
  if(type === "meleeRange")   return "meleeRangeMul";
  if(type === "aoe")          return "aoeMul";
  if(type === "ultiAoe")      return "ultiAoeMul";
  if(type === "armor")        return "armorAdd";
  if(type === "armorMul")     return "armorMul";
  if(type === "maxHpMul")     return "maxHpMul";
  if(type === "maxHp")        return "maxHpAdd";
  if(type === "hpRegen")      return "hpRegen";
  return null;
}
function getEquippedWeaponAttackSpeed(){
  try{
    const eq = (typeof equipment !== "undefined" && equipment) ? equipment : null;
    const w = eq && eq.weapon ? eq.weapon : null;

    // 1) 장착 아이템 인스턴스에 직접 attackSpeed가 있으면 우선
    if(w && typeof w.attackSpeed === "number" && isFinite(w.attackSpeed)){
      return Math.max(0.2, w.attackSpeed);
    }

    // 2) 템플릿(베이스)에 attackSpeed가 있으면 사용
    if(w && typeof getItemTemplateById === "function"){
      const tmpl = getItemTemplateById(w.baseId || w.id);
      if(tmpl && typeof tmpl.attackSpeed === "number" && isFinite(tmpl.attackSpeed)){
        return Math.max(0.2, tmpl.attackSpeed);
      }
    }

    // 3) fallback: 시작 무기(player.weapon)
    if(player && player.weapon && typeof player.weapon.attackSpeed === "number" && isFinite(player.weapon.attackSpeed)){
      return Math.max(0.2, player.weapon.attackSpeed);
    }
  }catch(err){
    console.warn("getEquippedWeaponAttackSpeed failed", err);
  }

  return 1;
}
function updateBuffs(target){
  if(!target.activeBuffs) target.activeBuffs = [];
  target.buffs = defaultBuffStats();

 if(target === player){
  target.buffs.dmgMul   *= (player.gear.dmgMul ?? 1);
  target.buffs.rangeMul *= (player.gear.rangeMul ?? 1);
  target.buffs.spdMul    *= (player.gear.spdMul ?? 1);
  target.buffs.atkSpdMul *= (player.gear.atkSpdMul ?? 1);

  // ✅ 무기 기본 공격속도 반영
  target.buffs.atkSpdMul *= getEquippedWeaponAttackSpeed();

  target.buffs.armorAdd += (player.gear.armorAdd ?? 0);
  target.buffs.maxHpAdd += (player.gear.maxHpAdd ?? 0);
  target.buffs.hpRegen  += (player.gear.hpRegen ?? 0);
}

  for(let i = target.activeBuffs.length - 1; i >= 0; i--){
    const b = target.activeBuffs[i];
    b.duration--;
    if(b.duration <= 0){
      target.activeBuffs.splice(i,1);
      continue;
    }
    const stat = mapBuffTypeToStat(b.type);
    if(!stat) continue;

    if(b.mode === "mul"){
      if(target.buffs[stat] !== undefined) target.buffs[stat] *= b.value;
    }else if(b.mode === "add"){
      if(target.buffs[stat] !== undefined) target.buffs[stat] += b.value;
    }
  }

  if(target === player){
    const b = target.buffs;
    const newMax = Math.max(1, Math.floor(target.baseMaxHp * (b.maxHpMul ?? 1) + (b.maxHpAdd ?? 0)));
    target.maxHp = newMax;
    if(target.hp > target.maxHp) target.hp = target.maxHp;
    target.armor = Math.max(0, (target.baseArmor + (b.armorAdd ?? 0)) * (b.armorMul ?? 1));
  }
}

function pruneDeadEnemies(){
  enemies = enemies.filter(e => e && e.hp > 0);
  for(const p of packs){
    p.enemies = p.enemies.filter(e => e && e.hp > 0);
  }
}

function getRandomVisibleAliveEnemy(){
  const visible = enemies.filter(e =>
    e.hp > 0 &&
    
    isEnemyOnScreen(e)
  );
  if(visible.length === 0) return null;
  return visible[(Math.random() * visible.length) | 0];
}

function getRandomAliveEnemy(){
  const alive = enemies.filter(e => e.hp > 0);
  if(alive.length === 0) return null;
  return alive[(Math.random() * alive.length) | 0];
}

function getLevelPenalty(playerLv, monsterLv){
  const diff = monsterLv - playerLv;
  if(diff >= 0) return 1 + diff * 0.04;
  if(diff <= -6) return 0.1;
  return 1 + diff * 0.12;
}

/* ===== POE 맵핑: 티어 스케일/맵 생성 ===== */
function tierScale(t){
  const hpMul  = 1 + (t-1) * 0.22;
  const dmgMul = 1 + (t-1) * 0.16;
  const spdMul = 1 + Math.min(0.25, (t-1) * 0.02);
  const eliteChance = clamp(0.06 + (t-1) * 0.008, 0.06, 0.22);
  const eliteHpMul = 2.4;
  const eliteDmgMul = 1.9;
  return { hpMul, dmgMul, spdMul, eliteChance, eliteHpMul, eliteDmgMul };
}

function giveXP(enemy){
  let base = 0;
  if(enemy.type === "mage") base = 14;
  else if(enemy.type === "archer") base = 12;
  else if(enemy.type === "orc") base = 16;
  else if(enemy.type === "demon") base = 28;
  else if(enemy.type === "melee") base = 10;
  else if(enemy.type === "boss") base = 200 * mapTier;

  if(enemy.isElite) base *= 3;
  if(enemy.isLeader) base *= 4;

  const levelMul = getLevelPenalty(level, mapTier);
  const mapMul = 1 + (mapTier - 1) * 0.08;

  const finalXP = Math.floor(base * levelMul * mapMul);
  xp += finalXP;
  checkLevelUp();
}

function makeEnemyStatsByTier(type, t){
  const s = tierScale(t);

  let baseHp, baseDmg, baseSpd;

  if(type === "mage"){
    baseHp  = 42;
    baseDmg = 9;
    baseSpd = 0.48;

  }else if(type === "archer"){
    baseHp  = 30;
    baseDmg = 14;
    baseSpd = 0.55;

  }else if(type === "skeleton"){
    baseHp  = 26;
    baseDmg = 13;
    baseSpd = 0.58;

  }else if(type === "zombie") {
    baseHp  = 68;
    baseDmg = 12;
    baseSpd = 0.62;

  }else if(type === "orc") {
    baseHp  = 88;
    baseDmg = 16;
    baseSpd = 0.74;

  }else if(type === "demon") {
    baseHp  = 120;
    baseDmg = 22;
    baseSpd = 0.78;

  }else{
    // melee
    baseHp  = 55;
    baseDmg = 11;
    baseSpd = 0.85;
  }

  return {
    hp:  baseHp  * s.hpMul,
    dmg: baseDmg * s.dmgMul,
    spd: baseSpd * s.spdMul,
    eliteChance: s.eliteChance,
    eliteHpMul: s.eliteHpMul,
    eliteDmgMul: s.eliteDmgMul
  };
}

function makeBossStatsByTier(t){
  const baseHp  = 900;
  const baseDmg = 26;
  const baseSpd = 0.62;

  const bossHp  = baseHp  * (1 + (t-1)*0.28);
  const bossDmg = baseDmg * (1 + (t-1)*0.18);
  const bossSpd = baseSpd * (1 + Math.min(0.18, (t-1)*0.015));

  return { bossHp, bossDmg, bossSpd };
}

function dist2(ax, ay, bx, by){
  const dx = ax - bx;
  const dy = ay - by;
  return dx*dx + dy*dy;
}

function srand(seed){
  let s = seed >>> 0;
  return function(){
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 4294967296;
  };
}

function clearSpawnArea(cx, cy, radiusTiles=3){
  const tx = Math.floor(cx / tileSize);
  const ty = Math.floor(cy / tileSize);
  for(let y=ty-radiusTiles; y<=ty+radiusTiles; y++){
    for(let x=tx-radiusTiles; x<=tx+radiusTiles; x++){
      if(x<=0||y<=0||x>=mapSize-1||y>=mapSize-1) continue;
      map[y][x] = 0;
    }
  }
}

function carveBossRoomAndCorridor(){
  const w = 7 + Math.floor(Math.random()*5);
  const h = 7 + Math.floor(Math.random()*5);
  const margin = 2;

  const corner = (Math.random()*4)|0;
  let x0, y0;

  if(corner===0){ x0 = mapSize - margin - w; y0 = margin; }
  if(corner===1){ x0 = margin; y0 = margin; }
  if(corner===2){ x0 = margin; y0 = mapSize - margin - h; }
  if(corner===3){ x0 = mapSize - margin - w; y0 = mapSize - margin - h; }

  for(let y=y0; y<y0+h; y++){
    for(let x=x0; x<x0+w; x++){
      map[y][x] = 0;
    }
  }

  const cx = Math.floor(mapSize/2), cy = Math.floor(mapSize/2);
  const roomCx = x0 + (w>>1), roomCy = y0 + (h>>1);

  let doorX = roomCx;
  let doorY = roomCy;

  if(Math.abs(roomCx - cx) > Math.abs(roomCy - cy)){
    if(roomCx > cx){ doorX = x0;       doorY = roomCy; }
    else           { doorX = x0+w-1;   doorY = roomCy; }
  }else{
    if(roomCy > cy){ doorY = y0;       doorX = roomCx; }
    else           { doorY = y0+h-1;   doorX = roomCx; }
  }

  map[doorY][doorX] = 0;

  const startX = Math.floor(player.x / tileSize);
  const startY = Math.floor(player.y / tileSize);

  let x = startX, y = startY;
  const stepX = doorX > x ? 1 : -1;
  while(x !== doorX){
    map[y][x] = 0;
    map[y-1] && (map[y-1][x] = 0);
    map[y+1] && (map[y+1][x] = 0);
    x += stepX;
  }
  const stepY = doorY > y ? 1 : -1;
  while(y !== doorY){
    map[y][x] = 0;
    map[y][x-1] !== undefined && (map[y][x-1] = 0);
    map[y][x+1] !== undefined && (map[y][x+1] = 0);
    y += stepY;
  }
  map[doorY][doorX] = 0;

  bossRoom = { x:x0, y:y0, w, h, cx:roomCx, cy:roomCy, doorX, doorY };
}

function buildEmptyMap(){
  map = [];
  for(let y=0; y<mapSize; y++){
    let row = [];
    for(let x=0; x<mapSize; x++){
      if(x===0 || y===0 || x===mapSize-1 || y===mapSize-1) row.push(1);
      else row.push(0);
    }
    map.push(row);
  }
}

function placeRandomWalls(rng, wallCount){
  for(let i=0;i<wallCount;i++){
    const w = 2 + Math.floor(rng()*5);
    const h = 2 + Math.floor(rng()*5);
    const x0 = 1 + Math.floor(rng()*(mapSize-2-w));
    const y0 = 1 + Math.floor(rng()*(mapSize-2-h));

    const cx = Math.floor(mapSize/2);
    const cy = Math.floor(mapSize/2);
    if(Math.abs((x0 + (w>>1)) - cx) < 4 && Math.abs((y0 + (h>>1)) - cy) < 4){
      continue;
    }

    for(let y=y0; y<y0+h; y++){
      for(let x=x0; x<x0+w; x++){
        if(x<=0||y<=0||x>=mapSize-1||y>=mapSize-1) continue;
        map[y][x] = 1;
      }
    }

// ✅ Pillars (tile=2) on some wall corners for POE vibe
const corners = [
  [x0, y0],
  [x0+w-1, y0],
  [x0, y0+h-1],
  [x0+w-1, y0+h-1],
];
for(const [px,py] of corners){
  if(px<=0||py<=0||px>=mapSize-1||py>=mapSize-1) continue;
  if(rng() < 0.35) map[py][px] = 2;
}
  }
}

function buildReachableMaskFromPlayer(){
  const startX = Math.floor(player.x / tileSize);
  const startY = Math.floor(player.y / tileSize);

  const vis = Array.from({length: mapSize}, ()=>Array(mapSize).fill(false));
  if(!map[startY] || map[startY][startX] !== 0) return vis;

  const q = [[startX, startY]];
  vis[startY][startX] = true;

  while(q.length){
    const [x,y] = q.pop();
    const nb = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
    for(const [nx,ny] of nb){
      if(nx<=0||ny<=0||nx>=mapSize-1||ny>=mapSize-1) continue;
      if(vis[ny][nx]) continue;
      if(map[ny][nx] !== 0) continue;
      vis[ny][nx] = true;
      q.push([nx,ny]);
    }
  }
  return vis;
}

function floodFillReachableFromPlayer(){
  const startX = Math.floor(player.x / tileSize);
  const startY = Math.floor(player.y / tileSize);
  if(!map[startY] || map[startY][startX] !== 0) return 0;

  const vis = Array.from({length: mapSize}, ()=>Array(mapSize).fill(false));
  const q = [[startX,startY]];
  vis[startY][startX] = true;
  let count = 0;

  while(q.length){
    const [x,y] = q.pop();
    count++;
    const nb = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
    for(const [nx,ny] of nb){
      if(nx<=0||ny<=0||nx>=mapSize-1||ny>=mapSize-1) continue;
      if(vis[ny][nx]) continue;
      if(map[ny][nx] !== 0) continue;
      vis[ny][nx] = true;
      q.push([nx,ny]);
    }
  }
  return count;
}

function generateRandomMapForTier(tier){
  const seed = (Date.now() ^ (tier*987654321)) >>> 0;
  const rng = srand(seed);

  for(let attempt=0; attempt<8; attempt++){
    buildEmptyMap();

    const wallCount = 22 + Math.floor(tier*2.2) + Math.floor(rng()*10);
    placeRandomWalls(rng, wallCount);

    clearSpawnArea(player.x, player.y, 3);

    const reachable = floodFillReachableFromPlayer();
    const totalFloor = (mapSize-2)*(mapSize-2);
    if(reachable / totalFloor >= 0.55){
      return seed;
    }
  }
  buildEmptyMap();
  clearSpawnArea(player.x, player.y, 4);
  return seed;
}

  packs = [];
  particles = [];
  bloodPools = [];
  bloodParticles = [];
  arrows = [];

}

function spawnMapPacks(tier){
  const rng = srand(mapRun.seed ^ 0xA53C9E1B);

  const packCount = mapRun.packsToClear + 4 + Math.floor(tier*0.6);
  for(let i=0;i<packCount;i++){
    let placed = false;

    for(let tries=0; tries<120; tries++){
      const tx = 1 + Math.floor(rng()*(mapSize-2));
      const ty = 1 + Math.floor(rng()*(mapSize-2));
      if(map[ty][tx] !== 0) continue;
      if(reachableMask && !reachableMask[ty][tx]) continue;

      const px = tx*tileSize + tileSize/2;
      const py = ty*tileSize + tileSize/2;

      const dx = px - player.x, dy = py - player.y;
      if(dx*dx + dy*dy < 260*260) continue;

      let min = 6;
      let max = 10;
      if(tier >= 6){
        min = 15 + Math.floor((tier-5) * 0.4);
        max = 20 + Math.floor((tier-5) * 0.6);
      }
      if(tier >= 12){
        min = 25 + Math.floor((tier-10) * 0.5);
        max = 32 + Math.floor((tier-10) * 0.7);
      }
      max = Math.min(max, 45);

      const count = min + Math.floor(rng() * (max - min + 1));
      createPack(px, py, count);

      placed = true;
      break;
    }
    if(!placed){
      // skip
    }
  }

  for(const p of packs){
    p.cleared = false;
  }
  linkNearbyPacks();
}

function linkNearbyPacks(){
  const linkDist = 360;
  const link2 = linkDist * linkDist;

  const n = packs.length;
  const parent = Array.from({length:n}, (_,i)=>i);
  const find = (a)=>{ while(parent[a]!==a){ parent[a]=parent[parent[a]]; a=parent[a]; } return a; };
  const union = (a,b)=>{ a=find(a); b=find(b); if(a!==b) parent[b]=a; };

  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      const dx = packs[i].x - packs[j].x;
      const dy = packs[i].y - packs[j].y;
      if(dx*dx + dy*dy <= link2) union(i,j);
    }
  }

  const rootToG = new Map();
  let gid = 0;

  for(let i=0;i<n;i++){
    const r = find(i);
    if(!rootToG.has(r)) rootToG.set(r, gid++);
    packs[i].groupId = rootToG.get(r);
    packs[i].groupCleared = false;
  }
}

function activatePackGroup(groupId){
  for(const p of packs){
    if(p.groupId === groupId){
      p.activated = true;
      if(p.enemies.length === 0 && !p.cleared){
        p.cleared = true;
      }
    }
  }
}

function spawnPortal(x, y){
  portal.active = true;
  portal.x = x;
  portal.y = y;
  portal.hold = 0;

  for(let i=0;i<90;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 1 + Math.random()*5;
    particles.push({
      x: x + (Math.random()-0.5)*10,
      y: y + (Math.random()-0.5)*10,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp,
      life: 30 + Math.floor(Math.random()*25)
    });

function updatePortal(){
  if(!portal.active) return;

  const dx = player.x - portal.x;
  const dy = player.y - portal.y;
  const rr = (portal.r + player.radius + 8);
  if(dx*dx + dy*dy < rr*rr){
    portal.hold++;
    if(portal.hold >= portal.holdNeed){
      startNewMap(mapTier + 1);
      return;
    }
  }else{
    portal.hold = 0;
  }
}

function drawPortal(){
  if(!portal.active) return;

  const pulse = 0.6 + 0.4*Math.sin(frameCount*0.15);
  const r = portal.r + pulse*6;

  ctx.save();
  ctx.globalAlpha = 0.9;

  ctx.strokeStyle = "rgba(120,180,255,0.85)";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(portal.x, portal.y, r, 0, Math.PI*2);
  ctx.stroke();

  ctx.fillStyle = "rgba(80,140,255,0.18)";
  ctx.beginPath();
  ctx.arc(portal.x, portal.y, r-6, 0, Math.PI*2);
  ctx.fill();

  if(portal.hold > 0){
    const t = clamp(portal.hold / portal.holdNeed, 0, 1);
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(portal.x, portal.y, r+8, -Math.PI/2, -Math.PI/2 + Math.PI*2*t);
    ctx.stroke();
  }

  ctx.restore();
}

function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

function canMoveTo(x,y){
  let left = Math.floor((x - player.radius) / tileSize);
  let right = Math.floor((x + player.radius) / tileSize);
  let top = Math.floor((y - player.radius) / tileSize);
  let bottom = Math.floor((y + player.radius) / tileSize);

  return (
    map[top] && map[top][left] === 0 &&
    map[top] && map[top][right] === 0 &&
    map[bottom] && map[bottom][left] === 0 &&
    map[bottom] && map[bottom][right] === 0
  );
}
function getEnemyCollisionRadius(enemy){
  const base = Math.max(6, Number(enemy && enemy.radius) || 14);
  const type = String(enemy && enemy.type || "");
  let extra = 3;
  if(type === "orc") extra = 8;
  else if(type === "demon") extra = 9;
  else if(type === "boss") extra = 12;
  else if(type === "mage" || type === "archer") extra = 5;
  else if(type === "skeleton") extra = 4;
  else if(type === "zombie" || type === "melee") extra = 5;
  return base + extra;
}
function canEnemyMoveTo(enemy, x, y){
  const cr = getEnemyCollisionRadius(enemy);
  let left = Math.floor((x - cr) / tileSize);
  let right = Math.floor((x + cr) / tileSize);
  let top = Math.floor((y - cr) / tileSize);
  let bottom = Math.floor((y + cr) / tileSize);

  return (
    map[top] && map[top][left] === 0 &&
    map[top] && map[top][right] === 0 &&
    map[bottom] && map[bottom][left] === 0 &&
    map[bottom] && map[bottom][right] === 0
  );
}
function isFloorTile(tx, ty){ return !!(map[ty] && map[ty][tx] === 0); }
function canSpawnEnemyAt(enemy, x, y){ return canEnemyMoveTo(enemy, x, y); }
function moveEnemyWithCollision(enemy, dx, dy, steps = 6){
  if(!enemy) return;
  steps = Math.max(1, steps|0);
  const sx = dx / steps;
  const sy = dy / steps;

  for(let i = 0; i < steps; i++){
    const nx = enemy.x + sx;
    const ny = enemy.y + sy;

    if(canEnemyMoveTo(enemy, nx, enemy.y)) enemy.x = nx;
    if(canEnemyMoveTo(enemy, enemy.x, ny)) enemy.y = ny;
  }
}

function resolvePlayerEnemyOverlap(){
  const pad = 2;
  for(const e of enemies){
    
    if(e.hp <= 0) continue;
    if(e.pack && !e.pack.activated) continue;

    let dx = e.x - player.x;
    let dy = e.y - player.y;
    let dist = Math.hypot(dx, dy);

    const minDist = player.radius + e.radius + pad;

    if(dist === 0){
      dx = (Math.random() - 0.5) * 0.01;
      dy = (Math.random() - 0.5) * 0.01;
      dist = Math.hypot(dx, dy);
    }

    if(dist < minDist){
      const nx = dx / dist;
      const ny = dy / dist;
      const push = (minDist - dist);

      const ex = e.x + nx * push;
      const ey = e.y + ny * push;

      if(canEnemyMoveTo(e, ex, ey)){
        e.x = ex; e.y = ey;
      }else{
        const px = player.x - nx * push;
        const py = player.y - ny * push;
        if(canMoveTo(px, player.y)) player.x = px;
        if(canMoveTo(player.x, py)) player.y = py;
      }
    }
  }
}

function markEnergyShieldHit(){
  if(player && player.energyShieldMode){
    player.lastHitFrame = (typeof frameCount === "number") ? frameCount : 0;
    player.esCooldown = Math.max(1, Number(player.esRechargeDelay || 120));
  }
}

function damagePlayer(dmg, knockX, knockY, src){
  if(player.invul > 0 || gameOver) return;
  markEnergyShieldHit();
  if(player && player.energyShieldMode){
    player.esCooldown = Math.max(1, Number(player.esRechargeDelay || 120));
  }

  // ✅ STEP5: 플레이어가 받는 피해도 태그 기반으로 조절 가능
  let incoming = dmg;
  if(USE_TAG_CONTEXTS){
    const srcTags = src ? (src.tags ? src.tags : tagsFromEnemy(src)) : [];
    const ctxIn = { scope:'player', tags: mergeTags(['incoming'], getPlayerTags(), getMapTags(), srcTags) };
    incoming = applyPlayerTakenDamageMods(incoming, ctxIn);
  }

  const armor = (player.armor ?? 0);
  const reduced = incoming * (50 / (50 + Math.max(0, armor)));
  const finalDmg = Math.max(1, Math.floor(reduced));

  player.hp -= finalDmg;
  if(player.energyShieldMode){
    player.esCooldown = Math.max(1, Number(player.esRechargeDelay || 120));
  }
  emitEvent("takeDamage", { dmg: finalDmg });
  player.invul = 25;
  shake = Math.max(shake, 10);

  let nx = player.x + knockX;
  let ny = player.y + knockY;

  if(canMoveTo(nx, player.y)) player.x = nx;
  if(canMoveTo(player.x, ny)) player.y = ny;

  if(player.hp <= 0) handleGameOver();
}

function enemyTryMeleeAttack(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);
  const reach = e.type === "boss" ? 70 : 42;

  if(dist > reach){
    e.attackFrame = 0;
    return;
  }

  if(e.attackFrame === 0){
    e.swingDir = dx < 0 ? -1 : 1;
  }

  const atkMul = (e.buffs?.atkSpdMul ?? 1);
  e.attackFrame += atkMul;

  if(e.attackFrame >= 12 && !e.hitDone){
    e.hitDone = true;
    const len = dist || 1;
    const nx = dx / len;
    const ny = dy / len;
    const kb = e.type === "boss" ? 30 : 18;
    damagePlayer(e.damage, nx*kb, ny*kb, e);
    hitSound();
  }

  if(e.attackFrame >= 25){
    e.attackFrame = 0;
    e.hitDone = false;
  }
}

    speed: st.spd,
    damage: st.dmg,
    shootCooldown: 0,
    castCooldown: 120,
    pack
  };

    enemy.damage *= st.eliteDmgMul;

    enemy.hp *= st.eliteHpMul;

    // ✅ STEP5: 적 태그 부여(엘리트 여부 포함)

enemies.push(enemy);

    maxHp: bst.bossHp,
    hp: bst.bossHp,
    speed: bst.bossSpd,
    damage: bst.bossDmg,
    stun: 0,
    attackFrame: 0,
    swordPulled: false,
    phase2Used: false,
    dashCooldown: 120,
    cleaveCooldown: 160,

  });
}

function createPack(cx, cy, count){
  let pack = {
    x: cx, y: cy,
    enemies: [],
    activated: false,
    cleared: false,
    groupId: -1,
    groupCleared: false
  };

  spawnPackLeaderAt(cx, cy, pack);

  const normalCount = Math.max(0, count - 1);
  let tries = 0;

  while(pack.enemies.length < (normalCount + 1) && tries < count * 8){
    tries++;
    let angle = Math.random()*Math.PI*2;
    let radius = Math.random()*140;
    let ex = cx + Math.cos(angle)*radius;
    let ey = cy + Math.sin(angle)*radius;
    spawnEnemyAt(ex, ey, pack);
  }

  packs.push(pack);
}

function teleportTo(target){
  spawnHitBlood(player.x, player.y, 18);
  if(particles.length < 220){
    for(let i=0;i<10;i++){
      particles.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 22 });
    }
  }

  if(canMoveTo(target.x, target.y)){
    player.x = target.x;
    player.y = target.y;
  }

  spawnHitBlood(player.x, player.y, 22);
  if(particles.length < 220){
    for(let i=0;i<12;i++){
      particles.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 26 });
    }
  }

  shake = Math.max(shake, 10);
}

/* ===== 보스 스킬 ===== */
function bossEnterPhase2(boss){
  boss.swordPulled = true;
  boss.phase2Used = true;
  boss.speed *= 1.25;
  boss.damage *= 1.2;

  boss.invul = 120;
  boss.phaseLock = 36;

  shake = 30;
  bossUnsheatheSound();

  for(let i=0;i<80;i++){
    particles.push({ x: boss.x, y: boss.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 50 });
  }
}

function bossDash(boss){
  const dx = player.x - boss.x;
  const dy = player.y - boss.y;
  const dist = Math.hypot(dx, dy) || 1;
  const nx = dx / dist;
  const ny = dy / dist;

  const dashDist = 220;
  const steps = 18;
  let hit = false;

  for(let i=0;i<steps;i++){
    let px = boss.x + nx * (dashDist/steps);
    let py = boss.y + ny * (dashDist/steps);

    if(canEnemyMoveTo(boss, px, py)){
      boss.x = px; boss.y = py;
    }else break;

    if(!hit){
      const d = Math.hypot(player.x - boss.x, player.y - boss.y);
      if(d < boss.radius + player.radius + 10){
        damagePlayer(boss.damage*1.2, nx*34, ny*34, boss);
        hit = true;
      }
    }
  }
  shake = Math.max(shake, 16);
}

function bossCleave(boss){
  const radius = 140;

  for(let i=0;i<70;i++){
    const a = Math.random()*Math.PI*2;
    const r = Math.random()*radius;
    particles.push({
      x: boss.x + Math.cos(a)*r,
      y: boss.y + Math.sin(a)*r,
      vx: Math.cos(a)*2 + (Math.random()-0.5)*2,
      vy: Math.sin(a)*2 + (Math.random()-0.5)*2,
      life: 35
    });
  }

  const dist = Math.hypot(player.x - boss.x, player.y - boss.y);
  if(dist < radius){
    const dx = player.x - boss.x;
    const dy = player.y - boss.y;
    const len = Math.hypot(dx, dy) || 1;
    damagePlayer(boss.damage*1.6, (dx/len)*42, (dy/len)*42, boss);
  }
  shake = Math.max(shake, 22);
}

function isEnemyOnScreen(e){
  const camX = player.x - canvas.width/2;
  const camY = player.y - canvas.height/2;

  const screenLeft   = camX - 50;
  const screenRight  = camX + canvas.width + 50;
  const screenTop    = camY - 50;
  const screenBottom = camY + canvas.height + 50;

  return (
    e.x > screenLeft &&
    e.x < screenRight &&
    e.y > screenTop &&
    e.y < screenBottom
  );
}

/* ===== GAME LOOP: UPDATE ===== */

function update(){
  frameCount++;

  if(player && player.energyShieldMode && player.gear){
    player.gear.hpRegen = 0;
    player.gear.hpOnHit = 0;
    player.gear.hpOnKill = 0;
    player.gear.lifeLeech = 0;
  }

  if(lootOverlayOpen) return;
  if(gameOver) return;

  if(slowMotion > 0){
    slowMotion--;
    updateEnemySystem();
    resolvePlayerEnemyOverlap();
    updateEffectSystem();
    __enemyFxTickAll();
    return;
  }

  updateBuffs(player);
  updatePlayerState();
  syncPlayerVitalDisplay();
  updateUltimateSystem();
  updateEnemySystem();
  resolvePlayerEnemyOverlap();
  updateCombatSystem();
  updateProjectileSystem();
  updateEffectSystem();
  updateEnvironmentSystem();
  __enemyFxTickAll();

  updatePortal();
}

function updatePlayerState(){
  if(player.hp <= 0){ handleGameOver(); return; }
  updateMovement();
  updateInvulnerability();
  updateLevelGlow();

  if(player.energyShieldMode){
    if(player.gear){
      player.gear.hpRegen = 0;
      player.gear.hpOnHit = 0;
      player.gear.hpOnKill = 0;
      player.gear.lifeLeech = 0;
    }
    player.hpRegen = 0;
    player.hpOnHit = 0;
    player.hpOnKill = 0;
    player.lifeLeech = 0;

    const nowFrame = (typeof frameCount === "number") ? frameCount : 0;
    const delay = Math.max(1, Number(player.esRechargeDelay || 120));
    const framesSinceHit = nowFrame - Number(player.lastHitFrame || 0);

    player.esCooldown = Math.max(0, delay - framesSinceHit);

    if(player.esCooldown <= 0){
      const esRegen = Math.max(0, (player.maxHp || 0) * (player.esRechargeRate || 0.20) / 60);
      if(esRegen > 0) player.hp = Math.min(player.maxHp, player.hp + esRegen);
    }
    return;
  }

  const regen = Number((player && player.gear && player.gear.hpRegen) || 0) / 60;
  if(regen > 0) player.hp = Math.min(player.maxHp, player.hp + regen);
}
function handleGameOver(){
  document.body.classList.add('gameover');

  gameOver = true;

  // Hide big bottom HUD (joystick/attack/etc)
  const ui = document.getElementById("ui");
  if(ui) ui.style.display = "none";

  // Hide HUD buttons (bag / loot 포함) so they don't float on GAME OVER screen
  ["miniBagBtn","lootBtn","hudBtns","btnBag","btnEquip"].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.style.display = "none";
  });
}
function updateLevelGlow(){
  if(player.levelGlow > 0) player.levelGlow--;
}

function updateUltimateSystem(){
  if(!player.ultiActive) return;

  player.ultiTimer++;
  if(player.ultiTimer % 10 === 0) performUltimateStrike();
  if(player.ultiCount >= 5) endUltimate();
}
function endUltimate(){
  player.ultiActive = false;
  player.ultiTimer = 0;
  player.ultiCount = 0;
  explosionActive = false;
}
function performUltimateStrike(){
  const target = getRandomVisibleAliveEnemy();
  if(!target) { endUltimate(); return; }

  teleportTo(target);
  dealUltimateDamage();

  pruneDeadEnemies();
  player.ultiCount++;
}

function dealUltimateDamage(){
  const radius = getUltiAoeRadius();
  const r2 = radius * radius;
  let killedAny = false;

  for(let i=0; i<enemies.length; i++){
    const e = enemies[i];
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    if(dx*dx + dy*dy > r2) continue;

    

    const wasAlive = (e.hp > 0);
    if(!wasAlive) continue;

    const weaponBase = rollWeaponDamage();
const base =
  weaponBase * 2.8 *
  (player.buffs?.dmgMul ?? 1);

// ✅ POE식 버켓: outgoing(add/inc/more) → crit → enemy_taken
const ctxUlti = buildCombatCtx("ultimate", e);
const ultiRes = computeFinalDamage(base, ctxUlti, { canCrit:true });
const dealt = ultiRes.dealt;
const crit = ultiRes.crit;

    if(e.type === "boss"){
      if(e.invul <= 0){
        e.hp -= dealt;
        e.stun = 25;
        __enemyHitFlashStart(e, 1.2);
        spawnHitBlood(e.x, e.y, crit.isCrit ? 26 : 14);
        shake = Math.max(shake, 20);
        if(e.hp <= 0){
        }
      }
      continue;
    }

    e.hp -= dealt;
    e.stun = 30;
    __enemyHitFlashStart(e, 1.25);

    spawnHitBlood(e.x, e.y, crit.isCrit ? 22 : 12);

    if(particles.length < 240){
      for(let k=0;k<10;k++){
        particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*9, vy: (Math.random()-0.5)*9, life: 34 });
      }
    }

    if(e.hp <= 0){

      player.hp = Math.min(player.maxHp, player.hp + 1);
      slowMotion = 6;
      if(player.kiOrbs < player.maxOrbs) player.kiOrbs++;
      killedAny = true;
    }
  }

  if(killedAny) hitSound();
  shake = Math.max(shake, 30);
  pruneDeadEnemies();
}

function updateEnemySystem(){
  packs.forEach(pack=>{
    if(pack.activated) return;
    const dx = pack.x - player.x;
    const dy = pack.y - player.y;
    if(dx*dx + dy*dy < 520*520){
      activatePackGroup(pack.groupId);
      shake = Math.max(shake, 8);
      slowMotion = Math.max(slowMotion, 1);
    }
  });

  enemies.forEach(e=>{
    if(e.pack && !e.pack.activated) return;
    updateSingleEnemy(e);
  });
  for(const e of enemies){
    updateBuffs(e);
  }
  pruneDeadEnemies();
}

function updateLevelParticles(){
  for(let i = levelParticles.length - 1; i >= 0; i--){
    const p = levelParticles[i];
    p.ox += p.vx;
    p.oy -= p.vy;
    p.vy *= 0.97;
    p.life--;
    if(p.life <= 0) levelParticles.splice(i,1);
  }
  if(levelParticles.length > 200){
    levelParticles.splice(0, levelParticles.length - 200);
  }
}

function updateParticles(){
  for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if(p.life <= 0) particles.splice(i,1);
  }
  if(particles.length > 260){
    particles.splice(0, particles.length - 260);
  }
}

function updateMelee(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);

  if(dist > 0){
    let moveX = dx / dist * e.speed;
    let moveY = dy / dist * e.speed;
    moveEnemyWithCollision(e, moveX, moveY, 6);
  }

  enemyTryMeleeAttack(e);
}

function updateArcher(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);

  const desired = 240;
  if(dist < desired - 40){
    const len = dist || 1;
    const nx = dx / len;
    const ny = dy / len;
    moveEnemyWithCollision(e, -nx * e.speed * 1.2, -ny * e.speed * 1.2, 6);
  }else if(dist > desired + 80){
    updateMelee(e);
  }

  e.shootCooldown--;
  if(e.shootCooldown <= 0 && dist < 520){
    spawnArrow(e.x, e.y, player.x, player.y, e.damage);
    e.shootCooldown = 80 + Math.floor(Math.random()*40);
  }
}

function updateMage(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);

  if(dist < 180){
    const len = dist || 1;
    const nx = dx / len;
    const ny = dy / len;
    moveEnemyWithCollision(e, -nx * e.speed * 1.4, -ny * e.speed * 1.4, 6);
  }else{
    updateMelee(e);
  }

  if(e.castCooldown <= 0 && dist < 200){

  fireZones.push({
    x:e.x,
    y:e.y,
    r:32,
    life:180
  });

  e.castCooldown = 600; // 10초
}
}

function updateBoss(e){
  if(!e.phase2Used && e.hp <= e.maxHp * 0.5) bossEnterPhase2(e);
  updateMelee(e);

  if(e.swordPulled){
    e.dashCooldown--;
    e.cleaveCooldown--;

    const dist = Math.hypot(player.x - e.x, player.y - e.y);

    if(e.dashCooldown <= 0 && dist > 160 && dist < 520){
      bossDash(e);
      e.dashCooldown = 160 + Math.floor(Math.random()*70);
    }
    if(e.cleaveCooldown <= 0 && dist < 220){
      bossCleave(e);
      e.cleaveCooldown = 200 + Math.floor(Math.random()*80);
    }
  }
}

function updateSingleEnemy(e){
  if(e.isLeader){
    const radius = 50;
    const r2 = radius * radius;

    for(const other of enemies){
      if(other === e) continue;
      const dx = other.x - e.x;
      const dy = other.y - e.y;
      if(dx*dx + dy*dy <= r2){
        applyBuff(other, "damage",   1.25, 15, "leader");
        applyBuff(other, "atkSpeed", 1.2,  15, "leader");
      }
    }
  }

  if(e.hp <= 0){
    return;
  }

  if(e.invul > 0) e.invul--;

  if(e.bleed && e.bleed.life > 0){
    e.bleed.life--;
    e.bleed.tick = (e.bleed.tick || 0) + 1;
    if(e.bleed.tick % 10 === 0){
      const bd = Math.max(1, Number(e.bleed.damage || 0));
      e.hp = Math.max(0, (e.hp || 0) - bd);
      e.hitFlash = Math.max(e.hitFlash || 0, 3);
      if(e.hp <= 0){
        return;
      }
    }
  }

  if(e.phaseLock > 0){
    e.phaseLock--;
    return;
  }

  if(e.stun > 0){
    e.stun--;
    return;
  }

  switch(e.type){
    case "archer":
    case "skeleton":
      updateArcher(e);
      break;

    case "mage":
      updateMage(e);
      break;

    case "boss":
      updateBoss(e);
      break;

    case "zombie":
    case "melee":
    default:
      updateMelee(e);
      break;
  }
}

  updateArrows();

}

  });

function updateFireEmbers(){
  for(let i=fireEmbers.length-1;i>=0;i--){
    const p = fireEmbers[i];
    p.life--;
    p.x += p.vx;
    p.y += p.vy;

    if(p.life <= 0 || p.a < 0.05) fireEmbers.splice(i,1);
  }
}

function drawIsoRingGlow(sx, sy, r, innerA, outerA){
  // draw in iso-scaled space so the gradient looks correct
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, 0.62);
  const g = ctx.createRadialGradient(0,0, r*0.20, 0,0, r*1.02);
  g.addColorStop(0.00, `rgba(0,0,0,0)`);
  g.addColorStop(0.55, `rgba(255,120,20,${innerA})`);
  g.addColorStop(0.85, `rgba(255,60,0,${outerA})`);
  g.addColorStop(1.00, `rgba(0,0,0,0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0,0,r*1.05,0,Math.PI*2);
  ctx.fill();

  // crisp rim
  ctx.strokeStyle = `rgba(255,180,80,${Math.min(0.55, innerA+0.12)})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,r*0.98,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawFireZoneIso(sx, sy, z){
  // ✅ exactly 1 tile footprint
  const r = (ISO && ISO.tileW) ? (ISO.tileW * 0.50) : 32;
  const t = (frameCount||0);

  // scorch (darkened center)
  const scorch = 0.55;
  drawIsoDiscTile(sx, sy, r*0.92, `rgba(20,10,5,${0.20*scorch})`, null);
  drawIsoDiscTile(sx, sy, r*0.62, `rgba(0,0,0,${0.10*scorch})`, null);

  // animated glow ring
  const flick = 0.08*Math.sin((t + (z.x*0.01+z.y*0.01))*0.25) + 0.08*Math.random();
  drawIsoRingGlowTile(sx, sy, r, 0.22+flick, 0.18+flick);

  // little flame tongues around rim (cheap but looks like fire)
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, __isoTileScaleY());
  const tongues = 10;
  for(let k=0;k<tongues;k++){
    const ang = (k/tongues)*Math.PI*2 + (t*0.02) + ((z.x+z.y)*0.001);
    const rr = r*0.82 + (Math.sin(t*0.07 + k*1.7)*r*0.04);
    const x = Math.cos(ang)*rr;
    const y = Math.sin(ang)*rr;
    const h = 6 + 6*Math.abs(Math.sin(t*0.11 + k*2.1));
    const w = 3 + 2*Math.abs(Math.cos(t*0.09 + k));
    ctx.fillStyle = `rgba(255,140,40,${0.22+Math.random()*0.08})`;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.quadraticCurveTo(x + w, y - h, x, y - h*1.6);
    ctx.quadraticCurveTo(x - w, y - h, x, y);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function __enemyStrokeByElite(e, normal){
  if(e?.isElite && e?.eliteColor === "yellow") return "rgba(255,220,90,0.95)";
  if(e?.isElite && e?.eliteColor === "blue")   return "rgba(110,180,255,0.95)";
  if(e?.isElite && e?.eliteColor === "red")    return "rgba(255,110,110,0.98)";
  return normal;
}

function __roundRectPath(x, y, w, h, r){
  const rr = Math.max(0, Math.min(r, Math.min(w, h) * 0.5));
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
}

function drawIsoEnemySprite(sx, sy, e){
  if(!e) return;
  const __prevAlpha = ctx.globalAlpha;
  if(e.hitFlash > 0) ctx.globalAlpha = Math.min(1, __prevAlpha * (1 + 0.18 * Math.min(1, e.hitFlash / 8)));

  if(e.type === "boss"){
    drawIsoBossSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "zombie"){
    drawIsoZombieSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "skeleton"){
    drawIsoSkeletonSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "archer"){
    drawIsoArcherSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "mage"){
    drawIsoMageSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "orc"){
    drawIsoOrcWarriorSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "demon"){
    drawIsoDemonSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  drawIsoMeleeSprite(sx, sy, e);
  ctx.globalAlpha = __prevAlpha;
}

function __enemyBreathe(e, speed=0.12, amount=1.5){
  return Math.sin((performance.now?.() || Date.now()) * 0.001 * speed + ((e?.x||0)+(e?.y||0))*0.01) * amount;
}

function __enemyHitNudge(e){
  const s = Math.max(0, Math.min(1, (e?.stun || 0) / 10));
  return { x: -s * 2.0, y: -s * 1.0 };
}

function __enemyFacingSign(e){

  return dx >= 0 ? 1 : -1;
}

function __enemyHitFlashStart(e, power=1){
  if(!e) return;

}

function drawTreeRounded(x, y, w, h, r, fillStyle, strokeStyle, lineWidth=1){
  r = Math.max(0, Math.min(r || 0, Math.min(w, h) * 0.5));
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  if(fillStyle){
    ctx.fillStyle = fillStyle;
    ctx.fill();
  }
  if(strokeStyle){
    ctx.lineWidth = lineWidth || 1;
    ctx.strokeStyle = strokeStyle;
    ctx.stroke();
  }
  ctx.restore();
}

function updateMovement(){
  let mx = joyDX || 0;
  let my = joyDY || 0;

  if(keys["ArrowLeft"] || keys["a"] || keys["A"]) mx -= 1;
  if(keys["ArrowRight"] || keys["d"] || keys["D"]) mx += 1;
  if(keys["ArrowUp"] || keys["w"] || keys["W"]) my -= 1;
  if(keys["ArrowDown"] || keys["s"] || keys["S"]) my += 1;

  let len = Math.hypot(mx, my);
  if(len > 1){
    mx /= len;
    my /= len;
  }

  const moveMul =
    (player?.buffs?.spdMul ?? 1) *
    (player?.gear?.spdMul ?? 1);

  const spd = Math.max(1.5, (player.speed || 4.5) * moveMul);

  if(Math.abs(mx) > 0.001 || Math.abs(my) > 0.001){
    if(Math.abs(mx) >= Math.abs(my)) player.dir = mx >= 0 ? "right" : "left";
    else player.dir = my >= 0 ? "down" : "up";
  }

  const dx = mx * spd + (player.knockbackX || 0);
  const dy = my * spd + (player.knockbackY || 0);

  const steps = 4;
  const sx = dx / steps;
  const sy = dy / steps;

  for(let i=0; i<steps; i++){
    const nx = player.x + sx;
    const ny = player.y + sy;
    if(canMoveTo(nx, player.y)) player.x = nx;
    if(canMoveTo(player.x, ny)) player.y = ny;
  }

  player.knockbackX = (player.knockbackX || 0) * 0.72;
  player.knockbackY = (player.knockbackY || 0) * 0.72;
  if(Math.abs(player.knockbackX) < 0.05) player.knockbackX = 0;
  if(Math.abs(player.knockbackY) < 0.05) player.knockbackY = 0;
}

function checkLevelUp(){
  while(xp >= xpToNext){
    xp -= xpToNext;
    level += 1;
    xpToNext = Math.floor(xpToNext * 1.22);
    player.passivePoints = (player.passivePoints || 0) + 1;
    player.baseMaxHp = Math.max(1, Math.floor((player.baseMaxHp || player.maxHp || 250) + 14));

function __playerAttackRange(){
  const g = player.gear || {};
  const rangeMul = (g.rangeMul || 1);
  return 54 * rangeMul;
}

function __dealBasicAttack(){
  const range = __playerAttackRange();
  const frontal = 0.72;
  const dir = player.dir || "right";

  let best = null;
  let bestDist = Infinity;

  for(const e of enemies){
    if(!e || e.hp <= 0) continue;
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    const dist = Math.hypot(dx, dy);
    if(dist > range + (e.radius || 14)) continue;

    let ok = false;
    if(dir === "left")  ok = dx < 0 && Math.abs(dy) < range * frontal;
    if(dir === "right") ok = dx > 0 && Math.abs(dy) < range * frontal;
    if(dir === "up")    ok = dy < 0 && Math.abs(dx) < range * frontal;
    if(dir === "down")  ok = dy > 0 && Math.abs(dx) < range * frontal;
    if(!ok) continue;

    if(dist < bestDist){
      bestDist = dist;
      best = e;
    }
  }

  if(!best) return false;

  const weaponBase = rollWeaponDamage();
  const gearDmg = (player?.gear?.dmgMul || 1);
  const buffDmg = (player?.buffs?.dmgMul || 1);
  const base = weaponBase * gearDmg * buffDmg;

  const ctxAtk = buildCombatCtx("attack", best);
  const res = computeFinalDamage(base, ctxAtk, { canCrit:true });
  const dealt = Math.max(1, res.dealt || 0);

  best.hp -= dealt;
  best.stun = Math.max(best.stun || 0, res.crit.isCrit ? 10 : 6);
  __enemyHitFlashStart(best, res.crit.isCrit ? 1.25 : 1.0);
  spawnHitBlood(best.x, best.y, res.crit.isCrit ? 18 : 10);
  shake = Math.max(shake, res.crit.isCrit ? 10 : 6);

  if(best.hp <= 0){
    best.hp = 0;
    giveXP(best);
    killCount++;
  }
  return true;
}

function updateCombatSystem(){
  const atkSpdMul =
    (player?.buffs?.atkSpdMul ?? 1) *
    (player?.gear?.atkSpdMul ?? 1);
  const attackSpeed = Math.max(0.35, (player.weapon?.attackSpeed || 1) * atkSpdMul);
  const attackFrames = Math.max(8, Math.round(20 / attackSpeed));

  if(attacking){
    attackFrame++;
    if(attackFrame === 1 || attackFrame === Math.max(2, Math.floor(attackFrames * 0.32))){
      __dealBasicAttack();
    }
    if(attackFrame >= attackFrames){
      attacking = false;
      attackFrame = 0;
    }
  }
}

function updateArrows(){
  for(let i=arrows.length-1; i>=0; i--){
    const a = arrows[i];
    a.life--;
    a.x += a.dx;
    a.y += a.dy;

    a.trailTick = (a.trailTick || 0) + 1;
    if(a.trailTick % 2 === 0) spawnArrowTrail(a.x, a.y, a.dx, a.dy);

    const tx = Math.floor(a.x / tileSize);
    const ty = Math.floor(a.y / tileSize);
    if(!map[ty] || map[ty][tx] !== 0){
      spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      arrows.splice(i, 1);
      continue;
    }

    const dx = player.x - a.x;
    const dy = player.y - a.y;
    const rr = (player.radius || 14) + 6;
    if(dx*dx + dy*dy <= rr*rr){
      spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      const len = Math.hypot(a.dx, a.dy) || 1;
      damagePlayer(a.damage || 8, (a.dx/len) * 10, (a.dy/len) * 10, { type:"archer", tags:['projectile','arrow','enemy'] });
      arrows.splice(i, 1);
      continue;
    }

    if(a.life <= 0){
      arrows.splice(i, 1);
    }
  }
}

function updateEffectSystem(){
  updateParticles();
  updateLevelParticles();
  updateFireEmbers();

  for(let i=bloodParticles.length-1; i>=0; i--){
    const p = bloodParticles[i];
    p.x += p.vx || 0;
    p.y += p.vy || 0;
    p.vy = (p.vy || 0) + 0.08;
    p.life--;
    if(p.life <= 0) bloodParticles.splice(i,1);
  }

  for(let i=bloodPools.length-1; i>=0; i--){
    const p = bloodPools[i];
    p.life--;
    if(p.life <= 0) bloodPools.splice(i,1);
  }

  for(let i=fireZones.length-1; i>=0; i--){
    const z = fireZones[i];
    z.life--;
    z.tick = (z.tick || 0) + 1;
    if(z.tick % 3 === 0){
      spawnFireEmber(z.x + (Math.random()-0.5) * (z.radius || z.r || 32) * 0.9, z.y + (Math.random()-0.5) * (z.radius || z.r || 32) * 0.5);
    }
    const rr = (z.radius || z.r || 32) + player.radius;
    const dx = player.x - z.x;
    const dy = player.y - z.y;
    if(dx*dx + dy*dy <= rr*rr && z.tick % 20 === 0){
      damagePlayer(Math.max(1, z.damage || 8), 0, 0, { type:"mage", tags:['fire','aoe','enemy'] });
    }
    if(z.life <= 0) fireZones.splice(i,1);
  }
}

function __drawIsoDiamond(cx, cy, hw, hh, fill, stroke){
  ctx.beginPath();
  ctx.moveTo(cx, cy - hh);
  ctx.lineTo(cx + hw, cy);
  ctx.lineTo(cx, cy + hh);
  ctx.lineTo(cx - hw, cy);
  ctx.closePath();
  if(fill){
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if(stroke){
    ctx.strokeStyle = stroke;
    ctx.stroke();
  }
}

function __drawIsoWallTile(cx, cy, hw, hh, h){
  const top = [
    [cx, cy - hh - h],
    [cx + hw, cy - h],
    [cx, cy + hh - h],
    [cx - hw, cy - h]
  ];
  const front = [
    [cx - hw, cy - h],
    [cx, cy + hh - h],
    [cx, cy + hh],
    [cx - hw, cy]
  ];
  const side = [
    [cx + hw, cy - h],
    [cx, cy + hh - h],
    [cx, cy + hh],
    [cx + hw, cy]
  ];

  ctx.fillStyle = "#3e3223";
  ctx.beginPath(); ctx.moveTo(...front[0]); front.slice(1).forEach(p=>ctx.lineTo(...p)); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#584834";
  ctx.beginPath(); ctx.moveTo(...side[0]); side.slice(1).forEach(p=>ctx.lineTo(...p)); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#7b6a51";
  ctx.beginPath(); ctx.moveTo(...top[0]); top.slice(1).forEach(p=>ctx.lineTo(...p)); ctx.closePath(); ctx.fill();

  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.beginPath(); ctx.moveTo(...top[0]); top.slice(1).forEach(p=>ctx.lineTo(...p)); ctx.closePath(); ctx.stroke();
}

function drawIsoEnemySprite(sx, sy, e){
  if(!e) return;
  const baseR = Math.max(8, Number(e.radius) || 14);
  let body = "#7f8c8d";
  let accent = "#d9d9d9";
  if(e.type === "zombie"){ body = "#5d8f57"; accent="#9dc38f"; }
  else if(e.type === "skeleton"){ body = "#d7d4c8"; accent="#f3efe4"; }
  else if(e.type === "archer"){ body = "#7a5a39"; accent="#d7b38a"; }
  else if(e.type === "mage"){ body = "#5f63a9"; accent="#b0b7ff"; }
  else if(e.type === "orc"){ body = "#7b8c3e"; accent="#b6ce6b"; }
  else if(e.type === "demon"){ body = "#7c2d2d"; accent="#e38b6f"; }
  else if(e.type === "boss"){ body = "#33284e"; accent="#e8c98a"; }

  const breathe = Math.sin(frameCount * 0.08 + (e.x + e.y) * 0.01) * 1.2;
  const hitLift = (e.stun || 0) > 0 ? -2 : 0;
  const y0 = sy + breathe + hitLift;

  ctx.save();
  ctx.globalAlpha = e.hp > 0 ? 1 : 0.4;

  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.28)";
  ctx.beginPath();
  ctx.ellipse(sx, sy + baseR * 0.9, baseR * 0.9, baseR * 0.45, 0, 0, Math.PI*2);
  ctx.fill();

  // body
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.ellipse(sx, y0, baseR * 0.95, baseR * 0.72, 0, 0, Math.PI*2);
  ctx.fill();

  // head
  ctx.fillStyle = accent;
  ctx.beginPath();
  ctx.arc(sx, y0 - baseR * 0.75, Math.max(5, baseR * 0.35), 0, Math.PI*2);
  ctx.fill();

  // elite ring
  if(e.isElite){
    ctx.strokeStyle = e.eliteColor === "blue" ? "rgba(120,170,255,0.95)" : "rgba(255,220,120,0.95)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(sx, sy + baseR * 0.95, baseR * 1.3, baseR * 0.62, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  if(e.type === "boss"){
    ctx.strokeStyle = "rgba(255,220,140,0.95)";
    ctx.lineWidth = 2;
    ctx.strokeRect(sx - baseR * 0.9, y0 - baseR * 1.5, baseR * 1.8, baseR * 0.45);
  }

  // hp bar
  const maxHp = e.maxHp || Math.max(1, e.hp || 1);
  const hpw = baseR * 1.8;
  const hpx = sx - hpw/2;
  const hpy = y0 - baseR * 1.8;
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(hpx, hpy, hpw, 4);
  ctx.fillStyle = e.type === "boss" ? "#c94848" : "#d26464";
  ctx.fillRect(hpx, hpy, hpw * Math.max(0, Math.min(1, (e.hp || 0) / maxHp)), 4);

  ctx.restore();
}

function __drawPlayerRescue(sx, sy){
  const r = player.radius || 14;

  ctx.save();

  ctx.fillStyle = "rgba(0,0,0,0.30)";
  ctx.beginPath();
  ctx.ellipse(sx, sy + r * 1.05, r * 0.95, r * 0.44, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = player.invul > 0 && frameCount % 4 < 2 ? "#ffddaa" : "#d9d0c4";
  ctx.beginPath();
  ctx.ellipse(sx, sy, r, r * 0.8, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#7a1f1f";
  ctx.beginPath();
  ctx.arc(sx, sy - r * 0.9, r * 0.42, 0, Math.PI*2);
  ctx.fill();

  // sword
  ctx.strokeStyle = "#d8d8d8";
  ctx.lineWidth = 3;
  ctx.beginPath();
  if(player.dir === "left"){
    ctx.moveTo(sx - r * 0.3, sy - r * 0.1);
    ctx.lineTo(sx - r * 1.2, sy - r * 0.8);
  }else if(player.dir === "up"){
    ctx.moveTo(sx + r * 0.1, sy - r * 0.2);
    ctx.lineTo(sx + r * 0.7, sy - r * 1.2);
  }else if(player.dir === "down"){
    ctx.moveTo(sx + r * 0.1, sy + r * 0.2);
    ctx.lineTo(sx + r * 0.7, sy + r * 1.2);
  }else{
    ctx.moveTo(sx + r * 0.3, sy - r * 0.1);
    ctx.lineTo(sx + r * 1.2, sy - r * 0.8);
  }
  ctx.stroke();

  ctx.restore();
}

function __drawIsoMapRescue(camX, camY){
  const hw = ISO.tileW * 0.5;
  const hh = ISO.tileH * 0.5;
  const wallH = ISO.wallH || Math.floor(ISO.tileH * 2.3);

  for(let y=0; y<mapSize; y++){
    for(let x=0; x<mapSize; x++){
      const wx = x * tileSize + tileSize * 0.5;
      const wy = y * tileSize + tileSize * 0.5;
      const p = isoProject(wx, wy);
      const sx = p.x - camX;
      const sy = p.y - camY;

      if(sx < -hw*2 || sx > canvas.width + hw*2 || sy < -wallH - hh*2 || sy > canvas.height + wallH + hh*2) continue;

      const t = map[y][x];
      const floorFill = t === 2 ? "#3b3224" : ((x + y) % 2 === 0 ? "#2a241b" : "#241f18");
      __drawIsoDiamond(sx, sy, hw, hh, floorFill, "rgba(255,255,255,0.03)");

      if(t === 1){

  }

  if(gameOver){
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";
    ctx.font = "bold 32px sans-serif";
    ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
    ctx.textAlign = "left";
  }
}

function draw(){
  if(!ctx) return;

  if(shake > 0) shake--;
  const s = shake > 0 ? shake * 0.35 : 0;
  const ox = s ? (Math.random()-0.5) * s : 0;
  const oy = s ? (Math.random()-0.5) * s : 0;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#12100d";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cam = __isoCamera();

  ctx.save();
  ctx.translate(ox, oy);
  __drawIsoMapRescue(cam.x, cam.y);
  __drawBloodAndEffectsRescue(cam.x, cam.y);
  __drawEntitiesRescue(cam.x, cam.y);
  __drawPortalRescue(cam.x, cam.y);
  if(typeof drawLoots === "function") drawLoots();
  if(typeof drawIsoLootLabels === "function") drawIsoLootLabels(cam.x, cam.y);
  ctx.restore();

  __drawHudRescue();
}

function gameLoop(){
  safeCall(()=>{
    if(!gamePaused) update();
  }, "update");
  safeCall(()=>{
    draw();
  }, "draw");
  requestAnimationFrame(gameLoop);
}

(function bootstrapRescue(){
  try{
    isoInit();
  }catch(e){ console.warn("isoInit failed", e); }

  try{
    if(typeof recalcFromGear === "function") recalcFromGear();
  }catch(e){ console.warn("recalcFromGear failed", e); }

  try{
    if(typeof startNewMap === "function") startNewMap(Math.max(1, mapTier || 1));
  }catch(e){ console.warn("startNewMap failed", e); }

  try{
    syncPlayerVitalDisplay();
  }catch(e){}

  requestAnimationFrame(gameLoop);
})();
</script>
