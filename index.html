<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>POE 맵핑 시뮬레이터 베이스</title>
<style>
  :root{
    --U: 0.62;

    /* 독립 스케일 (꼬임 방지) */
    --lifeScale: 1.0;      /* 생명력 오브 */
    --controlScale: 0.60;  /* 이동/공격 */
    --miniScale: 0.60;     /* 미니맵 */

    --m:  calc(16px * var(--U));
    --m2: calc(24px * var(--U));

    --lifeD: calc(150px * var(--U) * var(--lifeScale));

    --joyD:  calc(190px * var(--U) * var(--controlScale));
    --joyK:  calc(84px  * var(--U) * var(--controlScale));
    --atkD:  var(--joyD);

    --mapW:  calc(280px * var(--U) * var(--miniScale));
    --mapH:  calc(170px * var(--U) * var(--miniScale));

    --menuH: calc(48px * var(--U));
  }

  html,body{height:100%;margin:0;overflow:hidden;background:#0b0b0e;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
  #stage{position:fixed;inset:0;touch-action:none;}
  #view{position:absolute;inset:0;width:100%;height:100%;display:block;background:#0f0f14;}

  /* Layers */
  #hud{position:absolute;inset:0;pointer-events:none;z-index:10;}
  #ctrl{position:absolute;inset:0;pointer-events:none;z-index:20;}

  /* Life Orb (SVG) */
  #lifeOrb{
    position:absolute;left:var(--m);top:var(--m);
    width:var(--lifeD);height:var(--lifeD);
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.55));
  }
  #lifeOrb .shell{
    width:100%;height:100%;border-radius:50%;
    border:3px solid rgba(240,240,255,0.14);
    background:rgba(0,0,0,0.52);
    box-shadow:inset 0 0 18px rgba(0,0,0,0.75);
    overflow:hidden;position:relative;
  }
  #lifeOrb .txt{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:rgba(245,245,255,0.92);text-shadow:0 2px 10px rgba(0,0,0,0.85);
    font-weight:900;line-height:1.05;pointer-events:none;
  }
  #lifeOrb .txt .t{font-size:12px;opacity:0.75;letter-spacing:0.9px;margin-bottom:6px;}
  #lifeOrb .txt .n{font-size:26px;}
  #lifeOrb .txt .d{font-size:14px;opacity:0.85;margin-top:3px;}

  /* Rect minimap */
  #mini{
    position:absolute;right:var(--m);top:var(--m);
    width:var(--mapW);height:var(--mapH);
    border-radius:14px;
    border:2px solid rgba(240,240,255,0.14);
    background:rgba(0,0,0,0.32);
    box-shadow:0 12px 30px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.75);
    overflow:hidden;
  }
  #mini canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

  /* Menu button */
  #menuBtn{
    position:absolute;left:50%;top:calc(18px * var(--U));
    transform:translateX(-50%);
    height:var(--menuH);
    padding:0 calc(14px * var(--U));
    border-radius:999px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(20,20,28,0.45);
    border:1px solid rgba(255,255,255,0.16);
    box-shadow:0 10px 26px rgba(0,0,0,0.55), inset 0 0 16px rgba(0,0,0,0.55);
    color:rgba(240,240,250,0.92);
    font-weight:900;letter-spacing:0.6px;
    user-select:none;
    pointer-events:auto;
    touch-action:none;
    z-index:30;
  }
  #menuBtn:active{transform:translateX(-50%) scale(0.98);}

  /* Joystick */
  #joy{
    position:absolute;left:var(--m2);bottom:var(--m2);
    width:var(--joyD);height:var(--joyD);border-radius:50%;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.14);
    pointer-events:auto;
    touch-action:none;
  }
  #joy .k{
    position:absolute;left:50%;top:50%;
    width:var(--joyK);height:var(--joyK);border-radius:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
  }

  /* Attack (same size) */
  #atk{
    position:absolute;right:calc(40px * var(--U) * var(--controlScale));bottom:calc(22px * var(--U) * var(--controlScale));
    width:var(--atkD);height:var(--atkD);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%, rgba(255,210,130,0.42), rgba(255,140,40,0.30) 45%, rgba(140,35,0,0.24));
    border:2px solid rgba(255,170,80,0.35);
    box-shadow:0 10px 26px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.55);
    color:rgba(255,245,235,0.92);
    font-weight:900;
    user-select:none;
    pointer-events:auto;
    touch-action:none;
  }
  #atk:active{transform:scale(0.98);}
  #atkPulse{
    position:absolute;inset:-6px;border-radius:50%;
    border:2px solid rgba(255,220,160,0);
    box-shadow:0 0 0 rgba(255,190,110,0);
    opacity:0;
    pointer-events:none;
  }

  /* Loot labels */
  #labels{position:absolute;inset:0;pointer-events:none;z-index:25;}
  .label{
    position:absolute;
    padding:6px 8px;
    border-radius:10px;
    background:rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.14);
    color:rgba(245,245,255,0.92);
    font-weight:800;
    font-size:12px;
    white-space:nowrap;
    transform:translate(-50%,-100%);
    text-shadow:0 2px 10px rgba(0,0,0,0.8);
  }
  .label.white{border-color:rgba(220,220,220,0.22);}
  .label.blue{border-color:rgba(90,160,255,0.30);}
  .label.yellow{border-color:rgba(255,210,90,0.30);}

  /* Fullscreen panel */
  #panelMask{
    position:absolute;inset:0;display:none;z-index:1000;
    background:rgba(0,0,0,0.78);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    pointer-events:auto;
  }
  #panel{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(980px, 92vw);
    height:min(560px, 84vh);
    border-radius:18px;
    background:rgba(15,15,22,0.72);
    border:1px solid rgba(255,255,255,0.14);
    box-shadow:0 18px 45px rgba(0,0,0,0.75), inset 0 0 18px rgba(0,0,0,0.65);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  #panelTop{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px;
    border-bottom:1px solid rgba(255,255,255,0.10);
    color:rgba(240,240,250,0.92);
    font-weight:900;
  }
  #panelClose{
    appearance:none;border:none;
    background:rgba(255,255,255,0.10);
    border:1px solid rgba(255,255,255,0.16);
    color:rgba(240,240,250,0.92);
    font-weight:900;
    padding:10px 12px;border-radius:12px;
  }
  #panelBody{flex:1;min-height:0;display:flex;gap:12px;padding:12px;}
  #panelTabs{
    width:230px;
    border:1px solid rgba(255,255,255,0.10);
    border-radius:14px;
    background:rgba(0,0,0,0.25);
    padding:10px;
  }
  .tab{padding:10px 10px;border-radius:12px;color:rgba(220,220,235,0.90);font-weight:900;user-select:none;}
  .tab.on{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);}
  #panelMain{
    flex:1;
    border:1px solid rgba(255,255,255,0.10);
    border-radius:14px;
    background:rgba(0,0,0,0.20);
    padding:14px;
    color:rgba(220,220,235,0.86);
    overflow:auto;
  }

  /* Desktop testing */
  #hint{
    position:absolute;left:50%;bottom:12px;transform:translateX(-50%);
    color:rgba(255,255,255,0.45);
    font-weight:700;
    font-size:12px;
    pointer-events:none;
    z-index:30;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="view"></canvas>

  <div id="hud">
    <div id="lifeOrb">
      <div class="shell">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;">
          <defs>
            <clipPath id="clipCircle">
              <circle cx="50" cy="50" r="48"></circle>
            </clipPath>
          </defs>
          <g clip-path="url(#clipCircle)">
            <rect x="0" y="0" width="100" height="100" fill="rgba(0,0,0,0.35)"></rect>
            <rect id="lifeFill" x="-2" y="50" width="104" height="60" fill="rgba(220,40,40,0.88)"></rect>
            <path id="lifeWave" d="" fill="rgba(255,130,130,0.62)"></path>
          </g>
          <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="3"></circle>
          <circle cx="50" cy="50" r="43" fill="none" stroke="rgba(0,0,0,0.55)" stroke-width="2"></circle>
        </svg>
        <div class="txt">
          <div class="t">LIFE</div>
          <div class="n" id="lifeNow">100</div>
          <div class="d" id="lifeDen">/ 100</div>
        </div>
        <div style="position:absolute;inset:0;border-radius:50%;
          background:radial-gradient(circle at 30% 22%, rgba(255,255,255,0.18), rgba(255,255,255,0.02) 48%, rgba(0,0,0,0) 68%),
                     radial-gradient(circle at 50% 78%, rgba(0,0,0,0.35), rgba(0,0,0,0) 55%);
          pointer-events:none;"></div>
      </div>
    </div>

    <div id="mini"><canvas id="miniC"></canvas></div>
  </div>

  <div id="labels"></div>

  <div id="ctrl">
    <div id="joy"><div class="k" id="joyK"></div></div>
    <div id="atk">ATK<div id="atkPulse"></div></div>
    <div id="menuBtn">MENU</div>
    <div id="hint">PC: WASD 이동 / 스페이스 공격 / M 메뉴</div>
  </div>

  <div id="panelMask" aria-hidden="true">
    <div id="panel">
      <div id="panelTop">
        <div>MENU</div>
        <button id="panelClose">닫기</button>
      </div>
      <div id="panelBody">
        <div id="panelTabs">
          <div class="tab on" data-tab="overview">개요</div>
          <div class="tab" data-tab="debug">디버그</div>
          <div class="tab" data-tab="todo">TODO</div>
        </div>
        <div id="panelMain"></div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  /* =========================================================
    POE 맵핑 시뮬레이터 베이스
    - 단일 파일이지만 모듈식 네임스페이스로 구성
    - 방+통로 맵 생성 / 충돌 / 몬스터 팩 / 겹침 방지 / 드랍+라벨+줍기 / 미니맵
    - 모바일: pointer 이벤트만 사용 (중복 touchstart 방지)
  ========================================================= */

  /* ===================== Utilities ===================== */
  const U = {
    clamp(v,a,b){ return Math.max(a, Math.min(b, v)); },
    lerp(a,b,t){ return a + (b-a)*t; },
    len(x,y){ return Math.hypot(x,y); },
    norm(x,y){
      const d = Math.hypot(x,y);
      if(d < 1e-9) return {x:0,y:0,d:0};
      return {x:x/d, y:y/d, d};
    },
    rnd(min,max){ return min + Math.random()*(max-min); },
    rndi(min,max){ return (min + Math.random()*(max-min+1)) | 0; },
    pick(a){ return a[(Math.random()*a.length)|0]; },
    uid(){ return (Math.random().toString(16).slice(2) + Date.now().toString(16)).slice(0, 16); },
  };

  /* ===================== Config ===================== */
  const C = {
    map: {
      w: 120, h: 120,
      tw: 64, th: 32,
      roomCount: 14,
      roomMin: 6,
      roomMax: 14,
      padding: 2,
      corridorW: 2,
      seed: 0, // not used yet (hook for deterministic PRNG)
    },
    player: { r: 0.40, spd: 6.0, hp: 100, max: 100, pickupR: 1.2 },
    combat: { atkR: 1.65, dmg: 12, cd: 0.20 },
    mobs: {
      packCount: 18,
      packSizeMin: 5,
      packSizeMax: 12,
      hp: 26,
      spd: 2.2,
      aggroR: 12,
      sepR: 0.70,
      sepK: 8.0,
    },
    drops: {
      chance: 1.0, // for skeleton: always drop
      types: [
        {key:"white",  name:"흰템",  w:78},
        {key:"blue",   name:"매직",  w:18},
        {key:"yellow", name:"레어",  w:4},
      ]
    },
    render: {
      tileOutline: false,
      maxTilesPad: 10,
    }
  };

  function weightedPick(list){
    let sum = 0;
    for(const it of list) sum += it.w;
    let r = Math.random()*sum;
    for(const it of list){
      r -= it.w;
      if(r <= 0) return it;
    }
    return list[list.length-1];
  }

  /* ===================== DOM ===================== */
  const $ = (id) => document.getElementById(id);
  const DOM = {
    canvas: $("view"),
    mini: $("miniC"),
    labels: $("labels"),
    lifeNow: $("lifeNow"),
    lifeDen: $("lifeDen"),
    lifeFill: $("lifeFill"),
    lifeWave: $("lifeWave"),
    joy: $("joy"),
    joyK: $("joyK"),
    atk: $("atk"),
    atkPulse: $("atkPulse"),
    menuBtn: $("menuBtn"),
    panelMask: $("panelMask"),
    panelClose: $("panelClose"),
    panelMain: $("panelMain"),
    tabs: Array.from(document.querySelectorAll(".tab")),
  };

  /* ===================== Canvas setup ===================== */
  const Gfx = {
    ctx: DOM.canvas.getContext("2d", { alpha:false }),
    dpr: 1,
    w: 0, h: 0,
    resize(){
      const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
      this.dpr = dpr;
      const w = window.innerWidth|0, h = window.innerHeight|0;
      DOM.canvas.width = (w * dpr)|0;
      DOM.canvas.height = (h * dpr)|0;
      DOM.canvas.style.width = w + "px";
      DOM.canvas.style.height = h + "px";
      this.w = w; this.h = h;
      this.ctx.setTransform(dpr,0,0,dpr,0,0);
    }
  };

  const Mini = {
    ctx: DOM.mini.getContext("2d"),
    dpr: 1,
    w: 0, h: 0,
    resize(){
      const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
      const r = DOM.mini.getBoundingClientRect();
      DOM.mini.width = Math.max(1, (r.width * dpr)|0);
      DOM.mini.height = Math.max(1, (r.height * dpr)|0);
      DOM.mini.style.width = r.width + "px";
      DOM.mini.style.height = r.height + "px";
      this.dpr = dpr; this.w = DOM.mini.width; this.h = DOM.mini.height;
    }
  };

  /* ===================== Input ===================== */
  const Input = {
    joy: { on:false, id:-1, cx:0, cy:0, dx:0, dy:0, max:64 },
    keys: { w:false,a:false,s:false,d:false, space:false },
    wantAttack: false,

    updateJoyGeom(){
      const scaleU = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--U")) || 1;
      const scaleC = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--controlScale")) || 1;
      this.joy.max = 64 * scaleU * scaleC;
      const r = DOM.joy.getBoundingClientRect();
      this.joy.cx = r.left + r.width/2;
      this.joy.cy = r.top  + r.height/2;
    },
    setKnob(px,py){
      DOM.joyK.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
    },
    init(){
      // Joystick pointer
      DOM.joy.addEventListener("pointerdown", (e)=>{
        this.joy.on = true;
        this.joy.id = e.pointerId;
        DOM.joy.setPointerCapture(e.pointerId);
        this.updateJoyGeom();
        this.joy.dx = 0; this.joy.dy = 0;
        this.setKnob(0,0);
        e.preventDefault();
      }, {passive:false});

      DOM.joy.addEventListener("pointermove", (e)=>{
        if(!this.joy.on || e.pointerId !== this.joy.id) return;
        let px = e.clientX - this.joy.cx;
        let py = e.clientY - this.joy.cy;
        const dist = Math.hypot(px,py);
        if(dist > this.joy.max){
          px = px / dist * this.joy.max;
          py = py / dist * this.joy.max;
        }
        this.joy.dx = px / this.joy.max;
        this.joy.dy = py / this.joy.max;
        this.setKnob(px,py);
        e.preventDefault();
      }, {passive:false});

      const joyUp = (e)=>{
        if(e.pointerId !== this.joy.id) return;
        this.joy.on = false; this.joy.id = -1;
        this.joy.dx = 0; this.joy.dy = 0;
        this.setKnob(0,0);
        e.preventDefault();
      };
      DOM.joy.addEventListener("pointerup", joyUp, {passive:false});
      DOM.joy.addEventListener("pointercancel", joyUp, {passive:false});

      // Attack
      DOM.atk.addEventListener("pointerdown", (e)=>{
        this.wantAttack = true;
        UI.flashAtk();
        e.preventDefault();
      }, {passive:false});

      // Keyboard (PC test)
      window.addEventListener("keydown", (e)=>{
        const k = e.key.toLowerCase();
        if(k === "w") this.keys.w = true;
        if(k === "a") this.keys.a = true;
        if(k === "s") this.keys.s = true;
        if(k === "d") this.keys.d = true;
        if(e.code === "Space"){ this.keys.space = true; this.wantAttack = true; }
        if(k === "m"){ UI.openPanel(); }
      });
      window.addEventListener("keyup", (e)=>{
        const k = e.key.toLowerCase();
        if(k === "w") this.keys.w = false;
        if(k === "a") this.keys.a = false;
        if(k === "s") this.keys.s = false;
        if(k === "d") this.keys.d = false;
        if(e.code === "Space") this.keys.space = false;
      });

      window.addEventListener("resize", ()=>this.updateJoyGeom());
      requestAnimationFrame(()=>this.updateJoyGeom());
    },
    moveVec(){
      // Prefer joystick
      let x = this.joy.dx, y = this.joy.dy;

      // Add keyboard (for testing)
      if(this.keys.w) y -= 1;
      if(this.keys.s) y += 1;
      if(this.keys.a) x -= 1;
      if(this.keys.d) x += 1;

      const n = U.norm(x,y);
      return {x:n.x, y:n.y, mag: Math.min(1, n.d)};
    }
  };

  /* ===================== Map generator ===================== */
  const MapGen = {
    // tiles: 0 floor, 1 wall
    tiles: null,
    rooms: null,

    newTiles(){
      const t = new Uint8Array(C.map.w * C.map.h);
      t.fill(1);
      return t;
    },
    idx(x,y){ return x + y*C.map.w; },
    inBounds(x,y){ return x>=0 && y>=0 && x<C.map.w && y<C.map.h; },
    get(x,y){ return this.tiles[this.idx(x,y)]; },
    set(x,y,v){ this.tiles[this.idx(x,y)] = v; },

    carveRect(x,y,w,h,v=0){
      for(let iy=y; iy<y+h; iy++){
        for(let ix=x; ix<x+w; ix++){
          if(this.inBounds(ix,iy)) this.set(ix,iy,v);
        }
      }
    },
    carveCorridor(ax,ay,bx,by){
      // L-shaped, corridorW thick
      const cw = C.map.corridorW|0;
      const horizFirst = Math.random() < 0.5;
      const carveLineH = (y, x0, x1) => {
        const lo = Math.min(x0,x1)|0, hi = Math.max(x0,x1)|0;
        for(let x=lo; x<=hi; x++){
          for(let dy=-(cw//2); dy<=cw//2; dy++){
            if(this.inBounds(x, y+dy)) this.set(x, y+dy, 0);
          }
        }
      };
      const carveLineV = (x, y0, y1) => {
        const lo = Math.min(y0,y1)|0, hi = Math.max(y0,y1)|0;
        for(let y=lo; y<=hi; y++){
          for(let dx=-(cw//2); dx<=cw//2; dx++){
            if(this.inBounds(x+dx, y)) this.set(x+dx, y, 0);
          }
        }
      };

      if(horizFirst){
        carveLineH(ay|0, ax|0, bx|0);
        carveLineV(bx|0, ay|0, by|0);
      }else{
        carveLineV(ax|0, ay|0, by|0);
        carveLineH(by|0, ax|0, bx|0);
      }
    },

    overlapsRoom(x,y,w,h){
      const pad = C.map.padding|0;
      for(const r of this.rooms){
        if(x < r.x + r.w + pad &&
           x + w + pad > r.x &&
           y < r.y + r.h + pad &&
           y + h + pad > r.y) return true;
      }
      return false;
    },

    generate(){
      this.tiles = this.newTiles();
      this.rooms = [];

      const tries = C.map.roomCount * 12;
      for(let i=0; i<tries && this.rooms.length < C.map.roomCount; i++){
        const w = U.rndi(C.map.roomMin, C.map.roomMax);
        const h = U.rndi(C.map.roomMin, C.map.roomMax);
        const x = U.rndi(2, C.map.w - w - 3);
        const y = U.rndi(2, C.map.h - h - 3);
        if(this.overlapsRoom(x,y,w,h)) continue;
        this.rooms.push({x,y,w,h, cx:x + w/2, cy:y + h/2});
        this.carveRect(x,y,w,h,0);
      }

      // Connect rooms by nearest-neighbor chain
      if(this.rooms.length > 1){
        // sort by x then y for stable-ish paths
        this.rooms.sort((a,b)=> (a.cx-b.cx) || (a.cy-b.cy));
        for(let i=1;i<this.rooms.length;i++){
          const a = this.rooms[i-1], b = this.rooms[i];
          this.carveCorridor(a.cx, a.cy, b.cx, b.cy);
        }
      }

      // Ensure borders are walls
      for(let x=0;x<C.map.w;x++){ this.set(x,0,1); this.set(x,C.map.h-1,1); }
      for(let y=0;y<C.map.h;y++){ this.set(0,y,1); this.set(C.map.w-1,y,1); }
    }
  };

  /* ===================== Physics / Collision ===================== */
  const Phys = {
    // wall collision by sampling surrounding tiles (circle vs grid)
    isWall(tx,ty){
      if(tx<0||ty<0||tx>=C.map.w||ty>=C.map.h) return true;
      return MapGen.tiles[tx + ty*C.map.w] === 1;
    },
    slideMoveCircle(pos, vel, radius, dt){
      // try X then Y
      let nx = pos.x + vel.x * dt;
      let ny = pos.y + vel.y * dt;

      // X axis
      if(!this.circleHitsWall(nx, pos.y, radius)){
        pos.x = nx;
      } else {
        // push out: try small steps
        const step = Math.sign(vel.x) * 0.05;
        let tx = pos.x;
        for(let i=0;i<12;i++){
          const px = tx + step;
          if(this.circleHitsWall(px, pos.y, radius)) break;
          tx = px;
        }
        pos.x = tx;
      }

      // Y axis
      if(!this.circleHitsWall(pos.x, ny, radius)){
        pos.y = ny;
      } else {
        const step = Math.sign(vel.y) * 0.05;
        let ty = pos.y;
        for(let i=0;i<12;i++){
          const py = ty + step;
          if(this.circleHitsWall(pos.x, py, radius)) break;
          ty = py;
        }
        pos.y = ty;
      }

      // clamp bounds
      pos.x = U.clamp(pos.x, 1+radius, C.map.w-2-radius);
      pos.y = U.clamp(pos.y, 1+radius, C.map.h-2-radius);
    },
    circleHitsWall(x,y,r){
      const minX = Math.floor(x - r), maxX = Math.floor(x + r);
      const minY = Math.floor(y - r), maxY = Math.floor(y + r);
      for(let ty=minY; ty<=maxY; ty++){
        for(let tx=minX; tx<=maxX; tx++){
          if(this.isWall(tx,ty)){
            // AABB check
            const cx = U.clamp(x, tx, tx+1);
            const cy = U.clamp(y, ty, ty+1);
            const dx = x - cx, dy = y - cy;
            if(dx*dx + dy*dy < r*r) return true;
          }
        }
      }
      return false;
    }
  };

  /* ===================== Entities ===================== */
  const E = {
    player: null,
    mobs: [],
    drops: [],
    timers: { atkCd: 0 },
    fx: { atk: 0 },

    spawnPlayer(){
      const r0 = MapGen.rooms[0] || {cx:C.map.w/2, cy:C.map.h/2};
      this.player = {
        x: r0.cx, y: r0.cy,
        r: C.player.r,
        hp: C.player.hp, max: C.player.max,
        spd: C.player.spd,
        gold: 0,
        inv: { white:0, blue:0, yellow:0 }
      };
    },

    spawnMobs(){
      this.mobs.length = 0;
      const rooms = MapGen.rooms.slice(1);
      const pickRooms = rooms.length ? rooms : [ {cx:C.map.w/2, cy:C.map.h/2} ];
      for(let p=0; p<C.mobs.packCount; p++){
        const rr = U.pick(pickRooms);
        const count = U.rndi(C.mobs.packSizeMin, C.mobs.packSizeMax);
        for(let i=0;i<count;i++){
          const id = U.uid();
          this.mobs.push({
            id,
            x: rr.cx + U.rnd(-2.2, 2.2),
            y: rr.cy + U.rnd(-2.2, 2.2),
            r: 0.35,
            hp: C.mobs.hp,
            max: C.mobs.hp,
            spd: C.mobs.spd * U.rnd(0.9, 1.15),
          });
        }
      }
    },

    dropAt(x,y){
      const it = weightedPick(C.drops.types);
      this.drops.push({
        id: U.uid(),
        x, y,
        key: it.key,
        name: it.name,
        t: 0,
      });
    },

    attack(){
      if(this.timers.atkCd > 0) return;
      this.timers.atkCd = C.combat.cd;
      this.fx.atk = 1.0;

      const p = this.player;
      const r = C.combat.atkR;
      const dmg = C.combat.dmg;

      for(const m of this.mobs){
        const dx = m.x - p.x, dy = m.y - p.y;
        if(dx*dx + dy*dy <= r*r){
          m.hp -= dmg;
          if(m.hp <= 0){
            // drop
            if(Math.random() < C.drops.chance) this.dropAt(m.x, m.y);
          }
        }
      }

      // remove dead
      this.mobs = this.mobs.filter(m => m.hp > 0);
    },

    pickup(){
      const p = this.player;
      const R = C.player.pickupR;
      const keep = [];
      for(const d of this.drops){
        const dx = d.x - p.x, dy = d.y - p.y;
        if(dx*dx + dy*dy <= R*R){
          p.inv[d.key]++;
        }else{
          keep.push(d);
        }
      }
      this.drops = keep;
    },

    update(dt, mv){
      const p = this.player;
      this.timers.atkCd = Math.max(0, this.timers.atkCd - dt);
      this.fx.atk = Math.max(0, this.fx.atk - dt*2.6);

      // player move with collision
      const vel = { x: mv.x * p.spd * mv.mag, y: mv.y * p.spd * mv.mag };
      Phys.slideMoveCircle(p, vel, p.r, dt);

      // mobs AI: chase if in aggro radius (simple)
      const ar = C.mobs.aggroR;
      for(const m of this.mobs){
        const dx = p.x - m.x, dy = p.y - m.y;
        const dd = dx*dx + dy*dy;
        if(dd < ar*ar){
          const n = U.norm(dx,dy);
          const vx = n.x * m.spd;
          const vy = n.y * m.spd;
          Phys.slideMoveCircle(m, {x:vx,y:vy}, m.r, dt);
        }
      }

      // separation (mob vs mob) - light weight
      const sepR = C.mobs.sepR;
      const sepK = C.mobs.sepK;
      for(let i=0;i<this.mobs.length;i++){
        for(let j=i+1;j<this.mobs.length;j++){
          const a = this.mobs[i], b = this.mobs[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.hypot(dx,dy);
          if(d > 0 && d < sepR){
            const push = (sepR - d) * 0.5 * sepK * dt;
            const nx = dx / d, ny = dy / d;
            // push apart, but keep in walkable areas by collision move step
            a.x -= nx * push; a.y -= ny * push;
            b.x += nx * push; b.y += ny * push;
          }
        }
      }

      // drop timers
      for(const d of this.drops) d.t += dt;

      // auto pickup
      this.pickup();
    }
  };

  /* ===================== Rendering ===================== */
  const R = {
    iso(wx, wy, camX, camY){
      const TW = C.map.tw, TH = C.map.th;
      const sx  = (wx - wy) * (TW/2);
      const sy  = (wx + wy) * (TH/2);
      const csx = (camX - camY) * (TW/2);
      const csy = (camX + camY) * (TH/2);
      return { x: (sx - csx) + Gfx.w/2, y: (sy - csy) + Gfx.h/2 };
    },

    drawTileDiamond(ctx, x, y, colorA, colorB){
      const TW = C.map.tw, TH = C.map.th;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + TW/2, y + TH/2);
      ctx.lineTo(x, y + TH);
      ctx.lineTo(x - TW/2, y + TH/2);
      ctx.closePath();
      ctx.fillStyle = colorA;
      ctx.fill();
      if(C.render.tileOutline){
        ctx.strokeStyle = colorB;
        ctx.stroke();
      }
    },

    draw(){
      const ctx = Gfx.ctx;
      const p = E.player;
      const camX = p.x, camY = p.y;

      // background
      ctx.fillStyle = "#0f0f14";
      ctx.fillRect(0,0,Gfx.w,Gfx.h);

      // visible tile bounds around camera
      const TW = C.map.tw, TH = C.map.th;
      const Rpad = C.render.maxTilesPad;
      const Rrad = Math.ceil(Math.max(Gfx.w/TW, Gfx.h/TH)) + Rpad;
      const minX = Math.max(0, Math.floor(camX - Rrad));
      const maxX = Math.min(C.map.w-1, Math.ceil(camX + Rrad));
      const minY = Math.max(0, Math.floor(camY - Rrad));
      const maxY = Math.min(C.map.h-1, Math.ceil(camY + Rrad));

      // draw floor/walls (simple height illusion: walls darker)
      for(let y=minY; y<=maxY; y++){
        for(let x=minX; x<=maxX; x++){
          const pos = this.iso(x, y, camX, camY);
          const t = MapGen.tiles[x + y*C.map.w];
          if(t === 0){
            const a = ((x+y)&1) ? "#1f1f27" : "#252531";
            this.drawTileDiamond(ctx, pos.x, pos.y, a, "#00000022");
          }else{
            // wall: draw diamond + small "top" highlight
            this.drawTileDiamond(ctx, pos.x, pos.y, "#171722", "#00000033");
            ctx.globalAlpha = 0.6;
            ctx.fillStyle = "#0d0d14";
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x + TW/2, pos.y + TH/2);
            ctx.lineTo(pos.x, pos.y + TH/2);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        }
      }

      // depth-sorted entities by (x+y)
      const ents = [];
      for(const m of E.mobs) ents.push({k:m.x+m.y, type:"mob", ref:m});
      for(const d of E.drops) ents.push({k:d.x+d.y+0.001, type:"drop", ref:d});
      ents.push({k:p.x+p.y+0.002, type:"player", ref:p});
      ents.sort((a,b)=>a.k-b.k);

      // clear labels
      UI.clearLabels();

      // draw entities
      for(const e of ents){
        if(e.type === "mob") this.drawMob(ctx, e.ref, camX, camY);
        if(e.type === "drop") this.drawDrop(ctx, e.ref, camX, camY);
        if(e.type === "player") this.drawPlayer(ctx, e.ref, camX, camY);
      }

      // attack FX
      if(E.fx.atk > 0){
        const a = E.fx.atk;
        const pos = this.iso(p.x, p.y, camX, camY);
        ctx.globalAlpha = 0.35 * a;
        ctx.strokeStyle = "#ffd29b";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y + TH/2, 22 + (1-a)*30, 0, Math.PI*2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    },

    drawPlayer(ctx, p, camX, camY){
      const TH = C.map.th;
      const pos = this.iso(p.x, p.y, camX, camY);
      // shadow
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(pos.x, pos.y + TH/2 + 10, 13, 7, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.fillStyle = "#7CFF5E";
      ctx.beginPath();
      ctx.arc(pos.x, pos.y + TH/2, 10, 0, Math.PI*2);
      ctx.fill();

      // tiny highlight
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(pos.x-3, pos.y + TH/2 - 3, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    },

    drawMob(ctx, m, camX, camY){
      const TH = C.map.th;
      const pos = this.iso(m.x, m.y, camX, camY);

      // shadow
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(pos.x, pos.y + TH/2 + 9, 11, 6, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.fillStyle = "#FF3B3B";
      ctx.beginPath();
      ctx.arc(pos.x, pos.y + TH/2, 8, 0, Math.PI*2);
      ctx.fill();

      // HP bar
      const w = 22, h = 4;
      const t = U.clamp(m.hp / m.max, 0, 1);
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(pos.x - w/2, pos.y + TH/2 - 18, w, h);
      ctx.fillStyle = "rgba(255,80,80,0.95)";
      ctx.fillRect(pos.x - w/2, pos.y + TH/2 - 18, w*t, h);
    },

    drawDrop(ctx, d, camX, camY){
      const TH = C.map.th;
      const pos = this.iso(d.x, d.y, camX, camY);

      const col = d.key === "white" ? "#DADADA" : d.key === "blue" ? "#4AA3FF" : "#FFD24A";
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.85;
      ctx.fillRect(pos.x-3, pos.y + TH/2 - 3, 6, 6);
      ctx.globalAlpha = 1;

      // label
      const floatY = Math.sin(d.t*3) * 4;
      UI.addLabel(d.id, d.key, d.name, pos.x, pos.y + TH/2 - 18 + floatY);
    }
  };

  /* ===================== UI ===================== */
  const UI = {
    labelMap: new Map(),

    flashAtk(){
      const el = DOM.atkPulse;
      el.style.opacity = "1";
      el.style.borderColor = "rgba(255,220,160,0.65)";
      el.style.boxShadow = "0 0 24px rgba(255,190,110,0.35)";
      setTimeout(()=>{
        el.style.opacity = "0";
        el.style.borderColor = "rgba(255,220,160,0)";
        el.style.boxShadow = "0 0 0 rgba(255,190,110,0)";
      }, 90);
    },

    openPanel(){
      DOM.panelMask.style.display = "block";
      DOM.panelMask.setAttribute("aria-hidden","false");
      this.renderPanel("overview");
    },
    closePanel(){
      DOM.panelMask.style.display = "none";
      DOM.panelMask.setAttribute("aria-hidden","true");
    },

    setTab(tabKey){
      for(const t of DOM.tabs){
        const on = t.dataset.tab === tabKey;
        t.classList.toggle("on", on);
      }
      this.renderPanel(tabKey);
    },

    renderPanel(tabKey){
      const p = E.player;
      if(tabKey === "overview"){
        DOM.panelMain.innerHTML = `
          <div style="font-weight:900;font-size:16px;margin-bottom:10px;">POE 맵핑 시뮬레이터 (베이스)</div>
          <div style="opacity:.9;line-height:1.55">
            <div>• 방+통로 맵 생성</div>
            <div>• 벽 충돌(플레이어/몹)</div>
            <div>• 몹 팩 스폰 + 겹침 방지</div>
            <div>• 공격(원형 범위) + 처치</div>
            <div>• 드랍(흰/파/노) + 라벨 + 자동 줍기</div>
            <div>• 사각 미니맵(벽/플레이어)</div>
          </div>
          <hr style="border:none;border-top:1px solid rgba(255,255,255,0.10);margin:12px 0;">
          <div style="font-weight:900;margin-bottom:8px;">인벤(임시)</div>
          <div>흰템: <b>${p.inv.white}</b></div>
          <div>매직: <b>${p.inv.blue}</b></div>
          <div>레어: <b>${p.inv.yellow}</b></div>
          <div style="height:10px"></div>
          <button id="btnRegen" style="padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.16);background:rgba(255,255,255,0.10);color:#fff;font-weight:900;">맵 재생성</button>
        `;
        const b = document.getElementById("btnRegen");
        if(b) b.onclick = ()=>Game.reset();
      }
      if(tabKey === "debug"){
        DOM.panelMain.innerHTML = `
          <div style="font-weight:900;font-size:16px;margin-bottom:10px;">디버그</div>
          <div>몹 수: <b>${E.mobs.length}</b></div>
          <div>드랍 수: <b>${E.drops.length}</b></div>
          <div>플레이어 좌표: <b>${E.player.x.toFixed(2)}, ${E.player.y.toFixed(2)}</b></div>
          <div style="height:10px"></div>
          <div style="opacity:.9">※ 블랙스크린 방지: resize/loop 안전 처리 포함</div>
        `;
      }
      if(tabKey === "todo"){
        DOM.panelMain.innerHTML = `
          <div style="font-weight:900;font-size:16px;margin-bottom:10px;">TODO (다음 단계)</div>
          <div style="line-height:1.6;opacity:.9">
            <div>1) 몹 팩 타입(일반/매직/레어) + 오라</div>
            <div>2) 장비/어픽스/태그 시스템(POE식)</div>
            <div>3) 바닥 필터(숨김/강조)</div>
            <div>4) 미니맵 확대/축소</div>
            <div>5) 스킬 1개(쿨/애니) 확장</div>
          </div>
        `;
      }
    },

    // Labels: recreate per frame (simple, stable)
    clearLabels(){
      // recycle nodes
      for(const [,node] of this.labelMap){
        node.style.display = "none";
      }
    },
    addLabel(id, rarityKey, text, x, y){
      let node = this.labelMap.get(id);
      if(!node){
        node = document.createElement("div");
        node.className = "label " + rarityKey;
        node.textContent = text;
        DOM.labels.appendChild(node);
        this.labelMap.set(id, node);
      }
      node.style.display = "block";
      node.className = "label " + rarityKey;
      node.textContent = text;
      node.style.left = x + "px";
      node.style.top  = y + "px";
    },

    drawLife(){
      const p = E.player;
      const pct = p.max > 0 ? U.clamp(p.hp / p.max, 0, 1) : 0;

      const level = 100 - pct * 100;
      DOM.lifeFill.setAttribute("y", String(level));
      DOM.lifeFill.setAttribute("height", String(110 - level));

      const amp = 2.2;
      const phase = (performance.now()/1000) * 2.4;
      const y0 = level;
      const step = 6;
      let d = `M 0 ${y0}`;
      for(let x=0; x<=100; x+=step){
        const t = x / 14;
        const yy = y0 + Math.sin(t + phase) * amp;
        d += ` L ${x} ${yy}`;
      }
      d += ` L 100 110 L 0 110 Z`;
      DOM.lifeWave.setAttribute("d", d);

      DOM.lifeNow.textContent = String(Math.floor(p.hp));
      DOM.lifeDen.textContent = `/ ${Math.floor(p.max)}`;
    },

    drawMini(){
      const ctx = Mini.ctx;
      const w = Mini.w, h = Mini.h;
      ctx.clearRect(0,0,w,h);

      // background
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0,0,w,h);

      // draw walls as pixels (downsampled)
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = "rgba(255,255,255,0.12)";
      // step for speed
      const step = 2;
      const sx = w / C.map.w;
      const sy = h / C.map.h;
      for(let y=0;y<C.map.h;y+=step){
        for(let x=0;x<C.map.w;x+=step){
          if(MapGen.tiles[x + y*C.map.w] === 1){
            ctx.fillRect(x*sx, y*sy, Math.max(1,sx*step), Math.max(1,sy*step));
          }
        }
      }
      ctx.globalAlpha = 1;

      // player
      const px = (E.player.x / (C.map.w-1)) * w;
      const py = (E.player.y / (C.map.h-1)) * h;
      ctx.fillStyle = "rgba(124,255,94,0.95)";
      ctx.beginPath(); ctx.arc(px, py, 3*Mini.dpr, 0, Math.PI*2); ctx.fill();

      // vignette
      const g = ctx.createRadialGradient(w*0.5,h*0.5,Math.min(w,h)*0.12,w*0.5,h*0.5,Math.max(w,h)*0.8);
      g.addColorStop(0,"rgba(255,255,255,0.03)");
      g.addColorStop(0.65,"rgba(0,0,0,0)");
      g.addColorStop(1,"rgba(0,0,0,0.60)");
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);
    }
  };

  /* ===================== Game loop (fixed timestep) ===================== */
  const Game = {
    acc: 0,
    last: 0,
    step: 1/60,
    maxFrame: 0.05,

    reset(){
      // regenerate world
      MapGen.generate();
      E.spawnPlayer();
      E.spawnMobs();
      E.drops.length = 0;
      UI.setTab("overview");
    },

    init(){
      Gfx.resize();
      Mini.resize();
      Input.init();

      // menu
      DOM.menuBtn.addEventListener("pointerdown", (e)=>{ UI.openPanel(); e.preventDefault(); }, {passive:false});
      DOM.panelClose.addEventListener("click", ()=>UI.closePanel());
      DOM.panelMask.addEventListener("click", (e)=>{ if(e.target === DOM.panelMask) UI.closePanel(); });

      // tabs
      for(const t of DOM.tabs){
        t.addEventListener("click", ()=>UI.setTab(t.dataset.tab));
      }

      window.addEventListener("resize", ()=>{
        Gfx.resize();
        Mini.resize();
        Input.updateJoyGeom();
      });

      this.reset();

      this.last = performance.now();
      requestAnimationFrame((t)=>this.frame(t));
    },

    frame(now){
      const dt = Math.min(this.maxFrame, (now - this.last) / 1000);
      this.last = now;
      this.acc += dt;

      // input sampling
      const mv = Input.moveVec();
      if(Input.wantAttack){
        Input.wantAttack = false;
        E.attack();
      }

      while(this.acc >= this.step){
        E.update(this.step, mv);
        this.acc -= this.step;
      }

      // render
      R.draw();
      UI.drawMini();
      UI.drawLife();

      requestAnimationFrame((t)=>this.frame(t));
    }
  };

  // Boot
  Game.init();

})();
</script>
</body>
