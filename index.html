<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Iso POE Skeleton - Non Overlap Entities (Maintainable)</title>
<style>
  :root { --bg:#0f0f12; --panel:#17171c; --panel2:#1f1f26; --line:#2b2b33; --txt:#e8e8ea; --muted:#a7a7b0; }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden;}
  #wrap{position:fixed;inset:0;display:flex;}
  #left{flex:1;position:relative; touch-action:none;}
  #game{position:absolute;inset:0;display:block;background:#111;}
  #ui{width:360px;max-width:44vw;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;}
  .section{padding:12px 12px 8px;border-bottom:1px solid var(--line);}
  .title{font-size:13px;color:var(--muted);margin:0 0 8px 0;display:flex;justify-content:space-between;gap:10px}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .slot{
    width:76px;height:40px;background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;cursor:pointer;user-select:none;
    padding:4px;box-sizing:border-box;text-align:center;line-height:1.1;
  }
  .slot.empty{color:#7a7a86}
  .slot.sel{outline:2px solid #d6d6ff; outline-offset:1px;}
  .slot.bad{outline:2px solid #ff5a5a; outline-offset:1px;}
  .grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:8px;}
  .small{font-size:12px;color:var(--muted);line-height:1.35;white-space:pre-line}
  #log{height:120px;overflow:auto;background:#101015;border-top:1px solid var(--line);padding:10px;font-size:12px;color:#d2d2d9;}
  #hint{font-size:12px;color:var(--muted);padding:10px 12px;}
  .pill{padding:2px 8px;border:1px solid var(--line);border-radius:999px;background:#121218;font-size:12px;color:var(--muted)}

  /* Mobile joystick overlay */
  #touchUI{position:absolute;inset:0;pointer-events:none;}
  .joyBase{
    position:absolute;left:18px;bottom:18px;
    width:150px;height:150px;border-radius:50%;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    display:none;
  }
  .joyKnob{
    position:absolute;left:50%;top:50%;
    width:68px;height:68px;border-radius:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
  }
  .atkBtn{
    position:absolute;right:18px;bottom:28px;
    width:110px;height:110px;border-radius:50%;
    background:rgba(255,80,80,0.20);
    border:2px solid rgba(255,80,80,0.35);
    display:none;
    align-items:center;justify-content:center;
    color:#ffd7d7;font-weight:700;
    text-shadow:0 1px 0 rgba(0,0,0,0.35);
    pointer-events:auto;
    touch-action:none;
  }
  .atkBtn:active{transform:scale(0.98)}
  .mobileOnly{display:none;}
  @media (pointer:coarse){
    .joyBase,.atkBtn{display:flex;}
    #hint .mobileOnly{display:inline;}
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="left">
    <canvas id="game"></canvas>
    <div id="touchUI">
      <div class="joyBase" id="joyBase"><div class="joyKnob" id="joyKnob"></div></div>
      <div class="atkBtn" id="atkBtn">ATTACK</div>
    </div>
  </div>

  <div id="ui">
    <div class="section">
      <div class="title">
        <span>스탯 / 디버그</span>
        <span class="pill" id="seedPill"></span>
      </div>
      <div class="small" id="statsText"></div>
    </div>

    <div class="section">
      <div class="title">
        <span>장비 (Equipment)</span>
        <span class="pill" id="cursorPill">cursor: 없음</span>
      </div>
      <div class="row" id="equipRow"></div>
    </div>

    <div class="section">
      <div class="title"><span>인벤 (Inventory)</span><span class="pill">4×5</span></div>
      <div class="grid" id="invGrid"></div>
    </div>

    <div class="section">
      <div class="title"><span>바닥 (Ground)</span><span class="pill" id="groundCount"></span></div>
      <div class="row" id="groundRow"></div>
    </div>

    <div id="hint">
      이동: WASD/방향키 또는 좌측 조이스틱<span class="mobileOnly"> (모바일)</span><br>
      몬스터: 서로 겹치지 않음(원 충돌 + 공간해시 + 분리 해결)<br>
      공격: 우측 ATTACK 버튼(로그)
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
/* =========================================================
   유지보수 쉬운 "겹침 방지" 규칙
   - 월드좌표에서만 충돌
   - 엔티티 모양: 원(r) 통일
   - 이동: tryMoveEntity() 단일
   - 겹침 해소: resolveOverlaps() 단일
   - 이웃 탐색: spatial hash 단일
========================================================= */

/* =========================
   Utilities / RNG
========================= */
function mulberry32(a){ return function(){ let t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; } }
function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function len2(x,y){ return Math.hypot(x,y); }

const LOG_MAX = 200;
function log(msg){
  const el = document.getElementById("log");
  const t = new Date();
  const line = `[${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}:${String(t.getSeconds()).padStart(2,"0")}] ${msg}`;
  const div = document.createElement("div");
  div.textContent = line;
  el.appendChild(div);
  while(el.childNodes.length > LOG_MAX) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

/* =========================
   Item / Container (unchanged)
========================= */
function makeItem({name, baseType, slot, rarity="normal", ilvl=1, tags=[], affixes=[]}){
  return { id: uid(), name, baseType, slot, rarity, ilvl, tags, affixes };
}
function makeContainer({kind, size, slotKeys=null, rules}){
  const slots = slotKeys ? Object.fromEntries(slotKeys.map(k => [k, null])) : Array(size).fill(null);
  return { kind, slots, rules };
}
const Rules = {
  any: { canPlace: () => true },
  equipment: { canPlace: (item, _to, key) => (!item) ? true : (item.slot === key) }
};
function getSlot(container, key){ return container.slots[key]; }
function setSlot(container, key, value){ container.slots[key] = value; }
function moveItem(fromC, fromKey, toC, toKey){
  const item = getSlot(fromC, fromKey);
  if(!item) return false;
  if(!toC.rules.canPlace(item, toC, toKey)) return false;
  const dst = getSlot(toC, toKey);
  if(dst && !fromC.rules.canPlace(dst, fromC, fromKey)) return false;
  setSlot(fromC, fromKey, dst || null);
  setSlot(toC, toKey, item);
  return true;
}

/* =========================
   Stats
========================= */
function collectModifiersFromItem(item){
  const mods = [];
  if(!item) return mods;
  for(const af of (item.affixes||[])){
    for(const s of (af.stats||[])) mods.push(s);
  }
  return mods;
}
function recomputeStats(state){
  const out = {...state.player.baseStats};
  const eq = state.containers.equipment;
  for(const key of Object.keys(eq.slots)){
    const item = eq.slots[key];
    for(const m of collectModifiersFromItem(item)){
      out[m.k] = (out[m.k] ?? 0) + m.v;
    }
  }
  state.player.stats = out;
}

/* =========================
   Entities (circle collider)
========================= */
function makeEntity({kind, x, y, r, speed=0, hp=1}){
  return { id: uid(), kind, x, y, r, vx:0, vy:0, speed, hp };
}

/* =========================
   Spatial Hash (single, simple)
   - cellSize in world units (tiles)
========================= */
function makeSpatialHash(cellSize){
  return { cellSize, buckets: new Map() };
}
function hashKey(ix, iy){ return (ix<<16) ^ (iy & 0xffff); }
function shClear(sh){ sh.buckets.clear(); }
function shInsert(sh, e){
  const cs = sh.cellSize;
  const ix = Math.floor(e.x / cs);
  const iy = Math.floor(e.y / cs);
  const key = hashKey(ix,iy);
  let arr = sh.buckets.get(key);
  if(!arr){ arr = []; sh.buckets.set(key, arr); }
  arr.push(e);
}
function shQueryNeighbors(sh, e){
  const cs = sh.cellSize;
  const ix = Math.floor(e.x / cs);
  const iy = Math.floor(e.y / cs);
  const out = [];
  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){
      const key = hashKey(ix+dx, iy+dy);
      const arr = sh.buckets.get(key);
      if(arr) out.push(...arr);
    }
  }
  return out;
}

/* =========================
   Collision / Movement (maintainable)
========================= */
function tryMoveEntity(state, e, dx, dy){
  // No walls yet: just clamp to map bounds using radius
  const minX = e.r, minY = e.r;
  const maxX = state.map.w - e.r;
  const maxY = state.map.h - e.r;
  e.x = clamp(e.x + dx, minX, maxX);
  e.y = clamp(e.y + dy, minY, maxY);
}

function resolveOverlaps(state, iterations=3){
  // Build spatial hash for fast neighbor queries
  const sh = state.spatial;
  for(let it=0; it<iterations; it++){
    shClear(sh);
    for(const e of state.entities) shInsert(sh, e);

    let movedAny = false;

    for(const e of state.entities){
      const neighbors = shQueryNeighbors(sh, e);
      for(const o of neighbors){
        if(o === e) continue;
        // handle each pair once by id order (stable)
        if(o.id <= e.id) continue;

        const dx = o.x - e.x;
        const dy = o.y - e.y;
        const dist = Math.hypot(dx,dy);
        const minDist = e.r + o.r;

        if(dist > 0 && dist < minDist){
          const overlap = (minDist - dist);
          const nx = dx / dist;
          const ny = dy / dist;
          // push equally
          const push = overlap * 0.5;
          tryMoveEntity(state, e, -nx * push, -ny * push);
          tryMoveEntity(state, o,  nx * push,  ny * push);
          movedAny = true;
        }else if(dist === 0){
          // exact same position: deterministic nudge by id bits
          const angle = ((parseInt(e.id.slice(-4),16) ^ parseInt(o.id.slice(-4),16)) % 360) * Math.PI/180;
          const nx = Math.cos(angle), ny = Math.sin(angle);
          const push = 0.01;
          tryMoveEntity(state, e, -nx*push, -ny*push);
          tryMoveEntity(state, o,  nx*push,  ny*push);
          movedAny = true;
        }
      }
    }

    if(!movedAny) break; // early exit keeps it fast & stable
  }
}

/* =========================
   State
========================= */
const seed = (Date.now() ^ (Math.random()*1e9)) >>> 0;
const rnd = mulberry32(seed);

const state = {
  seed, rnd, time:0,
  map: { w: 120, h: 120, tw: 64, th: 32 },
  player: { x: 60, y: 60, speed: 6.0, baseStats:{life:100, armor:0, dmg:8, move:0}, stats:{} },
  // entities includes player + monsters (circles)
  entities: [],
  spatial: makeSpatialHash(2.0), // 2 tiles per cell (tune)
  containers: {
    equipment: makeContainer({ kind:"equipment", slotKeys:["weapon","helm","chest","ring"], rules: Rules.equipment }),
    inventory: makeContainer({ kind:"inventory", size: 20, rules: Rules.any }),
    ground:    makeContainer({ kind:"ground",    size: 10, rules: Rules.any })
  },
  cursor: { from:null, key:null }
};

document.getElementById("seedPill").textContent = `seed: ${seed}`;

// Seed items
function aff(stats){ return { stats }; }
setSlot(state.containers.ground, 0, makeItem({ name:"Rusty Sword", baseType:"sword", slot:"weapon", rarity:"magic", ilvl:1, tags:["weapon"], affixes:[ aff([{k:"dmg", v:6}]) ] }));
setSlot(state.containers.ground, 1, makeItem({ name:"Leather Cap", baseType:"helm", slot:"helm", rarity:"magic", ilvl:1, tags:["helm"], affixes:[ aff([{k:"life", v:18}]) ] }));
setSlot(state.containers.ground, 2, makeItem({ name:"Chain Shirt", baseType:"chest", slot:"chest", rarity:"rare",  ilvl:2, tags:["chest"], affixes:[ aff([{k:"armor", v:12}]), aff([{k:"life", v:22}]) ] }));
setSlot(state.containers.ground, 3, makeItem({ name:"Iron Ring", baseType:"ring", slot:"ring", rarity:"magic", ilvl:1, tags:["ring"], affixes:[ aff([{k:"life", v:10}]), aff([{k:"move", v:6}]) ] }));

recomputeStats(state);

// Create entities
const playerEnt = makeEntity({kind:"player", x:state.player.x, y:state.player.y, r:0.45, speed: state.player.speed, hp: 100});
state.entities.push(playerEnt);

// Spawn monsters (clustered to prove non-overlap)
function spawnMonsters(n){
  for(let i=0;i<n;i++){
    const angle = rnd()*Math.PI*2;
    const rad = 2.2 + rnd()*1.6; // near player
    const x = state.player.x + Math.cos(angle)*rad + (rnd()-0.5)*0.2;
    const y = state.player.y + Math.sin(angle)*rad + (rnd()-0.5)*0.2;
    const r = 0.38 + rnd()*0.08;
    state.entities.push(makeEntity({kind:"monster", x, y, r, speed: 2.2 + rnd()*0.6, hp: 20}));
  }
}
spawnMonsters(28);
// Resolve initial overlaps so nothing starts inside each other
resolveOverlaps(state, 6);

/* =========================
   UI
========================= */
function slotLabel(item){
  if(!item) return "";
  const r = item.rarity === "rare" ? "★" : item.rarity === "magic" ? "◆" : "•";
  return `${r} ${item.name}`;
}
function renderContainer(container, el, layout){
  el.innerHTML = "";
  const slots = container.slots;
  const entries = Array.isArray(slots)
    ? slots.map((v,i)=>[i,v])
    : Object.entries(slots).map(([k,v])=>[k,v]);

  for(const [key, item] of entries){
    const s = document.createElement("div");
    s.className = "slot" + (!item ? " empty" : "");
    s.dataset.kind = container.kind;
    s.dataset.key = key;
    s.textContent = item ? slotLabel(item) : (layout?.emptyLabel ? layout.emptyLabel(key) : String(key));
    el.appendChild(s);
  }
}
function getContainerByKind(kind){
  if(kind === "equipment") return state.containers.equipment;
  if(kind === "inventory") return state.containers.inventory;
  if(kind === "ground") return state.containers.ground;
}
function parseKey(container, raw){
  return Array.isArray(container.slots) ? Number(raw) : String(raw);
}
function clearSelection(){
  state.cursor.from = null; state.cursor.key = null;
  document.getElementById("cursorPill").textContent = "cursor: 없음";
}
function setSelection(kind, key){
  state.cursor.from = kind; state.cursor.key = key;
  const fromC = getContainerByKind(kind);
  const item = getSlot(fromC, key);
  document.getElementById("cursorPill").textContent = item ? `cursor: ${item.name}` : "cursor: (빈칸)";
}
function flashBad(kind, key){
  const node = document.querySelector(`.slot[data-kind="${kind}"][data-key="${key}"]`);
  if(!node) return;
  node.classList.add("bad");
  setTimeout(()=>node.classList.remove("bad"), 180);
}
function tryPlaceOrPick(clickedKind, clickedKey){
  const clickedC = getContainerByKind(clickedKind);
  const dstKey = clickedKey;

  if(state.cursor.from === null){
    const item = getSlot(clickedC, dstKey);
    if(item) setSelection(clickedKind, dstKey);
    return;
  }
  if(state.cursor.from === clickedKind && state.cursor.key === dstKey){
    clearSelection(); return;
  }

  const fromC = getContainerByKind(state.cursor.from);
  const ok = moveItem(fromC, state.cursor.key, clickedC, dstKey);
  if(ok){
    const moved = getSlot(clickedC, dstKey);
    log(`이동: ${moved?.name ?? "?"} → ${clickedKind}:${dstKey}`);
    clearSelection();
    recomputeStats(state);
  }else{
    flashBad(clickedKind, dstKey);
    log(`불가: ${state.cursor.from}:${state.cursor.key} → ${clickedKind}:${dstKey}`);
  }
}
function refreshUI(){
  renderContainer(state.containers.equipment, document.getElementById("equipRow"), { emptyLabel:(k)=>k.toUpperCase() });
  renderContainer(state.containers.inventory, document.getElementById("invGrid"), { emptyLabel:()=>"+" });
  renderContainer(state.containers.ground, document.getElementById("groundRow"), { emptyLabel:()=>"( )" });

  document.querySelectorAll(".slot").forEach(n=>n.classList.remove("sel"));
  if(state.cursor.from !== null){
    const n = document.querySelector(`.slot[data-kind="${state.cursor.from}"][data-key="${state.cursor.key}"]`);
    if(n) n.classList.add("sel");
  }

  const st = state.player.stats;
  const monsters = state.entities.filter(e=>e.kind==="monster").length;
  document.getElementById("statsText").textContent =
    `생명력: ${st.life}\n방어도: ${st.armor}\n피해: ${st.dmg}\n이동 보너스: ${st.move}%\n\n엔티티: ${state.entities.length} (몬스터 ${monsters})`;

  const gc = state.containers.ground.slots.filter(Boolean).length;
  document.getElementById("groundCount").textContent = `${gc}/10`;
}
document.getElementById("ui").addEventListener("click", (e)=>{
  const slot = e.target.closest(".slot");
  if(!slot) return;
  const kind = slot.dataset.kind;
  const c = getContainerByKind(kind);
  const key = parseKey(c, slot.dataset.key);
  tryPlaceOrPick(kind, key);
  refreshUI();
});
refreshUI();

/* =========================
   Mobile joystick (safe multitouch)
========================= */
const joy = { active:false, id:null, baseX:0, baseY:0, dx:0, dy:0, max:55 };
const joyBase = document.getElementById("joyBase");
const joyKnob = document.getElementById("joyKnob");
const atkBtn = document.getElementById("atkBtn");
const left = document.getElementById("left");

function setKnob(px,py){ joyKnob.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`; }
function resetJoy(){ joy.active=false; joy.id=null; joy.dx=0; joy.dy=0; setKnob(0,0); joyBase.style.display=""; }
function findTouchById(list, id){ for(const t of list){ if(t.identifier===id) return t; } return null; }
function anyActiveTouchStillDown(ev, id){ return !!findTouchById(ev.touches, id); }

left.addEventListener("touchstart", (e)=>{
  const rect = left.getBoundingClientRect();
  for(const t of e.changedTouches){
    const x = t.clientX - rect.left;
    const y = t.clientY - rect.top;
    const targetAtPoint = document.elementFromPoint(t.clientX, t.clientY);
    if(targetAtPoint && targetAtPoint.closest && targetAtPoint.closest("#atkBtn")) continue;
    if(x > rect.width * 0.6) continue;

    joy.active=true; joy.id=t.identifier; joy.baseX=x; joy.baseY=y;
    joyBase.style.left = (joy.baseX - 75) + "px";
    joyBase.style.top  = (joy.baseY - 75) + "px";
    joyBase.style.bottom = "auto";
    joyBase.style.display = "flex";
    setKnob(0,0);
    e.preventDefault();
    return;
  }
}, {passive:false});

left.addEventListener("touchmove", (e)=>{
  if(!joy.active) return;
  const rect = left.getBoundingClientRect();
  const t = findTouchById(e.touches, joy.id);
  if(!t) return;

  const x = t.clientX - rect.left;
  const y = t.clientY - rect.top;
  let px = x - joy.baseX;
  let py = y - joy.baseY;

  const dist = Math.hypot(px,py);
  const max = joy.max;
  if(dist > max){ px = px/dist*max; py = py/dist*max; }

  joy.dx = px/max;
  joy.dy = py/max;
  setKnob(px,py);
  e.preventDefault();
}, {passive:false});

left.addEventListener("touchend", (e)=>{
  if(!joy.active) return;
  const ended = findTouchById(e.changedTouches, joy.id);
  if(ended || !anyActiveTouchStillDown(e, joy.id)){
    resetJoy();
    e.preventDefault();
  }
}, {passive:false});

left.addEventListener("touchcancel", (e)=>{
  if(!joy.active) return;
  resetJoy();
  e.preventDefault();
}, {passive:false});

atkBtn.addEventListener("touchstart", (e)=>{
  log("ATTACK");
  e.preventDefault();
}, {passive:false});

/* =========================
   Rendering + camera follow + non-overlap sim
========================= */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  const uiW = document.getElementById("ui").offsetWidth;
  canvas.width = Math.floor(window.innerWidth - uiW);
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

function isoWithCamera(wx, wy, camX, camY){
  const TW = state.map.tw, TH = state.map.th;
  const sx = (wx - wy) * (TW/2);
  const sy = (wx + wy) * (TH/2);
  const csx = (camX - camY) * (TW/2);
  const csy = (camX + camY) * (TH/2);
  return {
    x: (sx - csx) + canvas.width/2,
    y: (sy - csy) + canvas.height/2
  };
}
function drawTile(x,y,camX,camY,color){
  const TW = state.map.tw, TH = state.map.th;
  const p = isoWithCamera(x,y,camX,camY);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x + TW/2, p.y + TH/2);
  ctx.lineTo(p.x, p.y + TH);
  ctx.lineTo(p.x - TW/2, p.y + TH/2);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function updateMonsters(dt){
  // simple "follow player" desired velocity (no jitter)
  for(const e of state.entities){
    if(e.kind !== "monster") continue;
    const dx = playerEnt.x - e.x;
    const dy = playerEnt.y - e.y;
    const d = Math.hypot(dx,dy);
    if(d > 0.001){
      const ux = dx/d, uy = dy/d;
      e.vx = ux * e.speed;
      e.vy = uy * e.speed;
    }else{
      e.vx = 0; e.vy = 0;
    }
  }
}

let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  state.time += dt;

  // Player input
  let dx = 0, dy = 0;
  if(keys["ArrowUp"]||keys["w"]) dy -= 1;
  if(keys["ArrowDown"]||keys["s"]) dy += 1;
  if(keys["ArrowLeft"]||keys["a"]) dx -= 1;
  if(keys["ArrowRight"]||keys["d"]) dx += 1;
  dx += joy.dx;
  dy += joy.dy;

  if(dx || dy){
    const L = Math.hypot(dx,dy) || 1;
    dx/=L; dy/=L;
    const spd = state.player.speed * (1 + (state.player.stats.move||0)/100);
    playerEnt.vx = dx * spd;
    playerEnt.vy = dy * spd;
  }else{
    playerEnt.vx = 0; playerEnt.vy = 0;
  }

  // AI
  updateMonsters(dt);

  // Integrate desired movement (world space)
  for(const e of state.entities){
    tryMoveEntity(state, e, e.vx * dt, e.vy * dt);
  }

  // Resolve overlaps (stable)
  resolveOverlaps(state, 3);

  // Keep state.player synced (for UI/stats convenience)
  state.player.x = playerEnt.x;
  state.player.y = playerEnt.y;

  // Camera follow player
  const camX = playerEnt.x;
  const camY = playerEnt.y;

  // Tile culling around player
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const R = 22;
  const minX = Math.max(0, Math.floor(camX - R));
  const maxX = Math.min(state.map.w-1, Math.ceil(camX + R));
  const minY = Math.max(0, Math.floor(camY - R));
  const maxY = Math.min(state.map.h-1, Math.ceil(camY + R));

  for(let y=minY;y<=maxY;y++){
    for(let x=minX;x<=maxX;x++){
      drawTile(x,y,camX,camY,(x+y)%2 ? "#23232a" : "#2a2a33");
    }
  }

  // Depth-sort entities by (x+y) for iso overlap correctness
  const drawList = state.entities.slice().sort((a,b)=> (a.x+a.y) - (b.x+b.y));
  for(const e of drawList){
    const p = isoWithCamera(e.x, e.y, camX, camY);
    if(e.kind === "player"){
      ctx.fillStyle = "#ff3b3b";
      ctx.beginPath();
      ctx.arc(p.x, p.y + state.map.th/2, 12, 0, Math.PI*2);
      ctx.fill();
    }else{
      ctx.fillStyle = "#55aaff";
      ctx.beginPath();
      ctx.arc(p.x, p.y + state.map.th/2, 10, 0, Math.PI*2);
      ctx.fill();
    }
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
