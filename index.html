<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>미니 POE (구조형 프로토타입) v3</title>
<style>
  :root{
    --uiScale: 1.15;
    --uiH: clamp(calc(86px * var(--uiScale)), 16vh, calc(120px * var(--uiScale)));
    --pad: clamp(calc(64px * var(--uiScale)), 12vw, calc(92px * var(--uiScale)));
    --stick: clamp(calc(26px * var(--uiScale)), 5.4vw, calc(42px * var(--uiScale)));
    --btn: clamp(calc(68px * var(--uiScale)), 12.5vw, calc(92px * var(--uiScale)));
  }
  html,body{margin:0;background:#000;overflow:hidden;touch-action:none;font-family:system-ui,-apple-system,Segoe UI,Roboto;}
  canvas{position:fixed;left:0;top:0;image-rendering:pixelated;z-index:0;}

  #hud{
    position:fixed;left:0;top:0;right:0;display:flex;gap:10px;align-items:flex-start;
    padding:10px;pointer-events:none;z-index:30;
  }
  .panel{
    background:rgba(10,10,10,.75); border:1px solid rgba(255,255,255,.12);
    border-radius:10px; padding:10px 12px; color:#eee; backdrop-filter: blur(6px);
    pointer-events:none;
  }
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .bar{width:240px;max-width:48vw;height:14px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}
  .fill{height:100%}
  #log{max-width:52vw; font-size:12px; line-height:1.3; color:#d7d7d7}
#lootToggle{
  position:fixed; right:10px; top:10px;
  z-index:70;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(10,10,10,.55);
  color:#fff;
  font-weight:800;
}
#lootToggle:active{transform:scale(.99)}

  #ui{
  position:fixed; left:0; right:0; bottom:0;
  height:0;
  background:transparent;
  border:0;
  padding:0;
  pointer-events:auto; /* ✅ 자식(#movePad/#attackBtn) 이벤트 살아있게 */
  z-index:20;
}
  #movePad{
  position:fixed;
  left:18px;
  bottom:18px;
  width:var(--pad);height:var(--pad);
  border-radius:50%;
  background:transparent; /* 🔥 배경 박스 제거 */
  border:1px solid rgba(255,255,255,.14);
  pointer-events:auto;

  z-index:25;}
  #stick{
    position:absolute;left:calc(50% - var(--stick)/2);top:calc(50% - var(--stick)/2);
    width:var(--stick);height:var(--stick);border-radius:50%;
    background:rgba(255,255,255,.22); border:1px solid rgba(255,255,255,.18);
  }
  #attackBtn{
  position:fixed;
  right:18px;
  bottom:18px;
  width:var(--btn);height:var(--btn);
  border-radius:50%;
  background:rgba(200,40,40,.85); border:2px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;
  user-select:none; -webkit-user-select:none;
  pointer-events:auto;

  z-index:25;}
  #attackBtn:active{transform:scale(.98)}

  #lootPanel{
  display:none; /* 🔥 기본 숨김 */
  position:fixed; right:10px; top:52px; width:min(360px, 62vw);
  max-height:50vh; overflow:auto; padding:10px;
  background:rgba(10,10,10,.78); border:1px solid rgba(255,255,255,.12);
  border-radius:10px; color:#eee; font-size:12px;
  z-index:60;
}
  #lootPanel h3{margin:0 0 6px 0; font-size:13px; opacity:.9}
  .lootItem{padding:6px 8px; border:1px solid rgba(255,255,255,.10); border-radius:8px; margin:6px 0; cursor:pointer}
  .lootItem:active{transform:scale(.99)}
  .rarity-normal{color:#cfcfcf}
  .rarity-magic{color:#68a8ff}
  .rarity-rare{color:#f2d35e}

  #choiceOverlay{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.65);
  }
  #choiceBox{
    width:min(520px, 92vw); background:rgba(15,15,15,.92);
    border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:14px;
    color:#eee;
  }
  #choiceBox h2{margin:0 0 10px 0; font-size:16px}
  .choice{
    padding:10px 12px; margin:10px 0; border-radius:12px;
    border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06);
    cursor:pointer;
  }
  .choice:active{transform:scale(.99)}
  .muted{opacity:.75}
</style>
</head>
<body>
<canvas id="c"></canvas>

<button id="lootToggle">드랍</button>

<div id="hud">
  <div class="panel">
    <div class="row" style="align-items:center">
      <div style="min-width:66px">생명력</div>
      <div class="bar"><div id="hpFill" class="fill" style="width:100%"></div></div>
      <div id="hpTxt" style="min-width:84px;text-align:right">100/100</div>
    </div>
    <div class="row" style="align-items:center;margin-top:8px">
      <div style="min-width:66px">경험치</div>
      <div class="bar"><div id="xpFill" class="fill" style="width:0%"></div></div>
      <div id="xpTxt" style="min-width:84px;text-align:right">0/20</div>
    </div>
    <div class="row muted" style="margin-top:8px;font-size:12px">
      <div id="statLine">Lv 1 · DPS 10 · MS 1.00 · Armor 0</div>
    </div>
  </div>

  <div class="panel" style="flex:1">
    <div style="font-weight:700;margin-bottom:6px">미니 POE (구조형)</div>
    <div id="log">PC: WASD 이동 / 터치·클릭 공격 · 모바일: 조이스틱+공격</div>
  </div>
</div>

<div id="lootPanel">
  <h3>드랍 아이템 (눌러서 장착)</h3>
  <div id="lootList"></div>
</div>

<div id="choiceOverlay">
  <div id="choiceBox">
    <h2>레벨업! 패시브를 하나 선택</h2>
    <div id="choices"></div>
    <div class="muted" style="font-size:12px;margin-top:8px">
      이 베이스는 “시스템 분리”가 핵심이라, 기능 추가해도 update가 안 꼬여.
    </div>
  </div>
</div>

<div id="ui">
  <div id="movePad"><div id="stick"></div></div>
  <div id="attackBtn">공격</div>
</div>

<script>
(() => {
  "use strict";
  let __stateReady = false;

  // =========================================================
  // 0) CORE: DOM / CANVAS / UTILS
  // =========================================================
  const DOM = {
    canvas: document.getElementById("c"),
    hpFill: document.getElementById("hpFill"),
    xpFill: document.getElementById("xpFill"),
    hpTxt:  document.getElementById("hpTxt"),
    xpTxt:  document.getElementById("xpTxt"),
    statLine: document.getElementById("statLine"),
    log: document.getElementById("log"),
    lootList: document.getElementById("lootList"),
    choiceOverlay: document.getElementById("choiceOverlay"),
    choices: document.getElementById("choices"),
    movePad: document.getElementById("movePad"),
    stick: document.getElementById("stick"),
    attackBtn: document.getElementById("attackBtn"),
  };

  const ctx = DOM.canvas.getContext("2d");

  const U = {
    clamp(v,a,b){ return Math.max(a, Math.min(b, v)); },
    len(x,y){ return Math.hypot(x,y); },
    norm(x,y){
      const l = Math.hypot(x,y) || 1;
      return {x:x/l, y:y/l, l};
    },
    rand(a,b){ return Math.random()*(b-a)+a; },
    randi(a,b){ return Math.floor(U.rand(a,b+1)); },
    pick(arr){ return arr[(Math.random()*arr.length)|0]; },
    pickWeighted(list){
      let s=0; for(const it of list) s+=it.w;
      let r=Math.random()*s;
      for(const it of list){ r-=it.w; if(r<=0) return it.v; }
      return list[list.length-1].v;
    },
    // circle vs AABB resolve
    circleRectResolve(c, r, rect){
      const nx = U.clamp(c.x, rect.x, rect.x+rect.w);
      const ny = U.clamp(c.y, rect.y, rect.y+rect.h);
      const dx = c.x - nx, dy = c.y - ny;
      const d2 = dx*dx + dy*dy;
      if(d2 <= r*r){
        const d = Math.sqrt(d2) || 0.001;
        const push = r - d;
        c.x += (dx/d)*push;
        c.y += (dy/d)*push;
        return true;
      }
      return false;
    },
  };

  const World = {
    W(){ return innerWidth; },
    H(){ return innerHeight; },
    resize(){
      DOM.canvas.width = innerWidth * devicePixelRatio;
      DOM.canvas.height = innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);      // 리사이즈 시 벽/플레이어 보정 (state 준비된 뒤에만)
      if(__stateReady){
        rebuildWalls();
        state.player.x = U.clamp(state.player.x, state.player.r, World.W()-state.player.r);
        state.player.y = U.clamp(state.player.y, state.player.r, World.H()-state.player.r);
      }
    }
  };
  addEventListener("resize", World.resize);

// 벽 배치(비율 기반 위치) — 화면 회전/리사이즈에도 충돌이 안 어긋나게
const WALL_LAYOUT = [
  {x:0.25, y:0.35, w:220, h:26},
  {x:0.55, y:0.55, w:26,  h:220},
  {x:0.20, y:0.72, w:260, h:26},
];

function rebuildWalls(){
  state.world.walls = WALL_LAYOUT.map(o => ({
    x: World.W()*o.x,
    y: World.H()*o.y,
    w: o.w,
    h: o.h
  }));
}

// =========================================================
// 1) GAME STATE: 한 군데에만 모음 (꼬임 방지 핵심)
: 한 군데에만 모음 (꼬임 방지 핵심)
  // =========================================================
  const state = {
    time: { last: performance.now(), dt: 0, now: 0 },
    paused: { forChoice: false },

    input: {
      keys: {w:0,a:0,s:0,d:0},
      mouse: {x: innerWidth*0.5, y: innerHeight*0.5, down:false},
      pad: {active:false, id:null, vx:0, vy:0},
      attackHeld: false,
    },

    player: {
      x: innerWidth*0.5, y: innerHeight*0.5, r: 14,
      hp: 100, hpMax: 100,
      xp: 0, xpNeed: 20, level: 1,
      msBase: 220, ms: 220,
      armor: 0,
      dmg: 10,
      crit: 0.05,
      atkCd: 0.33,
      atkTimer: 0,
      regen: 0.5,
      leech: 0.0,
      gear: { weapon: null, armor: null },
      thorns: 0,
    },

    world: {
      walls: [],
    },

    entities: {
      enemies: [],
      projectiles: [],
      drops: [],
      fx: [],
    },

    spawner: {
      t: 0,
    }
  };

  // =========================================================
  // 2) DATA TABLES (아이템/패시브 등 “내용”은 여기만)
  // =========================================================
  const Data = {
  rarityK: { normal:"일반", magic:"마법", rare:"희귀" },

  baseItems: {
    weapon: [
      {name:"녹슨 검",      dmgMin:2, dmgMax:6,  atkSpeed:1.00},
      {name:"철 검",        dmgMin:4, dmgMax:10, atkSpeed:1.00},
      {name:"투박한 도끼",  dmgMin:6, dmgMax:14, atkSpeed:0.90},
      {name:"단검",         dmgMin:3, dmgMax:8,  atkSpeed:1.25},
    ],
    armor: [
      {name:"천 조끼",      armor:4,  hp:0},
      {name:"가죽 조끼",    armor:8,  hp:10},
      {name:"사슬 조끼",    armor:14, hp:20},
    ]
  },

  prefixes: {
    weapon: [
      {name:"야만적인", mods:{dmgPct: 0.20}},
      {name:"날쌘",     mods:{atkSpdPct: 0.15}},
      {name:"예리한",   mods:{crit: 0.05}},
    ],
    armor: [
      {name:"튼튼한",   mods:{hp: 20}},
      {name:"견고한",   mods:{armor: 6}},
      {name:"활력의",   mods:{regen: 0.4}},
    ]
  },

  suffixes: {
    weapon: [
      {name:"학살의", mods:{dmgFlat: 3}},
      {name:"질주의", mods:{atkSpdPct: 0.10}},
      {name:"흡혈의", mods:{leech: 0.02}},
    ],
    armor: [
      {name:"황소의", mods:{hp: 25}},
      {name:"가시의", mods:{thorns: 3}},
      {name:"바람의", mods:{msPct: 0.08}},
    ]
  },

  passives: [
    {name:"+10 최대 생명력", apply(s){ s.player.hpMax+=10; s.player.hp=U.clamp(s.player.hp+10,1,s.player.hpMax); }},
    {name:"공격 피해 10% 증가", apply(s){ s.player.dmg = Math.round(s.player.dmg*1.10); }},
    {name:"공격 속도 10% 증가", apply(s){ s.player.atkCd = U.clamp(s.player.atkCd/1.10, 0.08, 0.8); }},
    {name:"이동 속도 8% 증가", apply(s){ s.player.ms *= 1.08; }},
    {name:"방어도 +6", apply(s){ s.player.armor += 6; }},
    {name:"초당 생명력 재생 +0.4", apply(s){ s.player.regen += 0.4; }},
    {name:"치명타 확률 +3%", apply(s){ s.player.crit = U.clamp(s.player.crit+0.03, 0, 0.6); }},
    {name:"적중 시 생명력 흡수 +1%", apply(s){ s.player.leech += 0.01; }},
  ],
};

// =========================================================
// 3) SYSTEMS: 기능 추가는 여기 “새 시스템”으로만
: 기능 추가는 여기 “새 시스템”으로만
  // =========================================================
  const Systems = {

    // ---------- Logging / HUD ----------
    UI: {
      log(msg){ DOM.log.textContent = msg; },

      updateHUD(s){
        const p=s.player;
        DOM.hpTxt.textContent = `${Math.floor(p.hp)}/${p.hpMax}`;
        DOM.hpFill.style.background = "linear-gradient(90deg, rgba(200,60,60,.95), rgba(255,120,120,.95))";
        DOM.hpFill.style.width = `${(p.hp/p.hpMax)*100}%`;

        DOM.xpTxt.textContent = `${p.xp}/${p.xpNeed}`;
        DOM.xpFill.style.background = "linear-gradient(90deg, rgba(90,170,255,.95), rgba(160,220,255,.95))";
        DOM.xpFill.style.width = `${(p.xp/p.xpNeed)*100}%`;

        DOM.statLine.textContent =
          `Lv ${p.level} · DPS ${p.dmg} · MS ${(p.ms/p.msBase).toFixed(2)} · Armor ${p.armor}`;
      },

      renderLoot(s){
        const drops = s.entities.drops;
        DOM.lootList.innerHTML = "";
        if(drops.length===0){
          DOM.lootList.innerHTML = `<div class="muted">아직 드랍 없음. 몬스터를 잡아봐!</div>`;
          return;
        }

        for(let i=0;i<drops.length;i++){
          const d = drops[i];
          const div = document.createElement("div");
          div.className = `lootItem rarity-${d.item.rarity}`;
          div.innerHTML = `
            <div style="font-weight:800">${d.item.name}</div>
            <div class="muted">${d.item.type==="weapon"?"무기":"방어구"} · ${Data.rarityK[d.item.rarity] || d.item.rarity}</div>
            <div style="margin-top:6px">${Systems.Items.itemLines(d.item).map(x=>`<div>${x}</div>`).join("")}</div>
          `;
          div.onclick = () => {
            Systems.Items.equip(s, d.item);
            drops.splice(i,1);
            Systems.UI.renderLoot(s);
          };
          DOM.lootList.appendChild(div);
        }
      },

      openChoices(s){
        s.paused.forChoice = true;
        DOM.choiceOverlay.style.display = "flex";
        DOM.choices.innerHTML = "";

        const opts=[];
        while(opts.length<3){
          const c = U.pick(Data.passives);
          if(!opts.includes(c)) opts.push(c);
        }

        for(const c of opts){
          const div=document.createElement("div");
          div.className="choice";
          div.innerHTML = `<div style="font-weight:800">${c.name}</div><div class="muted" style="font-size:12px;margin-top:4px">선택하면 바로 적용</div>`;
          div.onclick = () => {
            c.apply(s);
            // 패시브가 직접 건드린 이후, 장비 기반 스탯도 다시 정리
            Systems.Items.recalcStats(s);
            Systems.UI.updateHUD(s);
            DOM.choiceOverlay.style.display = "none";
            s.paused.forChoice = false;
            Systems.UI.log(`패시브 선택: ${c.name}`);
          };
          DOM.choices.appendChild(div);
        }
      }
    },

    // ---------- Input ----------
    Input: {
      init(s){
        addEventListener("keydown", (e)=>{
          const k=e.key.toLowerCase();
          if(k in s.input.keys) s.input.keys[k]=1;
        });
        addEventListener("keyup", (e)=>{
          const k=e.key.toLowerCase();
          if(k in s.input.keys) s.input.keys[k]=0;
        });

        addEventListener("pointermove", (e)=>{ s.input.mouse.x=e.clientX; s.input.mouse.y=e.clientY; });
        addEventListener("pointerdown", (e)=>{
          // UI(드랍/조이스틱/공격버튼) 누를 때는 공격 입력으로 처리하지 않기
          const uiHit = e.target && e.target.closest && e.target.closest("#lootPanel,#lootToggle,#movePad,#attackBtn");
          if(uiHit) return;
          s.input.mouse.down=true; s.input.mouse.x=e.clientX; s.input.mouse.y=e.clientY;
        });
        addEventListener("pointerup", ()=>{ s.input.mouse.down=false; s.input.attackHeld=false; });

        // mobile pad
        const pad = DOM.movePad;
        const stick = DOM.stick;

        function setStick(nx,ny){
          const r = pad.getBoundingClientRect();
          const cx = r.left + r.width/2;
          const cy = r.top  + r.height/2;
          const dx = nx - cx, dy = ny - cy;
          const max = r.width*0.36;
          const l = Math.hypot(dx,dy) || 1;
          const cl = Math.min(max, l);
          const sx = (dx/l)*cl, sy = (dy/l)*cl;
          stick.style.left = `calc(50% - var(--stick)/2 + ${sx}px)`;
          stick.style.top  = `calc(50% - var(--stick)/2 + ${sy}px)`;
          s.input.pad.vx = sx/max;
          s.input.pad.vy = sy/max;
        }
        function resetStick(){
          stick.style.left = `calc(50% - var(--stick)/2)`;
          stick.style.top  = `calc(50% - var(--stick)/2)`;
          s.input.pad.vx=0; s.input.pad.vy=0;
        }

        pad.addEventListener("pointerdown", (e)=>{
          s.input.pad.active=true; s.input.pad.id=e.pointerId;
          pad.setPointerCapture(e.pointerId);
          setStick(e.clientX, e.clientY);
        });
        pad.addEventListener("pointermove", (e)=>{
          if(!s.input.pad.active || e.pointerId!==s.input.pad.id) return;
          setStick(e.clientX, e.clientY);
        });
        pad.addEventListener("pointerup", (e)=>{
          if(e.pointerId!==s.input.pad.id) return;
          s.input.pad.active=false; s.input.pad.id=null;
          resetStick();
        });
        pad.addEventListener("pointercancel", ()=>{
          s.input.pad.active=false; s.input.pad.id=null;
          resetStick();
        });

        // mobile attack
        DOM.attackBtn.addEventListener("pointerdown", (e)=>{
          s.input.attackHeld = true;
          e.preventDefault();
        });
      },

      getMoveVector(s){
        const k=s.input.keys;
        let mx = (k.d-k.a);
        let my = (k.s-k.w);

        // mobile stick add
        mx += s.input.pad.vx;
        my += s.input.pad.vy;

        const n = U.norm(mx,my);
        if(n.l < 0.001) return {x:0,y:0};
        return {x:n.x, y:n.y};
      },

      isAttacking(s){
        return s.input.mouse.down || s.input.attackHeld;
      }
    },

    // ---------- Items / Gear ----------
    Items: {
      mergeMods(a,b){
        const out = {...a};
        for(const k in b) out[k] = (out[k]||0) + b[k];
        return out;
      },

      makeItem(type){
        const rarity = U.pickWeighted([{v:"normal",w:55},{v:"magic",w:35},{v:"rare",w:10}]);
        const base = U.pick(Data.baseItems[type]);
        const item = {
          type, rarity,
          baseName: base.name,
          name: base.name,
          base: JSON.parse(JSON.stringify(base)),
          prefix: null,
          suffix: null,
          mods: {},
        };

        if(rarity === "magic"){
          item.prefix = U.pick(Data.prefixes[type]);
          item.suffix = U.pick(Data.suffixes[type]);
        } else if(rarity === "rare"){
          const p1 = U.pick(Data.prefixes[type]);
          const p2 = Math.random()<0.5 ? U.pick(Data.prefixes[type]) : null;
          const s1 = U.pick(Data.suffixes[type]);
          item.prefix = p2 ? {name: p1.name+" "+p2.name, mods: Systems.Items.mergeMods(p1.mods, p2.mods)} : p1;
          item.suffix = s1;
        }

        if(item.prefix) item.mods = Systems.Items.mergeMods(item.mods, item.prefix.mods);
        if(item.suffix) item.mods = Systems.Items.mergeMods(item.mods, item.suffix.mods);

        if(item.rarity !== "normal"){
          item.name = `${item.prefix ? item.prefix.name+" " : ""}${base.name}${item.suffix ? " "+item.suffix.name : ""}`;
        }
        return item;
      },

      itemLines(item){
        const lines = [];
        if(item.type === "weapon"){
          lines.push(`기본 물리 피해: ${item.base.dmgMin}-${item.base.dmgMax}`);
          lines.push(`공격 속도: ${item.base.atkSpeed.toFixed(2)}`);
        } else {
          lines.push(`방어도: ${item.base.armor}`);
          if(item.base.hp) lines.push(`최대 생명력: +${item.base.hp}`);
        }

        const m=item.mods;
        if(m.dmgPct) lines.push(`물리 피해 ${Math.round(m.dmgPct*100)}% 증가`);
        if(m.dmgFlat) lines.push(`물리 피해 +${m.dmgFlat}`);
        if(m.atkSpdPct) lines.push(`공격 속도 ${Math.round(m.atkSpdPct*100)}% 증가`);
        if(m.crit) lines.push(`치명타 확률 +${Math.round(m.crit*100)}%`);
        if(m.hp) lines.push(`최대 생명력 +${m.hp}`);
        if(m.armor) lines.push(`방어도 +${m.armor}`);
        if(m.regen) lines.push(`초당 생명력 재생 +${m.regen.toFixed(2)}`);
        if(m.leech) lines.push(`적중 시 생명력 흡수 ${Math.round(m.leech*100)}%`);
        if(m.msPct) lines.push(`이동 속도 ${Math.round(m.msPct*100)}% 증가`);
        if(m.thorns) lines.push(`가시 피해 +${m.thorns}`);
        return lines;
      },

      equip(s, item){
        if(item.type==="weapon") s.player.gear.weapon=item;
        else s.player.gear.armor=item;

        Systems.Items.recalcStats(s);
        Systems.UI.updateHUD(s);
        Systems.UI.log(`장착: ${item.name}`);
      },

      recalcStats(s){
        const p=s.player;

        // base
        let dmg = 10;
        let atkCd = 0.33;
        let crit = 0.05;
        let ms = p.msBase;
        let armor = 0;
        let hpMax = 100;
        let regen = 0.5;
        let leech = 0.0;
        let thorns = 0;

        // weapon
        const w=p.gear.weapon;
        if(w){
          const baseAvg = (w.base.dmgMin + w.base.dmgMax)/2;
          dmg = baseAvg;
          atkCd = 0.55 / (w.base.atkSpeed);
          const m=w.mods;
          if(m.dmgPct) dmg *= (1+m.dmgPct);
          if(m.dmgFlat) dmg += m.dmgFlat;
          if(m.atkSpdPct) atkCd /= (1+m.atkSpdPct);
          if(m.crit) crit += m.crit;
          if(m.leech) leech += m.leech;
        }

        // armor
        const a=p.gear.armor;
        if(a){
          armor += a.base.armor || 0;
          hpMax += a.base.hp || 0;
          const m=a.mods;
          if(m.hp) hpMax += m.hp;
          if(m.armor) armor += m.armor;
          if(m.regen) regen += m.regen;
          if(m.msPct) ms *= (1+m.msPct);
          if(m.thorns) thorns += m.thorns;
        }

        // apply
        const oldMax=p.hpMax;
        p.dmg = Math.max(1, Math.round(dmg));
        p.atkCd = U.clamp(atkCd, 0.08, 0.8);
        p.crit = U.clamp(crit, 0.0, 0.6);
        p.ms = ms;
        p.armor = Math.round(armor);
        p.regen = regen;
        p.leech = leech;
        p.thorns = thorns;

        p.hpMax = Math.round(hpMax);
        p.hp = U.clamp(p.hp + (p.hpMax-oldMax), 1, p.hpMax);
      },

      addDrop(s, x,y){
        const type = Math.random()<0.6 ? "weapon" : "armor";
        const item = Systems.Items.makeItem(type);
        s.entities.drops.push({x,y,item,t:0});
        Systems.UI.renderLoot(s);
      }
    },

    // ---------- Player ----------
    Player: {
      update(s, dt){
        const p=s.player;

        // regen
        p.hp = U.clamp(p.hp + p.regen*dt, 1, p.hpMax);

        // move
        const mv = Systems.Input.getMoveVector(s);
        p.x += mv.x * p.ms * dt;
        p.y += mv.y * p.ms * dt;

        // bounds
        p.x = U.clamp(p.x, p.r, World.W()-p.r);
        p.y = U.clamp(p.y, p.r, World.H()-p.r);

        // wall collide
        for(const w of s.world.walls) U.circleRectResolve(p, p.r, w);

        // cooldown
        p.atkTimer = Math.max(0, p.atkTimer - dt);
      },

      takeDamage(s, amount){
        const p=s.player;
        p.hp -= amount;
        if(p.hp<=0){
          // prototype respawn
          p.hp = p.hpMax;
          p.x = World.W()*0.5;
          p.y = World.H()*0.5;
          p.xp = Math.max(0, p.xp - 10);
          Systems.UI.log("죽었다… (프로토타입: 리스폰) XP -10");
        }
      }
    },

    // ---------- Spawner / Enemies ----------
    Enemies: {
      spawnEnemy(s){
        const edge = U.randi(0,3);
        let x,y;
        if(edge===0){ x=U.rand(0,World.W()); y=-30; }
        if(edge===1){ x=World.W()+30; y=U.rand(0,World.H()); }
        if(edge===2){ x=U.rand(0,World.W()); y=World.H()+30; }
        if(edge===3){ x=-30; y=U.rand(0,World.H()); }

        const p=s.player;
        const hp = 20 + (p.level-1)*6;
        s.entities.enemies.push({
          x,y,r:12,
          hp, hpMax: hp,
          spd: 90 + (p.level-1)*6,
          dmg: 6 + (p.level-1)*1,
        });
      },

      update(s, dt){
        const es=s.entities.enemies;
        const p=s.player;

        // spawn control
        s.spawner.t += dt;
        const want = 5 + p.level*2;
        if(es.length < want && s.spawner.t > 0.45){
          s.spawner.t = 0;
          Systems.Enemies.spawnEnemy(s);
        }

        // move + attack
        for(const e of es){
          const dx=p.x-e.x, dy=p.y-e.y;
          const d=Math.hypot(dx,dy) || 1;
          e.x += (dx/d)*e.spd*dt;
          e.y += (dy/d)*e.spd*dt;

          // wall collide
          for(const w of s.world.walls) U.circleRectResolve(e, e.r, w);

          // contact damage
          if(d < p.r + e.r){
            const mitig = U.clamp(p.armor / (p.armor + 60), 0, 0.6);
            const takenPerSec = e.dmg * (1-mitig) * 2.2;
            Systems.Player.takeDamage(s, takenPerSec * dt);

            // thorns (옵션)
            if(p.thorns>0){
              e.hp -= p.thorns * dt * 2.0;
            }
          }
        }

        // remove dead by thorns, etc.
        for(let i=es.length-1;i>=0;i--){
          if(es[i].hp<=0){
            Systems.Combat.onEnemyKilled(s, es[i]);
            es.splice(i,1);
          }
        }
      }
    },

    // ---------- Combat (프로젝트일, 히트, 레벨업) ----------
    Combat: {
      tryAttack(s){
        const p=s.player;
        if(p.atkTimer>0) return;
        if(s.entities.enemies.length===0) return;

        p.atkTimer = p.atkCd;

        // simple auto-aim (nearest)
        let target=s.entities.enemies[0], best=1e18;
        for(const e of s.entities.enemies){
          const d=(e.x-p.x)**2 + (e.y-p.y)**2;
          if(d<best){ best=d; target=e; }
        }

        const ang = Math.atan2(target.y-p.y, target.x-p.x);
        s.entities.projectiles.push({
          x:p.x, y:p.y,
          vx: Math.cos(ang)*560,
          vy: Math.sin(ang)*560,
          r:4,
          life:0.9,
        });
      },

      update(s, dt){
        // attack input
        if(Systems.Input.isAttacking(s)){
          Systems.Combat.tryAttack(s);
        }

        // move projectiles & hit
        const ps=s.entities.projectiles;
        const es=s.entities.enemies;
        const p=s.player;

        for(let i=ps.length-1;i>=0;i--){
          const pr=ps[i];
          pr.x += pr.vx*dt;
          pr.y += pr.vy*dt;
          pr.life -= dt;

          if(pr.life<=0 || pr.x<-50||pr.x>World.W()+50||pr.y<-50||pr.y>World.H()+50){
            ps.splice(i,1); continue;
          }

          for(let j=es.length-1;j>=0;j--){
            const e=es[j];
            const d=Math.hypot(pr.x-e.x, pr.y-e.y);
            if(d < pr.r + e.r){
              const isCrit = Math.random() < p.crit;
              const dmg = Math.round(p.dmg * (isCrit ? 1.7 : 1.0));
              e.hp -= dmg;

              // leech
              if(p.leech>0){
                p.hp = U.clamp(p.hp + dmg*p.leech, 1, p.hpMax);
              }

              // kill
              if(e.hp<=0){
                Systems.Combat.onEnemyKilled(s, e);
                es.splice(j,1);
              }

              ps.splice(i,1);
              break;
            }
          }
        }
      },

      onEnemyKilled(s, enemy){
        const p=s.player;
        p.xp += 4;

        if(Math.random()<0.28){
          Systems.Items.addDrop(s, enemy.x, enemy.y);
        }

        // level up (한 번에 한 번만 선택창)
        while(p.xp >= p.xpNeed){
          p.xp -= p.xpNeed;
          p.level++;
          p.xpNeed = Math.round(20 + (p.level-1)*10);
          Systems.UI.openChoices(s);
          break;
        }
      }
    },

    // ---------- World/FX ----------
    WorldFX: {
      update(s, dt){
        // drops sparkle timer
        for(const d of s.entities.drops){
          d.t += dt;
        }
      }
    },

    // ---------- Renderer (draw만) ----------
    Render: {
      draw(s){
        ctx.clearRect(0,0,World.W(),World.H());

        // bg
        ctx.fillStyle="#060606";
        ctx.fillRect(0,0,World.W(),World.H());

        // walls
        for(const w of s.world.walls){
          ctx.fillStyle="rgba(255,255,255,.08)";
          ctx.fillRect(w.x,w.y,w.w,w.h);
          ctx.strokeStyle="rgba(255,255,255,.15)";
          ctx.strokeRect(w.x,w.y,w.w,w.h);
        }

        // drops
        for(const d of s.entities.drops){
          ctx.beginPath();
          ctx.arc(d.x, d.y, 5 + Math.sin(d.t*6)*1.2, 0, Math.PI*2);
          ctx.fillStyle = d.item.rarity==="rare" ? "rgba(242,211,94,.9)"
                        : d.item.rarity==="magic" ? "rgba(104,168,255,.9)"
                        : "rgba(207,207,207,.85)";
          ctx.fill();
        }

        // player
        const p=s.player;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="rgba(220,220,220,.95)";
        ctx.fill();
        ctx.strokeStyle="rgba(255,255,255,.25)";
        ctx.stroke();

        // enemies
        for(const e of s.entities.enemies){
          ctx.beginPath();
          ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
          ctx.fillStyle="rgba(180,60,60,.95)";
          ctx.fill();

          // hp bar
          const bw=28, bh=4;
          ctx.fillStyle="rgba(0,0,0,.55)";
          ctx.fillRect(e.x-bw/2, e.y-e.r-12, bw, bh);
          ctx.fillStyle="rgba(255,120,120,.95)";
          ctx.fillRect(e.x-bw/2, e.y-e.r-12, bw*(e.hp/e.hpMax), bh);
        }

        // projectiles
        for(const pr of s.entities.projectiles){
          ctx.beginPath();
          ctx.arc(pr.x,pr.y,pr.r,0,Math.PI*2);
          ctx.fillStyle="rgba(255,240,200,.95)";
          ctx.fill();
        }
      }
    }
  };

  // =========================================================
  // 4) GAME LOOP: update는 “시스템 호출만”
  // =========================================================
  function step(now){
    state.time.now = now;
    const dt = Math.min(0.033, (now - state.time.last)/1000);
    state.time.last = now;
    state.time.dt = dt;

    if(!state.paused.forChoice){
      // update pipeline (꼬임 방지: 순서 고정)
      Systems.Player.update(state, dt);
      Systems.Enemies.update(state, dt);
      Systems.Combat.update(state, dt);
      Systems.WorldFX.update(state, dt);

      Systems.UI.updateHUD(state);
    }

    // render always
    Systems.Render.draw(state);

    requestAnimationFrame(step);
  }

  // =========================================================
  // 5) INIT
  // =========================================================
  World.resize();
  __stateReady = true;
  rebuildWalls();
  Systems.Input.init(state);
  Systems.Items.recalcStats(state);
  Systems.UI.updateHUD(state);
  Systems.UI.renderLoot(state);
// 드랍 패널 토글 (기본은 숨김)
document.getElementById("lootToggle").onclick = () => {
  const lp = document.getElementById("lootPanel");
  lp.style.display = (lp.style.display === "none" || !lp.style.display) ? "block" : "none";
};

  Systems.UI.log("✅ 실행됨 v3 · PC: WASD 이동 / 터치·클릭 공격 · 모바일: 조이스틱+공격");

  requestAnimationFrame(step);
})();
</script>
