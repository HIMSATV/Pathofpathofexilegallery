function rollWeaponDamage(){
  const w = player.weapon;
  return w.min + Math.random() * (w.max - w.min);
}

function getCritChance(){
  // кЄ∞л≥ЄмєШ + Add вЖТ increased вЖТ more
  const g = player.gear || {};
  const base = (player.baseCritChance ?? 0.05); // 5% кЄ∞л≥Є
  const add = (g.critChanceAdd || 0);
  const inc = (g.critChanceInc || 0);
  const more = (g.critChanceMore || 1);
  return Math.max(0, (base + add) * (1 + inc) * more);
}
function getCritMulti(){
  // кЄ∞л≥ЄмєШ + Add вЖТ increased вЖТ more
  const g = player.gear || {};
  const base = (player.baseCritMulti ?? 1.50); // x1.50 кЄ∞л≥Є
  const add = (g.critMultiAdd || 0);
  const inc = (g.critMultiInc || 0);
  const more = (g.critMultiMore || 1);
  return Math.max(1, (base + add) * (1 + inc) * more);
}
function applyCrit(dmg){
  const chance = getCritChance();
  const multi = getCritMulti();
  const isCrit = (Math.random() < chance);
  return { dmg: isCrit ? dmg * multi : dmg, isCrit, chance, multi };
}

function defaultBuffStats(){
  // вЬЕ POEмЛЭ(кЄ∞л≥Є + м¶Эк∞А(increased) + мґФк∞Ал∞∞мЬ®(more))л•Љ лВілґАмЧРмДЬ мІАмЫР
  // - Add : к≥†м†Х мИШмєШ(+)   мШИ) maxHpAdd, armorAdd, hpRegen
  // - Inc : м¶Эк∞А(%)        мШИ) dmgInc = 0.15  (15% increased)
  // - Mul : мґФк∞А л∞∞мЬ®(x)   мШИ) dmgMul = 1.20  (20% more)
  return {
    maxHpAdd: 0,
    armorAdd: 0,
    hpRegen: 0,

    // нФЉнХі/мЖНлПД/мЭілПЩ/мВђк±∞л¶ђ (POEмЛЭ)
    dmgInc: 0,     dmgMore: 1,
    atkSpdInc: 0,  atkSpdMore: 1,
    spdInc: 0,     spdMore: 1,
    rangeInc: 0,   rangeMore: 1,

    // мєШл™ЕнГА (POEмЛЭ)
    critChanceAdd: 0,
    critChanceInc: 0,
    critChanceMore: 1,

    critMultiAdd: 0,
    critMultiInc: 0,
    critMultiMore: 1,

    // рЯФї мµЬмҐЕ мґЬл†•(мХДлЮШ recalcFromGearмЧРмДЬ м±ДмЫА)
    dmgMul: 1,
    atkSpdMul: 1,
    spdMul: 1,
    rangeMul: 1,
  };
}

function applyBuff(target, type, value, duration, source="", mode="mul"){
  if(!target.activeBuffs) target.activeBuffs = [];
  const key = type + "|" + source + "|" + mode;
  const b = target.activeBuffs.find(x => x.key === key);

  if(b){
    b.value = value;
    b.duration = Math.max(b.duration, duration);
  }else{
    target.activeBuffs.push({ key, type, value, duration, mode });
  }
}

function mapBuffTypeToStat(type){
  if(type === "damage")   return "dmgMul";
  if(type === "speed")    return "spdMul";
  if(type === "atkSpeed") return "atkSpdMul";
  if(type === "range")        return "rangeMul";
  if(type === "meleeRange")   return "meleeRangeMul";
  if(type === "aoe")          return "aoeMul";
  if(type === "ultiAoe")      return "ultiAoeMul";
  if(type === "armor")        return "armorAdd";
  if(type === "armorMul")     return "armorMul";
  if(type === "maxHpMul")     return "maxHpMul";
  if(type === "maxHp")        return "maxHpAdd";
  if(type === "hpRegen")      return "hpRegen";
  return null;
}
function getEquippedWeaponAttackSpeed(){
  try{
    const eq = (typeof equipment !== "undefined" && equipment) ? equipment : null;
    const w = eq && eq.weapon ? eq.weapon : null;

    // 1) мЮ•м∞© мХДмЭінЕЬ мЭЄмК§нДімК§мЧР мІБм†С attackSpeedк∞А мЮИмЬЉл©і мЪ∞мД†
    if(w && typeof w.attackSpeed === "number" && isFinite(w.attackSpeed)){
      return Math.max(0.2, w.attackSpeed);
    }

    // 2) нЕЬнФМл¶њ(л≤†мЭімК§)мЧР attackSpeedк∞А мЮИмЬЉл©і мВђмЪ©
    if(w && typeof getItemTemplateById === "function"){
      const tmpl = getItemTemplateById(w.baseId || w.id);
      if(tmpl && typeof tmpl.attackSpeed === "number" && isFinite(tmpl.attackSpeed)){
        return Math.max(0.2, tmpl.attackSpeed);
      }
    }

    // 3) fallback: мЛЬмЮС лђікЄ∞(player.weapon)
    if(player && player.weapon && typeof player.weapon.attackSpeed === "number" && isFinite(player.weapon.attackSpeed)){
      return Math.max(0.2, player.weapon.attackSpeed);
    }
  }catch(err){
    console.warn("getEquippedWeaponAttackSpeed failed", err);
  }

  return 1;
}
function updateBuffs(target){
  if(!target.activeBuffs) target.activeBuffs = [];
  target.buffs = defaultBuffStats();

 if(target === player){
  target.buffs.dmgMul   *= (player.gear.dmgMul ?? 1);
  target.buffs.rangeMul *= (player.gear.rangeMul ?? 1);
  target.buffs.spdMul    *= (player.gear.spdMul ?? 1);
  target.buffs.atkSpdMul *= (player.gear.atkSpdMul ?? 1);

  // вЬЕ лђікЄ∞ кЄ∞л≥Є к≥µк≤©мЖНлПД л∞ШмШБ
  target.buffs.atkSpdMul *= getEquippedWeaponAttackSpeed();

  target.buffs.armorAdd += (player.gear.armorAdd ?? 0);
  target.buffs.maxHpAdd += (player.gear.maxHpAdd ?? 0);
  target.buffs.hpRegen  += (player.gear.hpRegen ?? 0);
}

  for(let i = target.activeBuffs.length - 1; i >= 0; i--){
    const b = target.activeBuffs[i];
    b.duration--;
    if(b.duration <= 0){
      target.activeBuffs.splice(i,1);
      continue;
    }
    const stat = mapBuffTypeToStat(b.type);
    if(!stat) continue;

    if(b.mode === "mul"){
      if(target.buffs[stat] !== undefined) target.buffs[stat] *= b.value;
    }else if(b.mode === "add"){
      if(target.buffs[stat] !== undefined) target.buffs[stat] += b.value;
    }
  }

  if(target === player){
    const b = target.buffs;
    const newMax = Math.max(1, Math.floor(target.baseMaxHp * (b.maxHpMul ?? 1) + (b.maxHpAdd ?? 0)));
    target.maxHp = newMax;
    if(target.hp > target.maxHp) target.hp = target.maxHp;
    target.armor = Math.max(0, (target.baseArmor + (b.armorAdd ?? 0)) * (b.armorMul ?? 1));
  }
}

function pruneDeadEnemies(){
  enemies = enemies.filter(e =>
    (e.hp > 0) ||
    (e.dead && e.deathTimer > 0)
  );
  for(const p of packs){
    p.enemies = p.enemies.filter(e => e.hp > 0 || (e.dead && e.deathTimer > 0));
  }
}

function getRandomVisibleAliveEnemy(){
  const visible = enemies.filter(e =>
    e.hp > 0 &&
    !(e.type === "boss" && e.dead) &&
    isEnemyOnScreen(e)
  );
  if(visible.length === 0) return null;
  return visible[(Math.random() * visible.length) | 0];
}

function getRandomAliveEnemy(){
  const alive = enemies.filter(e => e.hp > 0 && !(e.type === "boss" && e.dead));
  if(alive.length === 0) return null;
  return alive[(Math.random() * alive.length) | 0];
}

function getLevelPenalty(playerLv, monsterLv){
  const diff = monsterLv - playerLv;
  if(diff >= 0) return 1 + diff * 0.04;
  if(diff <= -6) return 0.1;
  return 1 + diff * 0.12;
}

/* ===== POE лІµнХС: нЛ∞мЦі мК§мЉАмЭЉ/лІµ мГЭмД± ===== */
function tierScale(t){
  const hpMul  = 1 + (t-1) * 0.22;
  const dmgMul = 1 + (t-1) * 0.16;
  const spdMul = 1 + Math.min(0.25, (t-1) * 0.02);
  const eliteChance = clamp(0.06 + (t-1) * 0.008, 0.06, 0.22);
  const eliteHpMul = 2.4;
  const eliteDmgMul = 1.9;
  return { hpMul, dmgMul, spdMul, eliteChance, eliteHpMul, eliteDmgMul };
}

function giveXP(enemy){
  let base = 0;
  if(enemy.type === "mage") base = 14;
  else if(enemy.type === "archer") base = 12;
  else if(enemy.type === "orc") base = 16;
  else if(enemy.type === "demon") base = 28;
  else if(enemy.type === "melee") base = 10;
  else if(enemy.type === "boss") base = 200 * mapTier;

  if(enemy.isElite) base *= 3;
  if(enemy.isLeader) base *= 4;

  const levelMul = getLevelPenalty(level, mapTier);
  const mapMul = 1 + (mapTier - 1) * 0.08;

  const finalXP = Math.floor(base * levelMul * mapMul);
  xp += finalXP;
  checkLevelUp();
}

function makeBossStatsByTier(t){
  const baseHp  = 900;
  const baseDmg = 26;
  const baseSpd = 0.62;

  const bossHp  = baseHp  * (1 + (t-1)*0.28);
  const bossDmg = baseDmg * (1 + (t-1)*0.18);
  const bossSpd = baseSpd * (1 + Math.min(0.18, (t-1)*0.015));

  return { bossHp, bossDmg, bossSpd };
}

function dist2(ax, ay, bx, by){
  const dx = ax - bx;
  const dy = ay - by;
  return dx*dx + dy*dy;
}

function srand(seed){
  let s = seed >>> 0;
  return function(){
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 4294967296;
  };
}

function clearSpawnArea(cx, cy, radiusTiles=3){
  const tx = Math.floor(cx / tileSize);
  const ty = Math.floor(cy / tileSize);
  for(let y=ty-radiusTiles; y<=ty+radiusTiles; y++){
    for(let x=tx-radiusTiles; x<=tx+radiusTiles; x++){
      if(x<=0||y<=0||x>=mapSize-1||y>=mapSize-1) continue;
      map[y][x] = 0;
    }
  }
}

function carveBossRoomAndCorridor(){
  const w = 7 + Math.floor(Math.random()*5);
  const h = 7 + Math.floor(Math.random()*5);
  const margin = 2;

  const corner = (Math.random()*4)|0;
  let x0, y0;

  if(corner===0){ x0 = mapSize - margin - w; y0 = margin; }
  if(corner===1){ x0 = margin; y0 = margin; }
  if(corner===2){ x0 = margin; y0 = mapSize - margin - h; }
  if(corner===3){ x0 = mapSize - margin - w; y0 = mapSize - margin - h; }

  for(let y=y0; y<y0+h; y++){
    for(let x=x0; x<x0+w; x++){
      map[y][x] = 0;
    }
  }

  const cx = Math.floor(mapSize/2), cy = Math.floor(mapSize/2);
  const roomCx = x0 + (w>>1), roomCy = y0 + (h>>1);

  let doorX = roomCx;
  let doorY = roomCy;

  if(Math.abs(roomCx - cx) > Math.abs(roomCy - cy)){
    if(roomCx > cx){ doorX = x0;       doorY = roomCy; }
    else           { doorX = x0+w-1;   doorY = roomCy; }
  }else{
    if(roomCy > cy){ doorY = y0;       doorX = roomCx; }
    else           { doorY = y0+h-1;   doorX = roomCx; }
  }

  map[doorY][doorX] = 0;

  const startX = Math.floor(player.x / tileSize);
  const startY = Math.floor(player.y / tileSize);

  let x = startX, y = startY;
  const stepX = doorX > x ? 1 : -1;
  while(x !== doorX){
    map[y][x] = 0;
    map[y-1] && (map[y-1][x] = 0);
    map[y+1] && (map[y+1][x] = 0);
    x += stepX;
  }
  const stepY = doorY > y ? 1 : -1;
  while(y !== doorY){
    map[y][x] = 0;
    map[y][x-1] !== undefined && (map[y][x-1] = 0);
    map[y][x+1] !== undefined && (map[y][x+1] = 0);
    y += stepY;
  }
  map[doorY][doorX] = 0;

  bossRoom = { x:x0, y:y0, w, h, cx:roomCx, cy:roomCy, doorX, doorY };
}

function buildEmptyMap(){
  map = [];
  for(let y=0; y<mapSize; y++){
    let row = [];
    for(let x=0; x<mapSize; x++){
      if(x===0 || y===0 || x===mapSize-1 || y===mapSize-1) row.push(1);
      else row.push(0);
    }
    map.push(row);
  }
}

function buildReachableMaskFromPlayer(){
  const startX = Math.floor(player.x / tileSize);
  const startY = Math.floor(player.y / tileSize);

  const vis = Array.from({length: mapSize}, ()=>Array(mapSize).fill(false));
  if(!map[startY] || map[startY][startX] !== 0) return vis;

  const q = [[startX, startY]];
  vis[startY][startX] = true;

  while(q.length){
    const [x,y] = q.pop();
    const nb = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
    for(const [nx,ny] of nb){
      if(nx<=0||ny<=0||nx>=mapSize-1||ny>=mapSize-1) continue;
      if(vis[ny][nx]) continue;
      if(map[ny][nx] !== 0) continue;
      vis[ny][nx] = true;
      q.push([nx,ny]);
    }
  }
  return vis;
}

function floodFillReachableFromPlayer(){
  const startX = Math.floor(player.x / tileSize);
  const startY = Math.floor(player.y / tileSize);
  if(!map[startY] || map[startY][startX] !== 0) return 0;

  const vis = Array.from({length: mapSize}, ()=>Array(mapSize).fill(false));
  const q = [[startX,startY]];
  vis[startY][startX] = true;
  let count = 0;

  while(q.length){
    const [x,y] = q.pop();
    count++;
    const nb = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
    for(const [nx,ny] of nb){
      if(nx<=0||ny<=0||nx>=mapSize-1||ny>=mapSize-1) continue;
      if(vis[ny][nx]) continue;
      if(map[ny][nx] !== 0) continue;
      vis[ny][nx] = true;
      q.push([nx,ny]);
    }
  }
  return count;
}

function generateRandomMapForTier(tier){
  const seed = (Date.now() ^ (tier*987654321)) >>> 0;
  const rng = srand(seed);

  for(let attempt=0; attempt<8; attempt++){
    buildEmptyMap();

    const wallCount = 22 + Math.floor(tier*2.2) + Math.floor(rng()*10);
    placeRandomWalls(rng, wallCount);

    clearSpawnArea(player.x, player.y, 3);

    const reachable = floodFillReachableFromPlayer();
    const totalFloor = (mapSize-2)*(mapSize-2);
    if(reachable / totalFloor >= 0.55){
      return seed;
    }
  }
  buildEmptyMap();
  clearSpawnArea(player.x, player.y, 4);
  return seed;
}

function startNewMap(nextTier){
  mapTier = nextTier;
  mapRun.tier = nextTier;
  mapRun.clearedPacks = 0;
  mapRun.bossSpawned = false;
  mapRun.bossDefeated = false;

  mapRun.packsToClear = 8 + Math.floor(nextTier * 1.5);

  portal.active = false;
  portal.hold = 0;

  enemies = [];
  packs = [];
  particles = [];
  bloodPools = [];
  bloodParticles = [];
  arrows = [];
  levelParticles = [];
  fireZones = [];

  spawnTimer = 0;
  spawnInterval = 999999;
  bossTimer = 0;

  player.x = mapSize * tileSize / 2;
  player.y = mapSize * tileSize / 2;

  mapRun.seed = generateRandomMapForTier(nextTier);
  carveBossRoomAndCorridor();
  reachableMask = buildReachableMaskFromPlayer();

  spawnMapPacks(nextTier);
  spawnRandomBoss();

  resize();
}

function spawnMapPacks(tier){
  const rng = srand(mapRun.seed ^ 0xA53C9E1B);

  const packCount = mapRun.packsToClear + 4 + Math.floor(tier*0.6);
  for(let i=0;i<packCount;i++){
    let placed = false;

    for(let tries=0; tries<120; tries++){
      const tx = 1 + Math.floor(rng()*(mapSize-2));
      const ty = 1 + Math.floor(rng()*(mapSize-2));
      if(map[ty][tx] !== 0) continue;
      if(reachableMask && !reachableMask[ty][tx]) continue;

      const px = tx*tileSize + tileSize/2;
      const py = ty*tileSize + tileSize/2;

      const dx = px - player.x, dy = py - player.y;
      if(dx*dx + dy*dy < 260*260) continue;

      let min = 6;
      let max = 10;
      if(tier >= 6){
        min = 15 + Math.floor((tier-5) * 0.4);
        max = 20 + Math.floor((tier-5) * 0.6);
      }
      if(tier >= 12){
        min = 25 + Math.floor((tier-10) * 0.5);
        max = 32 + Math.floor((tier-10) * 0.7);
      }
      max = Math.min(max, 45);

      const count = min + Math.floor(rng() * (max - min + 1));
      createPack(px, py, count);

      placed = true;
      break;
    }
    if(!placed){
      // skip
    }
  }

  for(const p of packs){
    p.cleared = false;
  }
  linkNearbyPacks();
}

function linkNearbyPacks(){
  const linkDist = 360;
  const link2 = linkDist * linkDist;

  const n = packs.length;
  const parent = Array.from({length:n}, (_,i)=>i);
  const find = (a)=>{ while(parent[a]!==a){ parent[a]=parent[parent[a]]; a=parent[a]; } return a; };
  const union = (a,b)=>{ a=find(a); b=find(b); if(a!==b) parent[b]=a; };

  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      const dx = packs[i].x - packs[j].x;
      const dy = packs[i].y - packs[j].y;
      if(dx*dx + dy*dy <= link2) union(i,j);
    }
  }

  const rootToG = new Map();
  let gid = 0;

  for(let i=0;i<n;i++){
    const r = find(i);
    if(!rootToG.has(r)) rootToG.set(r, gid++);
    packs[i].groupId = rootToG.get(r);
    packs[i].groupCleared = false;
  }
}

function activatePackGroup(groupId){
  for(const p of packs){
    if(p.groupId === groupId){
      p.activated = true;
      if(p.enemies.length === 0 && !p.cleared){
        p.cleared = true;
      }
    }
  }
}

function spawnPortal(x, y){
  portal.active = true;
  portal.x = x;
  portal.y = y;
  portal.hold = 0;

  for(let i=0;i<90;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 1 + Math.random()*5;
    particles.push({
      x: x + (Math.random()-0.5)*10,
      y: y + (Math.random()-0.5)*10,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp,
      life: 30 + Math.floor(Math.random()*25)
    });
  }
}

function updatePortal(){
  if(!portal.active) return;

  const dx = player.x - portal.x;
  const dy = player.y - portal.y;
  const rr = (portal.r + player.radius + 8);
  if(dx*dx + dy*dy < rr*rr){
    portal.hold++;
    if(portal.hold >= portal.holdNeed){
      startNewMap(mapTier + 1);
      return;
    }
  }else{
    portal.hold = 0;
  }
}

function drawPortal(){
  if(!portal.active) return;

  const pulse = 0.6 + 0.4*Math.sin(frameCount*0.15);
  const r = portal.r + pulse*6;

  ctx.save();
  ctx.globalAlpha = 0.9;

  ctx.strokeStyle = "rgba(120,180,255,0.85)";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(portal.x, portal.y, r, 0, Math.PI*2);
  ctx.stroke();

  ctx.fillStyle = "rgba(80,140,255,0.18)";
  ctx.beginPath();
  ctx.arc(portal.x, portal.y, r-6, 0, Math.PI*2);
  ctx.fill();

  if(portal.hold > 0){
    const t = clamp(portal.hold / portal.holdNeed, 0, 1);
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(portal.x, portal.y, r+8, -Math.PI/2, -Math.PI/2 + Math.PI*2*t);
    ctx.stroke();
  }

  ctx.restore();
}

function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  }
  boss.dead = true;
  boss.deathTimer = 60;
  boss.deathMax = 60;

  shake = Math.max(shake, 60);

function startEnemyDeath(e){
  if(!e || e.type === "boss") return;
  if(e.dead && e.deathTimer > 0) return;
  e.dead = true;
  e.deathTimer = Math.max(e.deathTimer || 0, 18);
  e.deathMax = Math.max(e.deathMax || 0, 18);
  e.deathTilt = (e.deathTilt == null) ? ((Math.random() < 0.5 ? -1 : 1) * (0.18 + Math.random()*0.22)) : e.deathTilt;
  e.stun = 0;
  e.invul = 0;
}

function canMoveTo(x,y){
  let left = Math.floor((x - player.radius) / tileSize);
  let right = Math.floor((x + player.radius) / tileSize);
  let top = Math.floor((y - player.radius) / tileSize);
  let bottom = Math.floor((y + player.radius) / tileSize);

  return (
    map[top] && map[top][left] === 0 &&
    map[top] && map[top][right] === 0 &&
    map[bottom] && map[bottom][left] === 0 &&
    map[bottom] && map[bottom][right] === 0
  );
}
function canEnemyMoveTo(enemy, x, y){
  let left = Math.floor((x - enemy.radius) / tileSize);
  let right = Math.floor((x + enemy.radius) / tileSize);
  let top = Math.floor((y - enemy.radius) / tileSize);
  let bottom = Math.floor((y + enemy.radius) / tileSize);

  return (
    map[top] && map[top][left] === 0 &&
    map[top] && map[top][right] === 0 &&
    map[bottom] && map[bottom][left] === 0 &&
    map[bottom] && map[bottom][right] === 0
  );
}
function isFloorTile(tx, ty){ return !!(map[ty] && map[ty][tx] === 0); }
function canSpawnEnemyAt(enemy, x, y){ return canEnemyMoveTo(enemy, x, y); }

function resolvePlayerEnemyOverlap(){
  const pad = 2;
  for(const e of enemies){
    if(e.type === "boss" && e.dead) continue;
    if(e.hp <= 0) continue;
    if(e.pack && !e.pack.activated) continue;

    let dx = e.x - player.x;
    let dy = e.y - player.y;
    let dist = Math.hypot(dx, dy);

    const minDist = player.radius + e.radius + pad;

    if(dist === 0){
      dx = (Math.random() - 0.5) * 0.01;
      dy = (Math.random() - 0.5) * 0.01;
      dist = Math.hypot(dx, dy);
    }

    if(dist < minDist){
      const nx = dx / dist;
      const ny = dy / dist;
      const push = (minDist - dist);

      const ex = e.x + nx * push;
      const ey = e.y + ny * push;

      if(canEnemyMoveTo(e, ex, ey)){
        e.x = ex; e.y = ey;
      }else{
        const px = player.x - nx * push;
        const py = player.y - ny * push;
        if(canMoveTo(px, player.y)) player.x = px;
        if(canMoveTo(player.x, py)) player.y = py;
      }
    }
  }
}

function damagePlayer(dmg, knockX, knockY, src){
  if(player.invul > 0 || gameOver) return;

  // вЬЕ STEP5: нФМл†ИмЭімЦік∞А л∞ЫлКФ нФЉнХілПД нГЬкЈЄ кЄ∞л∞ШмЬЉл°Ь м°∞м†И к∞АлК•
  let incoming = dmg;
  if(USE_TAG_CONTEXTS){
    const srcTags = src ? (src.tags ? src.tags : tagsFromEnemy(src)) : [];
    const ctxIn = { scope:'player', tags: mergeTags(['incoming'], getPlayerTags(), getMapTags(), srcTags) };
    incoming = applyPlayerTakenDamageMods(incoming, ctxIn);
  }

  const armor = (player.armor ?? 0);
  const reduced = incoming * (50 / (50 + Math.max(0, armor)));
  const finalDmg = Math.max(1, Math.floor(reduced));

  player.hp -= finalDmg;
  emitEvent("takeDamage", { dmg: finalDmg });
  player.invul = 25;
  shake = Math.max(shake, 10);

  let nx = player.x + knockX;
  let ny = player.y + knockY;

  if(canMoveTo(nx, player.y)) player.x = nx;
  if(canMoveTo(player.x, ny)) player.y = ny;

  if(player.hp <= 0) handleGameOver();
}

function enemyTryMeleeAttack(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);
  const reach = e.type === "boss" ? 70 : 42;

  if(dist > reach){
    e.attackFrame = 0;
    return;
  }

  if(e.attackFrame === 0){
    e.swingDir = dx < 0 ? -1 : 1;
  }

  const atkMul = (e.buffs?.atkSpdMul ?? 1);
  e.attackFrame += atkMul;

  if(e.attackFrame >= 12 && !e.hitDone){
    e.hitDone = true;
    const len = dist || 1;
    const nx = dx / len;
    const ny = dy / len;
    const kb = e.type === "boss" ? 30 : 18;
    damagePlayer(e.damage, nx*kb, ny*kb, e);
    hitSound();
  }

  if(e.attackFrame >= 25){
    e.attackFrame = 0;
    e.hitDone = false;
  }
}

function spawnArrowTrail(x, y, dx, dy){
  const len = Math.hypot(dx, dy) || 1;
  particles.push({
    x: x - dx * 0.7,
    y: y - dy * 0.7,
    vx: (-dx / len) * 0.22 + (Math.random()-0.5) * 0.10,
    vy: (-dy / len) * 0.22 + (Math.random()-0.5) * 0.10,
    life: 10,
    kind: "arrowTrail",
    angle: Math.atan2(dy, dx),
    alpha: 0.48,
    size: 10
  });
}

function spawnArrowSpark(x, y, dx, dy){
  const baseAngle = Math.atan2(dy, dx);
  for(let k=0; k<6; k++){
    const ang = baseAngle + Math.PI + (Math.random()-0.5) * 0.9;
    const spd = 1.0 + Math.random() * 2.0;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: 10 + Math.floor(Math.random() * 8),
      kind: "arrowSpark",
      alpha: 0.95,
      size: 2 + Math.random() * 2
    });
  }
}

function spawnArrow(fromX, fromY, toX, toY, damage){
  const dx = toX - fromX;
  const dy = toY - fromY;
  const dist = Math.hypot(dx, dy) || 1;
  const speed = 7.5;
  const vx = dx/dist * speed;
  const vy = dy/dist * speed;

  arrows.push({
    x: fromX,
    y: fromY,
    dx: vx,
    dy: vy,
    angle: Math.atan2(vy, vx),
    damage,
    life: 240,
    trailTick: 0,
    tags: mergeTags(['projectile','arrow'], SKILL_TAGS.arrow || ['attack','projectile'])
  });
}

function spawnFireZone(x, y, damage){
  const r = (ISO && ISO.tileW) ? (ISO.tileW * 0.50) : 32;
  fireZones.push({ x, y, radius:r, life:180, tick:0, damage, tags: mergeTags(['aoe','fire'], SKILL_TAGS.firezone || ['spell','fire','aoe']) });
}

function spawnEnemyAt(ex, ey, pack){
  let tileX = Math.floor(ex / tileSize);
  let tileY = Math.floor(ey / tileSize);

  if(!isFloorTile(tileX, tileY)) return;
  if(!isFloorTile(tileX-1, tileY) || !isFloorTile(tileX+1, tileY) || !isFloorTile(tileX, tileY-1) || !isFloorTile(tileX, tileY+1)) return;
  if(enemies.length >= 320) return;

  let rand = Math.random();
  let type =
    rand < 0.14 ? "mage" :
    rand < 0.30 ? "archer" :
    rand < 0.52 ? "zombie" :
    rand < 0.70 ? "skeleton" :
    rand < 0.88 ? "orc" :
    rand < 0.96 ? "melee" :
    "demon";

  const st = makeEnemyStatsByTier(type, mapTier);

  let enemy = {
    x: ex, y: ey,
    radius: (type === "demon") ? 18 : (type === "orc" ? 16 : 14),
    stun: 0,
    invul: 0,
    attackFrame: 0,
    swingDir: 1,
    type,
    hp: st.hp,
    speed: st.spd,
    damage: st.dmg,
    shootCooldown: 0,
    castCooldown: 120,
    pack
  };

  if(!canSpawnEnemyAt(enemy, ex, ey)) return;

  if(type !== "demon" && Math.random() < st.eliteChance * 0.85){
    enemy.isElite = true;
    enemy.eliteColor = Math.random() < 0.5 ? "yellow" : "blue";
    enemy.speed *= 1.5;
    enemy.damage *= st.eliteDmgMul;
    enemy.radius *= 1.2;
    enemy.hp *= st.eliteHpMul;
  }

    // вЬЕ STEP5: м†Б нГЬкЈЄ лґАмЧђ(мЧШл¶ђнКЄ мЧђлґА нПђнХ®)
  enemy.tags = mergeTags(tagsFromEnemy(enemy));

enemies.push(enemy);
  pack.enemies.push(enemy);
}

function spawnPackLeaderAt(ex, ey, pack){
  const st = makeEnemyStatsByTier("melee", mapTier);

  let leader = {
    x: ex, y: ey,
    radius: 18,
    stun: 0,
    invul: 0,
    attackFrame: 0,
    swingDir: 1,
    type: "melee",
    hp: st.hp * 3.2,
    speed: st.spd * 1.08,
    damage: st.dmg * 1.6,
    shootCooldown: 0,
    castCooldown: 120,
    pack,
    isLeader: true
  };

  if(!canSpawnEnemyAt(leader, ex, ey)) return;

  enemies.push(leader);
  pack.enemies.push(leader);
}

function spawnRandomBoss(){
  if(enemies.some(e => e.type === "boss")) return;

  const bx = bossRoom.cx * tileSize + tileSize/2;
  const by = bossRoom.cy * tileSize + tileSize/2;

  const tempBoss = { radius: 30 };
  if(!canEnemyMoveTo(tempBoss, bx, by)) return;

  const bst = makeBossStatsByTier(mapTier);

  enemies.push({
    x: bx, y: by,
    radius: 30,
    type: "boss",
    maxHp: bst.bossHp,
    hp: bst.bossHp,
    speed: bst.bossSpd,
    damage: bst.bossDmg,
    stun: 0,
    attackFrame: 0,
    swordPulled: false,
    phase2Used: false,
    dashCooldown: 120,
    cleaveCooldown: 160,
    invul: 0,
    phaseLock: 0
  });
}

function createPack(cx, cy, count){
  let pack = {
    x: cx, y: cy,
    enemies: [],
    activated: false,
    cleared: false,
    groupId: -1,
    groupCleared: false
  };

  spawnPackLeaderAt(cx, cy, pack);

  const normalCount = Math.max(0, count - 1);
  let tries = 0;

  while(pack.enemies.length < (normalCount + 1) && tries < count * 8){
    tries++;
    let angle = Math.random()*Math.PI*2;
    let radius = Math.random()*140;
    let ex = cx + Math.cos(angle)*radius;
    let ey = cy + Math.sin(angle)*radius;
    spawnEnemyAt(ex, ey, pack);
  }

  packs.push(pack);
}

function teleportTo(target){
  spawnHitBlood(player.x, player.y, 18);
  if(particles.length < 220){
    for(let i=0;i<10;i++){
      particles.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 22 });
    }
  }

  if(canMoveTo(target.x, target.y)){
    player.x = target.x;
    player.y = target.y;
  }

  spawnHitBlood(player.x, player.y, 22);
  if(particles.length < 220){
    for(let i=0;i<12;i++){
      particles.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 26 });
    }
  }

  shake = Math.max(shake, 10);
}

function bossEnterPhase2(boss){
  boss.swordPulled = true;
  boss.phase2Used = true;
  boss.speed *= 1.25;
  boss.damage *= 1.2;

  boss.invul = 120;
  boss.phaseLock = 36;

  shake = 30;
  bossUnsheatheSound();

  for(let i=0;i<80;i++){
    particles.push({ x: boss.x, y: boss.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 50 });
  }
}

function bossDash(boss){
  const dx = player.x - boss.x;
  const dy = player.y - boss.y;
  const dist = Math.hypot(dx, dy) || 1;
  const nx = dx / dist;
  const ny = dy / dist;

  const dashDist = 220;
  const steps = 18;
  let hit = false;

  for(let i=0;i<steps;i++){
    let px = boss.x + nx * (dashDist/steps);
    let py = boss.y + ny * (dashDist/steps);

    if(canEnemyMoveTo(boss, px, py)){
      boss.x = px; boss.y = py;
    }else break;

    if(!hit){
      const d = Math.hypot(player.x - boss.x, player.y - boss.y);
      if(d < boss.radius + player.radius + 10){
        damagePlayer(boss.damage*1.2, nx*34, ny*34, boss);
        hit = true;
      }
    }
  }
  shake = Math.max(shake, 16);
}

function bossCleave(boss){
  const radius = 140;

  for(let i=0;i<70;i++){
    const a = Math.random()*Math.PI*2;
    const r = Math.random()*radius;
    particles.push({
      x: boss.x + Math.cos(a)*r,
      y: boss.y + Math.sin(a)*r,
      vx: Math.cos(a)*2 + (Math.random()-0.5)*2,
      vy: Math.sin(a)*2 + (Math.random()-0.5)*2,
      life: 35
    });
  }

  const dist = Math.hypot(player.x - boss.x, player.y - boss.y);
  if(dist < radius){
    const dx = player.x - boss.x;
    const dy = player.y - boss.y;
    const len = Math.hypot(dx, dy) || 1;
    damagePlayer(boss.damage*1.6, (dx/len)*42, (dy/len)*42, boss);
  }
  shake = Math.max(shake, 22);
}

function isEnemyOnScreen(e){
  const camX = player.x - canvas.width/2;
  const camY = player.y - canvas.height/2;

  const screenLeft   = camX - 50;
  const screenRight  = camX + canvas.width + 50;
  const screenTop    = camY - 50;
  const screenBottom = camY + canvas.height + 50;

  return (
    e.x > screenLeft &&
    e.x < screenRight &&
    e.y > screenTop &&
    e.y < screenBottom
  );
}

/* ===== GAME LOOP: UPDATE ===== */

function update(){
  frameCount++;

  if(lootOverlayOpen) return;
  if(gameOver) return;

  if(slowMotion > 0){
    slowMotion--;
    updateEnemySystem();
    resolvePlayerEnemyOverlap();
    updateEffectSystem();
    __enemyFxTickAll();
    return;
  }

  updateBuffs(player);
  updatePlayerState();
  updateUltimateSystem();
  updateEnemySystem();
  resolvePlayerEnemyOverlap();
  updateCombatSystem();
  updateProjectileSystem();
  updateEffectSystem();
  updateEnvironmentSystem();
  __enemyFxTickAll();

  updatePortal();
}

function updatePlayerState(){
  if(player.hp <= 0){ handleGameOver(); return; }
  updateMovement();
  updateInvulnerability();
  updateLevelGlow();

  const regen = (player.buffs?.hpRegen ?? 0) / 60;
  if(regen > 0) player.hp = Math.min(player.maxHp, player.hp + regen);
}
function handleGameOver(){
  document.body.classList.add('gameover');

  gameOver = true;

  // Hide big bottom HUD (joystick/attack/etc)
  const ui = document.getElementById("ui");
  if(ui) ui.style.display = "none";

  // Hide HUD buttons (bag / loot нПђнХ®) so they don't float on GAME OVER screen
  ["miniBagBtn","lootBtn","hudBtns","btnBag","btnEquip"].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.style.display = "none";
  });
}
function updateLevelGlow(){
  if(player.levelGlow > 0) player.levelGlow--;
}

function updateUltimateSystem(){
  if(!player.ultiActive) return;

  player.ultiTimer++;
  if(player.ultiTimer % 10 === 0) performUltimateStrike();
  if(player.ultiCount >= 5) endUltimate();
}
function endUltimate(){
  player.ultiActive = false;
  player.ultiTimer = 0;
  player.ultiCount = 0;
  explosionActive = false;
}
function performUltimateStrike(){
  const target = getRandomVisibleAliveEnemy();
  if(!target) { endUltimate(); return; }

  teleportTo(target);
  dealUltimateDamage();

  pruneDeadEnemies();
  player.ultiCount++;
}

function dealUltimateDamage(){
  const radius = getUltiAoeRadius();
  const r2 = radius * radius;
  let killedAny = false;

  for(let i=0; i<enemies.length; i++){
    const e = enemies[i];
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    if(dx*dx + dy*dy > r2) continue;

    if(e.type === "boss" && e.dead) continue;

    const wasAlive = (e.hp > 0);
    if(!wasAlive) continue;

    const weaponBase = rollWeaponDamage();
const base =
  weaponBase * 2.8 *
  (player.buffs?.dmgMul ?? 1);

// вЬЕ POEмЛЭ л≤ДмЉУ: outgoing(add/inc/more) вЖТ crit вЖТ enemy_taken
const ctxUlti = buildCombatCtx("ultimate", e);
const ultiRes = computeFinalDamage(base, ctxUlti, { canCrit:true });
const dealt = ultiRes.dealt;
const crit = ultiRes.crit;

    if(e.type === "boss"){
      if(e.invul <= 0){
        e.hp -= dealt;
        e.stun = 25;
        __enemyHitFlashStart(e, 1.2);
        spawnHitBlood(e.x, e.y, crit.isCrit ? 26 : 14);
        shake = Math.max(shake, 20);
        if(e.hp <= 0){
          startBossDeath(e);
        }
      }
      continue;
    }

    e.hp -= dealt;
    e.stun = 30;
    __enemyHitFlashStart(e, 1.25);

    spawnHitBlood(e.x, e.y, crit.isCrit ? 22 : 12);

    if(particles.length < 240){
      for(let k=0;k<10;k++){
        particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*9, vy: (Math.random()-0.5)*9, life: 34 });
      }
    }

    if(e.hp <= 0){
      emitEvent("kill", { enemy:e, x:e.x, y:e.y, type:e.type });
      spawnEnemyDeathBurst(e.x, e.y, e.type);
      spawnLoot(e.x, e.y, "ulti");
      giveXP(e);

      player.hp = Math.min(player.maxHp, player.hp + 1);
      slowMotion = 6;
      if(player.kiOrbs < player.maxOrbs) player.kiOrbs++;
      killedAny = true;
    }
  }

  if(killedAny) hitSound();
  shake = Math.max(shake, 30);
  pruneDeadEnemies();
}

function updateEnemySystem(){
  packs.forEach(pack=>{
    if(pack.activated) return;
    const dx = pack.x - player.x;
    const dy = pack.y - player.y;
    if(dx*dx + dy*dy < 520*520){
      activatePackGroup(pack.groupId);
      shake = Math.max(shake, 8);
      slowMotion = Math.max(slowMotion, 1);
    }
  });

  enemies.forEach(e=>{
    if(e.pack && !e.pack.activated) return;
    updateSingleEnemy(e);
  });
  for(const e of enemies){
    updateBuffs(e);
  }
  pruneDeadEnemies();
}

function updateLevelParticles(){
  for(let i = levelParticles.length - 1; i >= 0; i--){
    const p = levelParticles[i];
    p.ox += p.vx;
    p.oy -= p.vy;
    p.vy *= 0.97;
    p.life--;
    if(p.life <= 0) levelParticles.splice(i,1);
  }
  if(levelParticles.length > 200){
    levelParticles.splice(0, levelParticles.length - 200);
  }
}

function updateParticles(){
  for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if(p.life <= 0) particles.splice(i,1);
  }
  if(particles.length > 260){
    particles.splice(0, particles.length - 260);
  }
}

function updateMelee(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);

  if(dist > 0){
    let moveX = dx / dist * e.speed;
    let moveY = dy / dist * e.speed;

    let newX = e.x + moveX;
    let newY = e.y + moveY;

    if(canEnemyMoveTo(e, newX, e.y)) e.x = newX;
    if(canEnemyMoveTo(e, e.x, newY)) e.y = newY;
  }

  enemyTryMeleeAttack(e);
}

function updateArcher(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);

  const desired = 240;
  if(dist < desired - 40){
    const len = dist || 1;
    const nx = dx / len;
    const ny = dy / len;

    const newX = e.x - nx * e.speed * 1.2;
    const newY = e.y - ny * e.speed * 1.2;

    if(canEnemyMoveTo(e, newX, e.y)) e.x = newX;
    if(canEnemyMoveTo(e, e.x, newY)) e.y = newY;
  }else if(dist > desired + 80){
    updateMelee(e);
  }

  e.shootCooldown--;
  if(e.shootCooldown <= 0 && dist < 520){
    spawnArrow(e.x, e.y, player.x, player.y, e.damage);
    e.shootCooldown = 80 + Math.floor(Math.random()*40);
  }
}

function updateMage(e){
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.hypot(dx, dy);

  if(dist < 180){
    const len = dist || 1;
    const nx = dx / len;
    const ny = dy / len;

    const newX = e.x - nx * e.speed * 1.4;
    const newY = e.y - ny * e.speed * 1.4;

    if(canEnemyMoveTo(e, newX, e.y)) e.x = newX;
    if(canEnemyMoveTo(e, e.x, newY)) e.y = newY;
  }else{
    updateMelee(e);
  }

  if(e.castCooldown <= 0 && dist < 200){

  fireZones.push({
    x:e.x,
    y:e.y,
    r:32,
    life:180
  });

  e.castCooldown = 600; // 10міИ
}
}

function updateBoss(e){
  if(!e.phase2Used && e.hp <= e.maxHp * 0.5) bossEnterPhase2(e);
  updateMelee(e);

  if(e.swordPulled){
    e.dashCooldown--;
    e.cleaveCooldown--;

    const dist = Math.hypot(player.x - e.x, player.y - e.y);

    if(e.dashCooldown <= 0 && dist > 160 && dist < 520){
      bossDash(e);
      e.dashCooldown = 160 + Math.floor(Math.random()*70);
    }
    if(e.cleaveCooldown <= 0 && dist < 220){
      bossCleave(e);
      e.cleaveCooldown = 200 + Math.floor(Math.random()*80);
    }
  }
}

function updateSingleEnemy(e){
  if(e.isLeader){
    const radius = 50;
    const r2 = radius * radius;

    for(const other of enemies){
      if(other === e) continue;
      const dx = other.x - e.x;
      const dy = other.y - e.y;
      if(dx*dx + dy*dy <= r2){
        applyBuff(other, "damage",   1.25, 15, "leader");
        applyBuff(other, "atkSpeed", 1.2,  15, "leader");
      }
    }
  }

  if(e.dead){
    e.deathTimer = Math.max(0, (e.deathTimer || 0) - 1);

    if(e.type === "boss"){
      if(e.deathTimer % 10 === 0){
        shake = Math.max(shake, 10);
        spawnHitBlood(
          e.x + (Math.random()-0.5)*12,
          e.y + (Math.random()-0.5)*12,
          10
        );
      }

      if(e.deathTimer === 1 && !mapRun.bossDefeated){
        mapRun.bossDefeated = true;
        spawnPortal(e.x, e.y);
      }
    }

    return;
  }

  if(e.invul > 0) e.invul--;

  if(e.phaseLock > 0){
    e.phaseLock--;
    return;
  }

  if(e.stun > 0){
    e.stun--;
    return;
  }

  switch(e.type){
    case "archer":
    case "skeleton":
      updateArcher(e);
      break;

    case "mage":
      updateMage(e);
      break;

    case "boss":
      updateBoss(e);
      break;

    case "zombie":
    case "melee":
    default:
      updateMelee(e);
      break;
  }
}

function updateProjectileSystem(){
  updateArrows();
  updateFireZones();
}

function updateFireZones(){
  for(let i = fireZones.length - 1; i >= 0; i--){
    const f = fireZones[i];
    f.life--;
    f.tick++;

    // PoE-ish embers
    if(!gamePaused && !panelOpen && Math.random() < 0.35){
      const a = Math.random()*Math.PI*2;
      const rr = (f.radius??55) * (0.35 + Math.random()*0.55);
      spawnFireEmber(f.x + Math.cos(a)*rr, f.y + Math.sin(a)*rr);
    }

    if(f.tick % 10 === 0){

      if(f.isBleed){
        let hitCount = 0;

        for(const e of enemies){
          if(e.hp <= 0) continue;
          if(e.type === "boss" && e.dead) continue;

          const dx = e.x - f.x;
          const dy = e.y - f.y;
          if(dx*dx + dy*dy > f.radius*f.radius) continue;

          const ctxFz = buildCombatCtx("firezone", e);
          const fzRes = computeFinalDamage(f.damage, ctxFz, { canCrit:false });
          const dealt = fzRes.dealt;

          if(e.type === "boss"){
            if(e.invul <= 0 && !e.dead){
              e.hp -= dealt;
              __enemyHitFlashStart(e, 0.8);
              if(e.hp <= 0) startBossDeath(e);
            }
          }else{
            e.hp -= dealt;
            __enemyHitFlashStart(e, 0.8);
            if(e.hp <= 0){
              startEnemyDeath(e);
              emitEvent("kill", { enemy:e, x:e.x, y:e.y, type:e.type });
              spawnEnemyDeathBurst(e.x, e.y, e.type);
              spawnLoot(e.x, e.y, "bleed");
              giveXP(e);
            }
          }

          player.hp = Math.min(player.maxHp, player.hp + dealt * 0.12);
          spawnHitBlood(e.x, e.y, 3);

          hitCount++;
          if(hitCount >= 10) break;
        }

        pruneDeadEnemies();

      }else{
        const dx = player.x - f.x;
        const dy = player.y - f.y;
        if(dx*dx + dy*dy < f.radius*f.radius){
          damagePlayer(f.damage, 0, 0, f);
        }
      }
    }

    if(f.life <= 0){
      fireZones.splice(i,1);
    }
  }
}

function spawnFireEmber(x,y){
  fireEmbers.push({
    x, y,
    vx:(Math.random()-0.5)*0.8,
    vy:(Math.random()-0.5)*0.8 - 0.9,
    life: 24 + Math.floor(Math.random()*18),
    a: 0.9
  });
  if(fireEmbers.length > 240) fireEmbers.splice(0, fireEmbers.length-240);
}
function updateFireEmbers(){
  for(let i=fireEmbers.length-1;i>=0;i--){
    const p = fireEmbers[i];
    p.life--;
    p.x += p.vx;
    p.y += p.vy;
    p.vy -= 0.02; // drift upward a bit more
    p.a *= 0.96;
    if(p.life <= 0 || p.a < 0.05) fireEmbers.splice(i,1);
  }
}

function drawIsoRingGlow(sx, sy, r, innerA, outerA){
  // draw in iso-scaled space so the gradient looks correct
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, 0.62);
  const g = ctx.createRadialGradient(0,0, r*0.20, 0,0, r*1.02);
  g.addColorStop(0.00, `rgba(0,0,0,0)`);
  g.addColorStop(0.55, `rgba(255,120,20,${innerA})`);
  g.addColorStop(0.85, `rgba(255,60,0,${outerA})`);
  g.addColorStop(1.00, `rgba(0,0,0,0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0,0,r*1.05,0,Math.PI*2);
  ctx.fill();

  // crisp rim
  ctx.strokeStyle = `rgba(255,180,80,${Math.min(0.55, innerA+0.12)})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,r*0.98,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawFireZoneIso(sx, sy, z){
  // вЬЕ exactly 1 tile footprint
  const r = (ISO && ISO.tileW) ? (ISO.tileW * 0.50) : 32;
  const t = (frameCount||0);

  // scorch (darkened center)
  const scorch = 0.55;
  drawIsoDiscTile(sx, sy, r*0.92, `rgba(20,10,5,${0.20*scorch})`, null);
  drawIsoDiscTile(sx, sy, r*0.62, `rgba(0,0,0,${0.10*scorch})`, null);

  // animated glow ring
  const flick = 0.08*Math.sin((t + (z.x*0.01+z.y*0.01))*0.25) + 0.08*Math.random();
  drawIsoRingGlowTile(sx, sy, r, 0.22+flick, 0.18+flick);

  // little flame tongues around rim (cheap but looks like fire)
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, __isoTileScaleY());
  const tongues = 10;
  for(let k=0;k<tongues;k++){
    const ang = (k/tongues)*Math.PI*2 + (t*0.02) + ((z.x+z.y)*0.001);
    const rr = r*0.82 + (Math.sin(t*0.07 + k*1.7)*r*0.04);
    const x = Math.cos(ang)*rr;
    const y = Math.sin(ang)*rr;
    const h = 6 + 6*Math.abs(Math.sin(t*0.11 + k*2.1));
    const w = 3 + 2*Math.abs(Math.cos(t*0.09 + k));
    ctx.fillStyle = `rgba(255,140,40,${0.22+Math.random()*0.08})`;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.quadraticCurveTo(x + w, y - h, x, y - h*1.6);
    ctx.quadraticCurveTo(x - w, y - h, x, y);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawEmberIso(sx, sy, p){
  const a = Math.max(0, Math.min(1, p.a ?? 0.7));
  // tiny bright core + soft glow
  drawIsoDisc(sx, sy, 2.8, `rgba(255,220,120,${0.55*a})`, null);
  drawIsoDisc(sx, sy, 6.0, `rgba(255,90,0,${0.12*a})`, null);
}

function __enemyStrokeByElite(e, normal){
  if(e?.isElite && e?.eliteColor === "yellow") return "rgba(255,220,90,0.95)";
  if(e?.isElite && e?.eliteColor === "blue")   return "rgba(110,180,255,0.95)";
  if(e?.isElite && e?.eliteColor === "red")    return "rgba(255,110,110,0.98)";
  return normal;
}

function __roundRectPath(x, y, w, h, r){
  const rr = Math.max(0, Math.min(r, Math.min(w, h) * 0.5));
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
}


function drawIsoEnemySprite(sx, sy, e){
  if(!e) return;
  const __prevAlpha = ctx.globalAlpha;
  if(e.hitFlash > 0) ctx.globalAlpha = Math.min(1, __prevAlpha * (1 + 0.18 * Math.min(1, e.hitFlash / 8)));

  if(e.dead && e.type !== "boss"){
    const t = Math.max(0, Math.min(1, (e.deathTimer || 0) / Math.max(1, e.deathMax || 1)));
    ctx.save();
    ctx.globalAlpha = __prevAlpha * (0.12 + 0.88 * t);
    ctx.translate(sx, sy + (1 - t) * 10);
    ctx.rotate((e.deathTilt || 0.22) * (1 - t));
    ctx.scale(1, 0.78 + t * 0.22);

    if(e.type === "zombie")        drawIsoZombieSprite(0, 0, e);
    else if(e.type === "skeleton") drawIsoSkeletonSprite(0, 0, e);
    else if(e.type === "archer")   drawIsoArcherSprite(0, 0, e);
    else if(e.type === "mage")     drawIsoMageSprite(0, 0, e);
    else                             drawIsoMeleeSprite(0, 0, e);

    ctx.restore();
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "boss"){
    drawIsoBossSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "zombie"){
    drawIsoZombieSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "skeleton"){
    drawIsoSkeletonSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "archer"){
    drawIsoArcherSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "mage"){
    drawIsoMageSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "orc"){
    drawIsoOrcWarriorSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  if(e.type === "demon"){
    drawIsoDemonSprite(sx, sy, e);
    ctx.globalAlpha = __prevAlpha;
    return;
  }

  drawIsoMeleeSprite(sx, sy, e);
  ctx.globalAlpha = __prevAlpha;
}

function __enemyBreathe(e, speed=0.12, amount=1.5){
  return Math.sin((performance.now?.() || Date.now()) * 0.001 * speed + ((e?.x||0)+(e?.y||0))*0.01) * amount;
}

function __enemyHitNudge(e){
  const s = Math.max(0, Math.min(1, (e?.stun || 0) / 10));
  return { x: -s * 2.0, y: -s * 1.0 };
}

function __enemyFacingSign(e){
  if(!e) return 1;
  const dx = (player?.x || 0) - (e.x || 0);
  return dx >= 0 ? 1 : -1;
}

function __enemyHitFlashStart(e, power=1){
  if(!e) return;
  e.hitFlash = Math.max(e.hitFlash||0, Math.round(8 * Math.max(0.4, Math.min(1.4, power))));
}

function __enemyFxTickAll(){
  for(const e of enemies){
    if(!e) continue;
    if(e.hitFlash > 0) e.hitFlash--;
  }
  if(enemyDeathBursts.length){
    for(let i=enemyDeathBursts.length-1; i>=0; i--){
      const b = enemyDeathBursts[i];
      if(!b){ enemyDeathBursts.splice(i,1); continue; }
      b.life--;
      b.parts = b.parts || [];
      for(const pt of b.parts){
        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.vx *= 0.96;
        pt.vy *= 0.96;
        pt.vy += 0.02;
      }
      if(b.life <= 0) enemyDeathBursts.splice(i,1);
    }
  }
}

function spawnEnemyDeathBurst(x, y, type){
  const n = (type === "boss") ? 18 : 10;
  const parts = [];
  for(let i=0;i<n;i++) parts.push({
    x:(Math.random()-0.5)*10,
    y:(Math.random()-0.5)*8,
    vx:(Math.random()-0.5)*2.8,
    vy:(Math.random()-0.5)*2.0 - 0.4,
    r:2 + Math.random()*3,
    a:0.5 + Math.random()*0.35
  });
  enemyDeathBursts.push({ x, y, life:(type === "boss" ? 40 : 26), maxLife:(type === "boss" ? 40 : 26), type, parts });
}

function drawIsoEnemyDeathBurst(sx, sy, b){
  if(!b) return;
  const a = Math.max(0, (b.life||0) / (b.maxLife||1));
  for(const pt of (b.parts||[])) {
    drawIsoDisc(sx + pt.x, sy + pt.y, (pt.r||3) * (0.6 + a*0.55), `rgba(120,0,0,${(pt.a||0.6)*a})`, null);
  }
  if(a > 0.15) drawIsoDisc(sx, sy + 10, 8 + (1-a)*8, `rgba(90,0,0,${0.16*a})`, null);
}

function __drawEnemyShadow(rx, ry, sx=1, sy=1, alpha=0.30){
  if(!SHOW_SHADOWS) return;
  ctx.save();
  ctx.translate(0, ry);
  ctx.scale(sx, sy);
  ctx.fillStyle = `rgba(0,0,0,${alpha})`;
  ctx.beginPath();
  ctx.ellipse(0, 0, rx, ry*0.55, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function __drawEnemyLegs(stance=1, color="rgba(30,30,30,0.92)"){
  ctx.strokeStyle = color;
  ctx.lineWidth = 3.2;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-4, 8); ctx.lineTo(-5.5, 17 + stance*0.8);
  ctx.moveTo( 4, 8); ctx.lineTo( 5.5, 17 - stance*0.8);
  ctx.stroke();
}

function __drawEnemyArms(color="rgba(30,30,30,0.92)", spread=1){
  ctx.strokeStyle = color;
  ctx.lineWidth = 3.2;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-8, -2); ctx.lineTo(-14 - spread*2, 5 + spread);
  ctx.moveTo( 8, -2); ctx.lineTo( 14 + spread*2, 5 - spread);
  ctx.stroke();
}

function __drawEnemyHead(fill, outline, eyeColor="rgba(255,70,70,0.95)", scale=1){
  ctx.save();
  ctx.scale(scale, scale);
  ctx.fillStyle = fill;
  ctx.strokeStyle = outline;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -14, 7.2, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = eyeColor;
  ctx.beginPath();
  ctx.arc(-2.5, -15, 1.2, 0, Math.PI*2);
  ctx.arc( 2.5, -15, 1.2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawIsoZombieSprite(sx, sy, e){
  const r = e.radius ?? 14;
  const outline = __enemyStrokeByElite(e, "rgba(20,20,20,0.92)");
  const bob = __enemyBreathe(e, 2.0, 1.2);
  const hit = __enemyHitNudge(e);
  const face = __enemyFacingSign(e);

  ctx.save();
  ctx.translate(sx + hit.x, sy + bob + hit.y);

  __drawEnemyShadow(r*0.95, 9, 1.0, 1.0, 0.34);

  __drawEnemyLegs(1.1, "rgba(35,40,28,0.95)");

  ctx.fillStyle = e.isElite ? "rgba(74,158,76,0.98)" : "rgba(58,128,60,0.97)";
  ctx.strokeStyle = outline;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-11, -5);
  ctx.quadraticCurveTo(-10, -12, -4, -12);
  ctx.lineTo(4, -12);
  ctx.quadraticCurveTo(11, -12, 11, -5);
  ctx.lineTo(9, 9);
  ctx.quadraticCurveTo(0, 15, -9, 9);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = "rgba(85,60,45,0.55)";
  ctx.fillRect(-5, -3, 10, 5);

  ctx.strokeStyle = "rgba(40,55,28,0.95)";
  ctx.lineWidth = 3.6;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-7, -1); ctx.lineTo(-16 - face*1.5, 5);
  ctx.moveTo(7, -2);  ctx.lineTo(14 + face*2, 7);
  ctx.stroke();

  ctx.fillStyle = "rgba(132,176,96,0.98)";
  ctx.strokeStyle = outline;
  ctx.beginPath();
  ctx.arc(0, -15, 7.6, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = "rgba(255,70,70,0.95)";
  ctx.beginPath();
  ctx.arc(-2.6, -16, 1.25, 0, Math.PI*2);
  ctx.arc( 2.6, -16, 1.25, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = "rgba(60,35,28,0.92)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-2, -10); ctx.lineTo(-5, -7);
  ctx.moveTo( 2, -10); ctx.lineTo( 5, -7);
  ctx.stroke();

  ctx.restore();
}

function drawIsoSkeletonSprite(sx, sy, e){

  ctx.strokeStyle = outline;
  ctx.lineWidth = 3;
  ctx.lineCap = "round";

  ctx.moveTo(0, -4); ctx.lineTo(0, 11);
  ctx.moveTo(-5, 0); ctx.lineTo(5, 0);
  ctx.moveTo(-4, 5); ctx.lineTo(4, 5);

  ctx.strokeStyle = "rgba(238,238,232,0.95)";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(0, -4); ctx.lineTo(0, 11);
  ctx.moveTo(-5, 0); ctx.lineTo(5, 0);
  ctx.moveTo(-4, 5); ctx.lineTo(4, 5);
  ctx.moveTo(-1, 11); ctx.lineTo(-6, 19);
  ctx.moveTo( 1, 11); ctx.lineTo( 6, 19);
  ctx.stroke();

  ctx.fillStyle = "rgba(240,240,235,0.98)";

  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -14, 7.2, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = "rgba(18,18,18,0.98)";
  ctx.beginPath();
  ctx.arc(-2.5, -15, 1.3, 0, Math.PI*2);
  ctx.arc( 2.5, -15, 1.3, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = "rgba(140,98,52,0.98)";
  ctx.lineWidth = 2.2;
  ctx.beginPath();
  ctx.arc(11*face, -1, 8, face > 0 ? -Math.PI/2 : Math.PI/2, face > 0 ? Math.PI/2 : Math.PI*1.5);
  ctx.stroke();

  ctx.strokeStyle = "rgba(225,225,225,0.82)";
  ctx.beginPath();
  ctx.moveTo((11+face*0.2)*face, -9);
  ctx.lineTo((11+face*0.2)*face, 6);
  ctx.stroke();

  ctx.restore();
}

  ctx.lineTo(10, -5);
  ctx.lineTo(13, 13);
  ctx.lineTo(-13, 13);
  ctx.lineTo(-10, -5);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = "rgba(58,30,105,0.98)";
  ctx.beginPath();
  ctx.moveTo(-7, -15);
  ctx.quadraticCurveTo(0, -24, 7, -15);
  ctx.lineTo(5, -5);

function updateCombatSystem(){

function updateMovement(){
  // вЬЕ Isometric input mapping:
  // Input (screen space): right/left/up/down from keys & joystick
  // World movement (grid space) is rotated 45¬∞ so controls feel like ARPG isometric
  const moveSpeed = player.speed * (player.buffs?.spdMul ?? 1);

  // screen-space input (ix, iy) in [-1,1]
  let ix = 0;
  let iy = 0;

  if(keys["ArrowLeft"] || keys["a"])  ix -= 1;
  if(keys["ArrowRight"] || keys["d"]) ix += 1;
  if(keys["ArrowUp"] || keys["w"])    iy -= 1;
  if(keys["ArrowDown"] || keys["s"])  iy += 1;

  ix += joyDX;
  iy += joyDY;

  // deadzone + normalize (prevents faster diagonal)
  const mag = Math.hypot(ix, iy);
  if(mag < 0.08){
    return; // no movement input
  }
  if(mag > 1){
    ix /= mag;
    iy /= mag;
  }

  // Update facing direction based on screen-space input
  if(Math.abs(ix) > Math.abs(iy)){
    player.dir = (ix > 0) ? "right" : "left";
  }else{
    player.dir = (iy > 0) ? "down" : "up";
  }

  // Convert screen-space vector -> world/grid-space vector
  // Using inverse of iso projection: screenX ~ (x - y), screenY ~ (x + y)
  const wx = (iy + ix) * 0.5;
  const wy = (iy - ix) * 0.5;

  const dx = wx * moveSpeed;
  const dy = wy * moveSpeed;

  const newX = player.x + dx;
  const newY = player.y + dy;

  if(canMoveTo(newX, player.y)) player.x = newX;
  if(canMoveTo(player.x, newY)) player.y = newY;
}

function updateArrows(){
  for(let i = arrows.length - 1; i >= 0; i--){
    const a = arrows[i];
    a.x += a.dx;
    a.y += a.dy;
    a.angle = Math.atan2(a.dy, a.dx);
    a.life--;
    a.trailTick = (a.trailTick || 0) + 1;
    if(a.trailTick % 2 === 0) spawnArrowTrail(a.x, a.y, a.dx, a.dy);

    const tx = Math.floor(a.x / tileSize);
    const ty = Math.floor(a.y / tileSize);
    if(!map[ty] || map[ty][tx] === 1){
      spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      arrows.splice(i,1);
      continue;
    }

    const px = player.x, py = player.y;
    const dxp = a.x - px;
    const dyp = a.y - py;
    const rr = (player.radius + 4);
    if(dxp*dxp + dyp*dyp < rr*rr){
      const dx = px - a.x;
      const dy = py - a.y;
      const len = Math.hypot(dx, dy) || 1;
      damagePlayer(a.damage, (dx/len)*14, (dy/len)*14, a);
      spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      arrows.splice(i,1);
      continue;
    }

    if(a.life <= 0){
      spawnArrowSpark(a.x, a.y, a.dx, a.dy);
      arrows.splice(i,1);
      continue;
    }
  }
}

function levelUpSound(){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();

  o.type = "triangle";
  o.frequency.setValueAtTime(400, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.3);

  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime + 0.3);
}

function checkLevelUp(){
  if(xp >= xpToNext){
    xp -= xpToNext;
    level++;

    xpToNext = Math.floor(100 + level * level * 20);

    player.baseMaxHp += 12;
    updateBuffs(player);
    player.hp = player.maxHp;

    baseDamageBase *= 1.08;
    ultiDamageBase *= 1.1;
    recalcFromGear();

    player.levelGlow = 60;

    for(let i=0;i<60;i++){
      levelParticles.push({
        ox:(Math.random()-0.5)*40,
        oy:-40+(Math.random()-0.5)*10,
        vx:(Math.random()-0.5)*2,
        vy:Math.random()*3+2,
        life:60
      });
    }

    levelUpSound();
  }
}

const BASE_MELEE_RANGE = 40;
const BASE_ULTI_AOE    = 40;

function getMeleeRange(){
  const b = player.buffs || defaultBuffStats();
  return BASE_MELEE_RANGE * (b.rangeMul ?? 1);
}
function getUltiAoeRadius(){
  const b = player.buffs || defaultBuffStats();
  return BASE_ULTI_AOE * (b.rangeMul ?? 1);
}

/* ===== к≥µк≤© ===== */
function checkHit(){
  const range = getMeleeRange();
  const hitLimit = 12;
  let hitDone = 0;

  function applyHitToEnemy(e, scale = 1, canExtra = true){
    if(!e || e.hp <= 0) return 0;

    const dx = e.x - player.x;
    const dy = e.y - player.y;
    const len = Math.hypot(dx, dy) || 1;
    const nx = dx / len;
    const ny = dy / len;

    const g = player.gear || {};
    const isBoss = (e.type === "boss");
    const isElite = !!e.isElite;
    const bossInvul = (isBoss && e.invul > 0);

    let weaponBase = rollWeaponDamage() + (g.flatDamageAdd || 0);

    let base =
      weaponBase
      * (g.dmgMul ?? 1)
      * (player.buffs?.dmgMul ?? 1)
      * scale;

    if(isBoss){
      base *= (g.bossDamageMul ?? 1);
    }
    if(isElite){
      base *= (g.eliteDamageMul ?? 1);
    }

    const ctxHit = buildCombatCtx("attack", e);

    const savedCritAdd = g.critChanceAdd || 0;
    if(isBoss && g.critChanceVsBoss){
      g.critChanceAdd = savedCritAdd + g.critChanceVsBoss;
    }

    const hitRes = computeFinalDamage(base, ctxHit, { canCrit:true });
    const dealt = hitRes.dealt || 0;

    g.critChanceAdd = savedCritAdd;

    const prevHp = e.hp;

if(!bossInvul && e.invul <= 0){
  if((g.executeChance || 0) > 0 && e.hp > 0){
    const hpRatio = e.hp / Math.max(1, e.maxHp || e.hp);
    if(hpRatio <= 0.18 && Math.random() < (g.executeChance || 0)){
      e.hp = 0;
    }else{
      e.hp -= dealt;
    }
  }else{
    e.hp -= dealt;
  }
}

const diedNow = (prevHp > 0 && e.hp <= 0);

if(diedNow){
  if(e.type === "boss"){
    startBossDeath(e);
  }else{
    startEnemyDeath(e);
    emitEvent("kill", { enemy:e, x:e.x, y:e.y, type:e.type });
    spawnEnemyDeathBurst(e.x, e.y, e.type);
    spawnLoot(e.x, e.y, "hit");
    giveXP(e);
  }
}

    emitEvent("hit", { enemy: e, dealt });

    const heal =
      dealt * (g.lifeLeech || 0)
      + (g.hpOnHit || 0);

    if(heal > 0){
      player.hp = Math.min(player.maxHp, player.hp + heal);
    }

    if(Math.random() < 0.2 && player.kiOrbs < player.maxOrbs){
      player.kiOrbs++;
    }

    if(bossInvul){
      spawnHitBlood(e.x, e.y, 14);
    }else{
      if((g.knockbackChance || 0) > 0 && Math.random() < g.knockbackChance){
        e.stun = Math.max(e.stun || 0, 15);
        __enemyHitFlashStart(e, 1);
        let ex = e.x + nx * 18;
        let ey = e.y + ny * 18;
        if(canEnemyMoveTo(e, ex, e.y)) e.x = ex;
        if(canEnemyMoveTo(e, e.x, ey)) e.y = ey;
      }else{
        e.stun = Math.max(e.stun || 0, 8);
        __enemyHitFlashStart(e, 1);
      }
    }

    if((g.bleedChance || 0) > 0 && !bossInvul && Math.random() < g.bleedChance){
      e.bleed = {
        life: 90,
        tick: 0,
        damage: Math.max(1, dealt * 0.18)
      };
    }

    if(bossInvul) thudSound();
    else hitSound();

    shake = 12;

    if(particles.length < 220){
      particles.push({
        x: e.x, y: e.y,
        vx: nx*4 + (Math.random()-0.5)*4,
        vy: ny*4 + (Math.random()-0.5)*4,
        life: 30
      });
    }

    if(e.hp <= 0){
      if(e.type === "boss"){
        startBossDeath(e);
      }else{
        startEnemyDeath(e);
        emitEvent("kill", { enemy: e, x: e.x, y: e.y, type: e.type });
        spawnEnemyDeathBurst(e.x, e.y, e.type);

        const dropPos = findNearestLootDropPos(e.x, e.y);
        spawnLoot(dropPos.x, dropPos.y, "normal");

        giveXP(e);
        killCount++;

        if((g.hpOnKill || 0) > 0){
          player.hp = Math.min(player.maxHp, player.hp + g.hpOnKill);
        }else{
          player.hp = Math.min(player.maxHp, player.hp + 1);
        }

        if(bloodPools.length < 140){
          bloodPools.push({
            x: e.x, y: e.y,
            size: 10 + Math.random()*6,
            life: 600
          });
        }

        slowMotion = 6;

        if(player.kiOrbs < player.maxOrbs){
          player.kiOrbs++;
        }
      }
    }

    if(canExtra && (g.cleaveChance || 0) > 0 && !bossInvul && Math.random() < g.cleaveChance){
      let splash = 0;
      for(const other of enemies){
        if(!other || other === e || other.hp <= 0) continue;
        const ddx = other.x - e.x;
        const ddy = other.y - e.y;
        if(ddx*ddx + ddy*ddy > 54*54) continue;
        applyHitToEnemy(other, 0.45, false);
        splash++;
        if(splash >= 3) break;
      }
    }

    if(canExtra && (g.doubleHitChance || 0) > 0 && !bossInvul && Math.random() < g.doubleHitChance){
      applyHitToEnemy(e, 0.55, false);
    }

    return dealt;
  }

  for(let i=0;i<enemies.length;i++){
    const e = enemies[i];

    const dx = e.x - player.x;
    const dy = e.y - player.y;

    const r = range + e.radius;
    if(dx*dx + dy*dy > r*r) continue;

    if(player.dir === "up" && dy >= 0) continue;
    if(player.dir === "down" && dy <= 0) continue;
    if(player.dir === "right" && dx <= 0) continue;
    if(player.dir === "left" && dx >= 0) continue;

    hitDone++;
    if(hitDone > hitLimit) break;

    applyHitToEnemy(e, 1, true);
  }

  enemies = enemies.filter(e => (e.hp > 0) || (e.dead && e.deathTimer > 0));
  packs.forEach(pack=>{
    pack.enemies = pack.enemies.filter(e=>(e.hp>0) || (e.dead && e.deathTimer > 0));
  });
}

function updateBlood(){
  for(let i = bloodParticles.length - 1; i >= 0; i--){
    const p = bloodParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25;
    p.life--;
    if(p.life <= 0) bloodParticles.splice(i,1);
  }
  if(bloodParticles.length > 260){
    bloodParticles.splice(0, bloodParticles.length - 260);
  }
}

function drawBlood(){
  if(bloodParticles.length === 0) return;

  ctx.save();
  ctx.fillStyle = "#8b0000";
  ctx.beginPath();

  for(let i=0;i<bloodParticles.length;i++){
    const p = bloodParticles[i];
    const a = p.life / 30;
    if(a > 0.66) ctx.globalAlpha = 0.9;
    else if(a > 0.33) ctx.globalAlpha = 0.6;
    else ctx.globalAlpha = 0.35;

    ctx.fillRect(p.x - p.size*0.5, p.y - p.size*0.5, p.size, p.size);
  }
  ctx.restore();
}

/* ===== л†МлНФ ===== */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.shadowColor = "transparent";
  ctx.filter = "none";

  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let camX = player.x - canvas.width/2;
  let camY = player.y - canvas.height/2;

  let amp = shake ? (6 + shake * 0.45) : 0;
  let sx = shake ? (Math.random()-0.5) * amp : 0;
  let sy = shake ? (Math.random()-0.5) * amp : 0;

  ctx.save();
  ctx.translate(-camX+sx, -camY+sy);

  for(let y = 0; y < map.length; y++){
    for(let x = 0; x < map[y].length; x++){
      let tile = map[y][x];
      if(tile === 0) ctx.fillStyle = "#222";
      if(tile === 1) ctx.fillStyle = "#555";
      ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
    }
  }

  ctx.fillStyle = "#550000";
  for(let i=0;i<bloodPools.length;i++){
    const b = bloodPools[i];
    const a = b.life / 600;
    if(a <= 0.05) continue;
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  fireZones.forEach(f=>{
    ctx.save();
    for(let i=0;i<6;i++){
      let flameHeight = 10 + Math.sin(frameCount*0.2 + i)*6;
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = "orange";
      ctx.beginPath();
      ctx.moveTo(f.x - 6 + i*2, f.y);
      ctx.lineTo(f.x - 3 + i*2, f.y - flameHeight);
      ctx.lineTo(f.x + i*2, f.y);
      ctx.fill();
    }
    ctx.restore();
  });

  ctx.fillStyle = "red";
  for(let i=0;i<particles.length;i++){
    const p = particles[i];
    ctx.fillRect(p.x, p.y, 3, 3);
  }

  drawPortal();
  drawLoots();
  drawBlood();
  enemies.forEach(e=>drawEnemy(e));

  levelParticles.forEach(p=>{
    ctx.fillStyle = "gold";
    ctx.fillRect(player.x + p.ox, player.y + p.oy, 4, 4);
  });

  arrows.forEach(a=>{
    drawArrowSprite(a.x, a.y, a.angle || Math.atan2(a.dy||0, a.dx||1), 1);
  });

  ctx.restore();

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  drawPlayer(canvas.width/2, canvas.height/2);
  drawUI();
}

function drawPlayer(x,y){
  if(player.levelGlow > 0){
    ctx.shadowColor = "gold";
    ctx.shadowBlur = player.levelGlow * 0.5;
  }

  ctx.fillStyle="#880000";
  ctx.fillRect(x-10,y-12,20,22);

  ctx.fillStyle="#aa0000";
  ctx.fillRect(x-7,y-20,14,8);

  ctx.fillStyle="#ffffcc";
  ctx.fillRect(x-8,y-26,4,8);
  ctx.fillRect(x+4,y-26,4,8);

  ctx.fillStyle = "#fff";
  ctx.fillRect(x-3,y-14,2,2);
  ctx.fillRect(x+1,y-14,2,2);

  ctx.shadowBlur = 0;

  if(player.ultiActive){
    ctx.save();
    ctx.shadowColor = "#ff6600";
    ctx.shadowBlur = 25;
    ctx.fillStyle = "#ffaa00";
    ctx.fillRect(x-3,y-14,2,2);
    ctx.fillRect(x+1,y-14,2,2);
    ctx.restore();
  }

  drawSword(x,y);
}

function drawSword(x, y){
  ctx.save();
  ctx.translate(x, y);

  var offsetX = 0;
  var offsetY = 0;
  var angle = 0;
  var t = attackFrame / 8;

  if (player.dir === "right") { offsetX = 18; if (attacking) angle = 1.5 * t; }
  else if (player.dir === "left") { offsetX = -18; if (attacking) angle = -1.5 * t; }
  else if (player.dir === "up") { offsetY = -18; if (attacking) offsetY -= 25 * t; }
  else if (player.dir === "down") { offsetY = 6; angle = Math.PI; if (attacking) offsetY += 25 * t; }

  ctx.translate(offsetX, offsetY);
  ctx.rotate(angle);
  drawSwordShape(ctx);
  ctx.restore();
}

function drawSwordShape(c){
  c.fillStyle = "#552200";
  c.fillRect(-2, 6, 4, 8);

  c.fillStyle = "#bbbbbb";
  c.fillRect(-8, 6, 16, 3);

  c.fillStyle = "#dddddd";
  c.fillRect(-2, -20, 4, 26);

  c.beginPath();
  c.moveTo(-2, -20);
  c.lineTo(0, -32);
  c.lineTo(2, -20);
  c.fill();
}

function drawEnemy(e){
  if(e.type === "boss"){
    if(e.dead){
      const t = (e.deathTimer / e.deathMax);
      ctx.save();
      ctx.globalAlpha = Math.max(0, t);

      ctx.fillStyle = "rgba(255,60,60,0.25)";
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + (1-t)*35, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = "#777777";
      ctx.fillRect(e.x-20, e.y-25, 40, 50);

      if(Math.floor(frameCount/3)%2===0){
        ctx.fillStyle = "rgba(255,0,0,0.8)";
        ctx.fillRect(e.x-6, e.y-15, 4,4);
        ctx.fillRect(e.x+2, e.y-15, 4,4);
      }

      ctx.restore();
      return;
    }

    if(e.invul > 0){
      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + 10, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    ctx.fillStyle = "#777777";
    ctx.fillRect(e.x-20, e.y-25, 40, 50);

    ctx.fillStyle = "#999999";
    ctx.fillRect(e.x-15, e.y-35, 30, 15);

    ctx.fillStyle = "red";
    ctx.fillRect(e.x-6, e.y-15, 4,4);
    ctx.fillRect(e.x+2, e.y-15, 4,4);

    ctx.save();
    ctx.translate(e.x+28, e.y);
    ctx.rotate(0.2);
    drawSwordShape(ctx);
    ctx.restore();
    return;
  }

  if(e.isLeader){
    ctx.fillStyle = "#ffd000";
    ctx.fillRect(e.x-6, e.y-24, 12, 3);
    ctx.fillRect(e.x-4, e.y-28, 3, 4);
    ctx.fillRect(e.x+1, e.y-28, 3, 4);
  }
  if(e.isElite){
    ctx.fillStyle = (e.eliteColor === "yellow") ? "#ffcc00" : "#00aaff";
  }else if(e.type === "archer"){
    ctx.fillStyle = "#cccccc";
  }else if(e.type === "mage"){
    ctx.fillStyle = "#550088";
  }else if(e.type === "orc"){
    ctx.fillStyle = "#668800";
  }else if(e.type === "demon"){
    ctx.fillStyle = "#992222";
  }else{
    ctx.fillStyle = "#006600";
  }

  if(e.activeBuffs && e.activeBuffs.some(b => b.key === "damage|leader|mul" || b.key === "atkSpeed|leader|mul")){
    const pulse = 0.45 + 0.25*Math.sin(frameCount*0.2);
    ctx.save();
    ctx.globalAlpha = 0.25 + pulse;
    ctx.fillStyle = "rgba(255,0,0,0.35)";
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius + 12 + pulse*6, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  ctx.fillRect(e.x-10,e.y-12,20,22);

  if(e.type === "archer") ctx.fillStyle = "#dddddd";
  else if(e.type === "mage") ctx.fillStyle = "#550088";
  else if(e.type === "orc") ctx.fillStyle = "#99cc33";
  else if(e.type === "demon") ctx.fillStyle = "#ff7755";
  else ctx.fillStyle = "#00aa00";
  ctx.fillRect(e.x-7,e.y-20,14,8);

  ctx.fillStyle="red";
  ctx.fillRect(e.x-4,e.y-14,3,3);
  ctx.fillRect(e.x+1,e.y-14,3,3);
}

function drawMiniMap(){
  const w = 60;
  const h = 60;
  const margin = 12;
  const x0 = canvas.width - w - margin;
  const y0 = margin;

  const radarRange = 700;
  const scale = w / (radarRange * 2);

  const cx = x0 + w/2;
  const cy = y0 + h/2;

  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = "#000";
  ctx.fillRect(x0, y0, w, h);

  ctx.beginPath();
  ctx.rect(x0+1, y0+1, w-2, h-2);
  ctx.clip();

  ctx.globalAlpha = 0.7;
  ctx.strokeStyle = "#888";
  ctx.lineWidth = 1;

  const minTX = Math.max(0, Math.floor((player.x - radarRange) / tileSize));
  const maxTX = Math.min(mapSize-1, Math.floor((player.x + radarRange) / tileSize));
  const minTY = Math.max(0, Math.floor((player.y - radarRange) / tileSize));
  const maxTY = Math.min(mapSize-1, Math.floor((player.y + radarRange) / tileSize));

  for(let ty=minTY; ty<=maxTY; ty++){
    for(let tx=minTX; tx<=maxTX; tx++){
      if(map[ty][tx] !== 1) continue;
      const wx = tx * tileSize;
      const wy = ty * tileSize;
      const dx = wx - player.x;
      const dy = wy - player.y;
      const mx = cx + dx * scale;
      const my = cy + dy * scale;
      const size = tileSize * scale;
      ctx.strokeRect(mx, my, size, size);
    }
  }

  const boss = enemies.find(e => e.type === "boss");
  if(boss){
    const dx = boss.x - player.x;
    const dy = boss.y - player.y;
    if(dx*dx + dy*dy <= radarRange*radarRange){
      const mx = cx + dx * scale;
      const my = cy + dy * scale;
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#fff";
      ctx.fillRect(mx-3, my-3, 6, 6);
    }
  }

  ctx.globalAlpha = 0.95;
  for(const e of enemies){
    if(e.hp <= 0) continue;
    if(e.type === "boss") continue;
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    if(dx*dx + dy*dy > radarRange*radarRange) continue;
    const mx = cx + dx * scale;
    const my = cy + dy * scale;
    if(e.type === "mage") ctx.fillStyle = "#aa55ff";
    else if(e.type === "archer") ctx.fillStyle = "#dddddd";
    else if(e.type === "orc") ctx.fillStyle = "#88cc44";
    else if(e.type === "demon") ctx.fillStyle = "#ff6644";
    else ctx.fillStyle = "#00ff66";
    ctx.fillRect(mx-1.5, my-1.5, 3, 3);
  }

  ctx.globalAlpha = 1;
  ctx.fillStyle = "#ff4444";
  ctx.fillRect(cx-2, cy-2, 4, 4);

  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 2;
  ctx.strokeRect(x0+1, y0+1, w-2, h-2);
  ctx.restore();
}

function drawOrbUI(){
  const btnRect = document.getElementById("attackBtn").getBoundingClientRect();
  const centerScreenX = btnRect.left + btnRect.width * 0.5;
  const centerScreenY = btnRect.top  + btnRect.height * 0.5;

  let cx = centerScreenX;
  let cy = centerScreenY - uiHeight;

  cx = Math.max(60, Math.min(canvas.width - 60, cx));
  cy = Math.max(60, Math.min(canvas.height - 60, cy));

  const orbR = 10;
  const ringR = 34;
  const startAngle = -Math.PI/2;

  const centerR = 24;
  const ready = (player.kiOrbs >= 1 && enemies.length > 0 && !player.ultiActive);

  orbUIState.cx = cx;
  orbUIState.cy = cy;
  orbUIState.centerR = centerR;
  orbUIState.ready = ready;

  ctx.save();

  for(let i=0;i<player.maxOrbs;i++){
    const a = startAngle + (i * (Math.PI * 2 / player.maxOrbs));
    const x = cx + Math.cos(a) * ringR;
    const y = cy + Math.sin(a) * ringR;

    ctx.beginPath();
    ctx.arc(x, y, orbR, 0, Math.PI*2);

    if(orbFlash > 0){
      ctx.fillStyle = "#00ff88";
      ctx.shadowColor = "#00ff88";
      ctx.shadowBlur = 35;
    }
    else if(i < player.kiOrbs){
      ctx.fillStyle = "#00ff55";
      ctx.shadowColor = "#00ff55";
      ctx.shadowBlur = 15;
    }
    else{
      ctx.fillStyle = "#002211";
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
    }

    ctx.fill();
  }

  ctx.shadowBlur = ready ? 25 : 10;
  ctx.shadowColor = ready ? "rgba(120,180,255,0.95)" : "rgba(120,180,255,0.4)";
  ctx.fillStyle = ready ? "rgba(40,120,255,0.95)" : "rgba(40,120,255,0.45)";
  ctx.beginPath();
  ctx.arc(cx, cy, centerR, 0, Math.PI*2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = "rgba(170,210,255,0.75)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, centerR+1, 0, Math.PI*2);
  ctx.stroke();

  ctx.globalAlpha = 0.95;
  ctx.fillStyle = "white";
  ctx.font = "bold 18px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("U", cx, cy+1);

  ctx.restore();
}

function drawHpOrb(){
  const uiH = ui.getBoundingClientRect().height || 120;
  const padRect = document.getElementById("movePad").getBoundingClientRect();
  let x = padRect.left + padRect.width * 0.5;

  const btnRect = document.getElementById("attackBtn").getBoundingClientRect();
  let y = (btnRect.top + btnRect.height * 0.5) - uiH;

  x = Math.max(40, Math.min(canvas.width - 40, x));
  y = Math.max(40, Math.min(canvas.height - 40, y));

  ctx.save();

  let radius = 25;
  hpWaveOffset += 0.07;

  let hpPercent = player.hp / player.maxHp;
  let liquidHeight = radius * 2 * hpPercent;
  let topY = y + radius - liquidHeight;

  let metal = ctx.createRadialGradient(x, y, radius-10, x, y, radius+12);
  metal.addColorStop(0, "#2a0000");
  metal.addColorStop(0.5, "#550000");
  metal.addColorStop(1, "#110000");

  ctx.beginPath();
  ctx.arc(x, y, radius+10, 0, Math.PI*2);
  ctx.fillStyle = metal;
  ctx.fill();

  ctx.lineWidth = 4;
  ctx.strokeStyle = "#000";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, radius+6, 0, Math.PI*2);
  ctx.strokeStyle = "#aa0000";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.clip();

  let innerShadow = ctx.createRadialGradient(x, y+15, 10, x, y, radius);
  innerShadow.addColorStop(0, "#330000");
  innerShadow.addColorStop(1, "#000000");
  ctx.fillStyle = innerShadow;
  ctx.fillRect(x-radius, y-radius, radius*2, radius*2);

  ctx.beginPath();
  ctx.moveTo(x-radius, y+radius);
  for(let i=0;i<=radius*2;i++){
    let wave = Math.sin(i*0.12 + hpWaveOffset) * 4;
    ctx.lineTo(x-radius+i, topY + wave);
  }
  ctx.lineTo(x+radius, y+radius);
  ctx.closePath();

  let blood = ctx.createLinearGradient(0, topY, 0, y+radius);
  blood.addColorStop(0, "#ff2a2a");
  blood.addColorStop(1, "#8b0000");
  ctx.fillStyle = blood;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x-15, y-20, 18, 0, Math.PI*2);
  ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.fill();

  let glass = ctx.createRadialGradient(x-10, y-15, 5, x, y, radius);
  glass.addColorStop(0, "rgba(255,255,255,0.25)");
  glass.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = glass;
  ctx.fillRect(x-radius, y-radius, radius*2, radius*2);

  if(hpPercent < 0.3){
    if(Math.floor(Date.now()/200)%2===0){
      ctx.beginPath();
      ctx.arc(x, y, radius+14, 0, Math.PI*2);
      ctx.fillStyle = "rgba(255,0,0,0.25)";
      ctx.fill();
    }
  }

  ctx.fillStyle = "white";
  ctx.font = "bold 16px Arial";
  ctx.textAlign = "center";
  ctx.fillText(Math.floor(player.hp), x, y+6);

  ctx.restore();

  const st = (player && player.chargeState) ? player.chargeState : { frenzy:0, frenzyMax:5, frenzyLastGainFrame:0, endurance:0, enduranceMax:5, enduranceLastGainFrame:0, enduranceLastHitFrame:0 };
  const dotR = 4;
  const gap = 12;

  const frenzyMax = Math.max(1, Math.min(5, st.frenzyMax || 5));
  const frenzy = Math.max(0, Math.min(frenzyMax, st.frenzy || 0));
  const frenzyRowW = (frenzyMax - 1) * gap;
  const frenzyY = y + radius + 20;

  for(let i=0; i<frenzyMax; i++){
    const fxX = x - frenzyRowW * 0.5 + i * gap;
    ctx.beginPath();
    ctx.arc(fxX, frenzyY, dotR, 0, Math.PI * 2);
    ctx.fillStyle = (i < frenzy) ? "#43ff74" : "rgba(40,90,50,0.85)";
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = "rgba(0,0,0,0.75)";
    ctx.stroke();
  }

  ctx.font = "bold 10px Arial";
  ctx.fillStyle = "#7dff9d";
  ctx.textAlign = "center";
  ctx.fillText("к≤©лґД " + frenzy + "/" + frenzyMax, x, frenzyY + 14);

  const enduranceMax = Math.max(1, Math.min(5, st.enduranceMax || 5));
  const endurance = Math.max(0, Math.min(enduranceMax, st.endurance || 0));
  const enduranceRowW = (enduranceMax - 1) * gap;
  const enduranceY = frenzyY + 28;

  for(let i=0; i<enduranceMax; i++){
    const exX = x - enduranceRowW * 0.5 + i * gap;
    ctx.beginPath();
    ctx.arc(exX, enduranceY, dotR, 0, Math.PI * 2);
    ctx.fillStyle = (i < endurance) ? "#ff5a5a" : "rgba(95,35,35,0.88)";
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = "rgba(0,0,0,0.78)";
    ctx.stroke();
  }

  ctx.font = "bold 10px Arial";
  ctx.fillStyle = "#ff8e8e";
  ctx.textAlign = "center";
  ctx.fillText("мЭЄлВі " + endurance + "/" + enduranceMax, x, enduranceY + 14);

  ctx.restore();
}

function drawBossHpBar(){
  const boss = enemies.find(e => e.type === "boss");
  if(!boss) return;

  let camX = player.x - canvas.width/2;
  let camY = player.y - canvas.height/2;

  const screenX = boss.x - camX;
  const screenY = boss.y - camY;

  if(screenX < -100 || screenX > canvas.width + 100 || screenY < -100 || screenY > canvas.height + 100) return;

  const barW = 70;
  const barH = 7;
  const x = screenX - barW/2;
  const y = screenY - boss.radius - 18;

  let percent = boss.hp / boss.maxHp;
  percent = Math.max(0, Math.min(1, percent));

  ctx.save();
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(x, y, barW, barH);
  ctx.fillStyle = "#ff4444";
  ctx.fillRect(x, y, barW * percent, barH);
  ctx.globalAlpha = 0.85;
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, barW - 1, barH - 1);
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.font = "10px Arial";
  ctx.textAlign = "center";
  ctx.fillText(Math.ceil(boss.hp), screenX, y - 2);
  ctx.restore();
}

function drawGameOver(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle="rgba(0,0,0,0.6)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.font="bold 40px Arial";
  ctx.textAlign="center";
  ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);

  ctx.font="bold 18px Arial";
  ctx.fillText("Tap to Restart", canvas.width/2, canvas.height/2 + 40);
}

function tryUltimate(){
  if(player.ultiActive) return;
  if(player.kiOrbs >= 1 && enemies.length > 0){
    player.kiOrbs -= 1;
    player.ultiActive = true;
    player.ultiTimer = 0;
    player.ultiCount = 0;
    performUltimateStrike();
    endUltimate();
  }
}

function handleUltimateOrbPress(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const tx = clientX - rect.left;
  const ty = clientY - rect.top;

  const dx = tx - orbUIState.cx;
  const dy = ty - orbUIState.cy;
  const r = orbUIState.centerR;

  if(dx*dx + dy*dy <= r*r){
    tryUltimate();
    return true;
  }
  return false;
}
