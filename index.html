<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Iso POE Skeleton (Camera Follow)</title>
<style>
html,body{margin:0;height:100%;background:#111;overflow:hidden;font-family:system-ui;}
#wrap{display:flex;height:100%;}
#left{flex:1;position:relative;touch-action:none;}
canvas{position:absolute;inset:0;background:#1a1a1a;}
#ui{width:320px;background:#17171c;border-left:1px solid #333;color:#eee;padding:10px;box-sizing:border-box;}
</style>
</head>
<body>
<div id="wrap">
  <div id="left">
    <canvas id="game"></canvas>
  </div>
  <div id="ui">
    <h3>카메라 고정 모드</h3>
    <p>플레이어가 항상 화면 중앙에 위치합니다.</p>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  const uiWidth = document.getElementById("ui").offsetWidth;
  canvas.width = window.innerWidth - uiWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const state = {
  map:{ w:80, h:80, tw:64, th:32 },
  player:{ x:40, y:40, speed:6 }
};

const keys = {};
window.addEventListener("keydown", e=>keys[e.key]=true);
window.addEventListener("keyup", e=>keys[e.key]=false);

function iso(x,y){
  const TW = state.map.tw;
  const TH = state.map.th;

  // 카메라를 플레이어 기준으로 이동
  const camOffsetX = (state.player.x - state.player.y) * (TW/2);
  const camOffsetY = (state.player.x + state.player.y) * (TH/2);

  return {
    x:(x - y)*(TW/2) - camOffsetX + canvas.width/2,
    y:(x + y)*(TH/2) - camOffsetY + canvas.height/2
  };
}

function drawTile(x,y,color){
  const TW = state.map.tw;
  const TH = state.map.th;
  const p = iso(x,y);

  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x + TW/2, p.y + TH/2);
  ctx.lineTo(p.x, p.y + TH);
  ctx.lineTo(p.x - TW/2, p.y + TH/2);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

let last = performance.now();
function loop(now){
  const dt = (now-last)/1000;
  last = now;

  let dx=0, dy=0;
  if(keys["w"]||keys["ArrowUp"]) dy-=1;
  if(keys["s"]||keys["ArrowDown"]) dy+=1;
  if(keys["a"]||keys["ArrowLeft"]) dx-=1;
  if(keys["d"]||keys["ArrowRight"]) dx+=1;

  if(dx||dy){
    const len = Math.hypot(dx,dy)||1;
    dx/=len; dy/=len;
    state.player.x += dx*state.player.speed*dt;
    state.player.y += dy*state.player.speed*dt;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const R = 20;
  const minX = Math.floor(state.player.x - R);
  const maxX = Math.floor(state.player.x + R);
  const minY = Math.floor(state.player.y - R);
  const maxY = Math.floor(state.player.y + R);

  for(let y=minY;y<=maxY;y++){
    for(let x=minX;x<=maxX;x++){
      if(x<0||y<0||x>=state.map.w||y>=state.map.h) continue;
      drawTile(x,y,(x+y)%2?"#23232a":"#2a2a33");
    }
  }

  const p = iso(state.player.x, state.player.y);
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(p.x, p.y + state.map.th/2, 12, 0, Math.PI*2);
  ctx.fill();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
