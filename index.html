    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}
/* ===== нСЬмЛЬмЪ© нНЉмДЉнКЄ мЬ†нЛЄ ===== */
function fmtPct1(n){
  // 1мЮРл¶ђкєМмІА л∞ШмШђл¶Љ, лБЭ .0 м†Ьк±∞
  const v = Math.round(n*10)/10;
  return String(v).replace(/\.0$/, "");
}
function fmtIncPctFromMul(m){
  const pct = (Number(m)||0) * 100 - 100; // mul(1.10) -> 10
  const abs = Math.abs(pct);
  const s = fmtPct1(abs);
  if(abs < 0.05) return "0% м¶Эк∞А";
  return (pct >= 0) ? `${s}% м¶Эк∞А` : `${s}% к∞РмЖМ`;
}
function fmtCritBonusFromMul(m){
  const pct = (Number(m)||0) * 100 - 100;
  const s = fmtPct1(pct);
  // мєШнФЉлКФ POE лКРлВМмЬЉл°Ь +50% нСЬкЄ∞
  return (pct >= 0) ? `+${s}%` : `${s}%`;
}


function rarityKey(it){
  if(!it) return "normal";
  const r = normalizeRarity(it.rarity);
  if(it.isUnique || r === "unique") return "unique";
  return r;
}
function rarityClass(it){
  return "r-" + rarityKey(it);
}
function fmtPct(x, digits=1){
  // xк∞А 0.123мЭіл©і 12.3%
  const p = x * 100;
  const v = Math.round(p * Math.pow(10, digits)) / Math.pow(10, digits);
  // 0.0 к∞ЩмЭА к∞ТмЭіл©і мЖМмИШ мЧЖмХ†кЄ∞
  return (Math.abs(v - Math.round(v)) < 1e-9) ? String(Math.round(v)) : String(v);
}

function fmtNum(x, digits=2){
  const v = Math.round(x * Math.pow(10, digits)) / Math.pow(10, digits);
  return (Math.abs(v - Math.round(v)) < 1e-9) ? String(Math.round(v)) : String(v);
}


function formatAffixReadable(mod){
  if(!mod) return "";

  // modлКФ (1) roll object {kind, affix, tier, value} лШРлКФ (2) affix object мЮРм≤імЭЉ мИШ мЮИмЭМ
  const a = mod.affix || mod;
  const v = (typeof mod.value === "number") ? mod.value : a.value;

  const g = String(a.group || a.stat || a.id || "").toLowerCase();
  const name = a.name || a.id || "мШµмЕШ";

  const num = (x)=> (typeof x==="number" && isFinite(x)) ? x : 0;
  const pct = (x)=>`${Math.round(num(x))}%`;
  const pct1 = (x)=>`${num(x).toFixed(1)}%`;

  // ===== нНЉмДЉнКЄ/мИШмєШ нСЬкЄ∞ кЈЬмєЩ =====
  // - нФЉнХі/к≥µмЖН/л≤ФмЬД/м†АнХ≠/мєШнЩХ/мєШнФЉ лУ±: %л°Ь нСЬкЄ∞
  // - мµЬлМАм≤іл†•/мґФк∞АлђЉл¶ђ: мИЂмЮР
  // - мЮђмГЭ: /s

  // нФЉнХі(%) 
  if(g.includes("spell_damage")) return `м£ЉлђЄ нФЉнХі +${pct(v)}`;
  if(g.includes("fire_damage")) return `нЩФмЧЉ нФЉнХі +${pct(v)}`;
  if(g.includes("cold_damage")) return `лГЙкЄ∞ нФЉнХі +${pct(v)}`;
  if(g.includes("light_damage")) return `л≤Ик∞Ь нФЉнХі +${pct(v)}`;
  if(g.includes("phys") && !g.includes("flat")) return `лђЉл¶ђ нФЉнХі +${pct(v)}`;

  // flat phys
  if(g.includes("phys_flat")) return `мґФк∞А лђЉл¶ђ нФЉнХі +${Math.round(num(v))}`;

  // мЖНлПД/л≤ФмЬД
  if(g.includes("attackspeed")) return `к≥µк≤© мЖНлПД +${pct(v)}`;
  if(g === "range" || g.includes("melee_range")) return `л≤ФмЬД +${pct(v)}`;

  // мєШл™Е
  if(g.includes("critchance")) return `мєШл™ЕнГА нЩХл•† +${pct1(v)}`;
  if(g.includes("critmulti")) return `мєШл™ЕнГА нФЉнХі +${pct(v)}`;

  // мГЭм°і
  if(g.includes("life_leech")) return `мГЭл™Ел†• нЭ°мИШ ${pct(v)}`;
  if(g.includes("life") || g.includes("maxhp")) return `мµЬлМА м≤іл†• +${Math.round(num(v))}`;
  if(g.includes("hpregen")) return `мЮђмГЭ +${num(v).toFixed(2)}/s`;

  // л∞©мЦі/мЭімЖН
  if(g.includes("armor_pct")) return `л∞©мЦілПД +${pct(v)}`;
  if(g.includes("movespeed")) return `мЭілПЩ мЖНлПД +${pct(v)}`;

  // м†АнХ≠
  if(g.includes("resist_all")) return `л™®лУ† м†АнХ≠ +${Math.round(num(v))}`;
  if(g.includes("resist_fire")) return `нЩФмЧЉ м†АнХ≠ +${Math.round(num(v))}`;
  if(g.includes("resist_cold")) return `лГЙкЄ∞ м†АнХ≠ +${Math.round(num(v))}`;
  if(g.includes("resist_light")) return `л≤Ик∞Ь м†АнХ≠ +${Math.round(num(v))}`;

  // fallback: name + value
  if(typeof v === "number"){
    // к∞ТмЭі 0~1 мЖМмИШл©і %л°Ь нСЬмЛЬнХіл≥ікЄ∞(кµђнШХ лН∞мЭінД∞ нШЄнЩШ)
    if(v > 0 && v < 1) return `${name} +${pct(v*100)}`;
    return `${name} +${Math.round(num(v))}`;
  }
  return `${name}`;
}


function rarityLabel(it){
  const r = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
  if(r==="unique") return "мЬ†лЛИнБђ";
  if(r==="rare") return "л†ИмЦі";
  if(r==="magic") return "лІ§мІБ";
  return "лЕЄл©А";
}

function getWeaponDisplayStats(it){
  if(!it || it.slot !== "weapon") return null;

  const baseMin = Number(player?.weapon?.min ?? 14);
  const baseMax = Number(player?.weapon?.max ?? 20);
  const td = it.totalData || it.data || {};

  const dmgMul = Number(td.dmgMul ?? 1);
  const flat = Number(td.flatDamage ?? 0);

  // мЭЉлґА л≤†мЭімК§к∞А spdMulмЭД "к≥µк≤© мЖНлПД к∞Рк∞Б"мЬЉл°Ь мУ∞к≥† мЮИмЦімДЬ fallbackмЬЉл°Ь нЧИмЪ©
  let atkMul = Number(td.atkSpdMul ?? 0);
  if(!(atkMul > 0)) atkMul = Number(td.spdMul ?? 1);
  if(!(atkMul > 0)) atkMul = 1;

  const min = Math.max(1, Math.floor(baseMin * dmgMul + flat));
  const max = Math.max(min, Math.floor(baseMax * dmgMul + flat));
  const avg = (min + max) / 2;
  const dps = avg * atkMul;

  return { min, max, atkMul, dps };
}

function prettyItemHTML(it){
  if(!it) return "";

  const rCls = rarityClass(it);
  let html = `<div class="itemInfoWrap">`;

  // 1) мХДмЭінЕЬ мЭіл¶Д(лУ±кЄЙ мГЙ)
  html += `<div class="itemInfoName ${rCls}">${escHtml(it.name || "")}</div>`;

  // мЬ†лЛИнБђ(м†ДмД§)лКФ мШИмЩЄ м≤Шл¶ђ: мД§л™ЕлІМ кєФлБФнЮИ
  if(it.isUnique){
    const desc = it.uniqueRef?.desc || it.desc || "";
    if(desc){
      html += `<div class="itemInfoLine itemInfoDim">${escHtml(desc)}</div>`;
    }
    html += `</div>`;
    return html;
  }

  // 2) л≤†мЭімК§ + ilvl + л≤†мЭімК§ нЛ∞мЦі
  const baseName = it.baseName || it.baseId || it.id || "";
  if(baseName){
    const bt = (typeof it.baseTier === "number") ? ` (нЛ∞мЦі ${it.baseTier})` : "";
    html += `<div class="itemInfoLine itemInfoDim">л≤†мЭімК§: ${escHtml(baseName)}${escHtml(bt)}</div>`;
  }
  if(typeof it.ilvl === "number"){
    html += `<div class="itemInfoLine itemInfoDim">мХДмЭінЕЬ л†Ил≤®: ${it.ilvl}</div>`;
  }

  // лУ±кЄЙ нСЬкЄ∞
  html += `<div class="itemInfoLine itemInfoDim">лУ±кЄЙ: ${rarityLabel(it)}</div>`;

  // 3) мХФлђµ мШµмЕШ(Implicit) вАФ м†СлСР/м†СлѓЄмЩА мЩДм†Д лґДл¶ђ
  const imps = Array.isArray(it.implicits) ? it.implicits : [];
  if(imps.length){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">мХФлђµ мШµмЕШ</div>`;
    for(const imp of imps){
      if(!imp) continue;
      // textк∞А мЮИлКФ мХФлђµлІМ мґЬл†• (нЧђнНЉмЪ© Min/Max м°∞к∞Б лУ±мЭА мИ®кєА)
      if(!imp.text) continue;
      const line = imp.text;
      html += `<div class="itemInfoLine">- ${escHtml(line)}</div>`;
    }
  }

  // 4) л≤†мЭімК§ мШµмЕШ
  html += `<div class="itemInfoGap"></div>`;
  html += `<div class="itemInfoLine itemInfoDim">л≤†мЭімК§ мШµмЕШ</div>`;

  if(it.slot === "weapon"){
    const ws = getWeaponDisplayStats(it);
    if(ws){
      html += `<div class="itemInfoLine">- к≥µк≤©л†•: ${ws.min} - ${ws.max}</div>`;
      html += `<div class="itemInfoLine">- к≥µк≤© мЖНлПД: x${ws.atkMul.toFixed(2)}</div>`;
      html += `<div class="itemInfoLine">- DPS: ${ws.dps.toFixed(1)}</div>`;
    }
    if(typeof it.baseDamage === "number"){
      html += `<div class="itemInfoLine itemInfoDim">- кЄ∞л≥Є лђікЄ∞ нФЉнХі +${Math.floor(it.baseDamage)}</div>`;
    }
  }

  if(it.baseData){
    const d = it.baseData;
    if(d.maxHpAdd) html += `<div class="itemInfoLine">- мµЬлМА м≤іл†• +${Math.floor(d.maxHpAdd)}</div>`;
    if(d.armorAdd) html += `<div class="itemInfoLine">- л∞©мЦіл†• +${Math.floor(d.armorAdd)}</div>`;
    if(d.hpRegen)  html += `<div class="itemInfoLine">- мЮђмГЭ +${d.hpRegen.toFixed(2)}/s</div>`;
  }

  // 4) м†СлСР / м†СлѓЄ мШµмЕШлІМ нСЬмЛЬ
  const aff = Array.isArray(it.affixes) ? it.affixes : [];
  const prefixes = aff.filter(a => a && a.affix && a.kind === "prefix");
  const suffixes = aff.filter(a => a && a.affix && a.kind === "suffix");

  if(prefixes.length){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">м†СлСР</div>`;
    for(const a of prefixes){
      const tier = a.tier ? ` <span class="itemInfoTier">T${a.tier}</span>` : "";
      const line = formatAffixReadable(a);
      html += `<div class="itemInfoLine">- ${escHtml(line)}${tier}</div>`;
    }
  }

  if(suffixes.length){
    html += `<div class="itemInfoGap"></div>`;
    html += `<div class="itemInfoLine itemInfoDim">м†СлѓЄ</div>`;
    for(const a of suffixes){
      const tier = a.tier ? ` <span class="itemInfoTier">T${a.tier}</span>` : "";
      const line = formatAffixReadable(a);
      html += `<div class="itemInfoLine">- ${escHtml(line)}${tier}</div>`;
    }
  }

  html += `</div>`;
  return html;
}

function rebuildGearFromEquipment(){
  player.gear = {
    armorAdd: 0, maxHpAdd: 0, hpRegen: 0,
    critChanceAdd: 0, critChanceMul: 1, critMultiAdd: 0,
  };

  for(const slot of EQUIP_SLOTS){
    const it = equipment[slot];
    if(!it) continue;
    if(it.isUnique) continue;
    const d = it.totalData || it.data;
    if(!d) continue;
    for(const k in d){
      const v = d[k];
      if(typeof v !== "number") continue;
      if(k.endsWith("Mul")) player.gear[k] *= v;
      else player.gear[k] += v;
    }
  }
  recalcFromGear();
  player.hp = Math.min(player.hp, player.maxHp);
}

/* ===== мХДмЭінЕЬ мХДмЭімљШ: мЭіл™®мІА лМАмЛ† мЇФл≤ДмК§мЧР к∞ДлЛ® лПДнШХ ===== */
function drawItemIcon(c, it){
  const g = c.getContext("2d");
  const W = c.width, H = c.height;
  g.clearRect(0,0,W,H);

  // л∞ФнГХ(мЦілСРмЪі мєЄмЧРмДЬлПД мХДмЭімљШмЭі "л≥імЭік≤М" нХШмЭілЭЉмЭінКЄ)
  g.save();
  g.globalAlpha = 1;
  g.fillStyle = "rgba(0,0,0,0.15)";
  g.fillRect(0,0,W,H);

  // нЕМлСРл¶ђ(нЭђкЈАлПД) вАФ PoEмЛЭ: normal(нЭ∞) / magic(нММ) / rare(лЕЄ) / unique(м£ЉнЩ©)
  const rr = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
  g.lineWidth = 3;

  if(rr==="unique") g.strokeStyle = "#ffb86b";
  else if(rr==="rare") g.strokeStyle = "#ffd166";
  else if(rr==="magic") g.strokeStyle = "#2f7bff";
  else g.strokeStyle = "#ffffff";

  // вЬЕ лПЩкЈЄлЭЉлѓЄ лІБ вЖТ мВђк∞БнШХ лІБ(мЪФм≤≠ л∞ШмШБ)
  const pad = 4;
  g.strokeRect(pad, pad, W - pad*2, H - pad*2);

  // мКђл°ѓмЭі мЧЖмЬЉл©і лєИмєЄ
  if(!it){ g.restore(); return; }

  // к≥µнЖµ: мХДмЭімљШ м§СмХЩ м†Хл†ђ
  g.translate(W/2, H/2);
  g.globalAlpha = 0.98;

  // ===== лђікЄ∞: л≤†мЭімК§ нГАмЮЕл≥Д мХДмЭімљШ =====
  if(it.slot==="weapon"){
    const baseId = it.baseId || it.id;
    const tmpl = getItemTemplateById(baseId);
    const wt = tmpl?.weaponType || tmpl?.type || (() => {
      const tags = tmpl?.tags || [];
      if(tags.includes("2h_axe") || tags.includes("axe")) return "2h_axe";
      if(tags.includes("2h_mace") || tags.includes("mace")) return "2h_mace";
      if(tags.includes("warstaff")) return "warstaff";
      if(tags.includes("staff")) return "staff";
      return "2h_sword";
    })();

    // к≥µнЖµ мК§мЉАмЭЉ
    g.save();
    g.scale(1.0, 1.0);
    g.lineWidth = 4;
    g.strokeStyle = "rgba(255,255,255,0.85)";
    g.fillStyle = "rgba(255,255,255,0.75)";

    // 2H Sword: кЄ∞м°і лКРлВМ(кЄЄм≠ЙнХЬ к≤А)
    if(wt==="2h_sword"){
      g.beginPath();
      g.moveTo(-2, -16); g.lineTo(2, -16); g.lineTo(3, 10); g.lineTo(-3, 10);
      g.closePath(); g.fill();
      g.fillRect(-10, 6, 20, 3);   // к∞АлУЬ
      g.fillRect(-2, 10, 4, 8);    // мЖРмЮ°мЭі
    }
    // 2H Axe: нБ∞ лПДлБЉлВ†
    else if(wt==="2h_axe"){
      g.fillRect(-2, -16, 4, 30);  // мЮРл£®
      g.beginPath();               // лПДлБЉлВ†
      g.moveTo(-2, -6);
      g.lineTo(-14, -12);
      g.lineTo(-14, 0);
      g.lineTo(-2, 2);
      g.closePath(); g.fill();
      g.beginPath();
      g.moveTo(2, -6);
      g.lineTo(8, -10);
      g.lineTo(8, 0);
      g.lineTo(2, 2);
      g.closePath(); g.fill();
      g.fillRect(-6, 8, 12, 3);    // к∞АлУЬ лКРлВМ
    }
    // 2H Mace: нБ∞ м≤†нЗіл®Єл¶ђ
    else if(wt==="2h_mace"){
      g.fillRect(-2, -16, 4, 30);  // мЮРл£®
      g.fillRect(-8, -18, 16, 10); // л®Єл¶ђ
      // мК§нММмЭінБђ
      g.fillRect(-10, -16, 4, 2);
      g.fillRect(6, -16, 4, 2);
      g.fillRect(-2, -22, 4, 4);
      g.fillRect(-2, -8, 4, 3);
    }
    // Staff: лІИл≤Х мІАнМ°мЭі(лБЭ кµђмКђ)
    else if(wt==="staff"){
      g.fillRect(-2, -16, 4, 30);
      g.beginPath();
      g.arc(0, -18, 6, 0, Math.PI*2);
      g.fill();
      g.fillRect(-4, 8, 8, 3);
    }
    // Warstaff: м†ДмЯБмІАнМ°мЭі(мЦСлБЭ кЄИмЖН)
    else if(wt==="warstaff"){
      g.fillRect(-2, -16, 4, 30);
      g.fillRect(-8, -20, 16, 5);
      g.fillRect(-8, 12, 16, 5);
      g.fillRect(-5, -24, 10, 4);
      g.fillRect(-5, 17, 10, 4);
    }
    else{
      // fallback
      g.fillRect(-2, -16, 4, 30);
      g.fillRect(-10, 6, 20, 3);
    }

    g.restore();
  }


  // ===== нИђкµђ: "к≤АнИђмВђ нИђкµђ" =====
  else if(it.slot==="helm"){
    g.save();
    // лС•кЈЉ лПФ
    g.fillStyle = "#c7c7c7";
    g.beginPath();
    g.arc(0, -2, 13, Math.PI, 0);
    g.closePath();
    g.fill();

    // л≥Љк∞АлУЬ/нД±лґАлґД
    g.fillStyle = "#9b9b9b";
    g.beginPath();
    g.moveTo(-13, -2);
    g.lineTo(-13, 8);
    g.quadraticCurveTo(-6, 14, 0, 14);
    g.quadraticCurveTo(6, 14, 13, 8);
    g.lineTo(13, -2);
    g.closePath();
    g.fill();

    // лИИкµђл©Н(мКђл¶њ)
    g.fillStyle = "#1a1a1a";
    g.fillRect(-9, 1, 7, 3);
    g.fillRect(2, 1, 7, 3);

    // м§СмХЩ лК•мД†(к≤АнИђмВђ лКРлВМ)
    g.fillStyle = "#eaeaea";
    g.fillRect(-1, -14, 2, 26);

    // нХШмЭілЭЉмЭінКЄ
    g.globalAlpha = 0.25;
    g.fillStyle="#fff";
    g.beginPath();
    g.arc(-5, -6, 10, Math.PI*1.05, Math.PI*1.55);
    g.strokeStyle="rgba(255,255,255,0.4)";
    g.lineWidth=2;
    g.stroke();

    g.restore();
  }

  // ===== к∞СмШЈ: "м§СмДЄ кЄ∞мВђ нТАнФМл†ИмЭінКЄ" =====
  else if(it.slot==="chest"){
    g.save();
    // нЭЙк∞С л≥Єм≤і
    g.fillStyle="#bdbdbd";
    g.beginPath();
    g.moveTo(-12, -12);
    g.lineTo(-8, 14);
    g.quadraticCurveTo(0, 18, 8, 14);
    g.lineTo(12, -12);
    g.closePath();
    g.fill();

    // мЦікє® нФМл†ИмЭінКЄ
    g.fillStyle="#9e9e9e";
    g.beginPath();
    g.moveTo(-14, -10);
    g.lineTo(-8, -14);
    g.lineTo(-4, -2);
    g.lineTo(-12, 0);
    g.closePath();
    g.fill();

    g.beginPath();
    g.moveTo(14, -10);
    g.lineTo(8, -14);
    g.lineTo(4, -2);
    g.lineTo(12, 0);
    g.closePath();
    g.fill();

    // л≥µлґА нМРкЄИ лЭЉмЭЄ
    g.strokeStyle="rgba(0,0,0,0.35)";
    g.lineWidth=2;
    g.beginPath();
    g.moveTo(-8, 0); g.lineTo(8, 0);
    g.moveTo(-7, 5); g.lineTo(7, 5);
    g.moveTo(-6, 10); g.lineTo(6, 10);
    g.stroke();

    // м§СмХЩ нХШмЭілЭЉмЭінКЄ
    g.globalAlpha = 0.28;
    g.fillStyle="#fff";
    g.fillRect(-2, -10, 2, 22);

    g.restore();
  }

  // ===== л∞ШмІА: "нММлЮА л≥імДЭ л∞ХнЮМ л∞ШмІА" =====
  else if(it.slot==="ring"){
    g.save();
    // лІБ л∞ФлФФ
    g.strokeStyle="#e5e5e5";
    g.lineWidth=4;
    g.beginPath();
    g.arc(0, 2, 10, 0, Math.PI*2);
    g.stroke();

    // л≥імДЭ(нММлЮАмГЙ)
    g.fillStyle="#3aa0ff";
    g.beginPath();
    g.arc(0, -8, 4, 0, Math.PI*2);
    g.fill();

    // л≥імДЭ нХШмЭілЭЉмЭінКЄ
    g.globalAlpha = 0.35;
    g.fillStyle="#ffffff";
    g.beginPath();
    g.arc(-1, -9, 2, 0, Math.PI*2);
    g.fill();

    // л≥імДЭ л∞Ымє®(мДЄнМЕ)
    g.globalAlpha = 1;
    g.fillStyle="#cfcfcf";
    g.fillRect(-3, -6, 6, 2);

    g.restore();
  }

  // кЈЄ мЩЄ
  else{
    g.save();
    g.fillStyle="#999";
    g.fillRect(-10,-10,20,20);
    g.restore();
  }

  g.restore();
}

function equipFromBagToSlot(invIndex, slot){
  const it = inventory[invIndex];
  if(!it) return;
  if(it.isUnique) return;
  if(it.slot !== slot) return;

  if(equipment[slot]) inventory.push(equipment[slot]);
  inventory.splice(invIndex, 1);
  equipment[slot] = it;

  selectedItem = {from:"equip", slot};
  rebuildGearFromEquipment();
  renderAllPanels();

  _callHook('afterEquip', slot, equipment[slot]);
}

function unequipSlotToBag(slot){
  const it = equipment[slot];
  if(!it) return;
  equipment[slot] = null;
  inventory.push(it);
  selectedItem = null;
  rebuildGearFromEquipment();
  renderAllPanels();

  _callHook('afterUnequip', slot);
}

/* вЬЕ POE м†ДмЪ© м†ЬмЮС(мШ§лЄМ) мЛЬмК§нЕЬ  */

function rebuildItemInstanceFromAffixes(it, baseId, tmpl, rarity, ilvl, tags, affixes){
  const baseData = buildBaseDataFromItemId(baseId);
  const safeAff = Array.isArray(affixes) ? clampAffixLimits(affixes, rarity) : [];

  const mods = buildItemMods(baseId, baseData, safeAff, tags);
  const affixData = buildAffixDataFromMods(mods);
  const totalData = mergeItemData(baseData, affixData);

  const preNames = safeAff.filter(x=>x.kind==="prefix").map(x=>x.affix.name);
  const sufNames = safeAff.filter(x=>x.kind==="suffix").map(x=>x.affix.name);

  // мЭіл¶Д кЈЬмєЩ(PoE):
  // - normal: л≤†мЭімК§л™Е
  // - magic : (м†СлСР) л≤†мЭімК§ (м†СлѓЄ)  вАї м†СлСР/м†СлѓЄ к∞Бк∞Б мµЬлМА 1к∞ЬлІМ нСЬмЛЬ
  // - rare  : л†ИмЦі м†ДмЪ© 2лЛ®мЦі мЭіл¶Д(л≤†мЭімК§л™Е лМАмЛ†)
  // - unique: (мЬ†лЛИнБђлКФ нЕЬнФМл¶њ/мХДмЭінЕЬмЧР мЭілѓЄ мЭіл¶ДмЭі мЮИмЬЉл©і кЈЄк±Є мЬ†мІА)
  let nm = tmpl.name;

  if(rarity === "magic"){
    const pre = preNames[0] || "";
    const suf = sufNames[0] || "";
    if(pre && suf) nm = pre + " " + nm + " " + suf;
    else if(pre) nm = pre + " " + nm;
    else if(suf) nm = nm + " " + suf;
  }else if(rarity === "rare"){
    nm = rollRareName();
  }else if(rarity === "unique"){
    nm = (it.uniqueName || tmpl.uniqueName || it.name || tmpl.name);
  }

  it.baseId = baseId;
  it.baseName = tmpl.name;
  it.name = nm;
  it.rarity = rarity;
  it.ilvl = ilvl;

  it.baseData = baseData;
  it.tags = tags;
  it.affixes = safeAff;
  it.mods = mods;

  it.affixData = affixData;
  it.totalData = totalData;
  it.data = totalData;

  it.shownDesc = (tmpl.descGen ? tmpl.descGen(totalData) : (it.shownDesc || ""));
}

function setCraftMsg(msg){ try{ const d=document.getElementById("orbDesc"); if(d) d.textContent=msg; }catch(e){} }

function craftOnSelected(type){
  // вЬЕ нГАлЭљлРЬ мХДмЭінЕЬмЭА мЦілЦ§ нБђлЮШнФДнМЕлПД лґИк∞АлК•
  try{
    const itLock = (typeof selectedItem!=="undefined" && selectedItem) ? getSelectedItem()
                 : (typeof craftSelectedItem!=="undefined" && craftSelectedItem) ? craftSelectedItem
                 : (typeof currentCraftItem!=="undefined" && currentCraftItem) ? currentCraftItem
                 : null;
    const itCheck = itLock || (typeof getSelectedItem==="function" ? getSelectedItem() : null);
    if(itCheck && itCheck.corrupted){
      const d = document.getElementById("orbDesc");
      if(d) d.textContent = "нГАлЭљлРЬ мХДмЭінЕЬмЭА нБђлЮШнФДнМЕнХ† мИШ мЧЖмКµлЛИлЛ§.";
      return;
    }
  }catch(e){}

  const sel = selectedItem;
  if(!sel) return;

  const it = getSelectedItem();
  if(!it) return;
  if(it.isUnique) return;

  const baseId = it.baseId || it.id;
  const tmpl = getItemTemplateById(baseId);
  if(!tmpl) return;

  const ilvl = it.ilvl || getItemLevel();
  const tags = inferItemTagsFromTemplate(tmpl, baseId);

  const curR = it.rarity || "normal";
  const curAff = Array.isArray(it.affixes) ? it.affixes.slice() : [];

  function spend(refName){
    // refName: string variable name
    if(refName === "transmuteOrbs"){ if(transmuteOrbs<=0) return false; transmuteOrbs--; return true; }
    if(refName === "alterationOrbs"){ if(alterationOrbs<=0) return false; alterationOrbs--; return true; }
    if(refName === "augmentationOrbs"){ if(augmentationOrbs<=0) return false; augmentationOrbs--; return true; }
    if(refName === "regalOrbs"){ if(regalOrbs<=0) return false; regalOrbs--; return true; }
    if(refName === "alchemyOrbs"){ if(alchemyOrbs<=0) return false; alchemyOrbs--; return true; }
    if(refName === "chaosOrbs"){ if(chaosOrbs<=0) return false; chaosOrbs--; return true; }
    if(refName === "scouringOrbs"){ if(scouringOrbs<=0) return false; scouringOrbs--; return true; }
    if(refName === "exaltedOrbs"){ if(exaltedOrbs<=0) return false; exaltedOrbs--; return true; }
    if(refName === "annulOrbs"){ if(annulOrbs<=0) return false; annulOrbs--; return true; }
    if(refName === "divineOrbs"){ if(divineOrbs<=0) return false; divineOrbs--; return true; }
    if(refName === "corruptOrbs"){ if(typeof corruptOrbs!=="number"||corruptOrbs<=0) return false; corruptOrbs--; return true; }
    return false;
  }

  let nextR = curR;
  let nextAff = curAff;

  // м†ЬмЮС кЈЬмєЩ(к∞ДмЖМнЩФ PoE):
  if(type === "transmute"){
    if(curR !== "normal") return;
    if(!spend("transmuteOrbs")) return;
    nextR = "magic";
    nextAff = rollAffixesPOE("magic", ilvl, tags);
  }
  else if(type === "alter"){
    if(curR !== "magic") return;
    if(!spend("alterationOrbs")) return;
    nextR = "magic";
    nextAff = rollAffixesPOE("magic", ilvl, tags);
  }
  else if(type === "aug"){
    if(curR !== "magic") return;
    if(curAff.length >= 2) return;
    if(!spend("augmentationOrbs")) return;
    nextR = "magic";
    nextAff = rollAffixesPOE("magic", ilvl, tags, { existingAffixes:curAff, keepExisting:true, total: curAff.length+1, add:true });
  }
  else if(type === "regal"){
    if(curR !== "magic") return;
    if(curAff.length < 1) return;
    if(!spend("regalOrbs")) return;
    nextR = "rare";
    nextAff = rollAffixesPOE("rare", ilvl, tags, { existingAffixes:curAff, keepExisting:true, total: curAff.length+1, add:true });
  }
  else if(type === "alchemy"){
    if(curR !== "normal") return;
    if(!spend("alchemyOrbs")) return;
    nextR = "rare";
    nextAff = rollAffixesPOE("rare", ilvl, tags);
  }
  else if(type === "chaos"){
    if(!(curR === "rare" || curR === "rare")) return;
    if(!spend("chaosOrbs")) return;
    nextR = curR;
    nextAff = rollAffixesPOE(nextR, ilvl, tags);
  }
  else if(type === "scour"){
    if(curR === "normal") return;
    if(!spend("scouringOrbs")) return;
    nextR = "normal";
    nextAff = [];
  }
  else if(type === "exalt"){
    if(!(curR === "rare" || curR === "rare")) return;
    if(curAff.length >= maxAffixesForRarity(curR)) return;
    if(!spend("exaltedOrbs")) return;
    nextR = curR;
    nextAff = rollAffixesPOE(nextR, ilvl, tags, { existingAffixes:curAff, keepExisting:true, total: curAff.length+1, add:true });
  }
  else if(type === "annul"){
    if(curAff.length <= 0) return;
    if(!spend("annulOrbs")) return;
    nextR = curR;
    const k = (Math.random()*curAff.length)|0;
    nextAff = curAff.slice();
    nextAff.splice(k, 1);
    // affixк∞А 0мЭіл©і normalл°Ь лЦ®мЦілЬ®л¶ђмІАлКФ мХКмЭМ(мЫРнХШл©і л∞ФкњА мИШ мЮИмЭМ)
    if(nextR === "magic" && nextAff.length === 0) nextR = "normal";
  }
  else if(type === "divine"){
    if(curAff.length <= 0) return;
    if(!spend("divineOrbs")) return;
    nextR = curR;
    nextAff = rerollValuesPOE(curAff, ilvl);
  }
  else if(type === "corrupt"){
    // нГАлЭљ: мХДмЭінЕЬмЧР 'нГАлЭљ' мГБнГЬлІМ лґАмЧђ (мЭінЫД нБђлЮШнФДнМЕ лґИк∞А)
    if(!spend("corruptOrbs")) return;
    it.corrupted = true;
    const d = document.getElementById("orbDesc");
    if(d) d.textContent = "нГАлЭљлРШмЧИмКµлЛИлЛ§.";
    // м¶ЙмЛЬ UI к∞±мЛ†
    renderAllPanels();
    return;
  }


  rebuildItemInstanceFromAffixes(it, baseId, tmpl, nextR, ilvl, tags, nextAff);

  // мЮ•лєД/к∞Ал∞© мЬДмєШмЧР лФ∞лЭЉ л∞ШмШБ + мК§нГѓ мЮђк≥ДмВ∞
  if(sel.from === "equip"){
    equipment[sel.slot] = it;
    rebuildGearFromEquipment();
  }

  renderAllPanels();
}

function drawIsoFloorTile(sx, sy, variant, x=0, y=0){
  const w = ISO.tileW, h = ISO.tileH;

  // base diamond
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();

  // POE-ish stone variation (deterministic-ish)
  const v = variant & 3;
  if(v === 0) ctx.fillStyle = "#1b1b1b";
  else if(v === 1) ctx.fillStyle = "#202020";
  else if(v === 2) ctx.fillStyle = "#181818";
  else ctx.fillStyle = "#242424";
  ctx.fill();

  // subtle bevel (light from top-left)
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.strokeStyle = "rgba(255,255,255,0.09)";
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(sx - w/2, sy);
  ctx.lineTo(sx, sy - h/2);
  ctx.strokeStyle = "rgba(255,255,255,0.02)";
  ctx.stroke();

  // dark edge (bottom-right)
  ctx.beginPath();
  ctx.moveTo(sx, sy + h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // faint grid line
  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.stroke();
}

function drawIsoWallBlock(sx, sy, opts={}){
  const w = ISO.tileW, h = ISO.tileH;
  const wallH = ISO.wallH || (h * 2.2);
  const topY = sy - wallH;

  // shadow cast on floor (soft)
  ctx.save();
  ctx.globalAlpha *= 0.55;
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fill();
  ctx.restore();

  // ===== TOP (brighter stone) =====
  ctx.beginPath();
  ctx.moveTo(sx, topY - h/2);
  ctx.lineTo(sx + w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx - w/2, topY);
  ctx.closePath();
  ctx.fillStyle = "#35302a";
  ctx.fill();

  // top bevel highlight
  ctx.strokeStyle = "rgba(255,255,255,0.10)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx - w/2, topY);
  ctx.lineTo(sx, topY - h/2);
  ctx.lineTo(sx + w/2, topY);
  ctx.stroke();

  // ===== LEFT FACE (mid) =====
  ctx.beginPath();
  ctx.moveTo(sx - w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "#26211c";
  ctx.fill();

  // ===== RIGHT FACE (dark) =====
  ctx.beginPath();
  ctx.moveTo(sx + w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "#1f1a16";
  ctx.fill();

  // edges / corner lines
  ctx.strokeStyle = "rgba(0,0,0,0.70)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx - w/2, topY);
  ctx.lineTo(sx, topY + h/2);
  ctx.lineTo(sx + w/2, topY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(sx - w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.stroke();

  // tiny rune-like accent (optional)
  if(opts.rune){
    ctx.save();
    ctx.globalAlpha *= 0.22;
    ctx.strokeStyle = "rgba(255,80,60,0.55)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx, topY + h*0.15);
    ctx.lineTo(sx, sy - h*0.05);
    ctx.stroke();
    ctx.restore();
  }
}


function drawIsoPillar(sx, sy){
  const w = ISO.tileW, h = ISO.tileH;
  const wallH = ISO.wallH || (h * 2.2);
  const topY = sy - wallH - h*0.25;

  // base shadow
  ctx.save();
  ctx.globalAlpha *= 0.55;
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fill();
  ctx.restore();

  // column body (simple: stacked faces)
  // left
  ctx.beginPath();
  ctx.moveTo(sx - w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx, sy + h*0.45);
  ctx.lineTo(sx - w*0.22, sy + h*0.22);
  ctx.closePath();
  ctx.fillStyle = "#2b2620";
  ctx.fill();

  // right
  ctx.beginPath();
  ctx.moveTo(sx + w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx, sy + h*0.45);
  ctx.lineTo(sx + w*0.22, sy + h*0.22);
  ctx.closePath();
  ctx.fillStyle = "#211c17";
  ctx.fill();

  // cap
  ctx.beginPath();
  ctx.moveTo(sx, topY - h*0.22);
  ctx.lineTo(sx + w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx - w*0.22, topY);
  ctx.closePath();
  ctx.fillStyle = "#3a342d";
  ctx.fill();

  ctx.strokeStyle = "rgba(0,0,0,0.75)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx - w*0.22, topY);
  ctx.lineTo(sx, topY + h*0.22);
  ctx.lineTo(sx + w*0.22, topY);
  ctx.stroke();
}



function drawIsoDisc(sx, sy, r, fill, stroke){
  ctx.save();
  ctx.translate(sx, sy);
  // мХДмЭімЖМл©ФнКЄл¶≠ лКРлВМ(мЫР вЖТ нГАмЫР)
  ctx.scale(1, 0.62);
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.closePath();
  if(fill){
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if(stroke){
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.restore();
}




// вЬЕ exact-1-tile ellipse helpers (match isometric tile proportions)
function __isoTileScaleY(){
  // tile diamond is ISO.tileW : ISO.tileH (usually 1 : 0.5)
  // use that ratio for effects that must fit exactly 1 tile footprint
  return (ISO && ISO.tileW && ISO.tileH) ? (ISO.tileH / ISO.tileW) : 0.5;
}
function drawIsoDiscTile(sx, sy, r, fill, stroke){
  const syScale = __isoTileScaleY();
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, syScale);
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.closePath();
  if(fill){ ctx.fillStyle = fill; ctx.fill(); }
  if(stroke){ ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
  ctx.restore();
}
function drawIsoRingGlowTile(sx, sy, r, innerA, outerA){
  const syScale = __isoTileScaleY();
  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(1, syScale);

  const g = ctx.createRadialGradient(0,0, r*0.15, 0,0, r*1.05);
  g.addColorStop(0.00, `rgba(255,200,120,0)`);
  g.addColorStop(0.35, `rgba(255,200,120,${Math.max(0, innerA*0.55)})`);
  g.addColorStop(0.55, `rgba(255,120,20,${innerA})`);
  g.addColorStop(0.85, `rgba(255,60,0,${outerA})`);
  g.addColorStop(1.00, `rgba(0,0,0,0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0,0,r*1.05,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = `rgba(255,180,80,${Math.min(0.55, innerA+0.12)})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,r*0.98,0,Math.PI*2);
  ctx.stroke();

  ctx.restore();
}
function drawIsoPlayerSprite(sx, sy, p){
  const r = (p && p.radius!=null) ? p.radius : 14;
  const dir = (p && p.dir) ? p.dir : "down";

  // Equipped visuals (safe access)
  const eq = (typeof equipment !== "undefined" && equipment) ? equipment : (window.equipment||{});
  const helmId  = (eq && eq.helm  && (eq.helm.id  || eq.helm.baseId))  ? (eq.helm.id  || eq.helm.baseId)  : null;
  const chestId = (eq && eq.chest && (eq.chest.id || eq.chest.baseId)) ? (eq.chest.id || eq.chest.baseId) : null;

  // Ground shadow (iso disc)
  if(SHOW_SHADOWS) drawIsoDisc(sx, sy + 9, r*1.25, "rgba(0,0,0,0.48)", null);
// Helper: round-rect fallback (iOS мХИм†Д)
  function rr(x,y,w,h,rad){
    if(ctx.roundRect){
      ctx.roundRect(x,y,w,h,rad);
    }else{
      const r2 = Math.min(rad, Math.abs(w)/2, Math.abs(h)/2);
      ctx.moveTo(x+r2, y);
      ctx.arcTo(x+w, y,   x+w, y+h, r2);
      ctx.arcTo(x+w, y+h, x,   y+h, r2);
      ctx.arcTo(x,   y+h, x,   y,   r2);
      ctx.arcTo(x,   y,   x+w, y,   r2);
    }
  }

  // Direction offsets for slight "face" shift
  const fx = dir==="left" ? -r*0.16 : dir==="right" ? r*0.16 : 0;
  const fy = dir==="up"   ? -r*0.12 : dir==="down"  ? r*0.10 : 0;

  // Visual presets (POE-ish, simple but readable)
  const HELM_LOOK = {
    leather_cap:  { kind:"cap",    fill:"rgba(55,42,28,0.98)", trim:"rgba(0,0,0,0.45)" },
    iron_helmet:  { kind:"dome",   fill:"rgba(95,98,105,0.98)", trim:"rgba(0,0,0,0.55)" },
    soldier_helm: { kind:"guard",  fill:"rgba(88,92,100,0.98)", trim:"rgba(0,0,0,0.60)" },
    templar_helm: { kind:"crest",  fill:"rgba(86,90,98,0.98)", trim:"rgba(202,166,85,0.70)" },
    warlord_helm: { kind:"horns",  fill:"rgba(78,82,92,0.98)", trim:"rgba(180,60,60,0.80)" }
  };

  const CHEST_LOOK = {
    tattered_armor:{ kind:"cloth",  fill:"rgba(38,30,22,0.96)", trim:"rgba(0,0,0,0.45)" },
    chainmail:     { kind:"chain",  fill:"rgba(42,44,48,0.96)", trim:"rgba(202,166,85,0.35)" },
    scalemail:     { kind:"scale",  fill:"rgba(36,40,44,0.98)", trim:"rgba(0,0,0,0.55)" },
    plate_armor:   { kind:"plate",  fill:"rgba(30,34,40,0.99)", trim:"rgba(202,166,85,0.60)" },
    astral_plate:  { kind:"astral", fill:"rgba(26,30,36,0.99)", trim:"rgba(120,200,255,0.55)" }
  };

  const helmLook  = (helmId  && HELM_LOOK[helmId])  ? HELM_LOOK[helmId]  : null;
  const chestLook = (chestId && CHEST_LOOK[chestId])? CHEST_LOOK[chestId] : null;

  ctx.save();
  ctx.translate(sx, sy - 12);
  // compress Y for iso look
  ctx.scale(1, 0.78);

  // ===== Lower body (bigger, visible) =====
  const hipY = r*0.10;
  const footY = r*1.25;

  // legs (pants)
  ctx.fillStyle = "rgba(26,22,18,0.98)";
  // left leg
  ctx.beginPath();
  rr(-r*0.32, hipY, r*0.28, r*0.95, 7);
  ctx.fill();
  // right leg
  ctx.beginPath();
  rr(r*0.04, hipY, r*0.28, r*0.95, 7);
  ctx.fill();

  // boots
  ctx.fillStyle = "rgba(18,14,12,0.98)";
  ctx.beginPath(); rr(-r*0.36, footY - r*0.18, r*0.34, r*0.22, 7); ctx.fill();
  ctx.beginPath(); rr(r*0.02,  footY - r*0.18, r*0.34, r*0.22, 7); ctx.fill();

  // knee highlight
  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-r*0.29, hipY + r*0.40); ctx.lineTo(-r*0.07, hipY + r*0.40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( r*0.07, hipY + r*0.40); ctx.lineTo( r*0.29, hipY + r*0.40); ctx.stroke();

  // ===== Base torso silhouette (small upper) =====
  // torso base (no armor default)
  ctx.fillStyle = "rgba(34,30,26,0.96)";
  ctx.beginPath();
  rr(-r*0.44, -r*0.55, r*0.88, r*0.62, 10);
  ctx.fill();

  // belt
  ctx.strokeStyle = "rgba(0,0,0,0.55)";
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-r*0.44, hipY);
  ctx.lineTo( r*0.44, hipY);
  ctx.stroke();

  // ===== Arms (simple) =====
  ctx.fillStyle = "rgba(30,26,22,0.98)";
  ctx.beginPath(); rr(-r*0.62, -r*0.42, r*0.20, r*0.52, 9); ctx.fill();
  ctx.beginPath(); rr( r*0.42, -r*0.42, r*0.20, r*0.52, 9); ctx.fill();

  // ===== Head base =====
  const headX = fx*0.65;
  const headY = -r*0.88 + fy*0.35;
  ctx.fillStyle = "rgba(214,182,150,0.98)";
  ctx.beginPath();
  ctx.arc(headX, headY, r*0.22, 0, Math.PI*2);
  ctx.fill();

  // hair / mask line (when no helm)
  if(!helmLook){
    ctx.strokeStyle = "rgba(20,12,10,0.85)";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(headX - r*0.20, headY - r*0.06);
    ctx.lineTo(headX + r*0.18, headY - r*0.06);
    ctx.stroke();
  }

  // ===== Equipment overlays =====
  // Chest armor overlay (replaces "naked" torso look)
  if(chestLook){
    ctx.fillStyle = chestLook.fill;
    ctx.beginPath();
    rr(-r*0.48, -r*0.58, r*0.96, r*0.70, 11);
    ctx.fill();

    // shoulder pads for heavier armor
    if(chestLook.kind==="plate" || chestLook.kind==="astral"){
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.beginPath(); rr(-r*0.66, -r*0.58, r*0.26, r*0.28, 10); ctx.fill();
      ctx.beginPath(); rr( r*0.40, -r*0.58, r*0.26, r*0.28, 10); ctx.fill();
    }

    // pattern hints
    ctx.strokeStyle = chestLook.trim;
    ctx.lineWidth = 2;
    if(chestLook.kind==="chain"){
      for(let i=-3;i<=3;i++){
        ctx.beginPath();
        ctx.arc(i*r*0.12, -r*0.32, r*0.09, 0, Math.PI*2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(i*r*0.12 + r*0.06, -r*0.18, r*0.09, 0, Math.PI*2);
        ctx.stroke();
      }
    }else if(chestLook.kind==="scale"){
      for(let y=0;y<4;y++){
        for(let x=-3;x<=3;x++){
          ctx.beginPath();
          ctx.arc(x*r*0.11 + (y%2? r*0.05:0), -r*0.45 + y*r*0.12, r*0.07, 0, Math.PI);
          ctx.stroke();
        }
      }
    }else{
      ctx.beginPath();
      ctx.moveTo(-r*0.30, -r*0.42);
      ctx.lineTo( r*0.30, -r*0.05);
      ctx.stroke();
      ctx.beginPath();
      rr(-r*0.48, -r*0.58, r*0.96, r*0.70, 11);
      ctx.stroke();
    }

    // astral glow
    if(chestLook.kind==="astral"){
      ctx.globalAlpha *= 0.85;
      ctx.strokeStyle = "rgba(120,200,255,0.55)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, -r*0.25, r*0.22, 0, Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha /= 0.85;
    }
  }

  // Helmet overlay
  if(helmLook){
    ctx.fillStyle = helmLook.fill;
    const hx = headX;
    const hy = headY;
    const hr = r*0.24;

    if(helmLook.kind==="cap"){
      ctx.beginPath();
      ctx.arc(hx, hy - hr*0.10, hr*1.05, Math.PI*1.05, Math.PI*2.05);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.beginPath(); rr(hx-hr*1.05, hy-hr*0.20, hr*2.10, hr*0.90, 10); ctx.fill();
    }else{
      // base dome
      ctx.beginPath();
      ctx.arc(hx, hy - hr*0.08, hr*1.10, 0, Math.PI*2);
      ctx.fill();

      // visor / face slit
      ctx.strokeStyle = "rgba(0,0,0,0.60)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(hx-hr*0.70, hy+hr*0.05);
      ctx.lineTo(hx+hr*0.70, hy+hr*0.05);
      ctx.stroke();

      if(helmLook.kind==="guard"){
        // nose guard
        ctx.strokeStyle = "rgba(0,0,0,0.55)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(hx, hy-hr*0.55);
        ctx.lineTo(hx, hy+hr*0.55);
        ctx.stroke();
      }else if(helmLook.kind==="crest"){
        // crest
        ctx.strokeStyle = helmLook.trim;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(hx, hy-hr*1.25);
        ctx.lineTo(hx, hy-hr*0.30);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(hx-hr*0.50, hy-hr*0.85);
        ctx.lineTo(hx+hr*0.50, hy-hr*0.85);
        ctx.stroke();
      }else if(helmLook.kind==="horns"){
        ctx.strokeStyle = helmLook.trim;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(hx-hr*0.65, hy-hr*0.55);
        ctx.lineTo(hx-hr*1.25, hy-hr*1.05);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(hx+hr*0.65, hy-hr*0.55);
        ctx.lineTo(hx+hr*1.25, hy-hr*1.05);
        ctx.stroke();
      }
    }

    // helmet outline
    ctx.strokeStyle = "rgba(0,0,0,0.55)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(hx, hy - hr*0.08, hr*1.10, 0, Math.PI*2);
    ctx.stroke();
  }
    // ===== Weapon (equipped) + Arm + Swing (POE-ish) =====
  const weaponObj = (eq && eq.weapon) ? eq.weapon : null;
  const weaponId  = (weaponObj && (weaponObj.baseId || weaponObj.id)) ? (weaponObj.baseId || weaponObj.id) : null;

  // weaponType fallback: some items store weaponType on template, not instance
  let weaponType = (weaponObj && weaponObj.weaponType) ? weaponObj.weaponType : null;
  if(!weaponType && weaponId && typeof getItemTemplateById === "function"){
    const tmpl = getItemTemplateById(weaponId);
    if(tmpl && tmpl.weaponType) weaponType = tmpl.weaponType;
  }

  const weaponRarity = (weaponObj && weaponObj.rarity) ? weaponObj.rarity : null;

  function rarityTint(r){
    if(r==="magic")  return { blade:"rgba(120,200,255,0.95)", metal:"rgba(70,140,255,0.95)" };
    if(r==="rare")   return { blade:"rgba(255,232,170,0.95)", metal:"rgba(202,166,85,0.95)" };
    if(r==="unique") return { blade:"rgba(255,205,150,0.96)", metal:"rgba(255,140,60,0.95)" };
    return { blade:"rgba(235,240,245,0.95)", metal:"rgba(200,200,200,0.92)" };
  }

  // draw weapon very close to body, upright; swing only while attacking
  function drawWeaponAndArm(kind){

const isTwoHand =
  kind === "2h_axe" ||
  kind === "warstaff" ||
  kind === "2h_mace" ||
  kind === "2h_sword";

const t = rarityTint(weaponRarity);

    // "hand/grip" anchor: close to torso but not covering armor
    const facing = (typeof attackDir !== "undefined" && attackDir) ? attackDir : dir;
    const side = (facing === "left") ? -1 : 1;
    let wwSideMul = 0;
    if(player && player.whirlwindActive && (player.whirlwindPose || 0) > 0){
      const poseT = (player.whirlwindPose || 0) / Math.max(1, player.whirlwindPoseMax || 1);
      wwSideMul = (player.whirlwindSide || 1) * poseT;
    }
    const handX = r*0.62*side + wwSideMul * r*0.24; // moved outward more (avoid covering armor)
const handY = r*0.02; // moved upward more (avoid covering head/armor)

    // idle pose: upright beside body
    let ang = 0; // 0 = vertical
    // attack swing: rotate around the hand (global attacking/attackFrame)
    if(typeof attacking !== "undefined" && attacking){
      const f = (typeof attackFrame !== "undefined") ? attackFrame : 0;
      const u = Math.max(0, Math.min(1, f/8));     // 0..1
      // POE-ish arc: start slightly back -> forward
      ang = (-1.10) * (1-u) + (0.35) * u;         // radians
    }

    // --- POE-ish: idle pose holds weapon mostly upright + subtle sway while moving ---
    const moving = (typeof moveLen !== "undefined") ? (moveLen > 0.05) : (typeof vx !== "undefined" && typeof vy !== "undefined" ? (Math.abs(vx)+Math.abs(vy) > 0.02) : false);
    const fc = (typeof frameCount !== "undefined") ? frameCount : (typeof t !== "undefined" ? t : 0);
    const sway = (moving ? 1 : 0) * Math.sin(fc * 0.18) * 0.10;
    if(!(typeof attacking !== "undefined" && attacking)){
      // keep near upright (weapon points down in local space), just add a tiny idle angle
      ang = sway;
    }
if(isTwoHand){
   ang *= 1.6;
}
    // в≠Р two-hand weapons: bigger arc
    if(isTwoHand){ ang *= 1.55; }

// рЯФБ swing direction: keep axe as-is, reverse others (sword/mace/staff/warstaff)
    if(kind !== "2h_axe"){
      ang = -ang;
    }
    if(wwSideMul !== 0){
      ang += wwSideMul * 0.55;
    }
    // mirror for left so attack is symmetric to right
    const flip = side;

    ctx.save();
    ctx.translate(handX, handY);
    ctx.scale(flip, 1);
    ctx.rotate(ang);

    // arm: shoulder -> hand
    ctx.save();
    ctx.rotate(-ang); // keep arm mostly aligned to body, not weapon
    ctx.strokeStyle = "rgba(40,40,40,0.85)";
    ctx.lineWidth = 2.6;
    ctx.beginPath();
    ctx.moveTo(-r*0.10, -r*0.14);  // shoulder-ish
    ctx.lineTo(0, 0);              // hand
    ctx.stroke();
    ctx.restore();

    // second arm for two-hand weapons: back hand grips the shaft (with a bit of lag while attacking)
    if(isTwoHand){
      const targetGrip = (typeof attacking !== "undefined" && attacking) ? (r*0.30) : (r*0.22);
      __backHandLag += (targetGrip - __backHandLag) * 0.22;
      const gripY = __backHandLag;

      ctx.save();
      ctx.rotate(-ang); // keep the arm mostly aligned to body
      ctx.strokeStyle = "rgba(40,40,40,0.80)";
      ctx.lineWidth = 2.4;

      ctx.beginPath();
      ctx.moveTo(r*0.06, -r*0.10); // shoulder-ish (inside torso)
      ctx.lineTo(0, gripY);        // grip on shaft
      ctx.stroke();
      ctx.restore();
    }

    // handle (below hand)
    // рЯФН weapon size (slightly bigger)
    const WEAPON_SCALE = 1.65;
    ctx.save();
    ctx.scale(WEAPON_SCALE, WEAPON_SCALE);

    ctx.strokeStyle = "rgba(110,70,30,0.95)";
    ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, r*0.62);
    ctx.stroke();

    // weapon head (above hand)
    if(kind === "staff" || kind === "warstaff"){
      // long staff + orb
      ctx.strokeStyle = "rgba(120,80,35,0.95)";
      ctx.lineWidth = 3.0;
      ctx.beginPath();
      ctx.moveTo(0, -r*0.78);
      ctx.lineTo(0, r*0.62);
      ctx.stroke();

      ctx.fillStyle = t.metal;
      ctx.beginPath(); ctx.arc(0, -r*0.82, 3.2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.45)";
      ctx.lineWidth = 1.6;
      ctx.stroke();

    } else if(kind === "2h_axe"){
      // axe: big side triangle + notch (recognizable)
      ctx.fillStyle = t.blade;
      const by = -r*0.30;
      ctx.beginPath();
      ctx.moveTo(0, by);
      ctx.lineTo(r*0.62, by - r*0.28);
      ctx.lineTo(r*0.62, by + r*0.28);
      ctx.closePath();
      ctx.fill();

      // notch
      ctx.save();
      ctx.globalCompositeOperation = "destination-out";
      ctx.beginPath();
      ctx.moveTo(r*0.16, by);
      ctx.lineTo(r*0.55, by - r*0.12);
      ctx.lineTo(r*0.55, by + r*0.12);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineWidth = 1.8;
      ctx.stroke();

    } else if(kind === "2h_mace"){
      // mace: long rectangle head laid across (recognizable)
      ctx.fillStyle = t.metal;
      const hy = -r*0.34;
      const w  = r*0.74;
      const h  = r*0.24;
      ctx.beginPath();
      ctx.rect(-w/2, hy - h/2, w, h);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineWidth = 1.8;
      ctx.stroke();

      // studs
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      for(let i=0;i<4;i++){
        ctx.beginPath();
        ctx.arc((-w*0.28 + i*(w*0.18)), hy - h*0.15, 1.0, 0, Math.PI*2);
        ctx.fill();
      }

    } else {
      // sword default
      ctx.strokeStyle = t.blade;
      ctx.lineWidth = 3.0;
      ctx.beginPath();
      ctx.moveTo(0, -r*0.80);
      ctx.lineTo(0, 0);
      ctx.stroke();

      // tip
      ctx.fillStyle = t.blade;
      ctx.beginPath();
      ctx.moveTo(0, -r*0.86);
      ctx.lineTo(-r*0.10, -r*0.74);
      ctx.lineTo(r*0.10, -r*0.74);
      ctx.closePath();
      ctx.fill();

      // small guard
      ctx.strokeStyle = t.metal;
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.moveTo(-r*0.18, -r*0.02);
      ctx.lineTo(r*0.18, -r*0.02);
      ctx.stroke();
    }
    ctx.restore(); // end WEAPON_SCALE

    ctx.restore();
  }

  // map weaponType -> kind string for renderer
  const kind = weaponType || "2h_sword";
  
  drawWeaponAndArm(kind);


  ctx.restore();

  // ===== FX (glow / invul) in world space =====
  const glow = (p && p.levelGlow) ? p.levelGlow : 0;
  if(glow > 0){
    const a = Math.min(1, glow/60);
    drawIsoDisc(sx, sy - 14, r*1.25, `rgba(255,210,80,${0.14*a})`, null);
  }
  // player invulnerability remains active, but the hit ring visual is removed.
}


function drawIso(){
  if(!ISO.tileW) isoInit();

  const ZOOM = 1.4; // рЯФН мєіл©ФлЭЉ нЩХлМАк∞Т

  // вЬЕ нЩФл©і нБіл¶ђмЦілКФ л∞ШлУЬмЛЬ identityмЧРмДЬ
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // мєіл©ФлЭЉ(мХДмЭімЖМ мҐМнСЬ кЄ∞м§А) вАФ м§МмЭД л∞ШмШБнХімДЬ нФМл†ИмЭімЦік∞А нЩФл©і м§СмХЩмЧР к≥†м†Х
  const pIso = isoProject(player.x, player.y);
  let camX = pIso.x - (canvas.width  / (2*ZOOM));
  let camY = pIso.y - (canvas.height / (2*ZOOM));
  // shakeк∞А мЮИмЬЉл©і к∞ДлЛ® л∞ШмШБ
  if(typeof shake !== "undefined" && shake > 0){
    camX += (Math.random()-0.5)*shake;
    camY += (Math.random()-0.5)*shake;
  }

  // вЬЕ мЫФлУЬлІМ нЩХлМА(м§М). мЭінЫД sx/sy к≥ДмВ∞мЭА кЈЄлМАл°Ь(iso - cam)
  ctx.setTransform(ZOOM,0,0,ZOOM,0,0);

  // вЬЕ л∞ФлЛ• л®Љм†А кєФк≥†, л≤љ/мШ§лЄМм†ЭнКЄ/мЇРл¶≠нД∞лКФ depth м†Хл†ђл°Ь нХЬ л≤ИмЧР м≤Шл¶ђ
  const drawables = [];

  // нГАмЭЉ: (x+y) мИЬмДЬл°Ь мИЬнЪМнХШлРШ, л∞ФлЛ•мЭА м¶ЙмЛЬ, л≤љмЭА drawableл°Ь лД£мЦімДЬ "к∞Ал†§мІР"мЭД лІМлУ†лЛ§.
  const maxS = (mapSize-1) + (mapSize-1);
  for(let s=0; s<=maxS; s++){
    for(let x=0; x<mapSize; x++){
      const y = s - x;
      if(y < 0 || y >= mapSize) continue;

      const tile = (map[y] && map[y][x] !== undefined) ? map[y][x] : 1;
      const wx = x*tileSize + tileSize/2;
      const wy = y*tileSize + tileSize/2;

      const iso = isoProject(wx, wy);
      const sx = iso.x - camX;
      const sy = iso.y - camY;

      // нЩФл©і л∞ЦмЭіл©і мК§нВµ(мД±лК•)
      if(sx < -ISO.tileW*2 || sx > canvas.width + ISO.tileW*2 || sy < -ISO.tileH*6 || sy > canvas.height + ISO.tileH*6) continue;

      // л∞ФлЛ•(л≤љ нГАмЭЉлПД л∞Сл∞ФлЛ•мЭА кєРлЛ§)
      const v = ((x*73856093) ^ (y*19349663)) & 3;
      drawIsoFloorTile(sx, sy, v, x, y);

      // л≤љмЭА лВШм§СмЧР кЈЄл†§мХЉ, мЇРл¶≠нД∞/л™ємЭі "л≤љ лТ§л°Ь" лУ§мЦік∞И лХМ к∞Ал†§мІРмЭі мГЭкєА
      if(tile === 1){
        drawables.push({ key: iso.y + 0.002, kind:"wall", iso, obj:{rune: (((x*92837111)^(y*6892871))&7)===0} });
      }else if(tile === 2){
        drawables.push({ key: iso.y + 0.002, kind:"pillar", iso, obj:null });
      }
    }
  }

  // fireZones / blood zones лУ± (мЮИмЬЉл©і) вАФ л∞ФлЛ• нЪ®к≥ЉлЭЉ л≤љл≥ілЛ§ мХљк∞Д л®Љм†А(нВ§л•Љ мХДм£Љ мЮСк≤М)
  if(typeof fireZones !== "undefined" && Array.isArray(fireZones)){
    for(const z of fireZones){
      if(!z) continue;
      const iso = isoProject(z.x, z.y);
      drawables.push({ key: iso.y - 0.002, kind:"zone", iso, obj:z });
    }
  }

  // fire embers (PoE-ish sparks)
  if(typeof fireEmbers !== "undefined" && Array.isArray(fireEmbers)){
    for(const p of fireEmbers){
      if(!p) continue;
      const iso = isoProject(p.x, p.y);
      drawables.push({ key: iso.y - 0.001, kind:"ember", iso, obj:p });
    }
  }

  // arrows / projectiles
  if(typeof arrows !== "undefined" && Array.isArray(arrows)){
    for(const a of arrows){
      if(!a) continue;
      const iso = isoProject(a.x, a.y);
      drawables.push({ key: iso.y - 0.001, kind:"arrow", iso, obj:a });
    }
  }

  // particles
  if(typeof particles !== "undefined" && Array.isArray(particles)){
    for(const p of particles){
      if(!p) continue;
      const iso = isoProject(p.x, p.y);
      drawables.push({ key: iso.y - 0.0005, kind:"particle", iso, obj:p });
    }
  }

  // enemies
  if(Array.isArray(enemies)){
    for(const e of enemies){
      if(!e) continue;
      if(e.hp <= 0 && !(e.dead && e.deathTimer > 0)) continue;
      const iso = isoProject(e.x, e.y);
      drawables.push({ key: iso.y, kind:"enemy", iso, obj:e });
    }
  }

  // player
  drawables.push({ key: pIso.y + 0.001, kind:"player", iso: pIso, obj: player });

  // depth sort
  drawables.sort((a,b)=>a.key-b.key);

  // draw
  for(const d of drawables){
    const sx = d.iso.x - camX;
    const sy = d.iso.y - camY;

if(d.kind === "wall"){
  // вЬЕ wall fade if it blocks the player (POE-style visibility)
  const fade = (pIso.y < d.iso.y - ISO.tileH*0.10) ? 0.35 : 1.0;
  ctx.save();
  ctx.globalAlpha *= fade;
  drawIsoWallBlock(sx, sy, d.obj || {});
  ctx.restore();
  continue;
}

if(d.kind === "pillar"){
  const fade = (pIso.y < d.iso.y - ISO.tileH*0.10) ? 0.35 : 1.0;
  ctx.save();
  ctx.globalAlpha *= fade;
  drawIsoPillar(sx, sy);
  ctx.restore();
  continue;
}

    if(d.kind === "zone"){
      const z = d.obj;
      if(z.isBleed){
        const r = (z.radius ?? 50);
        drawIsoDisc(sx, sy, r, "rgba(120,10,10,0.20)", "rgba(0,0,0,0.35)");
      }else{
        drawFireZoneIso(sx, sy, z);
      }
    }else if(d.kind === "ember"){
      drawEmberIso(sx, sy, d.obj);
    }else if(d.kind === "arrow"){
      drawIsoArrowSprite(sx, sy, d.obj);
    }else if(d.kind === "particle"){
      const p = d.obj;
      const alpha = Math.max(0, Math.min(1, (p.alpha ?? 1) * ((p.life ?? 10)/22)));
      if(p.kind === "arrowTrail"){
        ctx.save();
        ctx.translate(sx, sy);
        ctx.scale(1, 0.62);
        ctx.rotate(p.angle || 0);
        ctx.strokeStyle = `rgba(255,255,255,${0.28*alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-(p.size ?? 10), 0);
        ctx.lineTo(0, 0);
        ctx.stroke();
        ctx.restore();
      }else if(p.kind === "arrowSpark"){
        drawIsoDisc(sx, sy, p.size ?? 3, `rgba(255,220,150,${0.90*alpha})`, null);
      }else{
        const r = 4;
        drawIsoDisc(sx, sy, r, `rgba(255,255,255,${0.35*alpha})`, null);
      }
    }else if(d.kind === "enemy"){
      const e = d.obj;
      drawIsoEnemySprite(sx, sy, e);
    }else if(d.kind === "player"){
      drawIsoPlayerSprite(sx, sy, player);
    }
  }

  if(enemyDeathBursts.length){
    for(const b of enemyDeathBursts){
      const pr = isoProject((b.x||0) - camX, (b.y||0) - camY);
      drawIsoEnemyDeathBurst(pr.x + canvas.width/2, pr.y + canvas.height/2 - ISO.camYOffset, b);
    }
  }

// вЬЕ POE-ish vignette + ambient darkness
ctx.save();
ctx.setTransform(1,0,0,1,0,0);
const grd = ctx.createRadialGradient(canvas.width*0.5, canvas.height*0.40, Math.min(canvas.width,canvas.height)*0.10,
                                     canvas.width*0.5, canvas.height*0.40, Math.max(canvas.width,canvas.height)*0.75);
grd.addColorStop(0, "rgba(0,0,0,0.00)");
grd.addColorStop(1, "rgba(0,0,0,0.45)");
ctx.fillStyle = grd;
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.restore();

  // Ground loot
  try{ if(typeof drawIsoLootLabels === "function") drawIsoLootLabels(camX, camY); }catch(e){}


  // вЬЕ UIлКФ мЫФлУЬ м§М/мЭілПЩ мШБнЦ• л∞ЫмІА мХКк≤М л¶ђмЕЛ
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalAlpha = 1;
  // UI/HUD
  try{ if(typeof drawMinimap === "function") drawMinimap(); }catch(e){}
  try{ if(typeof drawHpOrb === "function") drawHpOrb(); }catch(e){}
  try{ if(typeof drawBossHpBar === "function") drawBossHpBar(); }catch(e){}
  try{ if(typeof drawSkillOrbs === "function") drawSkillOrbs(); }catch(e){}
}

// вЬЕ DROP FIX: slot/tier/ilvl кЄ∞л≥Є кµђнШД (мЧЖмЬЉл©і мЮРлПЩ м†Ьк≥µ)

function __randPickWeighted(pairs){
  // pairs: [{v, w}]
  let sum = 0;
  for(const p of pairs){ sum += Math.max(0, p.w||0); }
  if(sum <= 0) return pairs[0]?.v;
  let r = Math.random() * sum;
  for(const p of pairs){
    r -= Math.max(0, p.w||0);
    if(r <= 0) return p.v;
  }
  return pairs[pairs.length-1]?.v;
}

// 1) мКђл°ѓ лґДнПђ (PoE лКРлВМ: міИл∞Ш лђікЄ∞/к∞СмШЈ мЬДм£Љ, нЫДл∞Ш л∞ШмІА/кЄ∞нГАлПД мДЮмЮД)
if(typeof pickSlotForMapTier !== "function"){
  window.pickSlotForMapTier = function(mapTier){
    const t = Math.max(1, mapTier||1);
    // weapon, chest, helm, boots, ring
    if(t <= 2){
      return __randPickWeighted([
        {v:"weapon", w:45},
        {v:"chest",  w:25},
        {v:"helm",   w:15},
        {v:"boots",  w:10},
        {v:"ring",   w:5},
      ]);
    }
    if(t <= 6){
      return __randPickWeighted([
        {v:"weapon", w:35},
        {v:"chest",  w:25},
        {v:"helm",   w:15},
        {v:"boots",  w:12},
        {v:"ring",   w:13},
      ]);
    }
    return __randPickWeighted([
      {v:"weapon", w:28},
      {v:"chest",  w:22},
      {v:"helm",   w:15},
      {v:"boots",  w:13},
      {v:"ring",   w:22},
    ]);
  };
}

// 2) л≤†мЭімК§ нЛ∞мЦі лґДнПђ (mapTierк∞А мШ§л•ЉмИШл°Э мГБмЬД tier лєДм§С м¶Эк∞А)
if(typeof pickBaseTierForMap !== "function"){
  window.pickBaseTierForMap = function(mapTier){
    const t = Math.max(1, mapTier||1);
    // baseTier: 1~5 кЄ∞м§А
    if(t <= 2)  return __randPickWeighted([{v:1,w:80},{v:2,w:20}]);
    if(t <= 4)  return __randPickWeighted([{v:1,w:45},{v:2,w:35},{v:3,w:20}]);
    if(t <= 6)  return __randPickWeighted([{v:1,w:20},{v:2,w:30},{v:3,w:30},{v:4,w:20}]);
    if(t <= 8)  return __randPickWeighted([{v:2,w:20},{v:3,w:35},{v:4,w:30},{v:5,w:15}]);
    return __randPickWeighted([{v:3,w:25},{v:4,w:35},{v:5,w:40}]);
  };
}

// 3) ilvl мК§мЉАмЭЉ (лІµнЛ∞мЦі мГБмКє вЖТ ilvl мГБмКє)
if(typeof rollItemLevelFromMapTier !== "function"){
  window.rollItemLevelFromMapTier = function(mapTier){
    const t = Math.max(1, mapTier||1);
    // мШИ: t=1 вЖТ 1~8, t=5 вЖТ 21~28, t=10 вЖТ 46~55
    const base = (t-1)*5 + 1;
    const jitter = Math.floor(Math.random()*8); // 0~7
    return base + jitter;
  };
}

  const it = (typeof getSelectedItem === "function") ? getSelectedItem() : null;
  const p = document.getElementById("btnLockPrefix");
  const s = document.getElementById("btnLockSuffix");
  const r = document.getElementById("btnRemoveMeta");

  if(!it || it.isUnique){
    if(p) p.disabled = true;
    if(s) s.disabled = true;
    if(r) r.disabled = true;
    return;
  }

  it.metaCraft = it.metaCraft || {lockPrefix:false,lockSuffix:false};

  if(p) p.textContent = `м†СлСР к≥†м†Х (${it.metaCraft.lockPrefix ? "ON" : "OFF"})`;
  if(s) s.textContent = `м†СлѓЄ к≥†м†Х (${it.metaCraft.lockSuffix ? "ON" : "OFF"})`;

  if(r){
    const metaOn = it.metaCraft.lockPrefix || it.metaCraft.lockSuffix;
    const enough = (typeof exaltedOrbs === "number" && exaltedOrbs >= 3);
    r.disabled = !(metaOn && enough);
    r.style.opacity = r.disabled ? "0.55" : "1";
  }
}

/* ===== Craft Orbs: мХДмЭінЕЬ мХДмЭімљШ мК§нГАмЭЉл°Ь л†МлНФ (мЇФл≤ДмК§) ===== */
(function(){
  if(window.__orbIconStyleV1) return;
  window.__orbIconStyleV1 = true;

  function getCountById(id){
    try{
      switch(id){
        case "orbTransmute": return (typeof transmuteOrbs==="number") ? transmuteOrbs : 0;
        case "orbAlter":     return (typeof alterationOrbs==="number") ? alterationOrbs : 0;
        case "orbAug":       return (typeof augmentationOrbs==="number") ? augmentationOrbs : 0;
        case "orbRegal":     return (typeof regalOrbs==="number") ? regalOrbs : 0;
        case "orbAlchemy":   return (typeof alchemyOrbs==="number") ? alchemyOrbs : 0;
        case "chaosBtn":     return (typeof chaosOrbs==="number") ? chaosOrbs : 0;
        case "orbScour":     return (typeof scouringOrbs==="number") ? scouringOrbs : 0;
        case "orbExalt":     return (typeof exaltedOrbs==="number") ? exaltedOrbs : 0;
        case "orbAnnul":     return (typeof annulOrbs==="number") ? annulOrbs : 0;
        case "orbDivine":    return (typeof divineOrbs==="number") ? divineOrbs : 0;
        case "orbCorrupt":   return (typeof corruptOrbs==="number") ? corruptOrbs : 0;
        default: return 0;
      }
    }catch(e){ return 0; }
  }

  function rarityForOrb(id){
    // мГЙ кЈЬмєЩмЭД "нЭђкЈАлПД нЕМлСРл¶ђ"л°Ь мєШнЩШ (drawItemIconмЭШ нЕМлСРл¶ђ мГЙ мВђмЪ©)
    // normal=нЭ∞, magic=нММ, rare=кЄИ, unique=м£ЉнЩ©
    if(id==="orbTransmute" || id==="orbAlter" || id==="orbAug") return "magic";           // нММлЮА к≥ДмЧі
    if(id==="orbRegal") return "rare";                                                   // кЄИ(м†ЬмЩХ: кЄИ+нММлКФ мљФмЦімЧРмДЬ нСЬнШД)
    if(id==="orbAlchemy") return "rare";                                                 // кЄИм™љ (мЧ∞кЄИмЭА мљФмЦі/мЛђл≥Љл°Ь мЭА+кЄИ лКРлВМ)
    if(id==="chaosBtn" || id==="orbExalt" || id==="orbDivine") return "rare";            // кЄИ
    if(id==="orbScour") return "normal";                                                 // нЭ∞
    if(id==="orbAnnul") return "magic";                                                  // мљФл∞ЬнКЄ лКРлВМмЭА мљФмЦіл°Ь
    if(id==="orbCorrupt") return "unique";                                               // нГАлЭљ(лґЙмЭА м£ЉнЩ© к≥ДмЧі)
    return "normal";
  }

  function drawOrbIcon(canvas, id){
    const g = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    g.clearRect(0,0,W,H);

    // л∞∞к≤љ(мХДмЭінЕЬ мХДмЭімљШ мК§нГАмЭЉ)
    g.fillStyle = "rgba(0,0,0,0.18)";
    g.fillRect(0,0,W,H);

    // нЕМлСРл¶ђ(нЭђкЈАлПД мГЙ)
    const rr = rarityForOrb(id);
    g.lineWidth = 3;
    if(rr==="unique") g.strokeStyle = "#ffb86b";
    else if(rr==="rare") g.strokeStyle = "#ffd166";
    else if(rr==="magic") g.strokeStyle = "#2f7bff";
    else g.strokeStyle = "#ffffff";
    const pad = 4;
    g.strokeRect(pad, pad, W-pad*2, H-pad*2);

    // м§СмХЩ: "мШ§лЛИ л®Єл¶ђ" мЛ§л£®мЧ£(кЄ∞м°і мХДмЭінЕЬ мЇФл≤ДмК§ мК§нГАмЭЉмЧР лІЮмґШ лЛ®мИЬ мЛ§л£®мЧ£)
    // (мЭілѓЄмІА мЧЖмЭі, лПДнШХмЬЉл°ЬлІМ)
    g.save();
    g.translate(W/2, H/2 - 2);

    // мљФмЦі мїђлЯђ
    let core = "#2a2a2a";
    if(id==="orbTransmute" || id==="orbAlter" || id==="orbAug") core = "#2f7bff";
    if(id==="orbRegal") core = "#c8a23a";
    if(id==="orbAlchemy") core = "#d8d8d8";
    if(id==="chaosBtn" || id==="orbExalt" || id==="orbDivine") core = "#b88a2a";
    if(id==="orbScour") core = "#f0f0f0";
    if(id==="orbAnnul") core = "#2a66ff";
    if(id==="orbCorrupt") core = "#c23a2a";

    // мЭАмЭАнХЬ мљФмЦі кіС
    const rg = g.createRadialGradient(0,-10,6, 0,-10, 34);
    rg.addColorStop(0, "rgba(255,255,255,0.28)");
    rg.addColorStop(0.25, core + "AA");
    rg.addColorStop(1, "rgba(0,0,0,0.0)");
    g.fillStyle = rg;
    g.beginPath();
    g.arc(0,0,32,0,Math.PI*2);
    g.fill();

    // мШ§лЛИ мЦЉкµі(лІИмК§нБђ) - лЛ§нБђ л©ФнГИ + мљФмЦі нХШмЭілЭЉмЭінКЄ
    g.fillStyle = "rgba(0,0,0,0.55)";
    g.strokeStyle = "rgba(255,255,255,0.20)";
    g.lineWidth = 2;

    // мЦЉкµі
    g.beginPath();
    g.moveTo(0,-22);
    g.quadraticCurveTo(22,-18, 20,0);
    g.quadraticCurveTo(18,22, 0,24);
    g.quadraticCurveTo(-18,22, -20,0);
    g.quadraticCurveTo(-22,-18, 0,-22);
    g.closePath();
    g.fill(); g.stroke();

    // лњФ
    g.fillStyle = "rgba(0,0,0,0.65)";
    g.beginPath();
    g.moveTo(-10,-20); g.lineTo(-26,-32); g.lineTo(-16,-10); g.closePath();
    g.moveTo(10,-20);  g.lineTo(26,-32);  g.lineTo(16,-10);  g.closePath();
    g.fill();

    // лИИ(мљФмЦімГЙ)
    g.fillStyle = core;
    g.shadowColor = core;
    g.shadowBlur = 8;
    g.beginPath(); g.arc(-8,-2,3,0,Math.PI*2); g.fill();
    g.beginPath(); g.arc(8,-2,3,0,Math.PI*2); g.fill();
    g.shadowBlur = 0;

    g.restore();
  }

  function ensure(){
    const grid = document.getElementById("craftOrbGrid");
    if(!grid) return;

    grid.querySelectorAll("button.orbBtn").forEach(btn=>{
      // мЇФл≤ДмК§
      let c = btn.querySelector("canvas.orbIcon");
      if(!c){
        c = document.createElement("canvas");
        c.className = "orbIcon";
        c.width = 84; c.height = 84;
        btn.prepend(c);
      }
      // мИШлЯЙ
      let n = btn.querySelector(".orbMiniCount");
      if(!n){
        n = document.createElement("div");
        n.className = "orbMiniCount";
        btn.appendChild(n);
      }
      n.textContent = String(getCountById(btn.id));

      // мХДмЭімљШ кЈЄл¶ђкЄ∞
      try{ drawOrbIcon(c, btn.id); }catch(e){}
    });
  }

  // л†МлНФ нГАмЭіл∞Н: нМ®лДР к∞±мЛ†лІИлЛ§
  if(typeof renderAllPanels==="function"){
    const _orig = renderAllPanels;
    renderAllPanels = function(){
      _orig();
      try{ ensure(); }catch(_){}
    };
  }

  try{ ensure(); }catch(_){}
})();

(function(){

  window.__orbTouchStart = true;

  function stop(e){
    try{ if(typeof stopEvt==="function") stopEvt(e); }catch(_){}
    try{ e.preventDefault(); e.stopPropagation(); }catch(_){}
  }

  function typeFromId(id){
    switch(id){
      case "orbTransmute": return "transmute";
      case "orbAlter": return "alter";
      case "orbAug": return "aug";
      case "orbRegal": return "regal";
      case "orbAlchemy": return "alchemy";
      case "chaosBtn": return "chaos";
      case "orbScour": return "scour";
      case "orbExalt": return "exalt";
      case "orbAnnul": return "annul";
      case "orbDivine": return "divine";
      case "orbCorrupt": return "corrupt";
      default: return null;
    }
  }

  function setActive(btn){
    const grid = document.getElementById("craftOrbGrid");
    if(!grid) return;
    grid.querySelectorAll("button.orbBtn").forEach(b=>b.classList.remove("active"));
    if(btn) btn.classList.add("active");
  }

  function selectOrb(btn){
    const t = typeFromId(btn.id);
    if(!t) return;
    window.craftSelectedOrb = t;
    setActive(btn);
  }

  function bind(){
    const grid = document.getElementById("craftOrbGrid");
    if(!grid) return;
    grid.querySelectorAll("button.orbBtn").forEach(btn=>{
      if(btn.__touchBound) return;
      btn.__touchBound = true;
      btn.addEventListener("touchstart", (e)=>{ stop(e); selectOrb(btn); }, {capture:true, passive:false});
    });
  }

  if(typeof renderAllPanels==="function"){
    const _orig = renderAllPanels;
    renderAllPanels = function(){
      _orig();
      try{ bind(); }catch(_){}
    };
  }
  try{ bind(); }catch(_){}
})();

/* ===== ISO draw binding fix (ensures drawIso replaces draw even if draw is defined later) ===== */
(function(){
  if(window.__isoBindFixV1) return;
  window.__isoBindFixV1 = true;
  let tries = 0;
  function tick(){
    tries++;
    try{
      if(typeof window.drawIso === "function" && typeof window.draw === "function" && window.draw !== window.drawIso){
        window.__drawTopDown = window.draw;
        window.draw = window.drawIso;
      }
      // stop once bound or after ~2 seconds
      if(window.draw === window.drawIso || tries > 120) return;
    }catch(_){}
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

function __weaponAffixTotals(it){
  const aff = Array.isArray(it && it.affixes) ? it.affixes : [];
  const out = { dmgPct:0, flat:0, atkSpd:0, critChance:0, critMulti:0, range:0, fire:0, cold:0, lightning:0 };
  for(const roll of aff){
    if(!roll || !roll.affix) continue;
    const g = String(roll.affix.group || "").toLowerCase();
    const v = Number(roll.value || 0);
    if(g.includes("fire_flat")) out.fire += v;
    else if(g.includes("cold_flat")) out.cold += v;
    else if(g.includes("lightning_flat")) out.lightning += v;
    else if(g.includes("phys_flat")) out.flat += v;
    else if(g.includes("attackspeed")) out.atkSpd += v;
    else if(g.includes("critchance")) out.critChance += v;
    else if(g.includes("critmulti")) out.critMulti += v;
    else if(g === "range" || g.includes("melee_range")) out.range += v;
    else if(g.includes("phys")) out.dmgPct += v;
  }
  return out;
}

function getWeaponDisplayStats(it){
  if(!it || it.slot !== "weapon") return null;
  const baseMin = Number(player?.weapon?.min ?? 14);
  const baseMax = Number(player?.weapon?.max ?? 20);
  const baseData = it.baseData || {};
  const aff = __weaponAffixTotals(it);

  const baseDmgMul = Number(baseData.dmgMul ?? 1);
  const baseAtkMul = Number(baseData.spdMul ?? 1);

  let min = Math.max(1, Math.floor(baseMin * baseDmgMul));
  let max = Math.max(min, Math.floor(baseMax * baseDmgMul));

  if(aff.dmgPct){
    min = Math.max(1, Math.floor(min * (1 + aff.dmgPct/100)));
    max = Math.max(min, Math.floor(max * (1 + aff.dmgPct/100)));
  }

  const elemFlat = aff.fire + aff.cold + aff.lightning;
  min = Math.max(1, Math.floor(min + aff.flat + elemFlat));
  max = Math.max(min, Math.floor(max + aff.flat + elemFlat));

  const atkMul = Math.max(0.1, baseAtkMul * (1 + aff.atkSpd/100));
  const avg = (min + max) / 2;
  const dps = avg * atkMul;

  return {
    min, max, atkMul, dps,
    flatPhys: aff.flat,
    fireFlat: aff.fire,
    coldFlat: aff.cold,
    lightningFlat: aff.lightning,
    dmgPct: aff.dmgPct,
    critChance: aff.critChance,
    critMulti: aff.critMulti,
    rangePct: aff.range
  };
}

  if(it.baseData){

    if(d.maxHpAdd) html += `<div class="itemInfoLine">- мµЬлМА м≤іл†• +${Math.floor(d.maxHpAdd)}</div>`;
    if(d.armorAdd) html += `<div class="itemInfoLine">- л∞©мЦіл†• +${Math.floor(d.armorAdd)}</div>`;
    if(d.hpRegen)  html += `<div class="itemInfoLine">- мЮђмГЭ +${d.hpRegen.toFixed(2)}/s</div>`;
  }

  const aff = Array.isArray(it.affixes) ? it.affixes : [];
  const prefixes = aff.filter(a => a && a.affix && a.kind === "prefix");
  const suffixes = aff.filter(a => a && a.affix && a.kind === "suffix");

  if(prefixes.length){
    html += `<div class="itemInfoGap"></div><div class="itemInfoLine itemInfoDim">м†СлСР</div>`;

(function(){

  window.__AILMENT_PATCH_APPLIED__ = true;

  function __ensureAilments(e){
    if(!e) return e;
    if(!e.ailments) e.ailments = { burn:0, chill:0, shock:0 };
    if(!e.ailmentPower) e.ailmentPower = { burn:0, chill:0, shock:0 };
    return e;
  }

  function __isBossLike(e){
    return !!(e && (e.type === "boss" || e.isElite || e.type === "demon"));
  }

  function __bossDampen(e, v){
    return __isBossLike(e) ? (v * 0.5) : v;
  }

  function __clamp(v, lo, hi){
    return Math.max(lo, Math.min(hi, v));
  }

  function __applyAilmentsFromDamageResult(e, dmgRes){
    if(!e || !dmgRes || !dmgRes.dealtPacket) return;
    __ensureAilments(e);

    const pkt = dmgRes.dealtPacket;
    const fire = Number(pkt.fire || 0);
    const cold = Number(pkt.cold || 0);
    const lightning = Number(pkt.lightning || 0);

    if(fire > 0 && Math.random() < 0.28){
      const dur = Math.round(__bossDampen(e, 96));
      const pwr = Math.max(0.6, __bossDampen(e, fire * 0.16));
      e.ailments.burn = Math.max(e.ailments.burn || 0, dur);
      e.ailmentPower.burn = Math.max(e.ailmentPower.burn || 0, pwr);
    }

    if(cold > 0 && Math.random() < 0.34){
      const dur = Math.round(__bossDampen(e, 84));
      const slow = __clamp(__bossDampen(e, 0.18 + cold * 0.01), 0.12, __isBossLike(e) ? 0.22 : 0.38);
      e.ailments.chill = Math.max(e.ailments.chill || 0, dur);
      e.ailmentPower.chill = Math.max(e.ailmentPower.chill || 0, slow);
    }

    if(lightning > 0 && Math.random() < 0.24){
      const dur = Math.round(__bossDampen(e, 72));
      const amp = __clamp(__bossDampen(e, 0.10 + lightning * 0.008), 0.08, __isBossLike(e) ? 0.16 : 0.28);
      e.ailments.shock = Math.max(e.ailments.shock || 0, dur);
      e.ailmentPower.shock = Math.max(e.ailmentPower.shock || 0, amp);
    }
  }

  function __doAilmentDeathRewards(e, source){
    if(!e || e._ailmentDeathHandled) return;
    e._ailmentDeathHandled = true;

    if(e.type === "boss"){
      if(typeof startBossDeath === "function") startBossDeath(e);
      return;

        emitEvent("kill", { enemy:e, x:e.x, y:e.y, type:e.type, source: source || "ailment" });

      player.hp = Math.min(player.maxHp || player.hp || 0, (player.hp || 0) + 1);

      });

  }

  function __tickEnemyAilments(e){
    if(!e || e.hp <= 0) return;
    __ensureAilments(e);

    if(e.ailments.burn > 0){
      e.ailments.burn--;
      if(typeof frameCount === "number" && frameCount % 15 === 0){
        const dmg = Math.max(1, e.ailmentPower.burn || 1);
        e.hp -= dmg;
        if(typeof __enemyHitFlashStart === "function") __enemyHitFlashStart(e, 0.65);

        if(typeof particles !== "undefined" && Array.isArray(particles) && particles.length < 260){
          particles.push({
            x: e.x + (Math.random()-0.5)*10,
            y: e.y - 8 + (Math.random()-0.5)*8,
            vx: (Math.random()-0.5)*0.5,

          });

        if(e.hp <= 0){

      e.ailmentPower.burn = 0;

    }else{

      }catch(_){}

  }

  if(typeof applyEnemyTakenDamageModsPacket === "function"){
    const __origApplyEnemyTakenDamageModsPacket = applyEnemyTakenDamageModsPacket;
    applyEnemyTakenDamageModsPacket = function(pkt, ctx){
      let out = __origApplyEnemyTakenDamageModsPacket(pkt, ctx);
      const e = ctx && ctx.enemy;
      if(e && e.ailments && e.ailments.shock > 0){
        const amp = 1 + Math.max(0, Number((e.ailmentPower && e.ailmentPower.shock) || 0));

        }else{

      __origDrawIsoEnemySprite(sx, sy, e);

      ctx.save();

      if(e.ailments.chill > 0){
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = "#4aa3ff";
        ctx.beginPath();
        ctx.arc(sx, sy - 18, 14, 0, Math.PI*2);
        ctx.fill();
      }

      if(e.ailments.shock > 0){
        ctx.globalAlpha = 0.85;
        ctx.strokeStyle = "#ffd400";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx - 8, sy - 28);
        ctx.lineTo(sx - 1, sy - 20);
        ctx.lineTo(sx - 4, sy - 20);

        ctx.fillStyle = "#ff6a00";
        for(let i=0;i<2;i++){
          const ox = Math.sin((frameCount || 0)*0.15 + i*1.7) * 6;
          const oy = Math.cos((frameCount || 0)*0.13 + i*1.3) * 4;
          ctx.beginPath();
          ctx.arc(sx + ox, sy - 22 + oy, 2.3 + i*0.6, 0, Math.PI*2);
          ctx.fill();
        }
      }

      ctx.restore();
    };
  }

  if(typeof prettyItemHTML === "function"){

        g.lineTo(0,-2);
