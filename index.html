(function(){
  if(window.__COMBAT_BALANCE_PATCH__) return;
  window.__COMBAT_BALANCE_PATCH__ = true;

  function __iterEquippedItems(){
    const out = [];
    try{
      if(typeof equipment === "object" && equipment){
        for(const k of Object.keys(equipment)){
          if(equipment[k]) out.push(equipment[k]);
        }
      }
    }catch(_){}
    return out;
  }

  function __sumItemResists(it){
    const d = (it && (it.totalData || it.data)) || {};
    const imp = Array.isArray(it && it.implicits) ? it.implicits : [];
    let fire = 0, cold = 0, light = 0, chaos = 0, all = 0;
    if(typeof d.fireResAdd === "number") fire += d.fireResAdd;
    if(typeof d.coldResAdd === "number") cold += d.coldResAdd;
    if(typeof d.lightResAdd === "number") light += d.lightResAdd;
    if(typeof d.chaosResAdd === "number") chaos += d.chaosResAdd;
    if(typeof d.allResAdd === "number") all += d.allResAdd;
    for(const x of imp){
      if(!x) continue;
      const stat = x.stat;
      const val = Number(x.value || 0);
      if(stat === "fireResAdd") fire += val;
      else if(stat === "coldResAdd") cold += val;
      else if(stat === "lightResAdd") light += val;
      else if(stat === "chaosResAdd") chaos += val;
      else if(stat === "allResAdd") all += val;
    }
    return { fire, cold, light, chaos, all };
  }

  function __rebuildPlayerResists(){
    let fire = 0, cold = 0, light = 0, chaos = 0, all = 0;
    for(const it of __iterEquippedItems()){
      const r = __sumItemResists(it);
      fire += r.fire; cold += r.cold; light += r.light; chaos += r.chaos; all += r.all;
    }
    player.fireRes = Math.max(0, Math.min(75, fire + all));
    player.coldRes = Math.max(0, Math.min(75, cold + all));
    player.lightRes = Math.max(0, Math.min(75, light + all));
    player.chaosRes = Math.max(0, Math.min(75, chaos + all));
    if(!player.gear) player.gear = {};
    player.gear.fireResAdd = player.fireRes;
    player.gear.coldResAdd = player.coldRes;
    player.gear.lightResAdd = player.lightRes;
    player.gear.chaosResAdd = player.chaosRes;
    player.gear.allResAdd = all;
  }

 (function(){
  if(window.__WEAPON_STAT_RUNTIME_PATCH_V1__) return;
  window.__WEAPON_STAT_RUNTIME_PATCH_V1__ = true;

  const WEAPON_STAT_KEYS = [
    "armorAdd","maxHpAdd","hpRegen",
    "flatDamage","flatDamageAdd",
    "critChanceAdd","critChanceInc","critChanceMore",
    "critMultiAdd","critMultiInc","critMultiMore",
    "lifeLeech","hpOnHit","hpOnKill",
    "bleedChance","knockbackChance","cleaveChance","doubleHitChance","executeChance",
    "critChanceVsBoss",
  ];

  function __newGearState(){
    return {
      armorAdd: 0,
      maxHpAdd: 0,
      hpRegen: 0,

      dmgMul: 1,
      dmgInc: 0,
      dmgMore: 1,

      atkSpdMul: 1,
      atkSpdInc: 0,
      atkSpdMore: 1,

      spdMul: 1,
      rangeMul: 1,
      rangeInc: 0,
      rangeMore: 1,

      critChanceAdd: 0,
      critChanceInc: 0,
      critChanceMore: 1,

      critMultiAdd: 0,
      critMultiInc: 0,
      critMultiMore: 1,

      flatDamageAdd: 0,
      lifeLeech: 0,
      hpOnHit: 0,
      hpOnKill: 0,

      bleedChance: 0,
      knockbackChance: 0,
      cleaveChance: 0,
      doubleHitChance: 0,
      executeChance: 0,

      critChanceVsBoss: 0,
      bossDamageMul: 1,
      eliteDamageMul: 1,

      fireResAdd: 0,
      coldResAdd: 0,
      lightResAdd: 0,
      chaosResAdd: 0,
      allResAdd: 0
    };
  }

  function __mergeStat(dst, stat, value){
    const v = Number(value || 0);
    if(!isFinite(v)) return;

    if(stat === "flatDamage") stat = "flatDamageAdd";

    switch(stat){
      case "dmgMul":
      case "atkSpdMul":
      case "spdMul":
      case "rangeMul":
      case "bossDamageMul":
      case "eliteDamageMul":
        dst[stat] = (dst[stat] ?? 1) * v;
        break;

      case "critChanceMore":
      case "critMultiMore":
      case "dmgMore":
      case "atkSpdMore":
      case "rangeMore":
        dst[stat] = (dst[stat] ?? 1) * v;
        break;

      default:
        dst[stat] = (dst[stat] ?? 0) + v;
        break;
    }
  }

  function __pullItemStats(it, dst){
    if(!it) return;
    const d = (it.totalData || it.data || {});
    const imps = Array.isArray(it.implicits) ? it.implicits : [];

    for(const k of WEAPON_STAT_KEYS){
      if(typeof d[k] === "number") __mergeStat(dst, k, d[k]);
    }

    if(typeof d.dmgMul === "number") __mergeStat(dst, "dmgMul", d.dmgMul);
    if(typeof d.atkSpdMul === "number") __mergeStat(dst, "atkSpdMul", d.atkSpdMul);
    if(typeof d.rangeMul === "number") __mergeStat(dst, "rangeMul", d.rangeMul);
    if(typeof d.spdMul === "number") __mergeStat(dst, "spdMul", d.spdMul);

    if(typeof d.bossDamageMul === "number") __mergeStat(dst, "bossDamageMul", d.bossDamageMul);
    if(typeof d.eliteDamageMul === "number") __mergeStat(dst, "eliteDamageMul", d.eliteDamageMul);

    for(const imp of imps){
      if(!imp || !imp.stat) continue;
      const stat = imp.stat;
      const val = Number(imp.value || 0);
      if(!isFinite(val)) continue;
      __mergeStat(dst, stat, val);
    }
  }

  function __rebuildExtendedGearStats(){
    const gear = __newGearState();

    try{
      if(typeof equipment === "object" && equipment){
        for(const key of Object.keys(equipment)){
          const it = equipment[key];
          if(!it) continue;
          __pullItemStats(it, gear);
        }
      }
    }catch(_){}

    // increased + more вЖТ мµЬмҐЕ mul мВ∞мґЬ
    gear.dmgMul     = (gear.dmgMul ?? 1)     * (1 + (gear.dmgInc ?? 0))     * (gear.dmgMore ?? 1);
    gear.atkSpdMul  = (gear.atkSpdMul ?? 1)  * (1 + (gear.atkSpdInc ?? 0))  * (gear.atkSpdMore ?? 1);
    gear.spdMul     = (gear.spdMul ?? 1)     * (1 + (gear.spdInc ?? 0))     * (gear.spdMore ?? 1);
    gear.rangeMul   = (gear.rangeMul ?? 1)   * (1 + (gear.rangeInc ?? 0))   * (gear.rangeMore ?? 1);
    gear.critChanceMore = (gear.critChanceMore ?? 1);
    gear.critMultiMore = (gear.critMultiMore ?? 1);
    gear.flatDamage = gear.flatDamageAdd || 0;

    player.gear = Object.assign(__newGearState(), player.gear || {}, gear);

    // recalcFromGear л≥Єм≤ік∞А buffsл•Љ лЛ§мЛЬ лІМлУ§лНФлЭЉлПД мХИм†ДнХШк≤М л≥ім†Х
    const b = player.buffs || {};
    b.dmgMul = (player.gear.dmgMul ?? 1);
    b.atkSpdMul = (player.gear.atkSpdMul ?? 1);
    b.rangeMul = (player.gear.rangeMul ?? 1);
    player.buffs = b;
  }

  if(typeof recalcFromGear === "function" && !window.__recalcWeaponStatsWrapped){
    const __orig = recalcFromGear;
    recalcFromGear = function(){
      const out = __orig();
      try{ __rebuildExtendedGearStats(); }catch(_){}
      try{ if(typeof __rebuildPlayerResists === "function") __rebuildPlayerResists(); }catch(_){}
      return out;
    };
    window.__recalcWeaponStatsWrapped = true;
  }

  window.__weaponStatUtils = {
    rebuild: __rebuildExtendedGearStats
  };
})();

  function __inferEnemyElementSplit(src){
    const tags = Array.isArray(src && src.tags) ? src.tags : [];
    const type = String(src && src.type || src && src.sourceType || "").toLowerCase();

    // explicit tags first
    if(tags.includes("fire"))      return { phys:0.55, fire:0.45, cold:0, light:0, chaos:0 };
    if(tags.includes("cold"))      return { phys:0.65, fire:0, cold:0.35, light:0, chaos:0 };
    if(tags.includes("lightning")) return { phys:0.70, fire:0, cold:0, light:0.30, chaos:0 };

    // type-based defaults
    if(type === "mage" || (src && src.radius && src.life && src.tick !== undefined)) {
      return { phys:0.40, fire:0.60, cold:0, light:0, chaos:0 };
    }
    if(type === "archer" || type === "skeleton" || (tags.includes("projectile") && tags.includes("arrow"))) {
      return { phys:0.65, fire:0, cold:0.35, light:0, chaos:0 };
    }
    if(type === "demon"){
      return { phys:0.55, fire:0.45, cold:0, light:0, chaos:0 };
    }
    if(type === "boss"){
      return { phys:0.55, fire:0.15, cold:0, light:0.30, chaos:0 };
    }
    return { phys:1.0, fire:0, cold:0, light:0, chaos:0 };
  }

  function __applyResistToIncoming(totalDamage, src){
    const split = __inferEnemyElementSplit(src);
    const armor = Math.max(0, Number(player.armor || 0));

    const physBase = totalDamage * split.phys;
    const fireBase = totalDamage * split.fire;
    const coldBase = totalDamage * split.cold;
    const lightBase = totalDamage * split.light;
    const chaosBase = totalDamage * split.chaos;

    // improved armor formula: diminishing returns, scales with hit size
    const physReduction = armor / (armor + 80 + physBase * 6);
    const physTaken = physBase * (1 - Math.max(0, Math.min(0.85, physReduction)));

    const fireTaken  = fireBase  * (1 - (Math.max(0, Math.min(75, Number(player.fireRes  || 0))) / 100));
    const coldTaken  = coldBase  * (1 - (Math.max(0, Math.min(75, Number(player.coldRes  || 0))) / 100));
    const lightTaken = lightBase * (1 - (Math.max(0, Math.min(75, Number(player.lightRes || 0))) / 100));
    const chaosTaken = chaosBase * (1 - (Math.max(0, Math.min(75, Number(player.chaosRes || 0))) / 100));

    return {
      total: Math.max(1, Math.floor(physTaken + fireTaken + coldTaken + lightTaken + chaosTaken)),
      parts: {
        phys: physTaken, fire: fireTaken, cold: coldTaken, light: lightTaken, chaos: chaosTaken
      },
      reduction: physReduction
    };
  }

  if(typeof damagePlayer === "function"){
    const __origDamagePlayer = damagePlayer;
    damagePlayer = function(dmg, knockX, knockY, src){
      if(player.invul > 0 || gameOver) return;

      let incoming = dmg;
      if(typeof USE_TAG_CONTEXTS !== "undefined" && USE_TAG_CONTEXTS){
        const srcTags = src ? (src.tags ? src.tags : (typeof tagsFromEnemy === "function" ? tagsFromEnemy(src) : [])) : [];
        const ctxIn = { scope:'player', tags: (typeof mergeTags === "function" ? mergeTags(['incoming'], (typeof getPlayerTags === "function" ? getPlayerTags() : []), (typeof getMapTags === "function" ? getMapTags() : []), srcTags) : srcTags) };
        if(typeof applyPlayerTakenDamageMods === "function"){
          incoming = applyPlayerTakenDamageMods(incoming, ctxIn);
        }
      }

      const calc = __applyResistToIncoming(incoming, src);
      const finalDmg = calc.total;

      player.hp -= finalDmg;
      if(typeof emitEvent === "function") emitEvent("takeDamage", { dmg: finalDmg, breakdown: calc.parts });
      player.invul = 25;
      if(typeof shake === "number") shake = Math.max(shake, 10);

      const nx = player.x + knockX;
      const ny = player.y + knockY;
      if(typeof canMoveTo === "function"){
        if(canMoveTo(nx, player.y)) player.x = nx;
        if(canMoveTo(player.x, ny)) player.y = ny;
      }

      if(player.hp <= 0 && typeof handleGameOver === "function") handleGameOver();
    };
  }

  // add elemental tags to enemy projectiles / zones by source type
  if(typeof spawnArrow === "function"){
    const __origSpawnArrow = spawnArrow;
    spawnArrow = function(fromX, fromY, toX, toY, damage){
      const before = Array.isArray(arrows) ? arrows.length : 0;
      const out = __origSpawnArrow(fromX, fromY, toX, toY, damage);
      try{
        if(Array.isArray(arrows) && arrows.length > before){
          const a = arrows[arrows.length - 1];
          if(a && (!a.tags || !a.tags.includes("cold"))){
            a.tags = (typeof mergeTags === "function") ? mergeTags(a.tags || [], ["cold"]) : (a.tags || ["cold"]);
            a.sourceType = "archer";
          }
        }
      }catch(_){}
      return out;
    };
  }

  if(typeof updateMage === "function"){
    const __origUpdateMage = updateMage;
    updateMage = function(e){
      const before = Array.isArray(fireZones) ? fireZones.length : 0;
      const out = __origUpdateMage(e);
      try{
        if(Array.isArray(fireZones) && fireZones.length > before){
          const f = fireZones[fireZones.length - 1];
          if(f){
            f.tags = (typeof mergeTags === "function") ? mergeTags(f.tags || [], ["fire"]) : (f.tags || ["fire"]);
            f.type = "mage";
            if(typeof f.damage !== "number" || !isFinite(f.damage)) f.damage = Math.max(4, (e && e.damage ? e.damage * 0.8 : 8));
            if(typeof f.radius !== "number" && typeof f.r === "number") f.radius = f.r;
          }
        }
      }catch(_){}
      return out;
    };
  }

  if(typeof spawnEnemyAt === "function"){
    const __origSpawnEnemyAt = spawnEnemyAt;
    spawnEnemyAt = function(ex, ey, pack){
      const before = Array.isArray(enemies) ? enemies.length : 0;
      const out = __origSpawnEnemyAt(ex, ey, pack);
      try{
        if(Array.isArray(enemies) && enemies.length > before){
          const e = enemies[enemies.length - 1];
          if(e){
            if(e.type === "archer" || e.type === "skeleton"){
              e.attackElement = "cold";
              e.tags = (typeof mergeTags === "function") ? mergeTags(e.tags || [], ["cold"]) : (e.tags || ["cold"]);
            }else if(e.type === "mage" || e.type === "demon"){
              e.attackElement = "fire";
              e.tags = (typeof mergeTags === "function") ? mergeTags(e.tags || [], ["fire"]) : (e.tags || ["fire"]);
            }else if(e.type === "boss"){
              e.attackElement = "lightning";
              e.tags = (typeof mergeTags === "function") ? mergeTags(e.tags || [], ["lightning"]) : (e.tags || ["lightning"]);
            }
          }
        }
      }catch(_){}
      return out;
    };
  }

  if(typeof spawnRandomBoss === "function"){
    const __origSpawnRandomBoss = spawnRandomBoss;
    spawnRandomBoss = function(){
      const before = Array.isArray(enemies) ? enemies.length : 0;

      try{
        if(Array.isArray(enemies) && enemies.length > before){
          const e = enemies[enemies.length - 1];
          if(e && e.type === "boss"){
            e.attackElement = "lightning";
            e.tags = (typeof mergeTags === "function") ? mergeTags(e.tags || [], ["lightning"]) : (e.tags || ["lightning"]);
          }
        }

      return out;

  // Spec UI: append resistance values
  function __appendResistLines(){
    try{
      if(typeof specTextEl === "undefined" || !specTextEl) return;
      const base = String(specTextEl.textContent || "");
      const marker = "нЩФмЧЉ м†АнХ≠:";
      if(base.includes(marker)) return;
      const lines = [
        "",
        `нЩФмЧЉ м†АнХ≠: ${(player.fireRes || 0).toFixed(0)}%`,

        `л≤Ик∞Ь м†АнХ≠: ${(player.lightRes || 0).toFixed(0)}%`,

      ];
      specTextEl.textContent = base + lines.join("\n");
    }catch(_){}
  }

  const __oldAfter = (window.GameHooks && window.GameHooks.afterRenderPanels) || null;
  window.GameHooks = window.GameHooks || {};
  window.GameHooks.afterRenderPanels = function(){
    try{ if(typeof __oldAfter === "function") __oldAfter(); }catch(_){}
    try{ __appendResistLines(); }catch(_){}
  };

  // initialize resists once
  try{ __rebuildPlayerResists(); }catch(_){}

/* ===== 4пЄПвГ£ лУЬлЮН мХДмЭінЕЬ лєФ ===== */
(function(){

  if(typeof window.drawLootBeamsPatched !== "undefined") return;
  window.drawLootBeamsPatched = true;

  function drawBeams(){
    try{
      if(!window.loots || !window.ctx) return;

      const ctx = window.ctx;

      for(const l of window.loots){
        if(!l) continue;

        const x = l.x || 0;
        const y = l.y || 0;

        const g = ctx.createLinearGradient(x, y-120, x, y);
        g.addColorStop(0, "rgba(255,255,120,0.0)");
        g.addColorStop(1, "rgba(255,255,120,0.55)");

        ctx.fillStyle = g;
        ctx.fillRect(x-4, y-120, 8, 120);
      }
    }catch(e){}
  }

  const oldRender = window.render;
  if(typeof oldRender === "function"){
    window.render = function(){
      oldRender();
      drawBeams();
    }
  }

})();

(function(){
  if(window.__ELITE_ELEMENT_BOOTS_PATCH__) return;
  window.__ELITE_ELEMENT_BOOTS_PATCH__ = true;

  // ---------- 1) лґАмЄ† мКђл°ѓ л≥ік∞Х ----------
  try{
    if(typeof equipment === "object" && equipment && !("boots" in equipment)){
      equipment.boots = null;
    }
  }catch(_){}

  if(typeof slotLabel === "function"){
    const __origSlotLabel = slotLabel;
    slotLabel = function(slot){
      if(slot === "boots") return "мЮ•нЩФ";
      return __origSlotLabel(slot);
    };
  }

  // лґАмЄ† мК§нГѓмЭД gearмЧР л∞ШмШБ
  if(typeof rebuildGearFromEquipment === "function"){
    const __origRebuildGearFromEquipment = rebuildGearFromEquipment;
    rebuildGearFromEquipment = function(){
      __origRebuildGearFromEquipment();
      try{
        const it = equipment && equipment.boots;
        if(!it || it.isUnique) return;
        const d = it.totalData || it.data;
        if(!d) return;

        if(!player.gear) player.gear = {};
        for(const k in d){
          const v = d[k];
          if(typeof v !== "number") continue;
          if(k.endsWith("Mul")){
            player.gear[k] = (player.gear[k] ?? 1) * v;
          }else{
            player.gear[k] = (player.gear[k] ?? 0) + v;
          }
        }
        if(typeof recalcFromGear === "function"){
          recalcFromGear();
          player.hp = Math.min(player.hp, player.maxHp);
        }
      }catch(err){
        console.warn("boots rebuild patch failed", err);
      }
    };
  }

  // лґАмЄ† мХДмЭімљШ мґФк∞А
  if(typeof drawItemIcon === "function"){
    const __origDrawItemIcon = drawItemIcon;
    drawItemIcon = function(c, it){
      if(it && it.slot === "boots"){
        const g = c.getContext("2d");
        const W = c.width, H = c.height;
        g.clearRect(0,0,W,H);
        g.save();
        g.globalAlpha = 1;
        g.fillStyle = "rgba(0,0,0,0.15)";
        g.fillRect(0,0,W,H);

        const rr = normalizeRarity(it?.isUnique ? "unique" : (it?.rarity || "normal"));
        g.lineWidth = 3;
        if(rr==="unique") g.strokeStyle = "#ffb86b";
        else if(rr==="rare") g.strokeStyle = "#ffd166";
        else if(rr==="magic") g.strokeStyle = "#2f7bff";
        else g.strokeStyle = "#ffffff";
        const pad = 4;
        g.strokeRect(pad, pad, W - pad*2, H - pad*2);

        g.translate(W/2, H/2);
        g.globalAlpha = 0.98;
        g.fillStyle = "#d8d8d8";
        g.strokeStyle = "#8a8a8a";
        g.lineWidth = 2;

        // мЮ•нЩФ мЛ§л£®мЧ£
        g.beginPath();
        g.moveTo(-10,-10);
        g.lineTo(0,-10);
        g.lineTo(0,0);
        g.lineTo(11,0);
        g.lineTo(11,8);
        g.lineTo(-8,8);
        g.lineTo(-10,4);
        g.closePath();
        g.fill();
        g.stroke();

        g.beginPath();
        g.moveTo(-8,-14);
        g.lineTo(0,-14);
        g.lineTo(0,-6);
        g.lineTo(-8,-6);
        g.closePath();
        g.fill();
        g.stroke();

        g.restore();
        return;
      }
      return __origDrawItemIcon(c, it);
    };
  }

  // мЮ•лєДм∞љмЧР лґАмЄ† мКђл°ѓ нСЬмЛЬ
  if(typeof renderEquipPanel === "function"){
    const __origRenderEquipPanel = renderEquipPanel;
    renderEquipPanel = function(){
      equipSlotsEl.innerHTML = "";

      const SLOT_ORDER = ["weapon","helm","chest","boots","ring"];

      for(const slot of SLOT_ORDER){
        const it = equipment[slot];

        const d = document.createElement("div");
        d.className = "eSlotSmall";
        d.dataset.slot = slot;
        if(it) d.classList.add(rarityClass(it));
        if(selectedItem && selectedItem.from==="equip" && selectedItem.slot===slot) d.classList.add("selected");

        const c = document.createElement("canvas");
        c.width = 44; c.height = 44;
        d.appendChild(c);
        drawItemIcon(c, it);

        d.addEventListener("click", ()=>{
          if(selectedItem && selectedItem.from==="bag"){
            equipFromBagToSlot(selectedItem.idx, slot);
            selectedItem = {from:"equip", slot};
            renderAllPanels();
            return;
          }

          if(!selectedItem || selectedItem.from!=="equip" || selectedItem.slot!==slot){
            selectedItem = {from:"equip", slot};
          }else{
            selectedItem = null;
          }
          renderAllPanels();
        });

        equipSlotsEl.appendChild(d);
      }

      const g = player.gear || {};
      specTextEl.textContent =
`мГЭл™Ел†•: ${player.hp.toFixed(0)} / ${player.maxHp.toFixed(0)}
л∞©мЦілПД: ${(player.armor ?? 0).toFixed(0)}
міИлЛє мГЭл™Ел†• мЮђмГЭ: ${(g.hpRegen ?? 0).toFixed(2)}

к≥µк≤© нФЉнХі: ${fmtIncPctFromMul(g.dmgMul ?? 1)}
к≥µк≤© мЖНлПД: ${fmtIncPctFromMul(g.atkSpdMul ?? 1)}
мВђк±∞л¶ђ: ${fmtIncPctFromMul(g.rangeMul ?? 1)}

мєШл™ЕнГА нЩХл•†: ${((getCritChance()||0)*100).toFixed(1)}%
мєШл™ЕнГА нФЉнХі: x${(getCritMulti()||1).toFixed(2)}

мЭілПЩ мЖНлПД: ${fmtIncPctFromMul(g.spdMul ?? 1)}`;

      const itSel = (selectedItem && selectedItem.from==="equip") ? getSelectedItem() : null;
      equipInfoEl.innerHTML = itSel ? prettyItemHTML(itSel) : "";
    };
  }

  // ---------- 2) мЧШл¶ђнКЄ мЫРмЖМ мЖНмД± ----------
  function __ensureEliteElement(e){
    if(!e || !e.isElite) return;
    if(e.eliteElement) return;

    const r = Math.random();
    e.eliteElement = r < 0.34 ? "fire" : (r < 0.67 ? "cold" : "lightning");
    if(typeof mergeTags === "function"){
      e.tags = mergeTags(e.tags || [], [e.eliteElement, "elemental_elite"]);
    }else{
      e.tags = (e.tags || []);
      if(!e.tags.includes(e.eliteElement)) e.tags.push(e.eliteElement);
    }

    // кЄ∞м°і eliteColorлПД мЫРмЖМмЧР лІЮмґ§
    if(e.eliteElement === "fire") e.eliteColor = "red";
    else if(e.eliteElement === "cold") e.eliteColor = "blue";
    else e.eliteColor = "yellow";
  }

  if(typeof spawnEnemyAt === "function"){
    const __origSpawnEnemyAt = spawnEnemyAt;
    spawnEnemyAt = function(ex, ey, pack){
      const before = Array.isArray(enemies) ? enemies.length : 0;
      const out = __origSpawnEnemyAt(ex, ey, pack);
      try{
        if(Array.isArray(enemies) && enemies.length > before){
          const e = enemies[enemies.length - 1];
          if(e && e.isElite) __ensureEliteElement(e);
        }
      }catch(err){
        console.warn("elite element spawn patch failed", err);
      }
      return out;
    };
  }

  // ---------- 3) мЧШл¶ђнКЄ мЫРмЖМ лєДм£ЉмЦЉ ----------
  function __drawEliteElementVfx(sx, sy, e){
    if(!e || !e.isElite) return;
    __ensureEliteElement(e);

    ctx.save();

    const t = (typeof frameCount === "number" ? frameCount : 0);

    if(e.eliteElement === "fire"){
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = "rgba(255,80,30,0.40)";
      ctx.beginPath();
      ctx.arc(sx, sy - 18, 18, 0, Math.PI*2);
      ctx.fill();

      for(let i=0;i<3;i++){
        const ox = Math.sin(t*0.12 + i*2.1) * 7;
        const oy = Math.cos(t*0.10 + i*1.7) * 5;
        ctx.globalAlpha = 0.78;
        ctx.fillStyle = i===0 ? "#ffb14a" : "#ff5a1f";
        ctx.beginPath();
        ctx.arc(sx + ox, sy - 26 + oy, 2.2 + i*0.5, 0, Math.PI*2);
        ctx.fill();
      }
    }
    else if(e.eliteElement === "cold"){
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = "rgba(90,170,255,0.38)";
      ctx.beginPath();
      ctx.arc(sx, sy - 18, 18, 0, Math.PI*2);
      ctx.fill();

      ctx.globalAlpha = 0.85;
      ctx.strokeStyle = "#8fd3ff";
      ctx.lineWidth = 1.8;
      for(let i=0;i<3;i++){
        const ox = Math.sin(t*0.10 + i*2.4) * 8;
        const oy = Math.cos(t*0.08 + i*1.9) * 4;
        ctx.beginPath();
        ctx.moveTo(sx + ox - 3, sy - 24 + oy);
        ctx.lineTo(sx + ox + 3, sy - 24 + oy);
        ctx.moveTo(sx + ox, sy - 27 + oy);
        ctx.lineTo(sx + ox, sy - 21 + oy);
        ctx.stroke();
      }
    }
    else if(e.eliteElement === "lightning"){
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = "rgba(255,220,60,0.35)";
      ctx.beginPath();
      ctx.arc(sx, sy - 18, 18, 0, Math.PI*2);
      ctx.fill();

      ctx.globalAlpha = 0.90;
      ctx.strokeStyle = "#ffd84a";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx - 7, sy - 31);
      ctx.lineTo(sx - 1, sy - 22);
      ctx.lineTo(sx - 4, sy - 22);
      ctx.lineTo(sx + 5, sy - 10);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(sx + 6, sy - 28);
      ctx.lineTo(sx + 1, sy - 20);
      ctx.lineTo(sx + 4, sy - 20);
      ctx.lineTo(sx - 3, sy - 11);
      ctx.stroke();
    }

    ctx.restore();
  }

  if(typeof drawIsoEnemySprite === "function"){
    const __origDrawIsoEnemySprite = drawIsoEnemySprite;
    drawIsoEnemySprite = function(sx, sy, e){
      __origDrawIsoEnemySprite(sx, sy, e);
      try{
        __drawEliteElementVfx(sx, sy, e);
      }catch(err){}
    };
  }

  // м†БмЭі мЭілѓЄ м°імЮђнХШлКФ к≤љмЪ∞лПД л≥ік∞Х
  try{
    if(Array.isArray(enemies)){
      for(const e of enemies){
        if(e && e.isElite) __ensureEliteElement(e);
      }
    }
  }catch(_){}

})();

(function(){
  if(window.__RUNE_MEDAL_ORB_PATCH__) return;
  window.__RUNE_MEDAL_ORB_PATCH__ = true;

  const ORBS = [
    { id:"orbTransmute", key:"transmuteOrbs", label:"мІДнЩФ", style:"blue" },
    { id:"orbAlter", key:"alterationOrbs", label:"л≥АнЩФ", style:"blue" },
    { id:"orbAug", key:"augmentationOrbs", label:"нЩХмЮ•", style:"blue" },

    { id:"chaosBtn", key:"chaosOrbs", label:"мєімШ§мК§", style:"gold" },
    { id:"orbScour", key:"scouringOrbs", label:"м†Хм†Ь", style:"white" },
    { id:"orbExalt", key:"exaltedOrbs", label:"мЧСмЮШ", style:"gold" },
    { id:"orbAnnul", key:"annulOrbs", label:"мЖМл©Є", style:"deepblue" },
    { id:"orbDivine", key:"divineOrbs", label:"мЛ†мД±", style:"gold" },
    { id:"orbCorrupt", key:"corruptOrbs", label:"нГАлЭљ", style:"red" }
  ];

  function getCount(varName){
    try{
      switch(varName){
        case "transmuteOrbs":   return (typeof transmuteOrbs   === "number") ? transmuteOrbs   : 0;
        case "alterationOrbs":  return (typeof alterationOrbs  === "number") ? alterationOrbs  : 0;
        case "augmentationOrbs":return (typeof augmentationOrbs=== "number") ? augmentationOrbs: 0;
        case "regalOrbs":       return (typeof regalOrbs       === "number") ? regalOrbs       : 0;
        case "alchemyOrbs":     return (typeof alchemyOrbs     === "number") ? alchemyOrbs     : 0;
        case "chaosOrbs":       return (typeof chaosOrbs       === "number") ? chaosOrbs       : 0;
        case "scouringOrbs":    return (typeof scouringOrbs    === "number") ? scouringOrbs    : 0;
        case "exaltedOrbs":     return (typeof exaltedOrbs     === "number") ? exaltedOrbs     : 0;
        case "annulOrbs":       return (typeof annulOrbs       === "number") ? annulOrbs       : 0;
        case "divineOrbs":      return (typeof divineOrbs      === "number") ? divineOrbs      : 0;
        case "corruptOrbs":     return (typeof corruptOrbs     === "number") ? corruptOrbs     : 0;
        default: return 0;
      }
    }catch(_){
      return 0;
    }
  }

  function applySkin(){
    const counts = document.getElementById("orbCounts");
    if(counts){
      counts.innerHTML = "";
      counts.style.display = "none";
    }

    for(const o of ORBS){
      const el = document.getElementById(o.id);
      if(!el) continue;

      const count = getCount(o.key);

      const oldSkin = el.querySelector(".orbMedalSkin");
      if(oldSkin) oldSkin.remove();

      el.className = (el.className || "")
        .replace(/\bstyle-[\w-]+\b/g, "")
        .replace(/\bisZero\b/g, "")
        .trim();
      el.classList.add("style-" + o.style);
      if(count <= 0) el.classList.add("isZero");

      el.textContent = "";

      const skin = document.createElement("div");
      skin.className = "orbMedalSkin";
      skin.innerHTML = `
        <div class="orbCountBadge">${count}</div>
        <div class="orbRibbon"></div>
        <div class="orbMedal"></div>
        <div class="orbLabel">${o.label}</div>
      `;
      el.appendChild(skin);
      el.title = o.label;
      el.setAttribute("aria-label", o.label + " " + count);
    }
  }

  if(typeof renderCraftPanel === "function"){
    const oldRenderCraftPanel = renderCraftPanel;
    renderCraftPanel = function(){
      oldRenderCraftPanel();
      applySkin();
    };
  }

  if(typeof renderAllPanels === "function"){
    const oldRenderAllPanels = renderAllPanels;
    renderAllPanels = function(){
      oldRenderAllPanels();
      applySkin();
    };
  }

  const boot = ()=>{ try{ applySkin(); }catch(_){} };
  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot, { once:true });
  setTimeout(boot, 0);
  setTimeout(boot, 120);
})();
</script>



<!-- ===== Weapon affix cleanup + DPS display fix ===== -->
<script>
(function(){
  if(window.__WEAPON_AFFIX_CLEANUP_DPSFIX_V1__) return;
  window.__WEAPON_AFFIX_CLEANUP_DPSFIX_V1__ = true;

  function arr(v){ return Array.isArray(v) ? v : []; }
  function num(v, d=0){ v = Number(v); return Number.isFinite(v) ? v : d; }

  // 1) Remove unwanted weapon affixes from current pools
  try{
    if(typeof AFFIX_DB === 'object' && AFFIX_DB){
      const banStatsPrefix = new Set(['armorAdd','hpRegen']);
      const banStatsSuffix = new Set(['fireResAdd','coldResAdd','lightResAdd','chaosResAdd']);
      const hasBannedStat = (a, bannedSet) => {
        if(!a) return false;
        if(bannedSet.has(String(a.stat || ''))) return true;
        if(Array.isArray(a.mods)){
          for(const m of a.mods){
            if(m && bannedSet.has(String(m.stat || ''))) return true;
          }
        }
        return false;
      };
      AFFIX_DB.prefix = arr(AFFIX_DB.prefix).filter(a => !hasBannedStat(a, banStatsPrefix));
      AFFIX_DB.suffix = arr(AFFIX_DB.suffix).filter(a => !hasBannedStat(a, banStatsSuffix));
    }
  }catch(err){ console.warn('weapon affix cleanup failed', err); }

  // 2) Robust DPS display for item info / crafting info
  function sumModsByStat(it){
    const out = Object.create(null);
    const add = (stat, value) => {
      if(!stat) return;
      out[stat] = (out[stat] || 0) + num(value, 0);
    };

    const aff = arr(it && it.affixes);
    for(const roll of aff){
      if(!roll || !roll.affix) continue;
      const rv = num(roll.value, 0);
      const affix = roll.affix;
      if(Array.isArray(affix.mods) && affix.mods.length){
        for(const spec of affix.mods){
          if(!spec) continue;
          const scale = (typeof spec.scale === 'number') ? spec.scale : 1;
          add(spec.stat, rv * scale);
        }
      }else if(affix.stat){
        add(affix.stat, rv);
      }
    }

    const td = (it && (it.totalData || it.data)) || {};
    const known = [
      'dmgMul','dmgInc','dmgMore','flatDamage','flatDamageAdd',
      'atkSpdMul','atkSpdInc','atkSpdMore',
      'critChanceAdd','critChanceInc','critChanceMore',
      'critMultiAdd','critMultiInc','critMultiMore',
      'rangeMul','rangeInc','rangeMore',
      'fireFlat','coldFlat','lightningFlat','chaosFlat',
      'fireMul','coldMul','lightMul','chaosMul','spellMul'
    ];
    for(const k of known){
      if(typeof td[k] === 'number') add(k, td[k]);
    }
    return out;
  }

  window.__weaponAffixTotals = function(it){
    const s = sumModsByStat(it);
    return {
      dmgPct: num(s.dmgInc,0),
      flat: num(s.flatDamageAdd,0) + num(s.flatDamage,0),
      atkSpd: num(s.atkSpdInc,0),
      critChance: num(s.critChanceAdd,0) + num(s.critChanceInc,0),
      critMulti: num(s.critMultiAdd,0) + num(s.critMultiInc,0),
      range: num(s.rangeInc,0),
      fire: num(s.fireFlat,0),
      cold: num(s.coldFlat,0),
      lightning: num(s.lightningFlat,0),
      _raw: s
    };
  };

  window.getWeaponDisplayStats = function(it){
    if(!it || it.slot !== 'weapon') return null;
    const s = sumModsByStat(it);
    const baseMin = num(it?.baseMin, num(player?.weapon?.min, 14));
    const baseMax = num(it?.baseMax, num(player?.weapon?.max, 20));
    const baseData = (it && it.baseData) || {};

    let min = Math.max(1, baseMin);
    let max = Math.max(min, baseMax);

    // base weapon multipliers
    min *= num(baseData.dmgMul, 1);
    max *= num(baseData.dmgMul, 1);

    // item damage multipliers/increases
    min *= num(s.dmgMul, 1);
    max *= num(s.dmgMul, 1);
    min *= (1 + num(s.dmgInc, 0) / 100);
    max *= (1 + num(s.dmgInc, 0) / 100);
    min *= num(s.dmgMore, 1);
    max *= num(s.dmgMore, 1);

    // flat physical + visible elemental flats
    const flatPhys = num(s.flatDamageAdd,0) + num(s.flatDamage,0);
    const fireFlat = num(s.fireFlat,0);
    const coldFlat = num(s.coldFlat,0);
    const lightningFlat = num(s.lightningFlat,0);
    const elemFlat = fireFlat + coldFlat + lightningFlat;
    min += flatPhys + elemFlat;
    max += flatPhys + elemFlat;

    min = Math.max(1, Math.floor(min));
    max = Math.max(min, Math.floor(max));

    // attack speed shown as attacks per second style multiplier
    let atkMul = num(baseData.spdMul, 1);
    atkMul *= num(s.atkSpdMul, 1);
    atkMul *= (1 + num(s.atkSpdInc, 0) / 100);
    atkMul *= num(s.atkSpdMore, 1);
    atkMul = Math.max(0.1, atkMul);

    const avg = (min + max) / 2;
    const dps = avg * atkMul;

    return {
      min, max, atkMul, dps,
      flatPhys,
      fireFlat,
      coldFlat,
      lightningFlat,
      dmgPct: num(s.dmgInc,0),
      critChance: num(s.critChanceAdd,0) + num(s.critChanceInc,0),
      critMulti: num(s.critMultiAdd,0) + num(s.critMultiInc,0),
      rangePct: num(s.rangeInc,0),
      dmgMul: num(s.dmgMul,1),
      dmgMore: num(s.dmgMore,1),
      atkSpdInc: num(s.atkSpdInc,0),
      atkSpdMulStat: num(s.atkSpdMul,1),
      atkSpdMore: num(s.atkSpdMore,1)
    };
  };
})();
</script>

(function(){
  if(window.__ACTIVE_SKILL_ITEM_SEPARATION_PATCH__) return;
  window.__ACTIVE_SKILL_ITEM_SEPARATION_PATCH__ = true;

  function __num(v, d){
    v = Number(v);

  }

  function __weaponBaseRange(){

      min: __num(player && player.weapon && player.weapon.min, 14),

  }

  function __combinedStats(it){
    const td = Object.assign({}, (it && (it.totalData || it.data)) || {});
    const affs = Array.isArray(it && it.affixes) ? it.affixes : [];
    for(const a of affs){
      if(!a || !Array.isArray(a.mods)) continue;
      for(const m of a.mods){

        const k = String(m.stat);

  function __computeWeaponOnlyPreview(it){
    const base = __weaponBaseRange();

    const dmgMul = Math.max(0.01,
      __num(td.dmgMul, 1) *

    );

    atkMul = Math.max(0.25, atkMul * (1 + __num(td.atkSpdInc,0) / 100) * __num(td.atkSpdMore,1));

    const min = Math.max(1, Math.floor(base.min * dmgMul + flatTotal));
    const max = Math.max(min, Math.floor(base.max * dmgMul + flatTotal));
    const avg = (min + max) / 2;

  }

  window.registerActiveSkillPreview = function(def){
    window.__activeSkillPreviewRegistry = window.__activeSkillPreviewRegistry || {};

  window.setCurrentActiveSkill = function(defOrId){

  registerActiveSkillPreview({

  if(!window.__currentActiveSkillPreview) setCurrentActiveSkill('attack');

  function __computeCurrentSkillPreview(){
    const sk = window.__currentActiveSkillPreview || { id:'attack', name:'кЄ∞л≥Є к≥µк≤©', damageScalar:1, flatBonus:0, speedScalar:1, critChanceBonus:0, critMultiBonus:0 };
    const equipped = (typeof equipment === 'object' && equipment && equipment.weapon) ? equipment.weapon : null;
    const w = __computeWeaponOnlyPreview(equipped);

    const scalar = Math.max(0.01, __num(sk.damageScalar, 1));
    const flatBonus = __num(sk.flatBonus, 0);
    const globalDmg = Math.max(0.01,
      __num(gear.dmgMul, 1) *
      (1 + __num(gear.dmgInc, 0)) *

    );

    const min = Math.max(1, Math.floor((w.min + flatBonus) * scalar * globalDmg));
    const max = Math.max(min, Math.floor((w.max + flatBonus) * scalar * globalDmg));

    const critChance = Math.max(0, ((__num((typeof getCritChance === 'function') ? getCritChance() : 0.05, 0.05) + __num(sk.critChanceBonus, 0)) * 100));
    const critMulti = Math.max(1, __num((typeof getCritMulti === 'function') ? getCritMulti() : 1.5, 1.5) + __num(sk.critMultiBonus, 0));
    const atkSpeed = Math.max(0.25, __num(gear.atkSpdMul, 1) * Math.max(0.01, __num(sk.speedScalar, 1)));

    return {
      name: sk.name || 'кЄ∞л≥Є к≥µк≤©',
      min, max,
      critChance,
      critMultiPct: (critMulti - 1) * 100,
      speed: atkSpeed

  if(typeof getWeaponDisplayStats === 'function'){
    window.getWeaponDisplayStats = function(it){

  if(typeof prettyItemHTML === 'function'){

          .replace(/>к≥µк≤©л†•:/g, '>лђікЄ∞ к≥µк≤©л†•:');

      return html;

  function __prependCombatBlock(){

      const top = [

        `к≥µк≤© мЖНлПД: ${pv.speed.toFixed(2)}`
      ].join('\n');
      specTextEl.textContent = `${top}\n\n[кЄ∞м°і мЇРл¶≠нД∞ м†Хл≥і]\n${rest}`;
    }catch(err){
      console.warn('spec combat block patch failed', err);

  if(typeof renderEquipPanel === 'function'){

  window.GameHooks = window.GameHooks || {};

<script>
(function(){
  if(window.__SUPPORT_GEM_RUNTIME_PATCH__) return;
  window.__SUPPORT_GEM_RUNTIME_PATCH__ = true;

  function num(v, d){ v = Number(v); return Number.isFinite(v) ? v : (d||0); }
  function avgWeaponDamage(){
    const w = (player && player.weapon) ? player.weapon : { min:14, max:20 };
    return (num(w.min,14) + num(w.max,20)) * 0.5;
  }
  function ensureChargeState(){
    if(!player) return;
    const st = (typeof getChargeState === 'function')
      ? getChargeState()
      : (player.chargeState || (player.chargeState = { frenzy:0, frenzyMax:5, frenzyLastGainFrame:0, endurance:0, enduranceMax:5, enduranceLastGainFrame:0, enduranceLastHitFrame:0 }));
    if(typeof st.frenzy !== 'number') st.frenzy = 0;
    if(typeof st.frenzyMax !== 'number') st.frenzyMax = 5;
    if(typeof st.endurance !== 'number') st.endurance = 0;
    if(typeof st.enduranceMax !== 'number') st.enduranceMax = 5;
    if(typeof st.frenzyLastGainFrame !== 'number') st.frenzyLastGainFrame = 0;
    if(typeof st.enduranceLastGainFrame !== 'number') st.enduranceLastGainFrame = 0;
    if(typeof st.enduranceLastHitFrame !== 'number') st.enduranceLastHitFrame = 0;

    // legacy aliases kept in sync for older UI/patch code
    player.frenzyCharges = st.frenzy;
    player.frenzyChargeMax = st.frenzyMax;
    player.frenzyLastGainFrame = st.frenzyLastGainFrame;
    player.enduranceCharges = st.endurance;
    player.enduranceChargeMax = st.enduranceMax;
    player.enduranceLastGainFrame = st.enduranceLastGainFrame;
    player.enduranceLastHitFrame = st.enduranceLastHitFrame;
    return st;
  }
  ensureChargeState();

  function getLinkedSpellId(){
    const links = player && player.skillLinks ? player.skillLinks : null;
    const supports = links && Array.isArray(links.supports) ? links.supports : [];
    for(const sid of supports){
      const sk = window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[sid];
      if(sk && sk.source === 'spell') return sid;
    }
    return null;
  }

  function getApplicableSupportsForSkill(skill){
    const links = player && player.skillLinks ? player.skillLinks : null;
    const supports = links && Array.isArray(links.supports) ? links.supports : [];
    const out = [];
    for(const sid of supports){
      const def = window.__getSupportGem && window.__getSupportGem(sid);
      if(def && (!window.__supportAppliesToSkill || window.__supportAppliesToSkill(sid, skill))) out.push(def);
    }
    return out;
  }
  window.getApplicableSupportsForSkill = getApplicableSupportsForSkill;

  function hasSupport(list, id){ return Array.isArray(list) && list.some(v => v && v.id === id); }


  function applyCommonSupportOnHit(skill, dealt){
    if(!player || !skill) return;
    dealt = num(dealt, 0);
    if(!(dealt > 0)) return;
    const supports = getApplicableSupportsForSkill(skill);
    if(!supports || !supports.length) return;

    if(hasSupport(supports, 'lifeLeechSupport')){
      player.hp = Math.min(player.maxHp || player.hp || 0, (player.hp || 0) + dealt * 0.08);
    }

    if(hasSupport(supports, 'frenzyChargeOnHitSupport') && Math.random() < 0.20){
      ensureChargeState();
      const cs = player.chargeState || getChargeState();
      cs.frenzyMax = Math.max(cs.frenzyMax || 5, 5);
      cs.frenzy = Math.min(cs.frenzyMax || 5, (cs.frenzy || 0) + 1);
      cs.frenzyLastGainFrame = (typeof frameCount === 'number') ? frameCount : 0;
      player.frenzyCharges = cs.frenzy;
      player.frenzyChargeMax = cs.frenzyMax;
      player.frenzyLastGainFrame = cs.frenzyLastGainFrame;
    }

    if(hasSupport(supports, 'enduranceChargeOnHitSupport') && Math.random() < 0.25){
      ensureChargeState();
      const cs = player.chargeState || getChargeState();
      cs.enduranceMax = Math.max(cs.enduranceMax || 5, 5);
      cs.endurance = Math.min(cs.enduranceMax || 5, (cs.endurance || 0) + 1);
      cs.enduranceLastGainFrame = (typeof frameCount === 'number') ? frameCount : 0;
      cs.enduranceLastHitFrame = cs.enduranceLastGainFrame;
      player.enduranceCharges = cs.endurance;
      player.enduranceChargeMax = cs.enduranceMax;
      player.enduranceLastGainFrame = cs.enduranceLastGainFrame;
      player.enduranceLastHitFrame = cs.enduranceLastHitFrame;
    }
  }
  window.applyCommonSupportOnHit = applyCommonSupportOnHit;

  function getModifiedSkill(skill){
    if(!skill) return skill;
    ensureChargeState();
    const mod = Object.assign({}, skill);
    const supports = getApplicableSupportsForSkill(skill);
    const frenzy = Math.max(0, num(player && player.chargeState && player.chargeState.frenzy, 0));
    if(frenzy > 0){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) / (1 + frenzy * 0.05);
      mod.baseMul = num(mod.baseMul, 1) * (1 + frenzy * 0.04);
    }
    if(hasSupport(supports, 'meleePhysicalDamageSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 1.18;
    }
    if(hasSupport(supports, 'increasedAreaMeleeSupport')){
      if(mod.radius) mod.radius = Math.round(num(mod.radius, 0) * 1.35);
      if(mod.angleDeg) mod.angleDeg = Math.round(num(mod.angleDeg, 0) * 1.15);
      if(mod.splashRadius) mod.splashRadius = Math.round(num(mod.splashRadius, 0) * 1.25);
      if(mod.explodeRadius) mod.explodeRadius = Math.round(num(mod.explodeRadius, 0) * 1.18);
    }
    if(hasSupport(supports, 'fasterAttacksSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 0.82;
    }
    if(hasSupport(supports, 'fasterCastingSupport')){
      mod.useTimeRatio = num(mod.useTimeRatio, 1) * 0.82;
    }
    if(hasSupport(supports, 'greaterMultipleProjectilesSupport')){
      mod.projectileCount = num(mod.projectileCount, 1) + 4;
      if(mod.projectileSpreadDeg) mod.projectileSpreadDeg = num(mod.projectileSpreadDeg, 0) + 18;
    }
    return mod;
  }
  window.getModifiedActiveSkill = getModifiedSkill;

  const oldCritChance = typeof window.getCritChance === 'function' ? window.getCritChance : null;
  if(oldCritChance){
    window.getCritChance = function(){
      let out = oldCritChance.apply(this, arguments);
      const act = window.__supportActionState;
      if(act && Array.isArray(act.supports)){
        if(hasSupport(act.supports, 'increasedCriticalStrikesSupport')) out += 0.12;
        if(hasSupport(act.supports, 'controlledDestructionSupport')) out *= 0.20;
      }
      return Math.max(0, out);
    };
  }
  const oldCritMulti = typeof window.getCritMulti === 'function' ? window.getCritMulti : null;
  if(oldCritMulti){
    window.getCritMulti = function(){
      let out = oldCritMulti.apply(this, arguments);
      const act = window.__supportActionState;
      if(act && Array.isArray(act.supports) && hasSupport(act.supports, 'increasedCriticalDamageSupport')) out += 0.60;
      return out;
    };
  }

  const oldPlayerTaken = typeof window.applyPlayerTakenDamageMods === 'function' ? window.applyPlayerTakenDamageMods : null;
  if(oldPlayerTaken){
    window.applyPlayerTakenDamageMods = function(incoming, ctx){
      let out = oldPlayerTaken.call(this, incoming, ctx);
      ensureChargeState();
      const endurance = Math.max(0, num(player && player.chargeState && player.chargeState.endurance, 0));
      if(endurance > 0) out *= Math.max(0.4, 1 - endurance * 0.04);
      return out;
    };
  }

  const oldCompute = window.computeFinalDamage;
  if(typeof oldCompute === 'function'){
    window.computeFinalDamage = function(base, ctx, opt){
      const res = oldCompute.call(this, base, ctx, opt);
      const act = window.__supportActionState;
      if(!act || !ctx) return res;
      const supports = act.supports || [];
      const enemy = ctx.enemy;
      let pkt = makeDamagePacket(
        res.afterOutgoingPacket?.phys||0,
        res.afterOutgoingPacket?.fire||0,
        res.afterOutgoingPacket?.cold||0,
        res.afterOutgoingPacket?.lightning||0,
        res.afterOutgoingPacket?.chaos||0
      );
      const skill = act.skill || null;
      const tags = Array.isArray(ctx.tags) ? ctx.tags : [];
      const isAttack = tags.includes('attack');
      const isSpell = tags.includes('spell');
      const isMelee = tags.includes('melee');
      const weaponAvg = avgWeaponDamage();

      if(hasSupport(supports, 'meleePhysicalDamageSupport') && isMelee) pkt.phys *= 1.45;
      if(hasSupport(supports, 'addedFireDamageSupport')) pkt.fire += weaponAvg * 0.28;
      if(hasSupport(supports, 'addedColdDamageSupport')) pkt.cold += weaponAvg * 0.28;
      if(hasSupport(supports, 'addedLightningDamageSupport')) pkt.lightning += weaponAvg * 0.28;
      if(hasSupport(supports, 'spellbladeSupport') && isSpell) pkt.phys += weaponAvg * 0.60;
      if(hasSupport(supports, 'controlledDestructionSupport') && isSpell) pkt = scaleDamagePacket(pkt, 1.40);
      if(hasSupport(supports, 'elementalDamageWithAttacksSupport') && isAttack){
        pkt.fire *= 1.35; pkt.cold *= 1.35; pkt.lightning *= 1.35;
      }
      if(hasSupport(supports, 'brutalitySupport')){
        pkt.phys *= 1.50;
        pkt.fire = 0; pkt.cold = 0; pkt.lightning = 0; pkt.chaos = 0;
      }
      if(hasSupport(supports, 'multistrikeSupport')) pkt = scaleDamagePacket(pkt, 0.80);
      if(hasSupport(supports, 'greaterMultipleProjectilesSupport') && tags.includes('projectile')) pkt = scaleDamagePacket(pkt, 0.65);
      if(hasSupport(supports, 'castOnCriticalSupport')) pkt = scaleDamagePacket(pkt, 0.75);
      if(hasSupport(supports, 'ruthlessSupport') && act.ruthlessProc) pkt = scaleDamagePacket(pkt, 2.00);

      let afterCrit = pkt;
      if(res.crit && res.crit.isCrit){
        afterCrit = scaleDamagePacket(pkt, res.crit.multi || 1);
      }
      let dealtPkt = applyEnemyTakenDamageModsPacket(afterCrit, ctx);
      dealtPkt = applyEnemyResistsPacket(dealtPkt, enemy);
      res.afterOutgoingPacket = pkt;
      res.afterOutgoing = sumDamagePacket(pkt);
      res.dealtPacket = dealtPkt;
      res.dealt = sumDamagePacket(dealtPkt);
      res.crit = Object.assign({}, res.crit, { dmg: res.crit && res.crit.isCrit ? res.afterOutgoing * (res.crit.multi||1) : res.afterOutgoing });

      if(enemy && hasSupport(supports, 'cullingStrikeSupport') && enemy.hp > 0 && enemy.maxHp > 0){
        if(enemy.hp <= enemy.maxHp * 0.10) res.dealt = Math.max(res.dealt, enemy.hp + 1);
      }

      if(res.dealt > 0){
        if(hasSupport(supports, 'castOnCriticalSupport') && res.crit && res.crit.isCrit && !window.__supportTriggeringSpell){
          const linkedSpellId = getLinkedSpellId();
          const linkedSkill = linkedSpellId && window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[linkedSpellId];
          if(linkedSkill && linkedSkill.source === 'spell'){
            window.__supportTriggeringSpell = true;
            setTimeout(function(){
              try{
                const links = player && player.skillLinks ? player.skillLinks : null;
                if(!links) return;
                const prev = links.active;
                links.active = linkedSpellId;
                window.__supportExtraCast = true;
                const fn = window.__supportBaseUseActiveSkill || window.useActiveSkill;
                if(typeof fn === 'function') fn();
                links.active = prev;
              }catch(err){ console.warn('cast on crit trigger failed', err); }
              window.__supportExtraCast = false;
              window.__supportTriggeringSpell = false;
            }, 0);
          }
        }
      }
      return res;
    };
  }

  const oldUse = window.useActiveSkill;
  if(typeof oldUse === 'function'){
    window.__supportBaseUseActiveSkill = oldUse;
    const ruthlessCounter = {};
    window.useActiveSkill = function(){
      const activeId = player && player.skillLinks ? player.skillLinks.active : null;
      const origSkill = activeId && window.ACTIVE_SKILLS ? window.ACTIVE_SKILLS[activeId] : null;
      if(!origSkill) return oldUse.apply(this, arguments);
      const modSkill = getModifiedSkill(origSkill);
      const supports = getApplicableSupportsForSkill(origSkill);
      const firstCall = !window.__supportExtraAttack && !window.__supportExtraCast;
      if(firstCall){
        ruthlessCounter[origSkill.id] = (ruthlessCounter[origSkill.id] || 0) + 1;
      }
      const actionState = {
        skillId: origSkill.id,
        skill: modSkill,
        supports,
        ruthlessProc: hasSupport(supports, 'ruthlessSupport') && ((ruthlessCounter[origSkill.id] || 0) % 3 === 0)
      };
      window.__supportActionState = actionState;
      let out;
      const prev = window.ACTIVE_SKILLS[activeId];
      window.ACTIVE_SKILLS[activeId] = modSkill;
      try{
        out = oldUse.apply(this, arguments);
      } finally {
        window.ACTIVE_SKILLS[activeId] = prev;
        window.__supportActionState = null;
      }

      if(firstCall && !window.__supportTriggeringSpell){
        if(hasSupport(supports, 'multistrikeSupport') && Array.isArray(origSkill.tags) && origSkill.tags.includes('attack') && origSkill.id !== 'whirlwind'){
          [90, 180].forEach(function(delay){
            setTimeout(function(){
              try{ window.__supportExtraAttack = true; oldUse.call(window); }catch(err){ console.warn('multistrike failed', err); } finally { window.__supportExtraAttack = false; }
            }, delay);
          });
        }
        if(hasSupport(supports, 'spellEchoSupport') && origSkill.source === 'spell'){
          setTimeout(function(){
            try{ window.__supportExtraCast = true; oldUse.call(window); }catch(err){ console.warn('spell echo failed', err); } finally { window.__supportExtraCast = false; }
          }, 110);
        }
      }
      return out;
    };
  }

  if(typeof update === 'function' && !window.__SUPPORT_GEM_UPDATE_WRAP__){
    const oldUpdate = update;
    update = function(){
      ensureChargeState();
      if(typeof frameCount === 'number' && player && player.chargeState){
        const cs = player.chargeState;
        if((cs.frenzy || 0) > 0 && frameCount - (cs.frenzyLastGainFrame || 0) > 240){
          cs.frenzy = 0;
          player.frenzyCharges = 0;
        }
        if((cs.endurance || 0) > 0 && frameCount - (cs.enduranceLastGainFrame || 0) > 360){
          cs.endurance = 0;
          player.enduranceCharges = 0;
        }
      }
      return oldUpdate.apply(this, arguments);
    };
    window.__SUPPORT_GEM_UPDATE_WRAP__ = true;
  }
})();

<script>
(function(){
  if(window.__SUPPORT_GEM_PREVIEW_FIX_V2__) return;
  window.__SUPPORT_GEM_PREVIEW_FIX_V2__ = true;

  function num(v,d){ v = Number(v); return Number.isFinite(v) ? v : (d||0); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  function getEquippedWeapon(){
    if(typeof equipment !== 'undefined' && equipment && equipment.weapon) return equipment.weapon;
    return null;
  }

  function getBaseWeaponStats(){
    let min = num(player && player.weapon && player.weapon.min, 14);
    let max = num(player && player.weapon && player.weapon.max, 20);
    let atk = Math.max(0.1, num(player && player.weapon && player.weapon.attackSpeed, 1));
    try{
      const ew = getEquippedWeapon();
      if(ew && typeof getWeaponDisplayStats === 'function'){
        const ws = getWeaponDisplayStats(ew);
        if(ws){
          if(Number.isFinite(Number(ws.min))) min = Number(ws.min);
          if(Number.isFinite(Number(ws.max))) max = Number(ws.max);
          if(Number.isFinite(Number(ws.atkMul))) atk = Math.max(0.1, Number(ws.atkMul));
        }
      }
    }catch(_e){}
    return { min, max, atk, avg:(min+max)*0.5, dps:((min+max)*0.5)*atk };
  }

  function getActiveSkillPreviewData(){
    const links = (player && player.skillLinks) ? player.skillLinks : { active:'attack', supports:[] };
    const activeId = links.active || 'attack';
    const skill = (window.ACTIVE_SKILLS && window.ACTIVE_SKILLS[activeId]) || { id:'attack', name:'кЄ∞л≥Є к≥µк≤©', source:'weapon', tags:['attack','melee','physical'], baseMul:1 };
    const supports = (typeof getApplicableSupportsForSkill === 'function') ? getApplicableSupportsForSkill(skill) : [];
    const supportIds = supports.map(s=>s.id);
    const weapon = getBaseWeaponStats();
    let min = weapon.min, max = weapon.max;
    let speed = weapon.atk;
    let critChance = (typeof getCritChance === 'function') ? getCritChance() : 0.05;
    let critMulti = (typeof getCritMulti === 'function') ? getCritMulti() : 1.5;

    const tags = Array.isArray(skill.tags) ? skill.tags : [];
    const isAttack = tags.includes('attack');
    const isSpell = skill.source === 'spell' || tags.includes('spell');
    const isMelee = tags.includes('melee');
    const isProjectile = tags.includes('projectile');

    const baseMul = Math.max(0.01, num(skill.baseMul, 1));
    min *= baseMul; max *= baseMul;

    if(skill.cooldownSec > 0){
      speed = 1 / Math.max(0.05, num(skill.cooldownSec, 0));
    }
    if(skill.useTimeRatio){
      speed *= 1 / Math.max(0.05, num(skill.useTimeRatio, 1));
    }
    if(skill.hitInterval){
      speed *= 60 / Math.max(1, num(skill.hitInterval, 60));
    }

    if(supportIds.includes('meleePhysicalDamageSupport') && isMelee){ min *= 1.45; max *= 1.45; speed *= 0.85; }
    if(supportIds.includes('multistrikeSupport') && isAttack && isMelee){ min *= 0.80*3; max *= 0.80*3; speed *= 1.20; }
    if(supportIds.includes('increasedCriticalStrikesSupport')) critChance += 0.12;
    if(supportIds.includes('increasedCriticalDamageSupport')) critMulti += 0.60;
    if(supportIds.includes('addedFireDamageSupport')){ min += weapon.avg*0.28; max += weapon.avg*0.28; }
    if(supportIds.includes('addedColdDamageSupport')){ min += weapon.avg*0.28; max += weapon.avg*0.28; }
    if(supportIds.includes('addedLightningDamageSupport')){ min += weapon.avg*0.28; max += weapon.avg*0.28; }
    if(supportIds.includes('ruthlessSupport') && isMelee){ min *= 1.33; max *= 1.33; }
    if(supportIds.includes('fasterAttacksSupport') && isAttack) speed *= 1.22;
    if(supportIds.includes('elementalDamageWithAttacksSupport') && isAttack){ min *= 1.18; max *= 1.18; }
    if(supportIds.includes('brutalitySupport')){ min *= 1.50; max *= 1.50; }
    if(supportIds.includes('controlledDestructionSupport') && isSpell){ min *= 1.40; max *= 1.40; critChance *= 0.20; }
    if(supportIds.includes('fasterCastingSupport') && isSpell) speed *= 1.22;
    if(supportIds.includes('spellEchoSupport') && isSpell){ min *= 2.0; max *= 2.0; }
    if(supportIds.includes('spellbladeSupport') && isSpell){ min += weapon.avg*0.60; max += weapon.avg*0.60; }
    if(supportIds.includes('castOnCriticalSupport')){ min *= 0.75; max *= 0.75; }
    if(supportIds.includes('greaterMultipleProjectilesSupport') && isProjectile){ min *= 5*0.65; max *= 5*0.65; }

    if(skill.repeats && !supportIds.includes('multistrikeSupport')){ min *= num(skill.repeats,1); max *= num(skill.repeats,1); }
    if(skill.projectileCount && !supportIds.includes('greaterMultipleProjectilesSupport')){ min *= num(skill.projectileCount,1); max *= num(skill.projectileCount,1); }
    if(skill.impacts){ min *= Math.max(1, num(skill.impacts,1)*0.45); max *= Math.max(1, num(skill.impacts,1)*0.45); }

    critChance = clamp(critChance, 0, 0.95);

    const avg = (min + max) * 0.5;
    const critFactor =
      1 + critChance * (Math.max(1, critMulti) - 1);

    let doubleFactor = 1;
    if(skill && skill.extra){
      const ddMin = num(skill.extra.doubleDamageChanceMin, 0);
      const ddMax = num(skill.extra.doubleDamageChanceMax, 0);
      const ddAvg = Math.max(0, (ddMin + ddMax) * 0.5);
      doubleFactor += ddAvg;
    }

    const dps = Math.max(
      0,
      avg * critFactor * doubleFactor * Math.max(0.1, speed)
    );

    return {
      activeId,
      name: skill.name || 'кЄ∞л≥Є к≥µк≤©',
      min: Math.max(1, Math.round(min)),
      max: Math.max(1, Math.round(max)),
      speed: Math.max(0.1, speed),
      critChancePct: critChance * 100,
      critMultiPct: Math.max(1, critMulti) * 100,
      dps: Math.max(0, dps),
      supportIds,
      skill
    };
  }

  window.__getActiveSkillPreviewData = getActiveSkillPreviewData;
  window.getSkillGemBoardDpsText = function(){
    const pv = getActiveSkillPreviewData();
    return 'DPS ' + Math.round(pv.dps).toLocaleString();
  };

  function prependCombatBlockFixed(){
    try{
      if(typeof specTextEl === 'undefined' || !specTextEl) return;
      const base = String(specTextEl.textContent || '').trim();
      const old1='[м†ДнИђ м†Хл≥і]';
      const old2='[кЄ∞м°і мЇРл¶≠нД∞ м†Хл≥і]';
      let rest = base;
      if(rest.startsWith(old1)){
        const idx = rest.indexOf(old2);
        if(idx >= 0) rest = rest.slice(idx + old2.length).trim();
      }
      const pv = getActiveSkillPreviewData();
      const top = [
        '[м†ДнИђ м†Хл≥і]',
        `нШДмЮђ мК§нВђ: ${pv.name}`,
        `мµЬмҐЕ нФЉнХі: ${pv.min} ~ ${pv.max}`,
        `мєШл™ЕнГА нЩХл•†: ${pv.critChancePct.toFixed(1)}%`,
        `мєШл™ЕнГА нФЉнХіл∞∞мЬ®: ${pv.critMultiPct.toFixed(0)}%`,
        `к≥µк≤© мЖНлПД: ${pv.speed.toFixed(2)}`
      ].join('\n');
      specTextEl.textContent = `${top}\n\n[кЄ∞м°і мЇРл¶≠нД∞ м†Хл≥і]\n${rest}`;
    }catch(err){ console.warn('spec combat block fix failed', err); }
  }
  window.__prependCombatBlockFixed = prependCombatBlockFixed;

  if(typeof renderEquipPanel === 'function'){
    const old = renderEquipPanel;
    window.renderEquipPanel = function(){
      const out = old.apply(this, arguments);
      prependCombatBlockFixed();
      return out;
    };
  }
  const oldAfter = (window.GameHooks && window.GameHooks.afterRenderPanels) || null;
  window.GameHooks = window.GameHooks || {};
  window.GameHooks.afterRenderPanels = function(){
    try{ if(typeof oldAfter === 'function') oldAfter(); }catch(_){ }
    prependCombatBlockFixed();
  };

  if(typeof renderSkillGemUI === 'function'){
    const oldRender = renderSkillGemUI;
    window.renderSkillGemUI = function(){
      const out = oldRender.apply(this, arguments);
      try{
        const el = document.getElementById('skillGemBoardDps');
        if(el) el.textContent = window.getSkillGemBoardDpsText();
      }catch(_){ }
      return out;
    };
  }

  if(typeof setActiveSkill === 'function'){
    const oldSet = setActiveSkill;
    window.setActiveSkill = function(id){
      const out = oldSet.apply(this, arguments);
      try{ prependCombatBlockFixed(); }catch(_){ }
      return out;
    };
  }
  if(typeof toggleSupportSocket === 'function'){
    const oldToggle = toggleSupportSocket;
    window.toggleSupportSocket = function(id){
      const out = oldToggle.apply(this, arguments);
      try{ prependCombatBlockFixed(); }catch(_){ }
      return out;
    };
  }
})();

// ===============================
// вЬЕ Weapon stat full-connect patch
// - elemental weapon multipliers (fire/cold/light/chaos)
// - spell multiplier passthrough for spell-tagged skills
// - runtime gear rebuild includes extended multiplier keys
// ===============================
(function(){
  if(window.__WEAPON_STAT_FULL_CONNECT_PATCH_V1__) return;
  window.__WEAPON_STAT_FULL_CONNECT_PATCH_V1__ = true;

  function __num(v, d){
    v = Number(v);
    return Number.isFinite(v) ? v : d;
  }

  function __newExtendedGearState(){
    const base = (typeof defaultBuffStats === 'function') ? defaultBuffStats() : {};
    return Object.assign(base, {
      flatDamageAdd: __num(base.flatDamageAdd, 0),
      lifeLeech: __num(base.lifeLeech, 0),
      hpOnHit: __num(base.hpOnHit, 0),
      hpOnKill: __num(base.hpOnKill, 0),
      bleedChance: __num(base.bleedChance, 0),
      knockbackChance: __num(base.knockbackChance, 0),
      cleaveChance: __num(base.cleaveChance, 0),
      doubleHitChance: __num(base.doubleHitChance, 0),
      executeChance: __num(base.executeChance, 0),
      critChanceVsBoss: __num(base.critChanceVsBoss, 0),
      bossDamageMul: __num(base.bossDamageMul, 1),
      eliteDamageMul: __num(base.eliteDamageMul, 1),
      fireResAdd: __num(base.fireResAdd, 0),
      coldResAdd: __num(base.coldResAdd, 0),
      lightResAdd: __num(base.lightResAdd, 0),
      chaosResAdd: __num(base.chaosResAdd, 0),
      allResAdd: __num(base.allResAdd, 0),
      fireMul: __num(base.fireMul, 1),
      coldMul: __num(base.coldMul, 1),
      lightMul: __num(base.lightMul, 1),
      chaosMul: __num(base.chaosMul, 1),
      spellMul: __num(base.spellMul, 1)
    });
  }

  function __mergeGearStat(dst, stat, value){
    const v = __num(value, 0);
    if(!Number.isFinite(v)) return;
    if(stat === 'flatDamage') stat = 'flatDamageAdd';

    switch(stat){
      case 'dmgMul':
      case 'atkSpdMul':
      case 'spdMul':
      case 'rangeMul':
      case 'bossDamageMul':
      case 'eliteDamageMul':
      case 'critChanceMore':
      case 'critMultiMore':
      case 'dmgMore':
      case 'atkSpdMore':
      case 'rangeMore':
      case 'fireMul':
      case 'coldMul':
      case 'lightMul':
      case 'chaosMul':
      case 'spellMul':
        dst[stat] = __num(dst[stat], 1) * (v || 1);
        break;
      default:
        dst[stat] = __num(dst[stat], 0) + v;
        break;
    }
  }

  function __collectItemInto(dst, it){
    if(!it) return;
    const d = it.totalData || it.data || {};
    const imps = Array.isArray(it.implicits) ? it.implicits : [];
    const keys = [
      'armorAdd','maxHpAdd','hpRegen',
      'dmgMul','dmgInc','dmgMore',
      'atkSpdMul','atkSpdInc','atkSpdMore',
      'spdMul','spdInc','spdMore',
      'rangeMul','rangeInc','rangeMore',
      'flatDamage','flatDamageAdd',
      'critChanceAdd','critChanceInc','critChanceMore',
      'critMultiAdd','critMultiInc','critMultiMore',
      'lifeLeech','hpOnHit','hpOnKill',
      'bleedChance','knockbackChance','cleaveChance','doubleHitChance','executeChance',
      'critChanceVsBoss','bossDamageMul','eliteDamageMul',
      'fireResAdd','coldResAdd','lightResAdd','chaosResAdd','allResAdd',
      'fireMul','coldMul','lightMul','chaosMul','spellMul'
    ];

    for(const k of keys){
      if(typeof d[k] === 'number') __mergeGearStat(dst, k, d[k]);
    }
    for(const imp of imps){
      if(!imp || !imp.stat || typeof imp.value !== 'number') continue;
      __mergeGearStat(dst, imp.stat, imp.value);
    }
  }

  function __rebuildExtendedWeaponStats(){
    const gear = __newExtendedGearState();
    try{
      if(typeof equipment === 'object' && equipment){
        for(const slot of Object.keys(equipment)) __collectItemInto(gear, equipment[slot]);
      }
    }catch(err){
      console.warn('extended gear rebuild failed', err);
    }

    gear.dmgMul    = __num(gear.dmgMul, 1)    * (1 + __num(gear.dmgInc, 0))    * __num(gear.dmgMore, 1);
    gear.atkSpdMul = __num(gear.atkSpdMul, 1) * (1 + __num(gear.atkSpdInc, 0)) * __num(gear.atkSpdMore, 1);
    gear.spdMul    = __num(gear.spdMul, 1)    * (1 + __num(gear.spdInc, 0))    * __num(gear.spdMore, 1);
    gear.rangeMul  = __num(gear.rangeMul, 1)  * (1 + __num(gear.rangeInc, 0))  * __num(gear.rangeMore, 1);

    player.gear = Object.assign(__newExtendedGearState(), player.gear || {}, gear);
    player.gear.flatDamage = player.gear.flatDamageAdd || 0;
    if(!player.buffs) player.buffs = (typeof defaultBuffStats === 'function') ? defaultBuffStats() : {};
    player.buffs.dmgMul = __num(player.gear.dmgMul, 1);
    player.buffs.atkSpdMul = __num(player.gear.atkSpdMul, 1);
    player.buffs.spdMul = __num(player.gear.spdMul, 1);
    player.buffs.rangeMul = __num(player.gear.rangeMul, 1);
  }

  if(typeof recalcFromGear === 'function' && !window.__WEAPON_STAT_FULL_CONNECT_RECALC_WRAP__){
    const __origRecalc = recalcFromGear;
    recalcFromGear = function(){
      const out = __origRecalc.apply(this, arguments);
      __rebuildExtendedWeaponStats();
      if(typeof __rebuildPlayerResists === 'function'){
        try{ __rebuildPlayerResists(); }catch(_e){}
      }
      return out;
    };
    window.__WEAPON_STAT_FULL_CONNECT_RECALC_WRAP__ = true;
  }

  if(typeof computeFinalDamage === 'function' && !window.__WEAPON_STAT_FULL_CONNECT_DAMAGE_WRAP__){
    const __origCFD = computeFinalDamage;
    computeFinalDamage = function(base, ctx, opt){
      const g = player && player.gear ? player.gear : {};
      const tags = Array.isArray(ctx && ctx.tags) ? ctx.tags : [];
      let baseArg = base;

      const hasElemBonus = (
        __num(g.fireMul, 1) !== 1 ||
        __num(g.coldMul, 1) !== 1 ||
        __num(g.lightMul, 1) !== 1 ||
        __num(g.chaosMul, 1) !== 1 ||
        (tags.includes('spell') && __num(g.spellMul, 1) !== 1)
      );

      if(hasElemBonus && typeof makeDamagePacket === 'function' && typeof sumDamagePacket === 'function' && typeof scaleDamagePacket === 'function'){
        let pkt;
        if(base && typeof base === 'object' && ('phys' in base || 'fire' in base || 'cold' in base || 'lightning' in base || 'chaos' in base)){
          pkt = makeDamagePacket(base.phys||0, base.fire||0, base.cold||0, base.lightning||0, base.chaos||0);
        }else if(typeof baseToDamagePacket === 'function'){
          pkt = baseToDamagePacket(base, ctx);
        }else{
          pkt = makeDamagePacket(__num(base, 0), 0, 0, 0, 0);
        }

        const rawBase = Math.max(0, sumDamagePacket(pkt));
        pkt.fire = (pkt.fire || 0) + rawBase * Math.max(0, __num(g.fireMul, 1) - 1);
        pkt.cold = (pkt.cold || 0) + rawBase * Math.max(0, __num(g.coldMul, 1) - 1);
        pkt.lightning = (pkt.lightning || 0) + rawBase * Math.max(0, __num(g.lightMul, 1) - 1);
        pkt.chaos = (pkt.chaos || 0) + rawBase * Math.max(0, __num(g.chaosMul, 1) - 1);

        if(tags.includes('spell') && __num(g.spellMul, 1) !== 1){
          pkt = scaleDamagePacket(pkt, __num(g.spellMul, 1));
        }
        baseArg = pkt;
      }

      return __origCFD.call(this, baseArg, ctx, opt);
    };
    window.__WEAPON_STAT_FULL_CONNECT_DAMAGE_WRAP__ = true;
  }

  try{
    if(typeof recalcFromGear === 'function') recalcFromGear();
  }catch(err){
    console.warn('weapon stat full-connect init failed', err);
  }
})();

</script>

/* =========================================================

(function(){
  if(window.__WEAPON_POE_KR_OVERHAUL_V1__) return;
  window.__WEAPON_POE_KR_OVERHAUL_V1__ = true;
  if(typeof AFFIX_DB === 'undefined') return;

  function ensureArr(v){ return Array.isArray(v) ? v : []; }
  function addWeaponReq(a){
    a.requiresAll = Array.from(new Set([...(a.requiresAll||[]), 'weapon']));

  function mkTiers(rows){ return rows.map((r, i)=>({ t: 6 - i, minIlvl:r[2], min:r[0], max:r[1] })); }

  function hasWallBetween(x1,y1,x2,y2){
    const steps = Math.ceil(Math.hypot(x2-x1,y2-y1) / 16);
    for(let i=1;i<steps;i++){
      const t = i / steps;
      const x = x1 + (x2-x1) * t;
      const y = y1 + (y2-y1) * t;
      const tx = Math.floor(x / tileSize);
      const ty = Math.floor(y / tileSize);
      if(!map[ty] || map[ty][tx] === 1) return true;
    }
    return false;
  }

  function findNearestVisibleEnemy(range){
    let best = null;
    let bestDist = Infinity;

    for(const e of enemies){
      if(!e || e.hp <= 0) continue;

      const dx = e.x - player.x;
      const dy = e.y - player.y;
      const d = Math.hypot(dx, dy);

      if(d > range) continue;
      if(hasWallBetween(player.x, player.y, e.x, e.y)) continue;

      if(d < bestDist){
        bestDist = d;
        best = e;
      }
    }
    return best;
  }

  function getSpellAim(range){

    if(target){
      const dx = target.x - player.x;
      const dy = target.y - player.y;

      return {
        x: dx / len,
        y: dy / len,
        angle: Math.atan2(dy, dx)
      };
    }

    return getAimUnit();
  }

    function distancePointToSegment(px, py, x1, y1, x2, y2){
    const vx = x2 - x1;
    const vy = y2 - y1;
    const wx = px - x1;
    const wy = py - y1;

    const c1 = vx * wx + vy * wy;
    if(c1 <= 0) return Math.hypot(px - x1, py - y1);

    const c2 = vx * vx + vy * vy;
    if(c2 <= c1) return Math.hypot(px - x2, py - y2);

    const b = c1 / c2;
    const bx = x1 + b * vx;
    const by = y1 + b * vy;
    return Math.hypot(px - bx, py - by);
  }

  function isWallAtWorld(x, y){
    const tx = Math.floor(x / tileSize);
    const ty = Math.floor(y / tileSize);
    if(!map[ty]) return true;
    return map[ty][tx] === 1;
  }

  function projectileTouchesWall(prevX, prevY, nextX, nextY, radius){
    const steps = Math.max(2, Math.ceil(Math.hypot(nextX - prevX, nextY - prevY) / 6));
    for(let i = 0; i <= steps; i++){
      const t = i / steps;
      const sx = prevX + (nextX - prevX) * t;
      const sy = prevY + (nextY - prevY) * t;

      if(isWallAtWorld(sx, sy)) return { hit:true, x:sx, y:sy };

      // л∞ШмІАл¶Д л≥ім†Х
      if(isWallAtWorld(sx + radius, sy)) return { hit:true, x:sx + radius, y:sy };
      if(isWallAtWorld(sx - radius, sy)) return { hit:true, x:sx - radius, y:sy };
      if(isWallAtWorld(sx, sy + radius)) return { hit:true, x:sx, y:sy + radius };
      if(isWallAtWorld(sx, sy - radius)) return { hit:true, x:sx, y:sy - radius };
    }
    return { hit:false, x:nextX, y:nextY };
  }

  function updateSkillProjectiles(){
    if(!window.skillProjectiles || !skillProjectiles.length) return;

    for(let i = skillProjectiles.length - 1; i >= 0; i--){
      const p = skillProjectiles[i];

      const prevX = p.x;
      const prevY = p.y;
      const nextX = p.x + p.dx * (p.speed || 1);
      const nextY = p.y + p.dy * (p.speed || 1);

      p.life--;

      // 1) л≤љ мґ©лПМ: к≤љл°Ь м†Дм≤і к≤АмВђ
      const wallHit = projectileTouchesWall(prevX, prevY, nextX, nextY, p.radius || 8);
      if(wallHit.hit){
        p.x = wallHit.x;
        p.y = wallHit.y;

        if(p.kind === "fireball" || p.kind === "moltenShard"){
          explodeSkillProjectile(p);
        }

        skillProjectiles.splice(i,1);
        continue;
      }

      // мЪ∞мД† мЭілПЩ л∞ШмШБ
      p.x = nextX;
      p.y = nextY;

      // 2) м†Б мґ©лПМ: м†РмЭі мХДлЛИлЭЉ "мЭілПЩ к≤љл°Ь мД†лґД"мЬЉл°Ь к≤АмВђ
      let hitEnemy = null;

      for(const e of enemies){
        if(!e || e.hp <= 0) continue;

        const er = (typeof getEnemyRadius === "function") ? getEnemyRadius(e) : (e.radius || 14);
        const hitDist = distancePointToSegment(e.x, e.y, prevX, prevY, nextX, nextY);

        if(hitDist <= (p.radius || 8) + er){
          hitEnemy = e;
          break;
        }
      }

      if(hitEnemy){
        if(p.kind === "fireball" || p.kind === "moltenShard"){
          // м†Б мЬДмєШмЧРмДЬ нД∞мІАк≤М
          p.x = hitEnemy.x;
          p.y = hitEnemy.y;
          explodeSkillProjectile(p);
        }else{
          const fakeSkill = { id: p.kind || "projectile", tags: p.tags || [] };
          const ctx = buildCombatCtx(fakeSkill.id, hitEnemy);
          ctx.tags = mergeTags(ctx.tags || [], fakeSkill.tags || []);
          const result = computeFinalDamage(p.damage, ctx);

          if(typeof damageEnemyDirect === "function"){
            damageEnemyDirect(hitEnemy, result.dealt);
          }else{
            hitEnemy.hp -= result.dealt;
          }
        }

        skillProjectiles.splice(i,1);
        continue;
      }

      if(p.life <= 0){
        skillProjectiles.splice(i,1);
      }
    }
  }

  function drawSkillProjectiles(){
    if(!window.skillProjectiles || !skillProjectiles.length) return;

  }
