<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>POE Mobile - Clean Core/UI Split (Landscape)</title>
<style>
  html,body{height:100%;margin:0;overflow:hidden;background:#0b0b0e;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
  #app{position:fixed;inset:0;}
  canvas{position:absolute;inset:0;display:block;background:#0f0f14;}

  /* ===== HUD ===== */
  #hud{position:absolute;inset:0;pointer-events:none;}
  #lifeOrb{
    position:absolute;top:18px;left:18px;
    width:150px;height:150px;border-radius:50%;
    background:transparent;
    border:3px solid rgba(240,240,255,0.14);
    box-shadow:0 12px 30px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.75);
    overflow:hidden;
    z-index:5;
  }
  #lifeOrb canvas{position:absolute;inset:0;width:100%;height:100%;}
  #lifeOrb .frame{
    position:absolute;inset:0;border-radius:50%;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), rgba(255,255,255,0.02) 40%, rgba(0,0,0,0.0) 60%),
      radial-gradient(circle at 50% 70%, rgba(0,0,0,0.35), rgba(0,0,0,0.0) 55%);
    mix-blend-mode:screen; opacity:0.9;
  }
  #lifeOrb .label{
    position:absolute;left:50%;top:22%;
    transform:translateX(-50%);
    font-size:12px;color:rgba(210,210,225,0.78);
    letter-spacing:0.9px;text-shadow:0 2px 10px rgba(0,0,0,0.85);
  }
  #lifeOrb .nums{
    position:absolute;left:50%;top:58%;
    transform:translate(-50%,-50%);
    font-weight:900;font-size:18px;color:rgba(240,240,250,0.92);
    text-shadow:0 2px 10px rgba(0,0,0,0.85);
    text-align:center;line-height:1.05;
  }

  #minimap{
    position:absolute;top:18px;right:18px;
    width:150px;height:150px;border-radius:50%;
    background:transparent;
    border:3px solid rgba(240,240,255,0.14);
    box-shadow:0 12px 30px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.75);
    overflow:hidden;
    z-index:5;
  }
  #minimap canvas{position:absolute;inset:0;width:100%;height:100%;}
  #minimap .ring{
    position:absolute;inset:10px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.10);
  }

  /* Touch controls */
  #touchUI{position:absolute;inset:0;pointer-events:none;}
  .joyBase{
    position:absolute;left:28px;bottom:28px;
    width:190px;height:190px;border-radius:50%;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.14);
    display:none;
    z-index:6;
  }
  .joyKnob{
    position:absolute;left:50%;top:50%;
    width:82px;height:82px;border-radius:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
  }

  .atkBtn{
    position:absolute;right:26px;bottom:22px;
    width:124px;height:124px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,210,130,0.40), rgba(255,140,40,0.30) 45%, rgba(160,45,0,0.25));
    border:2px solid rgba(255,170,80,0.35);
    box-shadow:0 10px 26px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.55);
    display:none;
    align-items:center;justify-content:center;
    color:rgba(255,245,235,0.92);
    font-weight:900;
    text-shadow:0 1px 0 rgba(0,0,0,0.35);
    pointer-events:auto;
    touch-action:none;
    z-index:6;
  }
  .skillBtn{
    position:absolute;
    width:78px;height:78px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(160,210,255,0.35), rgba(70,140,240,0.22) 55%, rgba(0,60,140,0.18));
    border:1px solid rgba(180,220,255,0.22);
    box-shadow:0 10px 24px rgba(0,0,0,0.52), inset 0 0 16px rgba(0,0,0,0.55);
    display:none;
    align-items:center;justify-content:center;
    color:rgba(235,245,255,0.86);
    font-weight:900;
    text-shadow:0 1px 0 rgba(0,0,0,0.35);
    pointer-events:auto;
    touch-action:none;
    z-index:6;
  }
  .atkBtn:active,.skillBtn:active{transform:scale(0.98)}
  /* Around attack */
  #skill1{ right: 132px; bottom: 144px; } /* upper-left */
  #skill2{ right: 176px; bottom: 64px; }  /* left */
  #skill3{ right: 112px; bottom: 206px; } /* top */

  @media (pointer:coarse){
    .joyBase,.atkBtn,.skillBtn{display:flex;}
  }

  /* Landscape-only gate */
  #rotateGate{
    position:absolute;inset:0;
    background:radial-gradient(circle at 50% 20%, rgba(255,255,255,0.06), rgba(0,0,0,0.92) 55%);
    display:none;
    align-items:center;justify-content:center;
    z-index:9999;
    pointer-events:auto;
    touch-action:none;
  }
  #rotateCard{
    width:min(420px, 86vw);
    background:rgba(12,12,18,0.65);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:16px;
    box-shadow:0 18px 45px rgba(0,0,0,0.75), inset 0 0 18px rgba(0,0,0,0.65);
    padding:18px 16px;
    text-align:center;
    color:rgba(240,240,250,0.92);
  }
  #rotateIcon{
    width:72px;height:72px;margin:2px auto 12px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.06);
    display:flex;align-items:center;justify-content:center;
    font-size:34px;
  }
  #rotateTitle{font-weight:900;font-size:18px;margin:0 0 6px;}
  #rotateDesc{margin:0 0 14px;color:rgba(210,210,225,0.78);font-size:13px;line-height:1.35;}
  #rotateBtn{
    appearance:none;border:none;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
    color:rgba(240,240,250,0.92);
    font-weight:800;
    padding:10px 12px;
    border-radius:12px;
    width:100%;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="lifeOrb">
      <canvas id="lifeCanvas" width="150" height="150"></canvas>
      <div class="frame"></div>
      <div class="label">LIFE</div>
      <div class="nums" id="lifeNums">0<br><span style="font-size:12px;font-weight:800;opacity:.85">/ 0</span></div>
    </div>

    <div id="minimap">
      <canvas id="minimapCanvas" width="150" height="150"></canvas>
      <div class="ring"></div>
    </div>
  </div>

  <div id="touchUI">
    <div class="joyBase" id="joyBase"><div class="joyKnob" id="joyKnob"></div></div>
    <div class="atkBtn" id="atkBtn">ATK</div>
    <div class="skillBtn" id="skill1">1</div>
    <div class="skillBtn" id="skill2">2</div>
    <div class="skillBtn" id="skill3">3</div>
  </div>

  <div id="rotateGate">
    <div id="rotateCard">
      <div id="rotateIcon">📱↻</div>
      <p id="rotateTitle">가로 화면으로 플레이</p>
      <p id="rotateDesc">이 게임 UI는 가로(landscape) 전용이야.<br>휴대폰을 가로로 돌려줘.</p>
      <button id="rotateBtn">가로로 전환 시도</button>
    </div>
  </div>
</div>

<script>
/* =========================
   0) Utils (pure)
========================= */
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function mulberry32(a){ return function(){ let t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; } }
function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }

/* =========================
   1) Core (NO DOM)
========================= */
const Core = (() => {
  function makeEntity({kind, x, y, r, speed=0, hp=1, mass=1}){
    return { id: uid(), kind, x, y, r, vx:0, vy:0, speed, hp, mass };
  }
  function makeSpatialHash(cellSize){ return { cellSize, buckets: new Map() }; }
  function hashKey(ix, iy){ return (ix<<16) ^ (iy & 0xffff); }
  function shClear(sh){ sh.buckets.clear(); }
  function shInsert(sh, e){
    const cs = sh.cellSize;
    const ix = Math.floor(e.x / cs), iy = Math.floor(e.y / cs);
    const key = hashKey(ix,iy);
    let arr = sh.buckets.get(key);
    if(!arr){ arr=[]; sh.buckets.set(key, arr); }
    arr.push(e);
  }
  function shQueryNeighbors(sh, e){
    const cs = sh.cellSize;
    const ix = Math.floor(e.x / cs), iy = Math.floor(e.y / cs);
    const out = [];
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
      const arr = sh.buckets.get(hashKey(ix+dx, iy+dy));
      if(arr) out.push(...arr);
    }
    return out;
  }
  function tryMoveEntity(state, e, dx, dy){
    const minX = e.r, minY = e.r;
    const maxX = state.map.w - e.r, maxY = state.map.h - e.r;
    e.x = clamp(e.x + dx, minX, maxX);
    e.y = clamp(e.y + dy, minY, maxY);
  }

  const Soft = { iterations: 3, skin: 0.18, stiffness: 14.0, maxPush: 0.22 };
  function resolveSoftOverlaps(state, dt){
    const sh = state.spatial, ents = state.entities;
    for(let it=0; it<Soft.iterations; it++){
      shClear(sh); for(const e of ents) shInsert(sh, e);
      let movedAny = false;
      for(const e of ents){
        const neighbors = shQueryNeighbors(sh, e);
        for(const o of neighbors){
          if(o === e) continue;
          if(o.id <= e.id) continue;
          let dx = o.x - e.x, dy = o.y - e.y;
          let dist = Math.hypot(dx,dy);
          const desired = (e.r + o.r) - Soft.skin;

          if(dist === 0){
            const a = ((parseInt(e.id.slice(-4),16) ^ parseInt(o.id.slice(-4),16)) % 360) * Math.PI/180;
            dx = Math.cos(a) * 1e-4; dy = Math.sin(a) * 1e-4;
            dist = Math.hypot(dx,dy);
          }
          if(dist < desired){
            const overlap = desired - dist;
            const nx = dx / dist, ny = dy / dist;
            const invA = 1 / Math.max(0.0001, e.mass);
            const invB = 1 / Math.max(0.0001, o.mass);
            const invSum = invA + invB;

            let push = overlap * Soft.stiffness * dt;
            push = Math.max(push, overlap * 0.15);
            push = Math.min(push, Soft.maxPush);

            const pushA = push * (invA / invSum);
            const pushB = push * (invB / invSum);

            tryMoveEntity(state, e, -nx * pushA, -ny * pushA);
            tryMoveEntity(state, o,  nx * pushB,  ny * pushB);
            movedAny = true;
          }
        }
      }
      if(!movedAny) break;
    }
  }

  // Public state (read-only getter)
  const state = {
    seed: 0,
    rnd: null,
    time: 0,
    map: { w: 120, h: 120, tw: 64, th: 32 },
    player: {
      ent: null,
      base: { life: 100, speed: 6.0, movePct: 0 },
      res: { life: 100 }, // current
      max: { life: 100 }, // computed later (equipment 등)
    },
    entities: [],
    spatial: makeSpatialHash(2.0),
    input: { mx:0, my:0 },  // movement vector -1..1
    events: [],             // UI->core events (attack/skill)
  };

  function init(seed){
    state.seed = seed >>> 0;
    state.rnd = mulberry32(state.seed);
    state.entities.length = 0;
    state.events.length = 0;

    state.player.ent = makeEntity({ kind:"player", x:60, y:60, r:0.45, speed:state.player.base.speed, hp:100, mass:3.0 });
    state.entities.push(state.player.ent);

    // spawn monsters
    for(let i=0;i<34;i++){
      const a = state.rnd()*Math.PI*2;
      const rad = 2.0 + state.rnd()*1.6;
      const x = state.player.ent.x + Math.cos(a)*rad + (state.rnd()-0.5)*0.3;
      const y = state.player.ent.y + Math.sin(a)*rad + (state.rnd()-0.5)*0.3;
      const r = 0.38 + state.rnd()*0.08;
      state.entities.push(makeEntity({ kind:"monster", x, y, r, speed: 2.2 + state.rnd()*0.7, hp:20, mass:1.0 }));
    }
    state.player.max.life = state.player.base.life;
    state.player.res.life = state.player.max.life;

    resolveSoftOverlaps(state, 0.016);
  }

  function pushEvent(type, payload={}){
    state.events.push({ type, payload, t: state.time });
  }

  function step(dt){
    state.time += dt;

    // consume events (demo only)
    while(state.events.length){
      const ev = state.events.shift();
      if(ev.type === "attack"){
        // demo: take small self-damage to show orb changing
        state.player.res.life = Math.max(0, state.player.res.life - 1);
      }
      if(ev.type === "skill"){
        state.player.res.life = Math.max(0, state.player.res.life - 2);
      }
    }

    // player movement
    const p = state.player.ent;
    const mx = state.input.mx, my = state.input.my;
    if(mx || my){
      const L = Math.hypot(mx,my) || 1;
      const ux = mx / L, uy = my / L;
      const spd = state.player.base.speed * (1 + state.player.base.movePct/100);
      p.vx = ux * spd;
      p.vy = uy * spd;
    }else{
      p.vx = 0; p.vy = 0;
    }

    // monsters chase
    for(const e of state.entities){
      if(e.kind !== "monster") continue;
      const dx = p.x - e.x, dy = p.y - e.y;
      const d = Math.hypot(dx,dy);
      if(d > 0.001){
        e.vx = (dx/d) * e.speed;
        e.vy = (dy/d) * e.speed;
      }else{
        e.vx = 0; e.vy = 0;
      }
    }

    // integrate
    for(const e of state.entities){
      tryMoveEntity(state, e, e.vx * dt, e.vy * dt);
    }
    resolveSoftOverlaps(state, dt);
  }

  function getState(){ return state; }

  return { init, step, getState, pushEvent };
})();

/* =========================
   2) Renderer (Canvas only)
========================= */
const Renderer = (() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);

  function isoWithCamera(wx, wy, camX, camY, TW, TH){
    const sx = (wx - wy) * (TW/2);
    const sy = (wx + wy) * (TH/2);
    const csx = (camX - camY) * (TW/2);
    const csy = (camX + camY) * (TH/2);
    return { x: (sx - csx) + canvas.width/2, y: (sy - csy) + canvas.height/2 };
  }

  function draw(state){
    const TW = state.map.tw, TH = state.map.th;
    const p = state.player.ent;
    const camX = p.x, camY = p.y;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const R = Math.ceil(
  Math.max(canvas.width / TW, canvas.height / TH)
) + 6;
  const minX = 0;
const maxX = state.map.w - 1;
const minY = 0;
const maxY = state.map.h - 1;
    for(let y=minY;y<=maxY;y++){
      for(let x=minX;x<=maxX;x++){
        const pos = isoWithCamera(x,y,camX,camY,TW,TH);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineTo(pos.x + TW/2, pos.y + TH/2);
        ctx.lineTo(pos.x, pos.y + TH);
        ctx.lineTo(pos.x - TW/2, pos.y + TH/2);
        ctx.closePath();
        ctx.fillStyle = ((x+y)&1) ? "#1f1f27" : "#262631";
        ctx.fill();
      }
    }

    const drawList = state.entities.slice().sort((a,b)=> (a.x+a.y) - (b.x+b.y));
    for(const e of drawList){
      const pos = isoWithCamera(e.x, e.y, camX, camY, TW, TH);
      if(e.kind === "player"){
        ctx.fillStyle = "#ff3b3b";
        ctx.beginPath(); ctx.arc(pos.x, pos.y + TH/2, 12, 0, Math.PI*2); ctx.fill();
      }else{
        ctx.fillStyle = "#55aaff";
        ctx.beginPath(); ctx.arc(pos.x, pos.y + TH/2, 10, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  resize();
  return { draw };
})();

/* =========================
   3) HUD (DOM only, reads Core state)
========================= */
const HUD = (() => {
  const lifeCanvas = document.getElementById("lifeCanvas");
  const lifeNums   = document.getElementById("lifeNums");
  const mmCanvas   = document.getElementById("minimapCanvas");

  function setupHiDPI(canvas){
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    const css = canvas.getBoundingClientRect();
    const w = Math.max(1, Math.floor(css.width * dpr));
    const h = Math.max(1, Math.floor(css.height * dpr));
    if(canvas.width !== w || canvas.height !== h){ canvas.width=w; canvas.height=h; }
    return { w, h, dpr };
  }

  function drawLife(cur, max){
    const ctx = lifeCanvas.getContext("2d");
    const {w,h} = setupHiDPI(lifeCanvas);
    const cx=w/2, cy=h/2;
    const R=Math.min(w,h)*0.48;

    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
    ctx.fillStyle="rgba(0,0,0,0.58)"; ctx.fillRect(0,0,w,h);

    const pct = max>0 ? clamp(cur/max,0,1) : 0;
    const levelY = cy + R - (2*R*pct);
    ctx.fillStyle="rgba(220,40,40,0.88)";
    ctx.fillRect(cx-R-2, levelY, 2*R+4, (cy+R)-levelY+2);

    ctx.globalAlpha=0.35;
    ctx.beginPath();
    const waveAmp=R*0.05, waveLen=R*0.45;
    const phase = (performance.now()/1000)*2.4;
    ctx.moveTo(cx-R, levelY);
    for(let x=cx-R; x<=cx+R; x+=R*0.08){
      const t=(x-(cx-R))/waveLen;
      const y=levelY + Math.sin(t*2.8 + phase)*waveAmp;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(cx+R, cy+R); ctx.lineTo(cx-R, cy+R); ctx.closePath();
    ctx.fillStyle="rgba(255,130,130,0.68)";
    ctx.fill();
    ctx.globalAlpha=1.0;

    const grd=ctx.createRadialGradient(cx, cy+R*0.35, R*0.2, cx, cy, R);
    grd.addColorStop(0,"rgba(255,255,255,0.06)");
    grd.addColorStop(0.55,"rgba(0,0,0,0.0)");
    grd.addColorStop(1,"rgba(0,0,0,0.60)");
    ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);
    ctx.restore();

    ctx.strokeStyle="rgba(255,255,255,0.14)";
    ctx.lineWidth=Math.max(1,R*0.06);
    ctx.beginPath(); ctx.arc(cx,cy,R*0.985,0,Math.PI*2); ctx.stroke();

    ctx.strokeStyle="rgba(0,0,0,0.55)";
    ctx.lineWidth=Math.max(1,R*0.025);
    ctx.beginPath(); ctx.arc(cx,cy,R*0.90,0,Math.PI*2); ctx.stroke();

    lifeNums.innerHTML = `${Math.floor(cur)}<br><span style="font-size:12px;font-weight:800;opacity:.85">/ ${Math.floor(max)}</span>`;
  }

  function drawMiniMap(state){
    const ctx = mmCanvas.getContext("2d");
    const {w,h} = setupHiDPI(mmCanvas);
    const cx=w/2, cy=h/2;
    const R=Math.min(w,h)*0.48;

    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
    ctx.fillStyle="rgba(0,0,0,0.55)"; ctx.fillRect(0,0,w,h);

    const scale = R / 18;
    const p = state.player.ent;

    ctx.globalAlpha=0.20;
    ctx.strokeStyle="rgba(255,255,255,0.15)";
    for(let i=-3;i<=3;i++){
      ctx.beginPath(); ctx.moveTo(cx-R, cy+i*R/3); ctx.lineTo(cx+R, cy+i*R/3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+i*R/3, cy-R); ctx.lineTo(cx+i*R/3, cy+R); ctx.stroke();
    }
    ctx.globalAlpha=1.0;

    for(const e of state.entities){
      const dx = e.x - p.x, dy = e.y - p.y;
      if(Math.abs(dx) > 18 || Math.abs(dy) > 18) continue;
      const x = cx + dx*scale, y = cy + dy*scale;
      const rr = (e.kind==="player") ? 4 : 3;
      ctx.fillStyle = (e.kind==="player") ? "rgba(255,80,80,0.95)" : "rgba(90,170,255,0.9)";
      ctx.beginPath(); ctx.arc(x,y,rr,0,Math.PI*2); ctx.fill();
    }

    const grd=ctx.createRadialGradient(cx, cy, R*0.2, cx, cy, R);
    grd.addColorStop(0,"rgba(255,255,255,0.06)");
    grd.addColorStop(0.6,"rgba(0,0,0,0.0)");
    grd.addColorStop(1,"rgba(0,0,0,0.70)");
    ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);

    ctx.restore();
  }

  function render(){
    const st = Core.getState();
    drawLife(st.player.res.life, st.player.max.life);
    drawMiniMap(st);
  }

  window.addEventListener("resize", render);
  return { render };
})();

/* =========================
   4) Controls (DOM -> Core input/events)
========================= */
const Controls = (() => {
  const left = document.getElementById("app");
  const joyBase = document.getElementById("joyBase");
  const joyKnob = document.getElementById("joyKnob");
  const atkBtn = document.getElementById("atkBtn");
  const skillBtns = [
    [document.getElementById("skill1"), 1],
    [document.getElementById("skill2"), 2],
    [document.getElementById("skill3"), 3]
  ];

  const joy = { active:false, id:null, baseX:0, baseY:0, dx:0, dy:0, max:64 };

  function setKnob(px,py){
    joyKnob.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
  }
  function resetJoy(){
    joy.active=false; joy.id=null; joy.dx=0; joy.dy=0;
    setKnob(0,0);
    joyBase.style.display="";
  }
  function findTouchById(list, id){ for(const t of list){ if(t.identifier===id) return t; } return null; }
  function isLandscape(){ return window.matchMedia && window.matchMedia("(orientation: landscape)").matches; }

  left.addEventListener("touchstart", (e)=>{
    if(!isLandscape()) return;
    const rect = left.getBoundingClientRect();
    for(const t of e.changedTouches){
      const x = t.clientX - rect.left;
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if(el && el.closest && el.closest("#atkBtn, .skillBtn")) continue; // don't steal button touches
      if(x > rect.width * 0.55) continue; // left half only

      joy.active=true; joy.id=t.identifier;
      joy.baseX=x; joy.baseY=(t.clientY-rect.top);

      joyBase.style.left=(joy.baseX-95)+"px";
      joyBase.style.top =(joy.baseY-95)+"px";
      joyBase.style.bottom="auto";
      joyBase.style.display="flex";
      setKnob(0,0);

      e.preventDefault();
      return;
    }
  }, {passive:false});

  left.addEventListener("touchmove", (e)=>{
    if(!joy.active) return;
    const rect = left.getBoundingClientRect();
    const t = findTouchById(e.touches, joy.id);
    if(!t) return;
    const x = t.clientX - rect.left;
    const y = t.clientY - rect.top;

    let px = x - joy.baseX;
    let py = y - joy.baseY;
    const dist = Math.hypot(px,py);
    const max = joy.max;
    if(dist > max){ px = px/dist*max; py = py/dist*max; }
    joy.dx = px/max;
    joy.dy = py/max;
    setKnob(px,py);

    e.preventDefault();
  }, {passive:false});

  left.addEventListener("touchend", (e)=>{
    if(!joy.active) return;
    const ended = findTouchById(e.changedTouches, joy.id);
    if(ended){
      resetJoy();
      e.preventDefault();
    }
  }, {passive:false});

  left.addEventListener("touchcancel", ()=>{ if(joy.active) resetJoy(); }, {passive:false});

  atkBtn.addEventListener("touchstart", (e)=>{ if(isLandscape()) Core.pushEvent("attack"); e.preventDefault(); }, {passive:false});
  for(const [btn, idx] of skillBtns){
    btn.addEventListener("touchstart", (e)=>{ if(isLandscape()) Core.pushEvent("skill",{idx}); e.preventDefault(); }, {passive:false});
  }

  function applyToCoreInput(){
    Core.getState().input.mx = joy.dx;
    Core.getState().input.my = joy.dy;
  }

  return { applyToCoreInput };
})();

/* =========================
   5) Landscape gate (DOM)
========================= */
(() => {
  const gate = document.getElementById("rotateGate");
  const btn  = document.getElementById("rotateBtn");
  function isLandscape(){ return window.matchMedia && window.matchMedia("(orientation: landscape)").matches; }
  function update(){ gate.style.display = isLandscape() ? "none" : "flex"; }
  update();
  window.addEventListener("resize", update);
  window.addEventListener("orientationchange", update);
  btn.addEventListener("click", async ()=>{
    try{ if(screen.orientation && screen.orientation.lock){ await screen.orientation.lock("landscape"); } }catch(_){}
    update();
  });
})();

/* =========================
   6) Boot (wiring)
========================= */
const seed = (Date.now() ^ (Math.random()*1e9)) >>> 0;
Core.init(seed);

let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  Controls.applyToCoreInput();
  Core.step(dt);

  Renderer.draw(Core.getState());
  HUD.render();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
