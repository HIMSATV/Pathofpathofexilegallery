<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Iso POE Skeleton - Soft Collision (POE-like)</title>
<style>
  :root { --bg:#0f0f12; --panel:#17171c; --panel2:#1f1f26; --line:#2b2b33; --txt:#e8e8ea; --muted:#a7a7b0; }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden;}
  #wrap{position:fixed;inset:0;display:flex;}
  #left{flex:1;position:relative; touch-action:none;}
  #game{position:absolute;inset:0;display:block;background:#111;}
  #ui{width:360px;max-width:44vw;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;}
  .section{padding:12px 12px 8px;border-bottom:1px solid var(--line);}
  .title{font-size:13px;color:var(--muted);margin:0 0 8px 0;display:flex;justify-content:space-between;gap:10px}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .slot{
    width:76px;height:40px;background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;cursor:pointer;user-select:none;
    padding:4px;box-sizing:border-box;text-align:center;line-height:1.1;
  }
  .slot.empty{color:#7a7a86}
  .slot.sel{outline:2px solid #d6d6ff; outline-offset:1px;}
  .slot.bad{outline:2px solid #ff5a5a; outline-offset:1px;}
  .grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:8px;}
  .small{font-size:12px;color:var(--muted);line-height:1.35;white-space:pre-line}
  #log{height:120px;overflow:auto;background:#101015;border-top:1px solid var(--line);padding:10px;font-size:12px;color:#d2d2d9;}
  #hint{font-size:12px;color:var(--muted);padding:10px 12px;}
  .pill{padding:2px 8px;border:1px solid var(--line);border-radius:999px;background:#121218;font-size:12px;color:var(--muted)}

  /* Mobile joystick overlay */
  #touchUI{position:absolute;inset:0;pointer-events:none;}
  .joyBase{
    position:absolute;left:18px;bottom:18px;
    width:150px;height:150px;border-radius:50%;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    display:none;
  }
  .joyKnob{
    position:absolute;left:50%;top:50%;
    width:68px;height:68px;border-radius:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
  }
    .mobileOnly{display:none;}
  @media (pointer:coarse){
    .joyBase,.atkBtn,.skillBtn{display:flex;}
    #hint .mobileOnly{display:inline;}
  }

  /* ===== POE Mobile HUD (Landscape-only layout) ===== */
  #hud{position:absolute;inset:0;pointer-events:none;}
  #lifeOrb{
    position:absolute;top:18px;left:18px;
    width:150px;height:150px;border-radius:50%;
    background:rgba(0,0,0,0.28);
    border:3px solid rgba(240,240,255,0.14);
    box-shadow:0 12px 30px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.75);
    overflow:hidden;
    z-index:5;
  }
  #lifeOrb .frame{
    position:absolute;inset:0;border-radius:50%;
    background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), rgba(255,255,255,0.02) 40%, rgba(0,0,0,0.0) 60%),
      radial-gradient(circle at 50% 70%, rgba(0,0,0,0.35), rgba(0,0,0,0.0) 55%);
    mix-blend-mode:screen; opacity:0.9;
    pointer-events:none;
  }
  #lifeOrb canvas{position:absolute;inset:0;width:100%;height:100%;}
  #lifeOrb .label{
    position:absolute;left:50%;top:22%;
    transform:translateX(-50%);
    font-size:12px;
    color:rgba(210,210,225,0.78);
    letter-spacing:0.9px;
    text-shadow:0 2px 10px rgba(0,0,0,0.85);
  }
  #lifeOrb .nums{
    position:absolute;left:50%;top:58%;
    transform:translate(-50%,-50%);
    font-weight:900;font-size:18px;
    color:rgba(240,240,250,0.92);
    text-shadow:0 2px 10px rgba(0,0,0,0.85);
    text-align:center;line-height:1.05;
  }

  #minimap{
    position:absolute;top:18px;right:18px;
    width:150px;height:150px;border-radius:50%;
    background:rgba(0,0,0,0.28);
    border:3px solid rgba(240,240,255,0.14);
    box-shadow:0 12px 30px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.75);
    overflow:hidden;
    z-index:5;
  }
  #minimap canvas{position:absolute;inset:0;width:100%;height:100%;}
  #minimap .ring{
    position:absolute;inset:10px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.10);
    pointer-events:none;
  }

  /* Attack cluster: main + 3 skills around (touch) */
  .atkBtn{
    position:absolute;right:26px;bottom:22px;
    width:118px;height:118px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,210,130,0.40), rgba(255,140,40,0.30) 45%, rgba(160,45,0,0.25));
    border:2px solid rgba(255,170,80,0.35);
    box-shadow:0 10px 26px rgba(0,0,0,0.55), inset 0 0 18px rgba(0,0,0,0.55);
    display:none;
    align-items:center;justify-content:center;
    color:rgba(255,245,235,0.92);
    font-weight:900;
    text-shadow:0 1px 0 rgba(0,0,0,0.35);
    pointer-events:auto;
    touch-action:none;
    z-index:6;
  }
  .atkBtn:active{transform:scale(0.98)}
  .skillBtn{
    position:absolute;
    width:76px;height:76px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(160,210,255,0.35), rgba(70,140,240,0.22) 55%, rgba(0,60,140,0.18));
    border:1px solid rgba(180,220,255,0.22);
    box-shadow:0 10px 24px rgba(0,0,0,0.52), inset 0 0 16px rgba(0,0,0,0.55);
    display:none;
    align-items:center;justify-content:center;
    color:rgba(235,245,255,0.86);
    font-weight:900;
    text-shadow:0 1px 0 rgba(0,0,0,0.35);
    pointer-events:auto;
    touch-action:none;
    z-index:6;
  }
  .skillBtn:active{transform:scale(0.98)}
  /* Arrange around attack (arc) */
  #skill1{ right: 120px; bottom: 130px; } /* upper-left */
  #skill2{ right: 160px; bottom: 58px; }  /* left */
  #skill3{ right: 98px;  bottom: 184px; } /* top */

  /* Landscape-only gate (portrait block) */
  #rotateGate{
    position:absolute;inset:0;
    background:radial-gradient(circle at 50% 20%, rgba(255,255,255,0.06), rgba(0,0,0,0.92) 55%);
    display:none;
    align-items:center;justify-content:center;
    z-index:9999;
    pointer-events:auto;
    touch-action:none;
  }
  #rotateCard{
    width:min(420px, 86vw);
    background:rgba(12,12,18,0.65);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:16px;
    box-shadow:0 18px 45px rgba(0,0,0,0.75), inset 0 0 18px rgba(0,0,0,0.65);
    padding:18px 16px;
    text-align:center;
  }
  #rotateIcon{
    width:72px;height:72px;margin:2px auto 12px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.06);
    display:flex;align-items:center;justify-content:center;
    font-size:34px;
  }
  #rotateTitle{font-weight:900;font-size:18px;margin:0 0 6px;}
  #rotateDesc{margin:0 0 14px;color:rgba(210,210,225,0.78);font-size:13px;line-height:1.35;}
  #rotateBtn{
    appearance:none;border:none;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
    color:rgba(240,240,250,0.92);
    font-weight:800;
    padding:10px 12px;
    border-radius:12px;
    width:100%;
  }
  #rotateBtn:active{transform:scale(0.99)}

</style>
</head>
<body>
<div id="wrap">
  <div id="left">
    <canvas id="game"></canvas>

    <div id="hud">
      <div id="lifeOrb">
        <canvas id="lifeCanvas" width="150" height="150"></canvas>
        <div class="frame"></div>
        <div class="label">LIFE</div>
        <div class="nums" id="lifeNums">0<br><span style="font-size:12px;font-weight:800;opacity:.85">/ 0</span></div>
      </div>

      <div id="minimap">
        <canvas id="minimapCanvas" width="150" height="150"></canvas>
        <div class="ring"></div>
      </div>
    </div>

    <div id="touchUI">
      <div class="joyBase" id="joyBase"><div class="joyKnob" id="joyKnob"></div></div>
      <div class="atkBtn" id="atkBtn">ATK</div>
      <div class="skillBtn" id="skill1">1</div>
      <div class="skillBtn" id="skill2">2</div>
      <div class="skillBtn" id="skill3">3</div>
    </div>
  
    <div id="rotateGate">
      <div id="rotateCard">
        <div id="rotateIcon">📱↻</div>
        <p id="rotateTitle">가로 화면으로 플레이</p>
        <p id="rotateDesc">이 게임 UI는 가로(landscape) 전용이야.<br>휴대폰을 가로로 돌려줘.</p>
        <button id="rotateBtn">가로로 전환 시도</button>
      </div>
    </div>

  </div>

  <div id="ui">
    <div class="section">
      <div class="title">
        <span>스탯 / 디버그</span>
        <span class="pill" id="seedPill"></span>
      </div>
      <div class="small" id="statsText"></div>
    </div>

    <div class="section">
      <div class="title">
        <span>장비 (Equipment)</span>
        <span class="pill" id="cursorPill">cursor: 없음</span>
      </div>
      <div class="row" id="equipRow"></div>
    </div>

    <div class="section">
      <div class="title"><span>인벤 (Inventory)</span><span class="pill">4×5</span></div>
      <div class="grid" id="invGrid"></div>
    </div>

    <div class="section">
      <div class="title"><span>바닥 (Ground)</span><span class="pill" id="groundCount"></span></div>
      <div class="row" id="groundRow"></div>
    </div>

    <div id="hint">
      이동: WASD/방향키 또는 좌측 조이스틱<span class="mobileOnly"> (모바일)</span><br>
      몬스터: POE 느낌 "소프트 충돌" (약간 겹침 허용 + 부드러운 밀림)<br>
      공격: 우측 ATTACK 버튼(로그)
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
/* ===== Landscape-only gate ===== */
const rotateGate = document.getElementById("rotateGate");
const rotateBtn  = document.getElementById("rotateBtn");
function __isLandscape(){ return window.matchMedia && window.matchMedia("(orientation: landscape)").matches; }
function __updateGate(){ if(!rotateGate) return; rotateGate.style.display = (__isLandscape()) ? "none" : "flex"; }
__updateGate();
window.addEventListener("resize", __updateGate);
window.addEventListener("orientationchange", __updateGate);
if(rotateBtn){
  rotateBtn.addEventListener("click", async ()=>{
    try{ if(screen.orientation && screen.orientation.lock){ await screen.orientation.lock("landscape"); } }catch(_){ }
    __updateGate();
  });
}

function mulberry32(a){ return function(){ let t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; } }
function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

const LOG_MAX = 200;
function log(msg){
  const el = document.getElementById("log");
  const t = new Date();
  const line = `[${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}:${String(t.getSeconds()).padStart(2,"0")}] ${msg}`;
  const div = document.createElement("div");
  div.textContent = line;
  el.appendChild(div);
  while(el.childNodes.length > LOG_MAX) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

function makeItem({name, baseType, slot, rarity="normal", ilvl=1, tags=[], affixes=[]}){
  return { id: uid(), name, baseType, slot, rarity, ilvl, tags, affixes };
}
function makeContainer({kind, size, slotKeys=null, rules}){
  const slots = slotKeys ? Object.fromEntries(slotKeys.map(k => [k, null])) : Array(size).fill(null);
  return { kind, slots, rules };
}
const Rules = {
  any: { canPlace: () => true },
  equipment: { canPlace: (item, _to, key) => (!item) ? true : (item.slot === key) }
};
function getSlot(container, key){ return container.slots[key]; }
function setSlot(container, key, value){ container.slots[key] = value; }
function moveItem(fromC, fromKey, toC, toKey){
  const item = getSlot(fromC, fromKey);
  if(!item) return false;
  if(!toC.rules.canPlace(item, toC, toKey)) return false;
  const dst = getSlot(toC, toKey);
  if(dst && !fromC.rules.canPlace(dst, fromC, fromKey)) return false;
  setSlot(fromC, fromKey, dst || null);
  setSlot(toC, toKey, item);
  return true;
}

function collectModifiersFromItem(item){
  const mods = [];
  if(!item) return mods;
  for(const af of (item.affixes||[])){
    for(const s of (af.stats||[])) mods.push(s);
  }
  return mods;
}
function recomputeStats(state){
  const out = {...state.player.baseStats};
  const eq = state.containers.equipment;
  for(const key of Object.keys(eq.slots)){
    const item = eq.slots[key];
    for(const m of collectModifiersFromItem(item)){
      out[m.k] = (out[m.k] ?? 0) + m.v;
    }
  }
  state.player.stats = out;
}

function makeEntity({kind, x, y, r, speed=0, hp=1, mass=1}){
  return { id: uid(), kind, x, y, r, vx:0, vy:0, speed, hp, mass };
}

function makeSpatialHash(cellSize){
  return { cellSize, buckets: new Map() };
}
function hashKey(ix, iy){ return (ix<<16) ^ (iy & 0xffff); }
function shClear(sh){ sh.buckets.clear(); }
function shInsert(sh, e){
  const cs = sh.cellSize;
  const ix = Math.floor(e.x / cs);
  const iy = Math.floor(e.y / cs);
  const key = hashKey(ix,iy);
  let arr = sh.buckets.get(key);
  if(!arr){ arr = []; sh.buckets.set(key, arr); }
  arr.push(e);
}
function shQueryNeighbors(sh, e){
  const cs = sh.cellSize;
  const ix = Math.floor(e.x / cs);
  const iy = Math.floor(e.y / cs);
  const out = [];
  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){
      const key = hashKey(ix+dx, iy+dy);
      const arr = sh.buckets.get(key);
      if(arr) out.push(...arr);
    }
  }
  return out;
}

function tryMoveEntity(state, e, dx, dy){
  const minX = e.r, minY = e.r;
  const maxX = state.map.w - e.r;
  const maxY = state.map.h - e.r;
  e.x = clamp(e.x + dx, minX, maxX);
  e.y = clamp(e.y + dy, minY, maxY);
}

const Soft = {
  iterations: 3,
  skin: 0.18,
  stiffness: 14.0,
  maxPush: 0.22
};
function resolveSoftOverlaps(state, dt){
  const sh = state.spatial;
  const ents = state.entities;

  for(let it=0; it<Soft.iterations; it++){
    shClear(sh);
    for(const e of ents) shInsert(sh, e);

    let movedAny = false;

    for(const e of ents){
      const neighbors = shQueryNeighbors(sh, e);
      for(const o of neighbors){
        if(o === e) continue;
        if(o.id <= e.id) continue;

        let dx = o.x - e.x;
        let dy = o.y - e.y;
        let dist = Math.hypot(dx,dy);

        const desired = (e.r + o.r) - Soft.skin;
        if(dist === 0){
          const a = ((parseInt(e.id.slice(-4),16) ^ parseInt(o.id.slice(-4),16)) % 360) * Math.PI/180;
          dx = Math.cos(a) * 1e-4;
          dy = Math.sin(a) * 1e-4;
          dist = Math.hypot(dx,dy);
        }

        if(dist < desired){
          const overlap = desired - dist;
          const nx = dx / dist;
          const ny = dy / dist;

          const invA = 1 / Math.max(0.0001, e.mass);
          const invB = 1 / Math.max(0.0001, o.mass);
          const invSum = invA + invB;

          let push = overlap * Soft.stiffness * dt;
          push = Math.max(push, overlap * 0.15);
          push = Math.min(push, Soft.maxPush);

          const pushA = push * (invA / invSum);
          const pushB = push * (invB / invSum);

          tryMoveEntity(state, e, -nx * pushA, -ny * pushA);
          tryMoveEntity(state, o,  nx * pushB,  ny * pushB);

          movedAny = true;
        }
      }
    }

    if(!movedAny) break;
  }
}

const seed = (Date.now() ^ (Math.random()*1e9)) >>> 0;
const rnd = mulberry32(seed);

const state = {
  seed, rnd, time:0,
  map: { w: 120, h: 120, tw: 64, th: 32 },
  player: { x: 60, y: 60, speed: 6.0, baseStats:{life:100, armor:0, dmg:8, move:0}, stats:{}, res:{ life:100 } },
  entities: [],
  spatial: makeSpatialHash(2.0),
  containers: {
    equipment: makeContainer({ kind:"equipment", slotKeys:["weapon","helm","chest","ring"], rules: Rules.equipment }),
    inventory: makeContainer({ kind:"inventory", size: 20, rules: Rules.any }),
    ground:    makeContainer({ kind:"ground",    size: 10, rules: Rules.any })
  },
  cursor: { from:null, key:null }
};

document.getElementById("seedPill").textContent = `seed: ${seed}`;

function aff(stats){ return { stats }; }
setSlot(state.containers.ground, 0, makeItem({ name:"Rusty Sword", baseType:"sword", slot:"weapon", rarity:"magic", ilvl:1, tags:["weapon"], affixes:[ aff([{k:"dmg", v:6}]) ] }));
setSlot(state.containers.ground, 1, makeItem({ name:"Leather Cap", baseType:"helm", slot:"helm", rarity:"magic", ilvl:1, tags:["helm"], affixes:[ aff([{k:"life", v:18}]) ] }));
setSlot(state.containers.ground, 2, makeItem({ name:"Chain Shirt", baseType:"chest", slot:"chest", rarity:"rare",  ilvl:2, tags:["chest"], affixes:[ aff([{k:"armor", v:12}]), aff([{k:"life", v:22}]) ] }));
setSlot(state.containers.ground, 3, makeItem({ name:"Iron Ring", baseType:"ring", slot:"ring", rarity:"magic", ilvl:1, tags:["ring"], affixes:[ aff([{k:"life", v:10}]), aff([{k:"move", v:6}]) ] }));
recomputeStats(state);
state.player.res.life = state.player.stats.life;

// Entities
const playerEnt = makeEntity({kind:"player", x:state.player.x, y:state.player.y, r:0.45, speed: state.player.speed, hp: 100, mass: 3.0});
state.entities.push(playerEnt);

function spawnMonsters(n){
  for(let i=0;i<n;i++){
    const angle = rnd()*Math.PI*2;
    const rad = 2.0 + rnd()*1.6;
    const x = state.player.x + Math.cos(angle)*rad + (rnd()-0.5)*0.3;
    const y = state.player.y + Math.sin(angle)*rad + (rnd()-0.5)*0.3;
    const r = 0.38 + rnd()*0.08;
    state.entities.push(makeEntity({kind:"monster", x, y, r, speed: 2.2 + rnd()*0.7, hp: 20, mass: 1.0}));
  }
}
spawnMonsters(34);
resolveSoftOverlaps(state, 0.016);

function slotLabel(item){
  if(!item) return "";
  const r = item.rarity === "rare" ? "★" : item.rarity === "magic" ? "◆" : "•";
  return `${r} ${item.name}`;
}
function renderContainer(container, el, layout){
  el.innerHTML = "";
  const slots = container.slots;
  const entries = Array.isArray(slots)
    ? slots.map((v,i)=>[i,v])
    : Object.entries(slots).map(([k,v])=>[k,v]);

  for(const [key, item] of entries){
    const s = document.createElement("div");
    s.className = "slot" + (!item ? " empty" : "");
    s.dataset.kind = container.kind;
    s.dataset.key = key;
    s.textContent = item ? slotLabel(item) : (layout?.emptyLabel ? layout.emptyLabel(key) : String(key));
    el.appendChild(s);
  }
}
function getContainerByKind(kind){
  if(kind === "equipment") return state.containers.equipment;
  if(kind === "inventory") return state.containers.inventory;
  if(kind === "ground") return state.containers.ground;
}
function parseKey(container, raw){
  return Array.isArray(container.slots) ? Number(raw) : String(raw);
}
function clearSelection(){
  state.cursor.from = null; state.cursor.key = null;
  document.getElementById("cursorPill").textContent = "cursor: 없음";
}
function setSelection(kind, key){
  state.cursor.from = kind; state.cursor.key = key;
  const fromC = getContainerByKind(kind);
  const item = getSlot(fromC, key);
  document.getElementById("cursorPill").textContent = item ? `cursor: ${item.name}` : "cursor: (빈칸)";
}
function flashBad(kind, key){
  const node = document.querySelector(`.slot[data-kind="${kind}"][data-key="${key}"]`);
  if(!node) return;
  node.classList.add("bad");
  setTimeout(()=>node.classList.remove("bad"), 180);
}
function tryPlaceOrPick(clickedKind, clickedKey){
  const clickedC = getContainerByKind(clickedKind);
  const dstKey = clickedKey;

  if(state.cursor.from === null){
    const item = getSlot(clickedC, dstKey);
    if(item) setSelection(clickedKind, dstKey);
    return;
  }
  if(state.cursor.from === clickedKind && state.cursor.key === dstKey){
    clearSelection(); return;
  }

  const fromC = getContainerByKind(state.cursor.from);
  const ok = moveItem(fromC, state.cursor.key, clickedC, dstKey);
  if(ok){
    const moved = getSlot(clickedC, dstKey);
    log(`이동: ${moved?.name ?? "?"} → ${clickedKind}:${dstKey}`);
    clearSelection();
    recomputeStats(state);
    state.player.res.life = Math.min(state.player.res.life, state.player.stats.life);
  }else{
    flashBad(clickedKind, dstKey);
    log(`불가: ${state.cursor.from}:${state.cursor.key} → ${clickedKind}:${dstKey}`);
  }
}
function refreshUI(){
  renderContainer(state.containers.equipment, document.getElementById("equipRow"), { emptyLabel:(k)=>k.toUpperCase() });
  renderContainer(state.containers.inventory, document.getElementById("invGrid"), { emptyLabel:()=>"+" });
  renderContainer(state.containers.ground, document.getElementById("groundRow"), { emptyLabel:()=>"( )" });

  document.querySelectorAll(".slot").forEach(n=>n.classList.remove("sel"));
  if(state.cursor.from !== null){
    const n = document.querySelector(`.slot[data-kind="${state.cursor.from}"][data-key="${state.cursor.key}"]`);
    if(n) n.classList.add("sel");
  }

  const st = state.player.stats;
  const monsters = state.entities.filter(e=>e.kind==="monster").length;
  document.getElementById("statsText").textContent =
    `생명력: ${st.life}\n방어도: ${st.armor}\n피해: ${st.dmg}\n이동 보너스: ${st.move}%\n\n엔티티: ${state.entities.length} (몬스터 ${monsters})\n\nsoft: skin=${Soft.skin}, k=${Soft.stiffness}, it=${Soft.iterations}`;

  const gc = state.containers.ground.slots.filter(Boolean).length;
  document.getElementById("groundCount").textContent = `${gc}/10`;
}
document.getElementById("ui").addEventListener("click", (e)=>{
  const slot = e.target.closest(".slot");
  if(!slot) return;
  const kind = slot.dataset.kind;
  const c = getContainerByKind(kind);
  const key = parseKey(c, slot.dataset.key);
  tryPlaceOrPick(kind, key);
  refreshUI();
});
refreshUI();

// Joystick
const joy = { active:false, id:null, baseX:0, baseY:0, dx:0, dy:0, max:55 };
const joyBase = document.getElementById("joyBase");
const joyKnob = document.getElementById("joyKnob");
const atkBtn = document.getElementById("atkBtn");
const left = document.getElementById("left");

function setKnob(px,py){ joyKnob.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`; }
function resetJoy(){ joy.active=false; joy.id=null; joy.dx=0; joy.dy=0; setKnob(0,0); joyBase.style.display=""; }
function findTouchById(list, id){ for(const t of list){ if(t.identifier===id) return t; } return null; }
function anyActiveTouchStillDown(ev, id){ return !!findTouchById(ev.touches, id); }

left.addEventListener("touchstart", (e)=>{
  const rect = left.getBoundingClientRect();
  for(const t of e.changedTouches){
    const x = t.clientX - rect.left;
    const targetAtPoint = document.elementFromPoint(t.clientX, t.clientY);
    if(targetAtPoint && targetAtPoint.closest && targetAtPoint.closest("#atkBtn, .skillBtn")) continue;
    if(x > rect.width * 0.6) continue;

    joy.active=true; joy.id=t.identifier; joy.baseX=x; joy.baseY=(t.clientY-rect.top);
    joyBase.style.left = (joy.baseX - 75) + "px";
    joyBase.style.top  = (joy.baseY - 75) + "px";
    joyBase.style.bottom = "auto";
    joyBase.style.display = "flex";
    setKnob(0,0);
    e.preventDefault();
    return;
  }
}, {passive:false});

left.addEventListener("touchmove", (e)=>{
  if(!joy.active) return;
  const rect = left.getBoundingClientRect();
  const t = findTouchById(e.touches, joy.id);
  if(!t) return;

  const x = t.clientX - rect.left;
  const y = t.clientY - rect.top;
  let px = x - joy.baseX;
  let py = y - joy.baseY;

  const dist = Math.hypot(px,py);
  const max = joy.max;
  if(dist > max){ px = px/dist*max; py = py/dist*max; }

  joy.dx = px/max;
  joy.dy = py/max;
  setKnob(px,py);
  e.preventDefault();
}, {passive:false});

left.addEventListener("touchend", (e)=>{
  if(!joy.active) return;
  const ended = findTouchById(e.changedTouches, joy.id);
  if(ended || !anyActiveTouchStillDown(e, joy.id)){
    resetJoy();
    e.preventDefault();
  }
}, {passive:false});

left.addEventListener("touchcancel", (e)=>{
  if(!joy.active) return;
  resetJoy();
  e.preventDefault();
}, {passive:false});

atkBtn.addEventListener("touchstart", (e)=>{ log("ATK"); e.preventDefault(); }, {passive:false});
for(const [id,label] of [["skill1","SKILL-1"],["skill2","SKILL-2"],["skill3","SKILL-3"]]){
  const b = document.getElementById(id);
  if(!b) continue;
  b.addEventListener("touchstart", (e)=>{ log(label); e.preventDefault(); }, {passive:false});
}


// Render + sim
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
function resizeCanvas(){
  const uiW = document.getElementById("ui").offsetWidth;
  canvas.width = Math.floor(window.innerWidth - uiW);
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

function isoWithCamera(wx, wy, camX, camY){
  const TW = state.map.tw, TH = state.map.th;
  const sx = (wx - wy) * (TW/2);
  const sy = (wx + wy) * (TH/2);
  const csx = (camX - camY) * (TW/2);
  const csy = (camX + camY) * (TH/2);
  return { x: (sx - csx) + canvas.width/2, y: (sy - csy) + canvas.height/2 };
}
function drawTile(x,y,camX,camY,color){
  const TW = state.map.tw, TH = state.map.th;
  const p = isoWithCamera(x,y,camX,camY);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x + TW/2, p.y + TH/2);
  ctx.lineTo(p.x, p.y + TH);
  ctx.lineTo(p.x - TW/2, p.y + TH/2);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function updateMonsters(){
  for(const e of state.entities){
    if(e.kind !== "monster") continue;
    const dx = playerEnt.x - e.x;
    const dy = playerEnt.y - e.y;
    const d = Math.hypot(dx,dy);
    if(d > 0.001){
      const ux = dx/d, uy = dy/d;
      e.vx = ux * e.speed;
      e.vy = uy * e.speed;
    }else{
      e.vx = 0; e.vy = 0;
    }
  }
}

let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  state.time += dt;

  // player input
  let dx = 0, dy = 0;
  if(keys["ArrowUp"]||keys["w"]) dy -= 1;
  if(keys["ArrowDown"]||keys["s"]) dy += 1;
  if(keys["ArrowLeft"]||keys["a"]) dx -= 1;
  if(keys["ArrowRight"]||keys["d"]) dx += 1;
  dx += joy.dx;
  dy += joy.dy;

  if(dx || dy){
    const L = Math.hypot(dx,dy) || 1;
    dx/=L; dy/=L;
    const spd = state.player.speed * (1 + (state.player.stats.move||0)/100);
    playerEnt.vx = dx * spd;
    playerEnt.vy = dy * spd;
  }else{
    playerEnt.vx = 0; playerEnt.vy = 0;
  }

  updateMonsters();

  // integrate
  for(const e of state.entities){
    tryMoveEntity(state, e, e.vx * dt, e.vy * dt);
  }

  // soft overlaps
  resolveSoftOverlaps(state, dt);

  // sync
  state.player.x = playerEnt.x;
  state.player.y = playerEnt.y;

  // camera follow
  const camX = playerEnt.x;
  const camY = playerEnt.y;

  // tiles
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const R = 22;
  const minX = Math.max(0, Math.floor(camX - R));
  const maxX = Math.min(state.map.w-1, Math.ceil(camX + R));
  const minY = Math.max(0, Math.floor(camY - R));
  const maxY = Math.min(state.map.h-1, Math.ceil(camY + R));
  for(let y=minY;y<=maxY;y++){
    for(let x=minX;x<=maxX;x++){
      drawTile(x,y,camX,camY,(x+y)%2 ? "#23232a" : "#2a2a33");
    }
  }

  // entities (depth sort)
  const drawList = state.entities.slice().sort((a,b)=> (a.x+a.y) - (b.x+b.y));
  for(const e of drawList){
    const p = isoWithCamera(e.x, e.y, camX, camY);
    if(e.kind === "player"){
      ctx.fillStyle = "#ff3b3b";
      ctx.beginPath();
      ctx.arc(p.x, p.y + state.map.th/2, 12, 0, Math.PI*2);
      ctx.fill();
    }else{
      ctx.fillStyle = "#55aaff";
      ctx.beginPath();
      ctx.arc(p.x, p.y + state.map.th/2, 10, 0, Math.PI*2);
      ctx.fill();
    }
  }

  __drawLifeOrb(state.player.res.life, state.player.stats.life);
  __drawMiniMap();
  requestAnimationFrame(loop);
}


/* ===== HUD render (Life Orb + MiniMap) ===== */
const lifeCanvas = document.getElementById("lifeCanvas");
const lifeNums   = document.getElementById("lifeNums");
const mmCanvas   = document.getElementById("minimapCanvas");

function __setupHiDPI(canvas){
  if(!canvas) return {w:0,h:0,dpr:1};
  const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
  const css = canvas.getBoundingClientRect();
  const w = Math.max(1, Math.floor(css.width * dpr));
  const h = Math.max(1, Math.floor(css.height * dpr));
  if(canvas.width !== w || canvas.height !== h){ canvas.width=w; canvas.height=h; }
  return { w, h, dpr };
}
function __drawLifeOrb(cur, max){
  if(!lifeCanvas) return;
  const ctx = lifeCanvas.getContext("2d");
  const {w,h} = __setupHiDPI(lifeCanvas);
  const cx=w/2, cy=h/2;
  const R=Math.min(w,h)*0.48;

  ctx.clearRect(0,0,w,h);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  ctx.fillStyle="rgba(0,0,0,0.58)"; ctx.fillRect(0,0,w,h);

  const pct = max>0 ? Math.max(0, Math.min(1, cur/max)) : 0;
  const levelY = cy + R - (2*R*pct);
  ctx.fillStyle="rgba(220,40,40,0.88)";
  ctx.fillRect(cx-R-2, levelY, 2*R+4, (cy+R)-levelY+2);

  // wave
  ctx.globalAlpha=0.35;
  ctx.beginPath();
  const waveAmp=R*0.05, waveLen=R*0.45;
  ctx.moveTo(cx-R, levelY);
  const phase = (performance.now()/1000)*2.4;
  for(let x=cx-R; x<=cx+R; x+=R*0.08){
    const t=(x-(cx-R))/waveLen;
    const y=levelY + Math.sin(t*2.8 + phase)*waveAmp;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(cx+R, cy+R); ctx.lineTo(cx-R, cy+R); ctx.closePath();
  ctx.fillStyle="rgba(255,130,130,0.68)";
  ctx.fill();
  ctx.globalAlpha=1.0;

  const grd=ctx.createRadialGradient(cx, cy+R*0.35, R*0.2, cx, cy, R);
  grd.addColorStop(0,"rgba(255,255,255,0.06)");
  grd.addColorStop(0.55,"rgba(0,0,0,0.0)");
  grd.addColorStop(1,"rgba(0,0,0,0.60)");
  ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);
  ctx.restore();

  ctx.strokeStyle="rgba(255,255,255,0.14)";
  ctx.lineWidth=Math.max(1,R*0.06);
  ctx.beginPath(); ctx.arc(cx,cy,R*0.985,0,Math.PI*2); ctx.stroke();

  ctx.strokeStyle="rgba(0,0,0,0.55)";
  ctx.lineWidth=Math.max(1,R*0.025);
  ctx.beginPath(); ctx.arc(cx,cy,R*0.90,0,Math.PI*2); ctx.stroke();

  if(lifeNums){
    lifeNums.innerHTML = `${Math.floor(cur)}<br><span style="font-size:12px;font-weight:800;opacity:.85">/ ${Math.floor(max)}</span>`;
  }
}
function __drawMiniMap(){
  if(!mmCanvas) return;
  const ctx = mmCanvas.getContext("2d");
  const {w,h} = __setupHiDPI(mmCanvas);
  const cx=w/2, cy=h/2;
  const R=Math.min(w,h)*0.48;

  ctx.clearRect(0,0,w,h);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();

  ctx.fillStyle="rgba(0,0,0,0.55)";
  ctx.fillRect(0,0,w,h);

  // Simple minimap: show nearby entities relative to player
  const scale = R / 18; // 18 world units radius
  const px = playerEnt.x, py = playerEnt.y;

  // grid hint
  ctx.globalAlpha=0.20;
  ctx.strokeStyle="rgba(255,255,255,0.15)";
  for(let i=-3;i<=3;i++){
    ctx.beginPath(); ctx.moveTo(cx-R, cy+i*R/3); ctx.lineTo(cx+R, cy+i*R/3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+i*R/3, cy-R); ctx.lineTo(cx+i*R/3, cy+R); ctx.stroke();
  }
  ctx.globalAlpha=1.0;

  for(const e of state.entities){
    const dx = e.x - px;
    const dy = e.y - py;
    if(Math.abs(dx) > 18 || Math.abs(dy) > 18) continue;
    const x = cx + dx*scale;
    const y = cy + dy*scale;
    const rr = (e.kind==="player") ? 4 : 3;
    ctx.fillStyle = (e.kind==="player") ? "rgba(255,80,80,0.95)" : "rgba(90,170,255,0.9)";
    ctx.beginPath(); ctx.arc(x,y,rr,0,Math.PI*2); ctx.fill();
  }

  // vignette
  const grd=ctx.createRadialGradient(cx, cy, R*0.2, cx, cy, R);
  grd.addColorStop(0,"rgba(255,255,255,0.06)");
  grd.addColorStop(0.6,"rgba(0,0,0,0.0)");
  grd.addColorStop(1,"rgba(0,0,0,0.70)");
  ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);

  ctx.restore();
}


requestAnimationFrame(loop);
</script>
