<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>미니 POE (아이소 v0)</title>
<style>
  :root{
    --uiScale: 1.15;
    --uiH: clamp(calc(86px * var(--uiScale)), 16vh, calc(120px * var(--uiScale)));
    --pad: clamp(calc(64px * var(--uiScale)), 12vw, calc(92px * var(--uiScale)));
    --stick: clamp(calc(26px * var(--uiScale)), 5.4vw, calc(42px * var(--uiScale)));
    --btn: clamp(calc(68px * var(--uiScale)), 12.5vw, calc(92px * var(--uiScale)));
  }
  html,body{margin:0;background:#000;overflow:hidden;touch-action:none;font-family:system-ui,-apple-system,Segoe UI,Roboto;}
  canvas{position:fixed;left:0;top:0;width:100vw;height:100vh;image-rendering:pixelated;z-index:0;}

  #hud{
    z-index:30;
    position:fixed;left:0;top:0;right:0;display:flex;gap:10px;align-items:flex-start;
    padding:10px;pointer-events:none;
  }
  .panel{
    background:rgba(10,10,10,.75); border:1px solid rgba(255,255,255,.12);
    border-radius:10px; padding:10px 12px; color:#eee; backdrop-filter: blur(6px);
    pointer-events:none;
  }
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .bar{width:240px;max-width:48vw;height:14px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}
  .fill{height:100%}
  #log{max-width:52vw; font-size:12px; line-height:1.3; color:#d7d7d7}
#lootToggle{
  -webkit-tap-highlight-color: transparent;
  position:fixed; right:10px; top:10px;
  z-index:70;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(10,10,10,.55);
  color:#fff;
  font-weight:800;
}
#lootToggle:active{transform:scale(.99)}

  #ui{
  position:fixed; inset:0;
  height:0;
  background:transparent;
  border:0;
  padding:0;
  pointer-events:none; /* 버튼만 이벤트 */
}
  #movePad{
  position:fixed;
  left:18px;
  bottom:18px;
  width:var(--pad);height:var(--pad);
  border-radius:50%;
  background:transparent; /* 🔥 배경 박스 제거 */
  border:1px solid rgba(255,255,255,.14);
  pointer-events:auto;
}
  #stick{
    position:absolute;left:calc(50% - var(--stick)/2);top:calc(50% - var(--stick)/2);
    width:var(--stick);height:var(--stick);border-radius:50%;
    background:rgba(255,255,255,.22); border:1px solid rgba(255,255,255,.18);
  }
  #attackBtn{
  position:fixed;
  right:18px;
  bottom:18px;
  width:var(--btn);height:var(--btn);
  border-radius:50%;
  background:rgba(200,40,40,.85); border:2px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;
  user-select:none; -webkit-user-select:none;
  pointer-events:auto;
}
  #attackBtn:active{transform:scale(.98)}

  #lootPanel{
  display:none; /* 🔥 기본 숨김 */
  position:fixed; right:10px; top:52px; width:min(360px, 62vw);
  max-height:50vh; overflow:auto; padding:10px;
  background:rgba(10,10,10,.78); border:1px solid rgba(255,255,255,.12);
  border-radius:10px; color:#eee; font-size:12px;
  z-index:60;
  pointer-events:auto;
}
  #lootPanel h3{margin:0 0 6px 0; font-size:13px; opacity:.9}
  .lootItem{padding:6px 8px; border:1px solid rgba(255,255,255,.10); border-radius:8px; margin:6px 0; cursor:pointer}
  .lootItem:active{transform:scale(.99)}
  .rarity-normal{color:#cfcfcf}
  .rarity-magic{color:#68a8ff}
  .rarity-rare{color:#f2d35e}

  #choiceOverlay{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.65);
    z-index:80;
    pointer-events:auto;
  }
  #choiceBox{
    width:min(520px, 92vw); background:rgba(15,15,15,.92);
    border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:14px;
    color:#eee;
  }
  #choiceBox h2{margin:0 0 10px 0; font-size:16px}
  .choice{
    padding:10px 12px; margin:10px 0; border-radius:12px;
    border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06);
    cursor:pointer;
  }
  .choice:active{transform:scale(.99)}
  .muted{opacity:.75}

  #minimap{
    position:fixed;
    right:12px;
    top:56px; /* 드랍 버튼 아래 */
    width:min(180px, 42vw);
    aspect-ratio: 16 / 10;
    background:rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.14);
    border-radius:10px;
    z-index:65;
    pointer-events:none;
  }

</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="minimap"></canvas>

<button id="lootToggle">드랍</button>

<div id="hud">
  <div class="panel">
    <div class="row" style="align-items:center">
      <div style="min-width:66px">생명력</div>
      <div class="bar"><div id="hpFill" class="fill" style="width:100%"></div></div>
      <div id="hpTxt" style="min-width:84px;text-align:right">100/100</div>
    </div>
    <div class="row" style="align-items:center;margin-top:8px">
      <div style="min-width:66px">경험치</div>
      <div class="bar"><div id="xpFill" class="fill" style="width:0%"></div></div>
      <div id="xpTxt" style="min-width:84px;text-align:right">0/20</div>
    </div>
    <div class="row muted" style="margin-top:8px;font-size:12px">
      <div id="statLine">레벨 1 · 피해 10 · 이동 1.00 · 방어 0</div>
    </div>
  </div>

  <div class="panel" style="flex:1">
    <div style="font-weight:700;margin-bottom:6px">미니 POE (아이소 v0)</div>
    <div id="log">PC: WASD 이동 / 터치·클릭 공격 · 모바일: 조이스틱+공격</div>
  </div>
</div>

<div id="lootPanel">
  <h3>드랍 아이템 (눌러서 장착)</h3>
  <div id="lootList"></div>
</div>

<div id="choiceOverlay">
  <div id="choiceBox">
    <h2>레벨업! 패시브를 하나 선택</h2>
    <div id="choices"></div>
    <div class="muted" style="font-size:12px;margin-top:8px">
      이 베이스는 “시스템 분리”가 핵심이라, 기능 추가해도 update가 안 꼬여.
    </div>
  </div>
</div>

<div id="ui">
  <div id="movePad"><div id="stick"></div></div>
  <div id="attackBtn">공격</div>
</div>

<script>
(() => {
  "use strict";
  let __stateReady = false;

  // =========================================================
  // 0) CORE: DOM / CANVAS / UTILS
  // =========================================================
  const DOM = {
    canvas: document.getElementById("c"),
    hpFill: document.getElementById("hpFill"),
    xpFill: document.getElementById("xpFill"),
    hpTxt:  document.getElementById("hpTxt"),
    xpTxt:  document.getElementById("xpTxt"),
    statLine: document.getElementById("statLine"),
    log: document.getElementById("log"),
    lootList: document.getElementById("lootList"),
    choiceOverlay: document.getElementById("choiceOverlay"),
    choices: document.getElementById("choices"),
    movePad: document.getElementById("movePad"),
    stick: document.getElementById("stick"),
    attackBtn: document.getElementById("attackBtn"),
    minimap: document.getElementById("minimap"),
  };

  const ctx = DOM.canvas.getContext("2d");
  const mmCtx = DOM.minimap.getContext("2d");
  const mmStatic = document.createElement("canvas");
  const mmStaticCtx = mmStatic.getContext("2d");
  let mmNeedsRebuild = true;

  const U = {
    clamp(v,a,b){ return Math.max(a, Math.min(b, v)); },
    len(x,y){ return Math.hypot(x,y); },
    norm(x,y){
      const l = Math.hypot(x,y) || 1;
      return {x:x/l, y:y/l, l};
    },
    rand(a,b){ return Math.random()*(b-a)+a; },
    randi(a,b){ return Math.floor(U.rand(a,b+1)); },
    pick(arr){ return arr[(Math.random()*arr.length)|0]; },
    pickWeighted(list){
      let s=0; for(const it of list) s+=it.w;
      let r=Math.random()*s;
      for(const it of list){ r-=it.w; if(r<=0) return it.v; }
      return list[list.length-1].v;
    },
    // circle vs AABB resolve
    circleRectResolve(c, r, rect){
      const nx = U.clamp(c.x, rect.x, rect.x+rect.w);
      const ny = U.clamp(c.y, rect.y, rect.y+rect.h);
      const dx = c.x - nx, dy = c.y - ny;
      const d2 = dx*dx + dy*dy;
      if(d2 <= r*r){
        const d = Math.sqrt(d2) || 0.001;
        const push = r - d;
        c.x += (dx/d)*push;
        c.y += (dy/d)*push;
        return true;
      }
      return false;
    },
    clone(obj){
      return (typeof structuredClone==="function") ? structuredClone(obj)
        : JSON.parse(JSON.stringify(obj));
    },
  };

  const World = {
    // view (screen)
    W(){ return innerWidth; },
    H(){ return innerHeight; },

    // map (world) size — POE처럼 “화면보다 큰 월드”
    MAP_W: 4200,
    MAP_H: 2600,

    resize(){
      DOM.canvas.width = innerWidth * devicePixelRatio;
      DOM.canvas.height = innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);

      

// minimap canvas (DPR 반영)
const mmCssW = Math.min(180, innerWidth*0.42);
const mmCssH = mmCssW * (10/16);
DOM.minimap.style.width = mmCssW + "px";
DOM.minimap.style.height = mmCssH + "px";
DOM.minimap.width = Math.max(1, Math.floor(mmCssW * devicePixelRatio));
DOM.minimap.height = Math.max(1, Math.floor(mmCssH * devicePixelRatio));
mmCtx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);

mmStatic.width = DOM.minimap.width;
mmStatic.height = DOM.minimap.height;
mmStaticCtx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
mmNeedsRebuild = true;
// state 준비된 뒤에만 “카메라/플레이어” 보정
      if(__stateReady){
        Systems.Camera.snap(state);
      }
    }
  };
  addEventListener("resize", World.resize);

// 벽 배치(월드 기준) — 카메라/맵이 커져도 구조가 안 꼬이게
const WALL_LAYOUT = [
  {x:0.25, y:0.35, w:220, h:26},
  {x:0.55, y:0.55, w:26,  h:220},
  {x:0.20, y:0.72, w:260, h:26},
];

function rebuildWalls(){
  state.world.walls = WALL_LAYOUT.map(o => ({
    x: World.MAP_W*o.x,
    y: World.MAP_H*o.y,
    w: o.w,
    h: o.h
  }));
}

// =========================================================
// TILE MAP v1 (1단계): 타일 기반 맵 + 타일 충돌 + 가시영역 렌더
// =========================================================
const Tile = {
  idx(cols, x, y){ return y*cols + x; },
  initFromMapSize(){
    const t = state.world.tile;
    t.cols = Math.ceil(World.MAP_W / t.size);
    t.rows = Math.ceil(World.MAP_H / t.size);
    t.data = new Uint8Array(t.cols * t.rows); // 0:바닥, 1:벽
  },
  fill(v){ state.world.tile.data.fill(v); },
  inBounds(tx,ty){
    const t=state.world.tile;
    return tx>=0 && ty>=0 && tx<t.cols && ty<t.rows;
  },
  get(tx,ty){
    const t=state.world.tile;
    if(!Tile.inBounds(tx,ty)) return 1; // 바깥은 벽
    return t.data[Tile.idx(t.cols, tx, ty)];
  },
  set(tx,ty,v){
    const t=state.world.tile;
    if(!Tile.inBounds(tx,ty)) return;
    t.data[Tile.idx(t.cols, tx, ty)] = v;
  },
  // 원형 엔티티(플레이어/몹) vs 타일 벽 충돌 해결
  resolveCircleVsTiles(circle){
    const t = state.world.tile;
    const r = circle.r;
    const minTx = Math.floor((circle.x - r)/t.size);
    const maxTx = Math.floor((circle.x + r)/t.size);
    const minTy = Math.floor((circle.y - r)/t.size);
    const maxTy = Math.floor((circle.y + r)/t.size);

    for(let ty=minTy; ty<=maxTy; ty++){
      for(let tx=minTx; tx<=maxTx; tx++){
        if(Tile.get(tx,ty)!==1) continue;
        const rx = tx*t.size;
        const ry = ty*t.size;
        U.circleRectResolve(circle, r, {x:rx,y:ry,w:t.size,h:t.size});
      }
    }
  }
};

// =========================================================
// ISOMETRIC RENDER HELPERS (로직은 직교 유지, 렌더만 아이소 변환)
// =========================================================
function worldToScreen(wx, wy){
  const ts = state.world.tile.size;
  const gx = wx / ts;
  const gy = wy / ts;
  // isoW = ts*2, isoH = ts
  const sx = (gx - gy) * ts;
  const sy = (gx + gy) * (ts * 0.5);
  return {x:sx, y:sy};
}

function tileToScreen(tx, ty){
  const ts = state.world.tile.size;
  const sx = (tx - ty) * ts;
  const sy = (tx + ty) * (ts * 0.5);
  return {x:sx, y:sy};
}

function drawIsoTile(ctx, sx, sy, ts, fill){
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(sx + ts, sy + ts*0.5);
  ctx.lineTo(sx, sy + ts);
  ctx.lineTo(sx - ts, sy + ts*0.5);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
}

function buildMinimapStatic(){
  // 미니맵 "배경(벽)"을 한 번만 그려두는 캐시
  if(!DOM || !DOM.minimap) return;
  const t = state?.world?.tile;
  if(!t || !t.data) return;

  // CSS 실제 표시 크기 기준으로 그림 (가볍게)
  const wCss = DOM.minimap.clientWidth || 180;
  const hCss = DOM.minimap.clientHeight || (wCss*(10/16));

  // mmStatic/mmStaticCtx가 없으면 안전 생성(예외 방지)
  if(typeof mmStatic === "undefined" || typeof mmStaticCtx === "undefined"){
    return; // 이 경우는 상단에서 mmStatic 설정 누락이니, 내가 다음 패치로 정리해줄게
  }

  mmStaticCtx.clearRect(0,0,wCss,hCss);

  const scaleX = wCss / World.MAP_W;
  const scaleY = hCss / World.MAP_H;
  const ts = t.size;

  // 맵이 커지면 샘플링(성능 안정)
  const maxDim = Math.max(t.cols, t.rows);
  const step = Math.max(1, Math.floor(maxDim / 220)); // 0~1px 수준 유지

  // 벽 타일만 찍기(바닥은 생략해서 가볍게)
  for(let ty=0; ty<t.rows; ty+=step){
    for(let tx=0; tx<t.cols; tx+=step){
      if(Tile.get(tx,ty)!==1) continue;

      const x = tx*ts*scaleX;
      const y = ty*ts*scaleY;
      const ww = ts*scaleX*step;
      const hh = ts*scaleY*step;

      mmStaticCtx.fillStyle = "rgba(255,255,255,.18)";
      mmStaticCtx.fillRect(x,y,Math.max(1,ww),Math.max(1,hh));
    }
  }

  // 테두리
  mmStaticCtx.strokeStyle = "rgba(255,255,255,.20)";
  mmStaticCtx.strokeRect(0.5,0.5,wCss-1,hCss-1);
}
function generateDungeon(){
  Tile.initFromMapSize();
  Tile.fill(1); // 전체 벽으로 시작

  const t = state.world.tile;
  const rooms = [];
  const roomCount = 26;

  function carveRect(x,y,w,h){
    for(let ty=y; ty<y+h; ty++){
      for(let tx=x; tx<x+w; tx++){
        Tile.set(tx,ty,0);
      }
    }
  }
  function randRoom(){
    const w = 7 + (Math.random()*11)|0;  // 7~17
    const h = 7 + (Math.random()*11)|0;
    const x = 2 + (Math.random()*(t.cols-w-4))|0;
    const y = 2 + (Math.random()*(t.rows-h-4))|0;
    return {x,y,w,h, cx:(x+(w/2))|0, cy:(y+(h/2))|0};
  }
  function intersects(a,b){
    return !(a.x+a.w+1 < b.x || b.x+b.w+1 < a.x || a.y+a.h+1 < b.y || b.y+b.h+1 < a.y);
  }

  for(let i=0;i<roomCount;i++){
    const r = randRoom();
    let ok=true;
    for(const o of rooms){ if(intersects(r,o)){ ok=false; break; } }
    if(!ok) continue;
    carveRect(r.x,r.y,r.w,r.h);
    rooms.push(r);
  }

  // 통로 연결(단순)
  rooms.sort((a,b)=>a.cx-b.cx);
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1], b=rooms[i];
    const y=a.cy;
    const x1=Math.min(a.cx,b.cx), x2=Math.max(a.cx,b.cx);
    for(let x=x1; x<=x2; x++) Tile.set(x,y,0);

    const x=b.cx;
    const y1=Math.min(a.cy,b.cy), y2=Math.max(a.cy,b.cy);
    for(let yy=y1; yy<=y2; yy++) Tile.set(x,yy,0);
  }

  // 플레이어를 첫 방 중앙에 배치
  const s = t.size;
  if(rooms.length){
    state.player.x = rooms[0].cx*s + s*0.5;
    state.player.y = rooms[0].cy*s + s*0.5;
  } else {
    state.player.x = World.MAP_W*0.5;
    state.player.y = World.MAP_H*0.5;
  }
}





// =========================================================
// 1) GAME STATE: 한 군데에만 모음 (꼬임 방지 핵심)
  // =========================================================
  const state = {
    time: { last: performance.now(), dt: 0, now: 0 },
    paused: { forChoice: false },

    input: {
      keys: {w:0,a:0,s:0,d:0},
      mouse: {x: innerWidth*0.5, y: innerHeight*0.5, down:false},
      pad: {active:false, id:null, vx:0, vy:0},
      attackHeld: false,
    },

    camera: { x: 0, y: 0, tx: 0, ty: 0 },

    player: {
      x: World.MAP_W*0.5, y: World.MAP_H*0.5, r: 14,
      hp: 100, hpMax: 100,
      xp: 0, xpNeed: 20, level: 1,
      msBase: 220, ms: 220,
      armor: 0,
      dmg: 10,
      crit: 0.05,
      atkCd: 0.33,
      atkTimer: 0,
      regen: 0.5,
      leech: 0.0,
      gear: { weapon: null, armor: null },
      thorns: 0,
    },

    world: {
      walls: [],
      tile: { size: 32, cols: 0, rows: 0, data: null },
    },

    entities: {
      enemies: [],
      projectiles: [],
      drops: [],
      fx: [],
    },

    spawner: {
      t: 0,
    }
  };

  // =========================================================
  // 2) DATA TABLES (아이템/패시브 등 “내용”은 여기만)
  // =========================================================
  const Data = {
  rarityK: { normal:"일반", magic:"마법", rare:"희귀" },

  baseItems: {
    weapon: [
      {name:"녹슨 검",      dmgMin:2, dmgMax:6,  atkSpeed:1.00},
      {name:"철 검",        dmgMin:4, dmgMax:10, atkSpeed:1.00},
      {name:"투박한 도끼",  dmgMin:6, dmgMax:14, atkSpeed:0.90},
      {name:"단검",         dmgMin:3, dmgMax:8,  atkSpeed:1.25},
    ],
    armor: [
      {name:"천 조끼",      armor:4,  hp:0},
      {name:"가죽 조끼",    armor:8,  hp:10},
      {name:"사슬 조끼",    armor:14, hp:20},
    ]
  },

  prefixes: {
    weapon: [
      {name:"야만적인", mods:{dmgPct: 0.20}},
      {name:"날쌘",     mods:{atkSpdPct: 0.15}},
      {name:"예리한",   mods:{crit: 0.05}},
    ],
    armor: [
      {name:"튼튼한",   mods:{hp: 20}},
      {name:"견고한",   mods:{armor: 6}},
      {name:"활력의",   mods:{regen: 0.4}},
    ]
  },

  suffixes: {
    weapon: [
      {name:"학살의", mods:{dmgFlat: 3}},
      {name:"질주의", mods:{atkSpdPct: 0.10}},
      {name:"흡혈의", mods:{leech: 0.02}},
    ],
    armor: [
      {name:"황소의", mods:{hp: 25}},
      {name:"가시의", mods:{thorns: 3}},
      {name:"바람의", mods:{msPct: 0.08}},
    ]
  },

  passives: [
    {name:"+10 최대 생명력", apply(s){ s.player.hpMax+=10; s.player.hp=U.clamp(s.player.hp+10,1,s.player.hpMax); }},

const Pools = {

  proj: [],
  getEnemy(){
    return this.enemy.pop() || {x:0,y:0,r:12,hp:1,hpMax:1,spd:90,dmg:6};

// =========================================================
// 3) SYSTEMS: 기능 추가는 여기 “새 시스템”으로만
  // =========================================================
  // =========================================================
// SPAWN SAFETY (벽/막힌 곳 스폰 방지)
// - 스폰 좌표가 벽(타일=1)이거나 벽 바로 옆이면 다시 찾음
// - 실패하면 스폰을 건너뛰어(안전)
// =========================================================
function tileIsFloor(tx, ty){
  return Tile.get(tx, ty) === 0;
}

function tileIsSafeSpawn(tx, ty){
  // 3x3 주변까지 바닥이면 안전(벽 끼임 방지)
  if(!tileIsFloor(tx, ty)) return false;
  for(let oy=-1; oy<=1; oy++){
    for(let ox=-1; ox<=1; ox++){
      if(!tileIsFloor(tx+ox, ty+oy)) return false;
    }
  }
  return true;
}

function worldToTile(wx, wy){
  const ts = state.world.tile.size;
  return { tx: Math.floor(wx/ts), ty: Math.floor(wy/ts) };
}

function tileToWorldCenter(tx, ty){
  const ts = state.world.tile.size;
  return { x: (tx+0.5)*ts, y: (ty+0.5)*ts };
}

function findSafeSpawnFromWorld(wx, wy, maxRadTiles=10){
  // 1) 먼저 해당 타일 검사
  const t = worldToTile(wx, wy);
  if(tileIsSafeSpawn(t.tx, t.ty)){
    return tileToWorldCenter(t.tx, t.ty);
  }

  // 2) 주변을 동심 사각(스파이럴)로 탐색
  for(let r=1; r<=maxRadTiles; r++){
    // perimeter
    for(let i=-r; i<=r; i++){
      const cand = [
        {tx: t.tx+i, ty: t.ty-r},
        {tx: t.tx+i, ty: t.ty+r},
        {tx: t.tx-r, ty: t.ty+i},
        {tx: t.tx+r, ty: t.ty+i},
      ];
      for(const c of cand){
        if(tileIsSafeSpawn(c.tx, c.ty)){
          return tileToWorldCenter(c.tx, c.ty);
        }
      }
    }
  }
  return null;
}

          const dx = nx - cx, dy = ny - cy;
          const max = r.width*0.36;
          const l = Math.hypot(dx,dy) || 1;
          const cl = Math.min(max, l);

          stick.style.left = `calc(50% - var(--stick)/2 + ${sx}px)`;

          s.input.pad.vx = sx/max;
          s.input.pad.vy = sy/max;
        }
        function resetStick(){
          stick.style.left = `calc(50% - var(--stick)/2)`;
          stick.style.top  = `calc(50% - var(--stick)/2)`;
          s.input.pad.vx=0; s.input.pad.vy=0;
        }

        pad.addEventListener("pointerdown", (e)=>{
          s.input.pad.active=true; s.input.pad.id=e.pointerId;
          pad.setPointerCapture(e.pointerId);
          setStick(e.clientX, e.clientY);

        pad.addEventListener("pointermove", (e)=>{

          setStick(e.clientX, e.clientY);

          if(m.dmgFlat) dmg += m.dmgFlat;
          if(m.atkSpdPct) atkCd /= (1+m.atkSpdPct);
          if(m.crit) crit += m.crit;

          if(m.hp) hpMax += m.hp;
          if(m.armor) armor += m.armor;
          if(m.regen) regen += m.regen;
          if(m.msPct) ms *= (1+m.msPct);
          if(m.thorns) thorns += m.thorns;

        const oldMax=p.hpMax;
        p.dmg = Math.max(1, Math.round(dmg));

          e.x += (dx/d)*e.spd*dt;
          e.y += (dy/d)*e.spd*dt;

          // tile collide (타일맵) — 멀리 있으면 생략(성능)
          if(!isFar){
            Tile.resolveCircleVsTiles(e);
          }

          // contact damage
          if(d < p.r + e.r){
            const mitig = U.clamp(p.armor / (p.armor + 60), 0, 0.6);
            const takenPerSec = e.dmg * (1-mitig) * 2.2;
            Systems.Player.takeDamage(s, takenPerSec * dt);

            // thorns (옵션)
            if(p.thorns>0){
              e.hp -= p.thorns * dt * 2.0;
            }
          }
        }

        // remove dead by thorns, etc. (pool)
for(let i=es.length-1;i>=0;i--){
  if(es[i].hp<=0){
    const dead = es[i];
    Systems.Combat.onEnemyKilled(s, dead);
    // swap-pop
    es[i] = es[es.length-1];
    es.pop();
    Pools.freeEnemy(dead);
  }
}
}
    },

    // ---------- Combat (프로젝트일, 히트, 레벨업) ----------
    Combat: {
      tryAttack(s){
        const p=s.player;
        if(p.atkTimer>0) return;
        if(s.entities.enemies.length===0) return;

        p.atkTimer = p.atkCd;

        // simple auto-aim (nearest)
        let target=s.entities.enemies[0], best=1e18;
        for(const e of s.entities.enemies){
          const d=(e.x-p.x)**2 + (e.y-p.y)**2;
          if(d<best){ best=d; target=e; }
        }

        const ang = Math.atan2(target.y-p.y, target.x-p.x);
        const pr = Pools.getProj();
pr.x = p.x; pr.y = p.y;
pr.vx = Math.cos(ang)*560;
pr.vy = Math.sin(ang)*560;
pr.r = 4;
pr.life = 0.9;
s.entities.projectiles.push(pr);
      },

      update(s, dt){
        // attack input
        if(Systems.Input.isAttacking(s)){
          Systems.Combat.tryAttack(s);
        }

        // move projectiles & hit
        const ps=s.entities.projectiles;
        const es=s.entities.enemies;
        const p=s.player;

        for(let i=ps.length-1;i>=0;i--){
          const pr=ps[i];
          pr.x += pr.vx*dt;
          pr.y += pr.vy*dt;
          pr.life -= dt;

          if(pr.life<=0 || pr.x<-50||pr.x>World.MAP_W+50||pr.y<-50||pr.y>World.MAP_H+50){
            const gone = ps[i];
            ps[i] = ps[ps.length-1];
            ps.pop();
            Pools.freeProj(gone);
            continue;
          }

          for(let j=es.length-1;j>=0;j--){
            const e=es[j];
            const d=Math.hypot(pr.x-e.x, pr.y-e.y);
            if(d < pr.r + e.r){
              const isCrit = Math.random() < p.crit;
              const dmg = Math.round(p.dmg * (isCrit ? 1.7 : 1.0));
              e.hp -= dmg;

              // leech
              if(p.leech>0){
                p.hp = U.clamp(p.hp + dmg*p.leech, 1, p.hpMax);
              }

              // kill
              if(e.hp<=0){
                Systems.Combat.onEnemyKilled(s, e);
                // swap-pop + pool
                es[j] = es[es.length-1];
                es.pop();
                Pools.freeEnemy(e);
              }

              const gone = ps[i];
              ps[i] = ps[ps.length-1];
              ps.pop();
              Pools.freeProj(gone);
              break;
            }
          }
        }
      },

      onEnemyKilled(s, enemy){
        const p=s.player;
        p.xp += 4;

        if(Math.random()<0.28){
          Systems.Items.addDrop(s, enemy.x, enemy.y);
        }

        // level up (한 번에 한 번만 선택창)
        while(p.xp >= p.xpNeed){
          p.xp -= p.xpNeed;
          p.level++;
          p.xpNeed = Math.round(20 + (p.level-1)*10);
          Systems.UI.openChoices(s);
          break;
        }
      }
    },

    // ---------- World/FX ----------
    WorldFX: {
      update(s, dt){
        // drops sparkle timer
        for(const d of s.entities.drops){
          d.t += dt;
        }
      }
    },

    // ---------- Renderer (draw만) ----------
    // ---------- Renderer (Isometric, draw만) ----------
// ---------- Renderer (Isometric, player-centered) ----------
Render: {
  draw(s){
    const vw = World.W(), vh = World.H();
    ctx.clearRect(0,0,vw,vh);

    const t = s.world.tile;
    const ts = t.size;

    // ✅ 렌더 카메라: 플레이어를 화면 중앙에 고정 (아이소에서는 이게 가장 안정적)
    const pS = worldToScreen(s.player.x, s.player.y);

    ctx.save();
    ctx.translate(vw*0.5, vh*0.5);
    ctx.translate(-pS.x, -pS.y);

    // bg (현재 화면 영역만)
    ctx.fillStyle="#060606";
    ctx.fillRect(pS.x - vw*0.5, pS.y - vh*0.5, vw, vh);

    // ===== 타일 렌더 (아이소, 플레이어 주변만) =====
    const pTx = Math.floor(s.player.x / ts);
    const pTy = Math.floor(s.player.y / ts);

    const range = Math.min(160, Math.max(45, Math.ceil((vw+vh)/ts) + 22));

    const minTx = Math.max(0, pTx - range);
    const maxTx = Math.min(t.cols-1, pTx + range);
    const minTy = Math.max(0, pTy - range);
    const maxTy = Math.min(t.rows-1, pTy + range);

    // 깊이(화면Y) 기준: (tx+ty) 오름차순
    for(let sum = minTx+minTy; sum <= maxTx+maxTy; sum++){
      const start = Math.max(minTx, sum - maxTy);
      const end   = Math.min(maxTx, sum - minTy);
      for(let txi = start; txi <= end; txi++){
        const tyi = sum - txi;
        if(tyi < minTy || tyi > maxTy) continue;

        const v = Tile.get(txi, tyi);
        const p = tileToScreen(txi, tyi);

        if(v===1){
          drawIsoTile(ctx, p.x, p.y, ts, "rgba(255,255,255,.16)");
        } else {
          const fill = ((txi+tyi)&1) ? "rgba(255,255,255,.030)" : "rgba(255,255,255,.018)";
          drawIsoTile(ctx, p.x, p.y, ts, fill);
        }
      }
    }

    // ===== 엔티티 렌더 (아이소, 깊이 정렬) =====
    const drawList = [];
    drawList.push({k: s.player.x + s.player.y, type:"player", ref:s.player});
    for(const e of s.entities.enemies) drawList.push({k: e.x + e.y, type:"enemy", ref:e});
    for(const d of s.entities.drops)   drawList.push({k: d.x + d.y, type:"drop", ref:d});
    for(const pr of s.entities.projectiles) drawList.push({k: pr.x + pr.y, type:"proj", ref:pr});
    drawList.sort((a,b)=>a.k-b.k);

    for(const it of drawList){
      if(it.type==="drop"){
        const d = it.ref;
        const sxy = worldToScreen(d.x, d.y);
        ctx.beginPath();
        ctx.arc(sxy.x, sxy.y, 5 + Math.sin(d.t*6)*1.2, 0, Math.PI*2);
        ctx.fillStyle = d.item.rarity==="rare" ? "rgba(242,211,94,.95)"
                    : d.item.rarity==="magic" ? "rgba(104,168,255,.95)"
                    : "rgba(207,207,207,.90)";
        ctx.fill();
        continue;
      }
      if(it.type==="player"){
        const p = it.ref;
        const sxy = worldToScreen(p.x, p.y);
        ctx.beginPath();
        ctx.arc(sxy.x, sxy.y, Math.max(4, p.r*0.60), 0, Math.PI*2);
        ctx.fillStyle="rgba(230,230,230,.98)";
        ctx.fill();
        ctx.strokeStyle="rgba(0,0,0,.25)";
        ctx.stroke();
        continue;
      }
      if(it.type==="enemy"){
        const e = it.ref;
        const sxy = worldToScreen(e.x, e.y);
        ctx.beginPath();
        ctx.arc(sxy.x, sxy.y, Math.max(4, e.r*0.60), 0, Math.PI*2);
        ctx.fillStyle="rgba(190,60,60,.98)";
        ctx.fill();

        const bw=28, bh=4;
        ctx.fillStyle="rgba(0,0,0,.60)";
        ctx.fillRect(sxy.x-bw/2, sxy.y-18, bw, bh);
        ctx.fillStyle="rgba(255,120,120,.98)";
        ctx.fillRect(sxy.x-bw/2, sxy.y-18, bw*(e.hp/e.hpMax), bh);
        continue;
      }
      if(it.type==="proj"){
        const pr = it.ref;
        const sxy = worldToScreen(pr.x, pr.y);
        ctx.beginPath();
        ctx.arc(sxy.x, sxy.y, Math.max(2, pr.r*0.60), 0, Math.PI*2);
        ctx.fillStyle="rgba(255,240,200,.98)";
        ctx.fill();
        continue;
      }
    }

    ctx.restore();

    // ===== 미니맵 (월드 좌표 기반) =====
    const wCss = DOM.minimap.clientWidth || 180;
    const hCss = DOM.minimap.clientHeight || (wCss*(10/16));

    if(mmNeedsRebuild){
      buildMinimapStatic();
      mmNeedsRebuild = false;
    }

    mmCtx.clearRect(0,0,wCss,hCss);
    mmCtx.drawImage(mmStatic, 0, 0, wCss, hCss);

    const sx = wCss / World.MAP_W;
    const sy = hCss / World.MAP_H;

    mmCtx.fillStyle = "rgba(255,120,120,.95)";
    for(const e of s.entities.enemies){
      mmCtx.fillRect(e.x*sx-1, e.y*sy-1, 2, 2);
    }

    mmCtx.fillStyle = "rgba(255,255,255,.95)";
    mmCtx.fillRect(s.player.x*sx-2, s.player.y*sy-2, 4, 4);

    // 카메라 박스(월드 직교 기준 — 로직 카메라 유지)
    mmCtx.strokeStyle = "rgba(120,200,255,.75)";
    mmCtx.strokeRect(s.camera.x*sx, s.camera.y*sy, vw*sx, vh*sy);
  }
}

  };

  // =========================================================
  // 4) GAME LOOP: update는 “시스템 호출만”
  // =========================================================
  function step(now){
    state.time.now = now;
    const dt = Math.min(0.033, (now - state.time.last)/1000);
    state.time.last = now;
    state.time.dt = dt;
    
    state.frame = (state.frame || 0) + 1;
    
    if(!state.paused.forChoice){
      // update pipeline (꼬임 방지: 순서 고정)
      Systems.Player.update(state, dt);
      Systems.Enemies.update(state, dt);
      Systems.Combat.update(state, dt);
      Systems.WorldFX.update(state, dt);

      Systems.Camera.update(state);
      Systems.UI.updateHUD(state);
    } else {
      Systems.Camera.snap(state);
    }

    // render always
    Systems.Render.draw(state);

    requestAnimationFrame(step);
  }

  // =========================================================
  // 5) INIT
  // =========================================================
  World.resize();
  __stateReady = true;
  generateDungeon();
  buildMinimapStatic();
  mmNeedsRebuild = false;
  // rebuildWalls(); // (옵션) 오브젝트 벽을 쓰고 싶으면 켜기
  Systems.Input.init(state);
  Systems.Items.recalcStats(state);
  Systems.UI.updateHUD(state);
  Systems.UI.renderLoot(state);
// 드랍 패널 토글 (기본은 숨김)
document.getElementById("lootToggle").onclick = () => {
  const lp = document.getElementById("lootPanel");
  lp.style.display = (lp.style.display === "none" || !lp.style.display) ? "block" : "none";
};

  Systems.Camera.snap(state);
  Systems.UI.log("✅ 아이소 v0 + 미니맵 · 방/통로 확장 · 조이스틱+공격");

  requestAnimationFrame(step);
})();
</script>
